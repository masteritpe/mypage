<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 확언</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      --bg-body: #F9FAFB;
      --bg-surface: #FFFFFF;
      --border-light: #F3F4F6;
      --border-base: #E5E7EB;
      --text-main: #111827;
      --text-muted: #6B7280;
      --primary: #6366F1;
      --primary-hover: #4F46E5;
      --secondary: #FFFFFF;
      --secondary-hover: #F9FAFB;
      --success: #10B981;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    /* 헤더 영역 */
    .dashboard-header { max-width: 1000px; margin: 0 auto 24px auto; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .title-area { display: flex; align-items: center; gap: 12px; }
    .title-area i { font-size: 28px; color: var(--primary); }
    h2 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    
    /* 버튼 공통 스타일 */
    .actions { display: flex; gap: 10px; }
    input[type="file"] { display: none; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 18px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-outline { background: var(--secondary); color: var(--text-main); border-color: var(--border-base); box-shadow: var(--shadow-sm); }
    .btn-outline:hover:not(:disabled) { background: var(--secondary-hover); border-color: #D1D5DB; }
    .btn-success { background: var(--success); color: white; box-shadow: var(--shadow-sm); }
    .btn-success:hover:not(:disabled) { background: #059669; transform: translateY(-1px); }

    /* 안내 메시지바 */
    .instructions {
      display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
      font-size: 13px; color: var(--text-muted);
      background: var(--bg-surface); padding: 12px 20px;
      border-radius: var(--radius-md); border: 1px solid var(--border-base);
    }
    .instructions span { display: inline-flex; align-items: center; gap: 6px; }
    .instructions i { font-size: 16px; }

    /* 메인 컨텐츠 영역 */
    #content-wrapper {
      max-width: 1000px; margin: 0 auto;
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      min-height: 500px;
    }

    /* 좌측: 이미지 뷰어 */
    .image-panel {
      background: var(--bg-body);
      border-right: 1px solid var(--border-base);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; position: relative;
    }
    .empty-msg {
      text-align: center; color: var(--text-muted);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .empty-msg i { font-size: 40px; color: #D1D5DB; }
    canvas {
      max-width: 100%; max-height: 450px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      display: none;
    }

    /* 우측: 컨트롤 패널 */
    .control-panel { padding: 32px; display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 14px; font-weight: 600; color: var(--text-main); display: flex; align-items: center; gap: 6px; }
    .form-group label i { color: var(--primary); font-size: 18px; }
    
    select, input[type="range"] { padding: 10px; border: 1px solid var(--border-base); border-radius: var(--radius-md); font-family: inherit; }
    
    textarea {
      width: 100%; padding: 12px; border: 1px solid var(--border-base);
      border-radius: var(--radius-md); font-family: inherit; font-size: 14px;
      resize: vertical; min-height: 80px; outline: none; transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
    
    .divider { height: 1px; background: var(--border-base); margin: 8px 0; }
    
    .result-box {
      background: #F3F4F6; border: 1px solid var(--border-base);
      border-radius: var(--radius-md); padding: 16px;
      font-size: 14px; color: var(--text-main); min-height: 60px;
      word-break: break-all;
    }

    .opacity-value { font-size: 12px; color: var(--text-muted); font-weight: normal; margin-left: auto; }

    /* 토스트 알림 */
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #111827; color: white;
      padding: 10px 20px; border-radius: 99px; font-size: 14px;
      box-shadow: var(--shadow-md); opacity: 0; visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      z-index: 3000;
    }
    #toast.show { opacity: 1; visibility: visible; }
  </style>
</head>
<body>

  <div class="dashboard-header">
    <div class="header-top">
      <div class="title-area">
        <i class="ph ph-magic-wand"></i>
        <h2>이미지 확언</h2>
      </div>
      
      <div class="actions">
        <label for="upload-img" class="btn btn-outline">
          <i class="ph ph-image"></i> 이미지 불러오기
        </label>
        <input type="file" id="upload-img" accept="image/png, image/jpeg" />
        
        <button class="btn btn-outline" id="btn-clear" onclick="clearData()" style="display:none;">
          <i class="ph ph-trash"></i> 초기화
        </button>
      </div>
    </div>

    <div class="instructions">
      <span><i class="ph ph-eye-slash"></i> <b>픽셀 스텔스:</b> 이미지의 픽셀값(LSB)을 조작하여 완벽하게 은닉합니다.</span>
      <span style="color: #D1D5DB;">|</span>
      <span><i class="ph ph-eye"></i> <b>서브리미널 워터마크:</b> 눈에 띌 듯 말 듯 희미하게 이미지에 확언을 삽입합니다.</span>
    </div>
  </div>

  <div id="content-wrapper">
    <div class="image-panel">
      <div class="empty-msg" id="empty-state">
        <i class="ph ph-image-square"></i>
        <strong>이미지를 업로드해주세요</strong>
        <span style="font-size:13px;">PNG 또는 JPG 파일을 지원합니다</span>
      </div>
      <canvas id="imgCanvas"></canvas>
    </div>

    <div class="control-panel">
      
      <div class="form-group">
        <label><i class="ph ph-sliders-horizontal"></i> 적용 방식 선택</label>
        <select id="stealth-mode" onchange="toggleControls()">
          <option value="lsb">1. 픽셀 스텔스</option>
          <option value="watermark">2. 서브리미널 워터마크</option>
        </select>
      </div>

      <div class="form-group" id="position-control" style="display: none;">
        <label><i class="ph ph-crosshair"></i> 워터마크 위치</label>
        <select id="watermark-position" onchange="resetToEncodeState()">
          <option value="diagonal" selected>대각선</option>
          <option value="top-left">왼쪽 상단</option>
          <option value="center">가운데</option>
          <option value="bottom-right">오른쪽 하단</option>
        </select>
      </div>

      <div class="form-group" id="opacity-control" style="display: none;">
        <label>
          <i class="ph ph-drop-half-bottom"></i> 워터마크 투명도 
          <span id="opacity-label" class="opacity-value">3% (권장: 2~5%)</span>
        </label>
        <input type="range" id="opacity-slider" min="1" max="15" value="3" oninput="updateOpacityLabel(this.value)">
      </div>

      <div class="form-group" id="fontsize-control" style="display: none;">
        <label>
          <i class="ph ph-text-t"></i> 폰트 크기 
          <span id="fontsize-label" class="opacity-value">60px</span>
        </label>
        <input type="range" id="fontsize-slider" min="20" max="150" value="60" oninput="updateFontsizeLabel(this.value)">
      </div>

      <div class="form-group">
        <label><i class="ph ph-pencil-simple"></i> 자기확언 문구 입력</label>
        <textarea id="affirmationText" placeholder="이미지에 숨길 텍스트를 입력하세요. (예: 나는 매일 모든 면에서 점점 더 좋아지고 있다.)"></textarea>
      </div>
      
      <div class="actions">
        <button class="btn btn-primary" id="btn-encode" onclick="encodeMessage()" style="flex: 1;" disabled>
          <i class="ph ph-lock-key"></i> 문구 적용하기
        </button>
        <button class="btn btn-success" id="btn-download" onclick="downloadImage()" style="flex: 1; display: none;">
          <i class="ph ph-download-simple"></i> 이미지 저장
        </button>
      </div>

      <div class="divider"></div>

      <div class="form-group">
        <label><i class="ph ph-magnifying-glass"></i> 추출된 문구 결과 (LSB 기반)</label>
        <div id="decodeResult" class="result-box">
          <span style="color: var(--text-muted);">이미지를 불러온 후 아래 버튼을 눌러 추출하세요.</span>
        </div>
      </div>

      <button class="btn btn-outline" id="btn-decode" onclick="decodeMessage()" style="width: 100%;" disabled>
        <i class="ph ph-lock-open"></i> 숨겨진 문구 추출
      </button>

    </div>
  </div>

  <div id="toast">알림 메시지</div>

  <script>
    const uploadInput = document.getElementById('upload-img');
    const emptyState = document.getElementById('empty-state');
    const canvas = document.getElementById('imgCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    const btnClear = document.getElementById('btn-clear');
    const btnEncode = document.getElementById('btn-encode');
    const btnDecode = document.getElementById('btn-decode');
    const btnDownload = document.getElementById('btn-download');
    
    let originalImage = new Image();
    const DELIMITER = "||END||";

    // --- UI 컨트롤 헬퍼 ---
    function toggleControls() {
      const mode = document.getElementById('stealth-mode').value;
      const displayStyle = (mode === 'watermark') ? 'flex' : 'none';
      document.getElementById('position-control').style.display = displayStyle;
      document.getElementById('opacity-control').style.display = displayStyle;
      document.getElementById('fontsize-control').style.display = displayStyle;
      resetToEncodeState(); // 모드 변경 시 적용버튼 복구
    }

    function updateOpacityLabel(val) {
      document.getElementById('opacity-label').innerText = `${val}%`;
    }

    function updateFontsizeLabel(val) {
      document.getElementById('fontsize-label').innerText = `${val}px`;
    }

    // 입력값 변경 시 '이미지 저장' 상태에서 다시 '문구 적용하기' 상태로 복구
    function resetToEncodeState() {
      if (btnEncode.style.display === 'none' && !btnEncode.disabled) {
        btnEncode.style.display = 'inline-flex';
        btnDownload.style.display = 'none';
      }
    }
    
    // 이벤트 리스너 연결 (설정값을 변경하면 다시 적용할 수 있도록)
    document.getElementById('affirmationText').addEventListener('input', resetToEncodeState);
    document.getElementById('opacity-slider').addEventListener('input', resetToEncodeState);
    document.getElementById('fontsize-slider').addEventListener('input', resetToEncodeState);

    // --- 1. 이미지 업로드 처리 ---
    uploadInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        originalImage.onload = function() {
          canvas.width = originalImage.width;
          canvas.height = originalImage.height;
          ctx.drawImage(originalImage, 0, 0);
          
          emptyState.style.display = 'none';
          canvas.style.display = 'block';
          btnClear.style.display = 'inline-flex';
          
          // 업로드 시 버튼 상태 초기화
          btnEncode.disabled = false;
          btnEncode.style.display = 'inline-flex';
          btnDownload.style.display = 'none'; 
          btnDecode.disabled = false;
          
          document.getElementById('decodeResult').innerHTML = '<span style="color: var(--text-muted);">이미지가 준비되었습니다.</span>';
          
          showToast('이미지를 성공적으로 불러왔습니다.');
        }
        originalImage.src = event.target.result;
      }
      reader.readAsDataURL(file);
      uploadInput.value = ''; 
    });

    // --- 워터마크 그리기 함수 ---
    function applyWatermarkToCanvas(text, opacity, fontSize, position) {
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.fillStyle = "#ffffff"; 
      ctx.globalCompositeOperation = "difference"; 
      
      ctx.font = `bold ${fontSize}px 'Pretendard', sans-serif`;
      
      const padding = 40;

      if (position === 'top-left') {
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(text, padding, padding);
      } else if (position === 'bottom-right') {
        ctx.textAlign = "right";
        ctx.textBaseline = "bottom";
        ctx.fillText(text, canvas.width - padding, canvas.height - padding);
      } else if (position === 'center') {
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
      } else if (position === 'diagonal') {
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(-45 * Math.PI / 180);
        ctx.fillText(text, 0, 0);
      }

      ctx.restore();
    }

    // --- 2. 인코딩 (적용하기) ---
    function encodeMessage() {
      const text = document.getElementById('affirmationText').value.trim();
      const mode = document.getElementById('stealth-mode').value;
      const opacity = parseInt(document.getElementById('opacity-slider').value) / 100;
      const fontSize = parseInt(document.getElementById('fontsize-slider').value, 10);
      const position = document.getElementById('watermark-position').value;

      if (!text) { 
        showToast('숨길 자기확언 문구를 입력해주세요.'); 
        return; 
      }

      ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

      if (mode === 'watermark') {
        applyWatermarkToCanvas(text, opacity, fontSize, position);
      }

      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;

      const encoder = new TextEncoder();
      const bytes = encoder.encode(text + DELIMITER);
      
      let binaryString = "";
      for (let byte of bytes) {
        binaryString += byte.toString(2).padStart(8, '0');
      }

      if (binaryString.length > (data.length / 4) * 3) {
        showToast('입력한 문구가 이미지 크기에 비해 너무 깁니다.');
        return;
      }

      let bitIndex = 0;
      for (let i = 0; i < data.length && bitIndex < binaryString.length; i++) {
        if ((i + 1) % 4 === 0) continue; 
        
        let bit = parseInt(binaryString[bitIndex]);
        if (bit === 1) {
            data[i] = data[i] | 1;
        } else {
            data[i] = data[i] & ~1;
        }
        bitIndex++;
      }

      ctx.putImageData(imgData, 0, 0);
      
      // 적용 완료 후: 적용버튼 숨김, 저장버튼 노출
      btnEncode.style.display = 'none';
      btnDownload.style.display = 'inline-flex'; 
      
      showToast(mode === 'watermark' ? '워터마크와 데이터가 모두 적용되었습니다!' : '데이터가 픽셀에 완벽히 은닉되었습니다!');
    }

    // --- 3. 디코딩 (추출하기) ---
    function decodeMessage() {
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;

      let binaryString = "";
      for (let i = 0; i < data.length; i++) {
        if ((i + 1) % 4 === 0) continue;
        binaryString += (data[i] & 1).toString();
      }

      let decodedBytes = [];
      const delimiterBytes = new TextEncoder().encode(DELIMITER);
      let matchCount = 0;

      for (let i = 0; i < binaryString.length; i += 8) {
        let byteStr = binaryString.slice(i, i + 8);
        if (byteStr.length < 8) break;
        
        let val = parseInt(byteStr, 2);
        decodedBytes.push(val);

        if (val === delimiterBytes[matchCount]) {
            matchCount++;
            if (matchCount === delimiterBytes.length) {
                decodedBytes = decodedBytes.slice(0, -delimiterBytes.length);
                break;
            }
        } else {
            matchCount = (val === delimiterBytes[0]) ? 1 : 0;
        }
      }

      const decoder = new TextDecoder();
      let extractedText = decoder.decode(new Uint8Array(decodedBytes));
      
      const resultBox = document.getElementById('decodeResult');
      if (extractedText.trim() === "") {
        resultBox.innerHTML = `<span style="color: #EF4444;"><i class="ph ph-warning-circle"></i> 숨겨진 문구를 찾을 수 없거나 손상되었습니다.</span>`;
        showToast('문구 추출 실패');
      } else {
        resultBox.innerHTML = `<strong style="color: var(--primary);">${extractedText}</strong>`;
        showToast('성공적으로 문구를 추출했습니다!');
      }
    }

    // --- 4. 다운로드 ---
    function downloadImage() {
      const dataURL = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = 'stealth_affirmation.png';
      link.href = dataURL;
      link.click();
      showToast('이미지가 저장되었습니다.');
    }

    // --- 5. 초기화 ---
    function clearData() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      emptyState.style.display = 'flex';
      canvas.style.display = 'none';
      btnClear.style.display = 'none';
      
      // 초기화 시 버튼 상태 복구
      btnEncode.style.display = 'inline-flex';
      btnEncode.disabled = true;
      btnDownload.style.display = 'none';
      btnDecode.disabled = true;
      
      document.getElementById('affirmationText').value = '';
      document.getElementById('decodeResult').innerHTML = '<span style="color: var(--text-muted);">이미지를 불러온 후 아래 버튼을 눌러 추출하세요.</span>';
      showToast('초기화 되었습니다.');
    }

    // --- 6. 토스트 알림 함수 ---
    let toastTimeout;
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.classList.add('show');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }
  </script>
</body>
</html>
