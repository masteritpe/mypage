<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Presenter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>
    /* === Modern Premium Light Theme Variables === */
    :root {
        --bg-app: #fbfbfd; 
        --bg-panel: rgba(255, 255, 255, 0.85); 
        --primary: #4338ca; 
        --danger: #ef4444;
        --text-main: #1c1c1e; 
        --text-muted: #8e8e93;
        --border-color: rgba(0, 0, 0, 0.06);
        --toolbar-h: 64px; 
        --sidebar-w: 320px;
        
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
        --shadow-md: 0 8px 16px rgba(0, 0, 0, 0.06);
        --shadow-page: 0 24px 48px -12px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(0,0,0,0.02);
    }

    * { box-sizing: border-box; outline: none; -webkit-font-smoothing: antialiased; }
    
    body {
        margin: 0; padding: 0; background-color: var(--bg-app);
        color: var(--text-main); font-family: 'Pretendard', sans-serif;
        height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        user-select: none; -webkit-user-select: none; /* UI 전역 텍스트 선택 방지 */
    }

    /* 텍스트 입력창은 항상 선택 가능하도록 예외 처리 */
    input, textarea, [contenteditable] { 
        user-select: text !important; 
        -webkit-user-select: text !important; 
    }

    /* === Header / Toolbar (Glassmorphism) === */
    header {
        height: var(--toolbar-h); background: var(--bg-panel); border-bottom: 1px solid var(--border-color);
        display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 100;
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        box-shadow: var(--shadow-sm); flex-shrink: 0; white-space: nowrap;
    }

    .brand { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; color: var(--text-main); letter-spacing: -0.5px; }
    .brand i { color: var(--primary); font-size: 20px; }
    .controls { display: flex; gap: 8px; align-items: center; }
    
    .btn-group { display: flex; background: rgba(0,0,0,0.03); border-radius: 10px; padding: 3px; gap: 2px; }
    .btn { height: 36px; padding: 0 12px; border: none; border-radius: 8px; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 600; font-family: inherit; }
    .btn:hover { background: rgba(0,0,0,0.05); color: var(--text-main); }
    .btn.active { background: #ffffff; color: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,0.08); }

    /* 🔥 자체 검색창 스타일 */
    .search-group { display: flex; align-items: center; background: #ffffff; border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden; height: 36px; padding: 0; box-shadow: var(--shadow-sm); transition: all 0.2s; }
    .search-group:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.1); }
    #doc-search-input { border: none; padding: 0 8px; width: 90px; font-family: inherit; font-size: 13.5px; outline: none; background: transparent; color: var(--text-main); }
    #doc-search-input::placeholder { color: var(--text-muted); font-weight: 500; }
    .search-nav-btns { display: flex; flex-direction: column; background: #fafafa; border-left: 1px solid var(--border-color); height: 100%; }
    .search-nav-btns button { height: 50%; width: 24px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all 0.2s; }
    .search-nav-btns button:hover { background: #e5e5e5; color: var(--text-main); }
    .search-nav-btns button:first-child { border-bottom: 1px solid var(--border-color); }

    .tool-dropdown-wrapper { position: relative; display: inline-flex; }
    .tool-dropdown-wrapper:hover .color-palette { display: flex; opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    .color-palette { position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%) translateY(-10px); background: #ffffff; border-radius: 16px; padding: 8px; box-shadow: var(--shadow-md); display: flex; gap: 6px; z-index: 200; border: 1px solid rgba(0,0,0,0.05); opacity: 0; visibility: hidden; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
    .color-palette::before { content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%) rotate(45deg); width: 10px; height: 10px; background: #ffffff; border-top: 1px solid rgba(0,0,0,0.05); border-left: 1px solid rgba(0,0,0,0.05); }
    
    .color-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; border: 2px solid transparent; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); position: relative; }
    .color-swatch:hover { transform: scale(1.15); box-shadow: 0 4px 8px rgba(0,0,0,0.12); }
    .color-swatch.active { border-color: var(--text-main); transform: scale(1.15); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }

    .file-input-wrapper { position: relative; overflow: hidden; display: flex; }
    .file-input-wrapper input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

    .page-info { background: #ffffff; padding: 0 12px; height: 36px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 13.5px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); }
    #page-num-input { width: 32px; text-align: right; border: none; background: transparent; font-size: 13.5px; font-weight: 800; color: var(--primary); font-family: inherit; padding: 0; border-radius: 4px; -moz-appearance: textfield; }
    #page-num-input::-webkit-outer-spin-button, #page-num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    #page-num-input:focus { background: #eff6ff; outline: none; }

    /* === Layout: Sidebar + Main Canvas === */
    .content-wrapper { display: flex; flex: 1; overflow: hidden; width: 100%; min-height: 0; }

    /* === Sidebar === */
    .sidebar { width: var(--sidebar-w); background: #ffffff; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 50; transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 2px 0 12px rgba(0,0,0,0.02); }
    .sidebar.hidden { margin-left: calc(-1 * var(--sidebar-w)); }
    
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-color); background: #fafafa; }
    .sidebar-search { width: 100%; padding: 12px 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; font-family: inherit; font-size: 14.5px; background: #ffffff; color: var(--text-main); transition: all 0.2s; }
    .sidebar-search:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(67, 56, 202, 0.1); }
    
    /* 열린 문서 목록 셀렉트박스 */
    #doc-selector { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); background: #ffffff; font-family: inherit; font-size: 13.5px; font-weight: 600; color: var(--text-main); margin-bottom: 12px; cursor: pointer; outline: none; transition: border-color 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #doc-selector:focus { border-color: var(--primary); }

    .sidebar-list { flex: 1; overflow-y: auto; padding: 20px; background: #fafafa; }
    
    .outline-item { padding: 16px; border: 1px solid transparent; border-radius: 12px; margin-bottom: 12px; cursor: pointer; background: #ffffff; transition: all 0.2s; box-shadow: var(--shadow-sm); }
    .outline-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .outline-item.active { border-color: var(--primary); box-shadow: 0 4px 12px rgba(67, 56, 202, 0.15); }
    
    .outline-header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .outline-page { font-size: 12px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
    .outline-delete-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 6px; font-size: 12px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .outline-delete-btn:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

    .outline-text { font-size: 14px; color: var(--text-main); line-height: 1.6; word-break: break-all; }
    .empty-outline { text-align: center; color: var(--text-muted); font-size: 14.5px; padding: 40px 0; line-height: 1.6; }

    .sidebar-editor { padding: 20px; border-top: 1px solid var(--border-color); background: #ffffff; }
    .sidebar-editor-title { font-size: 14px; font-weight: 800; margin-bottom: 12px; color: var(--text-main); display: flex; justify-content: space-between; align-items: center; }
    #outline-textarea { width: 100%; height: 120px; resize: none; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 14px; font-family: inherit; font-size: 14.5px; line-height: 1.5; color: var(--text-main); background: #fafafa; transition: all 0.2s; }
    #outline-textarea:focus { border-color: var(--primary); outline: none; background: #ffffff; box-shadow: 0 0 0 4px rgba(67, 56, 202, 0.1); }

    /* === Main Canvas Area === */
    main { flex: 1; position: relative; overflow: auto; padding: 16px; background-image: radial-gradient(#d1d5db 1px, transparent 1px); background-size: 32px 32px; text-align: center; transition: all 0.3s ease; }
    #empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 15vh; text-align: center; animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    #empty-state i { font-size: 80px; margin-bottom: 24px; color: #cbd5e1; drop-shadow: 0 10px 15px rgba(0,0,0,0.05); }
    #empty-state h2 { margin: 0; font-size: 28px; color: var(--text-main); font-weight: 800; letter-spacing: -0.5px; }
    #empty-state p { margin-top: 16px; color: var(--text-muted); font-size: 16px; line-height: 1.6; }

    #canvas-wrapper { position: relative; box-shadow: var(--shadow-page); border-radius: 12px; display: none; background: white; margin: 0 auto; overflow: hidden; width: fit-content; text-align: left; }
    canvas { display: block; transform: translateZ(0); }
    
    #pdf-render { background: white; position: relative; z-index: 0; }
    #draw-layer { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; z-index: 2; }
    #overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 10; }

    /* === PDF 텍스트 레이어 (드래그 선택용) === */
    .textLayer, .textLayer * { 
        user-select: text !important; 
        -webkit-user-select: text !important; 
    }
    .textLayer { 
        position: absolute; left: 0; top: 0; right: 0; bottom: 0; 
        overflow: hidden; line-height: 1.0; z-index: 1; 
    }
    .textLayer span { 
        color: transparent !important; 
        position: absolute; white-space: pre; 
        cursor: text; transform-origin: 0% 0%; 
    }
    .textLayer span::selection { 
        background: rgba(59, 130, 246, 0.4) !important; 
        color: transparent !important; 
    }

    #overlay-layer.drawing-mode .draggable-item { pointer-events: none !important; }

    /* === 오버레이 객체 === */
    .draggable-item { position: absolute; pointer-events: auto; cursor: grab; transform: translate(-50%, -50%); user-select: none; z-index: 20; }
    .draggable-item:active { cursor: grabbing; }

    .draggable-text { color: #0f172a; font-family: 'Pretendard', sans-serif; font-weight: 800; white-space: pre; text-shadow: 0px 2px 4px rgba(255,255,255,0.9), 0px -2px 4px rgba(255,255,255,0.9); }
    .draggable-keyword { color: #ef4444; font-family: 'Pretendard', sans-serif; font-weight: 800; white-space: pre; text-shadow: none; border: 3px solid #ef4444; padding: 4px 12px; border-radius: 8px; background: transparent; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.12); }
    .draggable-sticker { font-family: 'Pretendard', sans-serif; font-weight: 800; color: #ffffff; white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.12); letter-spacing: 0.3px; }
    .draggable-sticker.important { background: #e11d48; } 
    .draggable-sticker.memorize { background: #4338ca; } 

    .canvas-text-input { position: absolute; pointer-events: auto; z-index: 1000; background: rgba(255, 255, 255, 0.98); border: 2px solid var(--primary); color: var(--text-main); font-family: 'Pretendard', sans-serif; font-weight: 800; border-radius: 8px; box-shadow: var(--shadow-md); transform: translate(-50%, -50%); min-width: 160px; text-align: center; padding: 6px 12px; }
    .canvas-text-input:focus { outline: none; box-shadow: 0 0 0 4px rgba(67, 56, 202, 0.15); }
    .canvas-keyword-input { position: absolute; pointer-events: auto; z-index: 1000; background: transparent; border: 3px solid #ef4444; color: #ef4444; font-family: 'Pretendard', sans-serif; font-weight: 800; border-radius: 8px; box-shadow: var(--shadow-md); transform: translate(-50%, -50%); min-width: 160px; text-align: center; padding: 4px 12px; }
    .canvas-keyword-input:focus { outline: none; box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15); }

    /* === Toast Notification === */
    #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(28, 28, 30, 0.95); color: white; padding: 14px 32px; border-radius: 30px; opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; font-weight: 700; z-index: 999; font-size: 15px; backdrop-filter: blur(8px); box-shadow: 0 12px 24px rgba(0,0,0,0.15); }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 🔥 === 몰입 모드 (Immersion Mode : Ctrl+M) === */
    body.immersion-mode header { display: none !important; }
    body.immersion-mode .sidebar { display: none !important; }
    body.immersion-mode main { padding: 20px; background-image: none; background-color: #0f172a; }

    /* 🔥 === 브라우저 기본 전체화면 (Ctrl+H) === */
    /* 헤더(툴바, 검색)는 유지하고, 왼쪽 사이드바만 숨겨 넓은 캔버스 확보. 원래 배경 유지! */
    :fullscreen .sidebar { display: none !important; }
    :-webkit-full-screen .sidebar { display: none !important; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
    <div class="brand">
        <button class="btn" style="padding: 0 4px; background: transparent; box-shadow: none;" onclick="app.toggleSidebar()" title="사이드바 열기/닫기">
            <i class="fas fa-bars" style="color: var(--text-main); font-size: 16px;"></i>
        </button>
        <i class="fas fa-layer-group"></i> Presenter
    </div>
    
    <div class="controls">
        <div class="search-group">
            <i class="fas fa-search" style="color: var(--text-muted); margin-left: 8px; font-size: 13px;"></i>
            <input type="text" id="doc-search-input" placeholder="통합 검색..." title="모든 열린 문서에서 텍스트 찾기 (Enter)" spellcheck="false" autocomplete="off" />
            <span id="doc-search-result" style="font-size: 12px; color: var(--text-muted); display: none; margin-right: 6px; font-weight: 700;">0/0</span>
            <div class="search-nav-btns">
                <button onclick="app.prevSearchResult()" title="이전 결과"><i class="fas fa-chevron-up"></i></button>
                <button onclick="app.nextSearchResult()" title="다음 결과"><i class="fas fa-chevron-down"></i></button>
            </div>
        </div>

        <div class="page-info">
            <input type="number" id="page-num-input" value="0" min="1" title="이동할 페이지 입력 후 Enter" />
            <span style="color:var(--text-muted); margin: 0 4px;">/</span> 
            <span id="page-count">0</span>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="app.zoomOut()" title="축소 (Ctrl -)"><i class="fas fa-minus"></i></button>
            <button class="btn" onclick="app.zoomIn()" title="확대 (Ctrl +)"><i class="fas fa-plus"></i></button>
            <button class="btn" onclick="app.toggleImmersionMode()" title="몰입 모드 (Ctrl+M)"><i class="fas fa-tv"></i></button>
            <button class="btn" onclick="app.toggleFullScreen()" title="전체화면 (Ctrl+H)"><i class="fas fa-expand"></i></button>
        </div>

        <div class="btn-group">
            <button class="btn active" id="tool-cursor" onclick="app.setTool('cursor')" title="선택/이동 (단축키 V 또는 ESC)"><i class="fas fa-mouse-pointer"></i></button>
            <button class="btn" id="tool-pen" onclick="app.setTool('pen')" title="펜 (단축키 1)"><i class="fas fa-pen"></i></button>
            <div class="tool-dropdown-wrapper">
                <button class="btn" id="tool-hi" onclick="app.setTool('highlight')" title="형광펜 (단축키 2 | 마우스 호버로 색상 변경)">
                    <i class="fas fa-highlighter"></i><i class="fas fa-chevron-down" style="font-size: 8px; margin-left: 2px; opacity: 0.5;"></i>
                </button>
                <div class="color-palette">
                    <div class="color-swatch" data-color="rgba(253, 186, 116, 0.6)" style="background: rgb(253, 186, 116);" onclick="app.setHighlightColor('rgba(253, 186, 116, 0.6)', '연한 주황색')" title="연한 주황색 (Ctrl+1)"></div>
                    <div class="color-swatch" data-color="rgba(147, 197, 253, 0.6)" style="background: rgb(147, 197, 253);" onclick="app.setHighlightColor('rgba(147, 197, 253, 0.6)', '연한 파란색')" title="연한 파란색 (Ctrl+2)"></div>
                    <div class="color-swatch active" data-color="rgba(253, 224, 71, 0.6)" style="background: rgb(253, 224, 71);" onclick="app.setHighlightColor('rgba(253, 224, 71, 0.6)', '연한 노란색')" title="연한 노란색 (Ctrl+3)"></div>
                    <div class="color-swatch" data-color="rgba(134, 239, 172, 0.6)" style="background: rgb(134, 239, 172);" onclick="app.setHighlightColor('rgba(134, 239, 172, 0.6)', '연한 녹색')" title="연한 녹색 (Ctrl+4)"></div>
                    <div class="color-swatch" data-color="rgba(249, 168, 212, 0.6)" style="background: rgb(249, 168, 212);" onclick="app.setHighlightColor('rgba(249, 168, 212, 0.6)', '연한 분홍색')" title="연한 분홍색 (Ctrl+5)"></div>
                    <div class="color-swatch" data-color="rgba(214, 163, 108, 0.6)" style="background: rgb(214, 163, 108);" onclick="app.setHighlightColor('rgba(214, 163, 108, 0.6)', '연한 갈색')" title="연한 갈색 (Ctrl+6)"></div>
                    <div class="color-swatch" data-color="rgba(203, 213, 225, 0.6)" style="background: rgb(203, 213, 225);" onclick="app.setHighlightColor('rgba(203, 213, 225, 0.6)', '연한 회색')" title="연한 회색 (Ctrl+7)"></div>
                </div>
            </div>
            <button class="btn" id="tool-eraser" onclick="app.setTool('eraser')" title="부분 지우개 (단축키 3)"><i class="fas fa-eraser"></i></button>
            <button class="btn" id="tool-laser" onclick="app.setTool('laser')" title="레이저 포인터 (단축키 9)"><i class="fas fa-bullseye" style="color: #ef4444;"></i></button>
        </div>

        <div class="btn-group">
            <button class="btn" id="tool-text" onclick="app.setTool('text')" title="텍스트 이동 및 삽입 (단축키 4)"><i class="fas fa-font"></i></button>
            <button class="btn" id="tool-keyword" onclick="app.setTool('keyword')" title="강조 키워드 (단축키 0)"><i class="fas fa-key" style="color:#ef4444;"></i></button>
            <button class="btn" id="tool-important" onclick="app.setTool('sticker-important')" ondblclick="app.applyLastSticker('sticker-important')" title="'중요!' 뱃지 (단축키 5 | 더블클릭: 이전 위치 바로적용)"><i class="fas fa-star" style="color:#e11d48;"></i></button>
            <button class="btn" id="tool-memorize" onclick="app.setTool('sticker-memorize')" ondblclick="app.applyLastSticker('sticker-memorize')" title="'암기!!' 뱃지 (단축키 6 | 더블클릭: 이전 위치 바로적용)"><i class="fas fa-bookmark" style="color:#4338ca;"></i></button>
        </div>

        <div class="btn-group">
            <button class="btn" onclick="app.clearPage()" title="현재 페이지 전체 지우기 (단축키 8)"><i class="fas fa-trash" style="color:var(--danger);"></i></button>
        </div>

        <div class="btn-group">
            <button class="btn" onclick="app.downloadPDF()" title="현재 열린 문서 필기 포함 저장"><i class="fas fa-download"></i></button>
            <div class="file-input-wrapper">
                <button class="btn" title="PDF 문서 열기 (여러 개 선택 가능)"><i class="fas fa-folder-open"></i></button>
                <input type="file" id="file-upload" accept="application/pdf" multiple />
            </div>
        </div>
    </div>
</header>

<div class="content-wrapper">
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header" style="padding-bottom: 12px;">
            <div style="font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase;">열린 문서 목록</div>
            <select id="doc-selector" onchange="app.switchDoc(this.value)">
                <option value="">문서를 먼저 열어주세요</option>
            </select>
        </div>
        <div class="sidebar-header" style="border-top: 1px solid var(--border-color); padding-top: 12px;">
            <input type="text" id="search-input" class="sidebar-search" placeholder="현재 페이지 개요 검색..." oninput="app.searchOutline(this.value)" spellcheck="false" autocomplete="off" />
        </div>
        <div id="outline-list" class="sidebar-list">
            <div class="empty-outline">개요를 작성해보세요.</div>
        </div>
        <div class="sidebar-editor">
            <div class="sidebar-editor-title">
                <span>페이지 개요 메모 <span style="font-size: 11px; font-weight: 500; color: var(--text-muted); margin-left: 4px;">(단축키 7)</span></span>
                <span style="color:var(--primary); background: #eff6ff; padding: 2px 8px; border-radius: 10px;">Page <span id="editor-page-num">0</span></span>
            </div>
            <textarea id="outline-textarea" placeholder="이 페이지의 핵심 내용을 요약해두세요..." oninput="app.saveOutline(this.value)"></textarea>
        </div>
    </aside>

    <main>
        <div id="empty-state">
            <i class="far fa-file-pdf"></i>
            <h2>프리젠테이션할 PDF를 여러 개 열어보세요</h2>
            <p>우측 상단의 폴더(<i class="fas fa-folder-open" style="font-size:14px;"></i>) 아이콘을 클릭하여 파일들을 선택하세요.</p>
        </div>
        <div id="canvas-wrapper">
            <canvas id="pdf-render"></canvas>
            <div id="text-layer" class="textLayer"></div>
            <canvas id="draw-layer"></canvas>
            <div id="overlay-layer" class="drawing-mode"></div>
            <div id="laser-dot" style="display:none; position:absolute; width:12px; height:12px; background:#ef4444; border-radius:50%; box-shadow:0 0 12px 4px rgba(239, 68, 68, 0.5); pointer-events:none; z-index:9999; transform:translate(-50%, -50%);"></div>
        </div>
    </main>
</div>

<div id="toast">Message</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const app = {
    db: null, 
    fileId: null, 
    pdfDoc: null, pageNum: 1, pageRendering: false, pageNumPending: null, scale: 1.5,
    
    loadedDocs: {}, 
    
    canvas: document.getElementById('pdf-render'),
    ctx: document.getElementById('pdf-render').getContext('2d'),
    drawCanvas: document.getElementById('draw-layer'),
    drawCtx: document.getElementById('draw-layer').getContext('2d'),
    
    isDrawing: false, currentTool: 'cursor', lastPos: { x: 0, y: 0 },
    currentHighlightColor: 'rgba(253, 224, 71, 0.6)', currentTextInput: null,

    outlines: {}, currentSearchQuery: '',
    lastStickerPos: { 'sticker-important': null, 'sticker-memorize': null },
    currentPageLinks: [],

    docSearchTexts: {}, 
    docSearchResults: [], 
    docSearchIndex: -1,

    getOutputScale() {
        const dpr = window.devicePixelRatio || 1;
        return dpr * 2; 
    },

    async initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('PDFPresenterProDB', 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('docs')) db.createObjectStore('docs', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('pages')) db.createObjectStore('pages', { keyPath: 'id' });
            };
            request.onsuccess = (e) => { this.db = e.target.result; resolve(); };
            request.onerror = (e) => reject(e.target.error);
        });
    },

    async init() {
        await this.initDB();
        document.getElementById('file-upload').addEventListener('change', (e) => this.loadPDFs(e));
        
        // 브라우저 기본 단축키 동작을 막기 위해 passive: false 추가
        window.addEventListener('keydown', (e) => this.handleKey(e), { passive: false });
        
        // 🔥 브라우저 기본 줌(Ctrl + 마우스 휠) 방지 및 PDF 캔버스 자체 줌으로 연결
        window.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                if (e.deltaY < 0) this.zoomIn();
                else this.zoomOut();
            }
        }, { passive: false });

        // 🔥 ESC 기능 등 네이티브 전체화면 해제 감지하여 UI와 동기화
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && document.body.classList.contains('immersion-mode')) {
                document.body.classList.remove('immersion-mode');
                app.showToast("몰입 모드 OFF");
            }
        });

        const pageInput = document.getElementById('page-num-input');
        pageInput.addEventListener('change', (e) => this.goToPage(e.target.value));
        pageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); this.goToPage(e.target.value); pageInput.blur(); } });

        this.drawCanvas.addEventListener('mousedown', (e) => this.startDraw(e));
        this.drawCanvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
        this.drawCanvas.addEventListener('mouseup', () => this.stopDraw());
        this.drawCanvas.addEventListener('mouseout', () => this.stopDraw());
        
        document.getElementById('canvas-wrapper').addEventListener('dblclick', (e) => this.handleDoubleClick(e));
        
        document.querySelector('main').addEventListener('mousedown', (e) => {
            if (e.target.id === 'draw-layer') return; 
            if (this.currentTextInput && e.target !== this.currentTextInput) this.commitText();
        });

        document.getElementById('doc-search-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (app.docSearchResults.length > 0 && e.target.dataset.lastQuery === e.target.value) {
                    app.nextSearchResult();
                } else {
                    e.target.dataset.lastQuery = e.target.value;
                    app.executeDocSearch();
                }
            }
        });

        this.setTool('cursor'); 
        this.renderOutlineList();
    },

    async loadDocData() {
        return new Promise((resolve) => {
            if (!this.db || !this.fileId) return resolve();
            const req = this.db.transaction('docs', 'readonly').objectStore('docs').get(this.fileId);
            req.onsuccess = (e) => {
                const data = e.target.result;
                if (data) {
                    this.outlines = data.outlines || {};
                    this.lastStickerPos = data.lastStickerPos || { 'sticker-important': null, 'sticker-memorize': null };
                } else {
                    this.outlines = {};
                    this.lastStickerPos = { 'sticker-important': null, 'sticker-memorize': null };
                }
                resolve();
            };
            req.onerror = () => resolve();
        });
    },

    saveDocData() {
        if (!this.db || !this.fileId) return;
        const tx = this.db.transaction('docs', 'readwrite');
        tx.objectStore('docs').put({ id: this.fileId, outlines: this.outlines, lastStickerPos: this.lastStickerPos });
    },

    savePageData(pageNum) {
        if (!this.db || !this.fileId) return;
        const drawData = this.drawCanvas.toDataURL('image/png');
        const overlays = Array.from(document.querySelectorAll(`.draggable-item[data-page="${pageNum}"]`)).map(el => {
            let type = 'text';
            if (el.classList.contains('important')) type = 'sticker-important';
            else if (el.classList.contains('memorize')) type = 'sticker-memorize';
            else if (el.classList.contains('draggable-keyword')) type = 'keyword';
            return {
                type, text: el.innerText, baseX: el.dataset.baseX, baseY: el.dataset.baseY, baseSize: el.dataset.baseSize,
                style: { fontWeight: el.style.fontWeight, fontStyle: el.style.fontStyle, textDecoration: el.style.textDecoration, color: el.style.color, backgroundColor: el.style.backgroundColor }
            };
        });
        const tx = this.db.transaction('pages', 'readwrite');
        tx.objectStore('pages').put({ id: `${this.fileId}_${pageNum}`, docId: this.fileId, page: pageNum, drawData, overlays });
    },

    async loadPDFs(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        e.target.blur(); 
        
        this.showToast(`${files.length}개의 PDF를 로딩 중...`);

        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('canvas-wrapper').style.display = 'block';

        let firstNewFileId = null;

        for (const file of files) {
            const fId = file.name + '_' + file.size;
            if (this.loadedDocs[fId]) continue;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const typedarray = new Uint8Array(arrayBuffer);
                const doc = await pdfjsLib.getDocument(typedarray).promise;
                
                this.loadedDocs[fId] = { doc: doc, name: file.name, numPages: doc.numPages };
                this.docSearchTexts[fId] = [];
                
                if (!firstNewFileId) firstNewFileId = fId;

                this.extractTextForDocInBackground(fId, doc);
                
            } catch (err) { console.warn('로드 실패: ' + file.name, err); }
        }

        this.updateDocSelector();

        if (firstNewFileId) {
            await this.switchDoc(firstNewFileId);
            this.showToast(`로딩 및 스캔 완료!`);
        } else {
            this.showToast(`이미 열려있는 문서들입니다.`);
        }
        
        this.docSearchResults = [];
        this.docSearchIndex = -1;
        document.getElementById('doc-search-input').value = '';
        document.getElementById('doc-search-result').style.display = 'none';
    },

    updateDocSelector() {
        const selector = document.getElementById('doc-selector');
        selector.innerHTML = '';
        
        for (const [id, data] of Object.entries(this.loadedDocs)) {
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = data.name;
            selector.appendChild(opt);
        }
        if(this.fileId) selector.value = this.fileId;
    },

    async switchDoc(targetFileId, pageNumToMove = 1) {
        if (!this.loadedDocs[targetFileId]) return;
        
        this.commitText();
        this.fileId = targetFileId;
        this.pdfDoc = this.loadedDocs[targetFileId].doc;
        
        document.getElementById('doc-selector').value = targetFileId;
        document.getElementById('page-count').textContent = this.pdfDoc.numPages;
        
        await this.loadDocData();
        
        this.pageNum = pageNumToMove;
        this.renderPage(this.pageNum);
    },

    async extractTextForDocInBackground(fId, doc) {
        for (let i = 1; i <= doc.numPages; i++) {
            try {
                const page = await doc.getPage(i);
                const textContent = await page.getTextContent();
                const text = textContent.items.map(s => s.str).join(' ');
                this.docSearchTexts[fId][i] = text.toLowerCase();
            } catch(e) { }
        }
    },

    executeDocSearch() {
        const inputStr = document.getElementById('doc-search-input').value.trim();
        const query = inputStr.toLowerCase();
        const resLabel = document.getElementById('doc-search-result');

        if (!query) {
            this.docSearchResults = [];
            this.docSearchIndex = -1;
            resLabel.style.display = 'none';
            return;
        }

        this.docSearchResults = [];
        
        for (const [fId, pageTexts] of Object.entries(this.docSearchTexts)) {
            for (let i = 1; i < pageTexts.length; i++) {
                if (pageTexts[i] && pageTexts[i].includes(query)) {
                    this.docSearchResults.push({ fileId: fId, pageNum: i });
                }
            }
        }

        resLabel.style.display = 'inline-block';
        if (this.docSearchResults.length > 0) {
            this.docSearchIndex = 0;
            this.updateSearchLabel();
            this.jumpToSearchResult(this.docSearchIndex); 
            
            setTimeout(() => { this.showToast(`전체 열린 문서에서 총 ${this.docSearchResults.length}곳 발견! 화면 안에서 찾으려면 Ctrl+F`); }, 1000);
        } else {
            resLabel.textContent = '0/0';
            this.showToast('어느 문서에도 해당 검색어가 없습니다.');
        }
    },

    updateSearchLabel() {
        document.getElementById('doc-search-result').textContent = `${this.docSearchIndex + 1}/${this.docSearchResults.length}`;
    },

    async jumpToSearchResult(index) {
        const res = this.docSearchResults[index];
        if (!res) return;

        if (this.fileId !== res.fileId) {
            await this.switchDoc(res.fileId, res.pageNum);
            this.showToast(`[${this.loadedDocs[res.fileId].name}] 문서로 자동 이동됨`);
        } else {
            this.goToPage(res.pageNum);
        }
    },

    nextSearchResult() {
        if (this.docSearchResults.length === 0) return this.executeDocSearch();
        this.docSearchIndex = (this.docSearchIndex + 1) % this.docSearchResults.length;
        this.updateSearchLabel();
        this.jumpToSearchResult(this.docSearchIndex);
    },

    prevSearchResult() {
        if (this.docSearchResults.length === 0) return this.executeDocSearch();
        this.docSearchIndex = (this.docSearchIndex - 1 + this.docSearchResults.length) % this.docSearchResults.length;
        this.updateSearchLabel();
        this.jumpToSearchResult(this.docSearchIndex);
    },

    async renderPage(num) {
        this.commitText();
        this.pageRendering = true;
        document.querySelector('main').scrollTop = 0;

        const page = await this.pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale: this.scale });
        const outputScale = this.getOutputScale();

        this.canvas.width = Math.floor(viewport.width * outputScale);
        this.canvas.height = Math.floor(viewport.height * outputScale);
        this.drawCanvas.width = Math.floor(viewport.width * outputScale);
        this.drawCanvas.height = Math.floor(viewport.height * outputScale);

        const cssWidth = Math.floor(viewport.width) + 'px';
        const cssHeight = Math.floor(viewport.height) + 'px';
        
        this.canvas.style.width = cssWidth; this.canvas.style.height = cssHeight;
        this.drawCanvas.style.width = cssWidth; this.drawCanvas.style.height = cssHeight;

        await page.render({ canvasContext: this.ctx, transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null, viewport: viewport }).promise;

        const textLayerDiv = document.getElementById('text-layer');
        textLayerDiv.innerHTML = ''; textLayerDiv.style.width = cssWidth; textLayerDiv.style.height = cssHeight;
        textLayerDiv.style.setProperty('--scale-factor', viewport.scale);

        try {
            const textContent = await page.getTextContent();
            await pdfjsLib.renderTextLayer({ textContentSource: textContent, container: textLayerDiv, viewport: viewport, textDivs: [] }).promise;
        } catch(e) { console.warn("텍스트 레이어 렌더링 실패:", e); }
        
        this.currentPageLinks = [];
        try {
            const annotations = await page.getAnnotations();
            annotations.forEach(anno => {
                if (anno.subtype === 'Link' && anno.url) {
                    const rect = viewport.convertToViewportRectangle(anno.rect);
                    this.currentPageLinks.push({ url: anno.url, rect: { x1: Math.min(rect[0], rect[2]), y1: Math.min(rect[1], rect[3]), x2: Math.max(rect[0], rect[2]), y2: Math.max(rect[1], rect[3]) } });
                }
            });
        } catch(e) {}
        
        await this.restoreDrawing(num); 
        this.pageRendering = false;
        
        document.getElementById('page-num-input').value = num;
        document.getElementById('editor-page-num').textContent = num;
        document.getElementById('outline-textarea').value = this.outlines[num] || '';
        this.renderOutlineList(); 
        
        if (this.pageNumPending !== null) { this.renderPage(this.pageNumPending); this.pageNumPending = null; }
    },

    queueRenderPage(num) { this.pageRendering ? this.pageNumPending = num : this.renderPage(num); },
    prevPage() { if (this.pageNum > 1) { this.pageNum--; this.queueRenderPage(this.pageNum); } },
    nextPage() { if (this.pdfDoc && this.pageNum < this.pdfDoc.numPages) { this.pageNum++; this.queueRenderPage(this.pageNum); } },

    goToPage(num) {
        if (!this.pdfDoc) return;
        let targetPage = parseInt(num);
        if (isNaN(targetPage) || targetPage < 1) targetPage = 1;
        if (targetPage > this.pdfDoc.numPages) targetPage = this.pdfDoc.numPages;
        if (targetPage !== this.pageNum) { this.pageNum = targetPage; this.queueRenderPage(this.pageNum); }
    },

    zoomIn() { if(this.pdfDoc) { this.scale = parseFloat((this.scale + 0.05).toFixed(2)); this.renderPage(this.pageNum); this.showToast(`Zoom: ${Math.round(this.scale*100)}%`); } },
    zoomOut() { if(this.pdfDoc && this.scale > 0.1) { this.scale = parseFloat((this.scale - 0.05).toFixed(2)); this.renderPage(this.pageNum); this.showToast(`Zoom: ${Math.round(this.scale*100)}%`); } },
    toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else if (document.exitFullscreen) document.exitFullscreen(); },
    toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); },

    // 🔥 몰입 모드 토글 (화면 제어 + 네이티브 전체화면 연동)
    toggleImmersionMode() {
        const isActive = document.body.classList.toggle('immersion-mode');
        if (isActive) {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        } else {
            if (document.fullscreenElement) document.exitFullscreen();
        }
        this.showToast(isActive ? "몰입 모드 ON (해제: Ctrl+M 또는 ESC)" : "몰입 모드 OFF");
    },

    saveOutline(text) {
        if (!this.pdfDoc) return;
        if (text.trim() === '') delete this.outlines[this.pageNum];
        else this.outlines[this.pageNum] = text;
        this.renderOutlineList(); this.saveDocData();
    },

    deleteOutline(pageNum, e) {
        e.stopPropagation(); 
        if(confirm(`Page ${pageNum}의 개요를 삭제하시겠습니까?`)) {
            delete this.outlines[pageNum];
            if(this.pageNum === parseInt(pageNum)) document.getElementById('outline-textarea').value = '';
            this.renderOutlineList(); this.saveDocData();
            this.showToast(`Page ${pageNum} 개요가 삭제되었습니다.`);
        }
    },

    searchOutline(query) { this.currentSearchQuery = query.toLowerCase(); this.renderOutlineList(); },

    renderOutlineList() {
        const listEl = document.getElementById('outline-list');
        listEl.innerHTML = '';
        if (!this.pdfDoc) { listEl.innerHTML = '<div class="empty-outline">문서를 열어 개요를 작성해보세요.</div>'; return; }

        const keys = Object.keys(this.outlines).map(Number).sort((a,b) => a-b);
        let hasItems = false;
        
        keys.forEach(page => {
            const text = this.outlines[page];
            if (this.currentSearchQuery && !text.toLowerCase().includes(this.currentSearchQuery)) return;
            hasItems = true;
            const item = document.createElement('div');
            item.className = `outline-item ${page === this.pageNum ? 'active' : ''}`;
            let displayText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            if (this.currentSearchQuery) {
                const regex = new RegExp(`(${this.currentSearchQuery})`, 'gi');
                displayText = displayText.replace(regex, '<mark style="background:#fef08a; padding:0 2px; border-radius:2px;">$1</mark>');
            }
            item.innerHTML = `<div class="outline-header-wrap"><div class="outline-page">Page ${page}</div><button class="outline-delete-btn" onclick="app.deleteOutline(${page}, event)"><i class="fas fa-trash"></i></button></div><div class="outline-text">${displayText}</div>`;
            item.onclick = () => this.goToPage(page);
            listEl.appendChild(item);
        });
        
        if (!hasItems) listEl.innerHTML = this.currentSearchQuery ? '<div class="empty-outline">검색 결과가 없습니다.</div>' : '<div class="empty-outline">작성된 개요가 없습니다.<br>아래에서 개요를 작성해보세요.</div>';
    },

    setTool(tool) {
        this.commitText(); this.currentTool = tool;
        document.querySelectorAll('.controls .btn-group .btn').forEach(b => { if(b.id) b.classList.remove('active'); });
        
        if(tool === 'cursor') document.getElementById('tool-cursor').classList.add('active');
        if(tool === 'pen') document.getElementById('tool-pen').classList.add('active');
        if(tool === 'highlight') document.getElementById('tool-hi').classList.add('active');
        if(tool === 'eraser') document.getElementById('tool-eraser').classList.add('active');
        if(tool === 'text') document.getElementById('tool-text').classList.add('active');
        if(tool === 'keyword') document.getElementById('tool-keyword').classList.add('active');
        if(tool === 'laser') document.getElementById('tool-laser').classList.add('active');
        if(tool === 'sticker-important') document.getElementById('tool-important').classList.add('active');
        if(tool === 'sticker-memorize') document.getElementById('tool-memorize').classList.add('active');
        
        const laserDot = document.getElementById('laser-dot');
        const overlayLayer = document.getElementById('overlay-layer');
        const textLayer = document.getElementById('text-layer');

        if (['pen', 'highlight', 'eraser'].includes(tool)) { overlayLayer.classList.add('drawing-mode'); this.drawCanvas.style.cursor = 'crosshair'; this.drawCanvas.style.pointerEvents = 'auto'; textLayer.style.pointerEvents = 'none'; laserDot.style.display = 'none'; } 
        else if (tool === 'text' || tool === 'keyword') { overlayLayer.classList.remove('drawing-mode'); this.drawCanvas.style.cursor = 'text'; this.drawCanvas.style.pointerEvents = 'auto'; textLayer.style.pointerEvents = 'none'; laserDot.style.display = 'none'; } 
        else if (tool === 'laser') { overlayLayer.classList.remove('drawing-mode'); this.drawCanvas.style.cursor = 'none'; this.drawCanvas.style.pointerEvents = 'auto'; textLayer.style.pointerEvents = 'none'; laserDot.style.display = 'block'; } 
        else { overlayLayer.classList.remove('drawing-mode'); this.drawCanvas.style.cursor = 'default'; this.drawCanvas.style.pointerEvents = 'none'; textLayer.style.pointerEvents = 'auto'; laserDot.style.display = 'none'; }

        const msgs = { 'cursor': "선택/이동 (상단 검색창 지원)", 'pen': "부드러운 펜", 'highlight': "형광펜", 'eraser': "부분 지우개", 'text': "텍스트 입력/이동 모드", 'keyword': "강조 키워드 입력 모드", 'laser': "레이저 포인터 모드", 'sticker-important': "클릭하여 '중요!' 뱃지 부착", 'sticker-memorize': "클릭하여 '암기!!' 뱃지 부착" };
        if(msgs[tool]) this.showToast(`${msgs[tool]} 모드`);
    },

    setHighlightColor(colorHex, colorName) {
        this.currentHighlightColor = colorHex; this.setTool('highlight');
        document.querySelectorAll('.color-swatch').forEach(swatch => { if (swatch.dataset.color === colorHex) swatch.classList.add('active'); else swatch.classList.remove('active'); });
        if(colorName) this.showToast(`형광펜: ${colorName}`);
    },

    getMousePos(e) { const rect = this.canvas.getBoundingClientRect(); return { x: e.clientX - rect.left, y: e.clientY - rect.top }; },

    handleDoubleClick(e) {
        if (this.currentTool !== 'cursor') return;
        const pos = this.getMousePos(e);
        for (const link of this.currentPageLinks) {

        if (e.key === '4') { e.preventDefault(); this.setTool('text'); }
        if (e.key === '0' && !e.ctrlKey && !e.altKey && !e.shiftKey) { e.preventDefault(); this.setTool('keyword'); }
        if (e.code === 'Digit5') { e.preventDefault(); if (e.shiftKey) this.applyLastSticker('sticker-important'); else this.setTool('sticker-important'); }
        if (e.code === 'Digit6') { e.preventDefault(); if (e.shiftKey) this.applyLastSticker('sticker-memorize'); else this.setTool('sticker-memorize'); }
        
        if (e.code === 'Digit7' || e.key === '7') {
            e.preventDefault(); const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('hidden')) this.toggleSidebar();
            setTimeout(() => document.getElementById('outline-textarea').focus(), 50);
        }
        if (e.code === 'Digit8' || e.key === '8') { e.preventDefault(); this.clearPage(); }
        if (e.code === 'Digit9' || e.key === '9') { e.preventDefault(); this.setTool('laser'); }
    },
    
    showToast(msg) {
        const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
        if(this.toastTimer) clearTimeout(this.toastTimer); this.toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
    }
};

window.onload = () => app.init();
</script>
</body>
