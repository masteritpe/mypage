<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bookmark Keeper</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    /* === 1. Design System === */
    :root {
      --bg-app: #f0f2f5;
      --bg-panel: #ffffff;
      --bg-input: #f8fafc;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --border: #e2e8f0;
      --primary: #0f172a;
      --primary-hover: #334155;
      --accent: #3b82f6;
      --danger: #ef4444;
      --success: #10b981;
      --font-ui: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
    }

    * { box-sizing: border-box; outline: none; }
    
    body {
      margin: 0; background: var(--bg-app); color: var(--text-main);
      font-family: var(--font-ui); font-size: 15px; line-height: 1.6;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* === 2. Header === */
    header {
      background: var(--bg-panel); height: 64px; padding: 0 30px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); z-index: 50; flex-shrink: 0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    
    .logo { 
        font-size: 20px; font-weight: 700; color: var(--primary); 
        display: flex; align-items: center; gap: 12px; margin: 0; letter-spacing: -0.5px;
    }

    .toolbar { display: flex; gap: 10px; }
    
    .btn {
      height: 40px; padding: 0 18px; border-radius: 8px; border: 1px solid var(--border);
      background: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-ui); font-weight: 600; font-size: 14px; 
      color: var(--text-main); transition: all 0.2s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .btn:hover { background: #f8fafc; border-color: #cbd5e1; transform: translateY(-1px); }
    
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); color: #fff; }
    .btn-danger { color: #dc2626; border-color: #fecaca; background: #fff; }
    .btn-danger:hover { background: #fef2f2; border-color: #f87171; }

    /* === 3. Main Layout === */
    main { flex: 1; display: flex; height: calc(100vh - 64px); overflow: hidden; }

    /* Sidebar */
    #sidebar {
      width: 340px; background: var(--bg-panel); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    
    .sidebar-header { 
        padding: 20px; border-bottom: 1px solid var(--border); 
        display: flex; flex-direction: column; gap: 12px; background: #fff; 
    }
    .search-row { display: flex; gap: 10px; width: 100%; }
    
    .search-input { 
        flex: 1; padding: 0 14px; height: 40px; border: 1px solid var(--border); border-radius: 8px; 
        font-size: 14px; background: var(--bg-input); color: var(--text-main); font-family: var(--font-ui);
    }
    .search-input:focus { border-color: var(--accent); background: #fff; }
    
    .filter-select {
        width: 100%; height: 38px; padding: 0 14px;
        border: 1px solid var(--border); border-radius: 8px;
        font-size: 13px; background-color: var(--bg-input); color: var(--text-main);
        font-family: var(--font-ui); font-weight: 600; cursor: pointer;
        appearance: none; 
        background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2364748b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        background-repeat: no-repeat; background-position: right 14px top 50%; background-size: 10px auto;
        transition: 0.2s;
    }
    .filter-select:focus { border-color: var(--accent); background-color: #fff; }

    .btn-icon-sq {
        width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border);
        background: #fff; color: var(--text-sub); cursor: pointer;
        display: flex; justify-content: center; align-items: center; transition: 0.2s; flex-shrink: 0;
    }
    .btn-icon-sq:hover { border-color: var(--accent); color: var(--accent); }

    .list-scroll { flex: 1; overflow-y: auto; }
    
    .list-item {
      padding: 16px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer;
      display: flex; flex-direction: column; gap: 6px; transition: 0.2s; border-left: 3px solid transparent;
    }
    .list-item:hover { background: #f8fafc; }
    .list-item.active { background: #eff6ff; border-left-color: var(--accent); }
    
    .item-title { font-weight: 700; font-size: 15px; color: var(--text-main); display: flex; align-items: center; gap: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sub { font-size: 13px; color: var(--text-sub); display: flex; align-items: center; gap: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .category-tag { background: #e2e8f0; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #475569; }

    /* Editor Area */
    #editor-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-app); position: relative; }
    .editor-scroller { flex: 1; overflow-y: auto; padding: 40px; display: flex; justify-content: center; align-items: flex-start; }
    
    .paper {
        width: 100%; max-width: 760px; background: #fff; padding: 50px; border-radius: 16px; 
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        border: 1px solid var(--border); display: flex; flex-direction: column; gap: 28px;
        margin-bottom: 40px; 
    }

    .paper-header { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 20px; border-bottom: 2px solid #f1f5f9; margin-bottom: 10px; }
    .paper-title { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; margin: 0; }
    .paper-date { font-size: 12px; color: #94a3b8; font-weight: 500; }

    /* Forms */
    .form-group { display: flex; flex-direction: column; gap: 8px; position: relative; }
    .form-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-left: 2px; }
    
    .form-input {
        width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: 10px;
        font-size: 15px; color: var(--text-main); background: var(--bg-input); font-family: var(--font-ui); transition: 0.2s;
    }
    .form-input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    .form-input-lg { font-size: 18px; font-weight: 700; background: #fff; border-color: #cbd5e1; }

    .action-wrapper { position: relative; width: 100%; }
    .action-wrapper input { padding-right: 90px; }
    .pw-actions { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); display: flex; gap: 4px; }
    .btn-icon { width: 34px; height: 34px; border: none; background: transparent; border-radius: 6px; color: var(--text-sub); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .btn-icon:hover { background: #e2e8f0; color: var(--primary); }

    textarea.form-input { min-height: 120px; resize: vertical; line-height: 1.6; }
    .toolbar-footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #94a3b8; gap: 16px; opacity: 0.8; text-align: center; }
    
    #toast-area { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 3000; display:flex; flex-direction:column; gap:10px; align-items:center; }
    .toast { background: rgba(15, 23, 42, 0.95); color: #fff; padding: 14px 28px; border-radius: 50px; font-size: 14px; font-weight: 500; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); animation: fadeUp 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); backdrop-filter: blur(4px); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px) scale(0.9); } to { opacity:1; transform:translateY(0) scale(1); } }

    /* === Modal Styles === */
    .modal-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(15, 23, 42, 0.5); z-index: 2000;
        display: none; align-items: center; justify-content: center;
        backdrop-filter: blur(2px);
    }
    .modal {
        background: #fff; width: 400px; border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column;
        overflow: hidden;
    }
    .modal-header {
        padding: 16px 20px; border-bottom: 1px solid var(--border);
        display: flex; justify-content: space-between; align-items: center;
    }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--primary); margin: 0; }
    .btn-close { background: none; border: none; font-size: 18px; color: var(--text-sub); cursor: pointer; }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .modal-footer {
        padding: 16px 20px; border-top: 1px solid var(--border);
        display: flex; justify-content: flex-end; gap: 10px; background: #f8fafc;
    }

    @media (max-width: 800px) { #sidebar { display: none; } .paper { padding: 30px 20px; } }
  </style>
</head>
<body>

<header>
  <div class="logo"><i class="fas fa-bookmark" style="color:var(--accent)"></i> Bookmark Keeper</div>
  <div class="toolbar">
    <button class="btn" id="btn-settings" title="환경설정"><i class="fas fa-cog"></i> 설정</button>
    <div style="width: 1px; height: 24px; background: var(--border); margin: 0 5px;"></div>
    <input type="file" id="inp-import" accept=".json" style="display: none;">
    <button class="btn" id="btn-export"><i class="fas fa-download"></i> 백업(JSON)</button>
    <button class="btn" id="btn-import"><i class="fas fa-upload"></i> 복구(JSON)</button>
  </div>
</header>

<main>
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="search-row">
          <input type="text" id="searchInput" class="search-input" placeholder="북마크 검색...">
          <button class="btn-icon-sq" id="btn-add-new" title="새 북마크 추가 (Ctrl+Alt+N)"><i class="fas fa-plus"></i></button>
      </div>
      <select id="categoryFilter" class="filter-select">
          <option value="">📁 전체 카테고리</option>
      </select>
    </div>
    <div class="list-scroll" id="listBody"></div>
  </aside>

  <section id="editor-area">
    <div id="empty-view" style="display:flex; flex:1; flex-direction:column; justify-content:center; align-items:center; color:#94a3b8; gap:16px;">
        <i class="fas fa-compass fa-4x" style="opacity:0.3"></i>
        <h3>북마크를 선택하거나 새로 추가하세요.</h3>
    </div>

    <div class="editor-scroller" id="detail-view" style="display:none;">
        <div class="paper">
            <div class="paper-header">
                <h2 class="paper-title">북마크 상세</h2>
                <span id="last-updated" class="paper-date"></span>
            </div>
            
            <div class="form-group">
                <label class="form-label">웹사이트 이름(Title)</label>
                <input type="text" id="inpTitle" class="form-input form-input-lg" placeholder="예: 구글 검색, 인프런 비즈니스">
            </div>

            <div style="display:grid; grid-template-columns: 1fr 2fr; gap:20px;">
                <div class="form-group">
                    <label class="form-label">카테고리(Category)</label>
                    <input type="text" id="inpCategory" class="form-input" list="categoryList" placeholder="선택 또는 입력">
                    <datalist id="categoryList"></datalist>
                </div>
                <div class="form-group">
                    <label class="form-label">URL(링크 주소)</label>
                    <div class="action-wrapper">
                        <input type="text" id="inpUrl" class="form-input" placeholder="https://..." style="font-family: var(--font-ui); letter-spacing: normal;">
                        <div class="pw-actions">
                            <button class="btn-icon" id="btn-open-url" title="새 창으로 열기"><i class="fas fa-external-link-alt"></i></button>
                            <button class="btn-icon btn-copy" data-target="inpUrl" title="복사"><i class="far fa-copy"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">설명 및 메모(Description)</label>
                <textarea id="inpNotes" class="form-input" placeholder="이 북마크에 대한 간략한 설명이나 메모를 남겨주세요..."></textarea>
            </div>

            <div class="toolbar-footer">
                <button class="btn btn-danger" id="btn-delete"><i class="far fa-trash-alt"></i> 삭제</button>
                <button class="btn btn-primary" id="btn-save" title="저장하기 (Ctrl+S)"><i class="fas fa-check"></i> 저장하기</button>
            </div>
        </div>
    </div>
  </section>
</main>

<div id="toast-area"></div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fas fa-cog"></i> 환경설정</h3>
            <button class="btn-close" id="btn-close-settings"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">카테고리 목록 관리 (엔터로 구분)</label>
                <textarea id="inpSettingsCategories" class="form-input" style="min-height: 150px;" placeholder="업무&#10;학습&#10;ITPE&#10;기타"></textarea>
            </div>
            <p style="font-size: 12px; color: var(--text-sub); margin: 0;">* 여기에 등록한 목록이 카테고리 입력 시 자동완성(드롭다운) 옵션으로 제공됩니다.</p>
        </div>
        <div class="modal-footer">
            <button class="btn" id="btn-cancel-settings">취소</button>
            <button class="btn btn-primary" id="btn-save-settings">저장</button>
        </div>
    </div>
</div>

<script>
const DB_NAME = "BookmarkManagerDB";
const DEFAULT_CATEGORIES = ["업무", "학습", "ITPE", "개발/IT", "정보", "매뉴얼", "디자인", "뉴스/미디어", "도구/유틸", "기타", "내부"];

const App = {
    db: null, items: [], currentId: null,
    
    openDB: function() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => {
                const d = e.target.result;
                if(!d.objectStoreNames.contains("bookmarks")) {
                    d.createObjectStore("bookmarks", { keyPath: "id" });
                }
            };
            req.onsuccess = e => { this.db = e.target.result; resolve(this.db); };
            req.onerror = () => reject(req.error);
        });
    },
    tx: function(store, mode="readonly") { return this.db.transaction(store, mode).objectStore(store); },
    
    saveItem: function(item) {
        return new Promise(r => { 
            this.tx("bookmarks","readwrite").put(item); 
            r(true); 
        });
    },
    
    loadAll: function() {
        return new Promise(r => {
            const q = this.tx("bookmarks").getAll();
            q.onsuccess = () => {
                this.items = q.result || [];
                r(this.items);
            };
        });
    },
    
    deleteItem: function(id) { 
        return new Promise(r => { this.tx("bookmarks","readwrite").delete(id); r(); }); 
    },
    
    uid: () => "B_" + Math.random().toString(36).slice(2, 10).toUpperCase(),
    
    toast: (msg) => {
        const area = document.getElementById("toast-area");
        const el = document.createElement("div"); el.className = "toast"; el.textContent = msg;
        area.appendChild(el); setTimeout(() => el.remove(), 2500);
    },

    // 카테고리 로컬스토리지 관리
    getSavedCategories: function() {
        const saved = localStorage.getItem("bookmark_categories");
        if (saved) return JSON.parse(saved);
        return DEFAULT_CATEGORIES;
    },
    saveCategories: function(catArray) {
        localStorage.setItem("bookmark_categories", JSON.stringify(catArray));
    }
};

document.addEventListener("DOMContentLoaded", async () => {
    await App.openDB();
    
    const els = {
        listBody: document.getElementById("listBody"),
        detailView: document.getElementById("detail-view"),
        emptyView: document.getElementById("empty-view"),
        searchInput: document.getElementById("searchInput"),
        categoryFilter: document.getElementById("categoryFilter"),
        title: document.getElementById("inpTitle"),
        category: document.getElementById("inpCategory"),
        url: document.getElementById("inpUrl"),
        notes: document.getElementById("inpNotes"),
        updated: document.getElementById("last-updated"),
        categoryList: document.getElementById("categoryList")
    };

    // 초기 데이터 로드
    await App.loadAll();
    loadCategoryDatalist();
    updateCategoryDropdown();
    renderList();

    // 카테고리 데이터리스트(입력 폼용) 업데이트 함수
    function loadCategoryDatalist() {
        const categories = App.getSavedCategories();
        els.categoryList.innerHTML = "";
        categories.forEach(cat => {
            const opt = document.createElement("option");
            opt.value = cat;
            els.categoryList.appendChild(opt);
        });
    }

    // 좌측 사이드바 필터용 (저장된 북마크 기준) 업데이트 함수
    function updateCategoryDropdown() {
        const currentSelected = els.categoryFilter.value;
        const usedCategories = [...new Set(App.items.map(item => item.category).filter(Boolean))];
        const savedCats = App.getSavedCategories();

        // 환경설정 순서대로 필터 드롭다운도 정렬
        usedCategories.sort((catA, catB) => {
            let idxA = savedCats.indexOf(catA);
            let idxB = savedCats.indexOf(catB);
            if (idxA === -1) idxA = 9999;
            if (idxB === -1) idxB = 9999;
            
            if (idxA !== idxB) return idxA - idxB;
            return catA.localeCompare(catB);
        });
        
        els.categoryFilter.innerHTML = '<option value="">📁 전체 카테고리</option>';
        
        usedCategories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            els.categoryFilter.appendChild(opt);
        });
        
        if (usedCategories.includes(currentSelected)) {
            els.categoryFilter.value = currentSelected;
        }
    }

    function renderList() {
        const searchKeyword = els.searchInput.value.toLowerCase();
        const selectedCategory = els.categoryFilter.value;
        const savedCats = App.getSavedCategories(); // 환경설정에 저장된 카테고리 순서 배열
        
        els.listBody.innerHTML = "";
        
        const filtered = App.items.filter(item => {
            const matchSearch = ((item.title || "") + (item.url || "") + (item.category || "") + (item.notes || "")).toLowerCase().includes(searchKeyword);
            const matchCategory = selectedCategory === "" || item.category === selectedCategory;
            return matchSearch && matchCategory;
        }).sort((a, b) => {
            const catA = a.category || "";
            const catB = b.category || "";
            
            let idxA = savedCats.indexOf(catA);
            let idxB = savedCats.indexOf(catB);
            
            // 환경설정에 없는 카테고리는 맨 뒤(9999)로 보냅니다.
            if (idxA === -1) idxA = 9999;
            if (idxB === -1) idxB = 9999;
            
            // 1순위: 환경설정에 등록된 카테고리 순서
            if (idxA !== idxB) {
                return idxA - idxB;
            }
            
            // 등록되지 않은 동일한 후순위 그룹끼리는 이름으로 묶어줌
            if (catA !== catB) {
                return catA.localeCompare(catB);
            }
            
            // 2순위: 카테고리가 완전히 같을 경우 웹사이트 이름순 정렬
            return (a.title || "").localeCompare(b.title || "");
        });

        if(!filtered.length) {
            let emptyMsg = "북마크가 없습니다";
            if (searchKeyword || selectedCategory) emptyMsg = "조건에 맞는 북마크가 없습니다";
            els.listBody.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open fa-3x"></i><span>${emptyMsg}</span></div>`;
            return;
        }

        filtered.forEach(item => {
            const div = document.createElement("div");
            div.className = `list-item ${App.currentId === item.id ? 'active' : ''}`;
            
            const displayUrl = item.url ? item.url.replace(/^(https?:\/\/|file:\/\/\/)/,'').split('/')[0] : 'No URL';

            div.innerHTML = `
                <div class="item-title"><i class="fas fa-link" style="color:#94a3b8; font-size:12px;"></i> ${item.title}</div>
                <div class="item-sub">
                    ${item.category ? `<span class="category-tag">${item.category}</span>` : ''}
                    <span style="opacity:0.8">${displayUrl}</span>
                </div>`;
            div.onclick = () => loadDetail(item);
            els.listBody.appendChild(div);
        });
    }

    function loadDetail(item) {
        App.currentId = item.id;
        els.emptyView.style.display = "none";
        els.detailView.style.display = "flex";
        
        els.title.value = item.title || "";
        els.category.value = item.category || "";
        els.url.value = item.url || "";
        els.notes.value = item.notes || "";
        
        if (item.updatedAt) {
            const d = new Date(item.updatedAt);
            els.updated.textContent = "Last update: " + d.toLocaleDateString() + " " + d.toLocaleTimeString();
        } else {
            els.updated.textContent = "Last update: Unknown";
        }
        
        renderList();
    }

    document.getElementById("btn-save").onclick = async () => {
        if(!els.title.value) return App.toast("웹사이트 이름을 입력하세요.");
        if(!els.url.value) return App.toast("URL을 입력하세요.");

        const isNew = !App.currentId;
        const id = isNew ? App.uid() : App.currentId;
        const now = new Date().toISOString();
        
        const newItem = {
            id: id, 
            title: els.title.value, 
            category: els.category.value,
            url: els.url.value, 
            notes: els.notes.value,
            updatedAt: now 
        };
        
        await App.saveItem(newItem);
        
        if(isNew) App.items.push(newItem);
        else App.items[App.items.findIndex(x=>x.id===id)] = newItem;
        
        App.currentId = id;
        
        const d = new Date(now);
        els.updated.textContent = "Last update: " + d.toLocaleDateString() + " " + d.toLocaleTimeString();
        
        updateCategoryDropdown();
        renderList();
        App.toast("북마크가 저장되었습니다.");
    };

    document.getElementById("btn-delete").onclick = async () => {
        if(!App.currentId || !confirm("정말 이 북마크를 삭제하시겠습니까?")) return;
        await App.deleteItem(App.currentId);
        App.items = App.items.filter(x => x.id !== App.currentId);
        App.currentId = null;
        
        els.detailView.style.display = "none";
        els.emptyView.style.display = "flex";
        
        updateCategoryDropdown();
        renderList();
        App.toast("삭제되었습니다.");
    };

    document.getElementById("btn-add-new").onclick = () => {
        App.currentId = null;
        els.emptyView.style.display = "none";
        els.detailView.style.display = "flex";
        
        [els.title, els.category, els.url, els.notes].forEach(el => el.value = "");
        els.updated.textContent = "New Bookmark";
        els.title.focus();
        renderList();
    };

    document.querySelectorAll(".btn-copy").forEach(btn => {
        btn.onclick = () => {
            const el = document.getElementById(btn.dataset.target);
            if(el && el.value) { 
                navigator.clipboard.writeText(el.value); 
                App.toast("클립보드에 복사되었습니다."); 
            }
        };
    });
    
    // --- 수정된 URL 열기 로직 ---
    document.getElementById("btn-open-url").onclick = () => {
        let url = els.url.value.trim();
        if(url) {
            // C:/, D:\ 와 같은 윈도우 로컬 드라이브 경로인지 정규식으로 확인
            if (/^[a-zA-Z]:[/\\]/.test(url)) {
                // 백슬래시를 슬래시로 변경하고 file:/// 프로토콜 추가
                url = "file:///" + url.replace(/\\/g, '/');
            } 
            // http, https, file 로 시작하지 않는 웹 주소일 경우만 https:// 추가
            else if(!url.startsWith("http://") && !url.startsWith("https://") && !url.startsWith("file://")) {
                url = "https://" + url;
            }
            window.open(url, "_blank");
        } else {
            App.toast("URL을 입력해주세요.");
        }
    };

    els.searchInput.oninput = renderList;
    els.categoryFilter.onchange = renderList; 
    
    document.getElementById("btn-export").onclick = () => {
        if(!App.items.length) return App.toast("백업할 데이터가 없습니다.");
        const blob = new Blob([JSON.stringify(App.items, null, 2)], {type:"application/json"});
        const a = document.createElement("a"); 
        a.href = URL.createObjectURL(blob);
        a.download = `Bookmarks_Backup_${new Date().toISOString().slice(0,10)}.json`; 
        a.click();
    };

    const btnImport = document.getElementById("btn-import");
    const inpImport = document.getElementById("inp-import");

    btnImport.onclick = () => {
        if(confirm("기존 데이터에 복구할 데이터를 병합합니다. 진행하시겠습니까?")) {
            inpImport.click();
        }
    };

    inpImport.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (event) => {
            try {
                const data = JSON.parse(event.target.result);
                if (!Array.isArray(data)) throw new Error("JSON 형식이 올바르지 않습니다.");

                let count = 0;
                for (const item of data) {
                    if (item.id && item.title && item.url) {
                        await App.saveItem(item);
                        const existingIndex = App.items.findIndex(x => x.id === item.id);
                        if (existingIndex >= 0) {
                            App.items[existingIndex] = item;
                        } else {
                            App.items.push(item);
                        }
                        count++;
                    }
                }
                
                updateCategoryDropdown();
                renderList();
                App.toast(`${count}개의 북마크가 성공적으로 복구(병합)되었습니다.`);
                
            } catch (error) {
                console.error("복구 실패:", error);
                App.toast("복구 실패: 올바른 백업 파일(JSON)이 아닙니다.");
            }
            inpImport.value = "";
        };
        reader.readAsText(file);
    };

    // --- 환경설정 모달 로직 ---
    const modalSettings = document.getElementById("settings-modal");
    const inpSettingsCategories = document.getElementById("inpSettingsCategories");

    document.getElementById("btn-settings").onclick = () => {
        // 모달 열 때 현재 저장된 카테고리 불러오기
        const currentCats = App.getSavedCategories();
        inpSettingsCategories.value = currentCats.join("\n");
        modalSettings.style.display = "flex";
    };

    const closeSettings = () => { modalSettings.style.display = "none"; };
    document.getElementById("btn-close-settings").onclick = closeSettings;
    document.getElementById("btn-cancel-settings").onclick = closeSettings;

    document.getElementById("btn-save-settings").onclick = () => {
        // 텍스트 영역의 값을 줄바꿈 기준으로 분리하고 빈 값 제거
        const newCats = inpSettingsCategories.value
            .split('\n')
            .map(c => c.trim())
            .filter(Boolean);
        
        App.saveCategories(newCats);
        loadCategoryDatalist(); // 카테고리 자동완성 데이터리스트 업데이트
        updateCategoryDropdown(); // 왼쪽 패널 드롭다운 업데이트
        renderList(); // 새로운 카테고리 순서대로 즉시 재정렬
        App.toast("환경설정이 저장되었습니다.");
        closeSettings();
    };

    // 배경 클릭 시 모달 닫기
    modalSettings.addEventListener('click', (e) => {
        if (e.target === modalSettings) closeSettings();
    });

    document.addEventListener("keydown", (e) => {
        const isCtrl = e.ctrlKey || e.metaKey;
        if (isCtrl && e.altKey && e.key.toLowerCase() === "n") {
            e.preventDefault();
            document.getElementById("btn-add-new").click();
        }
        if (isCtrl && e.key.toLowerCase() === "s") {
            e.preventDefault(); 
            if (els.detailView.style.display !== "none") {
                document.getElementById("btn-save").click();
            }
        }
    });
});
</script>
</body>
</html>
