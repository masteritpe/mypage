<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF to Web</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      --bg-body: #F9FAFB;
      --bg-surface: #FFFFFF;
      --border-light: #F3F4F6;
      --border-base: #E5E7EB;
      --text-main: #111827;
      --text-muted: #6B7280;
      --primary: #EF4444;       
      --primary-hover: #DC2626;
      --secondary: #FFFFFF;
      --secondary-hover: #F9FAFB;
      --selection-bg: #FEE2E2;  
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    .dashboard-header {
      max-width: 100%;
      margin: 0 auto 24px auto;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .title-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .title-area i { font-size: 28px; color: #EF4444; }
    h2 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    
    .actions { display: flex; gap: 10px; }

    input[type="file"] { display: none; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--primary); color: white;
      box-shadow: var(--shadow-sm);
    }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    
    .btn-outline {
      background: var(--secondary); color: var(--text-main);
      border-color: var(--border-base); box-shadow: var(--shadow-sm);
    }
    .btn-outline:hover { background: var(--secondary-hover); border-color: #D1D5DB; }

    .instructions {
      display: flex; gap: 20px; align-items: center;
      font-size: 13px; color: var(--text-muted);
      background: var(--bg-surface); padding: 12px 20px;
      border-radius: var(--radius-md); border: 1px solid var(--border-base);
    }
    .instructions span { display: inline-flex; align-items: center; gap: 6px; }
    .instructions i { font-size: 16px; }

    #column-toggles {
      display: none; flex-wrap: wrap; gap: 8px; align-items: center;
      margin-bottom: 20px; max-width: 100%; margin-left: auto; margin-right: auto;
    }
    .toggle-title { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-right: 8px; }
    .col-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 500; color: var(--text-main);
      background: var(--bg-surface); padding: 6px 14px;
      border-radius: 99px; cursor: pointer;
      border: 1px solid var(--border-base);
      transition: all 0.2s; user-select: none;
      box-shadow: var(--shadow-sm);
    }
    .col-toggle:hover { border-color: #D1D5DB; background: var(--bg-body); }
    .col-toggle input { display: none; }
    .col-toggle.hidden-col { 
      background: transparent; border-color: dashed var(--border-base);
      color: #9CA3AF; box-shadow: none; opacity: 0.6;
    }
    .col-toggle i { font-size: 14px; }

    #table-wrapper {
      max-width: 100%; margin: 0 auto;
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-lg);
      overflow: auto;
      max-height: calc(100vh - 220px);
      box-shadow: var(--shadow-md);
      user-select: none;
      position: relative;
    }

    #table-wrapper::-webkit-scrollbar { width: 8px; height: 8px; }
    #table-wrapper::-webkit-scrollbar-track { background: transparent; }
    #table-wrapper::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
    #table-wrapper::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }

    table {
      border-collapse: separate; border-spacing: 0;
      width: 100%; min-width: 800px; /* 2열 구조를 위해 너비 확보 */
      font-size: 14px; text-align: left;
    }
    
    th, td {
      padding: 16px 20px;
      white-space: pre-wrap; /* 줄바꿈 유지 핵심 속성 */
      word-break: break-all;
      cursor: cell; position: relative;
      border-bottom: 1px solid var(--border-light);
      border-right: 1px solid var(--border-light);
      transition: background 0.15s ease;
      line-height: 1.6;
      vertical-align: top;
    }
    
    /* 1열(페이지 번호) 고정 너비 및 강조 */
    td:first-child {
      width: 120px;
      font-weight: 600;
      color: var(--primary);
      background: #FAFAFA;
      text-align: center;
      vertical-align: middle;
    }

    th:last-child, td:last-child { border-right: none; }
    tr:last-child td { border-bottom: none; }

    th {
      font-weight: 600; color: var(--text-muted);
      position: sticky; top: 0; z-index: 10;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px); 
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 2px solid var(--border-base);
    }
    
    .selected-cell {
      background-color: var(--selection-bg) !important;
    }
    .selected-cell::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      border: 1px solid #FCA5A5; pointer-events: none;
    }

    [contenteditable="true"] {
      outline: none;
      background-color: var(--bg-surface) !important;
      cursor: text; user-select: text;
    }
    [contenteditable="true"]::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      box-shadow: inset 0 0 0 2px var(--primary); pointer-events: none; z-index: 5;
    }
    
    .empty-msg {
      padding: 80px 20px; text-align: center; color: var(--text-muted);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    /* 첨부 이미지 참고하여 연한 회색으로 수정된 부분 */
    .empty-msg i { font-size: 44px; color: #D1D5DB; }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    .ph-spinner { animation: spin 1s linear infinite; color: var(--primary) !important; }
  </style>
</head>
<body>

  <div class="dashboard-header">
    <div class="header-top">
      <div class="title-area">
        <i class="ph ph-file-pdf"></i>
        <h2>PDF to Web</h2>
      </div>
      
      <div class="actions">
        <label for="upload-pdf" class="btn btn-primary">
          <i class="ph ph-upload-simple"></i> 파일 불러오기
        </label>
        <input type="file" id="upload-pdf" accept=".pdf" />
        
        <button class="btn btn-outline" onclick="applySelectionToPreview()">
          <i class="ph ph-crop"></i> 영역 자르기
        </button>
      </div>
    </div>

    <div class="instructions">
      <span><i class="ph ph-mouse-left"></i> 클릭: 조용히 복사</span>
      <span style="color: #D1D5DB;">|</span>
      <span><i class="ph ph-cursor-click"></i> 더블클릭: 텍스트 수정</span>
      <span style="color: #D1D5DB;">|</span>
      <span><i class="ph ph-arrows-out"></i> 드래그: 영역 지정 후 자르기</span>
    </div>
  </div>

  <div id="column-toggles"></div>

  <div id="table-wrapper">
    <div class="empty-msg">
      <i class="ph ph-file-pdf"></i>
      PDF 파일을 업로드하여 텍스트를 추출하세요
    </div>
  </div>

  <script>
    let isDragging = false;
    let startCell = null;
    let endCell = null;
    const wrapper = document.getElementById('table-wrapper');
    const toggleContainer = document.getElementById('column-toggles');

    // 1. PDF 텍스트 추출 로직 (페이지 당 1행 처리, 줄바꿈 유지)
    document.getElementById('upload-pdf').addEventListener('change', async function(e) {
      const file = e.target.files[0];
      if (!file) return;

      wrapper.innerHTML = `
        <div class="empty-msg">
          <i class="ph ph-spinner"></i>
          PDF 문서의 페이지를 분석 중입니다...
        </div>`;
      toggleContainer.style.display = 'none';

      try {
        const arrayBuffer = await file.arrayBuffer();
        const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
        const pdf = await loadingTask.promise;
        
        // 2열 구조 헤더
        let allRows = [["Page", "Content"]];

        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          const textContent = await page.getTextContent();
          
          let items = textContent.items.filter(item => item.str.trim() !== '');
          if(items.length === 0) continue;

          // 위에서 아래로(Y좌표 내림차순), 좌에서 우로(X좌표 오름차순) 정렬
          items.sort((a, b) => {
             const yDiff = b.transform[5] - a.transform[5];
             if (Math.abs(yDiff) > 5) return yDiff; 
             return a.transform[4] - b.transform[4];
          });

          let currentY = items[0].transform[5];
          let line = [];
          let pageLines = [];

          // Y좌표를 기준으로 한 줄씩 묶기
          items.forEach(item => {
            if (Math.abs(item.transform[5] - currentY) > 5) {
              pageLines.push(line.join(' ')); // 완성된 한 줄을 배열에 저장
              line = [item.str];
              currentY = item.transform[5];
            } else {
              line.push(item.str);
            }
          });
          
          if (line.length > 0) {
            pageLines.push(line.join(' '));
          }

          // 배열에 담긴 줄들을 줄바꿈(\n) 문자로 합쳐서 하나의 셀 내용으로 만듦
          let fullPageContent = pageLines.join('\n');
          allRows.push([`Page ${pageNum}`, fullPageContent]);
        }

        renderTable(allRows);
      } catch (err) {
        console.error(err);
        wrapper.innerHTML = `
          <div class="empty-msg">
            <i class="ph ph-warning-circle" style="color:#EF4444;"></i>
            PDF 파일을 읽는 중 오류가 발생했습니다.
          </div>`;
      } finally {
        e.target.value = '';
      }
    });

    // 2. 특수문자 이스케이프 (HTML 태그 깨짐 방지)
    function escapeHTML(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // 3. 테이블 렌더링
    function renderTable(data) {
      if (!data || data.length <= 1) { 
        wrapper.innerHTML = `
          <div class="empty-msg">
            <i class="ph ph-folder-open" style="color:#D1D5DB;"></i>
            추출할 수 있는 텍스트가 없습니다. (이미지 스캔본일 수 있습니다)
          </div>`;
        toggleContainer.style.display = 'none';
        return;
      }

      let html = '<table>';
      data.forEach((row, rowIndex) => {
        html += '<tr>';
        row.forEach((cell, colIndex) => {
          const tag = rowIndex === 0 ? 'th' : 'td';
          let text = cell !== undefined ? escapeHTML(String(cell)) : '';
          
          // td 요소들에 맞춤법 검사 제외(spellcheck="false") 속성 부여
          const attr = rowIndex === 0 ? '' : ' spellcheck="false"';
          html += `<${tag}${attr}>${text}</${tag}>`;
        });
        html += '</tr>';
      });
      html += '</table>';
      
      wrapper.innerHTML = html;
      clearSelection();
      updateColumnToggles();
    }

    // 4. 필터 제어 UI 
    function updateColumnToggles() {
      const table = document.querySelector('table');
      if (!table || table.rows.length === 0) {
        toggleContainer.style.display = 'none';
        return;
      }
      
      let html = '<div class="toggle-title"><i class="ph ph-eye"></i> 표시 컬럼</div>';
      const headerRow = table.rows[0]; 
      
      for (let c = 0; c < headerRow.cells.length; c++) {
        let text = headerRow.cells[c].innerText.trim();
        if (!text) text = `Column ${c + 1}`;
        if (text.length > 15) text = text.substring(0, 15) + '...'; 
        
        const isVisible = headerRow.cells[c].style.display !== 'none';
        const icon = isVisible ? 'ph-check-circle' : 'ph-circle';
        
        html += `
          <label class="col-toggle ${isVisible ? '' : 'hidden-col'}">
            <input type="checkbox" ${isVisible ? 'checked' : ''} onchange="toggleColumn(${c}, this)">
            <i class="ph ${icon}"></i> ${text}
          </label>
        `;
      }
      toggleContainer.innerHTML = html;
      toggleContainer.style.display = headerRow.cells.length > 1 ? 'flex' : 'none'; 
    }

    function toggleColumn(colIndex, checkbox) {
      const isVisible = checkbox.checked;
      const table = document.querySelector('table');
      if (!table) return;
      
      for (let r = 0; r < table.rows.length; r++) {
        const cell = table.rows[r].cells[colIndex];
        if (cell) cell.style.display = isVisible ? '' : 'none';
      }
      
      const label = checkbox.parentElement;
      const icon = label.querySelector('i');
      if (isVisible) {
        label.classList.remove('hidden-col');
        icon.className = 'ph ph-check-circle';
      } else {
        label.classList.add('hidden-col');
        icon.className = 'ph ph-circle';
      }
    }

    function getCoords(cell) {
      return { r: cell.parentElement.rowIndex, c: cell.cellIndex };
    }

    // 드래그 선택 기능 
    wrapper.addEventListener('mousedown', (e) => {
      const editingCell = document.querySelector('[contenteditable="true"]');
      if (editingCell && editingCell !== e.target.closest('td, th')) {
        editingCell.blur();
      }

      const cell = e.target.closest('td, th');
      if (!cell || cell.hasAttribute('contenteditable')) return; 
      if (e.button !== 0) return; 

      e.preventDefault(); 
      isDragging = true;
      startCell = getCoords(cell);
      endCell = startCell;
      highlightSelection();
    });

    wrapper.addEventListener('mouseover', (e) => {
      if (!isDragging) return;
      const cell = e.target.closest('td, th');
      if (!cell) return;
      endCell = getCoords(cell);
      highlightSelection();
    });

    window.addEventListener('mouseup', (e) => {
      if (!isDragging) return;
      isDragging = false;
      
      // 단일 클릭 처리 (클립보드 복사)
      if (startCell && endCell && startCell.r === endCell.r && startCell.c === endCell.c) {
        const cell = e.target.closest('td, th');
        if (cell) {
          const textToCopy = cell.innerText.trim();
          if (textToCopy) navigator.clipboard.writeText(textToCopy);
        }
        clearSelection(); 
      }
    });

    // 더블클릭 수정 (맞춤법 검사 방지 추가)
    wrapper.addEventListener('dblclick', (e) => {
      const cell = e.target.closest('td, th');
      if (!cell) return;
      
      cell.setAttribute('contenteditable', 'true');
      cell.setAttribute('spellcheck', 'false'); // 수정 중에도 빨간 밑줄 방지
      cell.focus();
      
      const range = document.createRange();
      range.selectNodeContents(cell);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });

    wrapper.addEventListener('blur', (e) => {
      const cell = e.target;
      if (cell.tagName === 'TD' || cell.tagName === 'TH') {
        cell.removeAttribute('contenteditable');
        window.getSelection().removeAllRanges();
      }
    }, true); 

    // 단축키 제어
    wrapper.addEventListener('keydown', (e) => {
      const editingCell = document.querySelector('[contenteditable="true"]');
      if (!editingCell) return;

      if (e.key === 'Enter') {
        if (e.altKey) {
          e.preventDefault(); 
          const selection = window.getSelection();
          if (selection.rangeCount > 0) {
            const range = selection.getRangeAt(0);
            const textNode = document.createTextNode('\n');
            range.deleteContents();
            range.insertNode(textNode);
            range.setStartAfter(textNode);
            range.collapse(true);
            selection.removeAllRanges();
            selection.addRange(range);
          }
        } else {
          e.preventDefault(); 
          editingCell.blur(); 
        }
      }
    });

    // 시각적 하이라이트
    function highlightSelection() {
      document.querySelectorAll('.selected-cell').forEach(c => c.classList.remove('selected-cell'));
      if (!startCell || !endCell) return;
      
      const table = document.querySelector('table');
      if (!table) return;

      const minRow = Math.min(startCell.r, endCell.r);
      const maxRow = Math.max(startCell.r, endCell.r);
      const minCol = Math.min(startCell.c, endCell.c);
      const maxCol = Math.max(startCell.c, endCell.c);

      for (let r = minRow; r <= maxRow; r++) {
        const row = table.rows[r];
        if (!row) continue;
        for (let c = minCol; c <= maxCol; c++) {
          const cell = row.cells[c];
          if (cell) cell.classList.add('selected-cell');
        }
      }
    }

    function clearSelection() {
      document.querySelectorAll('.selected-cell').forEach(c => c.classList.remove('selected-cell'));
      startCell = null;
      endCell = null;
    }

    // 영역 자르기
    function applySelectionToPreview() {
      if (!startCell || !endCell) {
        alert('먼저 남기고 싶은 텍스트 영역을 마우스 드래그로 선택해주세요.');
        return;
      }
      
      const table = document.querySelector('table');
      if (!table) return;

      const minRow = Math.min(startCell.r, endCell.r);
      const maxRow = Math.max(startCell.r, endCell.r);
      const minCol = Math.min(startCell.c, endCell.c);
      const maxCol = Math.max(startCell.c, endCell.c);

      for (let r = table.rows.length - 1; r >= 1; r--) { 
        if (r < minRow || r > maxRow) {
          table.deleteRow(r);
        } else {
          const row = table.rows[r];
          for (let c = row.cells.length - 1; c >= 0; c--) {
            if (c < minCol || c > maxCol) {
              row.deleteCell(c);
            }
          }
        }
      }
      clearSelection();
      updateColumnToggles();
    }
  </script>
</body>
</html>
