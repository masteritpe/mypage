<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel to Image</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      --bg-body: #F9FAFB;
      --bg-surface: #FFFFFF;
      --border-light: #F3F4F6;
      --border-base: #E5E7EB;
      --text-main: #111827;
      --text-muted: #6B7280;
      --primary: #111827;       
      --primary-hover: #374151;
      --secondary: #FFFFFF;
      --secondary-hover: #F9FAFB;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    .dashboard-header {
      max-width: 100%;
      margin: 0 auto 24px auto;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .title-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .title-area i { font-size: 28px; color: var(--text-main); }
    h2 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    
    .actions { display: flex; gap: 10px; }

    input[type="file"] { display: none; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--primary); color: white;
      box-shadow: var(--shadow-sm);
    }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    
    .btn-outline {
      background: var(--secondary); color: var(--text-main);
      border-color: var(--border-base); box-shadow: var(--shadow-sm);
    }
    .btn-outline:hover { background: var(--secondary-hover); border-color: #D1D5DB; }

    .instructions {
      display: flex; gap: 20px; align-items: center;
      font-size: 13px; color: var(--text-muted);
      background: var(--bg-surface); padding: 12px 20px;
      border-radius: var(--radius-md); border: 1px solid var(--border-base);
    }
    .instructions span { display: inline-flex; align-items: center; gap: 6px; }
    .instructions i { font-size: 16px; }

    #content-wrapper {
      max-width: 100%; margin: 0 auto;
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-lg);
      padding: 24px;
      min-height: 400px;
      box-shadow: var(--shadow-md);
    }

    .empty-msg {
      padding: 80px 20px; text-align: center; color: var(--text-muted);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      height: 100%; justify-content: center;
    }
    .empty-msg i { font-size: 40px; color: #D1D5DB; }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .image-card {
      background: var(--bg-body);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s;
    }
    .image-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .image-preview {
      width: 100%;
      height: 180px;
      object-fit: contain;
      background-color: #f3f4f6;
      border-bottom: 1px solid var(--border-light);
      cursor: zoom-in;
      transition: background-color 0.3s;
    }

    .image-info {
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .image-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }

    .image-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover {
      background: var(--border-base);
      color: var(--primary);
    }

    /* 복사 완료 표시 이미지 카드 스타일 */
    .copied-card {
      background-color: #D1FAE5 !important; /* 연한 녹색 */
      border-color: #6EE7B7 !important;
    }
    .copied-card .image-preview {
      background-color: rgba(209, 250, 229, 0.6) !important;
    }

    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--primary); color: white;
      padding: 10px 20px; border-radius: 99px; font-size: 14px;
      box-shadow: var(--shadow-md); opacity: 0; visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      z-index: 3000;
    }
    #toast.show { opacity: 1; visibility: visible; }

    /* 모달 (전체화면 이미지 뷰어) 스타일 */
    .modal-overlay {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .modal-content {
      max-width: 90%;
      max-height: 80vh;
      object-fit: contain;
      background-color: #FFFFFF; /* 🔥 투명 PNG 이미지의 배경을 강제로 흰색으로 고정 */
      border-radius: var(--radius-md);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      animation: zoomIn 0.2s ease-out;
    }
    
    .modal-controls {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      animation: zoomIn 0.2s ease-out;
    }
    .modal-controls .btn-outline {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-color: rgba(255, 255, 255, 0.2);
    }
    .modal-controls .btn-outline:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .modal-close {
      position: absolute;
      top: 20px; right: 30px;
      color: white;
      font-size: 40px;
      font-weight: 300;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }
    .modal-close:hover { color: #9CA3AF; }
    
    @keyframes zoomIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="dashboard-header">
    <div class="header-top">
      <div class="title-area">
        <i class="ph ph-images"></i>
        <h2>Excel to Image</h2>
      </div>
      
      <div class="actions">
        <label for="upload-excel" class="btn btn-primary">
          <i class="ph ph-upload-simple"></i> 파일 불러오기
        </label>
        <input type="file" id="upload-excel" accept=".xlsx" />
        
        <button class="btn btn-outline" id="btn-clear" onclick="clearData()" style="display:none;">
          <i class="ph ph-trash"></i> 초기화
        </button>
      </div>
    </div>

    <div class="instructions">
      <span><i class="ph ph-arrows-out"></i> 이미지 클릭: 크게 보기</span>
      <span style="color: #D1D5DB;">|</span>
      <span><i class="ph ph-copy"></i> 아이콘 클릭: 클립보드 복사</span>
      <span style="color: #D1D5DB;">|</span>
      <span><i class="ph ph-download-simple"></i> 아이콘 클릭: 다운로드</span>
    </div>
  </div>

  <div id="content-wrapper">
    <div class="empty-msg" id="empty-state">
      <i class="ph ph-folder-open"></i>
      엑셀 파일(.xlsx)을 업로드하여 포함된 이미지를 추출하세요
    </div>
    <div class="image-grid" id="image-grid" style="display: none;"></div>
  </div>

  <div id="toast">복사되었습니다!</div>

  <div id="image-modal" class="modal-overlay" onclick="closeModal()">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <img id="modal-img" class="modal-content" src="" onclick="event.stopPropagation();">
    
    <div class="modal-controls" onclick="event.stopPropagation();">
      <button class="btn btn-primary" onclick="copyModalImage()">
        <i class="ph ph-copy"></i> 이미지 복사
      </button>
      <button class="btn btn-outline" onclick="downloadModalImage()">
        <i class="ph ph-download-simple"></i> 다운로드
      </button>
    </div>
  </div>

  <script>
    const uploadInput = document.getElementById('upload-excel');
    const emptyState = document.getElementById('empty-state');
    const imageGrid = document.getElementById('image-grid');
    const btnClear = document.getElementById('btn-clear');
    
    let extractedImages = [];
    let currentModalIndex = -1;

    // 상대 경로 계산 헬퍼 함수
    function resolveRelativePath(sourcePath, targetPath) {
      if (targetPath.startsWith('/')) return targetPath.substring(1);
      const parts = sourcePath.split('/');
      parts.pop(); // 파일명 제거
      const targetParts = targetPath.split('/');
      for (const p of targetParts) {
        if (p === '..') parts.pop();
        else if (p !== '.') parts.push(p);
      }
      return parts.join('/');
    }

    uploadInput.addEventListener('change', async function(e) {
      const file = e.target.files[0];
      if (!file) return;

      extractedImages = [];
      const zip = new JSZip();

      try {
        const contents = await zip.loadAsync(file);
        
        // XML 파싱 헬퍼 함수
        const parseXML = async (path) => {
          if (!contents.files[path]) return null;
          const text = await contents.files[path].async('text');
          return new DOMParser().parseFromString(text, 'text/xml');
        };

        let orderedImagePaths = [];

        try {
          // 1. 워크북에서 시트 순서 가져오기
          const workbookXml = await parseXML('xl/workbook.xml');
          const workbookRels = await parseXML('xl/_rels/workbook.xml.rels');

          if (workbookXml && workbookRels) {
            const sheets = Array.from(workbookXml.querySelectorAll('sheet'));
            
            for (const sheet of sheets) {
              const rId = sheet.getAttribute('r:id');
              const rel = workbookRels.querySelector(`Relationship[Id="${rId}"]`);
              if (!rel) continue;

              const sheetPath = resolveRelativePath('xl/workbook.xml', rel.getAttribute('Target'));
              const sheetXml = await parseXML(sheetPath);
              if (!sheetXml) continue;

              const drawingTag = sheetXml.querySelector('drawing');
              if (!drawingTag) continue;

              // 2. 시트와 연결된 드로잉(drawing) 파일 찾기
              const drawingRId = drawingTag.getAttribute('r:id');
              const sheetDir = sheetPath.substring(0, sheetPath.lastIndexOf('/'));
              const sheetName = sheetPath.substring(sheetPath.lastIndexOf('/') + 1);
              const sheetRelsPath = `${sheetDir}/_rels/${sheetName}.rels`;

              const sheetRels = await parseXML(sheetRelsPath);
              if (!sheetRels) continue;

              const drawingRel = sheetRels.querySelector(`Relationship[Id="${drawingRId}"]`);
              if (!drawingRel) continue;

              const drawingPath = resolveRelativePath(sheetPath, drawingRel.getAttribute('Target'));
              const drawingXml = await parseXML(drawingPath);
              if (!drawingXml) continue;

              // 3. 드로잉 파일에서 셀 위치(Row, Col) 및 이미지 ID 찾기
              const drawingDir = drawingPath.substring(0, drawingPath.lastIndexOf('/'));
              const drawingFileName = drawingPath.substring(drawingPath.lastIndexOf('/') + 1);
              const drawingRelsPath = `${drawingDir}/_rels/${drawingFileName}.rels`;
              const drawingRels = await parseXML(drawingRelsPath);
              if (!drawingRels) continue;

              const anchors = Array.from(drawingXml.querySelectorAll('twoCellAnchor, oneCellAnchor, absoluteAnchor'));
              let sheetImages = [];

              anchors.forEach(anchor => {
                const from = anchor.querySelector('from');
                let row = 0, col = 0;
                if (from) {
                  const rowEl = from.querySelector('row');
                  const colEl = from.querySelector('col');
                  if (rowEl) row = parseInt(rowEl.textContent, 10);
                  if (colEl) col = parseInt(colEl.textContent, 10);
                }

                const blip = anchor.querySelector('blip');
                if (blip) {
                  const embedId = blip.getAttribute('r:embed');
                  const imgRel = drawingRels.querySelector(`Relationship[Id="${embedId}"]`);
                  if (imgRel) {
                    const imgPath = resolveRelativePath(drawingPath, imgRel.getAttribute('Target'));
                    sheetImages.push({ row, col, path: imgPath });
                  }
                }
              });

              // 4. 추출한 이미지를 행(Row) 우선, 열(Col) 다음 기준으로 정렬
              sheetImages.sort((a, b) => a.row !== b.row ? a.row - b.row : a.col - b.col);
              
              sheetImages.forEach(img => {
                if (!orderedImagePaths.includes(img.path)) orderedImagePaths.push(img.path);
              });
            }
          }
        } catch (xmlErr) {
          console.warn("정렬을 위한 XML 파싱에 실패했습니다. 기본 순서로 대체합니다.", xmlErr);
        }

        // 5. XML에서 파싱하지 못한 누락된 이미지(배경 이미지 등)를 배열 끝에 추가
        const allMediaFiles = Object.keys(contents.files).filter(k => k.startsWith('xl/media/') && !contents.files[k].dir);
        const missedFiles = allMediaFiles.filter(p => !orderedImagePaths.includes(p));
        orderedImagePaths.push(...missedFiles);

        // 6. 정렬된 경로 순서대로 Blob 객체 생성
        for (const path of orderedImagePaths) {
          const fileData = contents.files[path];
          if (!fileData) continue;
          
          const ext = path.split('.').pop().toLowerCase();
          if (['png', 'jpeg', 'jpg', 'gif'].includes(ext)) {
            const mimeType = ext === 'jpg' ? 'image/jpeg' : `image/${ext}`;
            const blob = await fileData.async('blob');
            extractedImages.push({
              name: path.split('/').pop(),
              mimeType: mimeType,
              blob: new Blob([blob], { type: mimeType }),
              url: URL.createObjectURL(blob)
            });
          }
        }
        
        renderImages();
      } catch (err) {
        console.error(err);
        alert('엑셀 파일에서 이미지를 추출하는 중 오류가 발생했습니다.');
      } finally {
        uploadInput.value = '';
      }
    });

    function renderImages() {
      if (extractedImages.length === 0) {
        emptyState.innerHTML = `<i class="ph ph-warning-circle"></i>파일 내에 추출할 이미지가 없습니다.`;
        emptyState.style.display = 'flex';
        imageGrid.style.display = 'none';
        btnClear.style.display = 'none';
        return;
      }

      emptyState.style.display = 'none';
      imageGrid.style.display = 'grid';
      btnClear.style.display = 'inline-flex';
      imageGrid.innerHTML = '';

      extractedImages.forEach((img, index) => {
        const card = document.createElement('div');
        card.className = 'image-card';
        
        card.innerHTML = `
          <img src="${img.url}" class="image-preview" title="클릭하여 크게 보기" onclick="viewImageFullScreen(${index})">
          <div class="image-info">
            <span class="image-name" title="${img.name}">${img.name}</span>
            <div class="image-actions">
              <button class="icon-btn" onclick="copyImage(${index})" title="복사하기">
                <i class="ph ph-copy"></i>
              </button>
              <button class="icon-btn" onclick="downloadImage(${index})" title="다운로드">
                <i class="ph ph-download-simple"></i>
              </button>
            </div>
          </div>
        `;
        imageGrid.appendChild(card);
      });
    }

    function viewImageFullScreen(index) {
      currentModalIndex = index;
      const imgData = extractedImages[index];
      const modal = document.getElementById('image-modal');
      const modalImg = document.getElementById('modal-img');
      
      modalImg.src = imgData.url;
      modal.style.display = 'flex';
    }

    function closeModal() {
      const modal = document.getElementById('image-modal');
      modal.style.display = 'none';
      currentModalIndex = -1;
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // 수정된 이미지 복사 함수
    async function copyImage(index) {
      const imgData = extractedImages[index];
      try {
        let blobToCopy = imgData.blob;

        // 브라우저 클립보드 API는 'image/png'만 지원하므로,
        // PNG가 아닌 이미지(JPEG, GIF 등)는 Canvas를 이용해 PNG로 변환합니다.
        if (imgData.mimeType !== 'image/png') {
          blobToCopy = await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              canvas.width = img.width;
              canvas.height = img.height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0);
              canvas.toBlob((blob) => {
                if (blob) resolve(blob);
                else reject(new Error('이미지 변환 실패'));
              }, 'image/png');
            };
            img.onerror = () => reject(new Error('이미지 로드 실패'));
            img.src = imgData.url;
          });
        }

        // 변환된 PNG Blob을 클립보드에 쓰기
        const clipboardItem = new ClipboardItem({
          'image/png': blobToCopy
        });
        
        await navigator.clipboard.write([clipboardItem]);
        showToast('이미지가 클립보드에 복사되었습니다.');
        
        // 시각적 피드백: 복사 완료 시 카드 색상 변경
        const card = document.querySelectorAll('.image-card')[index];
        if (card) {
          card.classList.add('copied-card');
        }
      } catch (err) {
        console.error('Clipboard copy failed:', err);
        alert('클립보드 복사에 실패했습니다. 보안 정책 문제이거나 지원하지 않는 브라우저일 수 있습니다.');
      }
    }

    function downloadImage(index) {
      const imgData = extractedImages[index];
      const a = document.createElement('a');
      a.href = imgData.url;
      a.download = imgData.name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function copyModalImage() {
      if (currentModalIndex > -1) copyImage(currentModalIndex);
    }

    function downloadModalImage() {
      if (currentModalIndex > -1) downloadImage(currentModalIndex);
    }

    function clearData() {
      extractedImages.forEach(img => URL.revokeObjectURL(img.url)); 
      extractedImages = [];
      emptyState.innerHTML = `<i class="ph ph-folder-open"></i>엑셀 파일(.xlsx)을 업로드하여 포함된 이미지를 추출하세요`;
      emptyState.style.display = 'flex';
      imageGrid.style.display = 'none';
      btnClear.style.display = 'none';
    }

    let toastTimeout;
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.classList.add('show');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }
  </script>
</body>
</html>
