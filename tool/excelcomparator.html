<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엑셀 파일 비교</title>
    <style>
        :root {
            --bg: #f7fafc;
            --card: #ffffff;
            --ink: #1a202c;
            --muted: #718096;
            --accent: #2b6cb0;
            --ok: #2f855a;
            --diff-a: #fecaca; 
            --diff-b: #bfdbfe; 
            --diff-both: #fef9c3; 
            --diff-same: #d1fae5; 
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", Arial, sans-serif;
            padding: 0;
        }

        /* Header & Controls */
        header {
            background: var(--card);
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        header h1 { font-size: 18px; margin: 0; }
        .btn { border: 1px solid #cbd5e0; background: #fff; color: var(--ink); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 13px; line-height: 1.2; transition: all 0.1s; }
        .btn.accent { background: var(--accent); color: var(--card); border-color: var(--accent); }
        .btns-right { display: flex; gap: 8px; align-items: center; }
        .file-upload-group { display: flex; gap: 15px; align-items: flex-end; }
        .file-upload-item { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .file-status { font-size: 12px; color: var(--ok); margin-top: 4px; min-height: 1.5em; white-space: nowrap; }
        
        /* Toast */
        #toast-area { position: fixed; right: 16px; top: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: var(--card); border: 1px solid #e2e8f0; border-left: 6px solid var(--accent); border-radius: 8px; padding: 10px 12px; min-width: 240px; box-shadow: 0 4px 12px rgba(0,0,0,.1); }

        /* Main Content & Controls */
        main { padding: 20px; }
        .controls-bar { background: var(--card); border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* 복합 키 선택 영역 스타일 */
        #key-column-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #e2e8f0;
            padding: 10px;
            border-radius: 6px;
        }
        #key-column-controls h3 {
            font-size: 13px;
            font-weight: 700;
            margin: 0;
            color: var(--accent);
        }
        #composite-key-options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 13px;
        }
        .filter-row { display: flex; gap: 10px; align-items: center; }
        .filter-row select { padding: 8px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 13px; }

        /* Table Styles */
        .table-container { border: 1px solid #e2e8f0; border-radius: 10px; overflow: auto; max-height: 70vh; background: var(--card); }
        #data-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
        #data-table thead th { background: #f7fafc; border-bottom: 2px solid #e2e8f0; padding: 10px; text-align: left; position: sticky; top: 0; z-index: 2; font-weight: 600; white-space: nowrap; cursor: pointer; }
        #data-table tbody td { border-bottom: 1px solid #edf2f7; padding: 10px; vertical-align: top; line-height: 1.4; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #data-table tbody tr:hover { background: #fefcff; }
        
        /* Comparison specific styles */
        .status-a-only { background-color: var(--diff-a) !important; }
        .status-b-only { background-color: var(--diff-b) !important; }
        .status-diff { background-color: var(--diff-both) !important; }
        .status-same { background-color: var(--diff-same) !important; }
        
        /* 개별 셀 차이 강조 (글자색 빨간색으로 변경) */
        td.status-diff {
             background-color: var(--diff-both) !important;
             color: #dc2626; 
             font-weight: 600; 
        }
        
        /* Summary Box Styles */
        .summary-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; padding: 10px; border-radius: 8px; background: #f0f4f8; border: 1px solid #e2e8f0; }
        .summary-item { text-align: center; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 500; }
        .summary-item h3 { font-size: 14px; margin: 0 0 5px 0; font-weight: 600; color: var(--ink); }
        .summary-item .count { font-size: 20px; font-weight: 700; }
        .summary-a { background-color: var(--diff-a); }
        .summary-b { background-color: var(--diff-b); }
        .summary-diff { background-color: var(--diff-both); }
        .summary-same { background-color: var(--diff-same); }
        
        .filter-row { display: flex; gap: 10px; align-items: center; }
        .filter-row select { padding: 8px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 13px; }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <h1>엑셀 파일 비교</h1>
            <button class="btn accent" id="btn-compare" title="두 파일 로드 후 비교 실행">비교 실행</button>
            <span id="list-count" class="badge" style="font-size:16px; font-weight:700;">0건</span>
        </div>
        <div class="btns-right">
            <div class="file-upload-group">
                <div class="file-upload-item">
                    <label class="btn" for="xlsxFileA">1. 엑셀 A 불러오기</label>
                    <input type="file" id="xlsxFileA" accept=".xlsx" style="display:none" />
                    <div id="status-a" class="file-status">파일 미로드</div>
                </div>
                <div class="file-upload-item">
                    <label class="btn" for="xlsxFileB">2. 엑셀 B 불러오기</label>
                    <input type="file" id="xlsxFileB" accept=".xlsx" style="display:none" />
                    <div id="status-b" class="file-status">파일 미로드</div>
                </div>
            </div>
            <button class="btn" id="btn-export">CSV 내보내기</button>
        </div>
    </header>

    <main>
        <div class="controls-bar">
            <div id="summary-container" class="summary-box" style="display: none;">
                </div>

            <div id="key-column-controls">
                <h3>🔑 복합 키 설정 (2개 이상 컬럼을 체크하면, 그 조합으로 키가 생성됩니다.)</h3>
                <div id="composite-key-options">
                    <p style="color: var(--muted);">두 파일을 모두 불러오면 공통 컬럼이 표시됩니다.</p>
                </div>
                <div style="border-top: 1px solid #e2e8f0; padding-top: 8px;">
                     <span style="font-size: 13px; font-weight: 600;">단일 키 사용:</span>
                    <select id="key-column-select" title="단일 컬럼을 키로 사용">
                        <option value="">컬럼 선택</option>
                    </select>
                </div>
            </div>

            <div class="filter-row">
                <span style="font-size: 13px; font-weight: 600;">결과 필터:</span>
                <select id="result-filter-select">
                    <option value="NOT_SAME" selected>차이점만 보기 (SAME 제외)</option>
                    <option value="">전체 보기 (ALL)</option>
                    <option value="A_ONLY">A에만 있음</option>
                    <option value="B_ONLY">B에만 있음</option>
                    <option value="DIFF">값이 다름 (A vs B)</option>
                    <option value="SAME">값이 같음 (SAME)</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <table id="data-table">
                <thead>
                    <tr>
                        <th colspan="100" style="text-align: center; font-weight: 500;">
                            엑셀 파일을 불러오고 비교를 실행해주세요.
                        </th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </main>

    <div id="toast-area" aria-live="polite" aria-atomic="true"></div>

    <script src="exceljs.min.js"></script> 

    <script>
        (function() {
            const COMPOSITE_KEY_NAME = '_COMPOSITE_KEY';
            
            const state = {
                fileA: { data: [], headers: [], name: "" },
                fileB: { data: [], headers: [], name: "" },
                comparison: { data: [], headers: [], summary: {} },
                keyColumn: "", 
                resultFilter: "NOT_SAME", 
                sort: { column: null, direction: 'asc' },
                compositeKeyFields: [] 
            };

            const escMap = {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"};
            const esc = s => String(s ?? "").replace(/[&<>"']/g, ch => escMap[ch]);
            const uid = () => "S" + Math.random().toString(36).slice(2,8).toUpperCase();

            function cellToString(v) {
                if (v == null) return "";
                if (typeof v === "object" && v.text) return String(v.text);
                if (typeof v === "object" && Array.isArray(v.richText)) return v.richText.map(rt => rt.text || "").join("");
                if (typeof v === "object" && v.result != null) return cellToString(v.result);
                return String(v).trim();
            }
            
            let lastToastKey = "";
            let lastToastTime = 0;
            function toast(msg, type = "info") {
                const area = document.getElementById("toast-area");
                if (!area || !msg) return;
                const key = type + "::" + msg;
                const now = Date.now();
                if (key === lastToastKey && now - lastToastTime < 200) return;
                lastToastKey = key;
                lastToastTime = now;
                const icon = { ok: "✅", warn: "⚠️", bad: "⛔", info: "ℹ️" }[type] || "ℹ️";
                const el = document.createElement("div");
                el.className = "toast " + (type || "info");
                el.innerHTML = `<div style="display:flex; gap:10px;">${icon} <div style="font-size:13px; line-height:1.4">${esc(msg)}</div></div>`;
                area.appendChild(el);
                setTimeout(() => { if (el.parentNode === area) area.removeChild(el); }, 3000);
            }

            async function importXlsxFile(file, fileKey) {
                try {
                    // ExcelJS의 존재 여부 확인 및 경고 유지
                    if (typeof window.ExcelJS === 'undefined' || !window.ExcelJS.Workbook) {
                        toast("엑셀 파일 로드를 위해 'exceljs.min.js' 파일을 HTML과 같은 경로에 두어야 합니다.", "bad");
                        throw new Error("ExcelJS 라이브러리를 찾을 수 없습니다.");
                    }
                    
                    const buf = await file.arrayBuffer();
                    const wb = new ExcelJS.Workbook();
                    await wb.xlsx.load(buf);

                    let ws = wb.getWorksheet("Sheet1");
                    if (!ws) {
                        const allSheets = Object.values(wb.worksheets);
                        if (allSheets.length > 0) {
                            ws = allSheets[0];
                        }
                    }
                    
                    if (!ws) throw new Error("엑셀 파일에서 워크시트를 찾을 수 없습니다.");

                    const headerRow = ws.getRow(1);
                    const headers = [];
                    const headerMap = {};
                    headerRow.eachCell((cell, col) => {
                        const h = cellToString(cell.value).trim();
                        if (h) { headerMap[col] = h; headers.push(h); }
                    });
                    if (headers.length === 0) throw new Error("엑셀에서 컬럼 헤더(첫 번째 행)를 찾을 수 없습니다.");
                    
                    const data = [];
                    const lastValues = {}; 
                    
                    ws.eachRow((row, rowNumber) => {
                        if (rowNumber === 1) return;
                        const item = { rowNumber, rawData: {} };
                        let rowHasValue = false;
                        
                        row.eachCell((cell, col) => {
                            const headerName = headerMap[col];
                            if (headerName) {
                                const value = cellToString(cell.value);
                                if (value) {
                                    lastValues[headerName] = value;
                                    rowHasValue = true;
                                }
                            }
                        });
                        
                        for (const headerName of headers) {
                            const ffillValue = lastValues[headerName] || "";
                            item[headerName] = ffillValue;
                            item.rawData[headerName] = ffillValue; 
                            if (ffillValue) rowHasValue = true;
                        }

                        if (rowHasValue) {
                            data.push(item);
                        }
                    });
                    
                    state[fileKey].data = data;
                    state[fileKey].headers = headers;
                    state[fileKey].name = file.name;

                    document.getElementById(`status-${fileKey.toLowerCase().slice(-1)}`).textContent = `${file.name} (${data.length}건)`;
                    toast(`파일 ${fileKey.slice(-1)} 로드 완료: ${data.length}건`, "ok");
                    
                    if (fileKey === 'fileA' || fileKey === 'fileB') {
                        state.compositeKeyFields = [];
                        state.keyColumn = ""; 
                        document.getElementById('key-column-select').value = "";
                    }

                    if (state.fileA.data.length > 0 && state.fileB.data.length > 0) {
                        updateKeyColumnOptions();
                    }

                } catch (e) {
                    console.error(e);
                    document.getElementById(`status-${fileKey.toLowerCase().slice(-1)}`).textContent = `로드 오류: ${e.message.split(':')[0]}`;
                    toast(`파일 ${fileKey.slice(-1)} 로드 오류: ${e.message}`, "bad");
                    state[fileKey].data = [];
                    state[fileKey].headers = [];
                    state[fileKey].name = "";
                }
            }
            
            function updateKeyColumnOptions() {
                const singleSelectEl = document.getElementById("key-column-select");
                const compositeOptionsEl = document.getElementById("composite-key-options");
                if (!singleSelectEl || !compositeOptionsEl) return;
                
                const headersA = new Set(state.fileA.headers);
                const commonHeaders = state.fileB.headers.filter(h => headersA.has(h));
                
                // 1. 단일 키 드롭다운 채우기
                singleSelectEl.innerHTML = '<option value="">컬럼 선택</option>';
                commonHeaders.forEach(h => {
                    const option = document.createElement('option');
                    option.value = h;
                    option.textContent = h;
                    singleSelectEl.appendChild(option);
                });
                
                // 2. 복합 키 체크박스 채우기
                compositeOptionsEl.innerHTML = '';
                if (commonHeaders.length === 0) {
                     compositeOptionsEl.innerHTML = '<p style="color: var(--muted);">두 파일을 모두 불러오면 공통 컬럼이 표시됩니다.</p>';
                } else {
                    commonHeaders.forEach(h => {
                        const isChecked = state.compositeKeyFields.includes(h);
                        const label = document.createElement('label');
                        label.innerHTML = `<input type="checkbox" data-header="${esc(h)}" ${isChecked ? 'checked' : ''} /> ${esc(h)}`;
                        label.querySelector('input').addEventListener('change', handleCompositeKeyChange);
                        compositeOptionsEl.appendChild(label);
                    });
                }
                
                // 기존 상태 복원
                if (state.keyColumn && commonHeaders.includes(state.keyColumn)) {
                    singleSelectEl.value = state.keyColumn;
                } else if (state.keyColumn === 'COMPOSITE_MODE' && state.compositeKeyFields.length > 0) {
                     // 복합 키 모드일 경우 단일 키는 비워둠
                } else {
                    state.keyColumn = "";
                }
            }
            
            function handleCompositeKeyChange(e) {
                const header = e.target.dataset.header;
                const isChecked = e.target.checked;
                
                // 단일 키 선택 초기화
                document.getElementById('key-column-select').value = "";
                
                if (isChecked && !state.compositeKeyFields.includes(header)) {
                    state.compositeKeyFields.push(header);
                } else if (!isChecked && state.compositeKeyFields.includes(header)) {
                    state.compositeKeyFields = state.compositeKeyFields.filter(h => h !== header);
                }
                
                // 복합 키를 선택하면, 키 컬럼 상태를 복합 키 모드로 설정
                if (state.compositeKeyFields.length >= 1) {
                     state.keyColumn = 'COMPOSITE_MODE';
                } else {
                    state.keyColumn = "";
                }
                
                toast(`복합 키 설정 변경: ${state.compositeKeyFields.join(', ')}`, 'info');
            }

            function compareFiles() {
                const { fileA, fileB, keyColumn } = state;
                const isCompositeMode = keyColumn === 'COMPOSITE_MODE';

                if (!keyColumn) {
                    toast("비교를 시작하기 전에 키 컬럼을 선택하거나 복합 키를 설정해 주세요.", "warn");
                    return;
                }
                if (fileA.data.length === 0 || fileB.data.length === 0) {
                    toast("두 개의 엑셀 파일을 모두 불러와야 비교할 수 있습니다.", "warn");
                    return;
                }
                
                if (isCompositeMode && state.compositeKeyFields.length < 1) {
                    toast("복합 키를 사용하려면 1개 이상의 컬럼을 선택해야 합니다.", "warn");
                    return;
                }
                
                state.sort = { column: null, direction: 'asc' };

                let actualKeyColumn = keyColumn;
                let mapA, mapB;
                const keyFields = isCompositeMode ? state.compositeKeyFields : [keyColumn];

                if (isCompositeMode) {
                    actualKeyColumn = COMPOSITE_KEY_NAME;

                    // 복합 키 생성 로직 (엑셀 내용 반영)
                    const createMap = (file) => {
                        const data = file.data.map(item => {
                            const keyParts = keyFields.map(k => item[k] || "");
                            if (keyParts.length > 0) {
                                item[actualKeyColumn] = keyParts.join('_');
                            } else {
                                item[actualKeyColumn] = uid();
                            }
                            return item;
                        });
                        return new Map(data.map(item => [item[actualKeyColumn], item]));
                    };
                    mapA = createMap(fileA);
                    mapB = createMap(fileB);

                } else {
                    mapA = new Map(fileA.data.map(item => [item[keyColumn], item]));
                    mapB = new Map(fileB.data.map(item => [item[keyColumn], item]));
                }
                
                const commonHeaders = fileA.headers.filter(h => fileB.headers.includes(h));
                // 복합 키 모드일 경우, 키로 사용된 컬럼은 nonKeyHeaders에서 제외
                const nonKeyHeaders = commonHeaders.filter(h => h !== actualKeyColumn && !keyFields.includes(h)); 

                const allKeys = new Set([...mapA.keys(), ...mapB.keys()]);
                
                const comparisonData = [];
                let summary = { A_ONLY: 0, B_ONLY: 0, DIFF: 0, SAME: 0, TOTAL: allKeys.size };

                for (const key of allKeys) {
                    const itemA = mapA.get(key);
                    const itemB = mapB.get(key);
                    
                    const result = {
                        [actualKeyColumn]: key, 
                        _COMPARE_STATUS: '', 
                        _A_EXISTS: !!itemA,
                        _B_EXISTS: !!itemB,
                    };
                    
                    if (itemA && itemB) {
                        let isDiff = false;
                        
                        for (const header of nonKeyHeaders) {
                            const valA = itemA[header] || "";
                            const valB = itemB[header] || "";
                            
                            result[`${header} (A)`] = valA;
                            result[`${header} (B)`] = valB;
                            
                            if (valA !== valB) {
                                isDiff = true;
                                result[`${header}_DIFF`] = true;
                            }
                        }
                        
                        // 키 컬럼 자체의 값도 표시
                        keyFields.forEach(k => { result[k] = itemA[k] || ""; });
                        
                        if (isDiff) {
                            result._COMPARE_STATUS = 'DIFF';
                            summary.DIFF++;
                        } else {
                            result._COMPARE_STATUS = 'SAME';
                            summary.SAME++;
                        }

                    } else if (itemA) { 
                        result._COMPARE_STATUS = 'A_ONLY';
                        summary.A_ONLY++;
                        for (const header of nonKeyHeaders) {
                            result[`${header} (A)`] = itemA[header] || "";
                            result[`${header} (B)`] = "";
                        }
                        keyFields.forEach(k => { result[k] = itemA[k] || ""; });
                    } else if (itemB) { 
                        result._COMPARE_STATUS = 'B_ONLY';
                        summary.B_ONLY++;
                        for (const header of nonKeyHeaders) {
                            result[`${header} (A)`] = "";
                            result[`${header} (B)`] = itemB[header] || "";
                        }
                        keyFields.forEach(k => { result[k] = itemB[k] || ""; });
                    }

                    comparisonData.push(result);
                }
                
                state.comparison.data = comparisonData;
                state.comparison.summary = summary;
                
                let comparisonHeaders = [];
                comparisonHeaders = keyFields; // 키 컬럼 먼저 표시
                
                nonKeyHeaders.forEach(h => {
                    comparisonHeaders.push(`${h} (A)`);
                    comparisonHeaders.push(`${h} (B)`);
                });
                
                state.comparison.headers = comparisonHeaders;
                
                renderSummary();
                renderTable();
                toast("파일 비교가 완료되었습니다.", "ok");
            }

            function renderSummary() {
                const container = document.getElementById("summary-container");
                if (!container) return;
                
                const { summary } = state.comparison;
                
                if (summary.TOTAL === 0) {
                    container.style.display = 'none';
                    return;
                }
                
                container.style.display = 'grid';
                container.style.gridTemplateColumns = 'repeat(3, 1fr)';
                container.innerHTML = `
                    <div class="summary-item summary-a">
                        <h3>A에만 있음 (고유)</h3>
                        <span class="count">${summary.A_ONLY || 0}</span>
                    </div>
                    <div class="summary-item summary-b">
                        <h3>B에만 있음 (고유)</h3>
                        <span class="count">${summary.B_ONLY || 0}</span>
                    </div>
                    <div class="summary-item summary-diff">
                        <h3>값이 다름 (수정됨)</h3>
                        <span class="count">${summary.DIFF || 0}</span>
                    </div>
                `;
            }

            function filteredAndSortedData() {
                let list = state.comparison.data;
                const filter = state.resultFilter;

                if (filter) {
                    if (filter === 'NOT_SAME') {
                        list = list.filter(item => item._COMPARE_STATUS !== 'SAME');
                    } else {
                        list = list.filter(item => item._COMPARE_STATUS === filter);
                    }
                }
                
                const { column, direction } = state.sort;
                if (column) {
                    list.sort((a, b) => {
                        const valA = String(a[column] || "");
                        const valB = String(b[column] || "");
                        
                        let comparison = 0;
                        if (valA > valB) comparison = 1;
                        else if (valA < valB) comparison = -1;
                        
                        return direction === 'asc' ? comparison : comparison * -1;
                    });
                }

                return list;
            }

            function renderTable() {
                const thead = document.querySelector("#data-table thead");
                const tbody = document.querySelector("#data-table tbody");
                const cntEl = document.getElementById("list-count");
                if (!thead || !tbody) return;
                
                const list = filteredAndSortedData();
                const displayHeaders = state.comparison.headers;
                
                if (state.comparison.data.length === 0) {
                    thead.innerHTML = `<tr><th colspan="100" style="text-align: center; font-weight: 500;">엑셀 파일을 불러오고 비교를 실행해주세요.</th></tr>`;
                } else {
                    const headerHTML = displayHeaders.map(h => {
                        const isSorted = state.sort.column === h;
                        const indicator = isSorted ? (state.sort.direction === 'asc' ? ' ▲' : ' ▼') : '';
                        return `<th data-column="${esc(h)}">${esc(h)}${indicator}</th>`;
                    }).join('');
                    thead.innerHTML = `<tr>${headerHTML}</tr>`;
                    
                    thead.querySelectorAll('th').forEach(th => {
                        th.addEventListener('click', handleSort);
                    });
                }

                tbody.innerHTML = "";
                
                if (state.comparison.data.length > 0 && list.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="${displayHeaders.length || 1}" style="text-align:center;">필터 조건에 맞는 데이터가 없습니다.</td></tr>`;
                } else {
                    list.forEach(item => {
                        const tr = document.createElement("tr");
                        const statusClass = item._COMPARE_STATUS ? `status-${item._COMPARE_STATUS.toLowerCase().replace('_', '-')}` : '';
                        
                        const cells = displayHeaders.map(h => {
                            const value = item[h] || "";
                            
                            let cellClass = '';
                            const headerName = h.replace(' (A)', '').replace(' (B)', '');
                            
                            if ((h.includes(' (A)') || h.includes(' (B)')) && item[`${headerName}_DIFF`]) {
                                cellClass = 'status-diff';
                            }
                            
                            return `<td class="${cellClass}" title="${esc(value)}">${esc(value)}</td>`;
                        }).join("");
                        
                        tr.className = statusClass;
                        tr.innerHTML = cells; 
                        tbody.appendChild(tr);
                    });
                }

                if (cntEl) cntEl.textContent = list.length + "건 / " + (state.comparison.data.length || 0) + "건";
            }
            
            function handleSort(e) {
                const column = e.currentTarget.dataset.column;
                if (!column) return;
                
                let direction = 'asc';
                if (state.sort.column === column) {
                    direction = state.sort.direction === 'asc' ? 'desc' : 'asc';
                }
                
                state.sort.column = column;
                state.sort.direction = direction;
                renderTable();
            }

            async function exportXlsx() {
                if (!state.comparison.data.length) {
                    toast("내보낼 비교 결과 데이터가 없습니다. 비교를 먼저 실행해 주세요.", "warn");
                    return;
                }
                
                const list = filteredAndSortedData();
                if (!list.length) {
                    toast("현재 필터링된 내용이 없습니다.", "warn");
                    return;
                }

                const exportHeaders = state.comparison.headers;
                
                // 1. 헤더 행 생성
                let csv = exportHeaders.map(h => `"${h.replace(/"/g, '""')}"`).join(',') + ',"비교_상태"\n';

                // 2. 데이터 행 생성
                list.forEach(item => {
                    const rowData = exportHeaders.map(h => {
                        const value = String(item[h] || "");
                        return `"${value.replace(/"/g, '""')}"`;
                    }).join(',');
                    
                    csv += rowData + `,"${item._COMPARE_STATUS}"\n`;
                });
                
                // 3. 다운로드 실행 (순수 JS)
                try {
                    const blob = new Blob(["\uFEFF", csv], { type: "text/csv;charset=utf-8;" }); 
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    const today = new Date().toISOString().slice(0, 10).replace(/-/g, "");
                    a.download = "Excel_Comparison_Export_" + today + ".csv";
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    toast("현재 조회 내용이 CSV 파일로 다운로드되었습니다.", "ok");
                } catch (e) {
                    console.error("CSV Export Error:", e);
                    toast(`CSV 내보내기 중 오류가 발생했습니다. (Error: ${e.message})`, "bad");
                }
            }

            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById("xlsxFileA").addEventListener("change", (e) => {
                    const file = e.target.files && e.target.files[0];
                    if (file) importXlsxFile(file, 'fileA');
                    e.target.value = "";
                });
                document.getElementById("xlsxFileB").addEventListener("change", (e) => {
                    const file = e.target.files && e.target.files[0];
                    if (file) importXlsxFile(file, 'fileB');
                    e.target.value = "";
                });
                
                document.getElementById("btn-compare").addEventListener("click", compareFiles);
                document.getElementById("btn-export").addEventListener("click", exportXlsx);

                document.getElementById("key-column-select").addEventListener("change", (e) => {
                    state.keyColumn = e.target.value;
                    if (state.keyColumn !== 'COMPOSITE_MODE') {
                        state.compositeKeyFields = [];
                        document.querySelectorAll('#composite-key-options input[type="checkbox"]').forEach(cb => cb.checked = false);
                    }
                });
                
                document.getElementById("result-filter-select").addEventListener("change", (e) => {
                    state.resultFilter = e.target.value;
                    renderTable();
                });

                renderTable();
            });
        })();
    </script>
</body>
</html>
