<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel Sheet Splitter</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      --bg-body: #F9FAFB;
      --bg-surface: #FFFFFF;
      --border-light: #F3F4F6;
      --border-base: #E5E7EB;
      --text-main: #111827;
      --text-muted: #6B7280;
      --primary: #111827;       
      --primary-hover: #374151;
      --secondary: #FFFFFF;
      --secondary-hover: #F9FAFB;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    .dashboard-header {
      max-width: 1000px;
      margin: 0 auto 24px auto;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .title-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .title-area i { font-size: 28px; color: var(--text-main); }
    h2 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    
    .actions { display: flex; gap: 10px; }

    input[type="file"] { display: none; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--primary); color: white;
      box-shadow: var(--shadow-sm);
    }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }
    
    .btn-outline {
      background: var(--secondary); color: var(--text-main);
      border-color: var(--border-base); box-shadow: var(--shadow-sm);
    }
    .btn-outline:hover { background: var(--secondary-hover); border-color: #D1D5DB; }

    .instructions {
      display: flex; gap: 20px; align-items: center;
      font-size: 13px; color: var(--text-muted);
      background: var(--bg-surface); padding: 12px 20px;
      border-radius: var(--radius-md); border: 1px solid var(--border-base);
    }
    .instructions span { display: inline-flex; align-items: center; gap: 6px; }
    .instructions i { font-size: 16px; }

    #main-wrapper {
      max-width: 1000px; margin: 0 auto;
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-lg);
      min-height: 400px;
      box-shadow: var(--shadow-md);
      position: relative;
    }

    .empty-msg {
      padding: 120px 20px; text-align: center; color: var(--text-muted);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .empty-msg i { font-size: 40px; color: #D1D5DB; }

    .sheet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 24px;
    }
    
    .sheet-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--secondary);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    
    .sheet-card:hover {
      border-color: var(--text-muted);
      background: var(--bg-body);
    }

    .sheet-card.selected {
      border-color: #10B981; 
      background: #F0FDF4;
    }

    .sheet-card input[type="checkbox"] {
      width: 18px; height: 18px;
      cursor: pointer;
      accent-color: #10B981;
    }

    .sheet-name {
      font-size: 15px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    #file-info {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-base);
      display: flex;
      justify-content: space-between;
      align-items: center;
      display: none;
    }

    #loading-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.85);
      display: none; justify-content: center; align-items: center; flex-direction: column; gap: 12px;
      border-radius: var(--radius-lg); z-index: 10;
      font-weight: 600; color: var(--primary); font-size: 16px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .ph-spin {
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>

  <div class="dashboard-header">
    <div class="header-top">
      <div class="title-area">
        <i class="ph ph-folder-notch-open"></i>
        <h2>Excel Sheet Splitter</h2>
      </div>
      
      <div class="actions">
        <label for="upload-excel" class="btn btn-outline">
          <i class="ph ph-upload-simple"></i> 파일 불러오기
        </label>
        <input type="file" id="upload-excel" accept=".xlsx" />
        
        <button id="export-btn" class="btn btn-primary" onclick="exportSelectedSheets()" style="display: none;">
          <i class="ph ph-download-simple"></i> 폴더 선택하고 최적화 저장
        </button>
      </div>
    </div>

    <div class="instructions">
      <span><i class="ph ph-upload-simple"></i> 1. 엑셀 업로드(.xlsx)</span>
      <span style="color: #D1D5DB;">|</span>
      <span><i class="ph ph-check-square"></i> 2. 쪼갤 시트 체크</span>
      <span style="color: #D1D5DB;">|</span>
      <span><i class="ph ph-folder"></i> 3. 이미지 유지하며 초경량 저장</span>
    </div>
  </div>

  <div id="main-wrapper">
    <div id="loading-overlay">
      <i class="ph ph-spinner ph-spin" style="font-size: 32px; color: #10B981;"></i>
      <span id="loading-text">처리 중... 잠시만 기다려주세요.</span>
    </div>

    <div id="file-info">
      <div style="font-weight: 600; font-size: 15px;"><i class="ph ph-file-text"></i> <span id="display-filename">파일명</span></div>
      <div>
        <button class="btn btn-outline" style="padding: 6px 12px; font-size: 13px;" onclick="toggleAllSheets(true)">전체 선택</button>
        <button class="btn btn-outline" style="padding: 6px 12px; font-size: 13px;" onclick="toggleAllSheets(false)">전체 해제</button>
      </div>
    </div>
    
    <div id="sheet-list-container">
      <div class="empty-msg">
        <i class="ph ph-folder-open"></i>
        엑셀 파일을 업로드하면 시트 목록이 여기에 표시됩니다.
      </div>
    </div>
  </div>

  <script>
    let originalFileBuffer = null; 
    let originalFileName = "extracted_sheets";
    let sheetNamesList = [];

    const container = document.getElementById('sheet-list-container');
    const fileInfoBar = document.getElementById('file-info');
    const exportBtn = document.getElementById('export-btn');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');

    document.getElementById('upload-excel').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      originalFileName = file.name.replace(/\.[^/.]+$/, "");
      document.getElementById('display-filename').textContent = file.name;
      
      showLoading(true, "파일을 읽고 있습니다...");

      setTimeout(() => {
        const reader = new FileReader();
        reader.onload = async function(evt) {
          try {
            originalFileBuffer = evt.target.result;
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(originalFileBuffer);
            
            sheetNamesList = [];
            workbook.eachSheet(function(worksheet, sheetId) {
              sheetNamesList.push({ id: sheetId, name: worksheet.name });
            });

            renderSheetList();
          } catch (error) {
            console.error("Excel 파싱 에러:", error);
            alert("파일을 분석하는 중 오류가 발생했습니다.\n\n상세 에러: " + error.message);
          } finally {
            showLoading(false);
            document.getElementById('upload-excel').value = ''; 
          }
        };
        reader.readAsArrayBuffer(file);
      }, 150);
    });

    function renderSheetList() {
      if (sheetNamesList.length === 0) return;

      let html = '<div class="sheet-grid">';
      sheetNamesList.forEach((sheet) => {
        const safeSheetName = sheet.name.replace(/"/g, '&quot;');
        html += `
          <label class="sheet-card selected">
            <input type="checkbox" value="${safeSheetName}" checked onchange="toggleCardStyle(this)">
            <div>
              <div class="sheet-name">${sheet.name}</div>
            </div>
          </label>
        `;
      });
      html += '</div>';
      container.innerHTML = html;
      fileInfoBar.style.display = 'flex';
      exportBtn.style.display = 'inline-flex';
    }

    function toggleCardStyle(checkbox) {
      const card = checkbox.closest('.sheet-card');
      if (checkbox.checked) card.classList.add('selected');
      else card.classList.remove('selected');
    }

    function toggleAllSheets(selectAll) {
      const checkboxes = document.querySelectorAll('.sheet-card input[type="checkbox"]');
      checkboxes.forEach(cb => {
        cb.checked = selectAll;
        toggleCardStyle(cb);
      });
    }

    // ★ 용량 최적화 + 폴더 직접 저장 + 이미지 복사 적용 ★
    async function exportSelectedSheets() {
      if (!originalFileBuffer) return;

      const selectedCheckboxes = document.querySelectorAll('.sheet-card input[type="checkbox"]:checked');
      if (selectedCheckboxes.length === 0) {
        alert("저장할 시트를 하나 이상 선택해주세요.");
        return;
      }

      if (!window.showDirectoryPicker) {
        alert("이 브라우저는 지정 폴더에 직접 저장하는 기능을 지원하지 않습니다.\n크롬(Chrome)이나 엣지(Edge) 최신 버전을 사용해주세요.");
        return;
      }

      const selectedSheetNames = Array.from(selectedCheckboxes).map(cb => cb.value);

      try {
        const dirHandle = await window.showDirectoryPicker({
          mode: 'readwrite',
          startIn: 'documents'
        });

        showLoading(true, "데이터 최적화 및 이미지 복사 중...");
        await new Promise(resolve => setTimeout(resolve, 150));

        const originalWorkbook = new ExcelJS.Workbook();
        await originalWorkbook.xlsx.load(originalFileBuffer); 

        for (const targetSheetName of selectedSheetNames) {
          const sourceSheet = originalWorkbook.getWorksheet(targetSheetName);
          
          const newWb = new ExcelJS.Workbook();
          const newSheet = newWb.addWorksheet(targetSheetName);

          // 1. 열(Column) 너비 복사
          sourceSheet.columns.forEach((col, idx) => {
            if (col && col.width) {
              newSheet.getColumn(idx + 1).width = col.width;
            }
          });

          // 2. 행(Row) 높이, 셀(Cell) 데이터 및 서식 복사
          sourceSheet.eachRow({ includeEmpty: true }, (row, rowNumber) => {
            const newRow = newSheet.getRow(rowNumber);
            newRow.height = row.height;
            
            row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
              const newCell = newRow.getCell(colNumber);
              newCell.value = cell.value;
              newCell.style = cell.style; 
            });
          });

          // 3. 병합된 셀(Merge) 복사
          if (sourceSheet.model.merges) {
            sourceSheet.model.merges.forEach(merge => {
              newSheet.mergeCells(merge);
            });
          }

          // ★ 4. 이미지(Images) 복사 로직 추가 ★
          const images = sourceSheet.getImages();
          if (images && images.length > 0) {
            for (const image of images) {
              // 원본 워크북에서 해당 이미지의 바이너리 데이터를 가져옴
              const originalImage = originalWorkbook.getImage(image.imageId);
              
              // 새 워크북에 이미지를 등록하고 새 ID를 발급받음
              const newImageId = newWb.addImage({
                buffer: originalImage.buffer,
                extension: originalImage.extension,
              });
              
              // 등록된 이미지를 새 시트의 원본과 동일한 좌표(range)에 삽입
              newSheet.addImage(newImageId, image.range);
            }
          }

          // 파일 저장
          const buffer = await newWb.xlsx.writeBuffer();
          const safeFileName = targetSheetName.replace(/[\\/:*?"<>|]/g, "_");
          
          const fileHandle = await dirHandle.getFileHandle(`${safeFileName}.xlsx`, { create: true });
          const writable = await fileHandle.createWritable();
          await writable.write(buffer);
          await writable.close();
        }

        alert("🎉 이미지까지 모두 포함하여 최적화된 용량으로 저장되었습니다!");

      } catch (error) {
        if (error.name === 'AbortError') {
          console.log("폴더 선택이 취소되었습니다.");
        } else {
          console.error("저장 에러:", error);
          alert("저장 중 문제가 발생했습니다.\n\n상세 에러: " + error.message);
        }
      } finally {
        showLoading(false);
      }
    }

    function showLoading(show, text = "처리 중...") {
      if (show) {
        loadingText.textContent = text;
        loadingOverlay.style.display = 'flex';
        exportBtn.disabled = true;
      } else {
        loadingOverlay.style.display = 'none';
        exportBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
