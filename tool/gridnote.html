<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>악필교정 워크북</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&family=Nanum+Pen+Script&family=Poor+Story&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --bg-color: #f0f2f5;
        --paper-color: #ffffff;
        
        /* 색상 설정 */
        --line-gray: #bbb;
        --line-guide: #e0e0e0;
        --line-base-red: #ff8a80;
        
        /* 크기 설정 */
        --row-height: 70px; 
        
        /* 폰트 */
        --font-print: 'Nanum Gothic', sans-serif;
        --font-hand: 'Nanum Pen Script', cursive;
        --font-eng: 'Poor Story', cursive;
    }

    * { box-sizing: border-box; outline: none; }
    body {
        margin: 0; background: var(--bg-color);
        font-family: 'Noto Sans KR', sans-serif;
        display: flex; flex-direction: column; align-items: center;
        min-height: 100vh; color: #333;
    }

    /* === 헤더 === */
    header {
        width: 100%; background: #fff; padding: 15px 30px;
        border-bottom: 1px solid #ddd;
        display: flex; justify-content: space-between; align-items: center;
        position: sticky; top: 0; z-index: 100;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .brand { font-size: 20px; font-weight: 800; color: #2c3e50; display: flex; align-items: center; gap: 10px; }
    .controls { display: flex; gap: 8px; }

    .btn {
        padding: 8px 16px; border-radius: 6px; border: 1px solid #ccc;
        background: #fff; cursor: pointer; font-size: 14px; font-weight: 500;
        display: flex; align-items: center; gap: 6px; color: #555;
    }
    .btn:hover { background: #f8f9fa; border-color: #bbb; }
    .btn-mode-active { background: #e3f2fd; border-color: #2196f3; color: #1976d2; font-weight: 700; }
    .btn-primary { background: #333; color: #fff; border-color: #333; }
    .btn-primary:hover { background: #555; }

    /* === 종이 영역 === */
    .paper-container {
        width: 210mm; min-height: 297mm; background: var(--paper-color);
        margin: 30px auto; padding: 20mm;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        display: flex; flex-direction: column;
        border-top: 5px solid #2c3e50;
    }

    /* === 행(Row) 스타일 === */
    .practice-row {
        position: relative; width: 100%; height: var(--row-height);
        margin-bottom: 15px; display: flex;
    }

    /* --- [한글 깍두기 모드] --- */
    .mode-kor .bg-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; 
        border: 1px solid var(--line-gray);
    }
    .mode-kor .grid-box {
        flex: 1; height: 100%;
        border-right: 1px solid var(--line-gray);
        position: relative;
        /* 핵심: Flexbox로 글자를 정중앙에 강제 정렬 */
        display: flex; align-items: center; justify-content: center;
        font-size: 42px; /* 글자 크기 */
        color: #111;
        font-family: var(--font-print); /* 기본 폰트 */
        z-index: 1;
    }
    .mode-kor .grid-box:last-child { border-right: none; }

    /* 십자 가이드 점선 */
    .mode-kor .grid-box::before {
        content: ''; position: absolute; top: 50%; left: 0; right: 0;
        border-top: 1px dashed var(--line-guide); z-index: -1;
    }
    .mode-kor .grid-box::after {
        content: ''; position: absolute; top: 0; bottom: 0; left: 50%;
        border-left: 1px dashed var(--line-guide); z-index: -1;
    }

    /* --- [영어 4선 모드] --- */
    .mode-eng .bg-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column;
    }
    .mode-eng .line-1 { height: 34%; border-top: 1px solid var(--line-gray); border-bottom: 1px dashed #999; box-sizing: border-box; }
    .mode-eng .line-2 { height: 33%; border-bottom: 1px solid var(--line-base-red); box-sizing: border-box; }
    .mode-eng .line-3 { height: 33%; border-bottom: 1px solid var(--line-gray); box-sizing: border-box; }

    /* === 입력창 (Input) 공통 === */
    .text-input {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 10; border: none; background: transparent;
        padding: 0; margin: 0; outline: none;
    }

    /* [한글 모드 입력창] - 투명하게 만들고 글자는 grid-box에 렌더링 */
    .mode-kor .text-input {
        color: transparent; /* 글자는 숨김 */
        caret-color: #333;  /* 커서는 보임 */
        font-family: monospace; /* 커서 이동 간격 일정하게 */
        letter-spacing: 56px; /* 커서가 얼추 따라가도록 설정 (화면비율 따라 다를 수 있음) */
        padding-left: 35px;   /* 첫 커서 위치 */
        font-size: 40px;
    }

    /* [영어 모드 입력창] - 기존 방식 유지 (연속 쓰기) */
    .mode-eng .text-input {
        color: #111;
        font-family: var(--font-eng);
        font-size: 36px;
        letter-spacing: 2px;
        padding-left: 10px;
        padding-top: 10px;
        line-height: normal;
    }

    /* 필기체 모드 폰트 적용 */
    .cursive-mode.mode-kor .grid-box { font-family: var(--font-hand); font-size: 50px; padding-top: 5px; }
    
    .del-btn {
        position: absolute; right: -30px; top: 50%; transform: translateY(-50%);
        color: #ccc; cursor: pointer; display: none; padding: 5px;
    }
    .practice-row:hover .del-btn { display: block; }
    .del-btn:hover { color: #f44336; }

    @media print {
        header, .del-btn, .tip-box { display: none !important; }
        .paper-container { box-shadow: none; margin: 0; padding: 15mm; border: none; width: 100%; }
        /* 인쇄 시 placeholder 숨김 */
        .text-input::placeholder { color: transparent; }
    }
</style>
</head>
<body id="app-body">

<header>
    <div class="brand">
        <i class="fas fa-pen-nib"></i> 글씨교정
    </div>
    <div class="controls">
        <button class="btn btn-mode-active" id="btn-kor" onclick="changeMode('kor')">한글(깍두기)</button>
        <button class="btn" id="btn-eng" onclick="changeMode('eng')">영어(4선지)</button>
        <div style="width:1px; background:#ddd; height:20px; margin:0 6px;"></div>
        <button class="btn" id="btn-font" onclick="toggleFont()">고딕체(책 스타일)</button>
        <button class="btn" onclick="clearText()"><i class="fas fa-eraser"></i></button>
        <button class="btn" onclick="addRows(1)"><i class="fas fa-plus"></i> 줄 추가</button>
        <button class="btn btn-primary" onclick="window.print()"><i class="fas fa-print"></i> 인쇄</button>
    </div>
</header>

<div class="paper-container" id="paper">
    <div class="tip-box" id="tip-msg" style="background:#fff3e0; border-left:5px solid #ff9800; padding:15px; margin-bottom:25px; border-radius:4px; font-size:14px; line-height:1.6; color:#5d4037;">
        <strong>💡 한글 연습 Tip</strong><br>
        자음과 모음의 비율을 1:1로 맞추고, 각 칸의 <strong>정중앙</strong>에 글자를 쓰는 연습을 하세요.<br>
    </div>
</div>

<script>
    let currentMode = 'kor'; 
    let isCursive = false;
    const paper = document.getElementById('paper');
    const tipMsg = document.getElementById('tip-msg');

    window.onload = () => {
        addRows(9);
        // 초기 예시 입력 (렌더링 함수 호출 필요)
        setTimeout(() => {
            const inputs = document.querySelectorAll('.text-input');
            if(inputs[0]) { inputs[0].value = "가갸거겨고교구규그기"; handleInput(inputs[0]); }
            if(inputs[1]) { inputs[1].value = "안녕하세요반갑습니다"; handleInput(inputs[1]); }
            if(inputs[2]) { inputs[2].value = "악필교정할수있습니다"; handleInput(inputs[2]); }
        }, 100);
    };

    function changeMode(mode) {
        if(currentMode === mode) return;
        if(!confirm("모드를 변경하면 내용이 초기화됩니다.")) return;
        currentMode = mode;
        
        document.getElementById('btn-eng').className = mode === 'eng' ? 'btn btn-mode-active' : 'btn';
        document.getElementById('btn-kor').className = mode === 'kor' ? 'btn btn-mode-active' : 'btn';
        
        if(mode === 'eng') {
            tipMsg.innerHTML = "<strong>💡 영어 연습 Tip</strong><br>책에서 권장하는 4선 노트입니다. 붉은색 기준선(Base Line)에 맞춰 연습하세요.";
        } else {
            tipMsg.innerHTML = "<strong>💡 한글 연습 Tip</strong><br>자음과 모음의 비율을 1:1로 맞추고, 각 칸의 정중앙에 글자를 쓰는 연습을 하세요.";
        }

        const rows = document.querySelectorAll('.practice-row');
        rows.forEach(row => row.remove());
        addRows(9);
    }

    function addRows(count = 1) {
        for(let i=0; i<count; i++) {
            const row = document.createElement('div');
            row.className = `practice-row mode-${currentMode} ${isCursive ? 'cursive-mode' : ''}`;
            
            let bgHtml = '';
            if(currentMode === 'eng') {
                bgHtml = `<div class="bg-layer"><div class="line-1"></div><div class="line-2"></div><div class="line-3"></div></div>`;
            } else {
                // 한글 모드: 10개의 그리드 박스 생성
                bgHtml = '<div class="bg-layer">';
                for(let k=0; k<10; k++) {
                    bgHtml += '<div class="grid-box"></div>';
                }
                bgHtml += '</div>';
            }

            // oninput 이벤트 추가: 입력할 때마다 handleInput 실행
            row.innerHTML = bgHtml + 
                `<input type="text" class="text-input" spellcheck="false" oninput="handleInput(this)">` +
                `<i class="fas fa-times del-btn" onclick="this.parentElement.remove()"></i>`;
            
            paper.appendChild(row);
        }
    }

    // 핵심 로직: 입력값을 각 칸(Grid Box)에 분배
    function handleInput(input) {
        // 한글 모드가 아니면 실행 안 함 (영어는 그냥 입력창 사용)
        if(currentMode !== 'kor') return;

        const row = input.parentElement;
        const boxes = row.querySelectorAll('.grid-box');
        const text = input.value;

        // 모든 박스 초기화 후 글자 하나씩 넣기
        boxes.forEach((box, index) => {
            box.textContent = text[index] || ''; // 글자가 없으면 빈칸
        });
    }

    function toggleFont() {
        isCursive = !isCursive;
        const btnLabel = document.getElementById('btn-font');
        const rows = document.querySelectorAll('.practice-row');

        if (isCursive) {
            btnLabel.textContent = "필기체(손글씨)";
            rows.forEach(row => row.classList.add('cursive-mode'));
        } else {
            btnLabel.textContent = "고딕체(책 스타일)";
            rows.forEach(row => row.classList.remove('cursive-mode'));
        }
    }

    function clearText() {
        if(confirm("모든 내용을 지우시겠습니까?")) {
            const inputs = document.querySelectorAll('.text-input');
            inputs.forEach(input => {
                input.value = '';
                handleInput(input); // 지운 내용 반영
            });
        }
    }
</script>

</body>
</html>
