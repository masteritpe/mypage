<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하루 만에 끝내는 악필교정 - 영어 워크북</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Poor+Story&family=Cedarville+Cursive&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --bg-color: #fdfbf7;       /* 책의 종이 질감 느낌 */
        --paper-color: #ffffff;
        --line-ascender: #e0e0e0;  /* 연한 회색 */
        --line-middle: #9aa0a6;    /* 점선 */
        --line-base: #ff8a80;      /* 기준선 (책의 붉은 계열 포인트 반영) */
        --line-descender: #e0e0e0;
        
        --guideline-height: 80px;  /* 글씨 연습하기 편하게 조금 더 키움 */
        --row-gap: 30px;
        
        /* 책에서 강조하는 '고딕체 스타일' 폰트 */
        --font-print: 'Poor Story', sans-serif; 
        /* 필기체 (참고용) */
        --font-cursive: 'Cedarville Cursive', cursive;
    }

    * { box-sizing: border-box; outline: none; }
    body {
        margin: 0;
        background-color: var(--bg-color);
        font-family: 'Noto Sans KR', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        color: #444;
    }

    /* === Header & Controls === */
    header {
        width: 100%;
        background: #fff;
        padding: 15px 30px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
    }
    .brand { 
        font-size: 18px; 
        font-weight: 700; 
        color: #333; 
        display: flex; 
        align-items: center; 
        gap: 10px; 
    }
    .brand span {
        font-size: 14px;
        color: #666;
        font-weight: 400;
        background: #f0f0f0;
        padding: 4px 8px;
        border-radius: 4px;
    }
    .controls { display: flex; gap: 10px; }

    .btn {
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid #ddd;
        background: #fff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
        color: #555;
        font-family: 'Noto Sans KR';
    }
    .btn:hover { background: #f5f5f5; border-color: #ccc; }
    
    .btn-primary { 
        background: #333; 
        color: #fff; 
        border-color: #333; 
    }
    .btn-primary:hover { background: #555; }

    /* === A4 Paper Layout === */
    .paper-container {
        width: 210mm;
        min-height: 297mm;
        background: var(--paper-color);
        margin: 30px auto;
        padding: 20mm;
        box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        display: flex;
        flex-direction: column;
        border-top: 5px solid #333; /* 책의 디자인 포인트 반영 */
    }

    /* === Guide Text (책의 팁) === */
    .tip-box {
        background: #f8f9fa;
        border-left: 4px solid #ff8a80;
        padding: 15px;
        margin-bottom: 30px;
        font-size: 13px;
        line-height: 1.6;
        color: #666;
    }
    .tip-box strong { color: #333; }

    /* === The 4-Line Row === */
    .english-row {
        position: relative;
        height: var(--guideline-height);
        width: 100%;
        display: flex;
        align-items: center;
        margin-bottom: var(--row-gap);
    }

    /* The Lines Background */
    .lines-bg {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 1;
        pointer-events: none;
    }

    /* 1. Top Line (Ascender) */
    .line-1 {
        position: absolute;
        top: 0; left: 0; right: 0;
        border-top: 1px solid var(--line-ascender);
        height: 32%;
    }
    
    /* 2. Middle Line (x-height top) - Dashed */
    .line-2 {
        position: absolute;
        top: 32%; left: 0; right: 0;
        border-top: 1px dashed var(--line-middle);
        height: 36%; /* x-height 비율 조정 */
    }

    /* 3. Base Line (Writing Line) - Red Accent */
    .line-3 {
        position: absolute;
        top: 68%; left: 0; right: 0;
        border-top: 2px solid var(--line-base);
        height: 32%;
    }

    /* 4. Bottom Line (Descender) */
    .line-4 {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        border-bottom: 1px solid var(--line-descender); 
    }

    /* Input Area */
    .text-input {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 2;
        border: none;
        background: transparent;
        font-family: var(--font-print);
        font-size: 42px; /* 폰트 크기 최적화 */
        line-height: 1;
        color: #222;
        padding: 0 10px;
        letter-spacing: 3px;
        /* 베이스라인 맞춤 (폰트에 따라 미세조정 필요) */
        padding-top: 14px; 
    }
    
    .text-input::placeholder {
        color: #e0e0e0;
        font-size: 16px;
        font-family: 'Noto Sans KR';
        letter-spacing: 0;
        padding-top: 10px;
    }

    /* Delete Button */
    .row-del-btn {
        position: absolute;
        right: -30px;
        top: 50%;
        transform: translateY(-50%);
        color: #ccc;
        cursor: pointer;
        padding: 5px;
        font-size: 14px;
        display: none;
        transition: 0.2s;
    }
    .english-row:hover .row-del-btn { display: block; }
    .row-del-btn:hover { color: #ff5252; }

    /* Cursive Mode */
    .cursive-mode .text-input {
        font-family: var(--font-cursive);
        font-size: 40px;
        padding-top: 18px;
    }

    /* === Print Styles === */
    @media print {
        @page { size: A4; margin: 0; }
        body { background: #fff; -webkit-print-color-adjust: exact; }
        header, .row-del-btn, .tip-box { display: none !important; }
        .paper-container {
            margin: 0;
            width: 100%;
            min-height: 100vh;
            box-shadow: none;
            padding: 15mm;
            border: none;
        }
        .english-row { margin-bottom: 25px; } 
        .text-input::placeholder { color: transparent; }
    }
</style>
</head>
<body id="app-body">

<header>
    <div class="brand">
        <i class="fas fa-pen-nib"></i> 하루 만에 끝내는 악필교정 <span>영어 워크북</span>
    </div>
    <div class="controls">
        <button class="btn" id="btn-font-toggle" onclick="toggleFont()">
            <i class="fas fa-font"></i> <span id="font-label">고딕체 (책 스타일)</span>
        </button>
        <button class="btn" onclick="clearAllText()">
            <i class="fas fa-eraser"></i> 지우기
        </button>
        <div style="width:1px; background:#ddd; height:20px; margin:0 4px;"></div>
        <button class="btn" onclick="addRow()">
            <i class="fas fa-plus"></i> 줄 추가
        </button>
        <button class="btn btn-primary" onclick="window.print()">
            <i class="fas fa-print"></i> 인쇄 / PDF 저장
        </button>
    </div>
</header>

<div class="paper-container" id="paper">
    <div class="tip-box">
        <strong>💡 Chapter 8. 영어 연습 핵심 포인트</strong><br>
        1. 알파벳 소문자는 <strong>직선과 원(동그라미)</strong>의 조립으로 이루어집니다.<br>
        2. <strong>a, c, e, o</strong> 등은 가운데 칸(x-height)을 가득 채워 동그랗게 씁니다.<br>
        3. <strong>b, d, h, k, l, t</strong>는 위쪽 붉은 선까지 시원하게 뻗어주세요. (1.5배 크기)<br>
        4. <strong>g, j, p, q, y</strong>는 아래쪽 선까지 내려서 균형을 맞춰줍니다.
    </div>
</div>

<script>
    const paper = document.getElementById('paper');
    const body = document.getElementById('app-body');
    let isCursive = false;

    // 초기 로딩 시 8줄 생성
    window.onload = () => {
        for(let i=0; i<8; i++) {
            addRow();
        }
        
        // 예시 텍스트 입력 (책의 예문 반영)
        const inputs = document.querySelectorAll('.text-input');
        if(inputs.length > 0) {
            inputs[0].value = "learn english"; // Chapter 8 타이틀
            inputs[1].value = "a b c d e f g h i j k l m"; 
            inputs[2].value = "n o p q r s t u v w x y z";
        }
    };

    function addRow() {
        const row = document.createElement('div');
        row.className = 'english-row';
        row.innerHTML = `
            <div class="lines-bg">
                <div class="line-1"></div>
                <div class="line-2"></div>
                <div class="line-3"></div>
                <div class="line-4"></div>
            </div>
            <input type="text" class="text-input" placeholder="이곳을 클릭하여 연습할 단어를 입력하세요..." spellcheck="false">
            <i class="fas fa-times row-del-btn" onclick="removeRow(this)" title="줄 삭제"></i>
        `;
        paper.appendChild(row);
    }

    function removeRow(btn) {
        if(document.querySelectorAll('.english-row').length > 1) {
            btn.parentElement.remove();
        } else {
            alert("최소 한 줄은 있어야 합니다.");
        }
    }

    function toggleFont() {
        isCursive = !isCursive;
        const btnLabel = document.getElementById('font-label');
        if (isCursive) {
            body.classList.add('cursive-mode');
            btnLabel.textContent = "필기체 (Cursive)";
        } else {
            body.classList.remove('cursive-mode');
            btnLabel.textContent = "고딕체 (책 스타일)";
        }
    }

    function clearAllText() {
        if(confirm('입력한 내용을 모두 지우시겠습니까?')) {
            const inputs = document.querySelectorAll('.text-input');
            inputs.forEach(input => input.value = '');
        }
    }
</script>

</body>
</html>
