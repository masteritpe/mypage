<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>달구리 (Dalguri) - 보글보글 요정</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Jua', sans-serif;
            background: linear-gradient(135deg, #1b0c36, #48235c, #2a4175);
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .game-wrapper {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 32px;
            color: #ffde59;
            text-shadow: 0 0 10px rgba(255, 222, 89, 0.6);
            letter-spacing: 2px;
        }

        .score-board {
            font-size: 24px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 30px;
            color: #fff;
        }

        canvas {
            background: linear-gradient(to bottom, #19102e, #4c3f77, #937eb5);
            border-radius: 16px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            display: block;
        }

        .controls {
            margin-top: 15px;
            font-size: 18px;
            color: #e0e6ed;
            line-height: 1.5;
        }

        .highlight { color: #ffde59; font-weight: bold; }

        .btn-start {
            margin-top: 10px;
            background: linear-gradient(45deg, #a18cd1 0%, #fbc2eb 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-family: 'Jua', sans-serif;
            font-size: 22px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(161, 140, 209, 0.5);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(161, 140, 209, 0.7);
        }

        .btn-start:active { transform: translateY(1px); }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="header">
        <h1>🌙 달구리 : 보글보글</h1>
        <div class="score-board">점수: <span id="score">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="700" height="450"></canvas>
    
    <div class="controls">
        <p>조작: ⬅️ ➡️ (이동) / ⬆️ (점프) / <span class="highlight">스페이스바 (방울 쏘기)</span></p>
        <p>방울(🫧)로 먹구름(🌩️)을 가두고 부딪혀서 터뜨리세요!</p>
        <button class="btn-start" id="startBtn">게임 시작</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const startBtn = document.getElementById('startBtn');

    let animationId;
    let isGameOver = true;
    let score = 0;
    let keys = { right: false, left: false, up: false };

    // 꼬마 요정 설정
    const player = {
        x: 50, y: 350, width: 30, height: 40,
        dx: 0, dy: 0, speed: 4, jumpPower: -12,
        grounded: false, emoji: '🧚🏻‍♀️',
        facingRight: true, // 보는 방향 (방울 쏘는 방향)
        cooldown: 0
    };

    const gravity = 0.6;
    let platforms = [];
    let enemies = [];
    let bubbles = [];
    let particles = []; 

    function initMap() {
        // 보글보글 스타일의 계단식/층상 발판
        platforms = [
            { x: 0, y: 410, width: 700, height: 40 }, // 바닥
            { x: 100, y: 320, width: 500, height: 15 },
            { x: 0, y: 230, width: 250, height: 15 },
            { x: 450, y: 230, width: 250, height: 15 },
            { x: 200, y: 140, width: 300, height: 15 },
            { x: 50, y: 70, width: 150, height: 15 },
            { x: 500, y: 70, width: 150, height: 15 }
        ];

        // 적 생성 (여러 마리)
        enemies = [
            { x: 300, y: 280, width: 30, height: 30, dx: 1.5, emoji: '🌩️' },
            { x: 100, y: 190, width: 30, height: 30, dx: -1.5, emoji: '🌩️' },
            { x: 550, y: 190, width: 30, height: 30, dx: 1.5, emoji: '🌩️' },
            { x: 350, y: 100, width: 30, height: 30, dx: -2, emoji: '🌩️' }
        ];
        
        bubbles = [];
        particles = [];
        score = 0;
        scoreElement.innerText = score;
    }

    // 키보드 이벤트
    document.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowRight') { keys.right = true; player.facingRight = true; }
        if (e.code === 'ArrowLeft') { keys.left = true; player.facingRight = false; }
        if (e.code === 'ArrowUp') {
            if (player.grounded) {
                player.dy = player.jumpPower;
                player.grounded = false;
            }
            e.preventDefault();
        }
        if (e.code === 'Space') {
            shootBubble();
            e.preventDefault(); // 스페이스바 스크롤 방지
        }
    });

    document.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowRight') keys.right = false;
        if (e.code === 'ArrowLeft') keys.left = false;
    });

    // 방울 쏘기 함수
    function shootBubble() {
        if (player.cooldown > 0 || isGameOver) return;
        
        bubbles.push({
            x: player.facingRight ? player.x + 30 : player.x - 20,
            y: player.y + 10,
            width: 30, height: 30,
            dx: player.facingRight ? 8 : -8, // 처음엔 빠르게 날아감
            dy: 0,
            trapped: false, // 적을 가뒀는지 여부
            life: 300 // 방울 지속 시간
        });
        
        player.cooldown = 15; // 연사 딜레이
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width &&
               rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height &&
               rect1.y + rect1.height > rect2.y;
    }

    function createPopParticles(x, y, emoji) {
        for(let i=0; i<8; i++) {
            particles.push({
                x: x, y: y,
                dx: (Math.random() - 0.5) * 6,
                dy: (Math.random() - 0.5) * 6,
                life: 1,
                emoji: emoji
            });
        }
    }

    function update() {
        if (isGameOver) return;

        if (player.cooldown > 0) player.cooldown--;

        // 플레이어 이동
        if (keys.right) player.dx = player.speed;
        else if (keys.left) player.dx = -player.speed;
        else player.dx = 0;

        player.x += player.dx;

        // 벽 통과 (보글보글 맵 특징)
        if (player.x < -30) player.x = canvas.width;
        if (player.x > canvas.width) player.x = -30;

        player.dy += gravity;
        player.y += player.dy;
        player.grounded = false;

        // 플랫폼 충돌 (아래에서 위로 뚫고 올라갈 수 있음)
        for (let p of platforms) {
            // 플레이어가 떨어지는 중(dy > 0)이고, 발바닥이 플랫폼 상단 근처일 때만 착지
            if (player.dy > 0 && 
                player.y + player.height - player.dy <= p.y && 
                player.y + player.height >= p.y && 
                player.x + player.width > p.x && 
                player.x < p.x + p.width) {
                
                player.grounded = true;
                player.dy = 0;
                player.y = p.y - player.height;
            }
        }

        // 적 이동 처리
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            e.x += e.dx;
            
            // 화면 끝에서 튕기기
            if (e.x < 0 || e.x + e.width > canvas.width) e.dx *= -1;

            // 플레이어와 충돌 (게임오버)
            if (checkCollision(player, e)) {
                isGameOver = true;
                setTimeout(() => alert("앗! 먹구름에 닿았어요. 다시 도전하세요!"), 50);
            }
        }

        // 방울 업데이트 로직
        for (let i = bubbles.length - 1; i >= 0; i--) {
            let b = bubbles[i];
            b.x += b.dx;
            b.y += b.dy;
            b.life--;

            // 방울 물리엔진 (점점 느려지다가 위로 둥둥 뜸)
            b.dx *= 0.85; 
            if (Math.abs(b.dx) < 0.5) {
                b.dy -= 0.05; // 위로 뜨는 힘
                if (b.dy < -2) b.dy = -2; // 최대 상승 속도
            }

            // 빈 방울일 때 적과 충돌 체크
            if (!b.trapped) {
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (checkCollision(b, enemies[j])) {
                        b.trapped = true; // 방울에 가둠
                        b.dy = -1; // 가두면 바로 위로 뜨기 시작
                        b.life = 400; // 가둔 후 유지 시간 증가
                        enemies.splice(j, 1); // 적 삭제
                        break; // 방울 하나당 적 하나
                    }
                }
            }

            // 플레이어가 가둔 방울을 터뜨림
            if (b.trapped && checkCollision(player, b)) {
                createPopParticles(b.x, b.y, '⭐');
                createPopParticles(b.x, b.y, '✨');
                score += 500;
                scoreElement.innerText = score;
                bubbles.splice(i, 1);
                
                // 모든 적을 처치했는지 확인
                if (enemies.length === 0 && !bubbles.some(bub => bub.trapped)) {
                    isGameOver = true;
                    setTimeout(() => alert("CLEAR! 💖 먹구름을 모두 물리쳤어요!"), 50);
                }
                continue;
            }

            // 빈 방울을 머리로 쳐서 터뜨릴 수도 있음 (디테일)
            if (!b.trapped && checkCollision(player, b) && player.dy < 0) {
                createPopParticles(b.x, b.y, '🫧');
                bubbles.splice(i, 1);
                continue;
            }

            // 수명이 다하거나 화면 위로 벗어나면 사라짐
            if (b.life <= 0 || b.y < -50) {
                if (b.trapped) {
                    // 가둔 방울이 안 터지고 풀려나면 다시 적 생성 (분노 상태처럼 속도 증가)
                    enemies.push({ x: b.x, y: b.y, width: 30, height: 30, dx: 2.5, emoji: '🌩️' });
                }
                bubbles.splice(i, 1);
            }
        }

        // 파티클 업데이트
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].x += particles[i].dx;
            particles[i].y += particles[i].dy;
            particles[i].life -= 0.03;
            if (particles[i].life <= 0) particles.splice(i, 1);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 플랫폼 그리기 (유리/얼음 질감)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.lineWidth = 2;
        for (let p of platforms) {
            ctx.beginPath();
            ctx.roundRect(p.x, p.y, p.width, p.height, 8);
            ctx.fill();
            ctx.stroke();
        }

        // 적 그리기
        ctx.font = '30px Arial';
        for (let e of enemies) {
            ctx.fillText(e.emoji, e.x, e.y + 25);
        }

        // 방울 그리기
        for (let b of bubbles) {
            if (b.trapped) {
                // 적이 갇힌 방울
                ctx.fillStyle = 'rgba(255, 200, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(b.x + 15, b.y + 15, 22, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = '24px Arial';
                ctx.fillText('🌩️', b.x + 3, b.y + 23);
            } else {
                // 빈 비눗방울
                ctx.fillStyle = 'rgba(150, 230, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(b.x + 15, b.y + 15, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.stroke();
                // 빛 반사 디테일
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(b.x + 10, b.y + 10, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 꼬마 요정 그리기 (보는 방향에 따라 반전)
        ctx.save();
        ctx.font = '40px Arial';
        ctx.translate(player.x + 15, player.y + 20);
        if (!player.facingRight) {
            ctx.scale(-1, 1);
        }
        ctx.fillText(player.emoji, -20, 15);
        ctx.restore();

        // 파티클 그리기
        for (let p of particles) {
            ctx.globalAlpha = p.life;
            ctx.font = '16px Arial';
            ctx.fillText(p.emoji, p.x, p.y);
        }
        ctx.globalAlpha = 1.0; 
    }

    function gameLoop() {
        update();
        draw();
        if (!isGameOver) {
            animationId = requestAnimationFrame(gameLoop);
        }
    }

    startBtn.addEventListener('click', () => {
        isGameOver = false;
        player.x = 50;
        player.y = 350;
        player.dy = 0;
        player.facingRight = true;
        
        initMap();
        cancelAnimationFrame(animationId);
        gameLoop();
        startBtn.innerText = "다시 시작";
    });

    initMap();
    draw();
</script>
</body>
</html>
