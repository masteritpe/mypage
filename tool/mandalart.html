<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Mandal-Art</title>

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
    :root {
        --bg-body: #F9FAFB;
        --bg-surface: #FFFFFF;
        --border-base: #E5E7EB;
        --text-main: #111827;
        --text-muted: #6B7280;
        --primary: #4338CA;       
        --primary-light: #EEF2FF;
        --primary-hover: #3730A3;
        --danger: #EF4444;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --radius-md: 8px;
        --font-ui: 'Pretendard', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; outline: none; margin: 0; padding: 0; }
    
    body {
        background: var(--bg-body); color: var(--text-main);
        font-family: var(--font-ui); font-size: 14px;
        height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        -webkit-font-smoothing: antialiased;
    }

    /* === Header === */
    header { 
        background: var(--bg-surface); border-bottom: 1px solid var(--border-base); 
        padding: 0 24px; position: sticky; top: 0; z-index: 50; 
        display: flex; justify-content: space-between; align-items: center; 
        height: 72px; flex-shrink: 0; box-shadow: var(--shadow-sm);
    }
    .logo { 
        font-weight: 800; font-size: 20px; color: var(--text-main); 
        display: flex; align-items: center; gap: 10px; letter-spacing: -0.02em; 
    }
    .logo i { color: var(--primary); font-size: 28px; }
    
    .header-actions { display: flex; gap: 12px; align-items: center; }
    
    .btn { 
        padding: 10px 16px; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; border: none; 
        display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-family: inherit; transition: all 0.2s;
    }
    .btn i { font-size: 18px; }
    .btn-secondary { background: var(--bg-surface); border: 1px solid var(--border-base); color: var(--text-main); box-shadow: var(--shadow-sm); }
    .btn-secondary:hover { background: #F3F4F6; }
    .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--border-base); }
    .btn-danger:hover { background: #FEF2F2; border-color: #FCA5A5; }

    /* === Main Content === */
    main { 
        flex: 1; overflow: auto; padding: 40px 20px; 
        display: flex; flex-direction: column; align-items: center; 
    }

    .title-input {
        text-align: center; font-size: 28px; font-weight: 800; color: var(--primary);
        border: none; background: transparent; margin-bottom: 30px;
        width: 100%; max-width: 800px; padding: 10px;
        font-family: inherit; border-bottom: 2px solid transparent; transition: border 0.2s;
    }
    .title-input::placeholder { color: #A5B4FC; }
    .title-input:focus { border-bottom: 2px solid var(--primary); }

    /* === Mandal-Art Grid === */
    .mandalart-wrapper {
        background: #000000; padding: 4px; border-radius: 12px;
        box-shadow: var(--shadow-md); display: inline-block;
    }

    .grid-container {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
        background: #000000; border-radius: 8px; overflow: hidden;
    }

    .sub-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
        background: #E5E7EB;
    }

    .cell {
        width: 105px; height: 105px; background: var(--bg-surface);
        display: flex; align-items: center; justify-content: center;
        padding: 8px; transition: background 0.2s; position: relative;
    }

    /* ContentEditable Div 스타일 적용 */
    .cell .editable-div {
        width: 100%; max-height: 100%; overflow-y: auto;
        border: none; background: transparent; outline: none;
        text-align: center; font-family: inherit;
        font-size: 14px; 
        font-weight: 600; color: var(--text-main);
        word-break: keep-all; line-height: 1.4;
    }
    
    .cell .editable-div:empty:before {
        content: attr(data-placeholder);
        color: #9CA3AF; pointer-events: none;
    }
    
    /* 포커스 스타일 */
    .cell:focus-within { box-shadow: inset 0 0 0 3px var(--primary); z-index: 10; }

    /* 색상 테마: 중앙(핵심 목표) */
    .sub-grid[data-grid="4"] .cell[data-cell="4"] { background: var(--primary); }
    .sub-grid[data-grid="4"] .cell[data-cell="4"] .editable-div { color: #FFFFFF; font-size: 16px; font-weight: 800; } 
    .sub-grid[data-grid="4"] .cell[data-cell="4"] .editable-div:empty:before { color: rgba(255,255,255,0.7); }

    /* 색상 테마: 세부 목표 (중앙 3x3의 테두리 및 각 3x3의 중앙) */
    .cell.sub-goal { background: var(--primary-light); }
    .cell.sub-goal .editable-div { color: var(--primary-hover); font-weight: 700; }

    /* === Toast Notification === */
    #toast-container {
        position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
        background: rgba(17, 24, 39, 0.9); color: #ffffff; padding: 12px 24px;
        border-radius: 30px; font-size: 14px; font-weight: 600; z-index: 9999;
        opacity: 0; visibility: hidden; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    #toast-container.show { opacity: 1; visibility: visible; bottom: 50px; }

</style>
</head>
<body>

<header>
    <div class="logo">
        <i class="ph-fill ph-target"></i> Mandal-Art
    </div>
    <div class="header-actions">
        <button class="btn btn-danger" onclick="clearAll()"><i class="ph ph-trash"></i> 전체 초기화</button>
        <button class="btn btn-secondary" onclick="exportToImage()"><i class="ph ph-download-simple"></i> 이미지로 저장 (PNG)</button>
    </div>
</header>

<main>
    <input type="text" id="mandalart-title" class="title-input" placeholder="나의 핵심 목표 (ex. 2026년 목표 달성하기)" spellcheck="false" oninput="saveData()" />
    
    <div class="mandalart-wrapper" id="capture-area">
        <div class="grid-container" id="main-grid">
            </div>
    </div>
</main>

<div id="toast-container"></div>

<script>
    const STORAGE_KEY = 'MandalArtData';
    let toastTimer;

    function showToast(message) {
        const toast = document.getElementById('toast-container');
        toast.innerText = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 2000);
    }

    // 그리드 매핑 및 생성 로직
    function createGrid() {
        const mainGrid = document.getElementById('main-grid');
        
        for (let g = 0; g < 9; g++) {
            const subGrid = document.createElement('div');
            subGrid.className = 'sub-grid';
            subGrid.dataset.grid = g;

            for (let c = 0; c < 9; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.cell = c;

                if ((g === 4 && c !== 4) || (g !== 4 && c === 4)) {
                    cell.classList.add('sub-goal');
                }

                // textarea 대신 contenteditable div 사용
                const editableDiv = document.createElement('div');
                editableDiv.className = 'editable-div';
                editableDiv.contentEditable = true;
                editableDiv.spellcheck = false; // 맞춤법 검사 제거
                editableDiv.id = `input-${g}-${c}`;
                editableDiv.dataset.placeholder = (g === 4 && c === 4) ? "핵심 목표" : (cell.classList.contains('sub-goal') ? "세부 목표" : "실행 계획");
                
                // 데이터 동기화 및 자동 저장 이벤트 (innerHTML 감지)
                editableDiv.addEventListener('input', (e) => {
                    syncCells(g, c, e.target.innerHTML);
                    saveData();
                });

                cell.appendChild(editableDiv);
                subGrid.appendChild(cell);
            }
            mainGrid.appendChild(subGrid);
        }
    }

    // 핵심 로직: 세부 목표 상호 동기화 (innerHTML 방식 적용)
    function syncCells(grid, cell, html) {
        if (grid === 4 && cell !== 4) {
            const target = document.getElementById(`input-${cell}-4`);
            if (target && target.innerHTML !== html) target.innerHTML = html;
        } else if (grid !== 4 && cell === 4) {
            const target = document.getElementById(`input-4-${grid}`);
            if (target && target.innerHTML !== html) target.innerHTML = html;
        }
    }

    // 데이터 LocalStorage 저장
    function saveData() {
        const data = {
            title: document.getElementById('mandalart-title').value,
            cells: {}
        };
        for (let g = 0; g < 9; g++) {
            for (let c = 0; c < 9; c++) {
                data.cells[`${g}-${c}`] = document.getElementById(`input-${g}-${c}`).innerHTML;
            }
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // 데이터 불러오기
    function loadData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if(data.title) document.getElementById('mandalart-title').value = data.title;
                
                for (let g = 0; g < 9; g++) {
                    for (let c = 0; c < 9; c++) {
                        const val = data.cells[`${g}-${c}`];
                        if (val) document.getElementById(`input-${g}-${c}`).innerHTML = val;
                    }
                }
            } catch (e) {
                console.error("데이터 로드 실패", e);
            }
        }
    }

    // 전체 초기화
    function clearAll() {
        if (!confirm('작성한 모든 내용을 삭제하시겠습니까? (복구할 수 없습니다)')) return;
        
        document.getElementById('mandalart-title').value = '';
        for (let g = 0; g < 9; g++) {
            for (let c = 0; c < 9; c++) {
                document.getElementById(`input-${g}-${c}`).innerHTML = '';
            }
        }
        saveData();
        showToast('초기화 되었습니다.');
    }

    // === 편집 단축키 로직 ===
    document.addEventListener('keydown', (e) => {
        const target = e.target;
        if (!target.isContentEditable && target.tagName !== 'INPUT') return;

        const isCtrl = e.ctrlKey || e.metaKey;
        const isAlt = e.altKey;
        const isShift = e.shiftKey;
        const key = e.key.toLowerCase();

        // 브라우저 기본 화면 줌인/줌아웃 방지 및 (선택 내용) 글꼴 크기 증감 (단축키 10)
        if (isCtrl && !isAlt && !isShift && (key === '=' || key === '+' || key === '-' || key === '_')) {
            e.preventDefault();
            if (!target.isContentEditable) return; // 제목(input)에서는 제외

            const delta = (key === '-' || key === '_') ? -1 : 1;
            const sel = window.getSelection();

            if (sel.rangeCount > 0 && !sel.isCollapsed) {
                const tempFontName = 'TempFont_' + Date.now();
                document.execCommand('styleWithCSS', false, false);
                document.execCommand('fontName', false, tempFontName);

                let elems = target.querySelectorAll(`font[face="${tempFontName}"], span[style*="${tempFontName}"]`);
                elems.forEach(el => {
                    let parentSize = parseFloat(window.getComputedStyle(el.parentNode).fontSize) || 14;
                    let currentSize = el.style.fontSize ? parseFloat(el.style.fontSize) : parentSize;
                    let newSize = Math.max(8, currentSize + delta); // 최소 8px 제한

                    if (el.tagName.toLowerCase() === 'font') {
                        let span = document.createElement('span');
                        span.style.fontSize = newSize + 'px';
                        span.innerHTML = el.innerHTML;
                        el.replaceWith(span);
                    } else {
                        el.style.fontFamily = '';
                        if (el.getAttribute('style') === '') el.removeAttribute('style');
                        el.style.fontSize = newSize + 'px';
                    }
                });
            } else {
                let currentSize = parseFloat(window.getComputedStyle(target).fontSize) || 14;
                target.style.fontSize = Math.max(8, currentSize + delta) + 'px';
            }
            saveData();
            return;
        }

        if (!isCtrl) return;
        if (target.tagName === 'INPUT') return; // 아래 서식 기능은 제목 제외 셀 내부에서만 작동

        // 1~3) 기본 스타일링
        if (!isAlt && !isShift) {
            if (key === 'b') { e.preventDefault(); document.execCommand('bold', false, null); return; }
            if (key === 'i') { e.preventDefault(); document.execCommand('italic', false, null); return; }
            if (key === 'u') { e.preventDefault(); document.execCommand('underline', false, null); return; }
            // 4) 취소선
            if (key === '0') { e.preventDefault(); document.execCommand('strikeThrough', false, null); return; }
        }

        // 8) 서식 지우기
        if (isShift && !isAlt && key === 'x') {
            e.preventDefault();
            document.execCommand('removeFormat', false, null);
            document.execCommand('styleWithCSS', false, false);
            document.execCommand('hiliteColor', false, 'transparent');
            document.execCommand('backColor', false, 'transparent');
            return;
        }

        // 11) 두음 강조
        if (isAlt && !isShift && key === 'm') {
            e.preventDefault();
            const tempFontName = 'TempDueum_' + Date.now();
            document.execCommand('styleWithCSS', false, false);
            document.execCommand('fontName', false, tempFontName);
            
            const elems = target.querySelectorAll(`font[face="${tempFontName}"]`);
            elems.forEach(el => {
                let span = document.createElement('span');
                span.style.backgroundColor = '#0d3a9e';
                span.style.color = '#ffffff';
                span.style.fontWeight = 'bold';
                span.style.padding = '1px 4px';
                span.style.borderRadius = '3px';
                span.innerHTML = el.innerHTML;
                el.replaceWith(span);
            });
            saveData();
            return;
        }

        // 5~7) 글자 색상 (빨/파/초)
        if (isAlt && !isShift) {
            if (key === 'r') { e.preventDefault(); document.execCommand('styleWithCSS', false, true); document.execCommand('foreColor', false, '#ef4444'); return; }
            if (key === 'b') { e.preventDefault(); document.execCommand('styleWithCSS', false, true); document.execCommand('foreColor', false, '#2563EB'); return; }
            if (key === 'g') { e.preventDefault(); document.execCommand('styleWithCSS', false, true); document.execCommand('foreColor', false, '#16a34a'); return; }
        }

        // 9) 형광펜 (마크)
        if (!isAlt && !isShift && ['1','2','3','4','5','6','7'].includes(key)) {
            e.preventDefault(); document.execCommand('styleWithCSS', false, true);
            let bgColor = 'transparent';
            switch(key) {
                case '1': bgColor = '#fdba74'; break; // 연한 주황
                case '2': bgColor = '#93c5fd'; break; // 연한 파란
                case '3': bgColor = '#fde047'; break; // 연한 노란
                case '4': bgColor = '#86efac'; break; // 연한 녹색
                case '5': bgColor = '#f9a8d4'; break; // 연한 분홍
                case '6': bgColor = '#d4a373'; break; // 연한 갈색
                case '7': bgColor = '#cbd5e1'; break; // 연한 회색
            }
            if (!document.execCommand('hiliteColor', false, bgColor)) {
                document.execCommand('backColor', false, bgColor);
            }
            return;
        }
    });

    // 이미지로 내보내기 (html2canvas)
    function exportToImage() {
        const target = document.getElementById('capture-area');
        const title = document.getElementById('mandalart-title').value.trim() || '만다라트';
        
        showToast('이미지 저장 중...');
        
        // [확실한 해결책] 캡처 직전 실제 DOM에서 플레이스홀더 속성을 잠시 완전히 제거합니다.
        const editableDivs = target.querySelectorAll('.editable-div');
        const savedPlaceholders = [];
        
        editableDivs.forEach((div, i) => {
            savedPlaceholders[i] = div.getAttribute('data-placeholder');
            div.removeAttribute('data-placeholder');
            
            // 캡처 시 글자가 잘리지 않도록 overflow 속성 변경
            div.style.overflow = 'visible';
        });

        html2canvas(target, { 
            scale: 2, 
            backgroundColor: '#F9FAFB',
            logging: false
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `${title}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('저장 완료!');
        }).catch(err => {
            console.error(err);
            showToast('저장에 실패했습니다.');
        }).finally(() => {
            // 캡처가 완료되면(성공/실패 무관) 플레이스홀더와 스타일을 즉시 원래대로 복구합니다.
            editableDivs.forEach((div, i) => {
                if (savedPlaceholders[i]) {
                    div.setAttribute('data-placeholder', savedPlaceholders[i]);
                }
                div.style.overflow = ''; // 원래 CSS 상의 상태로 복구
            });
        });
    }

    // 초기화 실행
    window.onload = () => {
        createGrid();
        loadData();
    };

</script>
</body>
</html>
