<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노트패드</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding/d2coding.css');

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #f6f8fa; }
        ::-webkit-scrollbar-thumb { background: #d0d7de; border-radius: 5px; border: 2px solid #f6f8fa; }
        ::-webkit-scrollbar-thumb:hover { background: #afb8c1; }

        /* 기본 레이아웃 및 폰트 */
        body { margin: 0; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-color: #f6f8fa; color: #24292f; }
        
        /* 툴바 */
        #toolbar { background: #ffffff; padding: 10px 16px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #d0d7de; z-index: 10; }
        
        button { background: #ffffff; color: #24292f; border: 1px solid #d0d7de; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 0 rgba(27,31,36,0.04); font-family: inherit; }
        button:hover { background: #f3f4f6; border-color: #d0d7de; }
        button:active { background: #ebecf0; }
        
        /* 포인트(Primary) 버튼 */
        button.primary { background: #0969da; color: #ffffff; border-color: #0969da; }
        button.primary:hover { background: #0550ae; border-color: #0550ae; }

        select { padding: 6px 10px; border-radius: 6px; border: 1px solid #d0d7de; background: #ffffff; outline: none; cursor: pointer; font-family: inherit; font-size: 13px; transition: 0.2s; box-shadow: 0 1px 0 rgba(27,31,36,0.04); }
        select:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,0.3); }
        
        /* 파일 경로 표시 UI (기존 shortcut-info 대체) */
        .file-path-info { font-size: 12px; color: #57606a; margin-left: auto; padding: 4px 10px; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 20px; max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: default; }

        /* 탭 */
        #tabs { display: flex; background: #f6f8fa; padding: 8px 12px 0; overflow-x: auto; gap: 2px; border-bottom: 1px solid #d0d7de; }
        .tab { padding: 8px 16px; background: transparent; color: #57606a; cursor: pointer; border-radius: 6px 6px 0 0; display: flex; align-items: center; gap: 8px; font-size: 13px; border: 1px solid transparent; border-bottom: none; transition: 0.2s; user-select: none; }
        .tab:hover:not(.active) { background: #eaeeef; }
        
        /* 활성화된 탭 */
        .tab.active { background: #ffffff; color: #24292f; font-weight: 600; border-color: #d0d7de; border-top: 3px solid #fd8c73; margin-bottom: -1px; padding-bottom: 9px; }
        
        .tab-close { color: #8c959f; font-size: 14px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 4px; transition: 0.2s; }
        .tab-close:hover { background: #ffebe9; color: #cf222e; }

        /* 에디터 */
        #editor-container { flex: 1; display: flex; flex-direction: column; background: #ffffff; min-height: 0; overflow: hidden; }
        
        /* 폰트 사이즈 12pt, 줄간격 조정 (1.6 -> 1.4) */
        .CodeMirror { height: 100%; font-size: 12pt; font-family: 'D2Coding', 'Consolas', monospace; line-height: 1.4; }
        .CodeMirror-gutters { border-right: 1px solid #d0d7de; background-color: #ffffff; }
        .CodeMirror-linenumber { color: #8c959f; padding-right: 12px; }

        /* 모달 창 (드래그를 위해 position 수정) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: transparent; display: none; z-index: 1000; pointer-events: none; }
        .modal-content { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); /* 초기 중앙 정렬 */
            pointer-events: auto; background: white; padding: 24px; border-radius: 12px; width: 340px; box-shadow: 0 8px 32px rgba(140,149,159,0.3); display: flex; flex-direction: column; gap: 16px; border: 1px solid #d0d7de; 
        }
        .modal-header { font-size: 16px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; cursor: move; user-select: none; }
        .close-btn { cursor: pointer; color: #8c959f; font-size: 16px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
        .close-btn:hover { background: #f3f4f6; color: #24292f; }
        .modal-row { display: flex; flex-direction: column; gap: 6px; }
        .modal-row label { font-size: 13px; font-weight: 500; color: #57606a; }
        .modal-row input[type="text"] { padding: 8px 12px; border: 1px solid #d0d7de; border-radius: 6px; outline: none; font-size: 13px; font-family: inherit; transition: 0.2s; box-shadow: inset 0 1px 2px rgba(27,31,36,0.04); }
        .modal-row input[type="text"]:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,0.3); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }

        /* 토스트 메시지 UI */
        #toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 2000; pointer-events: none; }
        .toast { background: #24292f; color: #ffffff; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2); opacity: 0; transform: translateY(20px); transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; align-items: center; gap: 8px; }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div id="toolbar">
        <button onclick="newTab()">+ 새 탭</button>
        <button onclick="openFile()">📂 열기</button> <div style="width: 1px; height: 20px; background: #d0d7de; margin: 0 4px;"></div> 
        <button class="primary" onclick="saveFile()">💾 저장</button>
        <button onclick="saveFileAs()">다른 이름으로 저장</button>
        
        <div style="width: 1px; height: 20px; background: #d0d7de; margin: 0 4px;"></div>
        
        <select id="language" onchange="changeLanguage()">
            <option value="text/plain">일반 텍스트</option>
            <option value="javascript">JavaScript</option>
            <option value="htmlmixed">HTML/XML</option>
            <option value="css">CSS</option>
            <option value="python">Python</option>
        </select>

        <span id="lineCountDisplay" style="font-size: 13px; color: #57606a; margin-left: 8px; font-weight: 500;">전체 라인: 1</span>
        
        <button onclick="openModal('find')" style="margin-left:auto;">🔍 찾기</button>
        <button onclick="openModal('replace')">🔄 바꾸기</button>
        
        <button onclick="removeEmptyLines()" style="color: #cf222e; border-color: #d0d7de; background: #f6f8fa;">🗑️ 빈줄 제거</button>
        <button onclick="runCode()" style="color: #ffffff; background: #2da44e; border-color: #2da44e; margin-left: 4px;">▶ 실행 (새창)</button>
        
        <div id="filePathDisplay" class="file-path-info">파일 없음</div>
    </div>

    <div id="tabs"></div>
    <div id="editor-container"></div>
    
    <div id="toast-container"></div>

    <div id="searchModal" class="modal-overlay">
        <div class="modal-content" id="modalContent">
            <div class="modal-header" id="modalHeader">
                <span id="modalTitle">찾기</span>
                <span class="close-btn" onclick="closeModal()">✕</span>
            </div>
            <div class="modal-row">
                <label>찾을 내용</label>
                <input type="text" id="findInput" onkeydown="if(event.key==='Enter') findNext()" oninput="lastCursor = null;">
            </div>
            <div class="modal-row" id="replaceRow" style="display:none;">
                <label>바꿀 내용</label>
                <input type="text" id="replaceInput" onkeydown="if(event.key==='Enter') replaceText()">
            </div>
            
            <div class="modal-row" style="flex-direction: row; align-items: center; gap: 6px; margin-top: 2px;">
                <input type="checkbox" id="useRegex" style="width: auto; cursor: pointer; margin: 0;" onchange="lastCursor = null;">
                <label for="useRegex" style="margin: 0; cursor: pointer;">정규 표현식 사용</label>
            </div>

            <div class="modal-actions">
                <button onclick="findNext()">다음 찾기</button>
                <button class="primary" id="btnReplace" onclick="replaceText()" style="display:none;">바꾸기</button>
                <button id="btnReplaceAll" onclick="replaceAll()" style="display:none;">모두 바꾸기</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/searchcursor.min.js"></script>

    <script>
        let editor;
        let tabCount = 0;
        const docs = {}; 
        let currentTabId = null;
        let lastUsedHandle = null;

        function initEditor() {
            editor = CodeMirror(document.getElementById("editor-container"), {
                lineNumbers: true, 
                theme: "default", 
                mode: "text/plain",
                matchBrackets: true,
                autoCloseBrackets: true,
                extraKeys: {
                    "Ctrl-O": function(cm) { openFile(); },
                    "Cmd-O": function(cm) { openFile(); },
                    "Ctrl-F": function() { openModal('find'); },
                    "Cmd-F": function() { openModal('find'); },
                    "Ctrl-H": function() { openModal('replace'); },
                    "Cmd-Option-F": function() { openModal('replace'); },
                    "Shift-Ctrl-F": function() { openModal('replace'); },
                    "Ctrl-S": function(cm) { saveFile(); },
                    "Cmd-S": function(cm) { saveFile(); },
                    "Esc": function() { closeModal(); }
                }
            });
            
            editor.on("change", updateLineCount);
            newTab(); 
            updateLineCount(); 
            initModalDrag(); 
        }

        // --- 파일 경로(상태) 업데이트 함수 추가 ---
        function updateFilePathDisplay() {
            const displayElement = document.getElementById('filePathDisplay');
            if (!currentTabId || !docs[currentTabId]) {
                displayElement.innerText = "파일 없음";
                displayElement.title = "";
                return;
            }
            
            const currentDoc = docs[currentTabId];
            
            if (currentDoc.fileHandle) {
                // 브라우저 보안상 전체 절대 경로는 숨겨지므로 파일명으로 표시
                displayElement.innerText = `📁 ${currentDoc.name}`;
                displayElement.title = `저장됨: ${currentDoc.name}`;
            } else {
                displayElement.innerText = `📝 ${currentDoc.name} (미저장)`;
                displayElement.title = `로컬에 저장되지 않은 파일`;
            }
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `✅ ${message}`;
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });
            });
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 1000);
        }

        function updateLineCount() {
            if (editor) {
                document.getElementById('lineCountDisplay').innerText = `전체 라인: ${editor.lineCount()}`;
            }
        }

        function newTab() {
            tabCount++;
            const tabId = 'tab' + tabCount;
            const doc = CodeMirror.Doc("", document.getElementById("language").value);
            docs[tabId] = { doc: doc, name: "새 문서 " + tabCount + ".txt", fileHandle: null };
            switchTab(tabId);
        }

        function renderTabs() {
            const tabsDiv = document.getElementById("tabs");
            tabsDiv.innerHTML = '';
            for (const id in docs) {
                const tabDiv = document.createElement("div");
                tabDiv.className = "tab" + (id === currentTabId ? " active" : "");
                
                const titleSpan = document.createElement("span");
                titleSpan.innerText = docs[id].name;
                titleSpan.onclick = () => switchTab(id);
                tabDiv.appendChild(titleSpan);

                const closeSpan = document.createElement("span");
                closeSpan.innerText = "✕";
                closeSpan.className = "tab-close";
                closeSpan.onclick = (e) => { e.stopPropagation(); closeTab(id); };
                tabDiv.appendChild(closeSpan);

                tabsDiv.appendChild(tabDiv);
            }
        }

        function switchTab(id) {
            currentTabId = id;
            editor.swapDoc(docs[id].doc); 
            
            let currentMode = docs[id].doc.getMode().name;
            if (currentMode === "null") currentMode = "text/plain";
            const selectEl = document.getElementById("language");
            if (Array.from(selectEl.options).some(opt => opt.value === currentMode)) {
                selectEl.value = currentMode;
            } else {
                selectEl.value = "text/plain";
            }
            
            renderTabs();
            editor.focus();
            updateLineCount(); 
            updateFilePathDisplay(); // 탭 전환 시 경로 업데이트
        }

        function closeTab(id) {
            delete docs[id];
            const remainingTabs = Object.keys(docs);
            if (remainingTabs.length > 0) {
                if (currentTabId === id) switchTab(remainingTabs[0]);
                else renderTabs();
            } else { newTab(); }
        }

        function changeLanguage() {
            const lang = document.getElementById("language").value;
            if (currentTabId && docs[currentTabId]) {
                editor.setOption("mode", lang);
            }
        }

        async function openFile() {
            if (!window.showOpenFilePicker) {
                openFileFallback();
                return;
            }

            try {
                const options = {
                    id: 'notepad-workspace',
                    types: [{ description: 'Text Files', accept: {'text/*': ['.txt', '.js', '.html', '.css', '.py', '.xml']} }],
                    multiple: false
                };

                if (lastUsedHandle) {
                    options.startIn = lastUsedHandle;
                }

                const [fileHandle] = await window.showOpenFilePicker(options);
                
                lastUsedHandle = fileHandle; 
                
                const file = await fileHandle.getFile();
                const text = await file.text();
                
                createNewTabFromFile(file.name, text, fileHandle);
            } catch (e) {}
        }

        function openFileFallback() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt, .js, .html, .css, .py, .xml, text/plain';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    createNewTabFromFile(file.name, event.target.result, null);
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function createNewTabFromFile(fileName, content, fileHandle) {
            let mode = "text/plain";
            if (fileName.endsWith('.js')) mode = "javascript";
            else if (fileName.endsWith('.html') || fileName.endsWith('.xml')) mode = "htmlmixed";
            else if (fileName.endsWith('.css')) mode = "css";
            else if (fileName.endsWith('.py')) mode = "python";

            tabCount++;
            const tabId = 'tab' + tabCount;
            const doc = CodeMirror.Doc(content, mode);
            
            docs[tabId] = { doc: doc, name: fileName, fileHandle: fileHandle };
            document.getElementById("language").value = mode; 
            switchTab(tabId);
        }

        async function saveFile() {
            const currentDoc = docs[currentTabId];
            if (!window.showSaveFilePicker) {
                downloadFileFallback(currentDoc);
                return;
            }

            if (currentDoc.fileHandle) {
                try {
                    const writable = await currentDoc.fileHandle.createWritable();
                    await writable.write(editor.getValue());
                    await writable.close();
                    
                    lastUsedHandle = currentDoc.fileHandle; 
                    showToast(`[${currentDoc.name}] 저장 완료!`);
                    updateFilePathDisplay(); // 저장 완료 후 상태 반영
                } catch (e) {
                    console.error("저장 실패:", e);
                    showToast(`저장 실패: 오류가 발생했습니다.`);
                }
            } else {
                saveFileAs();
            }
        }

        async function saveFileAs() {
            const currentDoc = docs[currentTabId];
            if (!window.showSaveFilePicker) {
                downloadFileFallback(currentDoc);
                return;
            }

            try {
                const options = {
                    id: 'notepad-workspace',
                    suggestedName: currentDoc.name,
                    types: [{ description: 'Text Files', accept: {'text/plain': ['.txt', '.js', '.html', '.css', '.py']} }]
                };

                if (lastUsedHandle) {
                    options.startIn = lastUsedHandle;
                } else if (currentDoc.fileHandle) {
                    options.startIn = currentDoc.fileHandle;
                }

                const handle = await window.showSaveFilePicker(options);
                
                lastUsedHandle = handle; 
                
                const writable = await handle.createWritable();
                await writable.write(editor.getValue());
                await writable.close();
                
                currentDoc.fileHandle = handle;
                currentDoc.name = handle.name;
                renderTabs();
                showToast(`[${currentDoc.name}] 저장 완료!`);
                updateFilePathDisplay(); // 저장 완료 후 상태 반영
            } catch (e) {}
        }

        function downloadFileFallback(currentDoc) {
            const blob = new Blob([editor.getValue()], { type: "text/plain" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = currentDoc.name;
            a.click();
            showToast(`[${currentDoc.name}] 다운로드 완료!`); 
        }

        function initModalDrag() {
            const modal = document.getElementById('modalContent');
            const header = document.getElementById('modalHeader');
            
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;

            header.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                
                const rect = modal.getBoundingClientRect();
                modal.style.transform = 'none';
                modal.style.left = rect.left + 'px';
                modal.style.top = rect.top + 'px';
                
                initialLeft = rect.left;
                initialTop = rect.top;
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                modal.style.left = (initialLeft + dx) + 'px';
                modal.style.top = (initialTop + dy) + 'px';
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
            });
        }

        let lastCursor = null;

        function openModal(mode) {
            document.getElementById('searchModal').style.display = 'block'; 
            const isReplace = (mode === 'replace');
            
            document.getElementById('modalTitle').innerText = isReplace ? '바꾸기' : '찾기';
            document.getElementById('replaceRow').style.display = isReplace ? 'flex' : 'none';
            document.getElementById('btnReplace').style.display = isReplace ? 'inline-block' : 'none';
            document.getElementById('btnReplaceAll').style.display = isReplace ? 'inline-block' : 'none';
            
            const modal = document.getElementById('modalContent');
            modal.style.transform = 'translate(-50%, -50%)';
            modal.style.left = '50%';
            modal.style.top = '50%';

            const selection = editor.getSelection();
            if (selection && !selection.includes('\n')) {
                document.getElementById('findInput').value = selection;
            }
            
            setTimeout(() => {
                const input = document.getElementById('findInput');
                input.focus();
                input.select();
            }, 50);
            lastCursor = null; 
        }

        function closeModal() {
            document.getElementById('searchModal').style.display = 'none';
            editor.focus();
        }

        function getSearchQuery() {
            let queryStr = document.getElementById('findInput').value;
            if (!queryStr) return null;

            const useRegex = document.getElementById('useRegex').checked;
            if (useRegex) {
                try {
                    let regexStr = queryStr.replace(/\\r\\n/g, '\\n');
                    return new RegExp(regexStr, "m"); 
                } catch (e) {
                    alert("잘못된 정규 표현식입니다.");
                    return null;
                }
            }
            return queryStr;
        }

        function findNext() {
            const query = getSearchQuery();
            if (!query) return;

            if (!lastCursor) {
                lastCursor = editor.getSearchCursor(query, editor.getCursor());
            }

            if (!lastCursor.findNext()) {
                lastCursor = editor.getSearchCursor(query, CodeMirror.Pos(editor.firstLine(), 0));
                if (!lastCursor.findNext()) {
                    alert("더 이상 일치하는 결과가 없습니다.");
                    return;
                }
            }
            editor.setSelection(lastCursor.from(), lastCursor.to());
            editor.scrollIntoView({from: lastCursor.from(), to: lastCursor.to()}, 20);
        }

        function replaceText() {
            const query = getSearchQuery();
            const replaceStr = document.getElementById('replaceInput').value;
            if (!query) return;

            let isMatch = false;
            const currentSelection = editor.getSelection();
            
            if (query instanceof RegExp) {
                isMatch = query.test(currentSelection);
            } else {
                isMatch = (currentSelection === query);
            }

            if (isMatch) {
                editor.replaceSelection(replaceStr);
                lastCursor = null; 
                findNext(); 
            } else {
                findNext(); 
            }
        }

        function replaceAll() {
            const query = getSearchQuery();
            const replaceStr = document.getElementById('replaceInput').value;
            if (!query) return;

            let cursor = editor.getSearchCursor(query);
            let count = 0;
            while (cursor.findNext()) {
                cursor.replace(replaceStr);
                count++;
            }
            alert(count > 0 ? `${count}개의 항목이 바뀌었습니다.` : "일치하는 결과가 없습니다.");
        }

        function removeEmptyLines() {
            const currentText = editor.getValue();
            
            const newText = currentText
                .replace(/^[ \t\u00A0\u200B]*(?:[•·][ \t\u00A0\u200B]*)?\r?\n/gm, '')
                .replace(/^[ \t\u00A0\u200B]*(?:[•·][ \t\u00A0\u200B]*)?$/gm, '');

            if (currentText !== newText) {
                const cursor = editor.getCursor(); 
                editor.setValue(newText);
                editor.setCursor(cursor); 
            } else {
                alert("제거할 빈 줄이 없습니다.");
            }
        }

        function runCode() {
            const code = editor.getValue();
            if (!code.trim()) {
                alert("실행할 코드가 없습니다.");
                return;
            }
            
            const runWindow = window.open("", "_blank");
            if (runWindow) {
                runWindow.document.open();
                runWindow.document.write(code);
                runWindow.document.close();
            } else {
                alert("팝업 차단을 해제해주세요.");
            }
        }

        window.onload = initEditor;
    </script>
</body>
</html>
