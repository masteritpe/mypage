<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Auto Sorter</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      --bg-body: #F9FAFB;
      --bg-surface: #FFFFFF;
      --border-light: #F3F4F6;
      --border-base: #E5E7EB;
      --text-main: #111827;
      --text-muted: #6B7280;
      --primary: #3B82F6; 
      --primary-hover: #2563EB;
      --secondary: #FFFFFF;
      --secondary-hover: #F9FAFB;
      --danger: #EF4444;
      --success: #10B981;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    .dashboard-header { max-width: 100%; margin: 0 auto 24px auto; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .title-area { display: flex; align-items: center; gap: 12px; }
    .title-area i { font-size: 28px; color: var(--primary); }
    h2 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    
    .actions { display: flex; gap: 10px; }
    
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 18px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }
    .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-primary:disabled { background: #9CA3AF; cursor: not-allowed; transform: none; }
    .btn-outline { background: var(--secondary); color: var(--text-main); border-color: var(--border-base); box-shadow: var(--shadow-sm); }
    .btn-outline:hover { background: var(--secondary-hover); border-color: #D1D5DB; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }

    .instructions {
      display: flex; gap: 20px; align-items: center; font-size: 13px; color: var(--text-muted);
      background: var(--bg-surface); padding: 12px 20px; border-radius: var(--radius-md); border: 1px solid var(--border-base);
    }

    /* 새로 추가된 환경설정 영역 스타일 */
    .settings-area {
      display: flex; gap: 12px; align-items: center; font-size: 13px; color: var(--text-main);
      background: var(--bg-surface); padding: 12px 20px; border-radius: var(--radius-md); border: 1px solid var(--border-base);
      margin-top: 12px;
    }
    .settings-area input {
      padding: 6px 12px; border: 1px solid var(--border-base); border-radius: 4px; font-size: 13px; width: 220px; outline: none; transition: border-color 0.2s;
    }
    .settings-area input:focus { border-color: var(--primary); }

    #workspace {
      max-width: 100%; margin: 0 auto;
      display: grid; grid-template-columns: 350px 1fr; gap: 24px;
      align-items: start;
    }

    /* Left Panel */
    .panel {
      background: var(--bg-surface); border: 1px solid var(--border-base);
      border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-md);
    }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .panel-title { font-weight: 700; font-size: 16px; }
    
    .domain-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
    .domain-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px; background: #F9FAFB; border: 1px solid var(--border-base); border-radius: var(--radius-md);
      font-size: 14px; font-weight: 600;
    }
    .domain-item .badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 99px; font-size: 12px; }

    /* Right Panel */
    .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-base); }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    
    .file-card {
      border: 1px solid var(--border-base); border-radius: var(--radius-md); padding: 12px;
      background: var(--bg-surface); display: flex; align-items: center; gap: 12px; transition: 0.2s;
    }
    .file-card:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); }
    .file-icon { font-size: 24px; color: var(--text-muted); }
    .file-info { flex: 1; overflow: hidden; }
    .file-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-target { font-size: 11px; color: var(--primary); margin-top: 4px; display: flex; align-items: center; gap: 4px; }

    .empty-msg { padding: 40px 20px; text-align: center; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .empty-msg i { font-size: 32px; color: #D1D5DB; }

    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #111827; color: white; padding: 10px 20px; border-radius: 99px; font-size: 14px;
      box-shadow: var(--shadow-md); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 3000;
    }
    #toast.show { opacity: 1; visibility: visible; }
  </style>
</head>
<body>

  <div class="dashboard-header">
    <div class="header-top">
      <div class="title-area">
        <i class="ph ph-magic-wand"></i>
        <h2>File Auto Sorter</h2>
      </div>
      
      <div class="actions">
        <button class="btn btn-outline" style="color: var(--danger); border-color: var(--danger);" onclick="resetAll()">
          <i class="ph ph-arrow-counter-clockwise"></i> 초기화
        </button>
        <button class="btn btn-outline" onclick="selectFolder()">
          <i class="ph ph-folder-open"></i> 작업 폴더 선택
        </button>
      </div>
    </div>

    <div class="instructions">
      <span><i class="ph ph-info"></i> 파일명 앞의 <strong>[도메인명]</strong>을 인식하여 자동으로 하위 폴더를 만들고 파일을 분류합니다.</span>
      <span style="color: #D1D5DB;">|</span>
      <span><i class="ph ph-file"></i> 예: <strong>[DB] 파일명.pdf</strong> ➔ <strong>DB</strong> 폴더로 이동</span>
    </div>

    <!-- 추가된 환경설정 UI -->
    <div class="settings-area">
      <i class="ph ph-gear" style="font-size: 18px; color: var(--text-muted);"></i>
      <strong style="font-size: 14px;">환경설정</strong>
      <span style="color: #D1D5DB;">|</span>
      <label for="new-header-input" style="font-weight: 600;">일괄 변경 헤더명:</label>
      <input type="text" id="new-header-input" placeholder="새 헤더명 입력 (선택사항)" oninput="updatePreviewNames()">
      <span style="color: var(--text-muted); font-size: 12px;">입력 시 이동하는 파일의 <strong>[기존 도메인]</strong>이 해당 헤더로 일괄 변경됩니다. (비워두면 기존 유지)</span>
    </div>
  </div>

  <div id="workspace">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">분석된 폴더(도메인) 목록</div>
      </div>
      <ul class="domain-list" id="domain-list">
        <li class="empty-msg" style="padding: 20px 0;">
          폴더를 선택해주세요.
        </li>
      </ul>
    </div>

    <div class="panel" style="background: var(--bg-body);">
      <div class="preview-header">
        <div class="panel-title" id="selected-folder-name">선택된 폴더: 없음</div>
        <button class="btn btn-primary" onclick="executeSorting()" id="btn-sort" disabled>
          <i class="ph ph-folders"></i> 분류 실행하기
        </button>
      </div>
      
      <div id="preview-area" class="preview-grid">
        <div class="empty-msg" style="grid-column: 1 / -1;">
          <i class="ph ph-magnifying-glass"></i>
          우측 상단의 '작업 폴더 선택' 버튼을 눌러 분류할 파일이 있는 폴더를 선택하세요.
        </div>
      </div>
    </div>
  </div>

  <div id="toast">메시지</div>

  <script>
    let currentDirHandle = null;
    let filesToSort = []; // 분류 대상 파일 목록
    let domainMap = new Map(); // 도메인별 파일 갯수

    // 전체 초기화
    function resetAll() {
      currentDirHandle = null;
      filesToSort = [];
      domainMap.clear();

      document.getElementById('new-header-input').value = ''; // 입력 필드 초기화
      document.getElementById('selected-folder-name').innerHTML = `선택된 폴더: 없음`;
      document.getElementById('btn-sort').disabled = true;
      document.getElementById('domain-list').innerHTML = `
        <li class="empty-msg" style="padding: 20px 0;">폴더를 선택해주세요.</li>
      `;
      document.getElementById('preview-area').innerHTML = `
        <div class="empty-msg" style="grid-column: 1 / -1;">
          <i class="ph ph-magnifying-glass"></i>
          우측 상단의 '작업 폴더 선택' 버튼을 눌러 분류할 파일이 있는 폴더를 선택하세요.
        </div>
      `;
      showToast("초기화되었습니다.");
    }

    // 폴더 선택 및 파일 분석
    async function selectFolder() {
      try {
        // 폴더 선택 (readwrite 권한 요청)
        currentDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('selected-folder-name').innerHTML = `<i class="ph ph-folder"></i> ${currentDirHandle.name}`;
        
        await analyzeFiles();
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error(err);
          alert("폴더를 열 수 없습니다. 브라우저가 File System Access API를 지원하는지 확인해주세요.");
        }
      }
    }

    // 폴더 내 파일 스캔 및 정규식 매칭
    async function analyzeFiles() {
      filesToSort = [];
      domainMap.clear();

      // 파일명에서 [도메인] 추출 정규식
      const regex = /^\[(.*?)\]/;

      for await (const entry of currentDirHandle.values()) {
        if (entry.kind === 'file') {
          const match = entry.name.match(regex);
          
          if (match) {
            const domain = match[1].trim(); // 예: DB, DS, IC 등
            filesToSort.push({
              handle: entry,
              name: entry.name,
              domain: domain
            });

            domainMap.set(domain, (domainMap.get(domain) || 0) + 1);
          }
        }
      }

      renderUI();
    }

    // 파일 이름 생성 헬퍼 함수
    function getModifiedFileName(originalName, newHeader) {
      if (!newHeader) return originalName;
      // 기존 [도메인] 형태와 뒤따르는 공백이나 언더바를 제거하고 새 헤더 부착
      const baseName = originalName.replace(/^\[(.*?)\]_?\s*/, '');
      return `[${newHeader}] ${baseName}`;
    }

    // 새 헤더명 입력 시 파일명 미리보기 실시간 업데이트
    function updatePreviewNames() {
      if (filesToSort.length === 0) return;
      const newHeader = document.getElementById('new-header-input').value.trim();
      const fileCards = document.querySelectorAll('.file-card');
      
      filesToSort.forEach((fileInfo, index) => {
        const displayFileName = getModifiedFileName(fileInfo.name, newHeader);
        if (fileCards[index]) {
          const nameEl = fileCards[index].querySelector('.file-name');
          nameEl.innerText = displayFileName;
          nameEl.title = displayFileName;
        }
      });
    }

    // 분석 결과를 화면에 렌더링
    function renderUI() {
      const domainListEl = document.getElementById('domain-list');
      const previewAreaEl = document.getElementById('preview-area');
      const newHeader = document.getElementById('new-header-input').value.trim();
      
      if (filesToSort.length === 0) {
        domainListEl.innerHTML = `<li class="empty-msg" style="padding: 20px 0;">분류할 파일이 없습니다.</li>`;
        previewAreaEl.innerHTML = `
          <div class="empty-msg" style="grid-column: 1 / -1;">
            <i class="ph ph-warning-circle"></i>분류 조건에 맞는 파일이 발견되지 않았습니다.
          </div>`;
        document.getElementById('btn-sort').disabled = true;
        return;
      }

      // 1. 도메인 목록 렌더링
      domainListEl.innerHTML = '';
      domainMap.forEach((count, domain) => {
        const li = document.createElement('li');
        li.className = 'domain-item';
        li.innerHTML = `
          <span><i class="ph ph-folder" style="color: var(--primary); margin-right: 8px;"></i>${domain}</span>
          <span class="badge">${count}개</span>
        `;
        domainListEl.appendChild(li);
      });

      // 2. 파일 목록 카드 렌더링
      previewAreaEl.innerHTML = '';
      filesToSort.forEach(fileInfo => {
        const ext = fileInfo.name.split('.').pop().toLowerCase();
        let iconClass = "ph-file";
        if (ext === 'pdf') iconClass = "ph-file-pdf";
        if (['png', 'jpg', 'jpeg', 'gif'].includes(ext)) iconClass = "ph-image";

        const displayFileName = getModifiedFileName(fileInfo.name, newHeader);

        const card = document.createElement('div');
        card.className = 'file-card';
        card.innerHTML = `
          <div class="file-icon"><i class="ph ${iconClass}"></i></div>
          <div class="file-info">
            <div class="file-name" title="${displayFileName}">${displayFileName}</div>
            <div class="file-target"><i class="ph ph-arrow-bend-down-right"></i> [${fileInfo.domain}] 폴더로 이동</div>
          </div>
        `;
        previewAreaEl.appendChild(card);
      });

      document.getElementById('btn-sort').disabled = false;
      showToast(`${filesToSort.length}개의 분류 대상 파일을 찾았습니다.`);
    }

    // 실제 파일 이동 (복사 후 원본 삭제 방식)
    async function executeSorting() {
      if (!currentDirHandle || filesToSort.length === 0) return;

      const btnSort = document.getElementById('btn-sort');
      const newHeader = document.getElementById('new-header-input').value.trim();

      btnSort.disabled = true;
      btnSort.innerHTML = `<i class="ph ph-spinner ph-spin"></i> 처리 중...`;

      let successCount = 0;

      try {
        for (const fileInfo of filesToSort) {
          // 1. 해당 도메인명으로 하위 폴더 생성 (이미 있으면 가져옴)
          const subDirHandle = await currentDirHandle.getDirectoryHandle(fileInfo.domain, { create: true });
          
          // 2. 원본 파일의 내용 읽기
          const originalFile = await fileInfo.handle.getFile();
          
          // 3. 환경설정 값에 따른 최종 파일명 결정
          const targetFileName = getModifiedFileName(fileInfo.name, newHeader);

          // 4. 하위 폴더에 새 파일 생성 및 내용 쓰기
          const newFileHandle = await subDirHandle.getFileHandle(targetFileName, { create: true });
          const writable = await newFileHandle.createWritable();
          await writable.write(originalFile);
          await writable.close();
          
          // 5. 루트에 있는 원본 파일 삭제 (이동 완료)
          await currentDirHandle.removeEntry(fileInfo.name);
          
          successCount++;
        }

        showToast(`${successCount}개의 파일 분류가 완료되었습니다!`);
        
        // 작업 완료 후 폴더 재스캔하여 UI 업데이트
        await analyzeFiles();

      } catch (err) {
        console.error(err);
        alert("파일 처리 중 오류가 발생했습니다. 권한이나 파일 락 상태를 확인해주세요.");
      } finally {
        btnSort.innerHTML = `<i class="ph ph-folders"></i> 분류 실행하기`;
        if(filesToSort.length > 0) btnSort.disabled = false;
      }
    }

    // 토스트 메시지
    let toastTimeout;
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.classList.add('show');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
  </script>
</body>
</html>
