<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Code Manager</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
    
    <style>
        /* === Design System Refactored === */
        :root {
            /* Base Colors (Slate 톤으로 변경하여 눈의 피로 감소) */
            --bg-body: #f1f5f9; 
            --bg-sidebar: #ffffff; 
            --bg-paper: #ffffff;
            --bg-input: #f8fafc; 
            --bg-hover: #f1f5f9;
            --bg-code: #fafafa; /* 코드 에디터 전용 배경 */

            /* Text Colors */
            --text-primary: #0f172a; 
            --text-secondary: #475569; 
            --text-tertiary: #94a3b8;
            --text-code: #334155;

            /* Accent Colors */
            --accent: #2563eb; 
            --accent-hover: #1d4ed8; 
            --accent-soft: rgba(37, 99, 235, 0.08);
            
            /* State Colors */
            --danger: #ef4444; 
            --danger-bg: #fef2f2;
            --success-bg: #f0fdf4;
            --success-text: #166534;

            /* Borders & Radius */
            --border-light: #e2e8f0; 
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;

            /* Fonts */
            --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
            --font-code: 'JetBrains Mono', 'Consolas', 'Monaco', monospace;

            /* Diff Colors */
            --diff-add-bg: #dcfce7; --diff-add-text: #166534;
            --diff-del-bg: #fee2e2; --diff-del-text: #b91c1c;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            background: var(--bg-body); 
            font-family: var(--font-main); 
            height: 100vh; height: 100dvh; 
            width: 100vw; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            color: var(--text-primary); 
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Header Styling */
        header { 
            height: 56px; 
            background: var(--bg-sidebar); 
            border-bottom: 1px solid var(--border-light); 
            display: flex; 
            align-items: center; 
            padding: 0 24px; 
            justify-content: space-between; 
            flex-shrink: 0; 
            z-index: 50; 
            box-shadow: var(--shadow-sm);
        }
        .brand { 
            font-weight: 700; 
            font-size: 18px; 
            color: var(--text-primary); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            letter-spacing: -0.5px;
        }
        .brand i { color: var(--accent); font-size: 20px; }
        
        .header-actions button { 
            background: #fff; 
            border: 1px solid var(--border-light); 
            color: var(--text-secondary); 
            padding: 6px 12px; 
            border-radius: var(--radius-sm); 
            font-size: 13px; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            transition: all 0.2s ease; 
            font-weight: 500;
        }
        .header-actions button:hover { 
            background: var(--bg-hover); 
            color: var(--accent); 
            border-color: var(--accent); 
            transform: translateY(-1px);
        }

        /* Workspace Layout */
        .workspace { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 56px); width: 100%; }
        
        /* Sidebar Styling */
        .pane-list { 
            width: 300px; 
            background: var(--bg-sidebar); 
            border-right: 1px solid var(--border-light); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            overflow: hidden; 
            height: 100%; 
        }
        .search-container { padding: 16px; border-bottom: 1px solid var(--border-light); flex-shrink: 0; }
        .search-input { 
            width: 100%; 
            padding: 10px 14px; 
            border: 1px solid var(--border-light); 
            border-radius: var(--radius-md); 
            font-size: 14px; 
            background: var(--bg-input); 
            color: var(--text-primary); 
            transition: 0.2s; 
        }
        .search-input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px var(--accent-soft); }
        .list-scroll { flex: 1; overflow-y: auto; padding: 12px; }
        
        /* List Item Styling */
        .item-card { 
            padding: 14px 16px; 
            border-radius: var(--radius-md); 
            cursor: pointer; 
            margin-bottom: 6px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            transition: all 0.2s; 
            border: 1px solid transparent; 
            position: relative;
        }
        .item-card:hover { background: var(--bg-hover); }
        .item-card.active { 
            background: var(--accent-soft); 
            border-color: rgba(37, 99, 235, 0.2); 
        }
        .item-card.active::before {
            content: ''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 4px; 
            background: var(--accent); border-radius: 0 4px 4px 0;
        }
        .item-card.active .card-title { color: var(--accent); font-weight: 600; }
        .card-title { 
            font-size: 15px; 
            font-weight: 500; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
            color: var(--text-primary); 
            display: flex; align-items: center; gap: 8px;
        }
        .card-meta { font-size: 12px; color: var(--text-tertiary); display: flex; justify-content: space-between; font-weight: 400; }

        /* Main Editor Area */
        .pane-editor { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            background: var(--bg-body); 
            min-width: 0; 
            height: 100%; 
            overflow: hidden; 
        }
        
        /* Toolbar */
        .toolbar { 
            height: 60px; 
            padding: 0 24px; 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            flex-shrink: 0; 
            gap: 10px; 
            border-bottom: 1px solid var(--border-light); 
            background: var(--bg-sidebar); 
        }
        .editor-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; display: block; padding: 30px; width: 100%; }
        
        .paper { 
            width: 100%; 
            max-width: 1000px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            padding-bottom: 50px;
        }
        
        .input-title { 
            width: 100%; 
            border: none; 
            font-size: 28px; 
            font-weight: 800; 
            padding: 0; 
            background: transparent; 
            color: var(--text-primary); 
            margin-bottom: 4px; 
            font-family: var(--font-main);
        }
        .input-title::placeholder { color: #cbd5e1; }
        
        .meta-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .badge-select { 
            border: 1px solid var(--border-light); 
            background: #fff; 
            padding: 6px 10px; 
            border-radius: var(--radius-sm); 
            font-size: 13px; 
            cursor: pointer; 
            color: var(--text-secondary); 
            font-weight: 500;
        }
        .txt-date { font-size: 13px; color: var(--text-tertiary); }

        /* Badge Styling */
        .badge-version { 
            background: #e0f2fe; 
            color: #0369a1; 
            padding: 4px 8px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 700; 
            margin-left: auto; 
            vertical-align: middle; 
            letter-spacing: 0.5px;
        }
        .badge-version.imported { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }

        /* Code Editor Styling (Enhanced Visibility) */
        .code-wrapper { 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid var(--border-light); 
            border-radius: var(--radius-md); 
            overflow: hidden; 
            background: var(--bg-code);
            box-shadow: var(--shadow-sm);
        }
        .code-editor { 
            width: 100%; 
            min-height: 550px; 
            background: var(--bg-code); 
            color: var(--text-code); 
            font-family: var(--font-code); 
            font-size: 14px; /* Increased Size */
            line-height: 1.7; /* Increased Line Height */
            padding: 24px; 
            border: none; 
            resize: none; 
            outline: none; 
            white-space: pre; 
            overflow: auto; 
            tab-size: 4; 
        }
        .code-editor::placeholder { color: #94a3b8; }

        .wysiwyg { 
            min-height: 450px; 
            padding: 24px; 
            background: #ffffff; 
            color: var(--text-primary); 
            line-height: 1.8; 
            outline: none; 
            white-space: pre-wrap; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border-light); 
            box-shadow: var(--shadow-sm);
        }

        /* File Attachment Section */
        .attach-section { 
            margin-top: 10px; 
            padding: 20px; 
            border: 1px dashed var(--border-light); 
            border-radius: var(--radius-md); 
            background: #f8fafc; 
        }
        .attach-header { 
            font-size: 14px; 
            font-weight: 600; 
            margin-bottom: 12px; 
            color: var(--text-secondary); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .file-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .file-chip { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            padding: 8px 12px; 
            background: #fff; 
            border: 1px solid var(--border-light); 
            border-radius: var(--radius-sm); 
            font-size: 13px; 
            color: var(--text-primary); 
            cursor: pointer; 
            transition: 0.2s; 
            user-select: none; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .file-chip:hover { border-color: var(--accent); color: var(--accent); }
        .btn-del-file { background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 16px; padding: 0 2px; margin-left: 4px; display: flex; align-items: center;}
        .btn-del-file:hover { color: #ef4444; }

        /* Revision History Section */
        .revision-section { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-light); }
        .rev-card { 
            background: #ffffff; 
            border: 1px solid var(--border-light); 
            border-radius: var(--radius-md); 
            margin-bottom: 10px; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            transition: 0.2s;
        }
        .rev-card:hover { border-color: #cbd5e1; box-shadow: var(--shadow-sm); }
        .rev-header { display: flex; justify-content: space-between; align-items: center; }
        
        /* Buttons */
        .btn-mini { 
            padding: 6px 10px; 
            font-size: 12px; 
            background: #fff; 
            color: var(--text-secondary); 
            border: 1px solid var(--border-light); 
            border-radius: var(--radius-sm); 
            cursor: pointer; 
            transition: 0.2s; 
            font-weight: 500;
        }
        .btn-mini:hover { background: var(--bg-hover); color: var(--text-primary); border-color: #cbd5e1; }
        .btn-mini.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-mini.primary:hover { background: var(--accent-hover); }
        .btn-mini.danger { color: var(--danger); border-color: transparent; }
        .btn-mini.danger:hover { background: var(--danger-bg); border-color: var(--danger-bg); }
        
        .btn-tool { 
            padding: 10px 16px; 
            border-radius: var(--radius-md); 
            font-weight: 600; 
            border: none; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 14px; 
            transition: 0.2s; 
            letter-spacing: -0.2px;
        }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2); }
        .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 4px 6px rgba(37, 99, 235, 0.3); transform: translateY(-1px); }
        .btn-outline { background: #fff; border: 1px solid var(--border-light); color: var(--text-secondary); }
        .btn-outline:hover { background: var(--bg-hover); color: var(--text-primary); border-color: #cbd5e1; }
        .btn-ghost { background: transparent; color: var(--text-secondary); }
        .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
        
        /* Empty State */
        #empty-state { display: flex; flex: 1; flex-direction: column; align-items: center; justify-content: center; color: var(--text-tertiary); height: 100%; background: var(--bg-body); }
        
        /* Toast Notification */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; pointer-events: none; }
        .toast { 
            background: #1e293b; 
            color: #fff; 
            padding: 12px 24px; 
            border-radius: 50px; 
            font-size: 14px; 
            font-weight: 500;
            pointer-events: auto; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }

        /* Diff Modal Refined */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); z-index: 1000; 
            display: flex; align-items: center; justify-content: center; 
            opacity: 0; pointer-events: none; transition: 0.2s; backdrop-filter: blur(4px); 
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-box { 
            background: #fff; width: 95%; max-width: 1100px; max-height: 85vh; 
            border-radius: var(--radius-lg); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); 
            display: flex; flex-direction: column; overflow: hidden; 
        }
        .modal-header { 
            padding: 18px 24px; border-bottom: 1px solid var(--border-light); 
            display: flex; justify-content: space-between; align-items: center; 
            font-weight: 600; font-size: 16px; background: #fff; 
        }
        .modal-body { flex: 1; overflow: auto; background: #fff; padding: 0; }
        .diff-view { 
            font-family: var(--font-code); font-size: 13px; line-height: 1.6; 
            width: 100%; border-collapse: collapse; table-layout: fixed;
        }
        .diff-view td { padding: 4px 12px; word-break: break-all; vertical-align: top; font-size: 13px; }
        .diff-view td:first-child { width: 40px; text-align: center; user-select: none; color: #94a3b8; border-right: 1px solid #f1f5f9; }
        .diff-added { background-color: var(--diff-add-bg); } 
        .diff-added .diff-content { color: var(--diff-add-text); }
        .diff-removed { background-color: var(--diff-del-bg); } 
        .diff-removed .diff-content { color: var(--diff-del-text); text-decoration: line-through; opacity: 0.7; }

        /* Responsive */
        @media (max-width: 768px) {
            .pane-list { width: 100%; position: absolute; inset: 0; z-index: 20; transition: transform 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
            .pane-list.hide-mobile { transform: translateX(-100%); }
            .toolbar { justify-content: space-between; padding: 0 16px; }
            .mobile-back { display: inline-flex !important; }
            .paper { gap: 16px; }
            .input-title { font-size: 22px; }
        }
        .mobile-back { display: none; }
    </style>
</head>
<body>

<header>
    <div class="brand"><i class="fas fa-code-branch"></i> Code Manager</div>
    <div class="header-actions">
        <button onclick="exportData()"><i class="fas fa-download"></i> 백업</button>
        <button onclick="document.getElementById('file-restore').click()"><i class="fas fa-upload"></i> 복구</button>
        <input type="file" id="file-restore" hidden accept=".json" onchange="importData(this)">
    </div>
</header>

<div class="workspace">
    <aside class="pane-list" id="pane-list">
        <div class="search-container">
            <input type="text" id="search" class="search-input" placeholder="코드 검색 (제목)..." autocomplete="off">
        </div>
        <div class="list-scroll" id="item-list"></div>
    </aside>

    <main class="pane-editor">
        <div id="empty-state">
            <div style="background:#e2e8f0; width:80px; height:80px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:24px;">
                <i class="fas fa-laptop-code" style="font-size:36px; color:#64748b;"></i>
            </div>
            <div style="font-size:18px; font-weight:600; color:#334155; margin-bottom:8px;">소스를 선택하거나 새로 작성하세요</div>
            <div style="font-size:14px; color:#94a3b8; margin-bottom:30px;">버전 관리 및 파일 첨부가 가능합니다.</div>
            <button class="btn-tool btn-primary" onclick="initNew()">
                <i class="fas fa-plus"></i> 새 코드 작성
            </button>
        </div>

        <div id="editor-content" class="hidden" style="flex:1; display:flex; flex-direction:column; overflow:hidden; height:100%;">
            <div class="toolbar">
                <button class="btn-tool btn-ghost mobile-back" onclick="closeMobileEditor()"><i class="fas fa-arrow-left"></i> 목록</button>
                <div style="margin-left:auto; display:flex; gap:10px;">
                    <button class="btn-tool btn-ghost" onclick="initNew()"><i class="fas fa-plus"></i> 신규</button>
                    <button class="btn-tool btn-ghost hidden" id="btn-delete" style="color:#ef4444;" onclick="deleteCurrent()"><i class="far fa-trash-alt"></i></button>
                    
                    <button class="btn-tool btn-outline" onclick="saveData(false)" title="현재 내용을 저장합니다 (히스토리는 유지)">
                        <i class="fas fa-save"></i> 덮어쓰기 (수정)
                    </button>
                    <button class="btn-tool btn-primary" onclick="saveData(true)" title="현재 내용을 새 버전으로 저장합니다">
                        <i class="fas fa-code-branch"></i> 새 버전 생성
                    </button>
                </div>
            </div>
            
            <div class="editor-scroll">
                <div class="paper">
                    <div>
                        <input type="text" id="inp-title" class="input-title" placeholder="파일명 또는 제목 입력" spellcheck="false">
                        <div class="meta-row">
                            <select id="inp-cat" class="badge-select" onchange="toggleMode(this.value)">
                                <option value="코드">💻 소스 코드</option>
                                <option value="메모">📝 일반 메모</option>
                            </select>
                            <span class="txt-date" id="txt-date"></span>
                            <span id="txt-version" class="badge-version">v1</span>
                        </div>
                    </div>

                    <div class="code-wrapper" id="area-code">
                        <textarea id="inp-code" class="code-editor" spellcheck="false" placeholder="// 여기에 코드를 입력하세요..."></textarea>
                    </div>
                    <div id="area-desc" class="hidden">
                        <div id="inp-desc" class="wysiwyg" contenteditable="true" spellcheck="false" placeholder="내용을 입력하세요..."></div>
                    </div>

                    <div class="attach-section">
                        <div class="attach-header">
                            <span><i class="fas fa-paperclip"></i> 첨부 파일</span>
                            <label for="inp-file" class="btn-mini primary" style="margin-left:auto; cursor:pointer;"><i class="fas fa-plus"></i> 파일 추가</label>
                            <input type="file" id="inp-file" style="display:none;" multiple>
                        </div>
                        <div id="file-list" class="file-list"></div>
                    </div>

                    <div class="revision-section">
                        <div class="attach-header" style="margin-bottom:15px; padding-bottom:10px;">
                            <span><i class="fas fa-history"></i> 버전 기록 (Versions)</span>
                        </div>
                        <div id="revision-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="diff-modal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-header">
            <span><i class="fas fa-exchange-alt"></i> 변경 사항 비교</span>
            <button onclick="document.getElementById('diff-modal').classList.remove('open')" style="border:none; background:none; cursor:pointer; font-size:16px; color:#64748b;"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body"><table class="diff-view" id="diff-content"></table></div>
    </div>
</div>
<div id="toast-container"></div>

<script>
    /* === DB & State (로직 변경 없음) === */
    const DB_NAME = 'CodeManagerDB', STORE_NAME = 'codes';
    let db, currentId = null, currentFiles = [];

    // Init
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: 'uid' });
    req.onsuccess = e => { db = e.target.result; renderList(); };

    // ID Helper
    const generateId = () => 'FID_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
    const ensureFileIds = (files) => files.map(f => { if(!f.fid) f.fid = generateId(); return f; });

    /* === Core Functions === */
    function renderList() {
        const listEl = document.getElementById('item-list');
        const keyword = document.getElementById('search').value.toLowerCase();
        
        db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).getAll().onsuccess = (e) => {
            const items = e.target.result.sort((a,b) => b.updated - a.updated);
            listEl.innerHTML = '';
            items.filter(i => i.title.toLowerCase().includes(keyword)).forEach(i => {
                const el = document.createElement('div');
                el.className = `item-card ${currentId === i.uid ? 'active' : ''}`;
                el.onclick = () => loadItem(i);
                el.innerHTML = `
                    <div class="card-title"><i class="${i.category==='코드'?'fas fa-code':'fas fa-sticky-note'}" style="color:var(--text-tertiary); font-size:12px;"></i> ${i.title}</div>
                    <div class="card-meta"><span>ver ${(i.revisions?.length||0)}</span><span>${new Date(i.updated).toLocaleDateString()}</span></div>
                `;
                listEl.appendChild(el);
            });
        };
    }

    function loadItem(i) {
        toggleEditor(true);
        currentId = i.uid;
        document.getElementById('inp-title').value = i.title;
        document.getElementById('inp-cat').value = i.category;
        toggleMode(i.category);

        if(i.category === '코드') document.getElementById('inp-code').value = i.description;
        else document.getElementById('inp-desc').innerHTML = i.description;

        document.getElementById('txt-date').innerText = new Date(i.updated).toLocaleString();
        
        const vBadge = document.getElementById('txt-version');
        let nextVer = 1;
        if(i.revisions && i.revisions.length > 0) {
            nextVer = Math.max(...i.revisions.map(r => r.version)) + 1;
        }
        vBadge.innerText = `Current: v${nextVer}`;
        vBadge.classList.remove('imported');

        document.getElementById('btn-delete').classList.remove('hidden');

        currentFiles = ensureFileIds(i.attachments ? JSON.parse(JSON.stringify(i.attachments)) : []);
        renderFiles();
        renderRevisions(i.revisions || []);
        
        document.querySelectorAll('.item-card').forEach(c => c.classList.remove('active'));
        renderList(); 
    }

    async function saveData(createNewVersion) {
        const title = document.getElementById('inp-title').value.trim();
        if(!title) return showToast('제목을 입력하세요.');
        
        const cat = document.getElementById('inp-cat').value;
        const content = cat === '코드' ? document.getElementById('inp-code').value : document.getElementById('inp-desc').innerHTML;
        const now = Date.now();
        const filesSnapshot = JSON.parse(JSON.stringify(currentFiles));

        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        
        let existing = await new Promise(resolve => {
             if(!currentId) resolve(null);
             else store.get(currentId).onsuccess = e => resolve(e.target.result);
        });

        let revisions = existing ? (existing.revisions || []) : [];

        if (createNewVersion && existing) {
            const maxVer = revisions.length > 0 ? Math.max(...revisions.map(r => r.version)) : 0;
            const newVerNum = maxVer + 1;

            revisions.unshift({
                revId: now,
                title: title,
                category: cat,
                description: content,
                attachments: filesSnapshot,
                version: newVerNum
            });
            showToast(`v${newVerNum} 버전이 생성되었습니다.`);
        } else {
            showToast('수정 내용이 저장되었습니다.');
        }

        const newItem = {
            uid: currentId || now.toString(),
            title, category: cat, description: content,
            attachments: filesSnapshot, 
            updated: now,
            revisions
        };

        const putReq = store.put(newItem);
        putReq.onsuccess = () => {
            currentId = newItem.uid;
            document.getElementById('txt-date').innerText = new Date(now).toLocaleString();
            loadItem(newItem);
        };
    }

    function deleteCurrent() {
        if(!confirm('정말 삭제하시겠습니까?')) return;
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).delete(currentId);
        tx.oncomplete = () => { toggleEditor(false); renderList(); };
    }

    /* === Files === */
    function renderFiles() {
        const box = document.getElementById('file-list');
        box.innerHTML = '';
        currentFiles.forEach(f => {
            const el = document.createElement('div');
            el.className = 'file-chip';
            el.innerHTML = `<i class="fas fa-file-code" style="color:var(--accent);"></i> ${f.name} <button class="btn-del-file" onclick="removeGlobalFile(event, '${f.fid}')">×</button>`;
            el.onclick = (e) => { if(e.target.tagName !== 'BUTTON') downloadFile(f); };
            box.appendChild(el);
        });
    }

    window.removeGlobalFile = (e, fid) => {
        e.stopPropagation();
        currentFiles = currentFiles.filter(f => String(f.fid) !== String(fid));
        renderFiles();
    };

    document.getElementById('inp-file').onchange = (e) => {
        Array.from(e.target.files).forEach(f => {
            const r = new FileReader();
            r.onload = ev => {
                currentFiles.push({ fid: generateId(), name: f.name, type: f.type, data: ev.target.result });
                renderFiles();
            };
            r.readAsDataURL(f);
        });
        e.target.value = '';
    };

    function downloadFile(f) {
        const a = document.createElement('a'); a.href = f.data; a.download = f.name;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    /* === Version History === */
    function renderRevisions(revs) {
        const box = document.getElementById('revision-list');
        box.innerHTML = '';
        if(!revs.length) { box.innerHTML = '<div style="color:var(--text-tertiary); font-size:13px; text-align:center; padding:10px;">기록된 버전이 없습니다.</div>'; return; }
        
        revs.forEach(rev => {
            const el = document.createElement('div');
            el.className = 'rev-card';
            const filesHtml = rev.attachments?.map((f, i) => 
                `<button class="btn-mini" onclick="downloadRevFile(${rev.revId}, ${i})"><i class="fas fa-download"></i> ${f.name}</button>`
            ).join('') || '';

            el.innerHTML = `
                <div class="rev-header">
                    <div style="font-weight:600; color:var(--text-primary); font-size:14px; display:flex; align-items:center; gap:8px;">
                        <span style="background:#f1f5f9; padding:2px 6px; border-radius:4px; font-size:12px;">v${rev.version}</span>
                        <span style="font-weight:400; color:var(--text-tertiary); font-size:12px;">${new Date(rev.revId).toLocaleString()}</span>
                    </div>
                    <div style="display:flex; gap:6px;">
                        <button class="btn-mini danger" onclick="deleteRev(${rev.revId})" title="삭제"><i class="fas fa-trash"></i></button>
                        <button class="btn-mini" onclick="diffRev(${rev.revId})"><i class="fas fa-exchange-alt"></i> 비교</button>
                        <button class="btn-mini primary" onclick="importVersion(${rev.revId})"><i class="fas fa-undo"></i> 불러오기</button>
                    </div>
                </div>
                <div style="display:flex; gap:6px; margin-top:10px; flex-wrap:wrap;">${filesHtml}</div>
            `;
            box.appendChild(el);
        });
    }

    window.deleteRev = async (revId) => {
        if(!confirm('이 버전을 기록에서 삭제하시겠습니까?')) return;
        
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        
        store.get(currentId).onsuccess = (e) => {
            const item = e.target.result;
            item.revisions = item.revisions.filter(r => r.revId !== revId);
            store.put(item).onsuccess = () => {
                showToast('버전 삭제 완료');
                loadItem(item); 
            };
        };
    };

    window.importVersion = async (revId) => {
        if(!confirm('이 버전을 에디터로 가져오시겠습니까? (저장되지 않은 내용은 사라집니다)')) return;
        
        const tx = db.transaction(STORE_NAME, 'readonly');
        const item = await new Promise(res => tx.objectStore(STORE_NAME).get(currentId).onsuccess = e => res(e.target.result));
        const rev = item.revisions.find(r => r.revId === revId);
        
        if(rev) {
            document.getElementById('inp-title').value = rev.title;
            document.getElementById('inp-cat').value = rev.category;
            toggleMode(rev.category);
            
            if(rev.category === '코드') {
                document.getElementById('inp-code').value = rev.description;
            } else {
                document.getElementById('inp-desc').innerHTML = rev.description;
            }
            
            let loadedFiles = rev.attachments ? JSON.parse(JSON.stringify(rev.attachments)) : [];
            currentFiles = loadedFiles.map(f => ({ ...f, fid: generateId() }));
            renderFiles();

            const vBadge = document.getElementById('txt-version');
            vBadge.innerText = `Loaded: v${rev.version}`;
            vBadge.classList.add('imported');

            showToast(`v${rev.version} 내용을 가져왔습니다.`);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    };

    window.downloadRevFile = async (revId, idx) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const item = await new Promise(res => tx.objectStore(STORE_NAME).get(currentId).onsuccess = e => res(e.target.result));
        const rev = item.revisions.find(r => r.revId === revId);
        if(rev && rev.attachments[idx]) downloadFile(rev.attachments[idx]);
    };

    window.diffRev = async (revId) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const item = await new Promise(res => tx.objectStore(STORE_NAME).get(currentId).onsuccess = e => res(e.target.result));
        const rev = item.revisions.find(r => r.revId === revId);
        if(!rev) return;

        const curMode = document.getElementById('inp-cat').value;
        let curTxt = '';
        if(curMode === '코드') curTxt = document.getElementById('inp-code').value;
        else {
            const tmp = document.createElement('div');
            tmp.innerHTML = document.getElementById('inp-desc').innerHTML;
            curTxt = tmp.innerText; 
        }
        
        let oldTxt = rev.description;
        if (rev.category !== '코드') {
            const tmp = document.createElement('div');
            tmp.innerHTML = oldTxt;
            oldTxt = tmp.innerText;
        }
        
        const diff = Diff.diffLines(oldTxt, curTxt);
        const table = document.getElementById('diff-content');
        table.innerHTML = '';
        
        diff.forEach(part => {
            const tr = document.createElement('tr');
            tr.className = part.added ? 'diff-added' : part.removed ? 'diff-removed' : '';
            
            const tdMark = document.createElement('td');
            tdMark.innerText = part.added ? '+' : part.removed ? '-' : '';
            
            const tdContent = document.createElement('td');
            tdContent.className = 'diff-content';
            tdContent.innerText = part.value; 

            tr.appendChild(tdMark);
            tr.appendChild(tdContent);
            table.appendChild(tr);
        });
        document.getElementById('diff-modal').classList.add('open');
    };

    /* === UI Utils === */
    function initNew() {
        toggleEditor(true);
        currentId = null;
        currentFiles = [];
        document.getElementById('inp-title').value = '';
        document.getElementById('inp-code').value = '';
        document.getElementById('inp-desc').innerHTML = '';
        document.getElementById('inp-cat').value = '코드';
        document.getElementById('txt-version').innerText = 'New';
        document.getElementById('txt-version').classList.remove('imported');
        toggleMode('코드');
        renderFiles();
        document.getElementById('revision-list').innerHTML = '';
        document.getElementById('btn-delete').classList.add('hidden');
        renderList();
        
        // Focus title
        setTimeout(() => document.getElementById('inp-title').focus(), 100);
    }

    function toggleEditor(show) {
        document.getElementById('empty-state').classList.toggle('hidden', show);
        document.getElementById('editor-content').classList.toggle('hidden', !show);
        if(window.innerWidth <= 768 && show) document.getElementById('pane-list').classList.add('hide-mobile');
    }

    function toggleMode(mode) {
        const isCode = mode === '코드';
        document.getElementById('area-code').classList.toggle('hidden', !isCode);
        document.getElementById('area-desc').classList.toggle('hidden', isCode);
    }
    
    function showToast(msg) {
        const box = document.getElementById('toast-container');
        const el = document.createElement('div');
        el.className = 'toast'; el.innerHTML = `<i class="fas fa-check-circle" style="color:#4ade80;"></i> ${msg}`;
        box.appendChild(el);
        setTimeout(() => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(20px)';
            setTimeout(() => el.remove(), 300);
        }, 2000);
    }

    window.closeMobileEditor = () => document.getElementById('pane-list').classList.remove('hide-mobile');
    document.getElementById('search').oninput = renderList;
    
    document.addEventListener('keydown', e => {
        if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='s') {
            e.preventDefault(); saveData(false);
        }
    });
    
    // Tab Support
    document.getElementById('inp-code').addEventListener('keydown', function(e) {
        if(e.key === 'Tab') {
            e.preventDefault();
            this.setRangeText('    ', this.selectionStart, this.selectionEnd, 'end');
        }
    });

    window.exportData = () => {
        db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).getAll().onsuccess = (e) => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(e.target.result)], {type:'application/json'}));
            a.download = `CodeManager_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        };
    };
    window.importData = (inp) => {
        const f = inp.files[0]; if(!f) return;
        const r = new FileReader();
        r.onload = e => {
            try {
                const data = JSON.parse(e.target.result);
                const tx = db.transaction(STORE_NAME, 'readwrite');
                data.forEach(i => tx.objectStore(STORE_NAME).put(i));
                tx.oncomplete = () => { showToast('복구 완료'); renderList(); };
            } catch { alert('파일 오류'); }
        };
        r.readAsText(f);
    };
</script>
</body>
