<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Washer</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
    
    <style>
        :root {
            --bg-body: #F9FAFB; --bg-surface: #FFFFFF;
            --border-light: #F3F4F6; --border-base: #E5E7EB;
            --text-main: #111827; --text-muted: #6B7280;
            --primary: #10B981; --primary-hover: #059669;
            --secondary: #FFFFFF; --secondary-hover: #F9FAFB;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --radius-md: 8px; --radius-lg: 12px;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .dashboard-header { width: 100%; max-width: 600px; margin: 0 auto 24px auto; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .title-area { display: flex; align-items: center; gap: 12px; }
        .title-area i { font-size: 28px; color: var(--primary); }
        h2 { margin: 0; font-size: 22px; font-weight: 700; }
        
        .instructions { display: flex; gap: 16px; align-items: center; justify-content: center; font-size: 14px; color: var(--text-muted); background: var(--bg-surface); padding: 12px 20px; border-radius: var(--radius-md); border: 1px solid var(--border-base); }
        #workspace { width: 100%; max-width: 600px; margin: 0 auto; }
        .panel { background: var(--bg-surface); border: 1px solid var(--border-base); border-radius: var(--radius-lg); padding: 30px; box-shadow: var(--shadow-md); text-align: center; transition: all 0.3s ease; }
        .panel-header { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .panel-title { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
        
        .empty-msg { padding: 40px 20px; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 12px; background: var(--bg-body); border-radius: var(--radius-md); border: 2px dashed var(--border-base); }
        .empty-msg i { font-size: 48px; color: var(--primary); opacity: 0.8; }
        kbd { background-color: var(--border-light); border: 1px solid var(--border-base); border-radius: 4px; padding: 2px 6px; font-family: inherit; font-weight: bold; color: var(--text-main); }

        #preview-container { display: none; margin-top: 10px; padding: 20px; border: 1px solid var(--border-base); border-radius: var(--radius-md); background: var(--bg-body); }
        .manual-hint { margin-bottom: 16px; padding: 12px; background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; border-radius: 8px; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #preview { max-width: 100%; max-height: 400px; border-radius: 6px; display: block; margin: 0 auto; box-shadow: var(--shadow-sm); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111827; color: white; padding: 12px 24px; border-radius: 99px; font-size: 15px; font-weight: 500; box-shadow: var(--shadow-md); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 3000; display: flex; align-items: center; gap: 8px; }
        #toast.show { opacity: 1; visibility: visible; bottom: 40px; }
        
        .debug-box { font-size: 13px; color: #EF4444; background: #FEF2F2; border: 1px solid #FECACA; padding: 12px; border-radius: 6px; text-align: left; margin-top: 10px; width: 100%; word-break: break-all; }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <div class="header-top">
            <div class="title-area">
                <i class="ph ph-magic-wand"></i>
                <h2>Image Washer</h2>
            </div>
        </div>
        <div class="instructions">
            <span><i class="ph ph-copy"></i> 복사한 이미지를</span>
            <span style="color: #D1D5DB;">|</span>
            <span><i class="ph ph-clipboard-text"></i> 아래 영역에서 <kbd>Ctrl</kbd> + <kbd>V</kbd> 하세요</span>
        </div>
    </div>

    <div id="workspace">
        <div class="panel" id="main-panel">
            <div class="panel-header">
                <div class="panel-title" id="status-title"><i class="ph ph-clock"></i> 대기 중</div>
            </div>
            
            <div class="empty-msg" id="instruction-box">
                <i class="ph ph-sparkle"></i>
                <div>화면을 클릭한 후 <kbd>Ctrl</kbd> + <kbd>V</kbd>를 눌러주세요.</div>
                <div style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">
                    PPT의 복잡한 찌꺼기 데이터가 순수 PNG로 세탁됩니다.
                </div>
            </div>

            <div id="preview-container">
                <div class="manual-hint">
                    <i class="ph ph-mouse-right" style="font-size: 20px;"></i>
                    아래 이미지를 마우스 우클릭하여 [이미지 복사] 하세요
                </div>
                <img id="preview" alt="세탁된 이미지 미리보기">
            </div>
        </div>
    </div>

    <div id="toast"><i class="ph ph-check-circle" style="color: var(--primary); font-size: 18px;"></i> <span id="toast-msg">세탁 완료!</span></div>

    <script>
        let toastTimeout;
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgSpan = document.getElementById('toast-msg');
            const icon = toast.querySelector('i');
            msgSpan.innerText = message;
            
            if (isError) {
                icon.className = "ph ph-warning-circle";
                icon.style.color = "#EF4444";
            } else {
                icon.className = "ph ph-check-circle";
                icon.style.color = "var(--primary)";
            }

            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        document.addEventListener('paste', async (e) => {
            const clipboardData = e.clipboardData || window.clipboardData;
            const items = clipboardData.items;
            let imageBlob = null;
            let availableTypes = [];
            
            const statusTitle = document.getElementById('status-title');
            const instructionBox = document.getElementById('instruction-box');
            const previewContainer = document.getElementById('preview-container');

            // 1단계: 클립보드에 들어온 데이터 타입 모두 수집 및 이미지 검색
            for (let item of items) {
                availableTypes.push(item.type);
                if (item.type.indexOf('image') === 0) {
                    imageBlob = item.getAsFile();
                }
            }

            // 2단계: File 객체로 직접 들어온 경우가 있는지 한 번 더 체크
            if (!imageBlob && clipboardData.files && clipboardData.files.length > 0) {
                for (let i = 0; i < clipboardData.files.length; i++) {
                    if (clipboardData.files[i].type.startsWith('image/')) {
                        imageBlob = clipboardData.files[i];
                        break;
                    }
                }
            }

            if (!imageBlob) {
                statusTitle.innerHTML = `<i class="ph ph-warning-circle" style="color: #EF4444;"></i> 이미지 추출 불가`;
                document.getElementById('main-panel').style.borderColor = "#EF4444";
                
                // 어떤 데이터가 들어왔는지 화면에 디버깅 정보 표시
                const typesStr = availableTypes.length > 0 ? availableTypes.join(', ') : '전달된 데이터 없음';
                instructionBox.innerHTML = `
                    <i class="ph ph-x-circle" style="color: #EF4444;"></i>
                    <div style="color: #111827; font-weight: 600;">PPT에서 순수 이미지를 주지 않았습니다.</div>
                    <div class="debug-box">
                        <b>브라우저가 인식한 데이터:</b><br>${typesStr}
                    </div>
                    <div style="font-size: 14px; margin-top: 16px; color: var(--text-main); line-height: 1.6;">
                        💡 <b>해결 방법</b><br>
                        1. 화면 캡처 단축키(<b>Win + Shift + S</b>)로 긁어서 붙여넣기<br>
                        2. PPT에서 우클릭 후 <b>'그림으로 저장'</b> 하기
                    </div>
                `;
                showToast("이미지를 찾을 수 없습니다.", true);
                return;
            }

            statusTitle.innerHTML = `<i class="ph ph-spinner ph-spin" style="color: var(--primary);"></i> 세탁 중...`;

            try {
                const img = new Image();
                const url = URL.createObjectURL(imageBlob);
                
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    canvas.toBlob((cleanBlob) => {
                        document.getElementById('preview').src = URL.createObjectURL(cleanBlob);
                        instructionBox.style.display = "none"; 
                        previewContainer.style.display = "block"; 
                        
                        statusTitle.innerHTML = `<i class="ph ph-check-circle" style="color: var(--primary);"></i> 세탁 완료!`;
                        document.getElementById('main-panel').style.borderColor = "var(--primary)"; 
                        
                        showToast("세탁 성공! 이미지를 우클릭하여 복사하세요.");
                    }, 'image/png');
                };
                img.src = url;
                
            } catch (error) {
                console.error(error);
                statusTitle.innerHTML = `<i class="ph ph-warning-circle" style="color: #EF4444;"></i> 처리 오류`;
                showToast("이미지 처리 중 오류가 발생했습니다.", true);
            }
        });
    </script>
</body>
</html>
