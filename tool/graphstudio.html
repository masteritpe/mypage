<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Graph Studio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<style>
/* === Modern SaaS Theme === */
:root {
    --bg-app: #f8fafc; --bg-panel: #ffffff; --border: #e2e8f0;
    --primary: #4f46e5; --primary-hover: #4338ca;
    --text-main: #0f172a; --text-sub: #64748b;
    --radius: 8px;
    --font-ui: 'Inter', 'Noto Sans KR', sans-serif;
    --font-code: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; outline: none; }
body { margin: 0; background: var(--bg-app); color: var(--text-main); font-family: var(--font-ui); font-size: 13px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

/* Header */
header { height: 56px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; flex-shrink: 0; justify-content: space-between; z-index: 20; }
header .brand { font-weight: 700; font-size: 16px; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
header .brand i { color: var(--primary); font-size: 20px; }
header .header-tools { display: flex; gap: 8px; }

/* Layout */
.workspace { display: flex; flex: 1; overflow: hidden; }
.pane-list { width: 300px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.2s; }

/* Search Area */
.search-area { 
    height: 56px; 
    padding: 0 16px; 
    border-bottom: 1px solid var(--border); 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    flex-shrink: 0;
}

.search-input { width: 100%; height: 36px; padding: 0 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; transition: 0.2s; }
.search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
.list-scroll { flex: 1; overflow-y: auto; background: #f8fafc; }

/* Item Card */
.item-card { padding: 16px; border-bottom: 1px solid var(--border); background: #fff; cursor: pointer; border-left: 3px solid transparent; transition: background 0.1s; }
.item-card:hover { background: #f1f5f9; }
.item-card.active { background: #eef2ff; border-left-color: var(--primary); }
.item-meta { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
.item-tag { font-family: var(--font-code); font-weight: 700; color: var(--primary); background: #e0e7ff; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
.item-date { font-size: 11px; color: var(--text-sub); }
.item-title { font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 4px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Editor Pane */
.pane-editor { flex: 1; background: #fff; display: flex; flex-direction: column; position: relative; min-width: 0; }
.toolbar { height: 56px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; background: #fff; flex-shrink: 0; }
.meta-bar { padding: 12px 24px; border-bottom: 1px solid var(--border); background: #f8fafc; display: flex; gap: 12px; align-items: center; }

/* Split View */
.split-container { display: flex; flex: 1; overflow: hidden; position: relative; }
.code-pane { width: 40%; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: #fff; }
.preview-pane { flex: 1; display: flex; flex-direction: column; background: #f1f5f9; overflow: hidden; position: relative; }

/* Inputs */
.input-field { height: 36px; padding: 0 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; transition: 0.2s; }
.input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
.input-flat { border: none; background: transparent; font-weight: 700; font-size: 15px; color: #1e293b; width: 100%; }
.input-flat:focus { outline: none; border-bottom: 2px solid var(--primary); }

/* Code Editor */
.editor-area { flex: 1; padding: 16px; border: none; resize: none; font-family: var(--font-code); font-size: 13px; line-height: 1.6; color: #334155; background: #fff; white-space: pre; overflow-x: auto; }
.editor-area:focus { outline: none; background: #fafafa; }

/* Preview Area & Zoom */
.preview-header { padding: 8px 16px; background: #fff; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; color: #64748b; display: flex; justify-content: space-between; align-items: center; position: absolute; top: 0; left: 0; right: 0; z-index: 10; }
.zoom-controls { display: flex; align-items: center; gap: 8px; }
.zoom-slider { width: 80px; height: 4px; background: #e2e8f0; border-radius: 2px; -webkit-appearance: none; cursor: pointer; }
.zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--primary); border-radius: 50%; cursor: pointer; transition: 0.1s; }
.zoom-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
#zoom-val { min-width: 40px; text-align: right; cursor: pointer; }
#zoom-val:hover { color: var(--primary); text-decoration: underline; }

.diagram-container { flex: 1; overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 60px 40px 40px 40px; }

.diagram-scroll-inner { 
    background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
    min-width: 300px; min-height: 200px; display: flex; justify-content: center; align-items: center;
    transition: transform 0.1s ease-out; transform-origin: top center; 
}

/* Error Box */
.error-toast { position: absolute; bottom: 20px; left: 20px; right: 20px; background: #fee2e2; border: 1px solid #fecaca; color: #b91c1c; padding: 12px; border-radius: 6px; font-size: 12px; display: none; z-index: 10; font-family: var(--font-code); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

/* Buttons */
.btn { height: 36px; padding: 0 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; transition: 0.2s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-secondary { background: #fff; border-color: #cbd5e1; color: var(--text-sub); }
.btn-secondary:hover { background: #f8fafc; border-color: #94a3b8; color: var(--text-main); }
.btn-danger { background: #fff; border-color: #fecaca; color: #ef4444; }
.btn-danger:hover { background: #fef2f2; border-color: #ef4444; }
.btn-icon { width: 36px; padding: 0; justify-content: center; font-size: 16px; color: var(--text-sub); }

.empty-state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; color: #94a3b8; z-index: 50; }
.hidden { display: none !important; }

/* Toast */
#toast { position: fixed; bottom: 30px; right: 30px; background: #1e293b; color: #fff; padding: 12px 20px; border-radius: 8px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 2000; }

/* Modal Styles */
.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000;
    display: none; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-content {
    background: #fff; width: 700px; max-width: 90vw; border-radius: 8px;
    display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
.modal-header {
    padding: 16px 24px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 15px;
    display: flex; justify-content: space-between; align-items: center;
}
.modal-close { cursor: pointer; color: var(--text-sub); font-size: 16px; }
.modal-close:hover { color: var(--text-main); }
.modal-body { padding: 16px 24px; height: 450px; display: flex; flex-direction: column; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* Quill Overrides & Table Paste Support */
.ql-toolbar.ql-snow { border-radius: 6px 6px 0 0; border-color: var(--border); }
.ql-container.ql-snow { border-radius: 0 0 6px 6px; border-color: var(--border); flex: 1; font-family: var(--font-ui); font-size: 13px; }
.ql-editor { line-height: 1.6; }

/* 하이브리드 표 삽입용 CSS */
.custom-table-wrapper { margin: 12px 0; max-width: 100%; overflow-x: auto; }
.custom-table-wrapper table { border-collapse: collapse; width: 100%; font-size: 13px; background: #fff; }
.custom-table-wrapper th { background: #f8fafc; font-weight: 600; color: #0f172a; }
.custom-table-wrapper th, .custom-table-wrapper td { border: 1px solid #cbd5e1; padding: 8px 12px; text-align: left; }
</style>
</head>
<body>

<header>
    <div class="brand"><i class="fas fa-code-branch"></i>Graph Studio</div>
    <div class="header-tools">
        <button class="btn btn-secondary" id="btn-copy-link" title="현재 다이어그램의 고유 링크 복사"><i class="fas fa-link" style="color:#64748b"></i> 링크 복사</button>
        <button class="btn btn-secondary" id="btn-export-png"><i class="fas fa-image" style="color:#10b981"></i> 이미지 저장</button>
    </div>
</header>

<div class="workspace">
    <aside class="pane-list">
        <div class="search-area">
            <input type="text" id="search-input" class="search-input" placeholder="검색 (제목, 내용)...">
        </div>
        <div class="list-scroll" id="item-list"></div>
        <div style="padding:12px; text-align:center; font-size:11px; color:#94a3b8; border-top:1px solid var(--border);">
            Saved Graphs: <span id="total-count" style="font-weight:700; color:#0f172a;">0</span>
        </div>
    </aside>

    <main class="pane-editor">
        <div class="toolbar">
            <div style="font-weight:700; font-size:15px; color:#1e293b; display:flex; align-items:center; gap:8px;">
                <i class="fas fa-edit" style="color:var(--text-sub)"></i> Editor
            </div>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-secondary" id="btn-new" title="Ctrl+Alt+N"><i class="fas fa-plus"></i> 신규</button>
                <button class="btn btn-danger hidden" id="btn-delete"><i class="fas fa-trash"></i> 삭제</button>
                <button class="btn btn-primary" id="btn-save" title="Ctrl+S"><i class="fas fa-save"></i> 저장</button>
            </div>
        </div>

        <div class="meta-bar hidden" id="meta-bar">
            <div style="flex:1;">
                <input type="text" id="inp-title" class="input-flat" placeholder="다이어그램 제목(Project Name)...">
            </div>
            
            <button class="btn btn-secondary" id="btn-note" title="그래프에 대한 비고 입력 및 관리">
                <i class="fas fa-sticky-note" style="color:#f59e0b;"></i> 비고
            </button>
            
            <select id="inp-theme" class="input-field" style="width:120px;">
                <option value="default">Default Theme</option>
                <option value="base">Base</option>
                <option value="forest">Forest</option>
                <option value="neutral">Neutral</option>
                <option value="dark">Dark</option>
            </select>
        </div>

        <div class="split-container hidden" id="main-container">
            <div class="code-pane">
                <div style="padding:8px 16px; background:#f8fafc; border-bottom:1px solid var(--border); font-size:11px; font-weight:600; color:#64748b; display:flex; justify-content:space-between;">
                    <span>MERMAID CODE</span>
                    <i class="fas fa-copy" style="cursor:pointer;" id="btn-copy-code" title="코드 복사"></i>
                </div>
                <textarea id="code-editor" class="editor-area" spellcheck="false"></textarea>
                <div id="error-box" class="error-toast"></div>
            </div>
            <div class="preview-pane">
                <div class="preview-header">
                    <div style="display:flex; gap:8px; align-items:center;">
                        <span>LIVE PREVIEW</span>
                        <span id="render-status" style="color:var(--primary); font-weight:normal; font-size:10px;"><i class="fas fa-check-circle"></i> Rendered</span>
                    </div>
                    <div class="zoom-controls">
                        <i class="fas fa-search-minus" style="font-size:10px;"></i>
                        <input type="range" id="zoom-slider" class="zoom-slider" min="0.5" max="3.0" step="0.1" value="1.0">
                        <i class="fas fa-search-plus" style="font-size:10px;"></i>
                        <span id="zoom-val" title="Reset Zoom">100%</span>
                    </div>
                </div>
                <div class="diagram-container">
                    <div class="diagram-scroll-inner" id="mermaid-output"></div>
                </div>
            </div>
        </div>

        <div id="empty-state" class="empty-state">
            <i class="fas fa-code-branch" style="font-size:48px; margin-bottom:16px; color:#e2e8f0;"></i>
            <p>Graph 다이어그램을 선택하거나 새로 만드세요.</p>
            <button class="btn btn-primary" id="btn-new-center" style="margin-top:16px;"><i class="fas fa-plus"></i> 새 다이어그램 작성</button>
        </div>
    </main>
</div>

<div id="toast"></div>

<div id="note-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span>비고 관리 (Notes)</span>
            <i class="fas fa-times modal-close" id="btn-close-modal"></i>
        </div>
        <div class="modal-body">
            <div id="quill-editor"></div>
            <div style="margin-top:8px; font-size:11px; color:#94a3b8; display:flex; flex-wrap:wrap; gap:8px;">
                <span>단축키:</span>
                <span><b>볼드</b>(Ctrl+B), <b>이탤릭</b>(Ctrl+I), <b>밑줄</b>(Ctrl+U), <b>취소선</b>(Ctrl+0)</span>
                <span><b>빨간색</b>(Ctrl+Alt+R), <b>파란색</b>(Ctrl+Alt+B)</span>
                <span><b>서식 지우기</b>(Ctrl+Shift+X)</span><br>
                <span><b>형광펜</b>(Ctrl+1~7), <b>글꼴 크기</b>(Ctrl+ / Ctrl-)</span>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="btn-cancel-note">취소</button>
            <button class="btn btn-primary" id="btn-save-note">적용 후 닫기</button>
        </div>
    </div>
</div>

<script>
// --- Constants & Config ---
const DEFAULT_GRAPH = `gitGraph
   commit
   commit
   branch develop
   checkout develop
   commit
   commit
   checkout main
   merge develop
   commit
   commit`;

// Mermaid Init
mermaid.initialize({ 
    startOnLoad: false,
    theme: 'default',
    securityLevel: 'loose',
    gitGraph: {
        showBranches: true,
        showCommitLabel: true,
        mainBranchName: 'main'
    }
});

// --- Core Logic (IndexedDB Wrapper) ---
const GRAPH_CORE = {
    db: null, DB_NAME: 'GraphDB', STORE_NAME: 'graphs',
    state: { items: [], search: '', selectedId: null, currentNoteHtml: '' },

    openDB: function() {
        return new Promise((resolve) => {
            const req = indexedDB.open(this.DB_NAME, 1);
            req.onupgradeneeded = (e) => e.target.result.createObjectStore(this.STORE_NAME, { keyPath: 'uid' });
            req.onsuccess = (e) => { this.db = e.target.result; resolve(); };
        });
    },
    getAll: function() {
        return new Promise((resolve) => {
            const tx = this.db.transaction(this.STORE_NAME, 'readonly');
            tx.objectStore(this.STORE_NAME).getAll().onsuccess = (e) => {
                this.state.items = (e.target.result || []).sort((a,b) => b.updatedAt - a.updatedAt);
                resolve(this.state.items);
            };
        });
    },
    save: function(item) {
        return new Promise((resolve) => {
            const tx = this.db.transaction(this.STORE_NAME, 'readwrite');
            item.updatedAt = Date.now();
            tx.objectStore(this.STORE_NAME).put(item).onsuccess = () => resolve(item);
        });
    },
    remove: function(uid) {
        return new Promise((resolve) => {
            const tx = this.db.transaction(this.STORE_NAME, 'readwrite');
            tx.objectStore(this.STORE_NAME).delete(uid).onsuccess = () => resolve();
        });
    }
};

const $ = s => document.querySelector(s);
let renderTimer = null;
let quill; 

// --- Quill 하이브리드 표 삽입용 커스텀 매처 (BlockEmbed) ---
const BlockEmbed = Quill.import('blots/block/embed');
class CustomTableBlot extends BlockEmbed {
    static create(value) {
        const node = super.create();
        node.innerHTML = value; // 테이블 HTML 삽입
        return node;
    }
    static value(node) {
        return node.innerHTML;
    }
}
CustomTableBlot.blotName = 'customTable';
CustomTableBlot.tagName = 'div';
CustomTableBlot.className = 'custom-table-wrapper';
Quill.register(CustomTableBlot);

// --- App Functions ---
(async () => {
    await GRAPH_CORE.openDB();
    initQuill(); 
    bindEvents();
    await refreshList();
    
    const urlParams = new URLSearchParams(window.location.search);
    const targetUid = urlParams.get('uid');
    
    if (targetUid) {
        const targetItem = GRAPH_CORE.state.items.find(i => i.uid === targetUid);
        if (targetItem) {
            loadItem(targetItem);
            window.history.replaceState({}, document.title, window.location.pathname);
            
            setTimeout(() => {
                const activeEl = document.querySelector('.item-card.active');
                if(activeEl) activeEl.scrollIntoView({block: 'center', behavior: 'smooth'});
                toast('요청하신 다이어그램을 불러왔습니다.');
            }, 300);
        } else {
            window.history.replaceState({}, document.title, window.location.pathname);
            toast('요청하신 ID의 다이어그램을 찾을 수 없습니다.');
        }
    }
})();

// Quill 커스텀 폰트 사이즈 인라인 스타일 등록
const SizeStyle = Quill.import('attributors/style/size');
SizeStyle.whitelist = null; 
Quill.register(SizeStyle, true);

function initQuill() {
    quill = new Quill('#quill-editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'color': [] }, { 'background': [] }],
                ['clean']
            ]
        }
    });

    // 💡 [수정사항] Quill 에디터 자체의 맞춤법 검사 비활성화
    quill.root.setAttribute('spellcheck', 'false');

    // 클립보드 매처: 붙여넣기 시 <table> 태그를 감지하여 하이브리드 블록으로 우회 삽입
    quill.clipboard.addMatcher('TABLE', function(node, delta) {
        const Delta = Quill.import('delta');
        // 기존 인라인 스타일과 width 제거하여 UI 통일성 유지
        node.removeAttribute('style');
        node.removeAttribute('width');
        node.removeAttribute('border');
        return new Delta().insert({ customTable: node.outerHTML });
    });

    function changeFontSize(step) {
        const range = quill.getSelection();
        if (!range) return;
        const formats = quill.getFormat(range);
        let currentSize = 13;
        if (formats.size) {
            currentSize = parseInt(formats.size.replace('px', '')) || 13;
        }
        let newSize = Math.max(8, currentSize + step);
        quill.format('size', newSize + 'px');
    }

    // 단축키 매핑
    quill.root.addEventListener('keydown', function(e) {
        if (!e.ctrlKey && !e.metaKey) return; 

        let preventDefault = false;
        if (e.key.toLowerCase() === 'b' && !e.altKey && !e.shiftKey) { quill.format('bold', !quill.getFormat().bold); preventDefault = true; }
        else if (e.key.toLowerCase() === 'i' && !e.altKey && !e.shiftKey) { quill.format('italic', !quill.getFormat().italic); preventDefault = true; }
        else if (e.key.toLowerCase() === 'u' && !e.altKey && !e.shiftKey) { quill.format('underline', !quill.getFormat().underline); preventDefault = true; }
        else if (e.key === '0' && !e.altKey && !e.shiftKey) { quill.format('strike', !quill.getFormat().strike); preventDefault = true; }
        else if (e.key.toLowerCase() === 'r' && e.altKey) { quill.format('color', 'red'); preventDefault = true; }
        else if (e.key.toLowerCase() === 'b' && e.altKey) { quill.format('color', 'blue'); preventDefault = true; }
        else if (e.key.toLowerCase() === 'x' && e.shiftKey) {
            let range = quill.getSelection();
            if(range) quill.removeFormat(range.index, range.length);
            preventDefault = true;
        }
        else if (['1','2','3','4','5','6','7'].includes(e.key) && !e.altKey && !e.shiftKey) {
            const colors = { '1': '#ffd8a8', '2': '#d0ebff', '3': '#fff3bf', '4': '#d3f9d8', '5': '#ffdeeb', '6': '#e8dfd8', '7': '#f1f3f5' };
            quill.format('background', colors[e.key]); preventDefault = true;
        }
        else if ((e.key === '+' || e.key === '=') && !e.altKey) { changeFontSize(1); preventDefault = true; }
        else if ((e.key === '-' || e.key === '_') && !e.altKey) { changeFontSize(-1); preventDefault = true; }

        if (preventDefault) {
            e.preventDefault();
            e.stopPropagation();
        }
    });
}

function bindEvents() {
    $('#btn-new').onclick = $('#btn-new-center').onclick = createNew;
    $('#btn-save').onclick = saveCurrent;
    $('#btn-delete').onclick = deleteCurrent;
    $('#btn-export-png').onclick = exportToPng;
    
    $('#btn-copy-link').onclick = () => {
        if(!GRAPH_CORE.state.selectedId || $('#empty-state').classList.contains('hidden') === false) {
            return toast('먼저 다이어그램을 선택하거나 저장하세요.');
        }
        const fullLink = `${window.location.origin}${window.location.pathname}?uid=${GRAPH_CORE.state.selectedId}`;
        navigator.clipboard.writeText(fullLink).then(() => {
            toast('다이어그램 링크가 복사되었습니다.');
        }).catch(() => {
            toast('링크 복사에 실패했습니다.');
        });
    };
    
    $('#search-input').onkeyup = (e) => { GRAPH_CORE.state.search = e.target.value.toLowerCase(); renderList(); };
    $('#code-editor').oninput = () => {
        clearTimeout(renderTimer);
        renderTimer = setTimeout(renderDiagram, 500); 
    };
    $('#inp-theme').onchange = renderDiagram;

    $('#btn-copy-code').onclick = () => {
        navigator.clipboard.writeText($('#code-editor').value);
        toast('코드가 복사되었습니다.');
    };

    const noteModal = $('#note-modal');
    $('#btn-note').onclick = () => {
        quill.root.innerHTML = GRAPH_CORE.state.currentNoteHtml || '';
        noteModal.classList.add('active');
    };
    $('#btn-close-modal').onclick = $('#btn-cancel-note').onclick = () => {
        noteModal.classList.remove('active');
    };
    $('#btn-save-note').onclick = () => {
        GRAPH_CORE.state.currentNoteHtml = quill.root.innerHTML;
        noteModal.classList.remove('active');
        toast('비고 내용이 임시 적용되었습니다. (최종 저장은 다이어그램 저장 필요)');
    };

    const zoomSlider = $('#zoom-slider');
    const zoomVal = $('#zoom-val');
    const outputDiv = $('#mermaid-output');

    const updateZoom = (value) => {
        let nextVal = Math.max(0.5, Math.min(3.0, value));
        zoomSlider.value = nextVal;
        outputDiv.style.transform = `scale(${nextVal})`;
        zoomVal.textContent = Math.round(nextVal * 100) + '%';
    };

    zoomSlider.oninput = (e) => updateZoom(e.target.value);
    zoomVal.onclick = () => updateZoom(1.0);

    const container = $('.preview-pane');
    container.addEventListener('wheel', (e) => {
        if (e.ctrlKey) {
            e.preventDefault();
            const currentZoom = parseFloat(zoomSlider.value);
            const delta = e.deltaY > 0 ? -0.1 : 0.1; 
            updateZoom(currentZoom + delta);
        }
    }, { passive: false });

    document.addEventListener('keydown', e => {
        if((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
            e.preventDefault();
            if(!$('#empty-state').classList.contains('hidden')) return;
            saveCurrent();
        }
        if((e.ctrlKey || e.metaKey) && e.altKey && (e.key === 'n' || e.key === 'N')) {
            e.preventDefault();
            createNew();
        }
    });
}

async function refreshList() { 
    await GRAPH_CORE.getAll(); 
    renderList(); 
}

function renderList() {
    const el = $('#item-list'); el.innerHTML = '';
    const { search, items, selectedId } = GRAPH_CORE.state;
    
    const filtered = items.filter(i => {
        if(!search) return true;
        return (i.title + i.code + (i.note || '')).toLowerCase().includes(search);
    });

    filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = `item-card ${selectedId === item.uid ? 'active' : ''}`;
        div.onclick = () => loadItem(item);
        
        const dateStr = new Date(item.updatedAt).toLocaleDateString();
        div.innerHTML = `
            <span class="item-title">${item.title || 'Untitled'}</span>
            <div class="item-meta">
                <span class="item-tag">${item.theme}</span>
                <span class="item-date">${dateStr}</span>
            </div>
        `;
        el.appendChild(div);
    });
    $('#total-count').textContent = filtered.length;
}

function createNew() {
    GRAPH_CORE.state.selectedId = null;
    GRAPH_CORE.state.currentNoteHtml = ''; 
    renderList();
    
    $('#empty-state').classList.add('hidden');
    $('#meta-bar').classList.remove('hidden');
    $('#main-container').classList.remove('hidden');
    $('#btn-delete').classList.add('hidden');

    $('#inp-title').value = '';
    $('#inp-theme').value = 'default';
    $('#code-editor').value = DEFAULT_GRAPH;
    resetZoom();
    $('#inp-title').focus();
    
    renderDiagram();
}

function loadItem(item) {
    GRAPH_CORE.state.selectedId = item.uid;
    GRAPH_CORE.state.currentNoteHtml = item.note || ''; 
    renderList();

    $('#empty-state').classList.add('hidden');
    $('#meta-bar').classList.remove('hidden');
    $('#main-container').classList.remove('hidden');
    $('#btn-delete').classList.remove('hidden');

    $('#inp-title').value = item.title;
    $('#inp-theme').value = item.theme || 'default';
    $('#code-editor').value = item.code;
    resetZoom();
    
    renderDiagram();
}

function resetZoom() {
    $('#zoom-slider').value = 1.0;
    $('#mermaid-output').style.transform = 'scale(1.0)';
    $('#zoom-val').textContent = '100%';
}

async function saveCurrent() {
    const code = $('#code-editor').value;
    const title = $('#inp-title').value.trim() || 'Untitled Project';

    if(!code) return toast('코드가 비어있습니다.');

    const item = {
        uid: GRAPH_CORE.state.selectedId || Date.now().toString(36),
        title: title,
        theme: $('#inp-theme').value,
        code: code,
        note: GRAPH_CORE.state.currentNoteHtml, 
        createdAt: Date.now() 
    };

    await GRAPH_CORE.save(item);
    GRAPH_CORE.state.selectedId = item.uid;
    refreshList();
    toast('저장되었습니다.');
}

async function deleteCurrent() {
    if(confirm('정말 삭제하시겠습니까? 복구할 수 없습니다.')) {
        await GRAPH_CORE.remove(GRAPH_CORE.state.selectedId);
        GRAPH_CORE.state.selectedId = null;
        refreshList();
        
        $('#empty-state').classList.remove('hidden');
        $('#meta-bar').classList.add('hidden');
        $('#main-container').classList.add('hidden');
        $('#btn-delete').classList.add('hidden');
        toast('삭제되었습니다.');
    }
}

async function renderDiagram() {
    const code = $('#code-editor').value;
    const theme = $('#inp-theme').value;
    const output = $('#mermaid-output');
    const errorBox = $('#error-box');
    const status = $('#render-status');

    if(!code.trim()) {
        output.innerHTML = '';
        return;
    }

    mermaid.initialize({ 
        startOnLoad: false, 
        theme: theme,
        securityLevel: 'loose'
    });

    try {
        const id = 'graph-' + Date.now();
        await mermaid.parse(code); 
        const { svg } = await mermaid.render(id, code);
        output.innerHTML = svg;
        
        errorBox.style.display = 'none';
        status.innerHTML = '<i class="fas fa-check-circle"></i> Rendered';
        status.style.color = 'var(--primary)';
        
    } catch (e) {
        console.error(e);
        errorBox.textContent = `Syntax Error: ${e.message}`;
        errorBox.style.display = 'block';
        status.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error';
        status.style.color = '#ef4444';
    }
}

function exportToPng() {
    const svgEl = document.querySelector('#mermaid-output svg');
    if(!svgEl) return toast('내보낼 다이어그램이 없습니다.');

    const svgData = new XMLSerializer().serializeToString(svgEl);
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();

    const bbox = svgEl.getBoundingClientRect();
    const scale = 2; 
    canvas.width = bbox.width * scale;
    canvas.height = bbox.height * scale;

    img.onload = () => {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        const a = document.createElement('a');
        a.download = `${$('#inp-title').value || 'gitgraph'}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
    };

    img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
}

function toast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 2000);
}
</script>
</body>
