<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF to Image</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // PDF.js 워커(Worker) 설정
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      --bg-body: #F9FAFB;
      --bg-surface: #FFFFFF;
      --border-light: #F3F4F6;
      --border-base: #E5E7EB;
      --text-main: #111827;
      --text-muted: #6B7280;
      --primary: #EF4444; 
      --primary-hover: #DC2626;
      --secondary: #FFFFFF;
      --secondary-hover: #F9FAFB;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    .dashboard-header {
      max-width: 100%;
      margin: 0 auto 24px auto;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .title-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .title-area i { font-size: 28px; color: var(--primary); }
    h2 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    
    .actions { display: flex; gap: 10px; }

    input[type="file"] { display: none; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--primary); color: white;
      box-shadow: var(--shadow-sm);
    }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    
    .btn-outline {
      background: var(--secondary); color: var(--text-main);
      border-color: var(--border-base); box-shadow: var(--shadow-sm);
    }
    .btn-outline:hover { background: var(--secondary-hover); border-color: #D1D5DB; }

    .instructions {
      display: flex; gap: 20px; align-items: center;
      font-size: 13px; color: var(--text-muted);
      background: var(--bg-surface); padding: 12px 20px;
      border-radius: var(--radius-md); border: 1px solid var(--border-base);
    }
    .instructions span { display: inline-flex; align-items: center; gap: 6px; }
    .instructions i { font-size: 16px; }

    #content-wrapper {
      max-width: 100%; margin: 0 auto;
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-lg);
      padding: 24px;
      min-height: 400px;
      box-shadow: var(--shadow-md);
    }

    .empty-msg {
      padding: 80px 20px; text-align: center; color: var(--text-muted);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      height: 100%; justify-content: center;
    }
    .empty-msg i { font-size: 40px; color: #D1D5DB; }
    
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .ph-spinner { animation: spin 1s linear infinite; color: var(--primary) !important; }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .image-card {
      background: var(--bg-body);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .image-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .image-preview {
      width: 100%;
      height: 240px; 
      object-fit: contain;
      background-color: #f3f4f6;
      border-bottom: 1px solid var(--border-light);
      cursor: zoom-in;
    }

    .image-info {
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .image-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }

    .image-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover {
      background: var(--border-base);
      color: var(--primary);
    }

    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #111827; color: white;
      padding: 10px 20px; border-radius: 99px; font-size: 14px;
      box-shadow: var(--shadow-md); opacity: 0; visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      z-index: 3000;
    }
    #toast.show { opacity: 1; visibility: visible; }

    .modal-overlay {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .modal-content {
      max-width: 90%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: var(--radius-md);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      animation: zoomIn 0.2s ease-out;
      background: white; 
    }
    
    .modal-controls {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      animation: zoomIn 0.2s ease-out;
    }
    .modal-controls .btn-primary {
        background: white; color: black;
    }
    .modal-controls .btn-outline {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-color: rgba(255, 255, 255, 0.2);
    }
    .modal-controls .btn-outline:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .modal-close {
      position: absolute;
      top: 20px; right: 30px;
      color: white;
      font-size: 40px;
      font-weight: 300;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }
    .modal-close:hover { color: #9CA3AF; }
    
    @keyframes zoomIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="dashboard-header">
    <div class="header-top">
      <div class="title-area">
        <i class="ph ph-file-pdf"></i>
        <h2>PDF to Image</h2>
      </div>
      
      <div class="actions">
        <label for="upload-pdf" class="btn btn-primary">
          <i class="ph ph-upload-simple"></i> 파일 불러오기
        </label>
        <input type="file" id="upload-pdf" accept=".pdf" />
        
        <button class="btn btn-outline" id="btn-clear" onclick="clearData()" style="display:none;">
          <i class="ph ph-trash"></i> 초기화
        </button>
      </div>
    </div>

    <div class="instructions">
      <span><i class="ph ph-arrows-out"></i> 이미지 클릭: 크게 보기</span>
      <span style="color: #D1D5DB;">|</span>
      <span><i class="ph ph-copy"></i> 아이콘 클릭: 클립보드 복사</span>
      <span style="color: #D1D5DB;">|</span>
      <span><i class="ph ph-download-simple"></i> 아이콘 클릭: 다운로드</span>
    </div>
  </div>

  <div id="content-wrapper">
    <div class="empty-msg" id="empty-state">
      <i class="ph ph-file-pdf"></i>
      PDF 파일(.pdf)을 업로드하여 내부에 포함된 이미지를 추출하세요
    </div>
    <div class="image-grid" id="image-grid" style="display: none;"></div>
  </div>

  <div id="toast">복사되었습니다!</div>

  <div id="image-modal" class="modal-overlay" onclick="closeModal()">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <img id="modal-img" class="modal-content" src="" onclick="event.stopPropagation();">
    
    <div class="modal-controls" onclick="event.stopPropagation();">
      <button class="btn btn-primary" onclick="copyModalImage()">
        <i class="ph ph-copy"></i> 이미지 복사
      </button>
      <button class="btn btn-outline" onclick="downloadModalImage()">
        <i class="ph ph-download-simple"></i> 다운로드
      </button>
    </div>
  </div>

  <script>
    const uploadInput = document.getElementById('upload-pdf');
    const emptyState = document.getElementById('empty-state');
    const imageGrid = document.getElementById('image-grid');
    const btnClear = document.getElementById('btn-clear');
    
    let extractedImages = [];
    let currentModalIndex = -1;

    uploadInput.addEventListener('change', async function(e) {
      const file = e.target.files[0];
      if (!file) return;

      extractedImages = [];
      emptyState.innerHTML = `
        <i class="ph ph-spinner"></i>
        <div style="text-align:center">
          <strong>내부 이미지 스캔 중입니다... 준비 중</strong><br>
          <span style="font-size:13px; color:#9CA3AF">고속 스캔 모드로 파일을 읽고 있습니다.</span>
        </div>`;
      emptyState.style.display = 'flex';
      imageGrid.style.display = 'none';
      btnClear.style.display = 'none';

      try {
        const arrayBuffer = await file.arrayBuffer();
        const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
        const pdf = await loadingTask.promise;
        const originalName = file.name.replace(/\.[^/.]+$/, "");
        
        let globalImageCount = 0;

        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          
          // 🚀 브라우저 병목 제거: 페이지 단위로만 UI를 갱신
          emptyState.innerHTML = `
            <i class="ph ph-spinner"></i>
            <div style="text-align:center">
              <strong>내부 이미지 스캔 중입니다... (${pageNum} / ${pdf.numPages} 페이지)</strong><br>
              <span style="font-size:13px; color:#9CA3AF">페이지 분석 중...</span>
            </div>`;
          await new Promise(resolve => requestAnimationFrame(resolve));

          const page = await pdf.getPage(pageNum);
          const ops = await page.getOperatorList();
          
          for (let i = 0; i < ops.fnArray.length; i++) {
            
            // textbook_pdf 로직 이식: 속도를 위해 가장 핵심적인 이미지 객체만 필터링
            if (ops.fnArray[i] === pdfjsLib.OPS.paintImageXObject) {
              const objId = ops.argsArray[i][0];
              
              try {
                const imgDataObj = await page.objs.get(objId);

                if (!imgDataObj || !imgDataObj.width || !imgDataObj.height) continue;

                // 50픽셀 미만의 작은 이미지(장식, 선 등)는 버림 (기존 기능 유지)
                if (imgDataObj.width < 50 || imgDataObj.height < 50) continue;

                const canvas = document.createElement('canvas');
                canvas.width = imgDataObj.width;
                canvas.height = imgDataObj.height;
                const ctx = canvas.getContext('2d');

                // 🚀 고속 렌더링 로직 (비효율적인 배열 연산 제거)
                if (imgDataObj.bitmap) {
                    ctx.drawImage(imgDataObj.bitmap, 0, 0);
                    globalImageCount++;
                } 
                else if (imgDataObj.data) {
                    let imageData = ctx.createImageData(canvas.width, canvas.height);
                    if (imgDataObj.data.length === imageData.data.length) {
                        imageData.data.set(imgDataObj.data);
                        ctx.putImageData(imageData, 0, 0);
                        globalImageCount++;
                    } else {
                        // 규격이 맞지 않는 복잡한 데이터는 스킵하여 처리 속도 확보
                        continue; 
                    }
                } else {
                    continue; 
                }

                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                
                extractedImages.push({
                  name: `${originalName}_p${pageNum}_img${globalImageCount}.png`,
                  mimeType: 'image/png',
                  blob: blob,
                  url: URL.createObjectURL(blob)
                });

              } catch (err) {
                console.warn(`이미지 객체(${objId}) 추출 중 오류 - 스킵합니다:`, err);
              }
            }
          }
        }
        
        renderImages();
      } catch (err) {
        console.error('PDF Processing Error:', err);
        alert('PDF 파일을 처리하는 중 오류가 발생했습니다.');
        clearData();
      } finally {
        uploadInput.value = '';
      }
    });

    function renderImages() {
      if (extractedImages.length === 0) {
        emptyState.innerHTML = `<i class="ph ph-warning-circle"></i>추출 가능한 이미지 객체를 찾지 못했습니다.`;
        btnClear.style.display = 'inline-flex';
        return;
      }

      emptyState.style.display = 'none';
      imageGrid.style.display = 'grid';
      btnClear.style.display = 'inline-flex';
      imageGrid.innerHTML = '';

      extractedImages.forEach((img, index) => {
        const card = document.createElement('div');
        card.className = 'image-card';
        card.innerHTML = `
          <img src="${img.url}" class="image-preview" title="클릭하여 크게 보기" onclick="viewImageFullScreen(${index})">
          <div class="image-info">
            <span class="image-name" title="${img.name}">${img.name}</span>
            <div class="image-actions">
              <button class="icon-btn" onclick="copyImage(${index})" title="복사하기"><i class="ph ph-copy"></i></button>
              <button class="icon-btn" onclick="downloadImage(${index})" title="다운로드"><i class="ph ph-download-simple"></i></button>
            </div>
          </div>
        `;
        imageGrid.appendChild(card);
      });
    }

    function viewImageFullScreen(index) {
      currentModalIndex = index;
      const imgData = extractedImages[index];
      const modal = document.getElementById('image-modal');
      const modalImg = document.getElementById('modal-img');
      modalImg.src = imgData.url;
      modal.style.display = 'flex';
    }

    function closeModal() {
      const modal = document.getElementById('image-modal');
      modal.style.display = 'none';
      currentModalIndex = -1;
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    async function copyImage(index) {
      const imgData = extractedImages[index];
      try {
        const clipboardItem = new ClipboardItem({ [imgData.mimeType]: imgData.blob });
        await navigator.clipboard.write([clipboardItem]);
        showToast('이미지가 클립보드에 복사되었습니다.');
      } catch (err) {
        alert('클립보드 복사에 실패했습니다.');
      }
    }

    function downloadImage(index) {
      const imgData = extractedImages[index];
      const a = document.createElement('a');
      a.href = imgData.url;
      a.download = imgData.name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function copyModalImage() { if (currentModalIndex > -1) copyImage(currentModalIndex); }
    function downloadModalImage() { if (currentModalIndex > -1) downloadImage(currentModalIndex); }

    function clearData() {
      extractedImages.forEach(img => URL.revokeObjectURL(img.url)); 
      extractedImages = [];
      emptyState.innerHTML = `<i class="ph ph-file-pdf"></i>PDF 파일(.pdf)을 업로드하여 내부에 포함된 이미지를 추출하세요`;
      emptyState.style.display = 'flex';
      imageGrid.style.display = 'none';
      btnClear.style.display = 'none';
    }

    let toastTimeout;
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
