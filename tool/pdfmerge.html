<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Merge</title>
  
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      --bg-body: #F9FAFB;
      --bg-surface: #FFFFFF;
      --border-light: #F3F4F6;
      --border-base: #E5E7EB;
      --text-main: #111827;
      --text-muted: #6B7280;
      --primary: #8B5CF6; /* Merge 도구는 보라색 테마 */
      --primary-hover: #7C3AED;
      --secondary: #FFFFFF;
      --secondary-hover: #F9FAFB;
      --danger: #EF4444;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    .dashboard-header { max-width: 100%; margin: 0 auto 24px auto; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .title-area { display: flex; align-items: center; gap: 12px; }
    .title-area i { font-size: 28px; color: var(--primary); }
    h2 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    
    .actions { display: flex; gap: 10px; }
    
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 18px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }
    .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-outline { background: var(--secondary); color: var(--text-main); border-color: var(--border-base); box-shadow: var(--shadow-sm); }
    .btn-outline:hover { background: var(--secondary-hover); border-color: #D1D5DB; }
    .btn-sm { padding: 6px 10px; font-size: 13px; }
    .btn-icon { padding: 6px; color: var(--text-muted); background: transparent; border: 1px solid transparent; border-radius: 4px; cursor: pointer; }
    .btn-icon:hover { background: var(--border-base); color: var(--text-main); }
    .btn-icon:disabled { opacity: 0.3; cursor: not-allowed; }

    .instructions {
      display: flex; gap: 20px; align-items: center; font-size: 13px; color: var(--text-muted);
      background: var(--bg-surface); padding: 12px 20px; border-radius: var(--radius-md); border: 1px solid var(--border-base);
    }

    #workspace {
      max-width: 100%; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 400px; gap: 24px;
      align-items: start;
    }

    /* Panels */
    .panel {
      background: var(--bg-surface); border: 1px solid var(--border-base);
      border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-md);
    }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .panel-title { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    
    /* File List Table */
    .file-list-container {
      border: 1px solid var(--border-base); border-radius: var(--radius-md);
      max-height: 500px; overflow-y: auto; background: var(--bg-body);
    }
    table.file-table { width: 100%; border-collapse: collapse; }
    table.file-table th, table.file-table td { 
        border-bottom: 1px solid var(--border-base); padding: 12px; text-align: left; font-size: 14px; 
    }
    table.file-table th { font-weight: 600; color: var(--text-muted); background: var(--bg-surface); position: sticky; top: 0; z-index: 10; }
    table.file-table tr { background: var(--bg-surface); transition: background 0.2s; }
    table.file-table tr:hover { background: #f3f4f6; }
    table.file-table tr.unselected { opacity: 0.6; background: var(--bg-body); }
    
    .check-cell { width: 40px; text-align: center !important; }
    .order-cell { width: 80px; text-align: center !important; }
    
    /* Checkbox Customization */
    input[type="checkbox"] {
        width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer;
    }

    /* Merge Settings Form */
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); }
    .form-group input { 
        width: 100%; padding: 10px 12px; border: 1px solid var(--border-base); 
        border-radius: var(--radius-md); font-family: inherit; font-size: 14px; 
    }
    .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1); }
    
    .summary-box {
        background: var(--bg-body); border-radius: var(--radius-md); padding: 16px; margin-bottom: 20px;
        border: 1px dashed var(--border-base);
    }
    .summary-text { font-size: 14px; display: flex; justify-content: space-between; margin-bottom: 8px; }
    .summary-text strong { color: var(--primary); }

    .empty-msg { padding: 60px 20px; text-align: center; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .empty-msg i { font-size: 40px; color: #D1D5DB; }

    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #111827; color: white; padding: 10px 20px; border-radius: 99px; font-size: 14px;
      box-shadow: var(--shadow-md); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 3000;
    }
    #toast.show { opacity: 1; visibility: visible; }
  </style>
</head>
<body>

  <div class="dashboard-header">
    <div class="header-top">
      <div class="title-area">
        <i class="ph ph-intersect"></i>
        <h2>PDF Merge</h2>
      </div>
      
      <div class="actions">
        <button class="btn btn-outline" onclick="openFolder()">
          <i class="ph ph-folder-open"></i> 작업 폴더 선택
        </button>
      </div>
    </div>

    <div class="instructions">
      <span><i class="ph ph-folder-notch"></i> 폴더를 선택하면 안의 PDF가 모두 나열됩니다.</span>
      <span style="color: #D1D5DB;">|</span>
      <span><i class="ph ph-arrows-down-up"></i> 위/아래 화살표를 눌러 병합할 순서를 조정하세요. 위에서부터 아래 순서대로 합쳐집니다.</span>
    </div>
  </div>

  <div id="workspace">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title" id="folder-title"><i class="ph ph-folder-dashed"></i> 선택된 폴더 없음</div>
        <div style="display:flex; gap:8px;">
            <button class="btn btn-outline btn-sm" onclick="toggleAllFiles(true)" id="btn-check-all" disabled>전체 선택</button>
            <button class="btn btn-outline btn-sm" onclick="toggleAllFiles(false)" id="btn-uncheck-all" disabled>선택 해제</button>
        </div>
      </div>
      
      <div class="file-list-container">
        <table class="file-table" id="file-table" style="display:none;">
          <thead>
            <tr>
              <th class="check-cell"><i class="ph ph-check-square"></i></th>
              <th>파일명</th>
              <th class="order-cell">순서 이동</th>
            </tr>
          </thead>
          <tbody id="file-list-body">
            </tbody>
        </table>
        
        <div class="empty-msg" id="empty-state">
          <i class="ph ph-folder-open"></i>
          우측 상단의 [작업 폴더 선택] 버튼을 눌러<br>병합할 PDF가 있는 폴더를 열어주세요.
        </div>
      </div>
    </div>

    <div class="panel" style="background: var(--bg-surface); display: flex; flex-direction: column; justify-content: space-between;">
      <div>
        <div class="panel-header" style="border-bottom: 1px solid var(--border-base); padding-bottom: 16px;">
          <div class="panel-title">병합 설정</div>
        </div>
        
        <div class="summary-box">
          <div class="summary-text">
            <span>불러온 파일:</span>
            <strong id="total-count">0개</strong>
          </div>
          <div class="summary-text" style="margin-bottom: 0;">
            <span>병합 대상 (체크됨):</span>
            <strong id="selected-count">0개</strong>
          </div>
        </div>

        <div class="form-group">
          <label for="output-filename">생성될 병합 파일명</label>
          <input type="text" id="output-filename" placeholder="예: 2024_보고서_통합본.pdf" disabled>
        </div>
      </div>

      <button class="btn btn-primary" style="width: 100%; height: 48px; font-size: 15px;" onclick="mergeAndSave()" id="btn-merge" disabled>
        <i class="ph ph-file-plus"></i> 이 폴더에 병합 파일 생성
      </button>
    </div>
  </div>

  <div id="toast">병합 완료!</div>

  <script>
    let dirHandle = null;
    let pdfFiles = []; // { handle, name, selected }

    // 1. 작업 폴더 열기 (File System Access API)
    async function openFolder() {
      try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('folder-title').innerHTML = `<i class="ph ph-folder-open" style="color:var(--primary)"></i> ${dirHandle.name}`;
        
        pdfFiles = [];
        
        // 폴더 내 파일 순회
        for await (const entry of dirHandle.values()) {
          if (entry.kind === 'file' && entry.name.toLowerCase().endsWith('.pdf')) {
            pdfFiles.push({
              handle: entry,
              name: entry.name,
              selected: true // 기본으로 모두 선택
            });
          }
        }

        if (pdfFiles.length === 0) {
          alert('선택한 폴더에 PDF 파일이 없습니다.');
          return;
        }

        // 초기 정렬: 파일 이름 기준 자연 정렬(오름차순)
        pdfFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
        
        // UI 활성화
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('file-table').style.display = 'table';
        document.getElementById('btn-check-all').disabled = false;
        document.getElementById('btn-uncheck-all').disabled = false;
        document.getElementById('output-filename').disabled = false;
        document.getElementById('btn-merge').disabled = false;
        
        // 기본 파일명 추천 세팅
        document.getElementById('output-filename').value = `${dirHandle.name}_병합본.pdf`;

        renderFileList();

      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error(err);
          alert('폴더를 여는 중 오류가 발생했습니다. 브라우저 지원 여부를 확인해주세요.');
        }
      }
    }

    // 2. 파일 목록 UI 렌더링
    function renderFileList() {
      const tbody = document.getElementById('file-list-body');
      tbody.innerHTML = '';

      let selectedCount = 0;

      pdfFiles.forEach((file, index) => {
        if (file.selected) selectedCount++;
        
        const tr = document.createElement('tr');
        if (!file.selected) tr.className = 'unselected';
        
        tr.innerHTML = `
          <td class="check-cell">
            <input type="checkbox" onchange="toggleFileSelection(${index})" ${file.selected ? 'checked' : ''}>
          </td>
          <td>
            <div style="display:flex; align-items:center; gap:8px;">
              <i class="ph ph-file-pdf" style="color:${file.selected ? 'var(--primary)' : 'var(--text-muted)'}; font-size:18px;"></i>
              <span style="word-break: break-all;">${file.name}</span>
            </div>
          </td>
          <td class="order-cell">
            <button class="btn-icon" onclick="moveRow(${index}, -1)" ${index === 0 ? 'disabled' : ''} title="위로 이동">
              <i class="ph ph-caret-up"></i>
            </button>
            <button class="btn-icon" onclick="moveRow(${index}, 1)" ${index === pdfFiles.length - 1 ? 'disabled' : ''} title="아래로 이동">
              <i class="ph ph-caret-down"></i>
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      // 요약 정보 업데이트
      document.getElementById('total-count').textContent = `${pdfFiles.length}개`;
      document.getElementById('selected-count').textContent = `${selectedCount}개`;
      
      const mergeBtn = document.getElementById('btn-merge');
      if (selectedCount >= 2) {
        mergeBtn.disabled = false;
        mergeBtn.innerHTML = `<i class="ph ph-file-plus"></i> 이 폴더에 병합 파일 생성`;
      } else {
        mergeBtn.disabled = true;
        mergeBtn.innerHTML = `<i class="ph ph-warning"></i> 2개 이상의 파일을 선택하세요`;
      }
    }

    // 3. 파일 선택 상태 토글 (개별)
    function toggleFileSelection(index) {
      pdfFiles[index].selected = !pdfFiles[index].selected;
      renderFileList();
    }

    // 4. 전체 선택/해제
    function toggleAllFiles(state) {
      pdfFiles.forEach(file => file.selected = state);
      renderFileList();
    }

    // 5. 순서 위/아래 이동
    function moveRow(index, direction) {
      if (direction === -1 && index > 0) {
        // 위로
        const temp = pdfFiles[index - 1];
        pdfFiles[index - 1] = pdfFiles[index];
        pdfFiles[index] = temp;
      } else if (direction === 1 && index < pdfFiles.length - 1) {
        // 아래로
        const temp = pdfFiles[index + 1];
        pdfFiles[index + 1] = pdfFiles[index];
        pdfFiles[index] = temp;
      }
      renderFileList();
    }

    // 6. 병합 실행 및 같은 폴더에 저장
    async function mergeAndSave() {
      if (!dirHandle) return alert("작업 폴더가 선택되지 않았습니다.");
      
      const selectedFiles = pdfFiles.filter(f => f.selected);
      if (selectedFiles.length < 2) return alert("병합할 파일을 2개 이상 선택해주세요.");

      // 파일명 검증
      let outName = document.getElementById('output-filename').value.trim() || 'Merged_Output.pdf';
      if (!outName.toLowerCase().endsWith('.pdf')) {
        outName += '.pdf';
      }

      const mergeBtn = document.getElementById('btn-merge');
      mergeBtn.disabled = true;
      mergeBtn.innerHTML = `<i class="ph ph-spinner ph-spin"></i> 병합 중입니다...`;

      try {
        // 새 PDF 문서 생성
        const mergedPdf = await PDFLib.PDFDocument.create();

        // 선택된 순서대로 파일 읽어서 페이지 복사
        for (const fileItem of selectedFiles) {
          const fileData = await fileItem.handle.getFile();
          const arrayBuffer = await fileData.arrayBuffer();
          
          try {
            const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
            const copiedPages = await mergedPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
            copiedPages.forEach((page) => mergedPdf.addPage(page));
          } catch(err) {
            console.error(`${fileItem.name} 처리 오류:`, err);
            alert(`[${fileItem.name}] 파일을 병합하는 중 오류가 발생했습니다. 암호가 걸려있거나 손상된 파일일 수 있습니다.`);
            throw err; 
          }
        }

        // 병합된 PDF 바이트 배열 생성
        const mergedPdfBytes = await mergedPdf.save();

        // 기존 폴더에 파일 생성 후 쓰기
        const newFileHandle = await dirHandle.getFileHandle(outName, { create: true });
        const writable = await newFileHandle.createWritable();
        await writable.write(mergedPdfBytes);
        await writable.close();

        showToast(`'${outName}' 파일이 성공적으로 생성되었습니다!`);

        // 생성 직후 해당 폴더(dirHandle)를 다시 읽어서 목록 갱신을 하려면 
        // 여기서 openFolder 로직의 일부를 재호출하면 됩니다만, 
        // 심플함을 위해 버튼 상태만 복구합니다.

      } catch (err) {
        console.error(err);
        alert('병합 또는 저장 중 오류가 발생했습니다.');
      } finally {
        mergeBtn.disabled = false;
        mergeBtn.innerHTML = `<i class="ph ph-file-plus"></i> 이 폴더에 병합 파일 생성`;
      }
    }

    let toastTimeout;
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.classList.add('show');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 3500);
    }
  </script>
</body>
</html>
