<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>달구리 (Dalguri) - 꼬마 요정의 모험</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Jua', sans-serif;
            /* 배경을 조금 더 몽환적이고 예쁜 보랏빛/핑크빛으로 수정 */
            background: linear-gradient(135deg, #2a0845, #6441a5, #ffb8d1);
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .game-wrapper {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            color: #ffb6c1;
            text-shadow: 0 0 10px rgba(255, 182, 193, 0.6);
            letter-spacing: 2px;
        }

        .score-board {
            font-size: 24px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 20px;
            border-radius: 30px;
            color: #ffdfba;
        }

        canvas {
            background: linear-gradient(to bottom, #1d1135, #5a4b81, #ffc3a0);
            border-radius: 16px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }

        .controls {
            margin-top: 20px;
            font-size: 18px;
            color: #ffe4e1;
        }

        .btn-start {
            margin-top: 15px;
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-family: 'Jua', sans-serif;
            font-size: 22px;
            color: #555;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 154, 158, 0.6);
        }

        .btn-start:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="header">
        <h1>🌙 달구리</h1>
        <div class="score-board">별빛 점수: <span id="score">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="700" height="450"></canvas>
    
    <div class="controls">
        <p>조작: ⬅️ ➡️ (사뿐사뿐 걷기) / ⬆️ (폴짝 점프!)</p>
        <p>먹구름(🌩️)을 피해서 달빛 조각(⭐)을 모아주세요!</p>
        <button class="btn-start" id="startBtn">게임 시작</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const startBtn = document.getElementById('startBtn');

    let animationId;
    let isGameOver = true;
    let score = 0;
    let keys = { right: false, left: false, up: false };

    // 꼬마 여자아이 요정 (이모지 변경: 🧚🏻‍♀️)
    const player = {
        x: 50, y: 350, width: 30, height: 40,
        dx: 0, dy: 0, speed: 4.5, jumpPower: -11,
        grounded: false, emoji: '🧚🏻‍♀️',
        wobble: 0 
    };

    const gravity = 0.55;
    let platforms = [];
    let items = [];
    let enemies = [];
    let particles = []; 

    function initMap() {
        platforms = [
            { x: 0, y: 400, width: 700, height: 50 }, 
            { x: 150, y: 320, width: 120, height: 15 },
            { x: 350, y: 250, width: 120, height: 15 },
            { x: 100, y: 180, width: 120, height: 15 },
            { x: 500, y: 150, width: 120, height: 15 },
            { x: 300, y: 90, width: 100, height: 15 }
        ];

        items = [
            { x: 200, y: 280, width: 25, height: 25, collected: false },
            { x: 400, y: 210, width: 25, height: 25, collected: false },
            { x: 150, y: 140, width: 25, height: 25, collected: false },
            { x: 550, y: 110, width: 25, height: 25, collected: false },
            { x: 340, y: 50, width: 25, height: 25, collected: false }
        ];

        enemies = [
            { x: 400, y: 360, width: 30, height: 30, dx: 1.5, minX: 300, maxX: 650, emoji: '🌩️' },
            { x: 350, y: 210, width: 30, height: 30, dx: 1.2, minX: 350, maxX: 450, emoji: '🌩️' }
        ];
        
        particles = [];
    }

    document.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowRight') keys.right = true;
        if (e.code === 'ArrowLeft') keys.left = true;
        if (e.code === 'ArrowUp') {
            if (player.grounded) {
                player.dy = player.jumpPower;
                player.grounded = false;
                createJumpParticles(); // 하트 뿅뿅 점프
            }
        }
    });

    document.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowRight') keys.right = false;
        if (e.code === 'ArrowLeft') keys.left = false;
    });

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width &&
               rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height &&
               rect1.y + rect1.height > rect2.y;
    }

    // 꼬마 요정이 점프할 때 하트와 별이 나오도록 수정
    function createJumpParticles() {
        const emojis = ['✨', '💖', '🎀'];
        for(let i=0; i<6; i++) {
            particles.push({
                x: player.x + 15,
                y: player.y + 40,
                dx: (Math.random() - 0.5) * 4,
                dy: (Math.random() - 0.5) * 4,
                life: 1,
                emoji: emojis[Math.floor(Math.random() * emojis.length)]
            });
        }
    }

    function update() {
        if (isGameOver) return;

        if (keys.right) {
            player.dx = player.speed;
            player.wobble += 0.25; 
        } else if (keys.left) {
            player.dx = -player.speed;
            player.wobble += 0.25;
        } else {
            player.dx = 0;
            player.wobble = 0;
        }

        player.x += player.dx;

        // 걸을 때 꼬마 별가루 생성
        if ((Math.abs(player.dx) > 0 || !player.grounded) && Math.random() < 0.25) {
            particles.push({
                x: player.x + 15 + (Math.random() - 0.5) * 10,
                y: player.y + 20 + (Math.random() - 0.5) * 20,
                dx: (Math.random() - 0.5) * 1,
                dy: Math.random() * -1,
                life: 1,
                emoji: '✨'
            });
        }

        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

        player.dy += gravity;
        player.y += player.dy;
        player.grounded = false;

        for (let p of platforms) {
            if (player.x < p.x + p.width && player.x + player.width > p.x &&
                player.y + player.height > p.y && player.y + player.height < p.y + p.height + player.dy) {
                player.grounded = true;
                player.dy = 0;
                player.y = p.y - player.height;
            }
        }

        for (let i of items) {
            if (!i.collected && checkCollision(player, i)) {
                i.collected = true;
                score += 100;
                scoreElement.innerText = score;
                
                if (items.every(item => item.collected)) {
                    isGameOver = true;
                    setTimeout(() => alert("꺄아! 꼬마 요정이 별빛을 다 모았어요! 💖✨"), 100);
                }
            }
        }

        for (let e of enemies) {
            e.x += e.dx;
            if (e.x < e.minX || e.x + e.width > e.maxX) e.dx *= -1;

            if (checkCollision(player, e)) {
                isGameOver = true;
                setTimeout(() => alert("앗! 먹구름에 부딪혔어요. 다시 해볼까요? 🥺"), 100);
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].x += particles[i].dx;
            particles[i].y += particles[i].dy;
            particles[i].life -= 0.03;
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 구름 발판 (조금 더 폭신한 느낌을 위해 투명도 조절)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
        for (let p of platforms) {
            ctx.beginPath();
            ctx.roundRect(p.x, p.y, p.width, p.height, 12);
            ctx.fill();
        }

        ctx.font = '25px Arial';
        for (let i of items) {
            if (!i.collected) {
                let hover = Math.sin(Date.now() / 200) * 3;
                ctx.fillText('⭐', i.x, i.y + 20 + hover);
            }
        }

        ctx.font = '35px Arial';
        for (let e of enemies) {
            ctx.fillText(e.emoji, e.x - 5, e.y + 30);
        }

        for (let p of particles) {
            ctx.globalAlpha = p.life;
            ctx.font = '14px Arial';
            ctx.fillText(p.emoji, p.x, p.y);
        }
        ctx.globalAlpha = 1.0; 

        // 꼬마 여자아이 요정 그리기 (사뿐사뿐 애니메이션)
        ctx.save();
        ctx.font = '42px Arial';
        ctx.translate(player.x + 15, player.y + 20);
        if(player.dx !== 0 && player.grounded) {
            ctx.rotate(Math.sin(player.wobble) * 0.15); 
        }
        ctx.fillText(player.emoji, -22, 18);
        ctx.restore();
    }

    function gameLoop() {
        update();
        draw();
        if (!isGameOver) {
            animationId = requestAnimationFrame(gameLoop);
        }
    }

    startBtn.addEventListener('click', () => {
        isGameOver = false;
        score = 0;
        scoreElement.innerText = score;
        
        player.x = 50;
        player.y = 350;
        player.dy = 0;
        
        initMap();
        cancelAnimationFrame(animationId);
        gameLoop();
        startBtn.innerText = "다시 시작";
    });

    initMap();
    draw();

</script>
</body>
</html>
