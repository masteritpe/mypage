<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD to PPT Slides</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <style>
    :root {
      --bg-body: #F9FAFB;
      --bg-surface: #FFFFFF;
      --border-light: #F3F4F6;
      --border-base: #E5E7EB;
      --text-main: #111827;
      --text-muted: #6B7280;
      --primary: #111827;
      --primary-hover: #374151;
      --secondary: #FFFFFF;
      --secondary-hover: #F9FAFB;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* 사이드바 */
    .sidebar {
      width: 280px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border-base);
      display: flex;
      flex-direction: column;
      height: 100vh;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 24px 20px 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .sidebar-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-title-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-title-left i { font-size: 24px; color: var(--primary); }
    .sidebar-title-left h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    
    .sidebar-title-actions {
      display: flex;
      gap: 4px;
    }

    .btn-export {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .btn-export:hover { background: #E5E7EB; color: var(--primary); }
    .btn-export i { font-size: 20px; }

    /* 검색창 영역 */
    .search-wrapper {
      padding: 0 20px 12px 20px;
    }
    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-box i {
      position: absolute;
      left: 12px;
      color: var(--text-muted);
      font-size: 16px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      border: 1px solid var(--border-base);
      border-radius: var(--radius-md);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--primary); }

    .doc-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .doc-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-size: 14px;
      color: var(--text-main);
      user-select: none;
      background: var(--bg-surface);
      border: 1px solid transparent;
    }
    .doc-item:hover { background: var(--bg-body); }
    .doc-item.active { background: #E5E7EB; font-weight: 600; }
    
    .doc-item.dragging {
      opacity: 0.5;
      background: #F3F4F6;
      border: 1px dashed var(--text-muted);
    }
    .doc-item.drag-over {
      border-top: 2px solid var(--primary);
    }

    .doc-item-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 8px;
    }
    .btn-delete-doc {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .doc-item:hover .btn-delete-doc { opacity: 1; }
    .btn-delete-doc:hover { background: #FEE2E2; color: #EF4444; }

    /* 메인 컨텐츠 */
    .main-layout {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      padding: 40px;
    }
    .dashboard-header { max-width: 1000px; margin: 0 auto 24px auto; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 16px; }
    .title-area { display: flex; align-items: center; gap: 12px; flex: 1; max-width: 500px; }
    
    .title-input {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-main);
      padding: 4px 0;
      border-bottom: 2px solid transparent;
      outline: none;
      transition: border-color 0.2s;
    }
    .title-input:focus { border-bottom-color: var(--primary); }
    .title-input.error { border-bottom-color: #EF4444; animation: shake 0.4s; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }
    .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-outline { background: var(--secondary); color: var(--text-main); border-color: var(--border-base); box-shadow: var(--shadow-sm); }
    .btn-outline:hover { background: var(--secondary-hover); border-color: #D1D5DB; }

    .instructions {
      display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
      font-size: 13px; color: var(--text-muted);
      background: var(--bg-surface); padding: 12px 20px;
      border-radius: var(--radius-md); border: 1px solid var(--border-base);
    }
    .instructions span { display: inline-flex; align-items: center; gap: 6px; }

    #slides-container {
      max-width: 1000px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 32px;
    }

    .slide-wrapper {
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }

    .slide-toolbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px; background: #F9FAFB;
      border-bottom: 1px solid var(--border-light);
    }
    .slide-number { font-weight: 700; color: var(--text-main); font-size: 15px; }
    
    .toolbar-actions { display: flex; gap: 8px; }
    .btn-icon {
      padding: 8px; border-radius: 6px; border: 1px solid transparent;
      background: transparent; color: var(--text-muted); cursor: pointer;
      transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-icon:hover { background: #FEE2E2; color: #EF4444; }

    .slide-content {
      padding: 40px; min-height: 250px;
      outline: none; overflow-y: auto;
      font-size: 16px; line-height: 1.6;
      transition: box-shadow 0.2s;
    }
    .slide-content:focus { box-shadow: inset 0 0 0 2px #3B82F6; }
    .slide-content:empty:before { content: "텍스트를 입력하거나 마크다운을 붙여넣으세요..."; color: #9CA3AF; }

    /* 마크다운 스타일링 */
    .slide-content h1, .slide-content h2, .slide-content h3 { margin-top: 1em; margin-bottom: 0.5em; font-weight: 700; color: var(--text-main); }
    .slide-content h1 { font-size: 1.8em; border-bottom: 2px solid var(--border-base); padding-bottom: 8px; }
    .slide-content h2 { font-size: 1.5em; }
    .slide-content ul, .slide-content ol { padding-left: 24px; margin-bottom: 1em; }
    .slide-content li { margin-bottom: 0.4em; }
    .slide-content strong { color: var(--text-main); font-weight: 700; }
    .slide-content table { border-collapse: collapse; width: 100%; margin-bottom: 1em; font-size: 15px; }
    .slide-content th, .slide-content td { border: 1px solid var(--border-base); padding: 12px; text-align: left; }
    .slide-content th { background-color: #F9FAFB; font-weight: 600; color: var(--text-main); }
    .slide-content pre { background: var(--bg-body); padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border-base); overflow-x: auto; }
    .slide-content code { font-family: monospace; font-size: 0.9em; background: var(--bg-body); padding: 2px 6px; border-radius: 4px; }

    .empty-msg {
      padding: 100px 20px; text-align: center; color: var(--text-muted);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      background: var(--bg-surface); border: 1px dashed var(--border-base);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
    }
    .empty-msg i { font-size: 48px; color: #D1D5DB; }
    .empty-msg h3 { margin: 0; font-size: 18px; font-weight: 600; color: var(--text-main); }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(17, 24, 39, 0.9);
      color: #ffffff;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow-md);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* PDF 출력 시 슬라이드 툴바 제외 및 슬라이드 연속 출력 설정 (페이지 분할 제거) */
    .exporting-pdf .slide-toolbar { display: none !important; }
    .exporting-pdf .slide-wrapper { 
      border: none !important; 
      box-shadow: none !important; 
      margin-bottom: 2em !important; /* 슬라이드 사이에 빈 줄 간격 추가 */
      padding-bottom: 2em !important; 
      page-break-inside: avoid !important; /* 내용이 중간에 잘리는 것을 방지 */
    }
    .exporting-pdf #slides-container { gap: 0 !important; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">
        <div class="sidebar-title-left">
          <i class="ph ph-presentation-chart"></i>
          <h2>MD to PPT</h2>
        </div>
        <div class="sidebar-title-actions">
          <button class="btn-export" onclick="importFromMD()" title="MD 문서 복원">
            <i class="ph ph-upload-simple"></i>
          </button>
          <button class="btn-export" onclick="exportAllToMD()" title="모든 문서 MD 백업">
            <i class="ph ph-download-simple"></i>
          </button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="createNewDocument()" style="width:100%; justify-content:center;">
        <i class="ph ph-plus"></i> 새 문서 시작 (Ctrl+Alt+N)
      </button>
    </div>
    <div class="search-wrapper">
      <div class="search-box">
        <i class="ph ph-magnifying-glass"></i>
        <input type="text" id="search-input" class="search-input" placeholder="문서 제목 검색..." spellcheck="false">
      </div>
    </div>
    <div id="doc-list" class="doc-list">
    </div>
  </div>

  <div class="main-layout">
    <div class="dashboard-header">
      <div class="header-top">
        <div class="title-area">
          <input type="text" id="document-title" class="title-input" placeholder="제목 없는 슬라이드" spellcheck="false">
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="saveCurrentDocument()">
            <i class="ph ph-floppy-disk"></i> 저장 (Ctrl+S)
          </button>
          <button class="btn btn-outline" onclick="clearAll()">
            <i class="ph ph-trash"></i> 전체 초기화
          </button>
          <button class="btn btn-outline" onclick="addEmptySlide()">
            <i class="ph ph-plus"></i> 낱장 추가
          </button>
          <button class="btn btn-outline" onclick="exportToPDF()">
            <i class="ph ph-file-pdf"></i> PDF로 내보내기
          </button>
        </div>
      </div>
      <div class="instructions">
        <span><i class="ph ph-keyboard"></i> <b>Ctrl+V</b>: 마크다운 텍스트 자동 분할</span>
        <span style="color: #D1D5DB;">|</span>
        <span><i class="ph ph-cursor-text"></i> <b>클릭</b>: 슬라이드 내용 즉시 수정</span>
        <span style="color: #D1D5DB;">|</span>
        <span><i class="ph ph-copy"></i> 복사 후 PPT <b>빈 슬라이드 배경</b>에 붙여넣기</span>
      </div>
    </div>

    <div id="slides-container">
      <div id="empty-state" class="empty-msg">
        <i class="ph ph-clipboard-text"></i>
        <h3>마크다운을 복사한 뒤 Ctrl+V를 눌러보세요.</h3>
        <p style="margin: 0; font-size: 14px;">( '#' 또는 '---' 기준으로 자동 분할 )</p>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <input type="file" id="md-upload" accept=".md" style="display: none;" onchange="handleMDUpload(event)">

  <script>
    const container = document.getElementById('slides-container');
    const docListContainer = document.getElementById('doc-list');
    const titleInput = document.getElementById('document-title');
    let slideCount = 0;
    let currentDocId = null;
    let db = null;
    let toastTimeout = null;

    // IndexedDB 초기화
    const dbRequest = indexedDB.open("MDToPPTDatabase", 1);
    dbRequest.onupgradeneeded = (e) => {
      db = e.target.result;
      if (!db.objectStoreNames.contains("documents")) {
        db.createObjectStore("documents", { keyPath: "id" });
      }
    };
    dbRequest.onsuccess = (e) => {
      db = e.target.result;
      initApp();
    };

    function initApp() {
      loadDocumentList().then((hasDocs) => {
        if (hasDocs) {
          const firstItem = document.querySelector('.doc-item');
          if (firstItem) loadDocument(firstItem.dataset.id);
        } else {
          createNewDocument();
        }
      });
    }

    function loadDocumentList(searchQuery = '') {
      return new Promise((resolve) => {
        if (!db) return resolve(false);
        const transaction = db.transaction(["documents"], "readonly");
        const store = transaction.objectStore("documents");
        const request = store.getAll();

        request.onsuccess = (e) => {
          const docs = e.target.result;
          docListContainer.innerHTML = '';
          
          docs.sort((a, b) => {
            if (a.sortOrder !== undefined && b.sortOrder !== undefined) {
              return a.sortOrder - b.sortOrder;
            }
            return b.updatedAt - a.updatedAt;
          });

          docs.forEach(doc => {
            if (searchQuery && !doc.title.toLowerCase().includes(searchQuery.toLowerCase())) return;
            const item = document.createElement('div');
            item.className = `doc-item ${currentDocId === doc.id ? 'active' : ''}`;
            item.dataset.id = doc.id;
            item.draggable = true;
            item.onclick = () => loadDocument(doc.id);
            item.innerHTML = `
              <div class="doc-item-title">${escapeHtml(doc.title)}</div>
              <button class="btn-delete-doc" onclick="event.stopPropagation(); deleteDocumentById('${doc.id}')">
                <i class="ph ph-trash"></i>
              </button>
            `;
            
            bindDragEvents(item);
            docListContainer.appendChild(item);
          });
          resolve(docs.length > 0);
        };
      });
    }

    let draggedItem = null;

    function bindDragEvents(item) {
      item.addEventListener('dragstart', (e) => {
        draggedItem = item;
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });

      item.addEventListener('dragend', () => {
        draggedItem.classList.remove('dragging');
        document.querySelectorAll('.doc-item').forEach(i => i.classList.remove('drag-over'));
        draggedItem = null;
        saveNewOrder();
      });

      item.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (item === draggedItem) return;
        item.classList.add('drag-over');
      });

      item.addEventListener('dragleave', () => {
        item.classList.remove('drag-over');
      });

      item.addEventListener('drop', (e) => {
        e.preventDefault();
        if (item === draggedItem) return;
        
        const allItems = [...docListContainer.querySelectorAll('.doc-item')];
        const draggedIndex = allItems.indexOf(draggedItem);
        const targetIndex = allItems.indexOf(item);
        
        if (draggedIndex < targetIndex) {
          item.after(draggedItem);
        } else {
          item.before(draggedItem);
        }
      });
    }

    function saveNewOrder() {
      if (!db) return;
      const transaction = db.transaction(["documents"], "readwrite");
      const store = transaction.objectStore("documents");
      const allItems = [...docListContainer.querySelectorAll('.doc-item')];
      
      allItems.forEach((item, index) => {
        const id = item.dataset.id;
        const request = store.get(id);
        request.onsuccess = (e) => {
          const doc = e.target.result;
          if (doc) {
            doc.sortOrder = index;
            store.put(doc);
          }
        };
      });
    }

    function createNewDocument() {
      currentDocId = 'temp_' + Date.now();
      document.querySelectorAll('.doc-item').forEach(i => i.classList.remove('active'));
      titleInput.value = '';
      titleInput.classList.remove('error');
      clearAll();
      showToast("새 작업 공간이 준비되었습니다.");
    }

    function loadDocument(id) {
      const transaction = db.transaction(["documents"], "readonly");
      const store = transaction.objectStore("documents");
      const request = store.get(id);

      request.onsuccess = (e) => {
        const doc = e.target.result;
        if (!doc) return;
        currentDocId = doc.id;
        titleInput.value = doc.title;
        titleInput.classList.remove('error');
        container.innerHTML = '';
        slideCount = 0;
        if (!doc.slides || doc.slides.length === 0) {
          showEmptyStatePlaceHolder();
        } else {
          doc.slides.forEach(slideHtml => appendSlideStructure(slideHtml));
        }
        document.querySelectorAll('.doc-item').forEach(item => {
          item.classList.toggle('active', item.dataset.id === currentDocId);
        });
      };
    }

    function saveCurrentDocument() {
      if (!db) return;
      const title = titleInput.value.trim();
      if (!title) {
        titleInput.classList.add('error');
        titleInput.focus();
        showToast("⚠️ 문서 제목을 입력해 주세요.");
        return;
      }
      titleInput.classList.remove('error');
      
      const transaction = db.transaction(["documents"], "readwrite");
      const store = transaction.objectStore("documents");
      
      const getRequest = store.get(currentDocId);
      getRequest.onsuccess = () => {
        const existingDoc = getRequest.result;
        if (currentDocId && currentDocId.startsWith('temp_')) currentDocId = 'doc_' + Date.now();
        
        const slides = [];
        document.querySelectorAll('.slide-wrapper').forEach(wrapper => {
          slides.push(wrapper.querySelector('.slide-content').innerHTML);
        });

        const docData = { 
          id: currentDocId, 
          title: title, 
          slides: slides, 
          updatedAt: Date.now(),
          sortOrder: existingDoc ? existingDoc.sortOrder : 9999
        };
        
        const putRequest = store.put(docData);
        putRequest.onsuccess = () => {
          showToast("✅ 저장되었습니다.");
          loadDocumentList(document.getElementById('search-input').value);
        };
      };
    }

    function deleteDocumentById(id) {
      if (!confirm("이 문서를 영구적으로 삭제하시겠습니까?")) return;
      const transaction = db.transaction(["documents"], "readwrite");
      const store = transaction.objectStore("documents");
      const request = store.delete(id);
      request.onsuccess = () => {
        showToast("문서 삭제 완료");
        if (currentDocId === id) createNewDocument();
        loadDocumentList(document.getElementById('search-input').value);
      };
    }
    
    function exportAllToMD() {
      if (!db) return;
      const transaction = db.transaction(["documents"], "readonly");
      const store = transaction.objectStore("documents");
      const request = store.getAll();

      request.onsuccess = (e) => {
        const docs = e.target.result;
        if (!docs || docs.length === 0) {
          showToast("내보낼 문서가 없습니다.");
          return;
        }

        let mdContent = "";
        docs.forEach(doc => {
          mdContent += `# DOCUMENT: ${doc.title}\n\n`;
          doc.slides.forEach((slideHtml, index) => {
            mdContent += slideHtml.trim() + "\n";
            if (index < doc.slides.length - 1) {
              mdContent += "\n---\n\n";
            }
          });
          mdContent += "\n\n";
        });

        const blob = new Blob([mdContent], { type: "text/markdown" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const dateStr = new Date().toISOString().slice(0, 10);
        a.download = `MDtoPPT_Backup_${dateStr}.md`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
        showToast("MD 백업 파일 다운로드가 시작되었습니다.");
      };
    }

    function importFromMD() { document.getElementById('md-upload').click(); }

    function handleMDUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const content = e.target.result;
          const docChunks = content.split(/# DOCUMENT:\s*/).filter(c => c.trim().length > 0);
          
          if (docChunks.length === 0) { showToast("잘못된 형식의 MD 파일입니다."); return; }
          
          if (!db) return;
          const transaction = db.transaction(["documents"], "readwrite");
          const store = transaction.objectStore("documents");
          
          docChunks.forEach((chunk, idx) => {
            const lines = chunk.split('\n');
            const title = lines[0].trim();
            const body = lines.slice(1).join('\n').trim();
            
            const slides = body.split(/\n---\n/).map(s => {
              return marked.parse(s.trim());
            });

            const docId = 'doc_' + Date.now() + '_' + idx;
            const docData = {
              id: docId,
              title: title,
              slides: slides,
              updatedAt: Date.now(),
              sortOrder: idx
            };
            store.put(docData);
          });

          transaction.oncomplete = () => {
            showToast(`✅ ${docChunks.length}개의 문서가 복원되었습니다.`);
            loadDocumentList(document.getElementById('search-input').value);
            event.target.value = '';
          };
        } catch (error) { 
          console.error(error);
          showToast("파일 읽기 오류"); 
        }
      };
      reader.readAsText(file);
    }

    /**
     * 현재 슬라이드 목록을 PDF로 내보내기 (연속 출력 모드)
     */
    function exportToPDF() {
      const element = document.getElementById('slides-container');
      const isEmpty = document.getElementById('empty-state');
      
      if (isEmpty || container.children.length === 0) {
        showToast("⚠️ 내보낼 슬라이드가 없습니다.");
        return;
      }

      const title = titleInput.value.trim() || "presentation";
      
      // PDF 생성을 위해 UI 요소 숨기기 위한 클래스 추가
      element.classList.add('exporting-pdf');

      const opt = {
        margin: 10,
        filename: `${title}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
      };

      showToast("📄 PDF를 생성 중입니다...");

      html2pdf().set(opt).from(element).save().then(() => {
        // 완료 후 클래스 제거하여 UI 복원
        element.classList.remove('exporting-pdf');
        showToast("✅ PDF 다운로드가 완료되었습니다.");
      }).catch(err => {
        console.error(err);
        element.classList.remove('exporting-pdf');
        showToast("❌ PDF 생성 중 오류가 발생했습니다.");
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      if (toastTimeout) clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    window.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.altKey && e.key.toLowerCase() === 'n') { e.preventDefault(); createNewDocument(); }
      else if (e.ctrlKey && !e.altKey && e.key.toLowerCase() === 's') { e.preventDefault(); saveCurrentDocument(); }
    });

    document.getElementById('search-input').addEventListener('input', (e) => loadDocumentList(e.target.value));

    window.addEventListener('paste', (e) => {
      if (document.activeElement.classList.contains('slide-content')) return;
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      if (!text) return;
      let chunks = text.includes('\n---') ? text.split(/\n---\n?/) : text.split(/(?=^#{1,2}\s)/m);
      chunks = chunks.filter(chunk => chunk.trim().length > 0);
      if (document.getElementById('empty-state')) container.innerHTML = '';
      chunks.forEach(chunk => createSlide(chunk));
    });

    function createSlide(markdownText = '') { appendSlideStructure(markdownText ? marked.parse(markdownText) : ''); }

    function appendSlideStructure(htmlContent = '') {
      slideCount++;
      const wrapper = document.createElement('div');
      wrapper.className = 'slide-wrapper';
      wrapper.id = `slide-${slideCount}`;
      wrapper.innerHTML = `
        <div class="slide-toolbar">
          <div class="slide-number">Slide ${slideCount}</div>
          <div class="toolbar-actions">
            <button class="btn btn-primary" onclick="copySlide('${wrapper.id}')">
              <i class="ph ph-copy"></i> 이 슬라이드 복사
            </button>
            <button class="btn-icon" onclick="removeSlide('${wrapper.id}')" title="삭제">
              <i class="ph ph-x" style="font-size: 18px;"></i>
            </button>
          </div>
        </div>
        <div class="slide-content" contenteditable="true" spellcheck="false">${htmlContent}</div>
      `;
      container.appendChild(wrapper);
    }

    function addEmptySlide() {
      if (document.getElementById('empty-state')) container.innerHTML = '';
      createSlide('');
    }

    function removeSlide(slideId) {
      document.getElementById(slideId).remove();
      if (container.children.length === 0) clearAll();
    }

    function clearAll() { slideCount = 0; container.innerHTML = ''; showEmptyStatePlaceHolder(); }

    function showEmptyStatePlaceHolder() {
      container.innerHTML = `
        <div id="empty-state" class="empty-msg">
          <i class="ph ph-clipboard-text"></i>
          <h3>마크다운을 복사한 뒤 Ctrl+V를 눌러보세요.</h3>
          <p style="margin: 0; font-size: 14px;">( '#' 또는 '---' 기준으로 자동 분할 )</p>
        </div>
      `;
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    }

    function copySlide(slideId) {
      const contentDiv = document.getElementById(slideId).querySelector('.slide-content');
      if (!contentDiv.innerHTML.trim()) return alert('복사할 내용이 없습니다.');
      let maxCols = 1;
      contentDiv.querySelectorAll('table').forEach(tbl => {
        tbl.querySelectorAll('tr').forEach(tr => maxCols = Math.max(maxCols, tr.children.length));
      });
      let cleanHtml = '<table border="0" cellpadding="0" cellspacing="0" style="width: 100%; border-collapse: collapse; font-family: \'Malgun Gothic\', \'Pretendard\', sans-serif;">';
      const textRowStyle = "border: none; background-color: transparent; padding: 0 0 8px 0; vertical-align: top;";
      Array.from(contentDiv.childNodes).forEach(node => {
        if (node.nodeType === Node.TEXT_NODE) {
          if (node.textContent.trim() !== '') cleanHtml += `<tr><td colspan="${maxCols}" style="${textRowStyle}">${node.textContent}</td></tr>`;
        } else if (node.nodeType === Node.ELEMENT_NODE) {
          const tagName = node.tagName.toLowerCase();
          if (tagName === 'table') {
            node.querySelectorAll('tr').forEach(row => {
              cleanHtml += '<tr>';
              const cells = Array.from(row.querySelectorAll('th, td'));
              cells.forEach((cell, index) => {
                const isHeader = cell.tagName.toLowerCase() === 'th';
                let colspan = (index === cells.length - 1 && cells.length < maxCols) ? ` colspan="${maxCols - cells.length + 1}"` : '';
                cleanHtml += `<td${colspan} style="border: 1px solid #000; padding: 8px; ${isHeader ? 'background:#F3F4F6;font-weight:bold;' : ''}">${cell.innerHTML}</td>`;
              });
              cleanHtml += '</tr>';
            });
            cleanHtml += `<tr><td colspan="${maxCols}" style="${textRowStyle} height: 15px;"></td></tr>`;
          } else {
            const clone = node.cloneNode(true);
            if (tagName === 'ul' || tagName === 'ol') { clone.style.paddingLeft = '24px'; clone.style.margin = '5px 0 15px 0'; }
            if (tagName.match(/^h[1-6]$/)) { clone.style.marginTop = '15px'; clone.style.marginBottom = '8px'; }
            cleanHtml += `<tr><td colspan="${maxCols}" style="${textRowStyle}">${clone.outerHTML}</td></tr>`;
          }
        }
      });
      cleanHtml += '</table>';
      try {
        const blobHtml = new Blob([cleanHtml], { type: 'text/html' });
        const blobText = new Blob([contentDiv.innerText], { type: 'text/plain' });
        const clipboardItem = new ClipboardItem({ 'text/html': blobHtml, 'text/plain': blobText });
        navigator.clipboard.write([clipboardItem]).then(() => {
          const btn = document.getElementById(slideId).querySelector('.btn-primary');
          const original = btn.innerHTML;
          btn.innerHTML = '<i class="ph ph-check"></i> 완료';
          btn.style.background = '#10B981';
          setTimeout(() => { btn.innerHTML = original; btn.style.background = 'var(--primary)'; }, 1000);
        });
      } catch (e) { alert('클립보드 기능을 지원하지 않는 브라우저입니다.'); }
    }
  </script>
