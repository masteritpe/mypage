<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart DB Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    
    <style>
        /* === 눈에 편한 색상 팔레트 (Soft & Warm) === */
        :root {
            --bg-app: #F5F7FA;       
            --bg-card: #FFFFFF;      
            --text-main: #374151;    
            --text-sub: #6B7280;     
            --border: #E5E7EB;       
            
            --primary: #4B5563;      
            --accent: #0D9488;       
            --danger: #E11D48;       
            --bg-code: #F3F4F6;      
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            font-family: "Pretendard", -apple-system, sans-serif; 
            background: var(--bg-app); 
            color: var(--text-main); 
            padding-bottom: 80px;
            line-height: 1.5;
        }

        /* 헤더 & 컨트롤 */
        header { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 15px 20px; 
            position: sticky; top: 0; z-index: 10;
            border-bottom: 1px solid var(--border); 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        
        .title { 
            font-size: 18px; font-weight: 700; color: var(--text-main);
            display: flex; align-items: center; gap: 10px; margin-bottom: 15px; 
        }
        .title i { color: var(--accent); }
        
        /* 선택 영역 스타일 */
        .select-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 10px; }
        .select-row { display: flex; gap: 10px; align-items: center; }
        .label { font-size: 13px; font-weight: 600; color: var(--text-sub); width: 45px; }
        
        select { 
            flex: 1; padding: 10px 12px; 
            border: 1px solid var(--border); border-radius: 10px; 
            font-size: 14px; outline: none; background: #fff; color: var(--text-main);
            font-weight: 500; transition: border-color 0.2s;
            -webkit-appearance: none; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 10px center; background-size: 16px;
        }
        select:focus { border-color: var(--accent); }

        button {
            padding: 10px 14px; border: none; border-radius: 10px; 
            font-weight: 600; cursor: pointer; font-size: 13px;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }
        
        /* 버튼 스타일 변형 */
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-danger { background: #fee2e2; color: var(--danger); border: 1px solid #fecaca; }
        .btn-refresh { background: var(--accent); color: #fff; width: 42px; display:flex; justify-content:center; align-items: center;}

        /* 상태 바 */
        .status-bar { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; color: var(--text-sub); margin-top: 15px; font-weight: 500; 
            padding-top: 15px; border-top: 1px solid var(--border);
        }

        /* 데이터 리스트 */
        .list-container { padding: 20px; }
        .item-card {
            background: var(--bg-card); border-radius: 16px; padding: 18px; margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03); border: 1px solid transparent;
            display: flex; justify-content: space-between; align-items: center;
            transition: transform 0.1s;
        }
        .item-card:active { transform: scale(0.99); }
        
        .item-info { flex: 1; overflow: hidden; }
        .item-id { 
            font-size: 12px; color: var(--text-sub); font-weight: 600; margin-bottom: 4px; 
            display: flex; align-items: center; gap: 6px;
        }
        .badge { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 10px; color: #6b7280; }
        
        .item-topic { 
            font-size: 16px; font-weight: 700; color: var(--text-main); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            margin-bottom: 4px;
        }
        .item-meta { font-size: 12px; color: #9ca3af; }
        
        .item-actions { display: flex; gap: 8px; margin-left: 12px; }
        .btn-icon { 
            width: 40px; height: 40px; border-radius: 12px; border: none;
            display: flex; align-items: center; justify-content: center; font-size: 16px; 
            cursor: pointer;
        }
        .btn-view { background: #f0fdfa; color: var(--accent); } 
        .btn-del { background: #fff1f2; color: var(--danger); } 

        /* 모달 (JSON 보기) */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(55, 65, 81, 0.4); backdrop-filter: blur(3px); z-index: 100;
            display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; animation: fadeIn 0.2s; }
        
        .modal-box {
            background: #fff; width: 90%; max-height: 80vh; border-radius: 20px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .modal-header { 
            padding: 18px 20px; border-bottom: 1px solid var(--border); 
            font-weight: 700; color: var(--text-main); font-size: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-body { padding: 0; overflow-y: auto; background: var(--bg-code); flex: 1; }
        
        pre { 
            margin: 0; padding: 20px;
            white-space: pre-wrap; font-size: 13px; color: #334155; 
            font-family: 'Menlo', 'Monaco', monospace; line-height: 1.6;
        }
        
        .empty-msg { text-align: center; padding: 60px 0; color: var(--text-sub); font-size: 14px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="title">
        <i class="fas fa-leaf"></i> DB Manager
    </div>
    
    <div class="select-group">
        <div class="select-row">
            <span class="label">DB</span>
            <select id="dbSelect" onchange="onDbSelected()">
                <option value="" disabled selected>DB 찾는 중...</option>
            </select>
            <button class="btn-refresh" onclick="scanDatabases()" title="새로고침"><i class="fas fa-sync-alt"></i></button>
        </div>
        <div class="select-row">
            <span class="label">Store</span>
            <select id="storeSelect" onchange="loadData()">
                <option value="" disabled selected>선택 대기</option>
            </select>
        </div>
    </div>
    
    <div class="status-bar">
        <span id="status-text">준비 완료</span>
        <button class="btn-danger" onclick="deleteDatabase()">현재 DB 삭제</button>
    </div>
</header>

<div class="list-container" id="list-area">
    <div class="empty-msg">DB 목록을 불러오는 중입니다...</div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span>상세 데이터 (JSON)</span>
            <button class="btn-icon" onclick="closeModal()" style="width:30px; height:30px; background:none; color:#9ca3af;"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <pre id="json-viewer"></pre>
        </div>
    </div>
</div>

<script>
let currentDb = null;
let currentData = [];

// === 1. 초기화 및 DB 목록 스캔 ===
window.onload = () => {
    scanDatabases();
};

async function scanDatabases() {
    const dbSelect = document.getElementById('dbSelect');
    dbSelect.innerHTML = '<option value="" disabled selected>스캔 중...</option>';
    
    if (!window.indexedDB.databases) {
        alert("이 브라우저는 DB 목록 조회 기능을 지원하지 않습니다.\n(Chrome 최신 버전 권장)");
        dbSelect.innerHTML = '<option value="">지원되지 않음</option>';
        return;
    }

    try {
        const dbs = await window.indexedDB.databases();
        
        dbSelect.innerHTML = '';
        if (dbs.length === 0) {
            dbSelect.innerHTML = '<option value="">발견된 DB 없음</option>';
            return;
        }

        dbs.forEach(db => {
            const opt = document.createElement('option');
            opt.value = db.name;
            opt.text = `${db.name} (v${db.version})`;
            dbSelect.appendChild(opt);
        });

        if (dbs.length > 0) {
            dbSelect.value = dbs[0].name;
            onDbSelected();
        }

    } catch (e) {
        console.error(e);
        alert("DB 목록을 가져오는데 실패했습니다.");
    }
}

// === 2. DB 선택 시 Store 목록 가져오기 ===
function onDbSelected() {
    const dbName = document.getElementById('dbSelect').value;
    const storeSelect = document.getElementById('storeSelect');
    
    if (!dbName) return;

    const req = indexedDB.open(dbName);
    
    req.onsuccess = (e) => {
        const db = e.target.result;
        const stores = Array.from(db.objectStoreNames);
        
        db.close();

        storeSelect.innerHTML = '';
        if (stores.length === 0) {
            const opt = document.createElement('option');
            opt.text = "(스토어 없음)";
            storeSelect.appendChild(opt);
            document.getElementById('list-area').innerHTML = '<div class="empty-msg">데이터가 없는 DB입니다.</div>';
        } else {
            stores.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.text = name;
                storeSelect.appendChild(opt);
            });
            storeSelect.value = stores[0];
            loadData();
        }
    };

    req.onerror = () => {
        alert("DB를 열 수 없습니다.");
    };
}

// === 3. 데이터 로드 ===
async function loadData() {
    const dbName = document.getElementById('dbSelect').value;
    const storeName = document.getElementById('storeSelect').value;
    const listArea = document.getElementById('list-area');
    const statusText = document.getElementById('status-text');

    if (!dbName || !storeName) return;

    listArea.innerHTML = '<div class="empty-msg">로딩 중...</div>';
    if(currentDb) currentDb.close();

    try {
        currentDb = await openDB(dbName);
        currentData = await getAllItems(storeName);
        
        statusText.innerText = `총 ${currentData.length}개 항목`;
        renderList(currentData);
    } catch (e) {
        console.error(e);
        statusText.innerText = "조회 실패";
        listArea.innerHTML = `<div class="empty-msg" style="color:var(--danger)">오류: ${e.message}</div>`;
    }
}

// === 4. 리스트 렌더링 ===
function renderList(data) {
    const listArea = document.getElementById('list-area');
    listArea.innerHTML = '';

    if (data.length === 0) {
        listArea.innerHTML = '<div class="empty-msg">데이터가 없습니다.</div>';
        return;
    }

    const sorted = [...data].reverse();

    sorted.forEach(item => {
        // [수정 핵심]: id 대신 currentData 원본 배열의 index를 찾아 넘겨줍니다.
        // id가 문자열이거나 특수기호가 있을 때 HTML에 직접 넣으면 문법 오류가 생기는 것을 방지합니다.
        const originalIndex = currentData.indexOf(item);
        
        const id = item.id !== undefined ? item.id : '?';
        const topic = item.topic || '(제목 없음)';
        const domain = item.domain || '기타';
        const size = (JSON.stringify(item).length / 1024).toFixed(1);

        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
            <div class="item-info">
                <div class="item-id"><span class="badge">ID ${id}</span> ${domain}</div>
                <div class="item-topic">${topic}</div>
                <div class="item-meta">Size: ${size} KB</div>
            </div>
            <div class="item-actions">
                <button class="btn-icon btn-view" onclick="viewDetail(${originalIndex})"><i class="fas fa-eye"></i></button>
                <button class="btn-icon btn-del" onclick="deleteItem(${originalIndex})"><i class="fas fa-trash"></i></button>
            </div>
        `;
        listArea.appendChild(card);
    });
}

// === 5. 유틸리티 ===
function openDB(dbName) {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(dbName);
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = (e) => reject(e.target.error);
    });
}

function getAllItems(storeName) {
    return new Promise((resolve, reject) => {
        const tx = currentDb.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).getAll();
        req.onsuccess = (e) => resolve(e.target.result || []);
        req.onerror = (e) => reject(e.target.error);
    });
}

// [수정됨] id 대신 원본 데이터 배열의 index를 받아옵니다.
function viewDetail(index) {
    const item = currentData[index];
    if (!item) return;
    document.getElementById('json-viewer').textContent = JSON.stringify(item, null, 2);
    document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

// [수정됨] id 대신 원본 데이터 배열의 index를 받아옵니다.
async function deleteItem(index) {
    if(!confirm('선택한 항목을 삭제하시겠습니까?')) return;
    const item = currentData[index];
    if(!item) return;

    const storeName = document.getElementById('storeSelect').value;
    try {
        const tx = currentDb.transaction(storeName, 'readwrite');
        // 원본 데이터가 가진 데이터 타입의 item.id를 그대로 DB에서 삭제합니다.
        await tx.objectStore(storeName).delete(item.id);
        tx.oncomplete = () => loadData();
    } catch(e) { alert("삭제 실패: " + e.message); }
}

async function deleteDatabase() {
    const dbName = document.getElementById('dbSelect').value;
    if(!dbName) return;
    if(!confirm(`⚠️ [${dbName}] 전체를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;

    if(currentDb) currentDb.close();

    const req = indexedDB.deleteDatabase(dbName);
    req.onsuccess = () => {
        alert("삭제 완료");
        scanDatabases();
        document.getElementById('list-area').innerHTML = '';
    };
    req.onerror = () => alert("삭제 실패");
}
</script>
</body>
</html>
