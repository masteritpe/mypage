<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Repo Manager</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    /* === Design System === */
    :root {
      --bg-app: #f8fafc;
      --bg-panel: #ffffff;
      --bg-input: #f1f5f9;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --border: #e2e8f0;
      --primary: #4f46e5; 
      --primary-hover: #4338ca;
      --accent: #6366f1;
      --danger: #ef4444;
      --font-ui: "Pretendard", -apple-system, sans-serif;
      --font-code: 'Consolas', monospace;
    }

    * { box-sizing: border-box; outline: none; }
    
    body {
      margin: 0; background: var(--bg-app); color: var(--text-main);
      font-family: var(--font-ui); font-size: 14px;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* === Header === */
    header {
      background: var(--bg-panel); height: 60px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    .logo { font-size: 18px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 10px; letter-spacing: -0.5px; }
    .toolbar { display: flex; gap: 8px; }

    /* === Buttons === */
    .btn {
      height: 36px; padding: 0 16px; border-radius: 6px; border: 1px solid var(--border);
      background: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-ui); font-weight: 600; font-size: 13px; 
      color: var(--text-main); transition: 0.2s;
    }
    .btn:hover { background: #f8fafc; border-color: #cbd5e1; }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); color: #fff; }
    .btn-danger { color: #dc2626; border-color: #fecaca; }
    .btn-danger:hover { background: #fef2f2; border-color: #f87171; }
    .btn-icon-sq { width: 38px; height: 38px; border-radius: 6px; border: 1px solid var(--border); background: #fff; color: var(--text-sub); cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; flex-shrink: 0; }
    .btn-icon-sq:hover { border-color: var(--accent); color: var(--accent); }

    /* === Main Layout === */
    main { flex: 1; display: flex; height: calc(100vh - 60px); overflow: hidden; }

    /* Sidebar */
    #sidebar { width: 320px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 14px; background: #fafafa; }
    .search-row { display: flex; gap: 8px; width: 100%; }
    .search-input { flex: 1; padding: 0 12px; height: 38px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--bg-panel); color: var(--text-main); font-family: var(--font-ui); transition: 0.2s; }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
    
    .filter-select {
        width: 100%; height: 38px; padding: 0 14px;
        border: 1px solid var(--border); border-radius: 6px;
        font-size: 13px; background-color: var(--bg-panel); color: var(--text-main);
        font-family: var(--font-ui); cursor: pointer; appearance: none;
        background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2364748b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        background-repeat: no-repeat; background-position: right 14px top 50%; background-size: 10px auto;
        transition: 0.2s;
    }
    .filter-select:focus { border-color: var(--accent); }

    .list-scroll { flex: 1; overflow-y: auto; }
    .list-item { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; flex-direction: column; gap: 6px; transition: 0.2s; border-left: 3px solid transparent; }
    .list-item:hover { background: #f8fafc; }
    .list-item.active { background: #eef2ff; border-left-color: var(--primary); }
    .item-title { font-weight: 700; font-size: 14px; color: var(--text-main); display: flex; align-items: center; gap: 6px; }
    .item-sub { font-size: 12px; color: var(--text-sub); display: flex; align-items: center; gap: 8px; }
    .category-tag { background: #e0e7ff; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #4338ca; }

    /* Editor Area */
    #editor-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-app); position: relative; }
    .editor-scroller { flex: 1; overflow-y: auto; padding: 40px; display: flex; justify-content: center; align-items: flex-start; }
    
    .paper { width: 100%; max-width: 800px; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 28px; margin-bottom: 40px; }
    .paper-header { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 16px; border-bottom: 2px solid #eef2ff; }
    .paper-title { font-size: 20px; font-weight: 800; color: var(--primary); margin: 0; }
    .paper-date { font-size: 12px; color: #94a3b8; font-weight: 500; }

    /* Forms */
    .form-group { display: flex; flex-direction: column; gap: 8px; position: relative; }
    .form-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .form-input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text-main); background: var(--bg-input); font-family: var(--font-ui); transition: 0.2s; }
    .form-input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
    .form-input-lg { font-size: 15px; font-weight: 600; background: #fff; border-color: #cbd5e1; }

    /* 열기 버튼 및 복사 버튼을 위한 여백 추가 (padding-right: 80px) */
    .action-wrapper { position: relative; width: 100%; }
    .action-wrapper input { padding-right: 80px; font-family: var(--font-code); font-size: 13px; color: #0f172a; }
    .pw-actions { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); display: flex; gap: 4px; }
    
    /* a 태그, button 태그 공통 스타일 */
    .btn-icon { text-decoration: none; width: 32px; height: 32px; border: none; background: #fff; border-radius: 6px; color: var(--text-sub); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; border: 1px solid var(--border); }
    .btn-icon:hover { background: #eef2ff; color: var(--primary); border-color: var(--primary); }

    textarea.form-input { min-height: 120px; resize: vertical; line-height: 1.6; }
    .toolbar-footer { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #94a3b8; gap: 16px; text-align: center; }
    
    #toast-area { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 3000; display:flex; flex-direction:column; gap:10px; align-items:center; }
    .toast { background: rgba(30, 41, 59, 0.95); color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 13px; font-weight: 500; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); animation: fadeUp 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px) scale(0.9); } to { opacity:1; transform:translateY(0) scale(1); } }
  </style>
</head>
<body>

<header>
  <div class="logo"><i class="fas fa-server"></i> Repo Manager</div>
  <div class="toolbar">
    <button class="btn" id="btn-copy-link" title="현재 자료의 고유 링크 복사"><i class="fas fa-link" style="color:#64748b"></i> 링크 복사</button>
    <input type="file" id="inp-import" accept=".json" style="display: none;">
    <button class="btn" id="btn-export"><i class="fas fa-download"></i> 백업</button>
    <button class="btn" id="btn-import"><i class="fas fa-upload"></i> 복구</button>
  </div>
</header>

<main>
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="search-row">
          <input type="text" id="searchInput" class="search-input" placeholder="파일명 검색...">
          <button class="btn-icon-sq" id="btn-add-new" title="새 파일 등록 (Ctrl+Alt+N)"><i class="fas fa-plus"></i></button>
      </div>
      <select id="categoryFilter" class="filter-select">
          <option value="">📁 전체 카테고리 보기</option>
      </select>
    </div>
    <div class="list-scroll" id="listBody"></div>
  </aside>

  <section id="editor-area">
    <div id="empty-view" class="empty-state">
        <i class="fas fa-folder-open fa-4x" style="opacity:0.2"></i>
        <h3>저장소 파일을 선택하거나 새로 등록하세요.</h3>
        <p style="font-size: 13px;">기본 경로: file:///D:/Repository/</p>
    </div>

    <div class="editor-scroller" id="detail-view" style="display:none;">
        <div class="paper">
            <div class="paper-header">
                <h2 class="paper-title"><i class="fas fa-file-alt"></i> 로컬 자료 정보</h2>
                <span id="last-updated" class="paper-date"></span>
            </div>
            
            <div style="display: flex; gap: 16px; align-items: flex-end;">
                <div class="form-group" style="flex: 2;">
                    <label class="form-label">자료명(Title)</label>
                    <input type="text" id="inpTitle" class="form-input form-input-lg">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label class="form-label">분류(Category)</label>
                    <input type="text" id="inpCategory" class="form-input form-input-lg" list="categoryList" placeholder="선택 또는 입력">
                    <datalist id="categoryList">
					    <option value="자료(File)">
                        <option value="데이터셋(Dataset)">
                        <option value="동영상(Video)">
                        <option value="디자인소스(Assets)">
                        <option value="아카이브(Archive)">
                        <option value="설치파일(Installers)">
                    </datalist>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" style="display:flex; justify-content:space-between;">
                    <span>로컬 파일 경로(Local Path)</span>
                    <span style="color:#94a3b8; font-weight:normal; text-transform:none;">예: file:///D:/Repository/...</span>
                </label>
                <div class="action-wrapper">
                    <input type="text" id="inpUrl" class="form-input" placeholder="file:///D:/Repository/폴더명/파일명.zip">
                    <div class="pw-actions">
                        <a href="#" id="btn-open-url" class="btn-icon" target="_blank" title="클릭하여 로컬 파일/폴더 열기" style="display: none;"><i class="fas fa-external-link-alt"></i></a>
                        <button class="btn-icon btn-copy" data-target="inpUrl" title="경로 복사 (탐색기용)"><i class="far fa-copy"></i></button>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">설명 및 메모(Description)</label>
                <textarea id="inpNotes" class="form-input" placeholder="파일에 대한 설명이나 주의사항, 포함된 내용물 리스트 등을 메모하세요..."></textarea>
            </div>

            <div class="toolbar-footer">
                <button class="btn btn-danger" id="btn-delete"><i class="far fa-trash-alt"></i> 자료 삭제</button>
                <button class="btn btn-primary" id="btn-save" title="저장하기 (Ctrl+S)"><i class="fas fa-save"></i> 저장하기</button>
            </div>
        </div>
    </div>
  </section>
</main>

<div id="toast-area"></div>

<script>
const DB_NAME = "RepoManagerDB";
const App = {
    db: null, items: [], currentId: null,
    
    openDB: function() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => {
                const d = e.target.result;
                if(!d.objectStoreNames.contains("files")) {
                    d.createObjectStore("files", { keyPath: "id" });
                }
            };
            req.onsuccess = e => { this.db = e.target.result; resolve(this.db); };
            req.onerror = () => reject(req.error);
        });
    },
    tx: function(store, mode="readonly") { return this.db.transaction(store, mode).objectStore(store); },
    
    saveItem: function(item) {
        return new Promise(r => { this.tx("files","readwrite").put(item); r(true); });
    },
    
    loadAll: function() {
        return new Promise(r => {
            const q = this.tx("files").getAll();
            q.onsuccess = () => { this.items = q.result || []; r(this.items); };
        });
    },
    
    deleteItem: function(id) { 
        return new Promise(r => { this.tx("files","readwrite").delete(id); r(); }); 
    },
    
    uid: () => "REPO_" + Math.random().toString(36).slice(2, 10).toUpperCase(),
    
    toast: (msg) => {
        const area = document.getElementById("toast-area");
        const el = document.createElement("div"); el.className = "toast"; el.textContent = msg;
        area.appendChild(el); setTimeout(() => el.remove(), 2500);
    }
};

document.addEventListener("DOMContentLoaded", async () => {
    await App.openDB();
    
    const els = {
        listBody: document.getElementById("listBody"),
        detailView: document.getElementById("detail-view"),
        emptyView: document.getElementById("empty-view"),
        searchInput: document.getElementById("searchInput"),
        categoryFilter: document.getElementById("categoryFilter"),
        title: document.getElementById("inpTitle"),
        category: document.getElementById("inpCategory"),
        url: document.getElementById("inpUrl"),
        openBtn: document.getElementById("btn-open-url"), // 새 창 열기 버튼
        notes: document.getElementById("inpNotes"),
        updated: document.getElementById("last-updated")
    };

    await App.loadAll();
    
    // 외부 포털 등에서 ?uid=... 파라미터로 접근 시 자동으로 해당 항목 열기 로직
    const urlParams = new URLSearchParams(window.location.search);
    const targetUid = urlParams.get('uid');
    
    if (targetUid) {
        const targetItem = App.items.find(i => i.id === targetUid);
        if (targetItem) {
            loadDetail(targetItem);
            // URL 파라미터 정리
            window.history.replaceState({}, document.title, window.location.pathname);
            
            setTimeout(() => {
                const activeEl = document.querySelector('.list-item.active');
                if(activeEl) activeEl.scrollIntoView({block: 'center', behavior: 'smooth'});
                App.toast('요청하신 자료를 불러왔습니다.');
            }, 300);
        } else {
            // 항목을 찾을 수 없는 경우에도 URL을 깔끔하게 정리
            window.history.replaceState({}, document.title, window.location.pathname);
            App.toast('요청하신 UID의 자료를 찾을 수 없습니다.');
        }
    }

    updateCategoryDropdown();
    if (!targetUid || !App.items.find(i => i.id === targetUid)) {
        renderList();
    }

    function updateCategoryDropdown() {
        const currentSelected = els.categoryFilter.value;
        const categories = [...new Set(App.items.map(item => item.category).filter(Boolean))].sort();
        
        els.categoryFilter.innerHTML = '<option value="">📁 전체 카테고리 보기</option>';
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat; opt.textContent = cat;
            els.categoryFilter.appendChild(opt);
        });
        
        if (categories.includes(currentSelected)) els.categoryFilter.value = currentSelected;
    }

    function renderList() {
        const searchKeyword = els.searchInput.value.toLowerCase();
        const selectedCategory = els.categoryFilter.value;
        
        els.listBody.innerHTML = "";
        
        const filtered = App.items.filter(item => {
            const matchSearch = ((item.title || "") + (item.url || "") + (item.category || "") + (item.notes || "")).toLowerCase().includes(searchKeyword);
            const matchCategory = selectedCategory === "" || item.category === selectedCategory;
            return matchSearch && matchCategory;
        }).sort((a,b) => (a.title||"").localeCompare(b.title||""));

        if(!filtered.length) {
            els.listBody.innerHTML = `<div class="empty-state" style="padding:40px 20px;"><i class="fas fa-search fa-2x"></i><span>검색된 자료가 없습니다</span></div>`;
            return;
        }

        filtered.forEach(item => {
            const div = document.createElement("div");
            div.className = `list-item ${App.currentId === item.id ? 'active' : ''}`;
            
            div.innerHTML = `
                <div class="item-title"><i class="fas fa-file-archive" style="color:#94a3b8;"></i> ${item.title}</div>
                <div class="item-sub">
                    ${item.category ? `<span class="category-tag">${item.category}</span>` : '<span></span>'}
                    <span style="opacity:0.8;">${item.url ? item.url.split('/').pop() : ''}</span>
                </div>
            `;
            div.onclick = () => loadDetail(item);
            els.listBody.appendChild(div);
        });
    }

    function loadDetail(item) {
        App.currentId = item.id;
        els.emptyView.style.display = "none";
        els.detailView.style.display = "flex";
        
        els.title.value = item.title || "";
        els.category.value = item.category || "";
        els.url.value = item.url || "";
        els.notes.value = item.notes || "";
        
        if (item.updatedAt) {
            const d = new Date(item.updatedAt);
            els.updated.textContent = "최근 업데이트: " + d.toLocaleDateString() + " " + d.toLocaleTimeString();
        } else {
            els.updated.textContent = "업데이트 정보 없음";
        }
        
        updateLinkView();
        renderList();
    }

    // 입력 URL 기반으로 열기 버튼 갱신
    function updateLinkView() {
        const path = els.url.value.trim();
        if (path) {
            els.openBtn.style.display = "flex";
            els.openBtn.href = path; // 버튼의 href를 입력된 로컬 경로로 지정
        } else {
            els.openBtn.style.display = "none";
        }
    }
    els.url.addEventListener('input', updateLinkView);

    // 고유 링크 복사 이벤트 (?uid= 파라미터 사용)
    document.getElementById("btn-copy-link").onclick = () => {
        if(!App.currentId || els.detailView.style.display === "none") {
            return App.toast('먼저 자료를 선택하거나 저장하세요.');
        }
        
        // 검색 포털 등의 외부 연동을 위한 ?uid= 형태로 링크 생성
        const fullLink = `${window.location.origin}${window.location.pathname}?uid=${App.currentId}`;
        
        navigator.clipboard.writeText(fullLink).then(() => {
            App.toast('해당 자료로 바로 접근하는 링크가 복사되었습니다.');
        }).catch(() => {
            App.toast('링크 복사에 실패했습니다.');
        });
    };

    document.getElementById("btn-save").onclick = async () => {
        if(!els.title.value) return App.toast("자료명을 입력하세요.");
        if(!els.url.value) return App.toast("로컬 경로를 입력하세요.");

        const isNew = !App.currentId;
        const id = isNew ? App.uid() : App.currentId;
        const now = new Date().toISOString();
        
        const newItem = {
            id: id, 
            title: els.title.value, 
            category: els.category.value,
            url: els.url.value, 
            notes: els.notes.value,
            updatedAt: now 
        };
        
        await App.saveItem(newItem);
        
        if(isNew) App.items.push(newItem);
        else App.items[App.items.findIndex(x=>x.id===id)] = newItem;
        
        App.currentId = id;
        
        const d = new Date(now);
        els.updated.textContent = "최근 업데이트: " + d.toLocaleDateString() + " " + d.toLocaleTimeString();
        
        updateCategoryDropdown();
        renderList();
        App.toast("자료 정보가 저장되었습니다.");
    };

    document.getElementById("btn-delete").onclick = async () => {
        if(!App.currentId || !confirm("정말 이 자료 기록을 삭제하시겠습니까? (실제 파일은 삭제되지 않습니다)")) return;
        await App.deleteItem(App.currentId);
        App.items = App.items.filter(x => x.id !== App.currentId);
        App.currentId = null;
        
        els.detailView.style.display = "none";
        els.emptyView.style.display = "flex";
        
        updateCategoryDropdown();
        renderList();
        App.toast("삭제되었습니다.");
    };

    document.getElementById("btn-add-new").onclick = () => {
        App.currentId = null;
        els.emptyView.style.display = "none";
        els.detailView.style.display = "flex";
        
        [els.title, els.category, els.notes].forEach(el => el.value = "");
        els.url.value = "file:///D:/Repository/"; 
        els.updated.textContent = "새 자료 등록";
        updateLinkView(); 
        els.title.focus();
        renderList();
    };

    document.querySelectorAll(".btn-copy").forEach(btn => {
        btn.onclick = () => {
            const el = document.getElementById(btn.dataset.target);
            if(el && el.value) { 
                let copyText = el.value.replace('file:///', '').replace(/\//g, '\\');
                navigator.clipboard.writeText(copyText); 
                App.toast("탐색기용 파일 경로가 복사되었습니다."); 
            }
        };
    });

    els.searchInput.oninput = renderList;
    els.categoryFilter.onchange = renderList; 
    
    document.getElementById("btn-export").onclick = () => {
        if(!App.items.length) return App.toast("백업할 데이터가 없습니다.");
        const blob = new Blob([JSON.stringify(App.items, null, 2)], {type:"application/json"});
        const a = document.createElement("a"); 
        a.href = URL.createObjectURL(blob);
        a.download = `RepoDB_Backup_${new Date().toISOString().slice(0,10)}.json`; 
        a.click();
    };

    const btnImport = document.getElementById("btn-import");
    const inpImport = document.getElementById("inp-import");

    btnImport.onclick = () => {
        if(confirm("기존 데이터에 복구할 데이터를 병합합니다. 진행하시겠습니까?")) {
            inpImport.click();
        }
    };

    inpImport.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (event) => {
            try {
                const data = JSON.parse(event.target.result);
                if (!Array.isArray(data)) throw new Error("JSON 형식이 올바르지 않습니다.");

                let count = 0;
                for (const item of data) {
                    if (item.id && item.title && item.url) {
                        await App.saveItem(item);
                        const existingIndex = App.items.findIndex(x => x.id === item.id);
                        if (existingIndex >= 0) App.items[existingIndex] = item;
                        else App.items.push(item);
                        count++;
                    }
                }
                updateCategoryDropdown();
                renderList();
                App.toast(`${count}개의 자료 정보가 복구(병합)되었습니다.`);
            } catch (error) {
                App.toast("복구 실패: 올바른 백업 파일(JSON)이 아닙니다.");
            }
            inpImport.value = "";
        };
        reader.readAsText(file);
    };

    document.addEventListener("keydown", (e) => {
        const isCtrl = e.ctrlKey || e.metaKey;
        if (isCtrl && e.altKey && e.key.toLowerCase() === "n") {
            e.preventDefault();
            document.getElementById("btn-add-new").click();
        }
        if (isCtrl && e.key.toLowerCase() === "s") {
            e.preventDefault(); 
            if (els.detailView.style.display !== "none") document.getElementById("btn-save").click();
        }
    });
});
</script>
</body>
</html>
