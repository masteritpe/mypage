<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하루 만에 끝내는 악필교정 - 한글 워크북</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --bg-color: #f4f4f9;
        --paper-color: #ffffff;
        --line-color: #a0a0a0;
        --guide-color: #ffb3b3; /* 책의 붉은색 포인트 반영 */
        --grid-size: 70px;      /* 한 글자 칸 크기 */
        
        /* 폰트 설정 */
        --font-print: 'Nanum Gothic', sans-serif; /* 또박또박 고딕체 */
        --font-hand: 'Nanum Pen Script', cursive; /* 자연스러운 손글씨 */
    }

    * { box-sizing: border-box; outline: none; }
    body {
        margin: 0;
        background-color: var(--bg-color);
        font-family: 'Noto Sans KR', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        color: #333;
    }

    /* === 헤더 & 컨트롤 === */
    header {
        width: 100%;
        background: #fff;
        padding: 15px 30px;
        border-bottom: 1px solid #ddd;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .brand { 
        font-size: 18px; 
        font-weight: 700; 
        color: #2c3e50; 
        display: flex; 
        align-items: center; 
        gap: 8px; 
    }
    .brand i { color: #e74c3c; }
    
    .controls { display: flex; gap: 8px; }

    .btn {
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid #ccc;
        background: #fff;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
        color: #555;
        font-family: 'Noto Sans KR';
    }
    .btn:hover { background: #f1f1f1; border-color: #bbb; }
    .btn-active { background: #e7f1ff; border-color: #3b82f6; color: #3b82f6; font-weight: 700; }
    
    .btn-primary { background: #2c3e50; color: #fff; border-color: #2c3e50; }
    .btn-primary:hover { background: #1a252f; }

    /* === 종이 레이아웃 === */
    .paper-container {
        width: 210mm;
        min-height: 297mm;
        background: var(--paper-color);
        margin: 30px auto;
        padding: 20mm;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        border-top: 5px solid #2c3e50;
    }

    /* === 팁 박스 === */
    .tip-box {
        background: #f8f9fa;
        border-left: 4px solid #e74c3c;
        padding: 15px;
        margin-bottom: 25px;
        font-size: 13px;
        line-height: 1.6;
        color: #555;
    }
    .tip-box strong { color: #333; }

    /* === 공통: 행 스타일 === */
    .practice-row {
        position: relative;
        width: 100%;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
    }

    /* --- 모드 1: 칸 공책 (Grid - 십자 가이드) --- */
    .mode-grid .grid-bg {
        display: flex;
        width: 100%;
        border: 1px solid #ccc; /* 전체 테두리 */
    }
    .mode-grid .grid-box {
        flex: 1;
        height: var(--grid-size);
        border-right: 1px solid #ccc;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .mode-grid .grid-box:last-child { border-right: none; }
    
    /* 십자 점선 가이드 (田 모양) */
    .mode-grid .grid-box::before {
        content: ''; position: absolute;
        top: 50%; left: 0; right: 0;
        border-top: 1px dashed #ddd;
    }
    .mode-grid .grid-box::after {
        content: ''; position: absolute;
        left: 50%; top: 0; bottom: 0;
        border-left: 1px dashed #ddd;
    }

    /* --- 모드 2: 영어 노트 (Line - 4선지) --- */
    .mode-line .lines-bg {
        width: 100%;
        height: var(--grid-size);
        position: relative;
        border-left: 1px solid transparent; /* 공간 확보용 */
    }
    .mode-line .line-1 { border-bottom: 1px solid #ddd; height: 33%; }
    .mode-line .line-2 { border-bottom: 1px dashed #bbb; height: 33%; } /* 중심선 */
    .mode-line .line-3 { border-bottom: 1px solid #ffb3b3; height: 34%; } /* 기준선 */

    /* === 텍스트 입력 영역 === */
    .text-input {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 2;
        border: none;
        background: transparent;
        font-family: var(--font-print);
        font-size: 38px;
        color: #111;
        padding: 0;
        margin: 0;
        letter-spacing: 28px; /* 칸 모드일 때 글자 간격 (조정 필요) */
        padding-left: 17px;   /* 첫 글자 위치 보정 */
        padding-top: 5px;     /* 수직 중앙 정렬 보정 */
        line-height: var(--grid-size);
    }
    
    /* 영어 노트 모드일 때 입력 스타일 조정 */
    .mode-line .text-input {
        letter-spacing: 2px;
        padding-left: 5px;
        font-size: 34px;
        padding-top: 8px;
    }

    .text-input::placeholder {
        color: #e0e0e0;
        font-size: 14px;
        font-family: 'Noto Sans KR';
        letter-spacing: 0;
        padding-top: 15px;
        padding-left: 10px;
    }

    /* 삭제 버튼 */
    .row-del-btn {
        position: absolute;
        right: -25px;
        color: #ccc;
        cursor: pointer;
        padding: 5px;
        display: none;
    }
    .practice-row:hover .row-del-btn { display: block; }
    .row-del-btn:hover { color: #e74c3c; }

    /* 폰트 스타일 토글 */
    .cursive-mode .text-input {
        font-family: var(--font-hand);
        font-size: 42px;
        padding-top: 0px;
    }

    /* 인쇄 설정 */
    @media print {
        @page { size: A4; margin: 0; }
        body { background: #fff; -webkit-print-color-adjust: exact; }
        header, .row-del-btn { display: none !important; }
        .paper-container {
            margin: 0; width: 100%; min-height: 100vh;
            box-shadow: none; border: none; padding: 15mm;
        }
        .text-input::placeholder { color: transparent; }
    }
</style>
</head>
<body id="app-body">

<header>
    <div class="brand">
        <i class="fas fa-edit"></i> 한글 악필교정 <span>워크북 생성기</span>
    </div>
    <div class="controls">
        <button class="btn btn-active" id="btn-mode-grid" onclick="setMode('grid')">
            <i class="fas fa-border-all"></i> 칸 공책 (조립 연습)
        </button>
        <button class="btn" id="btn-mode-line" onclick="setMode('line')">
            <i class="fas fa-grip-lines"></i> 영어 노트 (문장 연습)
        </button>
        
        <div style="width:1px; background:#ddd; height:20px; margin:0 4px;"></div>

        <button class="btn" id="btn-font-toggle" onclick="toggleFont()">
            <i class="fas fa-font"></i> <span id="font-label">고딕체 (책 스타일)</span>
        </button>
        <button class="btn" onclick="clearAll()">
            <i class="fas fa-eraser"></i>
        </button>
        <button class="btn" onclick="addRow()">
            <i class="fas fa-plus"></i> 줄 추가
        </button>
        <button class="btn btn-primary" onclick="window.print()">
            <i class="fas fa-print"></i> 인쇄
        </button>
    </div>
</header>

<div class="paper-container" id="paper">
    <div class="tip-box" id="tip-box">
        <strong>💡 글자 조립 법칙 (Point)</strong><br>
        1. <strong>자음(초성)과 모음(중성)의 크기는 1:1</strong>로 비슷하게 써주세요.<br>
        2. 받침이 있는 경우, 초성과 중성을 조금 짧게 쓰고 받침을 아래에 <strong>작게</strong> 넣습니다.<br>
        3. <strong>칸 공책(십자 가이드)</strong>을 활용하여 자음과 모음의 중심을 맞춰보세요.
    </div>
</div>

<script>
    const paper = document.getElementById('paper');
    const body = document.getElementById('app-body');
    let currentMode = 'grid'; // 'grid' (칸) or 'line' (줄)
    let isCursive = false;

    // 초기화: 10줄 생성
    window.onload = () => {
        // 예시 문구 (책의 예문 반영)
        const examples = [
            "가갸거겨고교구규그기", // 기본 자모음 [cite: 103]
            "설렁탕 깍두기 볶음밥", // 음식 이름 예시
            "사랑은 힘없이 흘러내리는", // 시 '내리사랑' 중 [cite: 1004]
            "창가의 빗물 같은 것인가 보다" // [cite: 1005]
        ];

        for(let i=0; i<9; i++) {
            let input = addRow();
            if(i < examples.length) input.value = examples[i];
        }
    };

    function addRow() {
        const row = document.createElement('div');
        row.className = `practice-row mode-${currentMode}`;
        
        let bgHtml = '';
        if (currentMode === 'grid') {
            // 칸 공책 배경 (10칸 생성)
            bgHtml = '<div class="grid-bg">';
            for(let i=0; i<10; i++) {
                bgHtml += '<div class="grid-box"></div>';
            }
            bgHtml += '</div>';
        } else {
            // 영어 노트 배경 (4선지)
            bgHtml = `
                <div class="lines-bg">
                    <div class="line-1"></div>
                    <div class="line-2"></div>
                    <div class="line-3"></div>
                </div>
            `;
        }

        row.innerHTML = `
            ${bgHtml}
            <input type="text" class="text-input" placeholder="연습할 내용을 입력하세요..." spellcheck="false">
            <i class="fas fa-times row-del-btn" onclick="this.parentElement.remove()"></i>
        `;
        paper.appendChild(row);
        return row.querySelector('input');
    }

    function setMode(mode) {
        currentMode = mode;
        
        // 버튼 스타일 업데이트
        document.getElementById('btn-mode-grid').classList.toggle('btn-active', mode === 'grid');
        document.getElementById('btn-mode-line').classList.toggle('btn-active', mode === 'line');

        // 기존 줄들 모두 삭제하고 모드에 맞춰 새로 생성 (내용 유지 불가)
        if(confirm("모드를 변경하면 입력된 내용이 초기화됩니다. 계속하시겠습니까?")) {
            const oldRows = document.querySelectorAll('.practice-row');
            oldRows.forEach(row => row.remove());
            
            // 팁 박스 내용 변경
            const tipBox = document.getElementById('tip-box');
            if(mode === 'grid') {
                tipBox.innerHTML = `<strong>💡 칸 공책 (글자 조립 연습)</strong><br>
                책의 <strong>'단어 조립법'</strong>을 연습하기 좋습니다.<br>
                십자(+) 가이드의 중앙에 자음과 모음의 균형을 맞춰보세요. 초성과 중성은 <strong>1:1 비율</strong>입니다.`;
            } else {
                tipBox.innerHTML = `<strong>💡 영어 노트 (문장 실전 연습)</strong><br>
                책에서 저자가 추천하는 <strong>'초등 고학년용 영어 노트'</strong> 방식입니다.<br>
                붉은색 기준선 위에 글씨를 얹는 느낌으로 쓰되, 자음 'ㄹ, ㅂ' 등의 높이를 일정하게 맞춰보세요.`;
            }

            for(let i=0; i<9; i++) addRow();
        }
    }

    function toggleFont() {
        isCursive = !isCursive;
        const btnLabel = document.getElementById('font-label');
        if (isCursive) {
            body.classList.add('cursive-mode');
            btnLabel.textContent = "필기체 (손글씨)";
        } else {
            body.classList.remove('cursive-mode');
            btnLabel.textContent = "고딕체 (책 스타일)";
        }
    }

    function clearAll() {
        if(confirm('내용을 모두 지우시겠습니까?')) {
            const inputs = document.querySelectorAll('.text-input');
            inputs.forEach(input => input.value = '');
        }
    }
</script>

</body>
</html>
