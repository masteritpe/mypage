<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>통합 타이머</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* 공통 스타일 */
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
    margin: 0;
    background: #f4f6f8;
    color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    box-sizing: border-box;
  }
  
  .app-container {
    background: #ffffff;
    border-radius: 20px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* 세그먼트 컨트롤 (모던 탭 UI) */
  .tabs-container {
    padding: 20px 20px 0;
  }
  .tabs {
    display: flex;
    background: #f1f3f5;
    border-radius: 12px;
    padding: 6px;
    gap: 4px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: #868e96;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease-in-out;
    user-select: none;
  }
  .tab-btn:hover {
    color: #495057;
  }
  .tab-btn.active {
    background: #ffffff;
    color: #212529;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
  }

  /* 탭 컨텐츠 영역 */
  .tab-content {
    display: none;
    padding: 25px 24px 30px;
    flex-direction: column;
    align-items: center;
    animation: fadeIn 0.3s ease;
  }
  .tab-content.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 입력 그룹 스타일 */
  .settings-row {
    display: flex;
    justify-content: space-between;
    gap: 16px; /* 간격 조정 */
    width: 100%;
    margin-bottom: 20px;
  }
  .input-group {
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .input-group label {
    font-size: 12px;
    margin-bottom: 6px;
    font-weight: 600;
    color: #868e96;
    text-align: center;
  }
  .input-group select, .input-group input {
    width: 100%;
    box-sizing: border-box; /* 패딩 포함 크기 계산 */
    font-size: 15px;
    padding: 10px 8px;
    background: #f8f9fa;
    border: 1px solid #e9ecef;
    border-radius: 10px;
    text-align: center;
    font-weight: 500;
    color: #495057;
    outline: none;
    transition: border-color 0.2s;
    appearance: none; /* 브라우저 기본 화살표 숨김 */
  }
  .input-group select:focus, .input-group input:focus {
    border-color: #339af0;
  }

  /* 기본 타이머 라디오 버튼 */
  .mode-select {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    width: 100%;
    justify-content: center;
  }
  .mode-select label {
    font-size: 14px;
    font-weight: 500;
    color: #495057;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* 타이머 디스플레이 스타일 */
  .timer-display {
    font-size: 64px;
    font-weight: 700;
    font-variant-numeric: tabular-nums; /* 숫자 폭 고정으로 흔들림 방지 */
    margin: 10px 0 20px;
    width: 100%;
    text-align: center;
    color: #1c7ed6;
    letter-spacing: -1px;
  }
  .status-text {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 24px;
    color: #495057;
    background: #f1f3f5;
    padding: 6px 16px;
    border-radius: 20px;
  }
  .summary-text { 
    font-size: 13px; 
    color: #868e96; 
    margin-bottom: 10px; 
    font-weight: 500;
  }

  /* 버튼 스타일 */
  .buttons {
    width: 100%;
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    padding: 14px 0;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    background: #1c7ed6;
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: #1971c2; transform: translateY(-1px); }
  .btn:active { transform: translateY(1px); }
  
  .btn-outline { background: #e7f5ff; color: #1c7ed6; }
  .btn-outline:hover { background: #d0ebff; }
  
  .btn-danger { background: #fff5f5; color: #fa5252; }
  .btn-danger:hover { background: #ffe3e3; }

  /* 포모도로 SVG 스타일 */
  .pomo-wrapper {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 10px 0 25px;
  }
  .pomo-wrapper svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }
  .pomo-bg {
    fill: none;
    stroke: #f1f3f5;
    stroke-width: 8;
  }
  .pomo-progress {
    fill: none;
    stroke: #2f9e44;
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
    stroke-dasharray: 282.74;
    stroke-dashoffset: 0;
  }
  .pomo-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 42px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #2f9e44;
  }
</style>
</head>
<body>

<div class="app-container">
  
  <div class="tabs-container">
    <div class="tabs">
      <div class="tab-btn active" onclick="switchTab('tab-basic')">기본</div>
      <div class="tab-btn" onclick="switchTab('tab-interval')">인터벌</div>
      <div class="tab-btn" onclick="switchTab('tab-question')">문제</div>
      <div class="tab-btn" onclick="switchTab('tab-pomodoro')">포모도로</div>
    </div>
  </div>

  <div id="tab-basic" class="tab-content active">
    <div class="mode-select">
      <label><input type="radio" name="b_mode" value="1" checked> 1교시 (10분 알림)</label>
      <label><input type="radio" name="b_mode" value="2"> 2교시 (25분 알림)</label>
    </div>
    <div class="settings-row">
      <div class="input-group">
        <label>분 (Min)</label>
        <select id="b_min"></select>
      </div>
      <div class="input-group">
        <label>초 (Sec)</label>
        <select id="b_sec"></select>
      </div>
    </div>
    <div class="timer-display" id="b_display">00:00</div>
    <div class="buttons">
      <button class="btn" onclick="BasicTimer.start()">시작</button>
      <button class="btn btn-outline" onclick="BasicTimer.pause()">일시정지</button>
      <button class="btn btn-danger" onclick="BasicTimer.reset()">초기화</button>
    </div>
  </div>

  <div id="tab-interval" class="tab-content">
    <div class="settings-row">
      <div class="input-group">
        <label>인터벌 (분)</label>
        <select id="i_min"></select>
      </div>
      <div class="input-group">
        <label>인터벌 (초)</label>
        <select id="i_sec"></select>
      </div>
      <div class="input-group">
        <label>반복 횟수</label>
        <select id="i_count"></select>
      </div>
    </div>
    <div class="timer-display" id="i_display">00:00</div>
    <div class="status-text" id="i_status">대기 중 (휴식 5초 고정)</div>
    <div class="buttons">
      <button class="btn" onclick="IntervalTimer.start()">시작</button>
      <button class="btn btn-outline" onclick="IntervalTimer.pause()">일시정지</button>
      <button class="btn btn-danger" onclick="IntervalTimer.reset()">초기화</button>
    </div>
  </div>

  <div id="tab-question" class="tab-content">
    <div class="settings-row">
      <div class="input-group">
        <label>문제 수</label>
        <input type="number" id="q_count" min="1" max="100" value="5" oninput="QuestionTimer.updateSummary()">
      </div>
      <div class="input-group">
        <label>문제당 (초)</label>
        <select id="q_sec" onchange="QuestionTimer.updateSummary()"></select>
      </div>
      <div class="input-group">
        <label>대기 (초)</label>
        <select id="q_rest" onchange="QuestionTimer.updateSummary()"></select>
      </div>
    </div>
    <div class="summary-text" id="q_summary">예상 소요시간: 00:00</div>
    <div class="timer-display" id="q_display">00:00</div>
    <div class="status-text" id="q_status">대기 중</div>
    <div class="buttons">
      <button class="btn" onclick="QuestionTimer.start()">시작</button>
      <button class="btn btn-outline" onclick="QuestionTimer.pause()">일시정지</button>
      <button class="btn btn-danger" onclick="QuestionTimer.reset()">초기화</button>
    </div>
  </div>

  <div id="tab-pomodoro" class="tab-content">
    <div class="settings-row">
      <div class="input-group">
        <label>집중 (분)</label>
        <select id="p_focus"></select>
      </div>
      <div class="input-group">
        <label>휴식 (분)</label>
        <select id="p_break"></select>
      </div>
      <div class="input-group">
        <label>사이클</label>
        <select id="p_cycle"></select>
      </div>
    </div>
    
    <div class="pomo-wrapper">
      <svg viewBox="0 0 100 100">
        <circle class="pomo-bg" cx="50" cy="50" r="45"></circle>
        <circle class="pomo-progress" id="p_circle" cx="50" cy="50" r="45"></circle>
      </svg>
      <div class="pomo-text" id="p_display">00:00</div>
    </div>
    
    <div class="status-text" id="p_status">대기 중</div>
    
    <div class="buttons">
      <button class="btn" style="background:#2f9e44;" onclick="PomodoroTimer.start()">시작</button>
      <button class="btn btn-outline" style="color:#2f9e44; background:#ebfbee;" onclick="PomodoroTimer.pause()">일시정지</button>
      <button class="btn btn-danger" onclick="PomodoroTimer.reset()">초기화</button>
    </div>
  </div>

</div>

<script>
  // 공통 유틸리티
  const Utils = {
    formatTime: (seconds) => {
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      return `${m}:${s}`;
    },
    populateSelect: (id, max, defaultVal, isSecFormat = false) => {
      const select = document.getElementById(id);
      select.innerHTML = '';
      for (let i = (isSecFormat ? 1 : 0); i <= max; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.text = isSecFormat ? `${String(i).padStart(2, '0')}초` : String(i).padStart(2, '0');
        if (i === defaultVal) option.selected = true;
        select.appendChild(option);
      }
    }
  };

  // 탭 전환 로직
  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    document.querySelector(`.tab-btn[onclick="switchTab('${tabId}')"]`).classList.add('active');
  }

  // --------------------------------------------------
  // 1. 기본 타이머 로직
  // --------------------------------------------------
  const BasicTimer = {
    timer: null, remaining: 0, elapsed: 0, isPaused: false, originalTime: 0,
    recoveryTimeout: null, showTimeout: null, showElapsed: false,
    intervals: { '1': 600, '2': 1500 },

    start: function() {
      if (this.remaining <= 0) {
        const min = parseInt(document.getElementById('b_min').value) || 0;
        const sec = parseInt(document.getElementById('b_sec').value) || 0;
        this.remaining = min * 60 + sec;
        this.originalTime = this.remaining;
        this.elapsed = 0;
      }
      clearInterval(this.timer); clearTimeout(this.recoveryTimeout); clearTimeout(this.showTimeout);
      this.isPaused = false; this.showElapsed = false;
      this.updateDisplay();

      this.timer = setInterval(() => {
        if (!this.isPaused) {
          this.remaining--; this.elapsed++;
          if (this.remaining <= 0) {
            clearInterval(this.timer);
            this.showClear();
            return;
          }
          const mode = document.querySelector('input[name="b_mode"]:checked').value;
          if (this.elapsed % this.intervals[mode] === 0) {
            this.triggerElapsedMsg();
          } else if (!this.showElapsed) {
            this.updateDisplay();
          }
        }
      }, 1000);
    },
    pause: function() { this.isPaused = !this.isPaused; },
    reset: function() {
      clearInterval(this.timer); clearTimeout(this.recoveryTimeout); clearTimeout(this.showTimeout);
      this.remaining = 0; this.elapsed = 0; this.isPaused = false; this.showElapsed = false;
      this.updateDisplay();
    },
    updateDisplay: function() {
      const disp = document.getElementById('b_display');
      disp.innerText = Utils.formatTime(this.remaining);
      disp.style.color = '#1c7ed6';
    },
    triggerElapsedMsg: function() {
      this.showElapsed = true;
      const disp = document.getElementById('b_display');
      disp.innerText = `경과 ${Utils.formatTime(this.elapsed)}`;
      disp.style.color = '#e03131';
      this.showTimeout = setTimeout(() => {
        this.showElapsed = false;
        this.updateDisplay();
      }, 3000);
    },
    showClear: function() {
      const disp = document.getElementById('b_display');
      disp.innerText = "Clear"; disp.style.color = '#e03131';
      this.recoveryTimeout = setTimeout(() => {
        this.remaining = this.originalTime; this.elapsed = 0; this.updateDisplay();
      }, 5000);
    }
  };

  // --------------------------------------------------
  // 2. 인터벌 타이머 로직
  // --------------------------------------------------
  const IntervalTimer = {
    timer: null, intervalTime: 0, restTime: 5, remaining: 0,
    totalCycles: 0, currentCycle: 0, isPaused: false, isResting: false, isDone: false,

    start: function() {
      const min = parseInt(document.getElementById('i_min').value) || 0;
      const sec = parseInt(document.getElementById('i_sec').value) || 0;
      this.intervalTime = min * 60 + sec;
      this.totalCycles = parseInt(document.getElementById('i_count').value) || 1;

      if(this.intervalTime <= 0) { alert("시간을 설정해주세요."); return; }
      this.reset();
      this.currentCycle = 0;
      this.runNextPhase();
    },
    runNextPhase: function() {
      if (!this.isResting) this.currentCycle++;
      this.remaining = this.isResting ? this.restTime : this.intervalTime;
      this.isPaused = false; this.isDone = false;
      this.updateUI();

      clearInterval(this.timer);
      this.timer = setInterval(() => {
        if (!this.isPaused) {
          this.remaining--;
          this.updateUI();
          if (this.remaining <= 0) {
            clearInterval(this.timer);
            if (this.isResting) {
              this.isResting = false;
              this.runNextPhase();
            } else {
              if (this.currentCycle < this.totalCycles) {
                this.isResting = true;
                this.runNextPhase();
              } else {
                this.showClear();
              }
            }
          }
        }
      }, 1000);
    },
    pause: function() { this.isPaused = !this.isPaused; },
    reset: function() {
      clearInterval(this.timer);
      this.remaining = 0; this.currentCycle = 0; this.isPaused = false; this.isResting = false; this.isDone = false;
      document.getElementById('i_status').innerText = "대기 중 (휴식 5초 고정)";
      this.updateUI();
    },
    updateUI: function() {
      const disp = document.getElementById('i_display');
      const stat = document.getElementById('i_status');
      
      if (this.isDone) return;

      if (this.isResting) {
        disp.innerText = `대기 ${Utils.formatTime(this.remaining)}`;
        disp.style.color = '#f08c00';
        stat.innerText = `휴식 중 (인터벌 ${this.currentCycle} / ${this.totalCycles})`;
      } else {
        disp.innerText = Utils.formatTime(this.remaining);
        disp.style.color = '#1c7ed6';
        if(this.currentCycle > 0) stat.innerText = `인터벌 진행 중 (${this.currentCycle} / ${this.totalCycles})`;
      }
    },
    showClear: function() {
      this.isDone = true;
      document.getElementById('i_display').innerText = "Clear";
      document.getElementById('i_display').style.color = '#e03131';
      document.getElementById('i_status').innerText = "모든 인터벌 완료";
    }
  };

  // --------------------------------------------------
  // 3. 문제 타이머 로직
  // --------------------------------------------------
  const QuestionTimer = {
    timer: null, qTime: 0, rTime: 0, remaining: 0,
    totalQ: 0, currentQ: 0, isPaused: false, isResting: false, isDone: false,

    updateSummary: function() {
      const sec = parseInt(document.getElementById('q_sec').value) || 0;
      const rest = parseInt(document.getElementById('q_rest').value) || 0;
      const count = parseInt(document.getElementById('q_count').value) || 0;
      const totalSec = (sec * count) + (rest * (count > 0 ? count - 1 : 0));
      document.getElementById('q_summary').innerText = `예상 소요시간: ${Utils.formatTime(totalSec)}`;
    },
    start: function() {
      this.qTime = parseInt(document.getElementById('q_sec').value) || 0;
      this.rTime = parseInt(document.getElementById('q_rest').value) || 0;
      this.totalQ = parseInt(document.getElementById('q_count').value) || 1;
      
      if (this.qTime <= 0 || this.totalQ <= 0) { alert("올바른 값을 입력하세요."); return; }
      this.reset();
      this.currentQ = 0;
      this.runNextPhase();
    },
    runNextPhase: function() {
      if (!this.isResting) this.currentQ++;
      this.remaining = this.isResting ? this.rTime : this.qTime;
      this.isPaused = false; this.isDone = false;
      this.updateUI();

      clearInterval(this.timer);
      this.timer = setInterval(() => {
        if (!this.isPaused) {
          this.remaining--;
          this.updateUI();
          if (this.remaining <= 0) {
            clearInterval(this.timer);
            if (this.isResting) {
              this.isResting = false;
              this.runNextPhase();
            } else {
              if (this.currentQ < this.totalQ) {
                this.isResting = true;
                this.runNextPhase();
              } else {
                this.showClear();
              }
            }
          }
        }
      }, 1000);
    },
    pause: function() { this.isPaused = !this.isPaused; },
    reset: function() {
      clearInterval(this.timer);
      this.remaining = 0; this.currentQ = 0; this.isPaused = false; this.isResting = false; this.isDone = false;
      document.getElementById('q_status').innerText = "대기 중";
      this.updateUI();
    },
    updateUI: function() {
      const disp = document.getElementById('q_display');
      const stat = document.getElementById('q_status');
      if (this.isDone) return;
      if (this.isResting) {
        disp.innerText = `대기 ${Utils.formatTime(this.remaining)}`;
        disp.style.color = '#f08c00';
        stat.innerText = `다음 문제 준비 (${this.currentQ} / ${this.totalQ})`;
      } else {
        disp.innerText = Utils.formatTime(this.remaining);
        disp.style.color = '#1c7ed6';
        if(this.currentQ > 0) stat.innerText = `문제 풀이 중 (${this.currentQ} / ${this.totalQ})`;
      }
    },
    showClear: function() {
      this.isDone = true;
      document.getElementById('q_display').innerText = "Clear";
      document.getElementById('q_display').style.color = '#e03131';
      document.getElementById('q_status').innerText = "모든 문제 풀이 완료";
    }
  };

  // --------------------------------------------------
  // 4. 포모도로 타이머 로직
  // --------------------------------------------------
  const PomodoroTimer = {
    timer: null, fTime: 0, bTime: 0, remaining: 0, currentTotal: 0,
    totalCycle: 0, currentCycle: 0, isPaused: false, isBreak: false, isDone: false,
    circumference: 282.74,

    start: function() {
      this.fTime = parseInt(document.getElementById('p_focus').value) * 60;
      this.bTime = parseInt(document.getElementById('p_break').value) * 60;
      this.totalCycle = parseInt(document.getElementById('p_cycle').value);

      if (this.fTime <= 0 || this.bTime <= 0) return;
      
      if(this.remaining > 0 && this.isPaused) {
        this.isPaused = false;
        this.runLoop();
        return;
      }

      this.reset();
      this.currentCycle = 1;
      this.isBreak = false;
      this.startPhase();
    },
    startPhase: function() {
      this.currentTotal = this.isBreak ? this.bTime : this.fTime;
      this.remaining = this.currentTotal;
      this.isPaused = false; this.isDone = false;
      this.updateUI();
      this.runLoop();
    },
    runLoop: function() {
      clearInterval(this.timer);
      this.timer = setInterval(() => {
        if (!this.isPaused) {
          this.remaining--;
          if (this.remaining <= 0) {
            clearInterval(this.timer);
            if (this.isBreak) {
              if (this.currentCycle < this.totalCycle) {
                this.currentCycle++;
                this.isBreak = false;
                this.startPhase();
              } else {
                this.showClear();
              }
            } else {
              this.isBreak = true;
              this.startPhase();
            }
          } else {
            this.updateUI();
          }
        }
      }, 1000);
    },
    pause: function() { this.isPaused = !this.isPaused; },
    reset: function() {
      clearInterval(this.timer);
      this.remaining = 0; this.currentCycle = 0; this.isPaused = true; this.isBreak = false; this.isDone = false;
      document.getElementById('p_status').innerText = "대기 중";
      this.updateUI();
    },
    updateUI: function() {
      const disp = document.getElementById('p_display');
      const stat = document.getElementById('p_status');
      const circle = document.getElementById('p_circle');

      if (this.isDone) return;

      if(this.currentTotal > 0) {
        const offset = this.circumference * (1 - this.remaining / this.currentTotal);
        circle.style.strokeDashoffset = offset;
      } else {
        circle.style.strokeDashoffset = 0;
      }

      disp.innerText = Utils.formatTime(this.remaining);

      if (this.isBreak) {
        disp.style.color = '#f08c00'; circle.style.stroke = '#f08c00';
        stat.innerText = `휴식 시간 (${this.currentCycle} / ${this.totalCycle})`;
      } else {
        disp.style.color = '#2f9e44'; circle.style.stroke = '#2f9e44';
        if(this.currentCycle > 0) stat.innerText = `집중 시간 (${this.currentCycle} / ${this.totalCycle})`;
      }
    },
    showClear: function() {
      this.isDone = true;
      document.getElementById('p_display').innerText = "Clear";
      document.getElementById('p_display').style.color = '#1c7ed6';
      document.getElementById('p_circle').style.strokeDashoffset = 0;
      document.getElementById('p_circle').style.stroke = '#1c7ed6';
      document.getElementById('p_status').innerText = "모든 사이클 완료";
    }
  };

  // --------------------------------------------------
  // 초기화 (Select Box 값 세팅)
  // --------------------------------------------------
  window.onload = () => {
    Utils.populateSelect('b_min', 100, 100);
    Utils.populateSelect('b_sec', 59, 0);
    Utils.populateSelect('i_min', 100, 1);
    Utils.populateSelect('i_sec', 59, 0);
    Utils.populateSelect('i_count', 50, 5);
    Utils.populateSelect('q_sec', 300, 30, true);
    Utils.populateSelect('q_rest', 60, 3, true);
    QuestionTimer.updateSummary();
    Utils.populateSelect('p_focus', 60, 25);
    Utils.populateSelect('p_break', 30, 5);
    Utils.populateSelect('p_cycle', 20, 4);
    PomodoroTimer.updateUI(); 
  };
</script>
