<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아미니에게 쓰는 편지</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { 
            font-family: 'Jua', sans-serif; 
            /* 그린 & 베이지 자연 테마 배경 */
            background-color: #f3f0e6; 
            color: #3b2f2f; 
            overflow-x: auto; 
        }
        
        #report-container {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            background-color: #faf8f2;
            box-sizing: border-box;
            /* 사파리 잎사귀/점박이 느낌의 은은한 배경 패턴 */
            background-image: radial-gradient(#d4cdb3 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
        }

        /* 커스텀 스크롤바 (자연 친화적 그린) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #4ade80; border-radius: 10px; }
        
        /* 편지지 줄무늬 효과 */
        .letter-lines {
            background-image: repeating-linear-gradient(transparent, transparent 31px, #d1d5db 31px, #d1d5db 32px);
            line-height: 32px;
            padding-top: 8px;
        }
    </style>
</head>
<body className="py-8 px-4 flex flex-col items-center">
    <div id="root" className="w-full flex flex-col items-center"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const App = () => {
            const [studentInfo, setStudentInfo] = useState({ class: '', number: '', name: '' });
            const [letter, setLetter] = useState({
                part1: '',
                part2: '',
                part3: ''
            });
            const [isPrinting, setIsPrinting] = useState(false);
            const reportRef = useRef();

            const handleInfoChange = (field, val) => {
                setStudentInfo(prev => ({ ...prev, [field]: val }));
            };

            const handleLetterChange = (part, val) => {
                setLetter(prev => ({ ...prev, [part]: val }));
            };

            // PDF 출력 로직
            const downloadPDF = () => {
                setIsPrinting(true);
                
                setTimeout(async () => {
                    const element = reportRef.current;
                    const canvas = await html2canvas(element, { 
                        scale: 2,
                        useCORS: true, 
                        backgroundColor: '#faf8f2'
                    });
                    
                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    const { jsPDF } = window.jspdf;
                    
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth(); 
                    const pdfHeight = pdf.internal.pageSize.getHeight(); 
                    
                    const imgRatio = canvas.width / canvas.height;
                    let renderWidth = pdfWidth;
                    let renderHeight = pdfWidth / imgRatio;
                    
                    if (renderHeight > pdfHeight) {
                        renderHeight = pdfHeight;
                        renderWidth = pdfHeight * imgRatio;
                    }
                    
                    const xMargin = (pdfWidth - renderWidth) / 2;
                    
                    pdf.addImage(imgData, 'JPEG', xMargin, 0, renderWidth, renderHeight);

                    const fileNameParts = [];
                    if (studentInfo.class) fileNameParts.push(`${studentInfo.class}반`);
                    if (studentInfo.number) fileNameParts.push(`${studentInfo.number}번`);
                    if (studentInfo.name) fileNameParts.push(studentInfo.name);
                    
                    const fileSuffix = fileNameParts.length > 0 ? fileNameParts.join('_') : '지구지킴이';
                    pdf.save(`아미니에게_쓰는_편지_${fileSuffix}.pdf`);
                    
                    setIsPrinting(false);
                }, 100);
            };

            // 텍스트 영역 렌더링 헬퍼 (인쇄 모드와 입력 모드 분기)
            const renderTextArea = (part, placeholder) => {
                if (isPrinting) {
                    return (
                        <div className="w-full min-h-[140px] text-[18px] text-green-900 letter-lines whitespace-pre-wrap break-words px-2">
                            {letter[part]}
                        </div>
                    );
                }
                return (
                    <textarea 
                        value={letter[part]}
                        onChange={(e) => handleLetterChange(part, e.target.value)}
                        placeholder={placeholder}
                        className="w-full min-h-[140px] bg-transparent resize-none border-none focus:outline-none text-[18px] text-green-900 letter-lines placeholder:text-green-600/40 px-2"
                    />
                );
            };

            return (
                <div className="w-full flex flex-col items-center gap-6">
                    
                    {/* 상단 액션바 */}
                    <div className="w-full max-w-[210mm] flex justify-between items-center bg-white p-4 rounded-3xl shadow-md border-4 border-green-700">
                        <div className="flex items-center gap-3">
                            <span className="text-4xl">🦒</span>
                            <h1 className="text-2xl text-green-800 pt-1">Wild Adventure: 아미니의 SOS 프로젝트</h1>
                        </div>
                        <button 
                            onClick={downloadPDF}
                            disabled={isPrinting}
                            className={`flex items-center gap-2 text-white px-6 py-3 rounded-2xl text-lg transition-all shadow-md border-2 border-green-900
                                ${isPrinting ? 'bg-gray-400 border-gray-500 cursor-not-allowed' : 'bg-green-700 hover:bg-green-600 active:scale-95'}`}
                        >
                            🌿 {isPrinting ? '편지 부치는 중...' : '편지 저장하기'}
                        </button>
                    </div>

                    {/* PDF 출력 영역 */}
                    <div ref={reportRef} id="report-container" className={`p-[12mm] border-8 rounded-3xl flex flex-col relative overflow-hidden ${isPrinting ? 'border-none shadow-none' : 'border-green-800 shadow-2xl'}`}>
                        
                        {/* 데코레이션 요소 (나뭇잎) */}
                        <div className="absolute top-2 left-2 text-6xl opacity-30 transform -rotate-45 z-0">🌿</div>
                        <div className="absolute bottom-4 right-4 text-7xl opacity-30 transform rotate-12 z-0">🍃</div>

                        {/* 헤더 및 학생 정보 */}
                        <div className="flex justify-between items-end border-b-4 border-amber-600 pb-4 mb-4 relative z-10">
                            <div>
                                <h2 className="text-4xl text-green-900 tracking-wide flex items-center gap-2">
                                    💌 케냐의 기린 '아미니'에게
                                </h2>
                                <p className="text-xl text-amber-700 mt-2 ml-2">지구를 사랑하는 마음을 듬뿍 담아 편지를 써봐요 🌍</p>
                            </div>
                            <div className="flex gap-2 bg-amber-50 p-2 rounded-2xl border-2 border-amber-200 shadow-sm shrink-0">
                                <div className="flex flex-col items-center">
                                    <label className="text-xs text-amber-800">반</label>
                                    <input 
                                        type="text" placeholder="예: 1" 
                                        value={studentInfo.class} onChange={(e) => handleInfoChange('class', e.target.value)}
                                        className={`bg-transparent w-12 text-center text-lg text-green-900 focus:outline-none placeholder:text-amber-300 ${isPrinting ? 'border-none' : 'border-b-2 border-amber-400'}`}
                                    />
                                </div>
                                <div className="flex flex-col items-center">
                                    <label className="text-xs text-amber-800">번호</label>
                                    <input 
                                        type="text" placeholder="번호" 
                                        value={studentInfo.number} onChange={(e) => handleInfoChange('number', e.target.value)}
                                        className={`bg-transparent w-10 text-center text-lg text-green-900 focus:outline-none placeholder:text-amber-300 ${isPrinting ? 'border-none' : 'border-b-2 border-amber-400'}`}
                                    />
                                </div>
                                <div className="flex flex-col items-center">
                                    <label className="text-xs text-amber-800">이름</label>
                                    <input 
                                        type="text" placeholder="내 이름" 
                                        value={studentInfo.name} onChange={(e) => handleInfoChange('name', e.target.value)}
                                        className={`bg-transparent w-20 text-center text-lg text-green-900 focus:outline-none placeholder:text-amber-300 ${isPrinting ? 'border-none' : 'border-b-2 border-amber-400'}`}
                                    />
                                </div>
                            </div>
                        </div>

                        {/* 교사 안내 박스 (인쇄 시에도 보이게 하거나 디자인 요소로 활용) */}
                        <div className="bg-green-100/80 border-2 border-green-300 rounded-2xl p-4 mb-4 relative z-10 shadow-sm">
                            <div className="flex items-start gap-3">
                                <span className="text-3xl mt-1">👩‍🏫</span>
                                <div>
                                    <p className="text-green-900 font-bold text-lg mb-1">선생님의 안내</p>
                                    <p className="text-green-800 text-[16px] leading-snug break-keep">
                                        이 편지에는 정해진 형식이나 정답이 없어요! 영상을 보고 느낀 점, 아미니를 향한 미안함, 그리고 앞으로의 다짐을 자유롭게 글로 적어 주세요.
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* 편지 본문 영역 */}
                        <div className="flex-1 flex flex-col gap-4 relative z-10">
                            
                            {/* 질문 1: 느낀 점 */}
                            <div className="bg-white/70 border-2 border-amber-200 rounded-3xl p-5 shadow-sm">
                                <h3 className="text-xl text-amber-800 mb-2 flex items-center gap-2">
                                    🎬 1. 영상을 보고 나서 나의 마음은 어땠나요?
                                </h3>
                                {renderTextArea('part1', '아미니의 모습을 보고 느낀 감정을 솔직하게 적어보세요.')}
                            </div>

                            {/* 질문 2: 고백 */}
                            <div className="bg-white/70 border-2 border-amber-200 rounded-3xl p-5 shadow-sm">
                                <h3 className="text-xl text-amber-800 mb-2 flex items-center gap-2">
                                    🥺 2. 나의 무심한 행동이 아미니에게 어떤 영향을 미쳤을까요? (나의 고백)
                                </h3>
                                {renderTextArea('part2', '우리가 일상에서 무심코 했던 행동들이 동물 친구들에게 어떤 아픔을 주었을지 생각해보며 고백의 글을 써보세요.')}
                            </div>

                            {/* 질문 3: 약속 */}
                            <div className="bg-white/70 border-2 border-amber-200 rounded-3xl p-5 shadow-sm">
                                <h3 className="text-xl text-amber-800 mb-2 flex items-center gap-2">
                                    🤝 3. 기후 문제를 해결하고 아미니를 돕기 위한 나의 약속!
                                </h3>
                                {renderTextArea('part3', '아미니가 건강하게 살아갈 수 있도록, 내가 일상생활에서 실천할 수 있는 환경 보호 약속을 적어주세요.')}
                            </div>

                        </div>

                        {/* 꼬리말 */}
                        <div className="text-right mt-6 pr-6 relative z-10">
                            <span className="text-2xl text-green-900 font-bold">
                                아미니를 응원하는 <span className="text-amber-600 border-b-2 border-amber-400 inline-block min-w-[80px] text-center px-2">{studentInfo.name || '000'}</span> (이)가 씀 ✍️
                            </span>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
