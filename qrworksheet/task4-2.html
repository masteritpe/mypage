<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신재생 에너지 마을 소개글 쓰기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            /* 주황색 테마 (기존 유지) */
            --main-color: #ff4500;
            --light-color: #fff0eb;
            --border-color: #ffbba6;
            --header-bg: #ffd1c2;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        /* 조 정보 입력 영역 */
        .group-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            background-color: var(--light-color);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
        }

        .info-label {
            font-size: 1.15rem;
            color: var(--main-color);
            font-weight: bold;
            white-space: nowrap; 
            flex-shrink: 0; 
        }

        .info-select, .info-input {
            flex: 1;
            min-width: 0; 
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1.05rem;
            outline: none;
            color: #333;
            background-color: #fff;
            font-family: inherit;
            text-align: center;
        }

        .info-select { cursor: pointer; }

        .info-select:focus, .info-input:focus {
            border-color: var(--main-color);
            box-shadow: 0 0 5px rgba(255, 69, 0, 0.3);
        }

        /* 수행과제 타이틀 영역 */
        .task-header {
            display: flex;
            border-top: 2px solid var(--main-color);
            border-bottom: 2px solid var(--main-color);
            margin-bottom: 30px;
        }

        .task-tag {
            background-color: var(--header-bg);
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.1rem;
            border-right: 1px solid var(--main-color);
            white-space: nowrap;
            color: #111;
        }

        .task-title {
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.1rem;
            flex: 1;
            color: var(--main-color);
        }

        /* 공통 블록 속성 */
        .section-block {
            margin-bottom: 25px;
        }
        
        /* 질문 및 답변 영역 */
        .content-box {
            border: 1px solid #333;
            border-radius: 4px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
        }

        .guide-text {
            padding: 15px;
            border-bottom: 1px solid #ccc;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #222;
        }

        .answer-area {
            width: 100%;
            padding: 15px;
            border: none;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical; 
            outline: none;
            line-height: 1.6;
            min-height: 500px; /* 초기 높이를 조금 더 여유롭게 확보 */
            background-color: transparent;
        }

        .answer-area:focus {
            background-color: #fffcfb;
            box-shadow: inset 0 0 5px rgba(255, 69, 0, 0.1);
        }

        /* PDF 다운로드 버튼 CSS */
        .download-btn {
            width: 100%;
            padding: 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
        }

        .download-btn:hover {
            background-color: #555;
        }

        /* PDF 캡처용 특수 스타일 */
        .pdf-mode { box-shadow: none !important; }
        
        .pdf-text-replacement {
            display: inline-block;
            width: 100%;
            padding: 8px 0;
            font-family: inherit;
            box-sizing: border-box;
        }

        .pdf-textarea-replacement {
            display: block;
            width: 100%;
            padding: 15px;
            font-family: inherit;
            box-sizing: border-box;
            white-space: pre-wrap;
            word-break: break-all;
            border: none; 
            min-height: 500px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    
    <div class="group-info">
        <span class="info-label">나의 조는?</span>
        <select class="info-select" id="groupSelect">
            <option value="" disabled selected>조 선택(A~F)</option>
            <option value="A조">A조</option>
            <option value="B조">B조</option>
            <option value="C조">C조</option>
            <option value="D조">D조</option>
            <option value="E조">E조</option>
            <option value="F조">F조</option>
        </select>
        <input type="text" class="info-input" id="groupName" placeholder="조 이름 입력">
    </div>

    <div class="task-header">
        <div class="task-tag">수행과제4-2</div>
        <div class="task-title">신재생 에너지 마을 소개글 쓰기(발표자료)</div>
    </div>

    <div class="section-block">
        <div class="content-box">
            <div class="guide-text">
                - 가이드가 되어 우리 조가 만든 신재생 에너지 마을을 소개해 봅시다.<br>
                (마을의 주력산업, 필요 에너지량, 마을의 특징, 에너지 조달 과정 등도 적으세요)
            </div>
            <textarea class="answer-area" placeholder="이곳에 발표 자료 내용을 자유롭게 작성해주세요."></textarea>
        </div>
    </div>
    
    <button type="button" id="downloadBtn" class="download-btn">PDF로 다운로드</button>
</div>

<script>
    // 텍스트 영역(Textarea) 자동 높이 조절
    document.querySelectorAll('textarea').forEach(textarea => {
        textarea.addEventListener('input', function() {
            this.style.height = 'auto'; 
            this.style.height = Math.max(this.scrollHeight, 500) + 'px'; 
        });
    });

    // PDF 다운로드 기능
    document.getElementById('downloadBtn').addEventListener('click', async function(e) {
        e.preventDefault(); 
        const currentScrollY = window.scrollY; 
        const captureArea = document.getElementById('captureArea');
        const downloadBtn = this;

        downloadBtn.style.visibility = 'hidden';
        captureArea.classList.add('pdf-mode');

        const formElements = captureArea.querySelectorAll('input, select, textarea');
        const replacements = [];

        // 1. 폼 요소를 텍스트/기호로 변환
        formElements.forEach(el => {
            let replacementElement;
            const tagName = el.tagName.toLowerCase();
            const type = el.type ? el.type.toLowerCase() : '';

            if (tagName === 'textarea') {
                replacementElement = document.createElement('div');
                replacementElement.className = 'pdf-textarea-replacement';
                replacementElement.textContent = el.value;
                if(el.value === "") replacementElement.innerHTML = "&nbsp;"; 
            } else {
                replacementElement = document.createElement('span');
                replacementElement.className = 'pdf-text-replacement';
                
                if (tagName === 'select') {
                    replacementElement.innerText = el.value === "" ? "" : el.options[el.selectedIndex].text;
                } else {
                    replacementElement.innerText = el.value;
                }
            }

            if(type !== 'checkbox') {
                const computedStyle = window.getComputedStyle(el);
                replacementElement.style.fontSize = computedStyle.fontSize;
                replacementElement.style.color = computedStyle.color;
            }
            
            if(el.classList.contains('info-input') || el.classList.contains('info-select')) {
                replacementElement.style.textAlign = 'center';
                replacementElement.style.padding = '0 10px';
                replacementElement.style.width = 'auto';
                replacementElement.style.flex = '1';
                
                if(tagName === 'select' && el.value === "") {
                    replacementElement.innerText = "조 선택(A~F)";
                    replacementElement.style.color = '#aaa';
                }
            }

            el.parentNode.insertBefore(replacementElement, el);
            const originalDisplay = el.style.display;
            el.style.display = 'none';

            replacements.push({ element: el, replacement: replacementElement, originalDisplay: originalDisplay });
        });

        // 렌더링 대기
        await new Promise(r => setTimeout(r, 100));

        // 2. 캡처 및 PDF 생성 (페이지 밀어내기 로직 제거됨)
        html2canvas(captureArea, {
            scale: 2, 
            useCORS: true,
            backgroundColor: '#ffffff'
        }).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();
            
            const margin = 10; 
            const finalWidth = pdfWidth - (margin * 2);
            const finalHeight = (canvas.height * finalWidth) / canvas.width;

            let position = margin;
            let heightLeft = finalHeight;
            const printedAmount = pdfHeight - (margin * 2);

            pdf.addImage(imgData, 'PNG', margin, position, finalWidth, finalHeight);
            
            pdf.setFillColor(255, 255, 255);
            pdf.rect(0, 0, pdfWidth, margin, 'F'); 
            pdf.rect(0, pdfHeight - margin, pdfWidth, margin, 'F'); 

            heightLeft -= printedAmount;

            while (heightLeft > 5) { // 빈 페이지 렌더링 방지
                position -= printedAmount; 
                
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', margin, position, finalWidth, finalHeight);
                
                pdf.setFillColor(255, 255, 255);
                pdf.rect(0, 0, pdfWidth, margin, 'F'); 
                pdf.rect(0, pdfHeight - margin, pdfWidth, margin, 'F'); 
                
                heightLeft -= printedAmount;
            }
            
            // 파일명 설정 (수행과제4-2_A조_이름.pdf)
            const groupSelectValue = replacements.find(r => r.element.id === 'groupSelect')?.element.value !== "" 
                ? replacements.find(r => r.element.id === 'groupSelect')?.element.options[replacements.find(r => r.element.id === 'groupSelect').element.selectedIndex].text : '';
            const groupNameInput = replacements.find(r => r.element.id === 'groupName')?.replacement.innerText.trim() || '';
            
            const nameParts = [];
            if (groupSelectValue) nameParts.push(groupSelectValue);
            if (groupNameInput) nameParts.push(groupNameInput);
            
            const safeName = nameParts.length > 0 ? nameParts.join('_') : '이름없음';
            const finalFileName = `수행과제4-2_${safeName}.pdf`;
            
            pdf.save(finalFileName);
            
        }).finally(() => {
            // UI 복구
            replacements.forEach(rep => {
                rep.replacement.parentNode.removeChild(rep.replacement);
                rep.element.style.display = rep.originalDisplay;
            });

            captureArea.classList.remove('pdf-mode');
            downloadBtn.style.visibility = 'visible';
            window.scrollTo(0, currentScrollY);
        });
    });
</script>

</body>
</html>
