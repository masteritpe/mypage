<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👩‍🏫 Brain Writing 교사 대시보드</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <script src="./firebase-config.js"></script>  
  
    <style>
        body { 
            font-family: 'Jua', sans-serif; 
            background-color: #f8fafc; 
            color: #334155; 
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-8 min-h-screen flex flex-col items-center">
    <div id="root" class="w-full max-w-6xl"></div>

    <script type="text/babel">
        // 💡 수정된 부분: 하드코딩된 설정 객체를 삭제하고 window.firebaseConfig를 사용합니다.
        if (!firebase.apps.length) {
            firebase.initializeApp(window.firebaseConfig);
        }
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        const AdminApp = () => {
            const [reports, setReports] = useState([]);
            const [isLoading, setIsLoading] = useState(false);

            // 데이터 불러오기 함수
            const fetchReports = async () => {
                setIsLoading(true);
                try {
                    const snapshot = await db.collection("scamper_reports").get();
                    let data = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));

                    // 반 번호 순으로 오름차순 정렬 (과거 데이터 groupNum 호환 포함)
                    data.sort((a, b) => {
                        const numA = parseInt(a.studentInfo?.classNum || a.studentInfo?.groupNum) || 0;
                        const numB = parseInt(b.studentInfo?.classNum || b.studentInfo?.groupNum) || 0;
                        return numA - numB;
                    });

                    setReports(data);
                } catch (e) {
                    alert("데이터를 불러오는데 실패했습니다: " + e.message);
                }
                setIsLoading(false);
            };

            // 컴포넌트 마운트 시 데이터 자동 로드
            useEffect(() => {
                fetchReports();
            }, []);

            // 데이터 삭제 함수
            const handleDelete = async (docId, studentName) => {
                if (window.confirm(`정말 '${studentName}' 학생 데이터를 삭제하시겠습니까?\n삭제된 데이터는 복구할 수 없습니다.`)) {
                    try {
                        await db.collection("scamper_reports").doc(docId).delete();
                        alert("삭제되었습니다.");
                        fetchReports(); // 목록 새로고침
                    } catch (e) {
                        alert("삭제 실패: " + e.message);
                    }
                }
            };

            // CSV(엑셀) 다운로드 함수
            const exportToCSV = () => {
                if (reports.length === 0) return alert("다운로드할 데이터가 없습니다.");

                const escapeCSV = (str) => {
                    if (str === null || str === undefined) return '""';
                    return `"${String(str).replace(/"/g, '""')}"`;
                };

                // 배열 형태의 아이디어를 줄바꿈하여 하나의 문자열로 포맷팅하는 헬퍼 함수
                const formatScamper = (scamperData, numsArr) => {
                    if (!scamperData) return "";
                    // 구버전 데이터(단일 텍스트)인 경우 그대로 반환
                    if (!Array.isArray(scamperData)) return scamperData;
                    
                    return scamperData.map((text, idx) => {
                        if (!text) return null;
                        const num = numsArr && numsArr[idx] ? numsArr[idx] : '';
                        return num ? `[${num}] ${text}` : text;
                    }).filter(item => item !== null).join("\n");
                };

                const headers = [
                    "반", "이름", "상황", "문제정의", 
                    "대체(S)", "결합(C)", "응용(A)", "수정(M)", "용도(P)", "제거(E)", "재배열(R)", 
                    "후보개수", "적합성", "현실성", "창의성", "영향", "지속성",
                    "최종아이디어명", "핵심설명", "선정이유", 
                    "발표_문제", "발표_해결", "발표_기대효과", "제출일시"
                ];

                const rows = reports.map(r => {
                    const info = r.studentInfo || {};
                    const ideaNums = r.ideaNumbers || ['', '', '', ''];
                    const criteria = r.finalIdea?.criteria || {};

                    return [
                        escapeCSV(info.classNum || info.groupNum), // 과거 데이터 호환
                        escapeCSV(info.studentName || info.teamName), // 과거 데이터 호환
                        escapeCSV(r.situation),
                        escapeCSV(r.problem),
                        escapeCSV(formatScamper(r.scamper?.S, ideaNums)), 
                        escapeCSV(formatScamper(r.scamper?.C, ideaNums)), 
                        escapeCSV(formatScamper(r.scamper?.A, ideaNums)), 
                        escapeCSV(formatScamper(r.scamper?.M, ideaNums)), 
                        escapeCSV(formatScamper(r.scamper?.P, ideaNums)), 
                        escapeCSV(formatScamper(r.scamper?.E, ideaNums)), 
                        escapeCSV(formatScamper(r.scamper?.R, ideaNums)),
                        escapeCSV(r.finalIdea?.candidatesCount),
                        escapeCSV(criteria['적합성'] ? 'O' : 'X'),
                        escapeCSV(criteria['현실성'] ? 'O' : 'X'),
                        escapeCSV(criteria['창의성'] ? 'O' : 'X'),
                        escapeCSV(criteria['영향'] ? 'O' : 'X'),
                        escapeCSV(criteria['지속성'] ? 'O' : 'X'),
                        escapeCSV(r.finalIdea?.name),
                        escapeCSV(r.finalIdea?.description),
                        escapeCSV(r.finalIdea?.reason),
                        escapeCSV(r.presentation?.prob),
                        escapeCSV(r.presentation?.sol),
                        escapeCSV(r.presentation?.effect),
                        escapeCSV(r.updatedAt?.toDate ? r.updatedAt.toDate().toLocaleString('ko-KR') : '')
                    ];
                });

                // 한글 깨짐 방지를 위한 BOM 추가
                const csvContent = "\uFEFF" + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement("a");
                link.href = url;
                link.setAttribute("download", `SCAMPER_전체결과취합_${new Date().toLocaleDateString('ko-KR').replace(/\./g, '').replace(/ /g, '')}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="w-full bg-white rounded-[32px] shadow-xl border-4 border-teal-500 overflow-hidden">
                    {/* 상단 헤더 영역 */}
                    <div className="bg-teal-50 px-8 py-6 border-b-4 border-teal-500 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <span className="text-5xl">👩‍🏫</span>
                            <div>
                                <h1 className="text-3xl text-teal-800 font-bold">Brain Writing 교사 대시보드</h1>
                                <p className="text-teal-600 mt-1">학생들이 제출한 모든 데이터를 확인하고 관리하세요.</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={fetchReports} className="bg-white border-2 border-teal-400 hover:bg-teal-100 text-teal-700 px-5 py-2.5 rounded-xl font-bold transition-colors flex items-center gap-2 shadow-sm">
                                🔄 {isLoading ? '불러오는 중...' : '새로고침'}
                            </button>
                            <button onClick={exportToCSV} className="bg-teal-600 hover:bg-teal-700 text-white px-5 py-2.5 rounded-xl font-bold transition-colors flex items-center gap-2 shadow-sm">
                                📥 전체 엑셀 다운로드
                            </button>
                        </div>
                    </div>

                    {/* 메인 테이블 영역 */}
                    <div className="p-8 overflow-x-auto">
                        <table className="w-full text-left border-collapse min-w-[800px]">
                            <thead>
                                <tr className="bg-teal-100/50 text-teal-800">
                                    <th className="p-4 rounded-tl-xl border-b-2 border-teal-200 font-bold text-center w-24">반</th>
                                    <th className="p-4 border-b-2 border-teal-200 font-bold w-48">이름</th>
                                    <th className="p-4 border-b-2 border-teal-200 font-bold">선택 상황 및 문제 정의</th>
                                    <th className="p-4 border-b-2 border-teal-200 font-bold w-64">최종 아이디어명</th>
                                    <th className="p-4 border-b-2 border-teal-200 font-bold text-center w-40">제출일시</th>
                                    <th className="p-4 rounded-tr-xl border-b-2 border-teal-200 font-bold text-center w-24">관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                {reports.length === 0 ? (
                                    <tr>
                                        <td colSpan="6" className="text-center py-12 text-gray-500 text-lg">
                                            {isLoading ? "데이터를 불러오고 있습니다..." : "아직 제출된 기록이 없습니다."}
                                        </td>
                                    </tr>
                                ) : (
                                    reports.map((report) => (
                                        <tr key={report.id} className="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                                            <td className="p-4 text-center font-bold text-xl text-teal-600">
                                                {report.studentInfo?.classNum || report.studentInfo?.groupNum}
                                            </td>
                                            <td className="p-4 font-bold text-gray-700">
                                                {report.studentInfo?.studentName || report.studentInfo?.teamName}
                                            </td>
                                            <td className="p-4">
                                                <span className="inline-block px-2 py-1 bg-orange-100 text-orange-700 text-[13px] rounded-lg mb-1">
                                                    {report.situation || "상황 미선택"}
                                                </span>
                                                <p className="text-[15px] text-gray-600 truncate max-w-md" title={report.problem}>
                                                    {report.problem || "-"}
                                                </p>
                                            </td>
                                            <td className="p-4">
                                                <p className="font-bold text-teal-700 truncate" title={report.finalIdea?.name}>
                                                    {report.finalIdea?.name || "미작성"}
                                                </p>
                                            </td>
                                            <td className="p-4 text-center text-[13px] text-gray-500">
                                                {report.updatedAt?.toDate ? report.updatedAt.toDate().toLocaleString('ko-KR', {
                                                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                                                }) : '-'}
                                            </td>
                                            <td className="p-4 text-center">
                                                <button 
                                                    onClick={() => handleDelete(report.id, report.studentInfo?.studentName || report.studentInfo?.teamName)}
                                                    className="bg-red-100 hover:bg-red-500 text-red-600 hover:text-white px-3 py-1.5 rounded-lg text-sm font-bold transition-colors"
                                                >
                                                    삭제
                                                </button>
                                            </td>
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
