<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에너지마을 지도 만들기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            /* 주황색 테마 */
            --main-color: #ff4500;
            --light-color: #fff0eb;
            --border-color: #ffbba6;
            --header-bg: #ffd1c2;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        /* 조 정보 입력 영역 */
        .group-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            background-color: var(--light-color);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
        }

        .info-label {
            font-size: 1.15rem;
            color: var(--main-color);
            font-weight: bold;
            white-space: nowrap; 
            flex-shrink: 0; 
        }

        .info-select, .info-input {
            flex: 1;
            min-width: 0; 
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1.05rem;
            outline: none;
            color: #333;
            background-color: #fff;
            font-family: inherit;
            text-align: center;
        }

        .info-select { cursor: pointer; }

        .info-select:focus, .info-input:focus {
            border-color: var(--main-color);
            box-shadow: 0 0 5px rgba(255, 69, 0, 0.3);
        }

        /* 수행과제 타이틀 영역 */
        .task-header {
            display: flex;
            border-top: 2px solid var(--main-color);
            border-bottom: 2px solid var(--main-color);
            margin-bottom: 30px;
        }

        .task-tag {
            background-color: var(--header-bg);
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.1rem;
            border-right: 1px solid var(--main-color);
            white-space: nowrap;
        }

        .task-title {
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.1rem;
            flex: 1;
        }

        /* 공통 블록 속성 (PDF 잘림 방지용) */
        .section-block {
            margin-bottom: 25px;
            overflow: hidden; 
        }
        
        .activity-title {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--main-color);
            margin-bottom: 15px;
        }

        /* 체크박스 스타일 */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            color: #222;
        }

        .checkbox-label input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: var(--main-color);
        }

        /* 질문 텍스트 */
        .question-text {
            font-size: 1.05rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: #222;
        }

        /* 클릭 가능한 지도 캔버스(격자 무늬) 영역 - 영역 확대 */
        .map-upload-area {
            width: 100%;
            min-height: 450px; /* 기존 350px에서 확장 */
            border: 2px dashed #ccc;
            border-radius: 8px;
            background-color: #fff;
            /* 격자 무늬 배경 */
            background-image:
                linear-gradient(#f0f0f0 1px, transparent 1px),
                linear-gradient(90deg, #f0f0f0 1px, transparent 1px);
            background-size: 20px 20px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .map-upload-area:hover {
            border-color: var(--main-color);
            background-color: #fafafa;
        }

        /* 캔버스 내부 안내 문구 (플레이스홀더) */
        .upload-placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            color: #555;
            font-size: 1.05rem;
            border: 1px solid #eee;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            pointer-events: none; /* 텍스트 클릭 시에도 업로드 영역이 눌리도록 통과시킴 */
            width: 85%;
            word-break: keep-all;
        }

        .upload-placeholder-text strong {
            display: block;
            font-size: 1.2rem;
            color: var(--main-color);
            margin-bottom: 8px;
        }

        /* 업로드된 이미지 미리보기 */
        .map-upload-area img {
            width: 100%;
            height: auto;
            display: none;
            position: relative;
            z-index: 2;
            border-radius: 8px;
        }

        /* PDF 다운로드 버튼 CSS */
        .download-btn {
            width: 100%;
            padding: 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
        }

        .download-btn:hover {
            background-color: #555;
        }

        /* PDF 캡처용 특수 스타일 */
        .pdf-mode { box-shadow: none !important; }
        
        .pdf-text-replacement {
            display: inline-block;
            width: 100%;
            padding: 8px 0;
            font-family: inherit;
            box-sizing: border-box;
        }

        .pdf-checkbox-replacement {
            display: inline-block;
            width: 24px;
            font-size: 1.2rem;
            font-family: inherit;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    
    <div class="group-info">
        <span class="info-label">나의 조는?</span>
        <select class="info-select" id="groupSelect">
            <option value="" disabled selected>조 선택(A~F)</option>
            <option value="A조">A조</option>
            <option value="B조">B조</option>
            <option value="C조">C조</option>
            <option value="D조">D조</option>
            <option value="E조">E조</option>
            <option value="F조">F조</option>
        </select>
        <input type="text" class="info-input" id="groupName" placeholder="조 이름 입력">
    </div>

    <div class="task-header">
        <div class="task-tag">수행과제4-1</div>
        <div class="task-title">에너지마을 지도 만들기</div>
    </div>

    <div class="section-block">
        <div class="activity-title" style="color: #333;">반드시 포함해야 할 조건</div>
        <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox"> 전기자동차 충전 계획 포함하기</label>
            <label class="checkbox-label"><input type="checkbox"> 마을의 전력 공급 계획 세우기</label>
            <label class="checkbox-label"><input type="checkbox"> 최소 5가지 이상의 친환경 에너지 사용하기</label>
            <label class="checkbox-label"><input type="checkbox"> 환경 훼손을 최소화하기</label>
            <label class="checkbox-label"><input type="checkbox"> 주민 생활을 고려하기</label>
            <label class="checkbox-label"><input type="checkbox"> 안전 문제 고려하기</label>
        </div>
    </div>

    <div class="section-block" style="border-top: 2px dashed var(--main-color); padding-top: 20px;">
        <div class="question-text">우리 조의 마을 지도 구상 및 설명</div>
        
        <input type="file" id="mapImageUpload" accept="image/*" style="display: none;">
        
        <div class="map-upload-area" id="mapUploadArea">
            <div class="upload-placeholder-text" id="uploadPlaceholder">
                <strong>📸 이곳을 클릭하여 지도 이미지를 첨부하세요</strong>
                지도에 발전소의 위치, 주민 생활 시설, 친환경적인 특징 등을 배치하세요.
            </div>
            <img id="mapImagePreview" alt="업로드된 지도 이미지">
        </div>
        
    </div>
    
    <button type="button" id="downloadBtn" class="download-btn">PDF로 다운로드</button>
</div>

<script>
    // 지도 영역 클릭 시 파일 업로드 창 띄우기 및 미리보기 적용
    const uploadArea = document.getElementById('mapUploadArea');
    const fileInput = document.getElementById('mapImageUpload');
    const preview = document.getElementById('mapImagePreview');
    const placeholderText = document.getElementById('uploadPlaceholder');

    uploadArea.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block'; // 이미지 로드 시 표시
                placeholderText.style.display = 'none'; // 글자 숨김
                uploadArea.style.border = '1px solid #ccc'; // 점선을 실선으로 변경
            }
            reader.readAsDataURL(file);
        }
    });

    // 스마트 줄바꿈 적용 및 PDF 다운로드 기능
    document.getElementById('downloadBtn').addEventListener('click', async function(e) {
        e.preventDefault(); 
        const currentScrollY = window.scrollY; 
        const captureArea = document.getElementById('captureArea');
        const downloadBtn = this;

        // PDF 생성 시 버튼 숨김
        downloadBtn.style.visibility = 'hidden';
        captureArea.classList.add('pdf-mode');

        // input type="file"은 제외하고 텍스트 변환
        const formElements = captureArea.querySelectorAll('input:not([type="file"]), select, textarea');
        const replacements = [];
        const originalMargins = []; 

        // 1. 폼 요소를 텍스트/기호로 변환 (체크박스 완벽 지원)
        formElements.forEach(el => {
            let replacementElement;
            const tagName = el.tagName.toLowerCase();
            const type = el.type ? el.type.toLowerCase() : '';

            if (type === 'checkbox') {
                replacementElement = document.createElement('span');
                replacementElement.className = 'pdf-checkbox-replacement';
                replacementElement.innerHTML = el.checked ? '☑' : '☐';
            } else {
                replacementElement = document.createElement('span');
                replacementElement.className = 'pdf-text-replacement';
                
                if (tagName === 'select') {
                    replacementElement.innerText = el.value === "" ? "" : el.options[el.selectedIndex].text;
                } else {
                    replacementElement.innerText = el.value;
                }
            }

            if(type !== 'checkbox') {
                const computedStyle = window.getComputedStyle(el);
                replacementElement.style.fontSize = computedStyle.fontSize;
                replacementElement.style.color = computedStyle.color;
            }
            
            if(el.classList.contains('info-input') || el.classList.contains('info-select')) {
                replacementElement.style.textAlign = 'center';
                replacementElement.style.padding = '0 10px';
                replacementElement.style.width = 'auto';
                replacementElement.style.flex = '1';
                
                if(tagName === 'select' && el.value === "") {
                    replacementElement.innerText = "조 선택(A~F)";
                    replacementElement.style.color = '#aaa';
                }
            }

            el.parentNode.insertBefore(replacementElement, el);
            const originalDisplay = el.style.display;
            el.style.display = 'none';

            replacements.push({ element: el, replacement: replacementElement, originalDisplay: originalDisplay });
        });

        // 렌더링 대기
        await new Promise(r => setTimeout(r, 150)); 

        // 2. 스마트 잘림 방지 로직
        const PAGE_HEIGHT_PX = captureArea.offsetWidth * (277 / 190); 
        const blocks = captureArea.querySelectorAll('.section-block');
        
        blocks.forEach(block => {
            const rect = block.getBoundingClientRect();
            const captureRect = captureArea.getBoundingClientRect();
            
            const top = rect.top - captureRect.top;
            const bottom = top + block.offsetHeight;

            const safeTop = top + 20; 
            const safeBottom = bottom + 20;

            const pageNumTop = Math.floor(safeTop / PAGE_HEIGHT_PX);
            const pageNumBottom = Math.floor(safeBottom / PAGE_HEIGHT_PX);

            if (pageNumTop !== pageNumBottom) {
                const targetTop = pageNumBottom * PAGE_HEIGHT_PX + 20; 
                const shift = targetTop - top;
                
                const currentMargin = parseFloat(window.getComputedStyle(block).marginTop) || 0;
                originalMargins.push({ element: block, margin: block.style.marginTop }); 
                
                block.style.marginTop = (currentMargin + shift) + 'px';
            }
        });

        await new Promise(r => setTimeout(r, 100));

        // 3. 캡처 및 PDF 생성
        html2canvas(captureArea, {
            scale: 2, 
            useCORS: true,
            backgroundColor: '#ffffff'
        }).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();
            
            const margin = 10; 
            const finalWidth = pdfWidth - (margin * 2);
            const finalHeight = (canvas.height * finalWidth) / canvas.width;

            let position = margin;
            let heightLeft = finalHeight;
            const printedAmount = pdfHeight - (margin * 2);

            pdf.addImage(imgData, 'PNG', margin, position, finalWidth, finalHeight);
            
            pdf.setFillColor(255, 255, 255);
            pdf.rect(0, 0, pdfWidth, margin, 'F'); 
            pdf.rect(0, pdfHeight - margin, pdfWidth, margin, 'F'); 

            heightLeft -= printedAmount;

            while (heightLeft > 5) { 
                position -= printedAmount; 
                
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', margin, position, finalWidth, finalHeight);
                
                pdf.setFillColor(255, 255, 255);
                pdf.rect(0, 0, pdfWidth, margin, 'F'); 
                pdf.rect(0, pdfHeight - margin, pdfWidth, margin, 'F'); 
                
                heightLeft -= printedAmount;
            }
            
            // 파일명 설정
            const groupSelectValue = replacements.find(r => r.element.id === 'groupSelect')?.element.value !== "" 
                ? replacements.find(r => r.element.id === 'groupSelect')?.element.options[replacements.find(r => r.element.id === 'groupSelect').element.selectedIndex].text : '';
            const groupNameInput = replacements.find(r => r.element.id === 'groupName')?.replacement.innerText.trim() || '';
            
            const nameParts = [];
            if (groupSelectValue) nameParts.push(groupSelectValue);
            if (groupNameInput) nameParts.push(groupNameInput);
            
            const safeName = nameParts.length > 0 ? nameParts.join('_') : '이름없음';
            const finalFileName = `수행과제4-1_${safeName}.pdf`;
            
            pdf.save(finalFileName);
            
        }).finally(() => {
            // UI 복구
            replacements.forEach(rep => {
                rep.replacement.parentNode.removeChild(rep.replacement);
                rep.element.style.display = rep.originalDisplay;
            });

            originalMargins.forEach(item => {
                item.element.style.marginTop = item.margin;
            });

            captureArea.classList.remove('pdf-mode');
            downloadBtn.style.visibility = 'visible';
            window.scrollTo(0, currentScrollY);
        });
    });
</script>

</body>
</html>
