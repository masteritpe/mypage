<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모둠 토론: 사파리 지키기 탐험일지</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { 
            font-family: 'Jua', sans-serif; 
            background-color: #fff7ed; 
            color: #432c0a; 
            overflow-x: auto; 
        }
        
        #report-container {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            background-color: #fffaed;
            box-sizing: border-box;
            background-image: radial-gradient(#fcd34d 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
        
        .journal-lines {
            background-image: repeating-linear-gradient(transparent, transparent 31px, #fdba74 31px, #fdba74 32px);
            line-height: 32px;
            padding-top: 8px;
        }
    </style>
</head>
<body className="py-8 px-4 flex flex-col items-center">
    <div id="root" className="w-full flex flex-col items-center"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const App = () => {
            const [studentInfo, setStudentInfo] = useState({ 
                groupNum: '', 
                teamName: '' 
            });
            const [answers, setAnswers] = useState({
                q1: '',
                q2: '',
                q3: ''
            });
            const [isPrinting, setIsPrinting] = useState(false);
            const reportRef = useRef();

            const handleInfoChange = (field, val) => {
                setStudentInfo(prev => ({ ...prev, [field]: val }));
            };

            const handleAnswerChange = (part, val) => {
                setAnswers(prev => ({ ...prev, [part]: val }));
            };

            const downloadPDF = () => {
                setIsPrinting(true);
                
                setTimeout(async () => {
                    const element = reportRef.current;
                    const canvas = await html2canvas(element, { 
                        scale: 2,
                        useCORS: true, 
                        backgroundColor: '#fffaed'
                    });
                    
                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    const { jsPDF } = window.jspdf;
                    
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth(); 
                    const pdfHeight = pdf.internal.pageSize.getHeight(); 
                    
                    const imgRatio = canvas.width / canvas.height;
                    let renderWidth = pdfWidth;
                    let renderHeight = pdfWidth / imgRatio;
                    
                    if (renderHeight > pdfHeight) {
                        renderHeight = pdfHeight;
                        renderWidth = pdfHeight * imgRatio;
                    }
                    
                    const xMargin = (pdfWidth - renderWidth) / 2;
                    
                    pdf.addImage(imgData, 'JPEG', xMargin, 0, renderWidth, renderHeight);

                    const fileName = studentInfo.teamName ? studentInfo.teamName : '탐험가';
                    pdf.save(`사파리탐험_토론일지_${fileName}.pdf`);
                    
                    setIsPrinting(false);
                }, 100);
            };

            const renderTextArea = (part, placeholder, minHeight = "min-h-[120px]") => {
                if (isPrinting) {
                    return (
                        <div className={`w-full ${minHeight} text-[17px] text-green-900 journal-lines whitespace-pre-wrap break-words px-2`}>
                            {answers[part]}
                        </div>
                    );
                }
                return (
                    <textarea 
                        value={answers[part]}
                        onChange={(e) => handleAnswerChange(part, e.target.value)}
                        placeholder={placeholder}
                        className={`w-full ${minHeight} bg-transparent resize-none border-none focus:outline-none text-[17px] text-green-900 journal-lines placeholder:text-orange-400/50 px-2`}
                    />
                );
            };

            return (
                <div className="w-full flex flex-col items-center gap-6">
                    
                    {/* 상단 액션바 */}
                    <div className="w-full max-w-[210mm] flex justify-between items-center bg-white p-4 rounded-3xl shadow-md border-4 border-orange-400">
                        <div className="flex items-center gap-3">
                            <span className="text-4xl">🧭</span>
                            <h1 className="text-2xl text-orange-600 pt-1">Explore AFRICA: 사파리 지키기 탐험 일지</h1>
                        </div>
                        <button 
                            onClick={downloadPDF}
                            disabled={isPrinting}
                            className={`flex items-center gap-2 text-white px-6 py-3 rounded-2xl text-lg transition-all shadow-md border-2 border-orange-700
                                ${isPrinting ? 'bg-gray-400 border-gray-500 cursor-not-allowed' : 'bg-orange-500 hover:bg-orange-400 active:scale-95'}`}
                        >
                            🖨️ {isPrinting ? '토론일지 저장 중...' : '토론일지 저장'}
                        </button>
                    </div>

                    {/* PDF 출력 영역 */}
                    <div ref={reportRef} id="report-container" className={`p-[12mm] border-8 rounded-3xl flex flex-col relative overflow-hidden ${isPrinting ? 'border-none shadow-none' : 'border-green-700 shadow-2xl'}`}>
                        
                        <div className="absolute top-4 left-4 text-6xl opacity-20 transform -rotate-12 z-0">🦁</div>
                        <div className="absolute bottom-6 right-6 text-7xl opacity-20 transform rotate-12 z-0">⛺</div>

                        {/* 헤더 및 정보 입력란 */}
                        <div className="flex justify-between items-end border-b-4 border-green-600 pb-4 mb-4 relative z-10">
                            <div>
                                <h2 className="text-[32px] text-orange-600 tracking-wide flex items-center gap-2 whitespace-nowrap">
                                    🌍 모둠 토론: 기후부정의와 기술
                                </h2>
                                {/* pb-1을 추가하여 PDF 변환 시 글자 아래쪽이 잘리는 현상 방지 */}
                                <p className="text-xl text-green-800 mt-2 ml-2 pb-1">친구들과 함께 토론하고 기록하는 탐험 일지</p>
                            </div>
                            
                            {/* 정보 입력 영역 */}
                            <div className="flex items-center gap-3 bg-orange-50 p-2 px-4 rounded-2xl border-2 border-orange-200 shadow-sm shrink-0 mb-1 ml-4">
                                
                                {/* 모둠 입력 */}
                                <div className="flex flex-col items-start">
                                    <label className="text-sm font-bold text-orange-800 mb-1">모둠</label>
                                    <input 
                                        type="text" placeholder="1" 
                                        value={studentInfo.groupNum} onChange={(e) => handleInfoChange('groupNum', e.target.value)}
                                        className={`bg-transparent w-8 text-center text-xl text-green-900 font-bold focus:outline-none placeholder:font-normal placeholder:text-orange-300 ${isPrinting ? 'border-none' : 'border-b-2 border-orange-400'}`}
                                    />
                                </div>
                                
                                <div className="w-px h-10 bg-orange-300 mx-1"></div>
                                
                                {/* 모둠명 입력 */}
                                <div className="flex flex-col items-start">
                                    <label className="text-sm font-bold text-orange-800 mb-1">모둠명</label>
                                    <input 
                                        type="text" placeholder="우리 모둠" 
                                        value={studentInfo.teamName} onChange={(e) => handleInfoChange('teamName', e.target.value)}
                                        className={`bg-transparent w-32 text-xl text-green-900 font-bold focus:outline-none placeholder:font-normal placeholder:text-orange-300 ${isPrinting ? 'border-none' : 'border-b-2 border-orange-400'}`}
                                    />
                                </div>

                            </div>
                        </div>

                        {/* 교사 안내 박스 */}
                        <div className="bg-orange-100/80 border-2 border-orange-300 rounded-2xl p-4 mb-4 relative z-10 shadow-sm flex items-start gap-3">
                            <span className="text-3xl mt-1">⏳</span>
                            <div>
                                <p className="text-orange-900 font-bold text-lg mb-1">모둠 토론 미션</p>
                                <p className="text-orange-800 text-[16px] leading-snug break-keep">
                                    우리가 살고 있는 지구별, 그리고 저 멀리 케냐의 친구들에 대해 함께 이야기 나누어 보아요. 우리 모둠만의 멋진 생각들을 모아 일지에 기록해 봅시다.
                                </p>
                            </div>
                        </div>

                        {/* 토론 본문 */}
                        <div className="flex-1 flex flex-col gap-4 relative z-10">
                            <div className="bg-white/80 border-2 border-green-500 rounded-3xl p-5 shadow-sm">
                                <h3 className="text-xl text-green-700 mb-2 flex items-center gap-2">
                                    🔥 1. 왜 탄소를 적게 배출한 케냐가 더 큰 피해를 받을까?
                                </h3>
                                {renderTextArea('q1', '기후 부정의에 대해 나눈 대화 내용을 적어보세요.')}
                            </div>

                            <div className="bg-white/80 border-2 border-green-500 rounded-3xl p-5 shadow-sm">
                                <h3 className="text-xl text-green-700 mb-2 flex items-center gap-2">
                                    💡 2. 케냐와 같은 지역에 필요한 기술은 어떤 특징을 가져야 할까?
                                </h3>
                                {renderTextArea('q3', '자유로운 아이디어를 적어주세요.', 'min-h-[150px]')}
                            </div>
                        </div>

                        {/* 꼬리말 */}
                        <div className="text-right mt-6 pr-6 relative z-10">
                            <span className="text-xl text-orange-800 font-bold">
                                멋진 탐험을 마친 <span className="text-green-700 border-b-2 border-green-500 inline-block min-w-[120px] text-center px-2">{studentInfo.teamName || '탐험가'}</span> 의 기록 ✍️
                            </span>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
