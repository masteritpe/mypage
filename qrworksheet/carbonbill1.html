<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>탄소요금계산서</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { 
            font-family: 'Jua', sans-serif; 
            background-color: #fffbeb; 
            color: #4a4a4a; 
            overflow-x: auto; 
        }
        
        #report-container {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            background: #ffffff;
            box-sizing: border-box;
            background-image: radial-gradient(#fde68a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { opacity: 1; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
    </style>
</head>
<body className="py-8 px-4 flex flex-col items-center">
    <div id="root" className="w-full flex flex-col items-center"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef } = React;

        /* --- 데이터 세팅 --- */
        const BASIC_ITEMS = [
            { id: 'b1', name: "⚙️ 바퀴 1개 또는 바퀴 축", price: 5 },
            { id: 'b2', name: "⚡ 모터", price: 10 },
            { id: 'b3', name: "☀️ 태양광셀", price: 10 },
            { id: 'b4', name: "🎡 큰 기어", price: 3 },
            { id: 'b5', name: "🎡 작은 기어", price: 3 }
        ];

        const DECO_ITEMS = [
            { id: 'd1', name: "⬜ 우드락 1장", price: 5 },
            { id: 'd2', name: "🍡 클레이 (종이컵 반컵)", price: 3 },
            { id: 'd3', name: "🥤 빨대", price: 1 },
            { id: 'd4', name: "🌈 색종이", price: 3 },
            { id: 'd5', name: "〰️ 색철사 (10cm 당)", price: 3 },
            { id: 'd6', name: "👀 눈알스티커 2개", price: 1 },
            { id: 'd7', name: "📦 골판지", price: 2 },
            { id: 'd8', name: "📜 도화지", price: 2 }
        ];

        const PENALTY_ITEMS = [
            { id: 'p1', name: "🗑️ 재료 낭비", price: 10, unit: '횟수' },
            { id: 'p2', name: "🚮 쓸만한 재료 투기", price: 10, unit: '횟수' },
            { id: 'p3', name: "🥷 타인재료 사용", price: 20, unit: '횟수' },
            { id: 'p4', name: "😈 기타 비양심", type: 'direct' },
            { id: 'p5', name: "🤝 이외 재료는 협상", type: 'direct' }
        ];

        const ALL_ITEMS = [...BASIC_ITEMS, ...DECO_ITEMS, ...PENALTY_ITEMS];

        const App = () => {
            const [counts, setCounts] = useState(Object.fromEntries(ALL_ITEMS.map(i => [i.id, 0])));
            const [studentInfo, setStudentInfo] = useState({ class: '', number: '', name: '' });
            const [isPrinting, setIsPrinting] = useState(false);
            const reportRef = useRef();

            const handleCountChange = (id, val) => {
                const n = parseInt(val) || 0;
                setCounts(prev => ({ ...prev, [id]: n < 0 ? 0 : n }));
            };

            const handleInfoChange = (field, val) => {
                setStudentInfo(prev => ({ ...prev, [field]: val }));
            };

            const totalAmount = useMemo(() => {
                let total = 0;
                ALL_ITEMS.forEach(item => {
                    if (item.type === 'direct') {
                        total += (counts[item.id] || 0);
                    } else {
                        total += (item.price * (counts[item.id] || 0));
                    }
                });
                return Math.max(0, total - 10); // 기본소득 10 차감, 마이너스 방지
            }, [counts]);

            // PDF 1장 강제 출력 로직
            const downloadPDF = () => {
                setIsPrinting(true);
                
                setTimeout(async () => {
                    const element = reportRef.current;
                    const canvas = await html2canvas(element, { 
                        scale: 2,
                        useCORS: true, 
                        backgroundColor: '#ffffff'
                    });
                    
                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    const { jsPDF } = window.jspdf;
                    
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth(); 
                    const pdfHeight = pdf.internal.pageSize.getHeight(); 
                    
                    const imgRatio = canvas.width / canvas.height;
                    let renderWidth = pdfWidth;
                    let renderHeight = pdfWidth / imgRatio;
                    
                    if (renderHeight > pdfHeight) {
                        renderHeight = pdfHeight;
                        renderWidth = pdfHeight * imgRatio;
                    }
                    
                    const xMargin = (pdfWidth - renderWidth) / 2;
                    
                    pdf.addImage(imgData, 'JPEG', xMargin, 0, renderWidth, renderHeight);

                    const fileNameParts = ['탄소요금계산서'];
                    if (studentInfo.class) fileNameParts.push(`${studentInfo.class}반`);
                    if (studentInfo.number) fileNameParts.push(`${studentInfo.number}번`);
                    if (studentInfo.name) fileNameParts.push(studentInfo.name);
                    
                    const fileSuffix = fileNameParts.length > 1 ? fileNameParts.join('_') : '탄소요금계산서_친구';
                    pdf.save(`${fileSuffix}.pdf`);
                    
                    setIsPrinting(false);
                }, 100);
            };

            // 테이블 렌더링 헬퍼 함수
            const renderTable = (items, title, colorClass, headerBgClass) => (
                <div className={`bg-white rounded-2xl border-2 ${colorClass} overflow-hidden shadow-sm mb-6`}>
                    <div className={`${headerBgClass} text-white py-2 px-4 text-xl text-center tracking-wide`}>
                        {title}
                    </div>
                    <table className="w-full text-left border-collapse">
                        <thead className="bg-gray-50 text-gray-600 border-b-2 border-gray-100">
                            <tr>
                                <th className="py-2 px-3 text-lg font-normal w-1/2">항목</th>
                                <th className="py-2 px-2 text-center text-lg font-normal w-1/6">단가(C)</th>
                                <th className="py-2 px-2 text-center text-lg font-normal w-1/5">수량</th>
                                <th className="py-2 px-3 text-right text-lg font-normal w-1/6">합계</th>
                            </tr>
                        </thead>
                        <tbody className={`divide-y ${colorClass.replace('border', 'divide')}`}>
                            {items.map((item) => (
                                <tr key={item.id} className={counts[item.id] > 0 ? "bg-orange-50" : "hover:bg-gray-50"}>
                                    <td className="py-2 px-3 text-gray-700 text-[16px]">{item.name}</td>
                                    
                                    {/* 단가 표시 */}
                                    <td className="py-2 px-2 text-center text-teal-600 text-[16px]">
                                        {item.type === 'direct' ? '-' : `C ${item.price}`}
                                    </td>
                                    
                                    {/* 수량/금액 입력 폼 */}
                                    <td className="py-2 px-2 text-center">
                                        {!isPrinting ? (
                                            <input 
                                                type="number"
                                                value={counts[item.id] === 0 ? '' : counts[item.id]}
                                                onChange={(e) => handleCountChange(item.id, e.target.value)}
                                                className="w-14 border-2 border-orange-200 rounded-lg text-center text-orange-600 focus:outline-none focus:border-orange-400 bg-white text-base py-0.5 placeholder:text-gray-300"
                                                placeholder={item.type === 'direct' ? '금액' : '0'}
                                            />
                                        ) : (
                                            <span className="text-orange-600 text-lg">{counts[item.id] || 0}</span>
                                        )}
                                    </td>
                                    
                                    {/* 라인 합계 */}
                                    <td className="py-2 px-3 text-right text-orange-600 text-[17px] font-bold">
                                        {item.type === 'direct' 
                                            ? `${counts[item.id] || 0} C` 
                                            : `${item.price * (counts[item.id] || 0)} C`}
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );

            return (
                <div className="w-full flex flex-col items-center gap-6">
                    
                    {/* 상단 액션바 */}
                    <div className="w-full max-w-[210mm] flex justify-between items-center bg-white p-4 rounded-3xl shadow-md border-4 border-orange-200">
                        <div className="flex items-center gap-2">
                            <span className="text-4xl">🌍</span>
                            <h1 className="text-2xl text-orange-500 pt-1">지구 지킴이 연구소</h1>
                        </div>
                        <button 
                            onClick={downloadPDF}
                            disabled={isPrinting}
                            className={`flex items-center gap-2 text-white px-6 py-3 rounded-2xl text-lg transition-all shadow-md
                                ${isPrinting ? 'bg-gray-400 cursor-not-allowed' : 'bg-teal-500 hover:bg-teal-400 active:scale-95'}`}
                        >
                            🖨️ {isPrinting ? 'PDF 생성 중...' : 'PDF 저장'}
                        </button>
                    </div>

                    {/* PDF 출력 영역 */}
                    <div ref={reportRef} id="report-container" className={`p-[12mm] border-4 rounded-3xl flex flex-col relative overflow-hidden ${isPrinting ? 'border-none shadow-none' : 'border-teal-400 shadow-2xl'}`}>
                        
                        {/* 헤더 및 학생 정보 */}
                        <div className="flex justify-between items-end border-b-4 border-orange-400 pb-5 mb-6 relative z-10">
                            <div>
                                <h2 className="text-4xl text-teal-600 tracking-wide flex items-center gap-2">
                                    💰 탄소 요금 계산서
                                </h2>
                                <p className="text-xl text-orange-500 mt-2 ml-2">내가 사용한 자원은 얼마일까? 🤔</p>
                            </div>
                            <div className="flex gap-3 bg-orange-50 p-3 rounded-2xl border-2 border-orange-200 shadow-sm">
                                <div className="flex flex-col items-center">
                                    <label className="text-sm text-orange-600">반</label>
                                    <input 
                                        type="text" placeholder="예: 1" 
                                        value={studentInfo.class} onChange={(e) => handleInfoChange('class', e.target.value)}
                                        className={`bg-transparent w-16 text-center text-xl text-teal-700 focus:outline-none placeholder:text-orange-300 ${isPrinting ? 'border-none' : 'border-b-2 border-orange-300'}`}
                                    />
                                </div>
                                <div className="flex flex-col items-center">
                                    <label className="text-sm text-orange-600">번호</label>
                                    <input 
                                        type="text" placeholder="번호" 
                                        value={studentInfo.number} onChange={(e) => handleInfoChange('number', e.target.value)}
                                        className={`bg-transparent w-12 text-center text-xl text-teal-700 focus:outline-none placeholder:text-orange-300 ${isPrinting ? 'border-none' : 'border-b-2 border-orange-300'}`}
                                    />
                                </div>
                                <div className="flex flex-col items-center">
                                    <label className="text-sm text-orange-600">이름</label>
                                    <input 
                                        type="text" placeholder="내 이름" 
                                        value={studentInfo.name} onChange={(e) => handleInfoChange('name', e.target.value)}
                                        className={`bg-transparent w-24 text-center text-xl text-teal-700 focus:outline-none placeholder:text-orange-300 ${isPrinting ? 'border-none' : 'border-b-2 border-orange-300'}`}
                                    />
                                </div>
                            </div>
                        </div>

                        {/* 메인 콘텐츠 2단 그리드 분할 */}
                        <div className="flex-1 grid grid-cols-1 md:grid-cols-2 gap-x-8 relative z-10">
                            
                            {/* 왼쪽 열 */}
                            <div className="flex flex-col">
                                {renderTable(BASIC_ITEMS, "🛠️ 기본 제공 재료 (분실시)", "border-teal-200", "bg-teal-400")}
                                {renderTable(DECO_ITEMS, "🎨 꾸밈용 재료", "border-yellow-300", "bg-yellow-400")}
                            </div>

                            {/* 오른쪽 열 */}
                            <div className="flex flex-col">
                                {renderTable(PENALTY_ITEMS, "🚨 페널티 및 기타", "border-red-200", "bg-red-400")}

                                {/* 총합 결제 박스 */}
                                <div className="mt-auto bg-orange-500 text-white rounded-3xl p-6 shadow-lg relative overflow-hidden border-4 border-orange-300">
                                    <div className="absolute top-0 right-2 text-7xl opacity-20 transform rotate-12">💳</div>
                                    <div className="text-2xl text-orange-100 mb-2 flex items-center justify-between">
                                        <span>총 요금 합계</span>
                                        <span className="text-sm bg-orange-600/50 px-3 py-1 rounded-full border border-orange-300/50">기본소득 -10 C 적용됨</span>
                                    </div>
                                    <div className="flex items-baseline gap-2 justify-end mt-4">
                                        <span className="text-7xl text-white drop-shadow-md font-bold">{totalAmount}</span>
                                        <span className="text-3xl text-orange-100">C</span>
                                    </div>
                                    <div className="mt-4 pt-4 border-t-2 border-orange-400 border-dashed text-right text-orange-100">
                                        지구를 아끼는 마음으로 신중하게 결제해 주세요! 🌍
                                    </div>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
