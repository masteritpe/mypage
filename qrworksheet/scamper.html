<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAMPER 아이디어 연구소</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { 
            font-family: 'Jua', sans-serif; 
            background-color: #fffbeb; 
            color: #4a4a4a; 
            overflow-x: auto; 
        }
        
        #report-container {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            background: #ffffff;
            box-sizing: border-box;
            background-image: radial-gradient(#fde68a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
    </style>
</head>
<body className="py-8 px-4 flex flex-col items-center">
    <div id="root" className="w-full flex flex-col items-center"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        /* --- 질문 데이터 세팅 --- */
        const QUESTIONS = [
            { id: 'q1', type: 'scamper', label: '대체하기 (S)', title: "여러분의 책가방에서 대체하고 싶은 것은 무엇인가요?", emoji: "🔄" },
            { id: 'q2', type: 'scamper', label: '결합하기 (C)', title: "여러분의 책가방에 결합하고 싶은 것은 무엇인가요?", emoji: "➕" },
            { id: 'q3', type: 'scamper', label: '응용하기 (A)', title: "여러분의 책가방에 응용하여 넣고 싶은 것은 무엇인가요?", emoji: "💡" },
            { id: 'q4', type: 'scamper', label: '수정하기 (M)', title: "여러분의 책가방에서 결합해서 수정하고 싶은 것은 무엇인가요?", emoji: "🛠️" },
            { id: 'q5', type: 'scamper', label: '다른 용도로 쓰기 (P)', title: "여러분의 책가방을 또 다른 어떤 용도로 사용할 수 있을까요?", emoji: "♻️" },
            { id: 'q6', type: 'scamper', label: '제거하기 (E)', title: "여러분의 책가방에서 제거하고 싶은 것은 무엇인가요?", emoji: "✂️" },
            { id: 'q7', type: 'scamper', label: '재배열하기 (R)', title: "여러분의 책가방에서 재배열하고 싶은 것은 무엇인가요?", emoji: "🔀" },
            { id: 'q8', type: 'extra', label: '결합하기 응용', title: "'결합하기' 기법을 활용하여 등굣길에 유용한 새로운 도구를 설계한다면 무엇과 무엇을 합치고 싶습니까?", emoji: "🏫" },
            { id: 'q9', type: 'extra', label: '강제연결법', title: "'신발'과 '청소기'를 연결해 보세요. 어떤 기능을 가진 신발이 탄생할까요?", emoji: "👟" },
            { id: 'q10', type: 'essay', label: '나의 생각 1', title: "일상에서 불편함을 느끼는 상황에서 SCAMPER 기법이 왜 유용한지 자신의 생각을 설명해 보세요.", emoji: "🤔" },
            { id: 'q11', type: 'essay', label: '나의 생각 2', title: "이번 수업에서 배운 기법 중, 가장 효과적이라고 생각하는 기법은 무엇이며 그 이유는 무엇입니까?", emoji: "🏆" }
        ];

        const App = () => {
            const [answers, setAnswers] = useState(Object.fromEntries(QUESTIONS.map(q => [q.id, ''])));
            const [studentInfo, setStudentInfo] = useState({ class: '', number: '', name: '' });
            const [isPrinting, setIsPrinting] = useState(false);
            const reportRef = useRef();

            const handleAnswerChange = (id, val) => {
                setAnswers(prev => ({ ...prev, [id]: val }));
            };

            const handleInfoChange = (field, val) => {
                setStudentInfo(prev => ({ ...prev, [field]: val }));
            };

            // PDF 출력 로직
            const downloadPDF = () => {
                setIsPrinting(true);
                
                setTimeout(async () => {
                    const element = reportRef.current;
                    const canvas = await html2canvas(element, { 
                        scale: 2,
                        useCORS: true, 
                        backgroundColor: '#ffffff'
                    });
                    
                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    const { jsPDF } = window.jspdf;
                    
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth(); 
                    const pdfHeight = pdf.internal.pageSize.getHeight(); 
                    
                    const imgRatio = canvas.width / canvas.height;
                    let renderWidth = pdfWidth;
                    let renderHeight = pdfWidth / imgRatio;
                    
                    if (renderHeight > pdfHeight) {
                        renderHeight = pdfHeight;
                        renderWidth = pdfHeight * imgRatio;
                    }
                    
                    const xMargin = (pdfWidth - renderWidth) / 2;
                    
                    pdf.addImage(imgData, 'JPEG', xMargin, 0, renderWidth, renderHeight);

                    const fileNameParts = [];
                    if (studentInfo.class) fileNameParts.push(`${studentInfo.class}반`);
                    if (studentInfo.number) fileNameParts.push(`${studentInfo.number}번`);
                    if (studentInfo.name) fileNameParts.push(studentInfo.name);
                    
                    const fileSuffix = fileNameParts.length > 0 ? fileNameParts.join('_') : '연구원';
                    pdf.save(`SCAMPER연구소_${fileSuffix}.pdf`);
                    
                    setIsPrinting(false);
                }, 100);
            };

            // 카드 렌더링 헬퍼 함수
            const renderCard = (q, spanTwo = false) => (
                <div key={q.id} className={`bg-white border-2 ${q.type === 'scamper' ? 'border-teal-300' : 'border-orange-300'} rounded-2xl p-3 flex flex-col shadow-sm ${spanTwo ? 'col-span-1 md:col-span-2' : ''}`}>
                    <div className="flex items-start gap-2 mb-2">
                        <span className="text-xl leading-none">{q.emoji}</span>
                        <div>
                            <span className={`text-[13px] font-bold px-2 py-0.5 rounded-full ${q.type === 'scamper' ? 'bg-teal-100 text-teal-700' : 'bg-orange-100 text-orange-700'}`}>
                                {q.label}
                            </span>
                            <h3 className="text-[15px] text-gray-700 mt-1 leading-tight break-keep">{q.title}</h3>
                        </div>
                    </div>
                    <div className={`flex-1 bg-gray-50 rounded-xl border border-gray-200 border-dashed p-2 ${spanTwo ? 'min-h-[70px]' : 'min-h-[50px]'}`}>
                        {!isPrinting ? (
                            <textarea 
                                value={answers[q.id]}
                                onChange={(e) => handleAnswerChange(q.id, e.target.value)}
                                placeholder="아이디어를 자유롭게 적어보세요!"
                                className="w-full h-full bg-transparent resize-none border-none focus:outline-none text-gray-700 text-[15px] leading-snug placeholder:text-gray-400"
                            />
                        ) : (
                            <div className="w-full h-full text-gray-700 text-[15px] leading-snug whitespace-pre-wrap break-words">
                                {answers[q.id]}
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="w-full flex flex-col items-center gap-6">
                    
                    {/* 상단 액션바 */}
                    <div className="w-full max-w-[210mm] flex justify-between items-center bg-white p-4 rounded-3xl shadow-md border-4 border-teal-200">
                        <div className="flex items-center gap-2">
                            <span className="text-4xl">💡</span>
                            <h1 className="text-2xl text-teal-600 pt-1">아이디어 톡톡 연구소</h1>
                        </div>
                        <button 
                            onClick={downloadPDF}
                            disabled={isPrinting}
                            className={`flex items-center gap-2 text-white px-6 py-3 rounded-2xl text-lg transition-all shadow-md
                                ${isPrinting ? 'bg-gray-400 cursor-not-allowed' : 'bg-orange-400 hover:bg-orange-500 active:scale-95'}`}
                        >
                            🖨️ {isPrinting ? 'PDF 생성 중...' : 'PDF 저장'}
                        </button>
                    </div>

                    {/* PDF 출력 영역 */}
                    <div ref={reportRef} id="report-container" className={`p-[10mm] border-4 rounded-3xl flex flex-col relative overflow-hidden ${isPrinting ? 'border-none shadow-none' : 'border-teal-400 shadow-2xl'}`}>
                        
                        {/* 헤더 및 학생 정보 */}
                        <div className="flex justify-between items-end border-b-4 border-yellow-400 pb-4 mb-4 relative z-10">
                            <div>
                                <h2 className="text-4xl text-teal-600 tracking-wide flex items-center gap-2">
                                    🎒 SCAMPER 책가방 혁명!
                                </h2>
                                <p className="text-xl text-orange-500 mt-2 ml-2">상상력을 발휘해 나만의 멋진 아이디어를 기록해봐요 ✨</p>
                            </div>
                            <div className="flex gap-2 bg-yellow-50 p-2 rounded-2xl border-2 border-yellow-200 shadow-sm shrink-0">
                                <div className="flex flex-col items-center">
                                    <label className="text-xs text-yellow-700">반</label>
                                    <input 
                                        type="text" placeholder="예: 1" 
                                        value={studentInfo.class} onChange={(e) => handleInfoChange('class', e.target.value)}
                                        className={`bg-transparent w-12 text-center text-lg text-teal-700 focus:outline-none placeholder:text-yellow-400 ${isPrinting ? 'border-none' : 'border-b-2 border-yellow-300'}`}
                                    />
                                </div>
                                <div className="flex flex-col items-center">
                                    <label className="text-xs text-yellow-700">번호</label>
                                    <input 
                                        type="text" placeholder="번호" 
                                        value={studentInfo.number} onChange={(e) => handleInfoChange('number', e.target.value)}
                                        className={`bg-transparent w-10 text-center text-lg text-teal-700 focus:outline-none placeholder:text-yellow-400 ${isPrinting ? 'border-none' : 'border-b-2 border-yellow-300'}`}
                                    />
                                </div>
                                <div className="flex flex-col items-center">
                                    <label className="text-xs text-yellow-700">이름</label>
                                    <input 
                                        type="text" placeholder="내 이름" 
                                        value={studentInfo.name} onChange={(e) => handleInfoChange('name', e.target.value)}
                                        className={`bg-transparent w-20 text-center text-lg text-teal-700 focus:outline-none placeholder:text-yellow-400 ${isPrinting ? 'border-none' : 'border-b-2 border-yellow-300'}`}
                                    />
                                </div>
                            </div>
                        </div>

                        {/* 메인 콘텐츠 영역 (그리드 레이아웃) */}
                        <div className="flex-1 flex flex-col gap-4 relative z-10">
                            
                            {/* SCAMPER 7가지 질문 (2단 그리드) */}
                            <div className="bg-teal-50 border-2 border-teal-200 rounded-3xl p-4">
                                <h3 className="text-xl text-teal-700 mb-3 ml-2 flex items-center gap-2">
                                    🎯 SCAMPER 기법으로 책가방 변신시키기
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    {QUESTIONS.filter(q => q.type === 'scamper').map(q => renderCard(q))}
                                    {/* 빈 칸 채우기를 위한 귀여운 더미 카드 (선택사항) */}
                                    <div className="bg-teal-100/50 rounded-2xl border-2 border-teal-200 border-dashed flex items-center justify-center p-3">
                                        <span className="text-teal-400/60 text-lg text-center">우와! 엄청난 아이디어들이 모이고 있어요!<br/>🚀✨</span>
                                    </div>
                                </div>
                            </div>

                            {/* 추가 응용 질문 및 서술형 (2단 그리드, 서술형은 전체 너비) */}
                            <div className="bg-orange-50 border-2 border-orange-200 rounded-3xl p-4 mt-2">
                                <h3 className="text-xl text-orange-600 mb-3 ml-2 flex items-center gap-2">
                                    🚀 창의력 쑥쑥! 레벨 업 미션
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    {QUESTIONS.filter(q => q.type === 'extra').map(q => renderCard(q))}
                                    {QUESTIONS.filter(q => q.type === 'essay').map(q => renderCard(q, true))}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
