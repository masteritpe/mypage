<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyword Note</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://webfontworld.github.io/kopub/KoPubWorldDotum.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    /* ================================================
      ✨ Premium Design System Variables 
      ================================================
    */
    :root {
      --bg-body: #F9FAFB; 
      --bg-surface: #FFFFFF;
      --bg-sidebar: #F3F4F6;
      
      --border-light: #F3F4F6;
      --border-base: #E5E7EB;
      --border-dark: #D1D5DB;
      
      --text-main: #111827; 
      --text-muted: #6B7280; 
      --text-placeholder: #9CA3AF;
      
      --primary: #1F2937;
      --primary-hover: #374151;
      --accent: #4F46E5;
      --accent-hover: #4338CA;
      --accent-light: #EEF2FF;
      
      --danger-bg: #FEF2F2;
      --danger-border: #FECACA;
      --danger-text: #EF4444;
      
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-pill: 9999px;
      
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.02);
      --shadow-md: 0 4px 12px -2px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 12px 30px -4px rgba(0, 0, 0, 0.08);
      
      --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }
    
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--bg-body); 
      color: var(--text-main); 
      margin: 0; padding: 0;
      height: 100vh; display: flex; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: var(--radius-pill); }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ================= Sidebar ================= */
    .sidebar { width: 320px; background: var(--bg-sidebar); border-right: 1px solid var(--border-base); display: flex; flex-direction: column; z-index: 10; }
    .sidebar-header { height: 76px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
    .app-title { font-size: 18px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; letter-spacing: -0.02em; }
    .sidebar-search { padding: 8px 24px 20px; }
    .search-box { width: 100%; padding: 12px 16px; border-radius: var(--radius-md); border: 1px solid transparent; font-size: 14px; font-weight: 500; background: var(--bg-surface); color: var(--text-main); box-shadow: var(--shadow-sm); outline: none; transition: var(--transition-smooth); }
    .search-box::placeholder { color: var(--text-placeholder); font-weight: 400; }
    .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
    
    .note-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; margin: 0; list-style: none; }
    .note-item { padding: 16px; border-radius: var(--radius-md); cursor: pointer; margin-bottom: 8px; transition: var(--transition-smooth); background: transparent; border: 1px solid transparent; display: flex; flex-direction: column; gap: 6px; }
    .note-item:hover { background: var(--bg-surface); box-shadow: var(--shadow-sm); }
    .note-item.active { background: var(--bg-surface); border-color: var(--border-base); box-shadow: var(--shadow-md); }
    .note-title { font-weight: 700; font-size: 15px; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .note-date { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    /* ================= Main Content & Top Bar ================= */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; scroll-behavior: smooth; }
    
    .top-bar { 
      position: sticky; top: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); 
      height: 76px; min-height: 76px; padding: 0 48px; border-bottom: 1px solid rgba(229, 231, 235, 0.5); 
      display: flex; align-items: center; z-index: 5; transition: var(--transition-smooth); 
    }
    .title-input { flex: 1; font-size: 24px; font-weight: 800; border: none; background: transparent; outline: none; color: var(--primary); letter-spacing: -0.02em; transition: var(--transition-smooth); }
    .title-input::placeholder { color: var(--border-dark); font-weight: 700; }
    
    .actions { display: flex; gap: 12px; align-items: center; margin-left: auto; height: 40px; } 
    .divider { width: 1px; height: 24px; background: var(--border-base); margin: 0 4px; }
    
    /* ================= Buttons ================= */
    .btn { 
      display: inline-flex; align-items: center; justify-content: center; gap: 8px; 
      height: 40px; padding: 0 20px; border-radius: var(--radius-pill); 
      font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid transparent; 
      transition: var(--transition-smooth); outline: none; letter-spacing: -0.01em; 
      white-space: nowrap; flex-shrink: 0; box-sizing: border-box;
    }
    .btn-icon-only { padding: 0; width: 40px; border-radius: var(--radius-md); }
    
    .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-outline { background: var(--bg-surface); border-color: var(--border-base); color: var(--text-main); }
    .btn-outline:hover { background: var(--bg-body); border-color: var(--border-dark); }
    .btn-accent { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25); }
    .btn-accent:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(79, 70, 229, 0.3); }
    .btn-danger { background: var(--danger-bg); color: var(--danger-text); }
    .btn-danger:hover { background: #FEE2E2; }

    /* ================= Form & Card Layout ================= */
    .form-wrapper { padding: 48px; max-width: 1080px; margin: 0 auto; width: 100%; transition: var(--transition-smooth); }
    .keynote-card { background: var(--bg-surface); border: 1px solid transparent; border-radius: var(--radius-lg); padding: 40px; margin-bottom: 32px; box-shadow: var(--shadow-md); position: relative; transition: var(--transition-smooth); }
    .keynote-card:hover { border-color: var(--border-base); box-shadow: var(--shadow-lg); }
    
    .card-num { position: absolute; left: -16px; top: 32px; background: var(--accent-light); color: var(--accent); min-width: 36px; height: 36px; padding: 0 12px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-pill); font-weight: 800; font-size: 14px; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.1); border: 2px solid white; transition: var(--transition-smooth); }

    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
    .form-group label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 6px; }
    .form-group label i { font-size: 16px; color: var(--border-dark); }
    
    .grid-layout { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 32px; transition: var(--transition-smooth); }
    .col-topic { grid-column: span 2; }
    .col-mnemonic { grid-column: span 1; }
    .col-keywords { grid-column: span 3; margin-bottom: 0; }

    /* ★ 회독수 표시 (Card Footer) */
    .card-footer {
      display: flex; justify-content: flex-end; align-items: center;
      margin-top: 10px; padding-top: 20px; border-top: 1px dashed var(--border-base);
      transition: var(--transition-smooth);
    }
    .read-count-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: var(--radius-pill);
      background: var(--bg-body); color: var(--accent);
      font-size: 13px; font-weight: 800; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    /* ================= Quill Editor Customization ================= */
    .ql-container.ql-snow { border: 1px solid var(--border-base) !important; border-radius: var(--radius-md) !important; background: var(--bg-body); transition: var(--transition-smooth); font-family: inherit; }
    .ql-container.ql-snow:hover { border-color: var(--border-dark) !important; }
    .ql-container.ql-snow:focus-within { border-color: var(--accent) !important; background: var(--bg-surface); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
    
    .topic-editor .ql-editor { min-height: 64px; font-size: 18px !important; font-weight: 700; padding: 18px; color: var(--primary); transition: var(--transition-smooth); }
    
    .mnemonic-editor .ql-editor { 
      font-family: 'KoPubWorldDotum', 'KoPub World Dotum', Dotum, sans-serif !important;
      min-height: 64px; font-size: 24px !important; font-weight: 900; 
      text-align: center; color: var(--accent); padding: 18px; 
      display: flex; flex-direction: column; align-items: center; justify-content: center; letter-spacing: 0.05em; 
      transition: var(--transition-smooth);
    }
    
    .keyword-editor .ql-editor { min-height: 100px; font-size: 16px !important; line-height: 1.7; padding: 20px; color: var(--text-main); font-weight: 500; transition: var(--transition-smooth); }
    .ql-editor.ql-blank::before { color: var(--text-placeholder); font-style: normal; font-weight: 400; }

    /* ================= Toast Notification ================= */
    .toast-msg { position: fixed; bottom: 40px; left: 50%; transform: translate(-50%, 20px); background: rgba(17, 24, 39, 0.85); backdrop-filter: blur(12px); color: white; padding: 14px 28px; border-radius: var(--radius-pill); font-size: 15px; font-weight: 600; z-index: 9999; opacity: 0; transition: var(--transition-smooth); pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 10px; }
    .toast-msg.show { opacity: 1; transform: translate(-50%, 0); }
    .toast-msg i { color: #818CF8; font-size: 20px; }

    /* ================= ★ Learning Mode (Focus View) ★ ================= */
    body.learning-mode .sidebar, body.learning-mode .ql-toolbar, body.learning-mode #addBtnBox { display: none !important; }
    body.learning-mode .main-content { background: var(--bg-sidebar); }
    
    body.learning-mode .top-bar { display: none !important; }
    body.learning-mode .hide-in-learning { display: none !important; }
    body.learning-mode .title-input { display: none !important; }
    body.learning-mode .form-group label { display: none !important; }
    
    body.learning-mode .ql-container.ql-snow { border: none !important; background: transparent !important; }
    
    body.learning-mode .keynote-card { 
      display: none; background: var(--bg-surface); border: 1px solid var(--border-base); border-radius: 24px; 
      box-shadow: 0 12px 36px -8px rgba(0,0,0,0.08); 
      padding: 60px 50px 70px 50px; 
      margin: 40px auto; max-width: 860px; min-height: 500px; 
    }
    
    body.learning-mode .keynote-card.learning-active { display: block; animation: smoothSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes smoothSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    body.learning-mode .card-num { 
      position: absolute; top: auto; left: auto; right: 40px; bottom: 30px; transform: none;
      background: transparent; color: var(--border-dark); border: none; box-shadow: none; 
      padding: 0; margin: 0; font-size: 15px; font-weight: 700; letter-spacing: 0; opacity: 0.7;
    }

    body.learning-mode .card-footer {
      position: absolute; top: auto; right: auto; left: 40px; bottom: 30px; transform: none;
      border: none; margin: 0; padding: 0; justify-content: flex-start;
    }
    body.learning-mode .read-count-badge {
      background: transparent; box-shadow: none; color: var(--accent);
      font-size: 15px; font-weight: 700; padding: 0;
    }

    body.learning-mode .grid-layout { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 0; }
    body.learning-mode .col-topic { flex: 1 1 auto; max-width: 40%; margin-bottom: 0; }
    body.learning-mode .col-mnemonic { flex: 1 1 auto; max-width: 60%; margin-bottom: 0; }
    body.learning-mode .col-keywords { flex: 0 0 100%; border-top: 1px dashed var(--border-dark); margin-top: 20px; padding-top: 40px; }

    body.learning-mode .topic-editor .ql-editor { font-size: 26px !important; font-weight: 800; color: var(--text-main); }
    
    /* ★ 수정된 부분: align-items와 text-align을 center로 변경 */
    body.learning-mode .mnemonic-editor .ql-editor { font-size: 32px !important; white-space: pre-wrap !important; align-items: center; text-align: center; }
    
    body.learning-mode .keyword-editor .ql-editor { font-size: 18px !important; line-height: 1.8; color: var(--text-main); }

    /* ================= Import Wizard Modal ================= */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17, 24, 39, 0.4); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 100; }
    
    /* ★ 전체 스크롤 적용 */
    .modal-content { background: var(--bg-surface); width: 680px; padding: 40px; border-radius: 24px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; max-height: 90vh; border: 1px solid rgba(255,255,255,0.2); overflow-y: auto; }
    
    /* ★ 위아래로 찌그러짐 방지 (flex-shrink: 0) */
    .db-wizard-step { margin-bottom: 24px; background: var(--bg-body); padding: 24px; border-radius: var(--radius-md); border: 1px solid var(--border-base); transition: var(--transition-smooth); flex-shrink: 0; }
    
    .db-wizard-step.disabled { opacity: 0.5; pointer-events: none; background: transparent; border-color: transparent; }
    .step-header { display: flex; align-items: center; font-size: 15px; font-weight: 800; color: var(--primary); margin-bottom: 16px; gap: 10px; }
    .step-header .badge { background: var(--accent); color: white; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-pill); font-size: 12px; }
    .input-row { display: flex; gap: 12px; }
    .db-input { flex: 1; padding: 12px 16px; border: 1px solid var(--border-dark); border-radius: var(--radius-md); font-size: 14px; font-weight: 500; outline: none; background: var(--bg-surface); transition: var(--transition-smooth); }
    .db-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
    .mapping-grid { display: flex; flex-direction: column; gap: 16px; background: var(--bg-surface); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border-base); }
    .map-row { display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 600; }
    .map-row select { width: 55%; padding: 10px 14px; border: 1px solid var(--border-base); border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; outline: none; transition: 0.2s; }
    .map-row select:focus { border-color: var(--accent); }
    
    /* ★ 여백(margin: 0) 제거 및 자체 스크롤 제거, 찌그러짐 방지 (flex-shrink: 0) */
    .db-list { border: 1px solid var(--border-base); border-radius: var(--radius-md); list-style: none; padding: 0; margin: 0; background: var(--bg-surface); display: none; flex-shrink: 0; }
    
    .db-item { padding: 20px; border-bottom: 1px solid var(--border-light); transition: var(--transition-smooth); display: flex; justify-content: space-between; align-items: center; }
    .db-item:last-child { border-bottom: none; }
    .db-item:hover { background: var(--bg-body); }
    .db-item-name { font-weight: 700; font-size: 15px; display: flex; flex-direction: column; gap: 6px;}
    .db-item-desc { font-size: 13px; color: var(--text-muted); font-weight: 400; line-height: 1.5; }
    .db-item-badge { background: var(--accent-light); color: var(--accent); padding: 4px 12px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 700; margin-left: 8px; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="app-title"><i class="ph-fill ph-brain" style="color: var(--accent); font-size: 24px;"></i> Keyword Note</div>
      <button class="btn btn-outline btn-icon-only" onclick="openImportWizard()" title="외부 DB 가져오기" style="border:none; box-shadow:none; background:transparent;">
        <i class="ph-bold ph-database" style="font-size: 20px; color: var(--text-muted);"></i>
      </button>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" class="search-box" placeholder="Search notes..." onkeyup="renderNoteList()">
    </div>
    <ul class="note-list" id="noteList"></ul>
    
    <div style="padding: 24px; border-top: 1px solid var(--border-base);">
      <button class="btn btn-primary" style="width: 100%; padding: 12px; margin-bottom: 12px;" onclick="createNewNote()">
        <i class="ph-bold ph-plus"></i> New Note
      </button>
      <div style="display: flex; gap: 8px;">
        <button class="btn btn-outline" style="flex:1; padding: 8px 0; font-size: 12px;" onclick="exportJSON()" title="전체 JSON 백업">
          <i class="ph-bold ph-download-simple"></i> 백업
        </button>
        <button class="btn btn-outline" style="flex:1; padding: 8px 0; font-size: 12px;" onclick="triggerImportJSON()" title="JSON 복구 (업데이트/추가)">
          <i class="ph-bold ph-upload-simple"></i> 복구
        </button>
        <button class="btn btn-outline" style="flex:1; padding: 8px 0; font-size: 12px;" onclick="exportExcel()" title="전체 데이터 엑셀 내보내기">
          <i class="ph-bold ph-file-xls"></i> 엑셀
        </button>
        <input type="file" id="jsonFileInput" accept=".json" style="display:none;" onchange="handleImportJSON(event)">
      </div>
    </div>
  </aside>

  <main class="main-content" id="mainContent">
    <div class="top-bar">
      <input type="text" id="docTitle" class="title-input" placeholder="Untitled Note" spellcheck="false">
      <div class="actions">
        <button class="btn btn-outline hide-in-learning" onclick="resetAllReadCounts()" title="모든 회독수 0으로 초기화"><i class="ph-bold ph-arrows-counter-clockwise"></i> Reset</button>
        <button class="btn btn-outline hide-in-learning" onclick="clearAllFormats()" title="모든 서식 지우기"><i class="ph-bold ph-eraser"></i> Clear</button>
        <div class="divider hide-in-learning"></div>
        
        <button id="modeBtn" class="btn btn-outline" onclick="toggleLearningMode()"><i class="ph-bold ph-book-open"></i> Focus Mode</button>
        
        <div class="divider hide-in-learning"></div>
        <button class="btn btn-primary hide-in-learning" onclick="saveCurrentNote()"><i class="ph-bold ph-floppy-disk"></i> Save</button>
        <button class="btn btn-outline btn-icon-only hide-in-learning" onclick="deleteCurrentNote()" title="현재 노트 삭제" style="border:none; color: var(--text-muted);"><i class="ph-bold ph-trash" style="font-size: 18px;"></i></button>
      </div>
    </div>

    <div class="form-wrapper">
      <div id="formContainer"></div>
      <div id="addBtnBox" style="text-align: center; margin-top: 10px; padding-bottom: 60px;">
        <button class="btn btn-outline" style="border-radius: var(--radius-pill); padding: 12px 28px; box-shadow: var(--shadow-sm); color: var(--text-muted); height: auto;" onclick="addSingleCard()"><i class="ph-bold ph-plus-circle"></i> Add Card</button>
      </div>
    </div>

    <div id="importWizardModal" class="modal-overlay" onclick="closeImportWizard(event)">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
          <h2 style="margin: 0; font-size: 22px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 10px; letter-spacing: -0.02em;">
            <i class="ph-fill ph-database" style="color: var(--accent);"></i> Import Data Wizard
          </h2>
          <button class="btn btn-icon-only" style="background: transparent; border: none; padding: 8px; color: var(--text-muted);" onclick="closeImportWizard()"><i class="ph-bold ph-x" style="font-size: 22px;"></i></button>
        </div>
        <div class="db-wizard-step" id="step1">
          <div class="step-header"><span class="badge">1</span> Connect Database</div>
          <div class="input-row">
            <input list="dbOptionsList" id="targetDB" class="db-input" placeholder="e.g. 5RChecklistDB">
            <datalist id="dbOptionsList"></datalist>
            <button class="btn btn-primary" onclick="connectDB()" style="min-width: 120px;">Connect</button>
          </div>
        </div>
        <div class="db-wizard-step disabled" id="step2">
          <div class="step-header"><span class="badge">2</span> Select Store & Analyze</div>
          <div class="input-row">
            <select id="targetStore" class="db-input"><option value="">Please connect DB first</option></select>
            <button id="btnAnalyze" class="btn btn-primary" onclick="analyzeStoreStructure()" style="min-width: 120px;">Analyze</button>
          </div>
        </div>
        <div class="db-wizard-step disabled" id="step3">
          <div class="step-header" style="justify-content: space-between;"><div style="display: flex; align-items: center; gap: 10px;"><span class="badge">3</span> Map Columns & Import</div></div>
          <div class="mapping-grid">
            <div class="map-row"><span style="color: var(--primary);"><i class="ph-bold ph-target" style="margin-right:6px; color:var(--text-muted);"></i> Topic</span><select id="mapTopic"><option value="">Select field...</option></select></div>
            <div class="map-row"><span style="color: var(--primary);"><i class="ph-bold ph-tag" style="margin-right:6px; color:var(--text-muted);"></i> Keyword</span><select id="mapKeyword"><option value="">Select field...</option></select></div>
            <div class="map-row"><span style="color: var(--primary);"><i class="ph-bold ph-lightning" style="margin-right:6px; color:var(--accent);"></i> Mnemonic</span><select id="mapMnemonic"><option value="">Select field...</option></select></div>
          </div>
        </div>
        <ul id="wizardNoteList" class="db-list"></ul>
      </div>
    </div>
  </main>

  <script>
    const Size = Quill.import('attributors/style/size');
    Size.whitelist = null;
    Quill.register(Size, true);

    let db; 
    let currentNoteId = null;
    let cardCount = 0;
    
    let topicEditors = [];
    let keywordEditors = [];
    let mnemonicEditors = [];
    
    let learningCardIndex = 0; 
    let viewedInSession = new Set(); 

    function showToast(message, icon = 'ph-check-circle') {
      const existingToast = document.querySelector('.toast-msg');
      if (existingToast) existingToast.remove();
      const toast = document.createElement('div');
      toast.className = 'toast-msg';
      toast.innerHTML = `<i class="ph-fill ${icon}"></i> ${message}`;
      document.body.appendChild(toast);
      void toast.offsetWidth;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 1500); 
    }

    function handleSizeChange(quill, range, delta) {
      let currentSizeStr = quill.getFormat(range).size;
      let currentSize = 16; 
      if(currentSizeStr) {
        currentSize = parseInt(currentSizeStr);
      } else {
        let computed = window.getComputedStyle(quill.root);
        currentSize = parseInt(computed.fontSize);
      }
      quill.format('size', (currentSize + delta) + 'px');
      return false; 
    }

    function clearSingleFormat(quill, range) {
      if (range.length > 0) {
        quill.removeFormat(range.index, range.length); 
      } else {
        const formats = quill.getFormat(range);
        for (let f in formats) quill.format(f, false);
      }
      showToast('서식이 초기화되었습니다.', 'ph-eraser');
      return false;
    }

    const editorShortcuts = {
      strikethrough: { key: '0', shortKey: true, handler: function(range, context) { this.quill.format('strike', !context.format.strike); return false; } },
      colorRed: { key: 'R', shortKey: true, altKey: true, handler: function() { this.quill.format('color', '#EF4444'); return false; } },
      colorBlue: { key: 'B', shortKey: true, altKey: true, handler: function() { this.quill.format('color', '#3B82F6'); return false; } },
      colorGreen: { key: 'G', shortKey: true, altKey: true, handler: function() { this.quill.format('color', '#10B981'); return false; } },
      clearFormat: { key: 'X', shortKey: true, shiftKey: true, handler: function(range) { return clearSingleFormat(this.quill, range); } },
      hl1: { key: '1', shortKey: true, handler: function() { this.quill.format('background', '#fed7aa'); return false; } }, 
      hl2: { key: '2', shortKey: true, handler: function() { this.quill.format('background', '#bfdbfe'); return false; } }, 
      hl3: { key: '3', shortKey: true, handler: function() { this.quill.format('background', '#fef08a'); return false; } }, 
      hl4: { key: '4', shortKey: true, handler: function() { this.quill.format('background', '#bbf7d0'); return false; } }, 
      hl5: { key: '5', shortKey: true, handler: function() { this.quill.format('background', '#fbcfe8'); return false; } }, 
      hl6: { key: '6', shortKey: true, handler: function() { this.quill.format('background', '#e7cba9'); return false; } }, 
      hl7: { key: '7', shortKey: true, handler: function() { this.quill.format('background', '#e5e7eb'); return false; } }, 
      empMnemonic: { key: 'M', shortKey: true, altKey: true, handler: function(range) { 
        if(range.length > 0) {
          this.quill.formatText(range.index, range.length, { 'background': '#0d3a9e', 'color': '#ffffff', 'bold': true });
        } else {
          this.quill.format('background', '#0d3a9e');
          this.quill.format('color', '#ffffff');
          this.quill.format('bold', true);
        }
        return false; 
      }},
      sizeUp1: { key: '=', shortKey: true, handler: function(range) { return handleSizeChange(this.quill, range, 1); } },
      sizeUp2: { key: '+', shortKey: true, shiftKey: true, handler: function(range) { return handleSizeChange(this.quill, range, 1); } },
      sizeDown: { key: '-', shortKey: true, handler: function(range) { return handleSizeChange(this.quill, range, -1); } }
    };

    document.addEventListener('keydown', (e) => {
      const isInput = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable;
      if (e.ctrlKey && e.key.toLowerCase() === 's') { e.preventDefault(); saveCurrentNote(); return; }
      if (e.ctrlKey && e.altKey && e.key.toLowerCase() === 'n') { e.preventDefault(); createNewNote(); return; }
      
      /* ★ 포커스 모드 단축키 (Ctrl + H) */
      if (e.ctrlKey && e.key.toLowerCase() === 'h') { 
        e.preventDefault(); 
        toggleLearningMode(); 
        return; 
      }

      if (document.body.classList.contains('learning-mode')) {
         if (e.key === 'ArrowLeft') { e.preventDefault(); prevCard(); return; }
         if (e.key === 'ArrowRight') { e.preventDefault(); nextCard(); return; }
      }
      if (!isInput) {
         const mainContent = document.getElementById('mainContent');
         if (e.key === 'ArrowUp') { e.preventDefault(); mainContent.scrollBy({ top: -200, behavior: 'smooth' }); }
         else if (e.key === 'ArrowDown') { e.preventDefault(); mainContent.scrollBy({ top: 200, behavior: 'smooth' }); }
      }
    });

    const Delta = Quill.import('delta');
    const mathMatcher = function(node, delta) {
      if (node.nodeType === Node.TEXT_NODE) {
        const text = node.data;
        const regex = /\$([^$]+)\$/g;
        let match; let lastIndex = 0; const newDelta = new Delta(); let hasMath = false;
        while ((match = regex.exec(text)) !== null) {
          hasMath = true;
          if (match.index > lastIndex) newDelta.insert(text.substring(lastIndex, match.index));
          newDelta.insert({ formula: match[1] }); 
          lastIndex = regex.lastIndex;
        }
        if (hasMath) {
          if (lastIndex < text.length) newDelta.insert(text.substring(lastIndex));
          return newDelta;
        }
      } return delta;
    };

    const initDB = () => {
      return new Promise((resolve) => {
        const request = indexedDB.open('KeywordDB', 1);
        request.onupgradeneeded = (e) => {
          const database = e.target.result;
          if (!database.objectStoreNames.contains('notes')) database.createObjectStore('notes', { keyPath: 'id' });
        };
        request.onsuccess = (e) => { db = e.target.result; resolve(); };
      });
    };

    window.onload = async () => { await initDB(); renderNoteList(); createNewNote(); };

    function addSingleCard(data = null) {
      cardCount++;
      const i = cardCount;
      const container = document.getElementById('formContainer');
      const currentReadCount = data?.readCount || 0;
      
      const card = document.createElement('div');
      card.className = 'keynote-card';
      card.innerHTML = `
        <div class="card-num">${i}</div>
        <div class="grid-layout">
          <div class="form-group col-topic">
            <label><i class="ph-bold ph-target"></i> Topic</label>
            <div id="topic-${i}" class="topic-editor"></div>
          </div>
          <div class="form-group col-mnemonic">
            <label><i class="ph-bold ph-lightning"></i> Mnemonic</label>
            <div id="mnemonic-${i}" class="mnemonic-editor"></div>
          </div>
          <div class="form-group col-keywords">
            <label><i class="ph-bold ph-tag"></i> Keywords</label>
            <div id="keyword-${i}" class="keyword-editor"></div>
          </div>
        </div>
        <div class="card-footer">
          <span class="read-count-badge" data-count="${currentReadCount}">
            <i class="ph-bold ph-book-open"></i> ${currentReadCount}회독
          </span>
        </div>
      `;
      container.appendChild(card);

      const qOptions = { theme: 'snow', modules: { toolbar: false, formula: true, keyboard: { bindings: editorShortcuts } }};
      
      const qTopic = new Quill(`#topic-${i}`, { ...qOptions, placeholder: 'Enter topic...' });
      const qMnemonic = new Quill(`#mnemonic-${i}`, { ...qOptions, placeholder: 'A.B.C' });
      const qKeyword = new Quill(`#keyword-${i}`, { ...qOptions, placeholder: 'Elaborate on keywords...' });

      [qTopic, qMnemonic, qKeyword].forEach(q => {
        q.root.setAttribute('spellcheck', false);
        q.clipboard.addMatcher(Node.TEXT_NODE, mathMatcher);
      });

      if (data) {
        qTopic.clipboard.dangerouslyPasteHTML(data.topic || '');
        qMnemonic.clipboard.dangerouslyPasteHTML(data.mnemonic || '');
        qKeyword.clipboard.dangerouslyPasteHTML(data.keyword || '');
      }

      topicEditors.push(qTopic);
      mnemonicEditors.push(qMnemonic);
      keywordEditors.push(qKeyword);
    }

    function createNewNote() {
      currentNoteId = null;
      document.getElementById('docTitle').value = '';
      document.getElementById('formContainer').innerHTML = '';
      cardCount = 0;
      topicEditors = []; mnemonicEditors = []; keywordEditors = [];
      for(let i=0; i<3; i++) addSingleCard();
      document.getElementById('mainContent').scrollTo({ top: 0 });
      showToast('새 노트를 생성했습니다.', 'ph-file-plus');
    }

    function saveCurrentNote(silent = false) {
      const title = document.getElementById('docTitle').value.trim() || 'Untitled Note';
      const items = topicEditors.map((_, idx) => {
        const cardEl = document.querySelectorAll('.keynote-card')[idx];
        const badge = cardEl ? cardEl.querySelector('.read-count-badge') : null;
        return {
          topic: topicEditors[idx].root.innerHTML,
          mnemonic: mnemonicEditors[idx].root.innerHTML,
          keyword: keywordEditors[idx].root.innerHTML,
          readCount: badge ? parseInt(badge.dataset.count) || 0 : 0
        };
      });

      const note = { id: currentNoteId || 'kw_' + Date.now(), title: title, date: new Date().toISOString(), items: items };
      const tx = db.transaction(['notes'], 'readwrite');
      tx.objectStore('notes').put(note);
      tx.oncomplete = () => { 
        currentNoteId = note.id; 
        renderNoteList(); 
        if(!silent) showToast('성공적으로 저장되었습니다.', 'ph-floppy-disk');
      };
    }

    function renderNoteList() {
      const tx = db.transaction(['notes'], 'readonly');
      tx.objectStore('notes').getAll().onsuccess = (e) => {
        const list = document.getElementById('noteList'); list.innerHTML = '';
        const searchVal = document.getElementById('searchInput').value.toLowerCase();
        
        e.target.result.reverse().filter(n => n.title.toLowerCase().includes(searchVal)).forEach(note => {
          const li = document.createElement('li');
          li.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
          li.innerHTML = `<span class="note-title">${note.title}</span><span class="note-date">${new Date(note.date).toLocaleDateString()} · ${note.items.length} items</span>`;
          li.onclick = () => loadNote(note);
          list.appendChild(li);
        });
      };
    }

    function loadNote(note) {
      currentNoteId = note.id;
      document.getElementById('docTitle').value = note.title;
      document.getElementById('formContainer').innerHTML = '';
      cardCount = 0; topicEditors = []; mnemonicEditors = []; keywordEditors = [];
      note.items.forEach(item => addSingleCard(item));
      renderNoteList();
      document.getElementById('mainContent').scrollTo({ top: 0 });
    }

    function deleteCurrentNote() {
      if(!currentNoteId) return;
      if(confirm('이 노트를 삭제하시겠습니까?')) {
        const tx = db.transaction(['notes'], 'readwrite');
        tx.objectStore('notes').delete(currentNoteId);
        tx.oncomplete = () => {
          createNewNote();
          showToast('노트가 삭제되었습니다.', 'ph-trash');
        };
      }
    }

    function toggleLearningMode() {
      const isLearning = document.body.classList.toggle('learning-mode');
      const btn = document.getElementById('modeBtn');
      
      if(isLearning) {
        btn.innerHTML = '<i class="ph-bold ph-pencil-simple"></i> Edit Mode';
        btn.classList.add('btn-outline'); 
        btn.classList.remove('btn-accent', 'btn-primary');
        
        topicEditors.concat(mnemonicEditors, keywordEditors).forEach(q => q.disable());
        
        learningCardIndex = 0;
        viewedInSession.clear(); 
        
        updateLearningCards();
        showToast('포커스 모드: 화살표 이동, Ctrl+H 종료', 'ph-book-open'); // 단축키 안내 텍스트 수정
      } else {
        btn.innerHTML = '<i class="ph-bold ph-book-open"></i> Focus Mode';
        btn.classList.add('btn-outline');
        btn.classList.remove('btn-accent', 'btn-primary');
        
        topicEditors.concat(mnemonicEditors, keywordEditors).forEach(q => q.enable());
        
        const cards = document.querySelectorAll('.keynote-card');
        cards.forEach((card, idx) => {
          card.classList.remove('learning-active');
          const numBadge = card.querySelector('.card-num');
          if(numBadge) numBadge.textContent = idx + 1;
        });
        showToast('편집 모드로 전환되었습니다.', 'ph-pencil-simple');
      }
    }

    function updateLearningCards() {
      if (!document.body.classList.contains('learning-mode')) return;
      const cards = document.querySelectorAll('.keynote-card');
      if(cards.length === 0) return;
      
      cards.forEach((card, idx) => {
        if(idx === learningCardIndex) {
          card.classList.add('learning-active');
          const numBadge = card.querySelector('.card-num');
          if(numBadge) numBadge.textContent = `${idx + 1} of ${cards.length}`; 
          
          if (!viewedInSession.has(idx)) {
            viewedInSession.add(idx);
            const readBadge = card.querySelector('.read-count-badge');
            if (readBadge) {
              let currentCount = parseInt(readBadge.dataset.count) || 0;
              currentCount++;
              readBadge.dataset.count = currentCount;
              readBadge.innerHTML = `<i class="ph-bold ph-book-open"></i> ${currentCount}회독`;
              saveCurrentNote(true); 
            }
          }
        } else {
          card.classList.remove('learning-active');
        }
      });
      document.getElementById('mainContent').scrollTo({ top: 0 });
    }

    function prevCard() {
      if(learningCardIndex > 0) { learningCardIndex--; updateLearningCards(); } 
      else { showToast('첫 번째 카드입니다.', 'ph-info'); }
    }

    function nextCard() {
      const cards = document.querySelectorAll('.keynote-card');
      if(learningCardIndex < cards.length - 1) { learningCardIndex++; updateLearningCards(); } 
      else { showToast('마지막 카드입니다.', 'ph-check-circle'); }
    }

    function resetAllReadCounts() {
      if (!confirm('현재 노트의 모든 회독 기록을 0으로 초기화하시겠습니까?')) return;
      const badges = document.querySelectorAll('.read-count-badge');
      badges.forEach(b => {
        b.dataset.count = 0;
        b.innerHTML = '<i class="ph-bold ph-book-open"></i> 0회독';
      });
      saveCurrentNote(true);
      showToast('모든 회독수가 초기화되었습니다.', 'ph-arrows-counter-clockwise');
    }

    function clearAllFormats() {
      if (!confirm('현재 노트의 모든 텍스트 서식(색상, 볼드, 형광펜 등)을 초기화하시겠습니까?\n텍스트 자체는 지워지지 않습니다.')) return;
      
      const allEditors = [...topicEditors, ...mnemonicEditors, ...keywordEditors];
      allEditors.forEach(q => {
        const length = q.getLength();
        if (length > 0) {
          q.removeFormat(0, length);
        }
      });
      saveCurrentNote(true);
      showToast('노트 전체의 텍스트 서식이 초기화되었습니다.', 'ph-eraser');
    }

    /* ================= Wizard ================= */
    let wizardCurrentItems = []; 
    let isNestedStructure = false; 

    async function openImportWizard() {
      document.getElementById('importWizardModal').style.display = 'flex';
      const dataList = document.getElementById('dbOptionsList');
      dataList.innerHTML = '';
      try {
        if (indexedDB.databases) {
          const dbs = await indexedDB.databases();
          dbs.forEach(dbInfo => {
            const opt = document.createElement('option');
            opt.value = dbInfo.name;
            dataList.appendChild(opt);
          });
        }
      } catch (e) { console.warn("DB scan not supported."); }
    }

    function closeImportWizard(e) {
      if (e && e.target !== document.getElementById('importWizardModal')) return;
      document.getElementById('importWizardModal').style.display = 'none';
      document.getElementById('step2').classList.add('disabled');
      document.getElementById('step3').classList.add('disabled');
      document.getElementById('targetStore').innerHTML = '<option value="">Please connect DB first</option>';
      document.getElementById('wizardNoteList').style.display = 'none';
      wizardCurrentItems = [];
    }

    function connectDB() {
      const dbName = document.getElementById('targetDB').value.trim();
      if(!dbName) return showToast('DB 이름을 입력해주세요.', 'ph-warning');

      const request = indexedDB.open(dbName);
      request.onerror = () => showToast('DB 연결 중 오류 발생', 'ph-warning');
      request.onsuccess = (e) => {
        const tempDB = e.target.result;
        const storeSelect = document.getElementById('targetStore');
        
        if(tempDB.objectStoreNames.length === 0) {
            alert(`'${dbName}' DB에 데이터가 존재하지 않습니다.`);
            tempDB.close(); return;
        }

        storeSelect.innerHTML = '';
        Array.from(tempDB.objectStoreNames).forEach(name => {
          storeSelect.innerHTML += `<option value="${name}">${name}</option>`;
        });
        
        document.getElementById('step2').classList.remove('disabled');
        tempDB.close();
      };
    }

    function analyzeStoreStructure() {
      const dbName = document.getElementById('targetDB').value;
      const storeName = document.getElementById('targetStore').value;
      if(!storeName) return;

      const request = indexedDB.open(dbName);
      request.onsuccess = (e) => {
        const tempDB = e.target.result;
        const tx = tempDB.transaction([storeName], 'readonly');
        
        tx.objectStore(storeName).getAll().onsuccess = (ev) => {
          const items = ev.target.result;
          if(items.length === 0) return alert('저장된 데이터가 없습니다.');
          
          wizardCurrentItems = items.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0)); 
          const sample = items[0];
          let availableKeys = [];
          
          if (sample.items && Array.isArray(sample.items) && sample.items.length > 0) {
            isNestedStructure = true;
            availableKeys = Object.keys(sample.items[0]); 
          } else {
            isNestedStructure = false;
            availableKeys = Object.keys(sample);
          }

          populateMappingSelects(availableKeys);
          document.getElementById('step3').classList.remove('disabled');
          renderWizardList();
        };
      };
    }

    function populateMappingSelects(keys) {
      const selects = ['mapTopic', 'mapKeyword', 'mapMnemonic'];
      selects.forEach(id => {
        const el = document.getElementById(id);
        el.innerHTML = '<option value="">(Ignore mapping)</option>';
        keys.forEach(k => { el.innerHTML += `<option value="${k}">${k}</option>`; });
      });

      const autoSelect = (selectId, matchWords) => {
        const found = keys.find(k => matchWords.some(w => k.toLowerCase().includes(w)));
        if(found) document.getElementById(selectId).value = found;
      };

      autoSelect('mapTopic', ['problem', 'topic', 'question', 'title', 'name']);
      autoSelect('mapKeyword', ['lead', 'keyword', 'desc', 'summary']);
      autoSelect('mapMnemonic', ['concept', 'mnemonic', 'short', 'memo']);
    }

    function renderWizardList() {
      const ul = document.getElementById('wizardNoteList');
      ul.innerHTML = ''; ul.style.display = 'block';

      if (wizardCurrentItems.length === 0) return;

      if (isNestedStructure) {
        wizardCurrentItems.forEach((data, index) => {
          const li = document.createElement('li');
          li.className = 'db-item';
          const title = data.title || data.name || `Data Set #${index + 1}`;
          const dateStr = data.date ? new Date(data.date).toLocaleDateString() : '';
          const count = data.items ? data.items.length : 1;
          
          li.innerHTML = `
            <div class="db-item-name">
              <div style="display:flex; align-items:center;">${title} <span class="db-item-badge">${count} items</span></div>
              <div class="db-item-desc">${dateStr}</div>
            </div>
            <button class="btn btn-primary" style="padding: 8px 16px;" onclick="executeImport(${index})">Import</button>
          `;
          ul.appendChild(li);
        });
      } else {
        const li = document.createElement('li');
        li.className = 'db-item';
        li.style.background = 'var(--accent-light)';
        li.style.borderColor = 'rgba(79, 70, 229, 0.2)';
        
        li.innerHTML = `
          <div class="db-item-name">
            <div style="font-size: 16px; color: var(--accent); display:flex; align-items:center;">
              Bulk Import Available <span class="db-item-badge" style="background:var(--accent); color:white;">${wizardCurrentItems.length} items</span>
            </div>
            <div class="db-item-desc" style="margin-top: 6px; color: var(--primary);">Import all flattened records into a single new note.</div>
          </div>
          <button class="btn btn-accent" style="padding: 10px 20px;" onclick="executeImportAll()">Import All Data</button>
        `;
        ul.appendChild(li);
      }
    }

    function executeImport(dataIndex) {
      const sourceData = wizardCurrentItems[dataIndex];
      processImportData(isNestedStructure ? (sourceData.items || []) : [sourceData], sourceData.title || `Imported Data`);
    }

    function executeImportAll() {
      processImportData(wizardCurrentItems, `Bulk Imported Data`);
    }

    function processImportData(dataArray, noteTitle) {
      const mapTopicKey = document.getElementById('mapTopic').value;
      const mapKeywordKey = document.getElementById('mapKeyword').value;
      const mapMnemonicKey = document.getElementById('mapMnemonic').value;

      if(!mapTopicKey && !mapKeywordKey && !mapMnemonicKey) {
        if(!confirm('매핑된 항목이 없습니다. 빈 상태로 가져올까요?')) return;
      }

      if(!confirm(`총 ${dataArray.length}개의 카드를 덮어씌웁니다. 계속할까요?`)) return;

      currentNoteId = null;
      document.getElementById('docTitle').value = `${noteTitle}`;
      document.getElementById('formContainer').innerHTML = '';
      cardCount = 0; topicEditors = []; mnemonicEditors = []; keywordEditors = [];

      dataArray.forEach(item => {
        addSingleCard({
          topic: mapTopicKey ? item[mapTopicKey] : '',
          keyword: mapKeywordKey ? item[mapKeywordKey] : '',
          mnemonic: mapMnemonicKey ? item[mapMnemonicKey] : ''
        });
      });

      closeImportWizard();
      document.getElementById('mainContent').scrollTo({ top: 0 });
      showToast('성공적으로 데이터를 불러왔습니다.', 'ph-download-simple');
    }

    function exportJSON() {
      const tx = db.transaction(['notes'], 'readonly');
      tx.objectStore('notes').getAll().onsuccess = (e) => {
        const data = e.target.result;
        if(data.length === 0) return showToast('백업할 데이터가 없습니다.', 'ph-warning');
        
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `KeywordNote_Backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('JSON 백업이 완료되었습니다.', 'ph-download-simple');
      };
    }

    function triggerImportJSON() {
      document.getElementById('jsonFileInput').click();
    }

    function handleImportJSON(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data)) throw new Error("데이터 형식이 올바르지 않습니다.");

          const tx = db.transaction(['notes'], 'readwrite');
          const store = tx.objectStore('notes');
          
          let count = 0;
          data.forEach(note => {
            store.put(note); 
            count++;
          });

          tx.oncomplete = () => {
            renderNoteList();
            showToast(`${count}개의 노트가 성공적으로 복구/업데이트 되었습니다.`, 'ph-check-circle');
          };
          tx.onerror = () => showToast('복구 중 오류가 발생했습니다.', 'ph-warning');
        } catch (err) {
          showToast('잘못된 JSON 파일입니다.', 'ph-warning');
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    }

    function stripHtml(html) {
      if (!html) return "";
      const tmp = document.createElement("DIV");
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || "";
    }

    function exportExcel() {
      if(typeof XLSX === 'undefined') {
        return showToast('엑셀 라이브러리를 불러오지 못했습니다.', 'ph-warning');
      }

      const tx = db.transaction(['notes'], 'readonly');
      tx.objectStore('notes').getAll().onsuccess = (e) => {
        const notes = e.target.result;
        if(notes.length === 0) return showToast('내보낼 데이터가 없습니다.', 'ph-warning');

        let excelData = [];
        
        notes.forEach(note => {
          if (note.items && note.items.length > 0) {
            note.items.forEach((item, index) => {
              excelData.push({
                "제목": note.title,
                "토픽": stripHtml(item.topic),
                "두음": stripHtml(item.mnemonic),
                "키워드": stripHtml(item.keyword),
              });
            });
          } else {
             excelData.push({
                "Note ID": note.id,
                "Note Title": note.title,
                "Date": new Date(note.date).toLocaleDateString(),
                "Card #": "",
                "Topic": "",
                "Mnemonic": "",
                "Keywords": "",
                "Read Count": ""
              });
          }
        });

        const ws = XLSX.utils.json_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Keyword Notes");
        
        XLSX.writeFile(wb, `KeywordNote_Data_${new Date().toISOString().slice(0,10)}.xlsx`);
        showToast('엑셀 다운로드가 완료되었습니다.', 'ph-file-xls');
      };
    }
  </script>
</body>
