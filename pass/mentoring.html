<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>멘토링 기록</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

    :root{
      --accent:#0b57d0;
      --accent2:#357abd;
      --ink:#1f2937;
      --bg:#f4f6f9;
      --card:#ffffff;
      --line:#e9edf2;
      --line2:#eef2f6;
      --danger:#d32f2f;
      --success:#2e7d32;
      --muted:#6b7280;
      --shadow:0 1px 2px rgba(0,0,0,.05), 0 8px 24px rgba(0,0,0,.06);
      --card-accent:#fffef9;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      font-family:'Noto Sans KR', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin:0;
      background:var(--bg);
      color:var(--ink);
      user-select:none;
      min-width:1100px; /* PC 중심 */
    }

    /* 헤더 */
    header{
      position:sticky; top:0; z-index:10;
      background:var(--card);
      border-bottom:1px solid var(--line);
      backdrop-filter:saturate(180%) blur(6px);
    }
    header .wrap{
      max-width:none; margin:0; padding:12px 16px;
      display:flex; align-items:center; gap:12px;
    }
    header h1{margin:0; font-size:18px; letter-spacing:.2px; white-space:nowrap}
    .spacer{flex:1}
    .pill{background:#eef5fd; color:var(--accent); border:1px solid #d9e7fb; border-radius:999px; padding:4px 10px; font-size:12px}

    /* 버튼 */
    .btn{
      appearance:none;
      background:#fff; color:var(--ink);
      border:1px solid #cbd5e0; border-radius:10px;
      padding:8px 12px; font-weight:700; font-size:.95rem;
      cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,.04);
      transition:background .15s, border-color .15s, box-shadow .15s, transform .05s;
    }
    .btn:hover{background:#f7fafc; border-color:#bfcde0}
    .btn:active{transform:translateY(1px)}
    .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff}
    .btn.primary:hover{background:var(--accent2); border-color:var(--accent2)}
    .btn.danger{background:var(--danger); border-color:var(--danger); color:#fff}
    .btn.ghost{background:#eef5fd; color:var(--accent); border-color:#d6e6ff}
    .toolbar{display:flex; gap:8px; flex-wrap:wrap}

    /* 레이아웃 */
    main{max-width:1180px; margin:18px auto 40px; padding:0 16px}
    .grid{
      display:grid; gap:16px;
      grid-template-columns: 1.2fr 1fr;
      align-items:start;
    }

    /* 카드 */
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:var(--shadow);
      padding:14px;
    }
    .card .title{margin:0 0 10px; font-size:16px}

    /* 입력 폼 */
    .form-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .field{
      display:flex; align-items:center; gap:8px;
      background:#fff; border:1px solid #e6e9ee; border-radius:10px; padding:8px 10px;
    }
    .field label{font-weight:700; color:var(--accent); white-space:nowrap}
    .field input[type="date"],
    .field input[type="text"],
    .field textarea{
      border:none; outline:none; font-size:14px; width:260px;
      font-family:inherit; color:var(--ink);
    }
    .field textarea{min-height:60px; resize:vertical; width:520px}
    .actions{display:flex; gap:8px; flex-wrap:wrap}

    /* 검색 */
    .search-grid{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
    .search-grid .field input{width:180px}
    .search-grid .field input[type="text"]{width:260px}

    /* 카드 리스트 */
    .cards{
      margin-top:12px;
      display:grid; gap:14px;
      grid-template-columns: repeat(3, 1fr);
    }
    .card.note{
      background:var(--card-accent);
      position:relative; min-height:120px;
      word-break:break-word;
    }
    .note .date{font-size:13px; color:#455; margin-bottom:8px; font-weight:700}
    .note .content{font-size:14px; white-space:pre-wrap}
    mark{background:#ffe58f; padding:0 2px; border-radius:2px}

    .note .card-actions{
      position:absolute; top:10px; right:10px; display:flex; gap:6px;
    }
    .icon-btn{
      width:30px; height:30px; border-radius:50%; border:1px solid #e0e6ee;
      background:#fff; color:var(--ink); cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center; font-size:14px;
      box-shadow:0 1px 2px rgba(0,0,0,.04);
    }
    .icon-btn:hover{background:#f7fafc}
    .icon-btn.danger{background:var(--danger); color:#fff; border-color:var(--danger)}

    .note .footer{display:flex; justify-content:flex-end; gap:8px; margin-top:8px}
    .small-btn{padding:6px 10px; border-radius:8px; border:1px solid #dfe4ea; background:#fff; cursor:pointer; font-weight:700}
    .small-btn.save{background:var(--success); color:#fff; border-color:var(--success)}
    .small-btn.cancel{background:#f2f4f7}

    /* 토스트 */
    #toast{
      position:fixed; left:50%; transform:translateX(-50%);
      bottom:18px; background:rgba(17,24,39,.92); color:#fff;
      padding:10px 14px; border-radius:10px; font-size:13px;
      opacity:0; pointer-events:none; transition:opacity .25s, bottom .25s;
      z-index:9999; box-shadow:0 10px 24px rgba(0,0,0,.25);
    }
    #toast.show{opacity:1; bottom:34px; pointer-events:auto}
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>멘토링 기록</h1>
      <div class="spacer"></div>
      <div class="toolbar">
        <button type="button" class="btn" id="btnTopDownload">엑셀 저장</button>
        <label class="btn" for="fileInputTop">엑셀 열기</label>
        <input type="file" id="fileInputTop" accept=".xlsx" style="display:none">
      </div>
    </div>
  </header>

  <main>
    <div class="grid">
      <section class="card">
        <h3 class="title">기록 입력</h3>
        <div class="form-row" style="margin-bottom:8px;">
          <div class="field">
            <label>날짜</label>
            <input type="date" id="dateInput" />
          </div>
          <div class="field" style="flex:1">
            <label>내용</label>
            <textarea id="contentInput" placeholder="멘토링 내용을 입력하세요…" style="width:100%"></textarea>
          </div>
        </div>
        <div class="actions">
          <button type="button" class="btn primary" id="btnSave">저장</button>
          <button type="button" class="btn" id="btnDownload">엑셀 저장</button>
          <label class="btn" for="fileInput">엑셀 열기</label>
          <input type="file" id="fileInput" accept=".xlsx" style="display:none">
        </div>
      </section>

      <aside class="card">
        <h3 class="title">검색</h3>
        <div class="search-grid">
          <div class="field">
            <label>날짜</label>
            <input type="date" id="searchDate" />
          </div>
          <div class="field">
            <label>키워드</label>
            <input type="text" id="searchKeyword" placeholder="내용 키워드" />
          </div>
          <button type="button" class="btn primary" id="btnSearch">조회</button>
          <button type="button" class="btn ghost" id="btnReset">전체보기</button>
        </div>
      </aside>
    </div>

    <section class="card" style="margin-top:16px;">
      <h3 class="title" style="display:flex;align-items:center;gap:10px;">
        기록 목록
        <span id="countBadge" class="pill">0건</span>
      </h3>
      <div id="ideaCards" class="cards"></div>
    </section>
  </main>

  <div id="toast" role="status" aria-live="polite">알림</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
  (async ()=>{ 
    let db;
    let ideas = []; // IndexedDB에서 불러온 전체 데이터를 저장할 배열

    let currentSearch={date:"",keyword:""};
    let toastTimer=null;
    const $=id=>document.getElementById(id);
    const showToast=msg=>{
      const t=$("toast");
      t.textContent=msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer=setTimeout(()=>t.classList.remove("show"),2000);
    };
    const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[m]));
    const escRegex=s=>s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    const highlight=(t,kw)=>{
      if(!kw)return esc(t||"");
      const safe=esc(t||"");
      return safe.replace(new RegExp("(" + escRegex(kw) + ")","ig"),"<mark>$1</mark>");
    };

    // ===== IndexedDB 관리 =====
    function initDB(){
      return new Promise((resolve,reject)=>{
        const req = indexedDB.open('MentoringDB', 1);
        req.onupgradeneeded = (e)=>{
          db = e.target.result;
          // 'mentoring_records' 스토어 생성. 'id'를 고유 키로 사용하고 자동 증가
          if(!db.objectStoreNames.contains('mentoring_records')){
             const store = db.createObjectStore('mentoring_records', { keyPath: 'id', autoIncrement: true });
             store.createIndex('dateIdx', '날짜', { unique: false });
          }
        };
        req.onsuccess = (e)=>{ db = e.target.result; resolve(); };
        req.onerror = (e)=>{ reject('DB 초기화 실패: '+e.target.error); };
      });
    }

    function saveRecord(record){
      return new Promise((resolve, reject)=>{
        // ID가 null이거나 undefined이면 autoIncrement를 위해 ID 필드를 삭제
        if (typeof record.id === 'undefined' || record.id === null) {
            delete record.id;
        }

        const tx = db.transaction('mentoring_records', 'readwrite');
        const store = tx.objectStore('mentoring_records');
        const request = store.put(record); // id가 있으면 수정, 없으면 추가

        request.onsuccess = (e)=>{ resolve(e.target.result); };
        request.onerror = (e)=>{ reject('데이터 저장 실패: '+e.target.error); };
      });
    }

    function deleteRecord(id){
      return new Promise((resolve, reject)=>{
        const tx = db.transaction('mentoring_records', 'readwrite');
        const store = tx.objectStore('mentoring_records');
        const request = store.delete(id);

        request.onsuccess = ()=> resolve();
        request.onerror = (e)=> reject('데이터 삭제 실패: '+e.target.error);
      });
    }

    function getAllRecords(){
      return new Promise((resolve, reject)=>{
        const tx = db.transaction('mentoring_records', 'readonly');
        const store = tx.objectStore('mentoring_records');
        const request = store.getAll();
        
        request.onsuccess = (e)=>{ 
            // ideas 배열을 최신 데이터로 업데이트
            ideas = e.target.result.sort((a, b) => b.날짜.localeCompare(a.날짜)); 
            resolve(ideas); 
        };
        request.onerror = (e)=>{ reject('데이터 로드 실패: '+e.target.error); };
      });
    }

    // ===== UI 렌더링 및 로직 =====

    // 데이터를 받아서 렌더링 (인덱스 대신 ID를 사용)
    function renderCards(filteredIdeas = ideas){
      const c=$("ideaCards"); c.innerHTML="";
      
      filteredIdeas.forEach(item=>{
        const card=document.createElement("div");
        card.className="card note"; 
        card.dataset.id=item.id; // 고유 ID 사용

        const actions=document.createElement("div");
        actions.className="card-actions";
        const eBtn=document.createElement("button");
        eBtn.type="button"; eBtn.className="icon-btn"; eBtn.textContent="✏️";
        eBtn.onclick=()=>editIdea(item.id); // ID 기반 수정
        const dBtn=document.createElement("button");
        dBtn.type="button"; dBtn.className="icon-btn danger"; dBtn.textContent="×";
        dBtn.onclick=()=>deleteIdea(item.id); // ID 기반 삭제
        actions.append(eBtn,dBtn);

        const date=document.createElement("div");
        date.className="date"; date.textContent=item.날짜||"";
        const content=document.createElement("div");
        content.className="content";
        content.innerHTML=highlight(item.내용||"",currentSearch.keyword);

        card.append(actions,date,content);
        c.append(card);
      });
      $("countBadge").textContent=filteredIdeas.length+"건";
    }

    async function addIdea(){
      const date=$("dateInput").value||new Date().toISOString().slice(0,10);
      const content=$("contentInput").value.trim();
      if(!content){ alert("내용을 입력하세요."); return; }
      
      const newRecord = {날짜: date, 내용: content};
      try {
          await saveRecord(newRecord); // 새 ID 자동 생성
          $("contentInput").value="";
          await searchIdeas(); // 전체 데이터 갱신 후 렌더링
          showToast("저장되었습니다 ✅");
      } catch (e) {
          showToast("저장 실패 ❌", true);
          console.error(e);
      }
    }

    async function deleteIdea(id){
      if(!confirm("삭제하시겠습니까?")) return;
      try {
          await deleteRecord(id);
          await searchIdeas(); // 전체 데이터 갱신 후 렌더링
          showToast("삭제되었습니다 🗑️");
      } catch (e) {
          showToast("삭제 실패 ❌", true);
          console.error(e);
      }
    }

    function editIdea(id){
      const card=document.querySelector(`.card.note[data-id='${id}']`);
      if(!card) return;
      const idea=ideas.find(item => item.id === id); // ID로 아이템 찾기
      if(!idea) return;

      card.innerHTML="";
      const date=document.createElement("input");
      date.type="date"; date.value=idea.날짜||new Date().toISOString().slice(0,10);
      date.style.marginBottom="8px"; date.style.padding="6px";
      date.style.borderRadius="8px"; date.style.border="1px solid #ccc";
      const ta=document.createElement("textarea");
      ta.value=idea.내용||""; ta.rows=4;
      ta.style.width="100%"; ta.style.marginBottom="8px";
      ta.style.borderRadius="8px"; ta.style.border="1px solid #ccc"; ta.style.padding="8px";
      const f=document.createElement("div"); f.className="footer";
      const save=document.createElement("button");
      save.type="button"; save.className="small-btn save"; save.textContent="저장";
      save.onclick=async ()=>{
        const newContent=ta.value.trim();
        if(!newContent){ alert("내용을 입력하세요."); return; }
        
        const updatedRecord = {id: id, 날짜: date.value, 내용: newContent};
        try {
            await saveRecord(updatedRecord);
            await searchIdeas(); // 전체 데이터 갱신 후 렌더링
            showToast("수정되었습니다 ✏️");
        } catch (e) {
            showToast("수정 실패 ❌", true);
            console.error(e);
        }
      };
      const cancel=document.createElement("button");
      cancel.type="button"; cancel.className="small-btn cancel"; cancel.textContent="취소";
      cancel.onclick=()=>searchIdeas(); // 취소 시 다시 렌더링
      f.append(cancel,save);
      card.append(date,ta,f);
      ta.focus();
    }

    async function searchIdeas(){
      await getAllRecords(); // 최신 전체 데이터 로드
      const d=$("searchDate").value.trim();
      const k=$("searchKeyword").value.trim();
      currentSearch={date:d,keyword:k};
      
      const filtered = ideas
        .filter(item=>{
          const matchD=!d||item.날짜===d;
          const matchK=!k||String(item.내용||"").includes(k);
          return matchD && matchK;
        });
      renderCards(filtered);
    }

    function resetSearch(){
      $("searchDate").value=""; $("searchKeyword").value="";
      currentSearch={date:"",keyword:""}; 
      renderCards(ideas); // 필터링 없이 전체 데이터 렌더링
    }

    // ===== 엑셀 (ID 기반 안정성 로직 적용) =====

    async function downloadExcel(){
      const allRecords = await getAllRecords(); // DB에서 전체 데이터 로드
      if(!allRecords.length){ showToast("저장할 데이터가 없습니다."); return; }
      
      const rows = allRecords.map(r=>({
          ID: r.id, // ID 포함하여 내보내기
          날짜: r.날짜||"",
          내용: r.내용||""
      })).sort((a,b)=>a.날짜.localeCompare(b.날짜));

      const ws=XLSX.utils.json_to_sheet(rows);
      const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,"기록");
      XLSX.writeFile(wb,"멘토링기록.xlsx");
      showToast("엑셀로 저장했습니다 📂");
    }

    function uploadExcel(e){
      const f=e.target.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload=async ev=>{
        try {
            const wb=XLSX.read(ev.target.result,{type:"binary"});
            const ws=wb.Sheets[wb.SheetNames[0]];
            const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
            
            let n=0;
            for(const r of rows){
                const date = r["날짜"]||r["date"]||r["Date"]||new Date().toISOString().slice(0,10);
                const content = r["내용"]||r["content"]||r["Content"]||"";
                const id = r["ID"] ? Number(r["ID"]) : undefined; // ID가 있으면 숫자형으로 가져오기

                if(!content) continue;

                const recordToSave = {
                    날짜: date,
                    내용: content
                };
                
                // ID가 있다면 기존 레코드 업데이트 (안정성 확보)
                if(id !== undefined && !isNaN(id)){
                    recordToSave.id = id;
                }
                
                await saveRecord(recordToSave);
                n++;
            }

            await searchIdeas(); // DB 갱신 후 전체 데이터 로드 및 렌더링
            showToast(`${n}개 행 가져옴 ⬆️`);

        }catch(err){ 
            showToast('파일 처리 오류 ❌', true); 
            console.error(err);
        }
        e.target.value="";
      };
      r.readAsBinaryString(f);
    }

    // ===== 초기화 및 이벤트 바인딩 =====
    
    document.addEventListener('DOMContentLoaded', async ()=>{
        await initDB();
        await searchIdeas(); // 초기 데이터 로드 및 렌더링

        $("dateInput").value = new Date().toISOString().slice(0,10); // 기본 날짜 오늘로 설정

        // 이벤트 바인딩
        $("btnSave").addEventListener("click", addIdea);
        $("btnDownload").addEventListener("click", downloadExcel);
        $("fileInput").addEventListener("change", uploadExcel);
        $("btnTopDownload").addEventListener("click", downloadExcel);
        $("fileInputTop").addEventListener("change", uploadExcel);
        $("btnSearch").addEventListener("click", searchIdeas);
        $("btnReset").addEventListener("click", resetSearch);
    });
  })();
  </script>
</body>
</html>
