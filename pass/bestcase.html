<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>모범답안</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
/* === Executive Theme === */
:root {
    --bg-body: #f1f5f9; --bg-sidebar: #ffffff; --bg-panel: #ffffff;
    --primary: #334155; --primary-hover: #1e293b;
    --accent: #6366f1; --accent-light: #e0e7ff;
    --text-main: #0f172a; --text-sub: #64748b; --text-muted: #94a3b8;
    --border: #e2e8f0; --radius-md: 10px;
    --font-ui: 'Pretendard', 'Inter', sans-serif;
}

* { box-sizing: border-box; outline: none; }
body { margin: 0; background: var(--bg-body); color: var(--text-main); font-family: var(--font-ui); font-size: 14px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* Header */
header { height: 64px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; flex-shrink: 0; justify-content: space-between; z-index: 50; }
header .brand { font-weight: 800; font-size: 20px; color: var(--primary); display: flex; align-items: center; gap: 12px; }
header .brand i { font-size: 22px; color: var(--accent); }

/* Layout Structure */
.workspace { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 64px); }

/* Sidebar */
.pane-list { width: 300px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; z-index: 20; }
.search-area { padding: 20px; display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }
/* ★ 테두리 잘림 방지를 위해 padding-top을 4px로 수정 */
.list-scroll { flex: 1; overflow-y: auto; padding: 4px 12px 20px 12px; }

/* Main Area */
.pane-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.toolbar { height: 60px; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; flex-shrink: 0; background: var(--bg-body); border-bottom: 1px solid var(--border); }
.viewer-body { flex: 1; display: flex; overflow: hidden; position: relative; }

/* Image Viewer */
.viewer-wrapper { flex: 1; overflow: auto; padding: 20px; text-align: center; background: var(--bg-body); }
.image-paper { background: #fff; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); padding: 10px; display: inline-block; min-width: 80%; transition: 0.2s; }
.image-paper img { display: block; max-width: 100%; height: auto; border-radius: 4px; margin: 0 auto; transition: width 0.2s ease-out; }

/* Inspector (Right Panel) */
.pane-inspector { width: 320px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.inspector-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
.inspector-body { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

/* Form Elements */
.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-group label { font-size: 13px; font-weight: 600; color: var(--text-sub); }
.input-text, .input-textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 14px; background: #f8fafc; transition: 0.2s; }
.input-text:focus, .input-textarea:focus { border-color: var(--accent); background: #fff; }
.input-textarea { resize: vertical; min-height: 120px; line-height: 1.5; }

/* Items */
.item-card { padding: 16px; margin-bottom: 8px; border-radius: var(--radius-md); cursor: pointer; border: 1px solid var(--border); background: #fff; transition: 0.2s; }
/* ★ 테두리 잘림 방지를 위해 position: relative; z-index: 1; 추가 */
.item-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); position: relative; z-index: 1; }
.item-card.active { border-color: var(--accent); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: relative; z-index: 1; }
.item-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 24px; }
.item-meta { font-size: 12px; color: var(--text-sub); display: flex; justify-content: space-between; align-items: center; }

/* Buttons & Utils */
.btn { height: 36px; padding: 0 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: #4f46e5; }
.btn-secondary { background: #fff; border-color: var(--border); color: var(--text-main); }
.btn-secondary:hover { background: #f1f5f9; }
.btn-icon { width: 36px; padding: 0; justify-content: center; }
#pdf-input { display: none; }

/* 추가된 삭제 버튼 스타일 */
.btn-delete-card { background: none; border: none; color: #cbd5e1; cursor: pointer; padding: 4px; border-radius: 4px; transition: 0.2s; font-size: 14px; }
.btn-delete-card:hover { color: #ef4444; background: #fee2e2; }

/* Empty State */
.empty-state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg-body); z-index: 100; }
.loading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 200; flex-direction: column; gap: 10px; font-weight: 600; color: var(--primary); }

.page-nav { display: flex; align-items: center; gap: 10px; justify-content: center; }

/* 검색창 스타일 */
.search-input-wrapper { position: relative; display: flex; align-items: center; }
.search-input-wrapper i { position: absolute; left: 10px; color: var(--text-muted); font-size: 13px; }
.search-input-wrapper input { padding-left: 32px; height: 34px; }
</style>
</head>
<body>

<header>
    <div class="brand"><i class="fas fa-file-signature"></i> 모범답안</div>
    <div style="display:flex; gap:10px;">
        <label for="pdf-input" class="btn btn-primary"><i class="fas fa-file-pdf"></i> 새 PDF 등록</label>
        <input type="file" id="pdf-input" accept="application/pdf">
    </div>
</header>

<div class="workspace">
    <aside class="pane-list">
        <div class="search-area">
            <h3 style="margin:0; font-size:15px; color:var(--primary);">저장된 모범답안</h3>
            <div class="search-input-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="list-search" class="input-text" placeholder="모범답안 제목 검색...">
            </div>
        </div>
        <div class="list-scroll" id="db-list"></div>
    </aside>

    <main class="pane-main">
        <div class="toolbar">
            <div style="display:flex; align-items:center; gap:12px; flex:1;">
                <input type="text" id="doc-title" class="input-text" placeholder="모범답안 제목을 입력하세요" style="max-width:300px; height:36px;">
                <button class="btn btn-accent" id="btn-save"><i class="fas fa-save"></i> 저장하기</button>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary btn-icon" id="btn-zoom-out" title="축소"><i class="fas fa-search-minus"></i></button>
                <button class="btn btn-secondary btn-icon" id="btn-zoom-in" title="확대"><i class="fas fa-search-plus"></i></button>
                <button class="btn btn-secondary btn-icon" id="btn-zoom-reset" title="화면 맞춤"><i class="fas fa-compress"></i></button>
            </div>
        </div>

        <div class="viewer-body">
            <div id="loading" class="loading-overlay"><i class="fas fa-spinner fa-spin fa-2x"></i> PDF 변환 중...</div>
            <div id="empty-state" class="empty-state">
                <i class="fas fa-file-pdf" style="font-size:56px; color:#cbd5e1; margin-bottom:24px;"></i>
                <h2 style="font-size:20px; color:var(--primary); margin-bottom:10px;">PDF 파일을 업로드하거나 목록에서 선택하세요</h2>
            </div>

            <div class="viewer-wrapper" id="viewer-wrapper" style="display:none;">
                <div class="image-paper" id="image-container">
                    <img id="main-image" src="" alt="Page">
                </div>
            </div>

            <aside class="pane-inspector" id="inspector-pane" style="display:none;">
                <div class="inspector-header">
                    <span>페이지 관리</span>
                    <div class="page-nav">
                        <button class="btn btn-secondary btn-icon" id="btn-prev" style="height:28px; width:28px;"><i class="fas fa-chevron-left"></i></button>
                        <span id="page-indicator" style="font-size:13px;">1 / 1</span>
                        <button class="btn btn-secondary btn-icon" id="btn-next" style="height:28px; width:28px;"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="inspector-body">
                    <div class="form-group">
                        <label>점수 (Score)</label>
                        <input type="number" id="page-score" class="input-text">
                    </div>
                    <div class="form-group">
                        <label>선정사유 및 메모</label>
                        <textarea id="page-memo" class="input-textarea"></textarea>
                    </div>
                </div>
            </aside>
        </div>
    </main>
</div>

<script>
// --- PDF.js 설정 ---
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// --- IndexedDB 관리 객체 ---
const DB = {
    dbName: 'ModelAnswerDB',
    storeName: 'answers',
    init() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(this.dbName, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(this.storeName)) {
                    db.createObjectStore(this.storeName, { keyPath: 'id' });
                }
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    },
    async save(record) {
        const db = await this.init();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(this.storeName, 'readwrite');
            const store = tx.objectStore(this.storeName);
            const req = store.put(record);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
        });
    },
    async getAll() {
        const db = await this.init();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(this.storeName, 'readonly');
            const store = tx.objectStore(this.storeName);
            const req = store.getAll();
            req.onsuccess = () => resolve(req.result.sort((a,b) => b.timestamp - a.timestamp));
            req.onerror = () => reject(req.error);
        });
    },
    // ★ 추가된 데이터 삭제 로직
    async delete(id) {
        const db = await this.init();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(this.storeName, 'readwrite');
            const store = tx.objectStore(this.storeName);
            const req = store.delete(id);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
        });
    }
};

// --- 메인 App 로직 ---
const App = {
    currentRecord: null,
    currentPageIdx: 0,
    zoomLevel: 1,

    init() {
        this.bindEvents();
        this.loadSidebar();
    },

    bindEvents() {
        const $ = id => document.getElementById(id);

        // PDF 업로드
        $('pdf-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            $('loading').style.display = 'flex';
            $('empty-state').style.display = 'none';
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                const pages = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    
                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                    
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                    pages.push({ blob: blob, score: '', memo: '' });
                }

                this.currentRecord = {
                    id: Date.now().toString(),
                    title: file.name.replace('.pdf', ''),
                    date: new Date().toLocaleString('ko-KR'),
                    timestamp: Date.now(),
                    pages: pages
                };

                $('doc-title').value = this.currentRecord.title;
                this.showPage(0);
                
            } catch (err) {
                alert("PDF 처리 중 오류가 발생했습니다.");
                console.error(err);
            } finally {
                $('loading').style.display = 'none';
                $('pdf-input').value = '';
            }
        });

        // 네비게이션
        $('btn-prev').onclick = () => this.changePage(-1);
        $('btn-next').onclick = () => this.changePage(1);

        // 점수/메모 자동 저장
        $('page-score').addEventListener('input', (e) => {
            if(this.currentRecord) this.currentRecord.pages[this.currentPageIdx].score = e.target.value;
        });
        $('page-memo').addEventListener('input', (e) => {
            if(this.currentRecord) this.currentRecord.pages[this.currentPageIdx].memo = e.target.value;
        });

        // DB 저장
        $('btn-save').onclick = async () => {
            if (!this.currentRecord) return alert("저장할 데이터가 없습니다.");
            this.currentRecord.title = $('doc-title').value || "제목 없음";
            
            $('btn-save').innerHTML = '<i class="fas fa-spinner fa-spin"></i> 저장중...';
            await DB.save(this.currentRecord);
            await this.loadSidebar();
            
            setTimeout(() => {
                $('btn-save').innerHTML = '<i class="fas fa-check"></i> 저장 완료';
                setTimeout(() => $('btn-save').innerHTML = '<i class="fas fa-save"></i> 저장하기', 2000);
            }, 500);
        };

        // 줌 기능
        $('btn-zoom-in').onclick = () => this.setZoom(this.zoomLevel + 0.2);
        $('btn-zoom-out').onclick = () => this.setZoom(this.zoomLevel - 0.2);
        $('btn-zoom-reset').onclick = () => this.setZoom(1);

        // 키보드 방향키 단축키 (좌/우 화살표)
        document.addEventListener('keydown', (e) => {
            const targetTag = e.target.tagName.toUpperCase();
            if (targetTag === 'INPUT' || targetTag === 'TEXTAREA') return;
            if (!this.currentRecord) return;

            if (e.key === 'ArrowLeft') {
                this.changePage(-1);
            } else if (e.key === 'ArrowRight') {
                this.changePage(1);
            }
        });

        // 검색창 필터링 이벤트
        $('list-search').addEventListener('input', () => {
            this.loadSidebar();
        });
    },

    // ★ 추가된 데이터 삭제 함수
    async deleteRecord(id) {
        if (!confirm("정말 이 모범답안을 삭제하시겠습니까?")) return;
        
        try {
            await DB.delete(id);
            
            // 삭제한 파일이 현재 뷰어에 띄워져 있는 파일이라면 화면 초기화
            if (this.currentRecord && this.currentRecord.id === id) {
                this.currentRecord = null;
                document.getElementById('doc-title').value = '';
                document.getElementById('empty-state').style.display = 'flex';
                document.getElementById('viewer-wrapper').style.display = 'none';
                document.getElementById('inspector-pane').style.display = 'none';
            }
            
            await this.loadSidebar();
        } catch (e) {
            alert("삭제 중 오류가 발생했습니다.");
            console.error(e);
        }
    },

    async loadSidebar() {
        const listEl = document.getElementById('db-list');
        listEl.innerHTML = '';
        const records = await DB.getAll();
        
        const searchQuery = document.getElementById('list-search').value.toLowerCase();
        const filteredRecords = records.filter(record => 
            record.title.toLowerCase().includes(searchQuery)
        );

        if (filteredRecords.length === 0) {
            listEl.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text-muted); font-size:13px;">검색 결과가 없습니다.</div>';
            return;
        }

        filteredRecords.forEach(record => {
            const card = document.createElement('div');
            const isActive = this.currentRecord && this.currentRecord.id === record.id;
            card.className = `item-card ${isActive ? 'active' : ''}`;
            
            // ★ 휴지통 아이콘 추가 및 레이아웃 수정
            card.innerHTML = `
                <div class="item-title" title="${record.title}">${record.title}</div>
                <div class="item-meta">
                    <div>
                        <span>${record.date}</span>
                        <span style="margin-left:8px;"><i class="fas fa-file-image"></i> ${record.pages.length}장</span>
                    </div>
                    <button class="btn-delete-card" title="삭제"><i class="fas fa-trash-alt"></i></button>
                </div>
            `;
            
            // 이벤트 등록 (삭제 버튼 클릭과 카드 클릭 분리)
            card.onclick = (e) => {
                if (e.target.closest('.btn-delete-card')) {
                    e.stopPropagation(); // 삭제 버튼 클릭 시 카드 클릭 이벤트(뷰어 로드) 방지
                    this.deleteRecord(record.id);
                    return;
                }
                
                this.currentRecord = record;
                document.getElementById('doc-title').value = record.title;
                this.showPage(0);
                this.loadSidebar(); 
            };
            listEl.appendChild(card);
        });
    },

    showPage(index) {
        if (!this.currentRecord || index < 0 || index >= this.currentRecord.pages.length) return;
        
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('viewer-wrapper').style.display = 'block';
        document.getElementById('inspector-pane').style.display = 'flex';

        this.currentPageIdx = index;
        const pageData = this.currentRecord.pages[index];

        const img = document.getElementById('main-image');
        if (img.src) URL.revokeObjectURL(img.src); 
        img.src = URL.createObjectURL(pageData.blob);

        document.getElementById('page-indicator').textContent = `${index + 1} / ${this.currentRecord.pages.length}`;
        document.getElementById('page-score').value = pageData.score || '';
        document.getElementById('page-memo').value = pageData.memo || '';

        this.setZoom(1);
    },

    changePage(delta) {
        this.showPage(this.currentPageIdx + delta);
    },

    setZoom(level) {
        if (level < 0.2 || level > 5) return;
        this.zoomLevel = level;
        
        const img = document.getElementById('main-image');
        if (level === 1) {
            img.style.width = '';
            img.style.maxWidth = '100%';
        } else {
            const applyZoom = () => {
                img.style.maxWidth = 'none';
                img.style.width = (img.naturalWidth * level * 0.5) + 'px'; 
            };
            if (img.complete) applyZoom();
            else img.onload = applyZoom;
        }
    }
};

window.onload = () => App.init();
</script>
</body>
</html>
