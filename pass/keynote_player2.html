<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keynote Player</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css">
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<style>
    /* 💎 Modern Premium Light Variables */
    :root {
        --bg-body: #F4F5F7;           
        --bg-surface: #FFFFFF;         
        --bg-elevated: #F8FAFC;
        
        --text-primary: #0F172A; /* Slate 900 */
        --text-secondary: #475569; /* Slate 600 */
        --text-tertiary: #94A3B8; /* Slate 400 */
        
        --border-subtle: #E2E8F0;
        --border-focus: #CBD5E1;
        
        --accent-primary: #0F172A;
        --accent-hover: #F1F5F9;
        
        --success: #059669;
        --success-bg: #ECFDF5;
        --danger: #DC2626;
        --danger-bg: #FEF2F2;
        
        --radius-full: 9999px;
        --radius-xl: 20px;
        --radius-lg: 16px;
        --radius-md: 12px;
        --radius-sm: 8px;
        
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.03);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.025);
        --shadow-float: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
    }

    * { box-sizing: border-box; outline: none; margin: 0; padding: 0; }
    
    body { 
        font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
        background-color: var(--bg-body); 
        color: var(--text-primary);
        height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        -webkit-font-smoothing: antialiased;
        letter-spacing: -0.015em;
    }

    /* Elegant Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

    /* Top Navigation */
    .header-area { display: flex; justify-content: space-between; align-items: center; padding: 12px 28px; flex-shrink: 0; gap: 16px; }
    
    /* 🚀 셀렉트 박스 CSS */
    .note-select {
        flex: 1;
        max-width: 400px;
        padding: 8px 16px;
        border-radius: var(--radius-full);
        border: 1px solid var(--border-subtle);
        background-color: var(--bg-surface);
        color: var(--text-primary);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: var(--shadow-sm);
        appearance: none; 
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 14px center;
        background-size: 16px;
        padding-right: 36px;
        outline: none;
        transition: all 0.2s ease;
        font-family: inherit;
    }
    .note-select:hover {
        border-color: var(--border-focus);
        box-shadow: var(--shadow-md);
    }
    .note-select:focus {
        border-color: var(--text-tertiary);
        box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.05);
    }
    
    /* 환경설정 버튼 스타일 */
    .settings-btn { 
        padding: 8px 16px; border-radius: var(--radius-full); background: var(--bg-surface); 
        border: 1px solid var(--border-subtle); color: var(--text-secondary); cursor: pointer; 
        font-size: 14px; font-weight: 600; transition: all 0.2s ease; display: flex; align-items: center; gap: 6px; 
        box-shadow: var(--shadow-sm);
    }
    .settings-btn:hover { color: var(--text-primary); border-color: var(--border-focus); box-shadow: var(--shadow-md); }

    /* Main Layout */
    .main-wrapper { flex: 1; display: flex; padding: 0 28px 24px; gap: 24px; overflow: hidden; }

    /* Sidebar List */
    .sidebar { 
        width: 320px; background: var(--bg-surface); border: 1px solid var(--border-subtle); 
        border-radius: var(--radius-xl); display: flex; flex-direction: column; overflow: hidden; 
        box-shadow: var(--shadow-md); 
    }
    .sidebar-header { 
        padding: 20px 24px 16px; display: flex; justify-content: space-between; align-items: center; 
        border-bottom: 1px solid var(--border-subtle);
    }
    .sidebar-header span { font-weight: 700; font-size: 14px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 8px; }
    
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .check-all-label { font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; color: var(--text-secondary); transition: color 0.2s; }
    .check-all-label:hover { color: var(--accent-primary); }
    .check-all-label input[type="checkbox"] { accent-color: var(--accent-primary); width: 16px; height: 16px; cursor: pointer; }
    
    .btn-reset { 
        background: transparent; border: none; color: var(--text-tertiary); 
        cursor: pointer; font-size: 13px; transition: all 0.2s; 
        display: flex; align-items: center; justify-content: center; 
        padding: 4px; border-radius: 4px;
    }
    .btn-reset:hover { color: var(--danger); background: var(--danger-bg); }

    .list-container { flex: 1; overflow-y: auto; padding: 12px; }
    .list-item { 
        display: flex; align-items: center; gap: 12px; padding: 12px 14px; margin-bottom: 2px; 
        border-radius: var(--radius-md); cursor: pointer; transition: background 0.15s ease; 
    }
    .list-item:hover { background: var(--accent-hover); }
    .list-item.active { background: var(--bg-body); }
    .list-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-primary); flex-shrink: 0; }
    .list-item-title { flex: 1; font-size: 14.5px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
    .list-item.active .list-item-title { font-weight: 700; color: var(--accent-primary); }
    .completed-text { color: var(--text-tertiary) !important; text-decoration: line-through; }

    /* Player Area & Header */
    .player-area { flex: 1; display: flex; flex-direction: column; min-width: 0; gap: 16px; position: relative; }
    .player-header { display: flex; justify-content: space-between; align-items: center; padding: 0; min-height: 48px; z-index: 10; transition: all 0.3s ease; }
    
    .status-box { display: flex; flex-direction: column; gap: 2px; }
    .status-title { font-size: 11px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }
    .status-value { font-size: 22px; font-weight: 800; color: var(--accent-primary); font-variant-numeric: tabular-nums; }
    
    .header-center, .header-right { 
        opacity: 0; 
        pointer-events: none;
        transition: opacity 0.3s ease; 
    }
    
    .player-area.show-controls .header-center, 
    .player-area.show-controls .header-right,
    .player-header:hover .header-center,
    .player-header:hover .header-right { 
        opacity: 1; 
        pointer-events: auto;
    }

    .header-center { flex: 0 0 auto; display: flex; justify-content: center; align-items: center; position: absolute; left: 50%; transform: translateX(-50%); }
    .controls { 
        padding: 6px 8px; display: flex; align-items: center; justify-content: center; gap: 6px; 
        background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0,0,0,0.05); border-radius: var(--radius-full); box-shadow: var(--shadow-float); 
    }
    .ctrl-group { display: flex; align-items: center; gap: 2px; } 
    
    .nav-btn { 
        width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent; 
        color: var(--text-secondary); cursor: pointer; transition: all 0.2s ease; 
        display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .nav-btn:hover:not(:disabled) { background: var(--accent-hover); color: var(--accent-primary); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    
    .nav-btn.tts-active { color: var(--success); background: var(--success-bg); border-color: rgba(5, 150, 105, 0.2); }
    .nav-btn.tts-active:hover { background: rgba(5, 150, 105, 0.15); }
    
    .action-btn { 
        padding: 8px 16px; border-radius: var(--radius-full); border: none; background: transparent; 
        font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s ease; 
    }
    .btn-play { color: var(--accent-primary); }
    .btn-play:hover { background: var(--accent-hover); }
    .btn-stop { color: var(--danger); }
    .btn-stop:hover { background: var(--danger-bg); }
    
    .controls-divider { width: 1px; height: 20px; background: var(--border-subtle); margin: 0 4px; }
    
    .btn-complete { color: var(--text-secondary); }
    .btn-complete:hover { background: var(--success-bg); color: var(--success); }
    .btn-undo { color: var(--text-secondary); }
    .btn-undo:hover { background: var(--accent-hover); color: var(--text-primary); }

    .speed-select { 
        padding: 8px 12px; font-size: 14px; font-weight: 600; color: var(--text-secondary);
        background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); 
        outline: none; cursor: pointer; transition: 0.2s; box-shadow: var(--shadow-sm);
    }
    .speed-select:hover { border-color: var(--border-focus); color: var(--text-primary); }
    .speed-select:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 📄 Premium Document Screen */
    .screen { 
        flex: 1; background: var(--bg-surface); border-radius: var(--radius-xl); border: 1px solid var(--border-subtle); 
        display: flex; flex-direction: column; overflow: hidden; position: relative;
        box-shadow: var(--shadow-lg); 
    }
    
    .progress-bar { height: 3px; background: transparent; width: 100%; position: absolute; top: 0; left: 0; z-index: 5; }
    .progress-fill { height: 100%; background: var(--accent-primary); width: 0%; transition: width 0.1s linear; }
    
    .screen-content { 
        flex: 1; padding: 30px 40px; 
        overflow-y: auto; 
        display: block; 
    }
    
    /* 📖 Document Layout */
    .paper-container { width: 100%; max-width: 1000px; margin: 0 auto; }
    
    .paper-lead { 
        border-left: 4px solid var(--border-focus); 
        margin-bottom: 16px; 
        word-break: keep-all;
    }
    
    .paper-prob-container { display: flex; align-items: baseline; gap: 8px; margin-bottom: 16px; } 
    .paper-prob-num { font-size: 32px; font-weight: 800; color: var(--accent-primary); line-height: 1.3; font-variant-numeric: tabular-nums; }
    .paper-prob { word-break: keep-all; flex: 1; color: var(--accent-primary); }
    
    .paper-conc { 
        margin-bottom: 16px; 
        background: var(--bg-elevated); border-radius: var(--radius-md); 
        border: 1px solid var(--border-subtle); word-break: keep-all;
    }
    
    .paper-divider { border: 0; height: 1px; background: var(--border-subtle); margin: 0 0 16px 0; } 
    .paper-sol { word-break: keep-all; }
    
    /* 🚀 Quill Editor Reset & Padding Control */
    .ql-editor { 
        font-family: inherit; font-size: inherit; line-height: inherit; 
        min-height: auto; height: auto; overflow: visible;
    }
    .paper-prob.ql-editor, .paper-sol.ql-editor { padding: 0 !important; }
    .paper-lead.ql-editor { padding: 4px 0 4px 16px !important; font-size: 17pt; line-height: 1.45; color: var(--text-secondary); } 
    .paper-conc.ql-editor { padding: 16px 20px !important; font-size: 17pt; line-height: 1.45; color: var(--text-secondary); } 
    .paper-sol.ql-editor { font-size: 17pt; line-height: 1.45; color: var(--text-primary); }
    .paper-prob.ql-editor { font-size: 32px; line-height: 1.3; color: var(--accent-primary); font-weight: 700; }

    .ql-editor [style*="background-color"] { padding: 2px 4px; border-radius: 4px; }
    .ql-editor table { width: 100%; border-collapse: collapse; margin: 16px 0; font-family: 'Pretendard Variable', sans-serif; text-align: left; font-size: 24px; line-height: 1.4; }
    .ql-editor th, .ql-editor td { border: 1px solid var(--border-subtle); padding: 12px 16px; }
    .ql-editor th { background-color: var(--bg-elevated); font-weight: 700; color: var(--text-primary); }
    .ql-editor p { margin-top: 0; margin-bottom: 0.4em; }
    .ql-editor p:last-child { margin-bottom: 0; }
    .ql-editor p:has(img) { margin-bottom: 0 !important; } 
    .ql-editor img { 
        max-width: 100%; border-radius: var(--radius-sm); 
        margin: 8px 0 !important; display: block; 
        border: 1px solid var(--border-subtle); cursor: pointer; transition: all 0.2s ease; 
        box-shadow: var(--shadow-sm); 
    }
    .ql-editor img:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); border-color: var(--border-focus); }
    
    .paper-lead p:empty, .paper-conc p:empty, .paper-prob p:empty, .paper-sol p:empty { display: none !important; }
    .ql-editor p:has(br:only-child) { display: none !important; }

    /* Empty State */
    .empty-state { position: absolute; inset: 0; background: var(--bg-surface); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; text-align: center; }
    .empty-state-icon { width: 72px; height: 72px; border-radius: 50%; background: var(--bg-body); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border: 1px solid var(--border-subtle);}
    .empty-state i { font-size: 28px; color: var(--text-tertiary); }
    .empty-state p.main-text { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }

    /* Immersive & Presentation Modes */
    body.immersive .header-area { opacity: 0; height: 0; padding-top: 0; padding-bottom: 0; pointer-events: none; overflow: hidden; }
    body.immersive .sidebar { width: 0; opacity: 0; border: none; margin: 0; padding: 0; pointer-events: none;}
    body.immersive .main-wrapper { padding: 12px; }
    body.immersive .player-header { position: absolute; top: 12px; right: 12px; left: 12px; min-height: auto; pointer-events: none; justify-content: flex-end; z-index: 100; }
    body.immersive .header-left, body.immersive .header-center, body.immersive #speed-select { display: none !important; }
    body.immersive .header-right { opacity: 0.3 !important; pointer-events: auto; }
    body.immersive .header-right:hover { opacity: 1 !important; }

    body.presentation .header-area { display: none !important; }
    body.presentation .sidebar { display: none !important; }
    body.presentation .player-header { display: none !important; }
    body.presentation .main-wrapper { padding: 0 !important; }
    body.presentation .screen { border-radius: 0; border: none; box-shadow: none; }

    /* Modals */
    .modal-overlay { display: none; position: fixed; inset: 0; background-color: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 10000; align-items: center; justify-content: center; }
    .modal-box { background: var(--bg-surface); width: 360px; border-radius: var(--radius-xl); padding: 28px 24px; box-shadow: var(--shadow-float); }
    .modal-title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; text-align: center; }
    .modal-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; text-align: center; line-height: 1.5; }
    
    .range-input-group { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 28px; }
    .range-col { display: flex; flex-direction: column; gap: 6px; }
    .range-col label { font-size: 12px; font-weight: 600; color: var(--text-tertiary); text-align: center;}
    .range-col input, .settings-select { width: 100%; height: 44px; text-align: center; border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; color: var(--accent-primary); outline: none; transition: 0.2s; }
    .range-col input:focus, .settings-select:focus { border-color: var(--border-focus); box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.05); }
    .range-col input { width: 80px; }

    /* 환경설정 셀렉트 전용 */
    .settings-select { appearance: none; padding: 0 16px; text-align-last: center; background: var(--bg-surface); cursor: pointer; margin-bottom: 24px; }

    .btn-full { width: 100%; height: 44px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); background: transparent; color: var(--text-primary); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; margin-bottom: 8px; }
    .btn-full.primary { background: var(--text-primary); color: white; border: none; }
    .btn-full.primary:hover { background: var(--text-secondary); }
    .btn-full:not(.primary):hover { background: var(--bg-elevated); }
    .btn-full.danger { color: var(--danger); border-color: #FECACA; }
    .btn-full.danger:hover { background: var(--danger-bg); }

    .image-modal { display: none; position: fixed; z-index: 9999; inset: 0; background-color: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s; }
    .image-modal.show { display: flex; opacity: 1; }
    .image-modal img { max-width: 90%; max-height: 90vh; border-radius: var(--radius-lg); object-fit: contain; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); background-color: #ffffff; padding: 16px; box-sizing: border-box; }
</style>
</head>
<body>

<div class="header-area">
    <select class="note-select" id="note-select"></select>
    
    <button class="settings-btn" onclick="openSettingsModal()">
        <i class="fas fa-gear" style="font-size: 13px;"></i> 환경설정
    </button>
</div>

<div class="main-wrapper">
    <div class="sidebar">
        <div class="sidebar-header">
            <span><i class="fas fa-layer-group"></i> 문항 목록</span>
            <div class="header-actions">
                <label class="check-all-label"><input type="checkbox" id="check-all"> 전체선택</label>
                <button id="btn-reset-status" class="btn-reset" title="암기 완료 기록 초기화">
                    <i class="fas fa-rotate-right"></i>
                </button>
            </div>
        </div>
        <div class="list-container" id="item-list"></div>
    </div>

    <div class="player-area">
        <div class="player-header">
            <div class="header-left">
                <div class="status-box">
                    <div class="status-title">Progress</div>
                    <div class="status-value" id="status-counter">0 / 0</div>
                </div>
            </div>

            <div class="header-center">
                <div class="controls" id="player-controls" style="display: none;">
                    <div class="ctrl-group">
                        <button class="nav-btn" id="btn-prev"><i class="fas fa-backward-step"></i></button>
                        <button class="action-btn btn-play" id="btn-play"><i class="fas fa-play"></i> PLAY</button>
                        <button class="action-btn btn-stop" id="btn-stop" style="display:none;"><i class="fas fa-stop"></i> STOP</button>
                        <button class="nav-btn" id="btn-next"><i class="fas fa-forward-step"></i></button>
                    </div>
                    <div class="controls-divider"></div>
                    <button class="action-btn btn-complete" id="btn-complete" title="스페이스바를 누르면 상태를 변경합니다">
                        <i class="fas fa-check"></i> 암기 완료
                    </button>
                </div>
            </div>

            <div class="header-right" style="display: flex; align-items: center; gap: 8px;">
                <select id="speed-select" class="speed-select">
                    <option value="5000">x1.5 (5s)</option>
                    <option value="10000" selected>x1.0 (10s)</option>
                    <option value="15000">x0.7 (15s)</option>
                    <option value="20000">x0.5 (20s)</option>
                </select>
                <button id="btn-tts-toggle" class="nav-btn" style="background: var(--bg-surface); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);" title="문항 TTS 읽기 토글">
                    <i class="fas fa-volume-xmark"></i>
                </button>
                <button id="btn-immersive-toggle" class="nav-btn" style="background: var(--bg-surface); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);" title="몰입 모드 전환 (Ctrl+H)">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>

        <div class="screen">
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

            <div id="empty-state" class="empty-state">
                <div class="empty-state-icon"><i class="fas fa-inbox"></i></div>
                <p class="main-text">선택된 문항이 없습니다</p>
                <p style="color:var(--text-tertiary); font-size:14px;">좌측 리스트에서 복습할 문항을 체크해주세요.</p>
            </div>

            <div class="screen-content" id="screen-content" style="display: none;">
                <div class="paper-container">
                    <div class="paper-lead ql-editor" id="play-lead"></div>
                    
                    <div class="paper-prob-container" id="prob-container">
                        <div class="paper-prob-num" id="play-prob-num"></div>
                        <div class="paper-prob ql-editor" id="play-prob"></div>
                    </div>

                    <div class="paper-conc ql-editor" id="play-conc"></div>
                    
                    <hr class="paper-divider" id="sol-divider">
                    <div class="paper-sol ql-editor" id="play-sol"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="range-modal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-title" id="range-modal-title"></div>
        <div class="modal-desc">학습할 문항 범위를 설정하세요.<br>미지정 시 전체 문항이 표시됩니다.</div>
        
        <div class="range-input-group">
            <div class="range-col">
                <label>시작 번호</label>
                <input type="number" id="range-start" min="1">
            </div>
            <div style="font-size:18px; font-weight:700; color:var(--text-tertiary); margin-top:20px;">~</div>
            <div class="range-col">
                <label>끝 번호</label>
                <input type="number" id="range-end" min="1">
            </div>
        </div>

        <button class="btn-full primary" id="btn-study-range"><i class="fas fa-book-open"></i> 범위 학습 시작</button>
        <button class="btn-full" id="btn-study-all">전체 범위 학습 (기본)</button>
        <button class="btn-full danger" onclick="closeRangeModal()">취소</button>
    </div>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-title">환경설정</div>
        <div class="modal-desc">TTS 독해에 사용할 음성을 선택하세요.</div>
        
        <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px;">
            <label style="font-size: 12px; font-weight: 600; color: var(--text-tertiary); text-align: left; padding-left: 4px;">TTS 음성 선택</label>
            <select id="voice-select" class="settings-select"></select>
        </div>

        <button class="btn-full primary" onclick="closeSettingsModal()"><i class="fas fa-check"></i> 설정 저장</button>
    </div>
</div>

<div id="image-modal" class="image-modal" onclick="this.classList.remove('show')">
    <img id="modal-image" src="" alt="확대된 이미지">
</div>
<script>
    let db;
    let allNotes = []; 
    let currentNote = null; 
    let targetNoteForRange = null; 
    let validIndices = []; 
    let selectedIndices = []; 
    let currentPlayIndex = -1;

    let playInterval = null;
    let progressInterval = null;
    let isPlaying = false;
    let slideDuration = 10000;
    let startTime = 0;
    
    let isTtsEnabled = false;
    
    // 🚀 메모리 최적화를 위해 단일 Utterance 객체를 재사용 (Pool 방식)
    let globalUtterance = null;
    let systemVoices = [];
    let selectedVoiceName = null;

    const $noteSelect = document.getElementById('note-select');
    const $list = document.getElementById('item-list');
    const $checkAll = document.getElementById('check-all');
    const $btnResetStatus = document.getElementById('btn-reset-status'); 
    const $screenContent = document.getElementById('screen-content');
    const $emptyState = document.getElementById('empty-state');
    const $playerControls = document.getElementById('player-controls');
    const $rangeModal = document.getElementById('range-modal');
    const $settingsModal = document.getElementById('settings-modal');
    const $voiceSelect = document.getElementById('voice-select');
    
    const $playerAreaDOM = document.querySelector('.player-area');
    let controlsTimeout;
    
    $playerAreaDOM.addEventListener('mousemove', () => {
        $playerAreaDOM.classList.add('show-controls');
        clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(() => {
            $playerAreaDOM.classList.remove('show-controls');
        }, 2000);
    });
    
    $playerAreaDOM.addEventListener('mouseleave', () => {
        $playerAreaDOM.classList.remove('show-controls');
    });

    const stripHTML = (html) => {
        if (!html) return '';
        return html.replace(/<[^>]*>?/gm, '').replace(/&nbsp;/g, ' ').trim();
    };

    const isEmptyHTML = (html) => {
        if (!html) return true;
        if (html.includes('<img')) return false; 
        const stripped = html.replace(/<p><br><\/p>/gi, '')
                             .replace(/<p>&nbsp;<\/p>/gi, '')
                             .replace(/<p>\s*<\/p>/gi, '')
                             .replace(/<[^>]*>?/gm, '')
                             .trim();
        return stripped === '';
    };

    const initDB = () => {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('StudyNoteDB', 1);
            request.onsuccess = (e) => { db = e.target.result; resolve(); };
            request.onerror = () => reject('DB 연결 에러. 에디터에서 먼저 노트를 생성해주세요.');
        });
    };

    // 🚀 사용 가능한 한국어 시스템 음성 로딩 & 메모리 보존을 위한 리스트 바인딩
    function loadVoices() {
        if (typeof speechSynthesis === 'undefined') return;
        systemVoices = speechSynthesis.getVoices();
        
        $voiceSelect.innerHTML = '';
        // 한국어 지원 보이스 또는 기본 보이스만 필터링
        const koVoices = systemVoices.filter(v => v.lang.includes('ko') || v.lang.includes('KO'));
        
        if (koVoices.length === 0) {
            const opt = document.createElement('option');
            opt.textContent = "지원되는 시스템 음성 없음 (기본값)";
            opt.value = "";
            $voiceSelect.appendChild(opt);
            return;
        }

        koVoices.forEach(voice => {
            const opt = document.createElement('option');
            opt.value = voice.name;
            opt.textContent = `${voice.name} (${voice.lang})`;
            if (voice.name === selectedVoiceName) opt.selected = true;
            $voiceSelect.appendChild(opt);
        });

        if (!selectedVoiceName && koVoices.length > 0) {
            selectedVoiceName = koVoices[0].name;
        }
    }

    if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    async function init() {
        try {
            await initDB();
            loadVoices();
            await loadNotes();
        } catch(e) {
            alert(e);
        }
    }

    function loadNotes() {
        return new Promise((resolve) => {
            const transaction = db.transaction(['notes'], 'readonly');
            const store = transaction.objectStore('notes');
            const request = store.openCursor();
            
            allNotes = [];

            request.onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    allNotes.push({
                        id: cursor.value.id,
                        title: cursor.value.title,
                        totalItems: cursor.value.items ? cursor.value.items.length : 0
                    });
                    cursor.continue();
                } else {
                    allNotes.sort((a, b) => {
                        const titleA = a.title || '';
                        const titleB = b.title || '';
                        return titleA.localeCompare(titleB, undefined, { numeric: true, sensitivity: 'base' });
                    });
                    
                    renderNoteSelect();
                    if(allNotes.length > 0) {
                        loadNoteData(allNotes[0].id, 1, allNotes[0].totalItems);
                    }
                    resolve();
                }
            };
        });
    }

    function openRangeModal(noteMeta) {
        targetNoteForRange = noteMeta;
        const total = noteMeta.totalItems;
        document.getElementById('range-modal-title').textContent = noteMeta.title || '제목 없음';
        const $start = document.getElementById('range-start');
        const $end = document.getElementById('range-end');
        $start.value = ''; $start.placeholder = 1; $start.max = total;
        $end.value = ''; $end.placeholder = total; $end.max = total;
        $rangeModal.style.display = 'flex';
    }

    function closeRangeModal() {
        $rangeModal.style.display = 'none';
        targetNoteForRange = null;
        if(currentNote) $noteSelect.value = currentNote.id;
    }

    // 🚀 환경설정 모달 열기/닫기
    function openSettingsModal() {
        loadVoices();
        $settingsModal.style.display = 'flex';
    }

    function closeSettingsModal() {
        selectedVoiceName = $voiceSelect.value;
        $settingsModal.style.display = 'none';
        // 음성이 바뀌었으면 현재 진행중인 슬라이드 TTS 다시 리프레시 실행
        if (isTtsEnabled && selectedIndices.length > 0 && currentPlayIndex !== -1) {
            const realIndex = selectedIndices[currentPlayIndex];
            speakCurrentSlide(currentNote.items[realIndex], realIndex);
        }
    }

    document.getElementById('btn-study-range').onclick = () => {
        if(!targetNoteForRange) return;
        const total = targetNoteForRange.totalItems;
        let s = parseInt(document.getElementById('range-start').value);
        let e = parseInt(document.getElementById('range-end').value);
        if(isNaN(s) || s < 1) s = 1;
        if(isNaN(e) || e > total) e = total;
        if(s > e) return alert('시작 번호가 끝 번호보다 클 수 없습니다.');
        const targetId = targetNoteForRange.id;
        closeRangeModal();
        loadNoteData(targetId, s, e);
    };

    document.getElementById('btn-study-all').onclick = () => {
        if(!targetNoteForRange) return;
        const total = targetNoteForRange.totalItems;
        const targetId = targetNoteForRange.id;
        closeRangeModal();
        loadNoteData(targetId, 1, total);
    };

    function renderNoteSelect() {
        $noteSelect.innerHTML = '';
        if(allNotes.length === 0) { $noteSelect.style.display = 'none'; return; }
        $noteSelect.style.display = 'block';
        
        allNotes.forEach(noteMeta => {
            const option = document.createElement('option');
            option.value = noteMeta.id;
            option.textContent = noteMeta.title || '제목 없음';
            if(currentNote && currentNote.id === noteMeta.id) option.selected = true;
            $noteSelect.appendChild(option);
        });
    }

    $noteSelect.addEventListener('change', (e) => {
        if(isPlaying) stopPlay(); 
        const selectedId = e.target.value;
        const noteMeta = allNotes.find(n => String(n.id) === String(selectedId));
        if(noteMeta) openRangeModal(noteMeta);
    });

    function loadNoteData(noteId, start = 1, end = null) {
        currentNote = null; 
        validIndices = [];
        selectedIndices = [];
        
        const transaction = db.transaction(['notes'], 'readonly');
        const store = transaction.objectStore('notes');
        const request = store.get(noteId);

        request.onsuccess = (e) => {
            currentNote = e.target.result;
            if(!currentNote) { showEmpty(); return; }

            const total = currentNote.items ? currentNote.items.length : 0;
            if(end === null) end = total;

            currentNote.items.forEach((item, index) => {
                if (index < start - 1 || index > end - 1) return;
                if (item.checked === undefined) item.checked = false;
                if(!isEmptyHTML(item.problem) || !isEmptyHTML(item.lead) || !isEmptyHTML(item.concept) || !isEmptyHTML(item.solution)) {
                    validIndices.push(index);
                }
            });
            
            renderNoteSelect();
            renderList();
            updateSelection();
            
            if(selectedIndices.length > 0) showSlide(0);
            else showEmpty();
        };
    }

    function renderList() {
        $list.innerHTML = '';
        if(validIndices.length === 0) {
            $list.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text-tertiary); font-size:14px;">지정된 범위에 내용이 존재하지 않습니다.</div>';
            return;
        }

        const fragment = document.createDocumentFragment();
        validIndices.forEach((realIndex) => {
            const item = currentNote.items[realIndex];
            const div = document.createElement('div');
            div.className = 'list-item';
            div.id = `list-item-${realIndex}`;
            
            const fullTitle = stripHTML(item.problem) || `[문항 내용 참조]`;
            let plainTitle = fullTitle;
            if(plainTitle.length > 25) plainTitle = plainTitle.substring(0, 25) + '...';

            const isChecked = item.checked ? '' : 'checked';
            const completedClass = item.checked ? 'completed-text' : '';
            
            div.innerHTML = `
                <input type="checkbox" class="item-checkbox" data-idx="${realIndex}" ${isChecked}>
                <div class="list-item-title ${completedClass}" title="${fullTitle.replace(/"/g, '&quot;')}">${realIndex + 1}. ${plainTitle}</div>
            `;
            
            div.querySelector('.list-item-title').onclick = () => {
                if(isPlaying) stopPlay();
                const checkbox = div.querySelector('input');
                if(!checkbox.checked) { checkbox.checked = true; updateSelection(); }
                const newPlayIndex = selectedIndices.indexOf(realIndex);
                if(newPlayIndex !== -1) showSlide(newPlayIndex);
            };
            
            div.querySelector('input').onchange = () => updateSelection();
            fragment.appendChild(div);
        });
        $list.appendChild(fragment); 
    }

    function updateSelection() {
        const checkboxes = document.querySelectorAll('.item-checkbox');
        selectedIndices = [];
        checkboxes.forEach(cb => { if(cb.checked) selectedIndices.push(parseInt(cb.dataset.idx)); });
        $checkAll.checked = checkboxes.length > 0 && selectedIndices.length === checkboxes.length;
        
        if(selectedIndices.length === 0) showEmpty();
        else if(selectedIndices[currentPlayIndex] === undefined && !isPlaying) showSlide(0);
        else { updateCounter(); document.getElementById('btn-prev').disabled = selectedIndices.length <= 1; document.getElementById('btn-next').disabled = selectedIndices.length <= 1; }
    }

    $checkAll.onchange = (e) => {
        document.querySelectorAll('.item-checkbox').forEach(cb => cb.checked = e.target.checked);
        updateSelection();
        if(selectedIndices.length > 0 && !isPlaying) showSlide(0);
    };

    function updateCompleteButtonUI(isCompleted) {
        const btn = document.getElementById('btn-complete');
        if (isCompleted) {
            btn.innerHTML = '<i class="fas fa-undo"></i> 완료 해제';
            btn.className = 'action-btn btn-undo';
        } else {
            btn.innerHTML = '<i class="fas fa-check"></i> 암기 완료';
            btn.className = 'action-btn btn-complete';
        }
    }

    function saveCurrentNoteState() {
        if(!currentNote) return;
        const transaction = db.transaction(['notes'], 'readwrite');
        transaction.objectStore('notes').put(currentNote);
    }

    $btnResetStatus.onclick = () => {
        if (!currentNote || !currentNote.items) return;
        if(confirm('현재 선택된 키노트의 모든 "암기 완료" 기록을 초기화하시겠습니까?')) {
            currentNote.items.forEach(item => { item.checked = false; });
            saveCurrentNoteState();
            renderList();
            if (currentPlayIndex !== -1 && selectedIndices.length > 0) showSlide(currentPlayIndex);
        }
    };

    document.getElementById('btn-complete').onclick = () => {
        if(selectedIndices.length === 0 || !currentNote) return;
        const realIndex = selectedIndices[currentPlayIndex];
        const item = currentNote.items[realIndex];

        item.checked = !item.checked;
        saveCurrentNoteState();
        
        const titleDiv = document.querySelector(`#list-item-${realIndex} .list-item-title`);
        if(item.checked) titleDiv.classList.add('completed-text');
        else titleDiv.classList.remove('completed-text');
        
        updateCompleteButtonUI(item.checked);
        
        if (item.checked) {
            document.querySelector(`.item-checkbox[data-idx="${realIndex}"]`).checked = false;
            updateSelection();
            if(selectedIndices.length > 0) {
                let nextIdx = currentPlayIndex >= selectedIndices.length ? 0 : currentPlayIndex;
                showSlide(nextIdx);
                if(isPlaying) resetProgressTimer(); 
            } else {
                showEmpty();
                if(isPlaying) stopPlay(); 
            }
        }
    };

    function setContentOrHide(elementId, content) {
        const el = document.getElementById(elementId);
        let cleanContent = content ? content
            .replace(/<p><br><\/p>/gi, '')
            .replace(/<p>&nbsp;<\/p>/gi, '')
            .replace(/<p>\s*<\/p>/gi, '')
            .replace(/(<br\s*\/?>)+<\/p>/gi, '</p>')
            .trim() : '';

        if(!isEmptyHTML(cleanContent)) {
            el.innerHTML = cleanContent; el.style.display = 'block'; return true;
        } else {
            el.innerHTML = ''; el.style.display = 'none'; return false;
        }
    }

    // 🚀 메모리 최적화 완료된 TTS 연동 핸들러 (인스턴스 단일 재사용 및 가비지 최소화)
    function speakCurrentSlide(item, realIndex) {
        if (typeof speechSynthesis === 'undefined') return;
        speechSynthesis.cancel(); // 큐 비우기 및 즉각 중단
        
        if(!isTtsEnabled) return;

        let speechText = (realIndex + 1) + "번 문제. ";
        if (item.lead) speechText += stripHTML(item.lead) + ". ";
        if (item.problem) speechText += stripHTML(item.problem) + ". ";
        if (item.concept) speechText += stripHTML(item.concept) + ". ";
        if (item.solution) speechText += stripHTML(item.solution) + ". ";

        if(speechText.trim() === "") return;

        // 매번 객체를 new 하지 않고 globalUtterance 하나를 재활용하여 메모리 300MB 점유 및 가비지 컬렉터 부하 완전 해소
        if (!globalUtterance) {
            globalUtterance = new SpeechSynthesisUtterance();
        }
        
        globalUtterance.text = speechText;
        globalUtterance.lang = 'ko-KR';
        globalUtterance.rate = 1.0;

        // 선택된 특수 보이스 매핑
        if (selectedVoiceName) {
            const foundVoice = systemVoices.find(v => v.name === selectedVoiceName);
            if (foundVoice) globalUtterance.voice = foundVoice;
        }

        speechSynthesis.speak(globalUtterance);
    }

    function showSlide(playIndex) {
        if(selectedIndices.length === 0 || !currentNote) return showEmpty();
        currentPlayIndex = playIndex;
        const realIndex = selectedIndices[currentPlayIndex];
        const item = currentNote.items[realIndex];

        $emptyState.style.display = 'none';
        $screenContent.style.display = 'block'; 
        $playerControls.style.display = 'flex'; 
        $screenContent.scrollTop = 0;

        updateCompleteButtonUI(item.checked);
        setContentOrHide('play-lead', item.lead);
        
        let probClean = item.problem ? item.problem.replace(/<p><br><\/p>/gi, '').replace(/<p>&nbsp;<\/p>/gi, '').trim() : '';
        const hasProb = !isEmptyHTML(probClean);
        
        document.getElementById('prob-container').style.display = hasProb ? 'flex' : 'none';
        if(hasProb) {
            document.getElementById('play-prob-num').textContent = `${realIndex + 1}.`;
            setContentOrHide('play-prob', item.problem);
        }

        setContentOrHide('play-conc', item.concept);
        const hasSol = setContentOrHide('play-sol', item.solution);
        document.getElementById('sol-divider').style.display = hasSol ? 'block' : 'none';

        document.querySelectorAll('.ql-editor img').forEach(img => {
            img.onclick = (e) => {
                document.getElementById('modal-image').src = e.target.src;
                document.getElementById('image-modal').classList.add('show');
            };
        });

        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
        const activeEl = document.getElementById(`list-item-${realIndex}`);
        if(activeEl) { activeEl.classList.add('active'); activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
        
        updateCounter();
        document.getElementById('progress-fill').style.width = '0%';
        document.getElementById('progress-fill').style.transition = 'none';

        speakCurrentSlide(item, realIndex);
    }

    function showEmpty() {
        $emptyState.style.display = 'flex';
        $screenContent.style.display = 'none';
        $playerControls.style.display = 'none'; 
        document.getElementById('status-counter').textContent = '0 / 0';
        document.getElementById('progress-fill').style.width = '0%';
        if (typeof speechSynthesis !== 'undefined') speechSynthesis.cancel();
    }

    function updateCounter() {
        let cur = (currentPlayIndex + 1).toString().padStart(2, '0');
        let tot = selectedIndices.length.toString().padStart(2, '0');
        document.getElementById('status-counter').textContent = `${cur} / ${tot}`;
    }

    function playNext() {
        if(selectedIndices.length === 0) return stopPlay();
        currentPlayIndex = currentPlayIndex + 1 >= selectedIndices.length ? 0 : currentPlayIndex + 1;
        showSlide(currentPlayIndex);
        if(isPlaying) resetProgressTimer();
    }

    function playPrev() {
        if(selectedIndices.length === 0) return;
        currentPlayIndex = currentPlayIndex - 1 < 0 ? selectedIndices.length - 1 : currentPlayIndex - 1;
        showSlide(currentPlayIndex);
        if(isPlaying) resetProgressTimer();
    }

    function startPlay() {
        if(selectedIndices.length === 0) return alert('재생할 항목을 선택하세요.');
        if(currentPlayIndex === -1) currentPlayIndex = 0;
        isPlaying = true;
        slideDuration = parseInt(document.getElementById('speed-select').value);
        
        document.getElementById('btn-play').style.display = 'none';
        document.getElementById('btn-stop').style.display = 'flex';
        
        showSlide(currentPlayIndex);
        resetProgressTimer();
    }

    function stopPlay() {
        isPlaying = false;
        clearInterval(playInterval);
        clearInterval(progressInterval);
        document.getElementById('btn-play').style.display = 'flex';
        document.getElementById('btn-stop').style.display = 'none';
        document.getElementById('progress-fill').style.width = '0%';
        document.getElementById('progress-fill').style.transition = 'none';
        if (typeof speechSynthesis !== 'undefined') speechSynthesis.cancel();
    }

    function resetProgressTimer() {
        clearInterval(playInterval); clearInterval(progressInterval);
        if (isTtsEnabled) return;

        startTime = Date.now();
        document.getElementById('progress-fill').style.transition = 'width 0.1s linear';
        
        progressInterval = setInterval(() => {
            let percent = ((Date.now() - startTime) / slideDuration) * 100;
            if(percent > 100) percent = 100;
            document.getElementById('progress-fill').style.width = `${percent}%`;
        }, 100);

        playInterval = setInterval(() => { playNext(); }, slideDuration);
    }

    document.getElementById('btn-play').onclick = startPlay;
    document.getElementById('btn-stop').onclick = stopPlay;
    document.getElementById('btn-next').onclick = () => { if(isPlaying) stopPlay(); playNext(); };
    document.getElementById('btn-prev').onclick = () => { if(isPlaying) stopPlay(); playPrev(); };
    document.getElementById('speed-select').onchange = (e) => { if(isPlaying) { slideDuration = parseInt(e.target.value); resetProgressTimer(); } };

    document.getElementById('btn-tts-toggle').onclick = function() {
        isTtsEnabled = !isTtsEnabled;
        const icon = this.querySelector('i');
        const speedSelect = document.getElementById('speed-select');
        
        if(isTtsEnabled) {
            this.classList.add('tts-active');
            icon.className = 'fas fa-volume-high';
            speedSelect.disabled = true;
            
            if(isPlaying) {
                clearInterval(playInterval);
                clearInterval(progressInterval);
                document.getElementById('progress-fill').style.width = '0%';
            }

            if(selectedIndices.length > 0 && currentPlayIndex !== -1) {
                const realIndex = selectedIndices[currentPlayIndex];
                speakCurrentSlide(currentNote.items[realIndex], realIndex);
            }
        } else {
            this.classList.remove('tts-active');
            icon.className = 'fas fa-volume-xmark';
            speedSelect.disabled = false;
            if (typeof speechSynthesis !== 'undefined') speechSynthesis.cancel();

            if(isPlaying) resetProgressTimer();
        }
    };

    function toggleImmersiveMode() {
        document.body.classList.toggle('immersive');
        document.body.classList.remove('presentation');
        const icon = document.querySelector('#btn-immersive-toggle i');
        if(document.body.classList.contains('immersive')) {
            icon.className = 'fas fa-compress';
        } else {
            icon.className = 'fas fa-expand';
        }
    }

    document.getElementById('btn-immersive-toggle').onclick = toggleImmersiveMode;

    document.addEventListener('keydown', (e) => {
        if (e.key === '`') {
            const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
            const isEditable = document.activeElement && document.activeElement.isContentEditable;
            const isInput = activeTag === 'input' || activeTag === 'textarea' || isEditable;
            
            if (!isInput) {
                e.preventDefault();
                window.location.href = 'about:blank';
                return;
            }
        }

        if($rangeModal.style.display === 'flex' || $settingsModal.style.display === 'flex') return;

        if (e.ctrlKey && e.key.toLowerCase() === 'm') {
            e.preventDefault();
            document.body.classList.toggle('presentation');
            document.body.classList.remove('immersive');
            return;
        }

        if(e.ctrlKey && e.key.toLowerCase() === 'h') { 
            e.preventDefault(); 
            toggleImmersiveMode();
            return; 
        }
        
        if (selectedIndices.length > 0) {
            if(e.key === 'ArrowRight') { e.preventDefault(); if(isPlaying && !isTtsEnabled) stopPlay(); playNext(); } 
            else if(e.key === 'ArrowLeft') { e.preventDefault(); if(isPlaying && !isTtsEnabled) stopPlay(); playPrev(); }
            else if(e.key === 'ArrowUp') { e.preventDefault(); $screenContent.scrollBy({ top: -80, behavior: 'smooth' }); }
            else if(e.key === 'ArrowDown') { e.preventDefault(); $screenContent.scrollBy({ top: 80, behavior: 'smooth' }); }
            else if(e.key === ' ') { e.preventDefault(); if($playerControls.style.display !== 'none') document.getElementById('btn-complete').click(); }
        }
    });

    window.onload = init;
</script>
</body>
</html>
