<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic Matrix</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root {
      --bg-app: #f4fbf6;        
      --bg-card: #ffffff;       
      --text-main: #1f2937;     
      --text-muted: #6b7280;    
      --border-light: #e5e7eb;
      --brand: #10b981;         
      --brand-hover: #059669;   
      --delete-bg: #6b7280;     
      --delete-hover: #4b5563;  
      --radius-lg: 12px;
      --radius-md: 8px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
    body { margin: 0; padding: 20px; background: var(--bg-app); color: var(--text-main); display: flex; flex-direction: column; gap: 20px; height: 100vh; overflow: hidden; }
    
    .header { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 16px 24px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
    .header h1 { margin: 0; font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn { background: var(--brand); color: #fff; border: none; padding: 8px 16px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; white-space: nowrap; }
    .btn:hover { background: var(--brand-hover); }
    .btn.outline { background: #fff; color: var(--text-main); border: 1px solid var(--border-light); }
    .btn.outline:hover { background: #f9fafb; }
    .btn.delete { background: var(--delete-bg); color: #fff; }
    .btn.delete:hover { background: var(--delete-hover); }
    
    .container { display: flex; gap: 20px; flex: 1; overflow: hidden; }
    
    .matrix-section { flex: 2; background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; overflow: hidden; }
    
    /* 카테고리 탭 스타일 */
    .category-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; border-bottom: 1px solid var(--border-light); }
    .category-tab { padding: 8px 16px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.2s; }
    .category-tab:hover { color: var(--text-main); }
    .category-tab.active { color: var(--brand); border-bottom: 2px solid var(--brand); }

    .matrix-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .matrix-header h2 { margin: 0; font-size: 16px; }
    
    .table-wrapper { flex: 1; overflow: auto; border: 1px solid var(--border-light); border-radius: var(--radius-md); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: center; }
    thead th { position: sticky; top: 0; background: #f8fafc; padding: 12px; border-bottom: 1px solid var(--border-light); font-weight: 600; color: var(--text-muted); z-index: 10; }
    
    /* 행 전체 커서 속성(손모양) 제거 */
    tbody td { padding: 12px; border-bottom: 1px solid #f1f5f9; color: var(--text-main); }
    tbody tr { transition: background-color 0.2s; } 
    tbody tr:hover { background: #f0fdf4; }
    
    /* 드래그 앤 드롭 스타일 */
    tbody tr.dragging { opacity: 0.5; background-color: #f8fafc; }
    tbody tr.drag-over { border-top: 2px dashed var(--brand); }

    /* 닷(점) 클릭 영역 확장 및 커서 설정 */
    .dot { 
      position: relative;
      width: 12px; height: 12px; 
      background-color: var(--text-main); 
      border-radius: 50%; 
      display: inline-block; 
      cursor: pointer; 
      transition: transform 0.2s, background-color 0.2s; 
    }
    .dot::after {
      content: '';
      position: absolute;
      top: -12px; left: -12px; right: -12px; bottom: -12px;
      border-radius: 50%;
    }
    .dot:hover { transform: scale(1.5); background-color: var(--brand); }

    /* 드래그 아이콘(≡)에만 손 모양 커서 적용 */
    .drag-handle { cursor: grab; padding-right: 8px; color: #9ca3af; font-size: 16px; user-select: none; display: inline-block; }
    .drag-handle:active { cursor: grabbing; }

    .topic-name { cursor: pointer; transition: color 0.2s; display: inline-block; padding: 4px 0; font-weight: 600; }
    .topic-name:hover { color: var(--brand); text-decoration: underline; }

    .viewer-section { flex: 1; background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; overflow: hidden; }
    .viewer-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid var(--brand); padding-bottom: 12px; margin-bottom: 16px; }
    .viewer-header h2 { margin: 0; font-size: 16px; }
    
    .chip-label { font-size: 12px; font-weight: 600; background: #fff; border: 1px solid var(--border-light); border-radius: 20px; padding: 4px 12px; cursor: pointer; user-select: none; transition: 0.2s; color: var(--text-muted); display: inline-flex; align-items: center; justify-content: center; }
    .chip-label input:checked + span { color: var(--brand); }
    .chip-label:has(input:checked) { border-color: var(--brand); background: #f0fdf4; }
    .chip-label:hover { border-color: #cbd5e1; }

    .question-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 8px; }
    
    /* === 개별 문제 고정 UI 스타일 === */
    .question-card { position: relative; border: 1px solid var(--border-light); padding: 16px; border-radius: var(--radius-md); background: #fafafa; transition: border-color 0.2s, box-shadow 0.2s; cursor: pointer; }
    .question-card:hover { border-color: #cbd5e1; }
    .question-card.pinned { border-color: var(--brand); box-shadow: 0 0 0 1px var(--brand); background: #ffffff; }
    .question-card.pinned:hover { border-color: var(--brand-hover); }
    
    .question-meta { font-size: 13px; color: var(--brand); font-weight: 700; margin-bottom: 8px; display: flex; gap: 6px; }
    .question-text { font-size: 14px; line-height: 1.6; word-break: keep-all; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal-content { background: #fff; width: 400px; max-width: 90%; padding: 24px; border-radius: var(--radius-lg); }
    .modal-content h3 { margin-top: 0; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border-light); border-radius: var(--radius-md); font-size: 14px; }
    
    /* 토픽 리스트(셀렉트 박스) 스타일 */
    .topic-list-select { height: 180px; overflow-y: auto; padding: 8px; outline: none; }
    .topic-list-select optgroup { font-weight: 700; color: var(--brand); margin-top: 8px; margin-bottom: 4px; }
    .topic-list-select option { padding: 6px 12px; color: var(--text-main); margin-bottom: 2px; border-radius: 4px; cursor: pointer; }
    .topic-list-select option:checked { background-color: #f0fdf4; color: var(--brand); font-weight: 700; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    #toast {
      visibility: hidden; min-width: 250px; background-color: rgba(31, 41, 55, 0.9); color: #fff;
      text-align: center; border-radius: 30px; padding: 12px 24px; position: fixed; z-index: 1000;
      left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 14px; font-weight: 600;
      box-shadow: var(--shadow-md); opacity: 0; transition: opacity 0.3s, visibility 0.3s, transform 0.3s;
    }
    #toast.show { visibility: visible; opacity: 1; transform: translate(-50%, -10px); }

    /* === 전체 스크롤 영역 이미지 캡처를 위한 임시 스타일 === */
    body.capture-mode, 
    body.capture-mode .container, 
    body.capture-mode .matrix-section, 
    body.capture-mode .table-wrapper {
      height: auto !important;
      min-height: auto !important;
      max-height: none !important;
      overflow: visible !important;
    }
    body.capture-mode thead th {
      position: static !important; /* 캡처 중 스티키 헤더 오류 방지 */
    }

    @media (max-width: 768px) {
      body { height: auto; overflow-y: auto; padding: 10px; }
      .header { flex-direction: column; align-items: stretch; gap: 16px; padding: 16px; }
      .header h1 { justify-content: center; }
      .header-actions { flex-wrap: wrap; justify-content: center; }
      .header-actions .btn { flex: 1 1 calc(33.333% - 8px); text-align: center; padding: 10px 8px; font-size: 13px; }
      .header-actions .divider { display: none; }
      .container { flex-direction: column; height: auto; overflow: visible; }
      .matrix-section, .viewer-section { flex: none; height: 60vh; min-height: 400px; }
      .matrix-header, .viewer-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .viewer-header { align-items: stretch; }
      #categoryFilter { justify-content: flex-start; }
    }
    @media (max-width: 480px) { .header-actions .btn { flex: 1 1 calc(50% - 8px); } }
  </style>
</head>
<body>

  <div id="toast">알림 메시지</div>

  <div class="header">
    <h1>📊 Topic Matrix</h1>
    <div class="header-actions">
      <input type="file" id="excelInput" accept=".xlsx, .xls" style="display: none;" onchange="handleExcelUpload(event)">
      <!-- 토픽 이동 버튼 추가 -->
      <button class="btn outline" onclick="openMoveTopicModal()">🔄 토픽 이동</button>
      <button class="btn outline" onclick="downloadExcelTemplate()">📄 양식 다운</button>
      <button class="btn outline" onclick="document.getElementById('excelInput').click()">📤 엑셀 업로드</button>
      <button class="btn outline" onclick="exportTopicsToExcel()">📥 엑셀 다운</button>
      <div class="divider" style="width: 1px; background: var(--border-light); margin: 0 4px; height: 100%;"></div>
      <button class="btn outline" onclick="openSettingsModal()">⚙️ 환경설정</button>
      <button class="btn" onclick="openTopicModal()" title="단축키: Alt+L">+ 새 토픽 추가</button>
    </div>
  </div>

  <div class="container">
    <div class="matrix-section" id="matrixSection">
      <!-- 6대 출제기준 카테고리 탭 (캡처 시 숨김) -->
      <div class="category-tabs" id="categoryTabs" data-html2canvas-ignore="true"></div>
      
      <div class="matrix-header">
        <h2 id="currentCategoryTitle">출제 매트릭스</h2>
        <button class="btn outline" style="padding: 6px 12px; font-size: 12px;" onclick="saveMatrixAsImage()" data-html2canvas-ignore="true">💾 이미지 저장</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr id="matrixHeader"></tr>
          </thead>
          <tbody id="matrixBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 기출문제 뷰어 -->
    <div class="viewer-section">
      <div class="viewer-header">
        <h2>문제 확인 보드</h2>
        <div id="categoryFilter" style="display: flex; gap: 6px; flex-wrap: wrap;">
          <label class="chip-label"><input type="checkbox" value="관리" onchange="renderFilteredQuestions()" style="display:none"><span>관리</span></label>
          <label class="chip-label"><input type="checkbox" value="응용" onchange="renderFilteredQuestions()" style="display:none"><span>응용</span></label>
          <label class="chip-label"><input type="checkbox" value="정보통신" onchange="renderFilteredQuestions()" style="display:none"><span>정보통신</span></label>
        </div>
      </div>
      
      <div id="viewerGuide" style="color: var(--text-muted); font-size: 14px; text-align: center; margin-top: 40px;">
        매트릭스의 <span class="dot" style="display:inline-block; width:10px; height:10px;"></span> 점을 클릭하면<br>해당 회차의 토픽 기출문제가 조회됩니다.
      </div>
      <div class="question-list" id="questionList" style="display: none;"></div>
    </div>
  </div>

  <!-- 토픽 카테고리 이동 모달 -->
  <div class="modal-overlay" id="moveTopicModal">
    <div class="modal-content">
      <h3>🔄 토픽 카테고리 이동</h3>
      <div class="form-group">
        <label>이동할 토픽 리스트 (클릭하여 선택)</label>
        <select id="moveTopicSelect" class="topic-list-select" size="8">
          <!-- JS로 동적 생성 -->
        </select>
      </div>
      <div class="form-group">
        <label>이동할 타겟 카테고리 (6대 출제 기준)</label>
        <select id="moveTargetCategory">
          <!-- JS로 동적 생성 -->
        </select>
      </div>
      <div style="display: flex; gap: 10px; margin-top: 24px;">
        <button class="btn outline" style="flex: 1;" onclick="closeMoveTopicModal()">취소</button>
        <button class="btn" style="flex: 1;" onclick="executeMoveTopic()">이동하기</button>
      </div>
    </div>
  </div>

  <!-- 환경설정 모달 -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal-content">
      <h3>매트릭스 환경설정</h3>
      <div class="form-group">
        <label>시작 회차</label>
        <input type="number" id="settingStartRound" placeholder="예: 129">
      </div>
      <div class="form-group">
        <label>종료 회차</label>
        <input type="number" id="settingEndRound" placeholder="예: 139">
      </div>
      <div style="display: flex; gap: 10px; margin-top: 24px;">
        <button class="btn outline" style="flex: 1;" onclick="closeSettingsModal()">취소</button>
        <button class="btn" style="flex: 1;" onclick="saveSettings()" title="단축키: Ctrl+S">저장</button>
      </div>
    </div>
  </div>

  <!-- 토픽 입력/수정 모달 -->
  <div class="modal-overlay" id="topicModal">
    <div class="modal-content">
      <h3 id="topicModalTitle">새 토픽 등록</h3>
      <div class="form-group">
        <label>출제 기준 (카테고리)</label>
        <select id="topicCategory"></select>
      </div>
      <div class="form-group">
        <label>토픽명 (예: ISP/ISMP)</label>
        <input type="text" id="topicName" placeholder="토픽명 입력">
      </div>
      <div class="form-group">
        <label>출제 회차 (콤마로 구분, 예: 129, 131, 138)</label>
        <input type="text" id="topicRounds" placeholder="예: 129, 131, 138">
      </div>
      <div class="form-group">
        <label>검색 키워드 (토픽뱅크 매칭용)</label>
        <input type="text" id="topicKeywords" placeholder="예: ISP, ISMP">
      </div>
      <div style="display: flex; gap: 10px; margin-top: 24px;">
        <button class="btn outline" style="flex: 1;" onclick="closeTopicModal()">취소</button>
        <button class="btn delete" id="btnDeleteTopic" style="flex: 1; display: none;" onclick="deleteTopic()">삭제</button>
        <button class="btn" style="flex: 1;" onclick="saveTopic()" title="단축키: Ctrl+S">저장</button>
      </div>
    </div>
  </div>

  <script>
    const DB_BANK_NAME = 'TopicBankDB'; 
    const DB_MATRIX_NAME = 'TopicMatrixDB';
    let dbBank = null;
    let dbMatrix = null;
    
    let startRound = 129;
    let endRound = 139;
    let baseRounds = [];
    
    const TOPIC_CATEGORIES = [
      "1. 정보 전략 및 관리", "2. 소프트웨어 공학", "3. 자료처리", 
      "4. 컴퓨터 시스템 및 정보통신", "5. 정보보안", "6. 최신기술, 법규 및 정책"
    ];
    let currentCategory = TOPIC_CATEGORIES[0];
    let currentCategoryTopics = [];
    let currentFetchedQuestions = [];
    let editingTopicId = null;
    let dragSrcEl = null;

    // === 토픽+회차별 개별 문제 고정 데이터 관리 ===
    let currentTopicId = null;
    let currentRound = null;
    let pinnedQuestionsList = []; // IndexedDB에서 로드하여 현재 활성화된 고정 데이터 보관

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.innerText = message;
      toast.className = "show";
      setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 1000); 
    }

    document.addEventListener('keydown', function(e) {
      if (e.altKey && e.key.toLowerCase() === 'l') { e.preventDefault(); openTopicModal(); }
      if (e.ctrlKey && e.key.toLowerCase() === 's') {
        e.preventDefault(); 
        if (document.getElementById('topicModal').style.display === 'flex') saveTopic();
        else if (document.getElementById('settingsModal').style.display === 'flex') saveSettings();
        else showToast('모든 변경사항이 안전하게 자동 보관 중입니다.');
      }
    });

    async function initApp() {
      initSettings();
      renderCategoryTabs();
      populateCategorySelects();
      await openBankDB();
      await openMatrixDB();
      renderMatrixHeader();
      loadMatrixData();
      
      // 개별 문제 카드 클릭(고정) 이벤트 위임
      document.getElementById('questionList').addEventListener('click', function(e) {
        const card = e.target.closest('.question-card');
        if (card) {
          const item = JSON.parse(decodeURIComponent(card.dataset.item));
          toggleQuestionPin(item);
        }
      });
    }

    function initSettings() {
      const savedStart = localStorage.getItem('matrixStartRound');
      const savedEnd = localStorage.getItem('matrixEndRound');
      if (savedStart) startRound = parseInt(savedStart, 10);
      if (savedEnd) endRound = parseInt(savedEnd, 10);
      updateBaseRounds();
    }

    function updateBaseRounds() {
      baseRounds = [];
      for (let i = startRound; i <= endRound; i++) { baseRounds.push(i); }
    }

    function renderCategoryTabs() {
      const tabsContainer = document.getElementById('categoryTabs');
      tabsContainer.innerHTML = TOPIC_CATEGORIES.map(cat => 
        `<div class="category-tab ${cat === currentCategory ? 'active' : ''}" onclick="changeCategory('${cat}')">${cat}</div>`
      ).join('');
      document.getElementById('currentCategoryTitle').innerText = currentCategory;
    }

    function populateCategorySelects() {
      const select = document.getElementById('topicCategory');
      select.innerHTML = TOPIC_CATEGORIES.map(cat => `<option value="${cat}">${cat}</option>`).join('');
    }

    function changeCategory(categoryName) {
      currentCategory = categoryName;
      renderCategoryTabs();
      loadMatrixData();
    }

    function openSettingsModal() {
      document.getElementById('settingStartRound').value = startRound;
      document.getElementById('settingEndRound').value = endRound;
      document.getElementById('settingsModal').style.display = 'flex';
    }

    function closeSettingsModal() { document.getElementById('settingsModal').style.display = 'none'; }

    function saveSettings() {
      const newStart = parseInt(document.getElementById('settingStartRound').value, 10);
      const newEnd = parseInt(document.getElementById('settingEndRound').value, 10);
      if (isNaN(newStart) || isNaN(newEnd) || newStart > newEnd) return alert('올바른 회차 범위를 입력해주세요.');
      startRound = newStart; endRound = newEnd;
      localStorage.setItem('matrixStartRound', startRound);
      localStorage.setItem('matrixEndRound', endRound);
      updateBaseRounds();
      closeSettingsModal();
      renderMatrixHeader();
      loadMatrixData();
      showToast('환경설정이 저장되었습니다.');
    }

    function openBankDB() {
      return new Promise((resolve) => {
        const req = indexedDB.open(DB_BANK_NAME, 1);
        req.onsuccess = (e) => { dbBank = e.target.result; resolve(); };
        req.onerror = () => { console.warn('TopicBankDB 연결 실패'); resolve(); };
      });
    }

    function openMatrixDB() {
      return new Promise((resolve) => {
        const req = indexedDB.open(DB_MATRIX_NAME, 1);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('topics')) {
            db.createObjectStore('topics', { keyPath: 'id' });
          }
          // 개별 문제 고정을 관리하는 테이블 생성 (키: `${topicId}_${round}`)
          if (!db.objectStoreNames.contains('pinned_questions')) {
            db.createObjectStore('pinned_questions', { keyPath: 'targetKey' });
          }
        };
        req.onsuccess = (e) => { dbMatrix = e.target.result; resolve(); };
      });
    }

    function renderMatrixHeader() {
      const headerRow = document.getElementById('matrixHeader');
      const thList = baseRounds.map(r => `<th>${r}</th>`).join('');
      headerRow.innerHTML = `<th style="text-align: left; width: 220px;">토픽</th>${thList}<th>계</th>`;
    }

    function loadMatrixData() {
      const tx = dbMatrix.transaction('topics', 'readonly');
      const store = tx.objectStore('topics');
      const req = store.getAll();

      req.onsuccess = (e) => {
        let allTopics = e.target.result || [];
        
        if (allTopics.length === 0 && !localStorage.getItem('matrixInitDone')) {
          localStorage.setItem('matrixInitDone', 'true');
          const dummy1 = { id: '1', category: TOPIC_CATEGORIES[0], name: 'ISP/ISMP', rounds: ['129', '131', '138', '139'], keywords: 'ISP, ISMP', order: 0 };
          const dummy2 = { id: '2', category: TOPIC_CATEGORIES[0], name: 'IT감리/PMO', rounds: ['129', '130', '131', '134', '136', '137'], keywords: '감리, PMO', order: 1 };
          allTopics = [dummy1, dummy2];
          const initTx = dbMatrix.transaction('topics', 'readwrite');
          initTx.objectStore('topics').put(dummy1);
          initTx.objectStore('topics').put(dummy2);
        }

        currentCategoryTopics = allTopics
          .filter(t => t.category === currentCategory || (!t.category && currentCategory === TOPIC_CATEGORIES[0]))
          .sort((a, b) => (a.order || 0) - (b.order || 0));

        const tbody = document.getElementById('matrixBody');
        tbody.innerHTML = '';

        currentCategoryTopics.forEach((topic, index) => {
          const tr = document.createElement('tr');
          tr.draggable = true;
          tr.dataset.id = topic.id;
          tr.dataset.index = index;

          tr.addEventListener('dragstart', handleDragStart);
          tr.addEventListener('dragover', handleDragOver);
          tr.addEventListener('dragenter', handleDragEnter);
          tr.addEventListener('dragleave', handleDragLeave);
          tr.addEventListener('drop', handleDrop);
          tr.addEventListener('dragend', handleDragEnd);

          let rowHtml = `<td style="text-align: left;">
            <span class="drag-handle" title="드래그하여 순서 변경" data-html2canvas-ignore="true">≡</span>
            <span class="topic-name" onclick="editTopic('${topic.id}')" title="클릭하여 수정">${topic.name}</span>
          </td>`;
          let totalCount = 0;

          baseRounds.forEach(round => {
            const strRound = String(round);
            const hasAppeared = topic.rounds.includes(strRound);
            if (hasAppeared) totalCount++;
            const cellContent = hasAppeared ? `<div class="dot" title="${round}회 기출문제 조회" onclick="fetchQuestions('${topic.id}', '${strRound}')"></div>` : ``;
            rowHtml += `<td>${cellContent}</td>`;
          });
          rowHtml += `<td style="font-weight: 700;">${totalCount}</td>`;
          tr.innerHTML = rowHtml;
          tbody.appendChild(tr);
        });
      };
    }

    // === 드래그 앤 드롭 ===
    function handleDragStart(e) { dragSrcEl = this; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', this.dataset.index); this.classList.add('dragging'); }
    function handleDragOver(e) { if (e.preventDefault) { e.preventDefault(); } e.dataTransfer.dropEffect = 'move'; return false; }
    function handleDragEnter(e) { this.classList.add('drag-over'); }
    function handleDragLeave(e) { this.classList.remove('drag-over'); }
    function handleDragEnd(e) { this.classList.remove('dragging'); document.querySelectorAll('#matrixBody tr').forEach(row => row.classList.remove('drag-over')); }
    function handleDrop(e) {
      if (e.stopPropagation) { e.stopPropagation(); }
      if (dragSrcEl !== this) {
        const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
        const toIndex = parseInt(this.dataset.index);
        const movedItem = currentCategoryTopics.splice(fromIndex, 1)[0];
        currentCategoryTopics.splice(toIndex, 0, movedItem);

        const tx = dbMatrix.transaction('topics', 'readwrite');
        const store = tx.objectStore('topics');
        currentCategoryTopics.forEach((topic, idx) => {
          topic.order = idx;
          store.put(topic);
        });
        tx.oncomplete = () => { loadMatrixData(); showToast('토픽 순서가 변경되었습니다.'); };
      }
      return false;
    }

    // === IndexedDB에 개별 문제 고정 토글 처리 ===
    function toggleQuestionPin(targetItem) {
      if (!currentTopicId || !currentRound) return;
      const mapKey = `${currentTopicId}_${currentRound}`;
      
      const existsIndex = pinnedQuestionsList.findIndex(p => p.problem === targetItem.problem && p.round === targetItem.round);
      if (existsIndex > -1) {
        pinnedQuestionsList.splice(existsIndex, 1);
        showToast('문제 고정이 해제되었습니다.');
      } else {
        pinnedQuestionsList.push(targetItem);
        showToast('문제가 고정되었습니다.');
      }
      
      // IndexedDB 저장/업데이트 트랜잭션
      const tx = dbMatrix.transaction('pinned_questions', 'readwrite');
      const store = tx.objectStore('pinned_questions');
      
      if (pinnedQuestionsList.length > 0) {
        store.put({ targetKey: mapKey, list: pinnedQuestionsList });
      } else {
        store.delete(mapKey);
      }

      tx.oncomplete = () => {
        renderFilteredQuestions();
      };
    }

    function fetchQuestions(topicId, round) {
      currentTopicId = topicId;
      currentRound = round;
      
      const guide = document.getElementById('viewerGuide');
      const list = document.getElementById('questionList');
      guide.style.display = 'none'; 
      list.style.display = 'flex';
      
      const topic = currentCategoryTopics.find(t => t.id === topicId);
      const keywords = topic ? topic.keywords : '';
      
      if (!dbBank) return list.innerHTML = `<div style="text-align:center; padding: 20px; color:red;">TopicBankDB 미연결</div>`;

      // 1. IndexedDB에서 해당 토픽_회차의 고정 데이터 로드
      const mTx = dbMatrix.transaction('pinned_questions', 'readonly');
      const mStore = mTx.objectStore('pinned_questions');
      const mapKey = `${topicId}_${round}`;
      const getReq = mStore.get(mapKey);

      getReq.onsuccess = (e) => {
        const data = e.target.result;
        pinnedQuestionsList = data ? data.list : [];

        // 2. 검색 키워드로 기출문제 DB 검색
        const tx = dbBank.transaction('items', 'readonly');
        const store = tx.objectStore('items');
        const req = store.getAll();

        req.onsuccess = (evt) => {
          const allItems = evt.target.result || [];
          const keywordArr = keywords.split(',').map(k => k.trim().toLowerCase()).filter(Boolean);
          
          currentFetchedQuestions = allItems.filter(item => {
            if (String(item.round) !== round) return false;
            const probText = String(item.problem || '').toLowerCase();
            
            return keywordArr.some(kw => {
              const escapedKw = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex = new RegExp('(^|[^a-z])' + escapedKw + '([^a-z]|$)');
              return regex.test(probText);
            });
          });
          renderFilteredQuestions();
        };
      };
    }

    function renderFilteredQuestions() {
      const list = document.getElementById('questionList');
      
      // IndexedDB에서 불러온 고정 리스트와 현재 조회된 결과 병합
      let combinedQuestions = [...pinnedQuestionsList];
      currentFetchedQuestions.forEach(item => {
        const isDuplicate = combinedQuestions.some(p => p.problem === item.problem && p.round === item.round);
        if (!isDuplicate) {
          combinedQuestions.push(item);
        }
      });

      if (combinedQuestions.length === 0) {
        return list.innerHTML = `<div style="text-align:center; padding: 40px; color:var(--text-muted);">해당 회차에 매칭되는 DB 문제가 없거나 고정된 문제가 없습니다.</div>`;
      }
      
      const checkedInputs = Array.from(document.querySelectorAll('#categoryFilter input:checked'));
      const selectedCats = checkedInputs.map(input => input.value);
      
      const matched = combinedQuestions.filter(item => {
        if (selectedCats.length === 0) return true;
        const cat = item.category?.trim() || '';
        return selectedCats.some(selected => cat.includes(selected));
      });

      if (matched.length === 0) {
        return list.innerHTML = `<div style="text-align:center; padding: 40px; color:var(--text-muted);">선택한 종목에 해당하는 문제가 없습니다.</div>`;
      }

      list.innerHTML = matched.map(item => {
        // 현재 아이템이 고정된 문제인지 확인
        const isItemPinned = pinnedQuestionsList.some(p => p.problem === item.problem && p.round === item.round);
        const itemJson = encodeURIComponent(JSON.stringify(item));
        
        return `
          <div class="question-card ${isItemPinned ? 'pinned' : ''}" data-item="${itemJson}" title="클릭하여 문제 고정/해제">
            <div class="question-meta"><span>제${item.round}회</span> | <span>${item.category || '종목미상'}</span> | <span>${item.type || '교시미상'}</span></div>
            <div class="question-text">${(item.problem || '').replace(/\n/g, '<br>')}</div>
          </div>
        `;
      }).join('');
    }

    // === 토픽 이동 기능 모달 ===
    function openMoveTopicModal() {
      const topicSelect = document.getElementById('moveTopicSelect');
      const targetCategorySelect = document.getElementById('moveTargetCategory');
      topicSelect.innerHTML = '';
      targetCategorySelect.innerHTML = TOPIC_CATEGORIES.map(cat => `<option value="${cat}">${cat}</option>`).join('');
      targetCategorySelect.value = currentCategory;

      const tx = dbMatrix.transaction('topics', 'readonly');
      const store = tx.objectStore('topics');
      const req = store.getAll();

      req.onsuccess = (e) => {
        const allTopics = e.target.result || [];
        if (allTopics.length === 0) return alert('이동할 토픽이 존재하지 않습니다.');

        TOPIC_CATEGORIES.forEach(cat => {
          const topicsInCat = allTopics.filter(t => (t.category || TOPIC_CATEGORIES[0]) === cat).sort((a,b) => (a.order||0) - (b.order||0));
          if (topicsInCat.length > 0) {
            const optgroup = document.createElement('optgroup');
            optgroup.label = `[${cat}]`;
            topicsInCat.forEach(t => {
              const option = document.createElement('option');
              option.value = t.id;
              option.text = t.name;
              optgroup.appendChild(option);
            });
            topicSelect.appendChild(optgroup);
          }
        });

        document.getElementById('moveTopicModal').style.display = 'flex';
      };
    }

    function closeMoveTopicModal() { document.getElementById('moveTopicModal').style.display = 'none'; }

    function executeMoveTopic() {
      const topicId = document.getElementById('moveTopicSelect').value;
      const targetCategory = document.getElementById('moveTargetCategory').value;

      if (!topicId) return alert('목록에서 이동할 토픽을 클릭하여 선택해주세요.');

      const tx = dbMatrix.transaction('topics', 'readwrite');
      const store = tx.objectStore('topics');
      const req = store.get(topicId);

      req.onsuccess = (e) => {
        const topic = e.target.result;
        if (topic) {
          topic.category = targetCategory;
          topic.order = 9999; 
          store.put(topic);
        }
      };

      tx.oncomplete = () => {
        closeMoveTopicModal();
        changeCategory(targetCategory); 
        showToast('토픽 카테고리가 변경되었습니다.');
      };
    }

    function openTopicModal() {
      editingTopicId = null;
      document.getElementById('topicModalTitle').innerText = '새 토픽 등록';
      document.getElementById('topicCategory').value = currentCategory;
      document.getElementById('topicName').value = '';
      document.getElementById('topicRounds').value = '';
      document.getElementById('topicKeywords').value = '';
      document.getElementById('btnDeleteTopic').style.display = 'none';
      document.getElementById('topicModal').style.display = 'flex'; 
      document.getElementById('topicName').focus(); 
    }

    function editTopic(id) {
      const tx = dbMatrix.transaction('topics', 'readonly');
      const store = tx.objectStore('topics');
      const req = store.get(id);
      req.onsuccess = (e) => {
        const topic = e.target.result;
        if (topic) {
          editingTopicId = topic.id;
          document.getElementById('topicModalTitle').innerText = '토픽 수정';
          document.getElementById('topicCategory').value = topic.category || TOPIC_CATEGORIES[0];
          document.getElementById('topicName').value = topic.name;
          document.getElementById('topicRounds').value = topic.rounds.join(', ');
          document.getElementById('topicKeywords').value = topic.keywords;
          document.getElementById('btnDeleteTopic').style.display = 'block';
          document.getElementById('topicModal').style.display = 'flex';
          document.getElementById('topicName').focus(); 
        }
      };
    }

    function closeTopicModal() { document.getElementById('topicModal').style.display = 'none'; }

    function saveTopic() {
      const category = document.getElementById('topicCategory').value;
      const name = document.getElementById('topicName').value.trim();
      const roundsRaw = document.getElementById('topicRounds').value.trim();
      const keywords = document.getElementById('topicKeywords').value.trim();

      if (!name || !roundsRaw) return alert('토픽명과 출제 회차는 필수 입력입니다.');

      const rounds = roundsRaw.split(',').map(r => r.trim()).filter(Boolean);
      const id = editingTopicId ? editingTopicId : 'TPC_' + Date.now();
      
      const targetTopic = { 
        id, category, name, rounds, 
        keywords: keywords || name, 
        order: editingTopicId ? undefined : currentCategoryTopics.length 
      };

      if(editingTopicId) {
          const existingTopic = currentCategoryTopics.find(t => t.id === editingTopicId);
          if(existingTopic) targetTopic.order = existingTopic.order;
      }

      const tx = dbMatrix.transaction('topics', 'readwrite');
      tx.objectStore('topics').put(targetTopic);
      tx.oncomplete = () => { 
        closeTopicModal(); 
        currentCategory = category; 
        renderCategoryTabs();
        loadMatrixData(); 
        showToast('토픽이 성공적으로 저장되었습니다.');
      };
    }

    function deleteTopic() {
      if (!editingTopicId) return;
      if (confirm('해당 토픽을 완전히 삭제하시겠습니까?')) {
        const tx = dbMatrix.transaction(['topics', 'pinned_questions'], 'readwrite');
        tx.objectStore('topics').delete(editingTopicId);
        
        // 해당 토픽의 모든 고정 기록도 함께 삭제 처리
        const pStore = tx.objectStore('pinned_questions');
        const request = pStore.openCursor();
        request.onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            if (cursor.key.startsWith(editingTopicId + '_')) {
              cursor.delete();
            }
            cursor.continue();
          }
        };

        tx.oncomplete = () => {
          closeTopicModal();
          loadMatrixData();
          showToast('토픽 및 고정 정보가 삭제되었습니다.');
        };
      }
    }

    function saveMatrixAsImage() {
      const targetElement = document.getElementById('matrixSection');
      document.body.classList.add('capture-mode');

      setTimeout(() => {
        html2canvas(targetElement, { 
          scale: 2, 
          backgroundColor: '#ffffff'
        }).then(canvas => {
          const link = document.createElement('a');
          link.download = `Topic_Matrix_${currentCategory.replace(/[.\s]/g,'_')}_${new Date().getTime()}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
          showToast('전체 화면 영역 이미지가 다운로드 되었습니다.');
        }).catch(err => {
          console.error('이미지 저장 오류:', err);
          alert('이미지 저장에 실패했습니다.');
        }).finally(() => {
          document.body.classList.remove('capture-mode');
        });
      }, 100);
    }

    function downloadExcelTemplate() {
      const ws_data = [
        ["카테고리", "순서", "토픽명", "출제회차(콤마구분)", "검색키워드(콤마구분)"],
        ["1. 정보 전략 및 관리", "0", "ISP/ISMP", "129, 131, 138, 139", "ISP, ISMP"],
        ["2. 소프트웨어 공학", "0", "디자인패턴", "129, 130", "패턴, GoF"]
      ];
      const ws = XLSX.utils.aoa_to_sheet(ws_data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "토픽양식");
      XLSX.writeFile(wb, "토픽_업로드_양식.xlsx");
      showToast("엑셀 양식이 다운로드 되었습니다.");
    }

    function handleExcelUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, {type: 'array'});
          const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
          if(json.length === 0) throw new Error("데이터가 없습니다.");
          
          const tx = dbMatrix.transaction('topics', 'readwrite');
          const store = tx.objectStore('topics');
          let addedCount = 0;

          json.forEach((row, idx) => {
            const catKey = Object.keys(row).find(k => k.includes('카테고리'));
            const orderKey = Object.keys(row).find(k => k.includes('순서'));
            const nameKey = Object.keys(row).find(k => k.includes('토픽'));
            const roundsKey = Object.keys(row).find(k => k.includes('회차'));
            const keywordsKey = Object.keys(row).find(k => k.includes('키워드'));
            
            if (nameKey && row[nameKey]) {
              const name = row[nameKey].toString().trim();
              if(name.startsWith("[예시]")) return; 
              const category = catKey && row[catKey] ? row[catKey].toString().trim() : TOPIC_CATEGORIES[0];
              const order = orderKey && row[orderKey] !== undefined ? parseInt(row[orderKey]) : idx;
              const roundsRaw = roundsKey && row[roundsKey] ? row[roundsKey].toString() : "";
              const rounds = roundsRaw.split(',').map(r => r.trim()).filter(Boolean);
              const keywords = keywordsKey && row[keywordsKey] ? row[keywordsKey].toString().trim() : name;
              const id = 'TPC_' + Date.now() + '_' + idx;
              store.put({ id, category, order, name, rounds, keywords });
              addedCount++;
            }
          });
          tx.oncomplete = () => { loadMatrixData(); showToast(`${addedCount}개의 토픽이 업로드 되었습니다.`); };
        } catch (err) { alert("오류: 양식을 확인해주세요.\n" + err.message); }
        event.target.value = ''; 
      };
      reader.readAsArrayBuffer(file);
    }

    function exportTopicsToExcel() {
      const tx = dbMatrix.transaction('topics', 'readonly');
      const store = tx.objectStore('topics');
      const req = store.getAll();
      req.onsuccess = (e) => {
        const topics = e.target.result || [];
        if (topics.length === 0) return alert("다운로드할 토픽 데이터가 없습니다.");
        
        topics.sort((a, b) => {
           if(a.category === b.category) return (a.order || 0) - (b.order || 0);
           return (a.category || "").localeCompare(b.category || "");
        });

        const ws_data = [["카테고리", "순서", "토픽명", "출제회차(콤마구분)", "검색키워드(콤마구분)"]];
        topics.forEach(t => ws_data.push([t.category || TOPIC_CATEGORIES[0], t.order || 0, t.name, t.rounds.join(', '), t.keywords]));

        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "TopicMatrix");
        XLSX.writeFile(wb, `Topic_Matrix_Backup_${new Date().getTime()}.xlsx`);
        showToast("토픽 매트릭스가 엑셀로 저장되었습니다.");
      };
    }

    window.onload = initApp;
  </script>
