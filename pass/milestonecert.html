<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LICENSE LOG</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sage: {
                            50: '#F7FBFA',
                            100: '#EEF5F3',
                            200: '#DDEBE7',
                            300: '#BDD4CD',
                            400: '#8FB4A8',
                            500: '#5C8D80',
                            600: '#4A7469',
                            700: '#35534B',
                        }

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            color: #334155; 
            background-color: #F8FAFC;
            background-image: radial-gradient(at 0% 0%, hsla(160, 20%, 96%, 1) 0, transparent 50%), radial-gradient(at 100% 100%, hsla(210, 20%, 96%, 1) 0, transparent 50%);

            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);
        }
        
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 24px;
            bottom: 80px;
            width: 2px;
            background: linear-gradient(to bottom, #DDEBE7, rgba(221, 235, 231, 0.2)); 
            z-index: 0;
            border-radius: 2px;
        }

        .shadow-premium { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.06); }
        .shadow-card { box-shadow: 0 4px 20px -2px rgba(0,0,0,0.03); }
    </style>
</head>
<body class="h-screen flex overflow-hidden selection:bg-sage-200 selection:text-sage-700">

    <aside class="w-[340px] bg-white/80 backdrop-blur-xl border-r border-slate-100 flex flex-col shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-20">
        <div class="p-7 pb-5">
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight flex items-center mb-7">
                <span class="bg-sage-500 text-white w-9 h-9 rounded-xl flex items-center justify-center mr-3 text-sm shadow-md shadow-sage-500/20">
                    <i class="fas fa-certificate"></i>
                </span>
                LICENSE LOG
            </h1>
            
            <div class="relative group">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-400 text-sm group-focus-within:text-sage-600 transition-colors"></i>
                <input type="text" id="project-search" placeholder="자격증 검색..." 
                    class="w-full bg-slate-50/50 hover:bg-slate-50 border border-slate-200 rounded-2xl pl-11 pr-4 py-3 text-sm text-slate-700 focus:outline-none focus:ring-4 focus:ring-sage-500/10 focus:border-sage-500 transition-all placeholder-slate-400 shadow-sm">
            </div>
        </div>

        <div class="px-7 pb-3 flex justify-between items-end">
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest px-1">My Certifications</p>
        </div>

        <div class="flex-1 overflow-y-auto px-5 space-y-2.5 pb-4 scrollbar-hide" id="project-list"></div>

        <div class="p-5 border-t border-slate-100 bg-white/50 backdrop-blur-md">
            <button onclick="openProjectModal()" class="w-full bg-white hover:bg-sage-50 text-sage-600 py-3.5 rounded-2xl text-sm font-semibold transition-all duration-300 flex items-center justify-center border border-sage-200 shadow-card hover:shadow-premium group">
                <i class="fas fa-plus mr-2 group-hover:rotate-90 transition-transform duration-300"></i> 새 자격증 추가
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative">
        
        <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 bg-white/40 backdrop-blur-sm z-0">
            <div class="w-28 h-28 bg-gradient-to-br from-sage-50 to-white rounded-full flex items-center justify-center mb-6 border border-sage-100 shadow-premium">

            </div>
            <h3 class="text-2xl font-bold text-slate-700 mb-3 tracking-tight">목표 자격증을 선택하세요</h3>
            <p class="text-slate-500 font-medium">좌측 사이드바에서 자격증을 선택하거나 새로 추가하여 일정을 관리하세요.</p>
        </div>

        <div id="main-content" class="hidden flex-col h-full relative z-10">
            <header class="glass-header px-10 py-8 sticky top-0 z-20">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <div class="flex items-center gap-2 mb-3">

                            <span class="text-xs font-bold text-sage-500 uppercase tracking-widest bg-sage-50 px-2.5 py-1 rounded-md border border-sage-100" id="header-status">접수기간 대기중</span>
                        </div>
                        <h2 class="text-4xl font-extrabold text-slate-800 tracking-tight leading-none mb-2" id="current-project-title"></h2>

                    </div>
                    <div class="text-right flex flex-col items-end justify-center bg-white border border-slate-100 rounded-3xl px-8 py-4 shadow-card">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">시험까지 남은 시간</span>
                        <div class="text-5xl font-black text-sage-600 tracking-tighter" id="header-d-day">-</div>
                    </div>
                </div>

                <div class="bg-white/80 backdrop-blur-md rounded-2xl border border-white shadow-premium p-1.5 flex justify-between items-center text-sm">
                    <div class="text-center px-6 py-4 flex-1 rounded-xl hover:bg-slate-50/50 transition-colors">
                        <div class="text-[11px] text-slate-400 font-bold uppercase tracking-wider mb-2">원서 접수</div>
                        <div class="font-bold text-slate-700 text-lg tracking-tight" id="date-reg"></div>
                    </div>
                    <div class="w-px h-12 bg-slate-100"></div>
                    <div class="text-center px-6 py-4 flex-1 rounded-xl hover:bg-red-50/30 transition-colors">
                        <div class="text-[11px] text-red-400 font-bold uppercase tracking-wider mb-2"><i class="fas fa-flag-checkered mr-1.5"></i>시험일</div>
                        <div class="font-bold text-red-500 text-lg tracking-tight" id="date-exam"></div>

                    <div class="w-px h-12 bg-slate-100"></div>

                <div class="flex justify-end gap-3 mt-6">

                    <button onclick="deleteCurrentProject()" class="text-slate-400 hover:text-red-500 hover:bg-red-50 px-4 py-2 rounded-xl text-sm font-semibold transition-all">
                        <i class="far fa-trash-alt mr-1.5"></i> 자격증 삭제

                    <button onclick="openMilestoneModal()" class="bg-gradient-to-r from-sage-500 to-sage-600 hover:from-sage-600 hover:to-sage-700 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all shadow-md shadow-sage-500/30 flex items-center hover:-translate-y-0.5">

            <div class="flex-1 overflow-y-auto px-10 py-8 scrollbar-hide">

                        </div>
                        <div class="w-14 h-14 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-400 group-hover:scale-110 transition-transform">
                            <i class="far fa-calendar-check text-xl"></i>
                        </div>
                    </div>
                    <div class="bg-white/80 backdrop-blur p-6 rounded-3xl shadow-card border border-white flex items-center justify-between group hover:shadow-premium transition-all">
                        <div>
                            <span class="text-amber-500 text-[11px] font-bold uppercase tracking-wider block mb-1">In Progress</span>
                            <strong class="text-3xl font-extrabold text-slate-700" id="stat-remain">0</strong>
                        </div>
                        <div class="w-14 h-14 rounded-2xl bg-amber-50 flex items-center justify-center text-amber-500 group-hover:scale-110 transition-transform">
                            <i class="fas fa-hourglass-half text-xl"></i>
                        </div>
                    </div>
                    <div class="bg-white/80 backdrop-blur p-6 rounded-3xl shadow-card border border-white flex items-center justify-between group hover:shadow-premium transition-all">
                        <div>
                            <span class="text-sage-600 text-[11px] font-bold uppercase tracking-wider block mb-1">Completed</span>
                            <strong class="text-3xl font-extrabold text-slate-700" id="stat-done">0</strong>
                        </div>
                        <div class="w-14 h-14 rounded-2xl bg-sage-50 flex items-center justify-center text-sage-600 group-hover:scale-110 transition-transform">

    <div id="project-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg p-9 border border-white transform transition-all scale-100">
            <h3 id="project-modal-title" class="text-2xl font-extrabold text-slate-800 mb-2 flex items-center tracking-tight">
                <i class="fas fa-id-card text-sage-500 mr-3"></i> 자격증 등록
            </h3>
            <p class="text-slate-500 text-sm mb-7 ml-8 font-medium">일정을 정확히 입력하면 D-Day가 자동 계산됩니다.</p>
            
            <form id="project-form" class="space-y-5">
                <input type="hidden" id="p-edit-id">
                
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">자격증 명</label>
                    <input type="text" id="p-name" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 focus:ring-4 focus:ring-sage-500/10 focus:border-sage-500 focus:bg-white outline-none transition-all text-slate-700 font-medium" placeholder="예: 정보처리기사 실기" required>
                </div>
                
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">접수 시작일</label>

                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">접수 마감일</label>

                    <div>
                        <label class="block text-[11px] font-bold text-red-400 uppercase tracking-widest mb-1.5 ml-1">시험일 (D-Day)</label>

                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-blue-400 uppercase tracking-widest mb-1.5 ml-1">합격자 발표일</label>
                        <input type="date" id="p-result-date" class="w-full bg-blue-50/50 border border-blue-100 rounded-2xl px-5 py-3.5 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-400 focus:bg-white outline-none text-slate-700 transition-all" required>

                <div>

                    <input type="text" id="p-desc" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 focus:ring-4 focus:ring-sage-500/10 focus:border-sage-500 focus:bg-white outline-none transition-all text-slate-700" placeholder="예: 80점 이상 목표, 기출 5회독">
                </div>

                <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-slate-100">
                    <button type="button" onclick="closeProjectModal()" class="px-6 py-3 text-slate-500 hover:bg-slate-100 rounded-2xl text-sm font-bold transition-colors">취소</button>
                    <button type="submit" class="px-8 py-3 bg-slate-800 text-white rounded-2xl hover:bg-slate-700 text-sm font-bold shadow-lg shadow-slate-800/20 transition-all hover:-translate-y-0.5">저장하기</button>

    <div id="milestone-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md p-9 border border-white">
            <h3 id="m-modal-title" class="text-2xl font-extrabold text-slate-800 mb-7 tracking-tight">일정 등록</h3>
            <form id="milestone-form">
                <input type="hidden" id="m-edit-id">
                <div class="space-y-5">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">일정 구분</label>
                        <input type="text" id="m-chapter" placeholder="예: 학원 특강, 온라인 강의, 스터디" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 focus:ring-4 focus:ring-sage-500/10 focus:border-sage-500 focus:bg-white outline-none transition-all text-slate-700 font-medium" required>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">일정 내용</label>
                        <input type="text" id="m-title" placeholder="예: 1과목 소프트웨어 설계 수강" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 focus:ring-4 focus:ring-sage-500/10 focus:border-sage-500 focus:bg-white outline-none transition-all text-slate-700 font-medium" required>
                    </div>
                    <div class="grid grid-cols-2 gap-5">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">일정 날짜</label>
                            <input type="date" id="m-date" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 focus:ring-4 focus:ring-sage-500/10 focus:border-sage-500 focus:bg-white outline-none transition-all text-slate-700" required>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">진행 상태</label>
                            <select id="m-status" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 focus:ring-4 focus:ring-sage-500/10 focus:border-sage-500 focus:bg-white outline-none transition-all text-slate-700 font-medium cursor-pointer">
                                <option value="pending">예정</option>
                                <option value="progress">진행 중</option>
                                <option value="done">완료</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-slate-100">
                    <button type="button" onclick="closeMilestoneModal()" class="px-6 py-3 text-slate-500 hover:bg-slate-100 rounded-2xl text-sm font-bold transition-colors">취소</button>
                    <button type="submit" class="px-8 py-3 bg-slate-800 text-white rounded-2xl hover:bg-slate-700 text-sm font-bold shadow-lg shadow-slate-800/20 transition-all hover:-translate-y-0.5">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const DB_NAME = 'CertLogDB';
        const DB_VERSION = 1; 
        const STORE_NAME = 'certifications';

        const dbService = {
            db: null,
            async open() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, DB_VERSION);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        }
                    };
                    req.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
                    req.onerror = (e) => reject(e.target.error);
                });
            },
            async getAllProjects() {
                return new Promise((resolve) => {
                    const tx = this.db.transaction([STORE_NAME], 'readonly');
                    tx.objectStore(STORE_NAME).getAll().onsuccess = (e) => resolve(e.target.result);
                });
            },
            async saveProject(project) {
                return new Promise((resolve) => {
                    const tx = this.db.transaction([STORE_NAME], 'readwrite');
                    tx.objectStore(STORE_NAME).put(project).onsuccess = (e) => resolve(e.target.result);
                });
            },
            async deleteProject(id) {
                return new Promise((resolve) => {
                    const tx = this.db.transaction([STORE_NAME], 'readwrite');
                    tx.objectStore(STORE_NAME).delete(id).onsuccess = () => resolve();
                });
            }
        };

        let projects = [];
        let activeProjectId = null;
        const projectListEl = document.getElementById('project-list');
        const searchInput = document.getElementById('project-search');

        const getDDay = (targetDate) => {
            const today = new Date();
            today.setHours(0,0,0,0);
            const target = new Date(targetDate);
            target.setHours(0,0,0,0);
            const diff = target - today;
            const day = Math.ceil(diff / (1000 * 60 * 60 * 24));
            return day;
        };

        const formatDate = (dateStr) => {
            if(!dateStr) return '-';
            const d = new Date(dateStr);
            return `${d.getMonth()+1}.${d.getDate()}`;
        };

        (async function init() {
            await dbService.open();
            await loadProjects();
        })();

        async function loadProjects() {
            projects = await dbService.getAllProjects();
            renderProjectList(searchInput.value);
            if(activeProjectId) renderMainContent();
        }

        function renderProjectList(filter = '') {
            projectListEl.innerHTML = '';
            const filtered = projects.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            
            if (filtered.length === 0) {
                projectListEl.innerHTML = `<div class="text-center text-xs font-medium text-slate-400 py-10 bg-slate-50 rounded-2xl border border-dashed border-slate-200">등록된 자격증이 없습니다.</div>`;
                return;
            }

            filtered.sort((a, b) => new Date(a.examDate) - new Date(b.examDate));

            filtered.forEach(p => {
                const isActive = p.id === activeProjectId;
                const dDay = getDDay(p.examDate);
                let dDayStr = dDay === 0 ? "D-Day" : (dDay > 0 ? `D-${dDay}` : "종료");
                let dDayClass = dDay <= 7 && dDay >= 0 ? "bg-red-50 text-red-500 font-bold" : "bg-slate-100 text-slate-500 font-medium";

                const activeClass = isActive 
                    ? 'bg-gradient-to-br from-sage-50 to-white border-sage-200 ring-1 ring-sage-200 shadow-sm' 
                    : 'bg-white border-white hover:border-slate-200 hover:shadow-card shadow-[0_2px_10px_rgba(0,0,0,0.01)]';

                projectListEl.insertAdjacentHTML('beforeend', `
                    <div onclick="selectProject(${p.id})" class="cursor-pointer p-4 rounded-2xl border mb-3 transition-all relative overflow-hidden group ${activeClass}">
                        <div class="flex justify-between items-start mb-2 gap-2">
                            <span class="font-bold text-[15px] text-slate-700 truncate leading-snug">${p.name}</span>
                            <span class="text-[10px] px-2 py-1 rounded-md shrink-0 ${dDayClass}">${dDayStr}</span>
                        </div>
                        <div class="flex items-center text-xs text-slate-400 font-medium gap-2">
                             <span><i class="far fa-calendar-alt mr-1"></i>${p.examDate}</span>
                        </div>
                        ${isActive ? '<div class="absolute left-0 top-0 bottom-0 w-1 bg-sage-500"></div>' : ''}
                    </div>
                `);
            });
        }

        searchInput.addEventListener('input', (e) => renderProjectList(e.target.value));
        window.selectProject = (id) => { activeProjectId = id; renderProjectList(searchInput.value); renderMainContent(); };

        function renderMainContent() {
            const main = document.getElementById('main-content');
            const empty = document.getElementById('empty-state');
            const project = projects.find(p => p.id === activeProjectId);

            if (!project) {
                empty.classList.remove('hidden');
                main.classList.remove('flex');
                main.classList.add('hidden');
                return;
            }

            empty.classList.add('hidden');
            main.classList.remove('hidden');
            main.classList.add('flex');

            document.getElementById('current-project-title').innerText = project.name;
            document.getElementById('current-project-desc').innerHTML = project.desc ? `<i class="fas fa-bullseye text-sage-400 mr-2"></i> ${project.desc}` : '';
            
            const dDay = getDDay(project.examDate);
            const dDayEl = document.getElementById('header-d-day');
            
            if (dDay > 0) {
                dDayEl.innerText = dDay;
                dDayEl.className = "text-5xl font-black text-sage-600 tracking-tighter"; // D-Day 텍스트 가시성 개선
            } else if (dDay === 0) {
                dDayEl.innerText = "D-DAY";
                dDayEl.className = "text-5xl font-black text-red-500 tracking-tighter animate-pulse";
            } else {
                dDayEl.innerText = "END";
                dDayEl.className = "text-5xl font-black text-slate-300 tracking-tighter";
            }

            document.getElementById('date-reg').innerText = `${formatDate(project.regStart)} ~ ${formatDate(project.regEnd)}`;
            document.getElementById('date-exam').innerText = formatDate(project.examDate); 
            document.getElementById('date-result').innerText = formatDate(project.resultDate);

            const today = new Date().setHours(0,0,0,0);
            const regStart = new Date(project.regStart).setHours(0,0,0,0);
            const regEnd = new Date(project.regEnd).setHours(0,0,0,0);
            const exam = new Date(project.examDate).setHours(0,0,0,0);
            
            let statusText = "준비 중";
            let statusColor = "text-sage-600 bg-sage-50 border-sage-100";
            let dotColor = "bg-sage-500 shadow-[0_0_8px_rgba(92,141,128,0.6)]";
            
            if (today >= regStart && today <= regEnd) {
                statusText = "현재 접수 기간입니다";
                statusColor = "text-red-500 bg-red-50 border-red-100 animate-pulse";
                dotColor = "bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]";
            } else if (today > regEnd && today < exam) {
                statusText = "시험 준비 기간";
                statusColor = "text-amber-600 bg-amber-50 border-amber-100";
                dotColor = "bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.6)]";
            } else if (today === exam) {
                statusText = "D-DAY 시험일";
                statusColor = "text-white bg-red-500 border-red-600";
                dotColor = "bg-white shadow-[0_0_8px_rgba(255,255,255,0.8)]";
            } else if (today > exam) {
                statusText = "합격 발표 대기";
                statusColor = "text-blue-500 bg-blue-50 border-blue-100";
                dotColor = "bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.6)]";
            }

            const statusEl = document.getElementById('header-status');
            statusEl.innerText = statusText;
            statusEl.className = `text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-md border ${statusColor}`;
            statusEl.previousElementSibling.className = `w-2 h-2 rounded-full ${dotColor}`;

            renderMilestones(project);
        }

        function renderMilestones(project) {
            const listEl = document.getElementById('milestone-list');
            listEl.innerHTML = '';

            const sorted = [...project.milestones].sort((a, b) => new Date(a.date) - new Date(b.date));
            const total = sorted.length;
            const done = sorted.filter(m => m.status === 'done').length;
            const remain = sorted.filter(m => m.status === 'progress').length;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-done').innerText = done;
            document.getElementById('stat-remain').innerText = remain;

            if(total === 0) {
                listEl.classList.remove('timeline-line');
                listEl.innerHTML = `
                    <div class="text-center py-24 border-2 border-dashed border-slate-200 rounded-3xl bg-white/50 backdrop-blur-sm">
                        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="far fa-calendar-alt text-2xl text-slate-300"></i>
                        </div>
                        <p class="text-slate-500 font-bold mb-1">아직 등록된 일정이 없습니다.</p>
                        <button onclick="openMilestoneModal()" class="text-sm text-sage-600 font-bold hover:underline transition-all">첫 번째 일정 등록하기</button>
                    </div>`;
                return;
            }

            listEl.classList.add('timeline-line'); 

            sorted.forEach((item, idx) => {
                const st = {
                    'pending': { l: '예정', c: 'bg-slate-50 text-slate-500 ring-slate-200' },
                    'progress': { l: '진행중', c: 'bg-amber-50 text-amber-600 ring-amber-200' },
                    'done': { l: '완료', c: 'bg-sage-50 text-sage-600 ring-sage-200' }
                }[item.status];

                listEl.insertAdjacentHTML('beforeend', `
                    <div class="relative pl-8 group" style="animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) ${idx * 60}ms forwards; opacity: 0;">
                        <div class="absolute left-[13px] top-6 w-4 h-4 bg-white border-[3px] ${item.status === 'done' ? 'border-sage-500' : 'border-slate-200'} rounded-full z-10 transition-all duration-300 group-hover:border-sage-500 group-hover:scale-110 shadow-sm"></div>
                        <div class="bg-white/90 backdrop-blur-sm p-6 rounded-2xl border border-white shadow-card hover:shadow-premium hover:-translate-y-1 transition-all duration-300 flex flex-col md:flex-row justify-between gap-4 group-hover:border-sage-100/50">
                            <div>
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-[10px] font-extrabold text-sage-600 uppercase tracking-widest bg-sage-50 px-2 py-0.5 rounded-md border border-sage-100/50">${item.chapter}</span>
                                    <span class="text-xs text-slate-400 font-semibold">${item.date}</span>
                                </div>
                                <h3 class="text-lg font-bold text-slate-800 ${item.status === 'done' ? 'line-through text-slate-300' : ''} transition-colors">${item.title}</h3>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="px-3 py-1.5 rounded-lg text-xs font-bold uppercase ring-1 ring-inset ${st.c} shadow-sm">${st.l}</span>
                                <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-x-2 group-hover:translate-x-0">
                                    <button onclick="editMilestone(${item.id})" class="w-9 h-9 rounded-xl flex items-center justify-center bg-slate-50 border border-slate-100 hover:bg-sage-50 text-slate-400 hover:text-sage-600 hover:border-sage-200 transition-all shadow-sm"><i class="fas fa-pen text-[13px]"></i></button>
                                    <button onclick="deleteMilestone(${item.id})" class="w-9 h-9 rounded-xl flex items-center justify-center bg-slate-50 border border-slate-100 hover:bg-red-50 text-slate-400 hover:text-red-500 hover:border-red-200 transition-all shadow-sm"><i class="fas fa-trash text-[13px]"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                `);
            });
            
            if(!document.getElementById('anim-style')) {
                const style = document.createElement('style');
                style.id = 'anim-style';
                style.innerHTML = `@keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }`;
                document.head.appendChild(style);
            }
        }

        const pModal = document.getElementById('project-modal');
        const pForm = document.getElementById('project-form');
        const mModal = document.getElementById('milestone-modal');
        const mForm = document.getElementById('milestone-form');

        window.openProjectModal = () => { 
            pForm.reset(); 
            document.getElementById('p-edit-id').value = ''; 
            document.getElementById('project-modal-title').innerHTML = '<i class="fas fa-id-card text-sage-500 mr-3"></i> 자격증 등록';
            pModal.classList.remove('hidden'); 
        };

        window.editCurrentProject = () => {
            const project = projects.find(p => p.id === activeProjectId);
            if (!project) return;
            
            document.getElementById('p-edit-id').value = project.id;
            document.getElementById('p-name').value = project.name;
            document.getElementById('p-desc').value = project.desc || '';
            document.getElementById('p-reg-start').value = project.regStart;
            document.getElementById('p-reg-end').value = project.regEnd;
            document.getElementById('p-exam-date').value = project.examDate;
            document.getElementById('p-result-date').value = project.resultDate;
            
            document.getElementById('project-modal-title').innerHTML = '<i class="fas fa-pen-to-square text-sage-500 mr-3"></i> 자격증 정보 수정';
            pModal.classList.remove('hidden');
        };

        window.closeProjectModal = () => pModal.classList.add('hidden');
        window.closeMilestoneModal = () => mModal.classList.add('hidden');

        pForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('p-edit-id').value;
            
            let existingMilestones = [];
            if (editId) {
                const existingProject = projects.find(p => p.id === parseInt(editId));
                if (existingProject) existingMilestones = existingProject.milestones;
            }

            const projectData = { 
                id: editId ? parseInt(editId) : Date.now(), 
                name: document.getElementById('p-name').value, 
                desc: document.getElementById('p-desc').value,
                regStart: document.getElementById('p-reg-start').value,
                regEnd: document.getElementById('p-reg-end').value,
                examDate: document.getElementById('p-exam-date').value,
                resultDate: document.getElementById('p-result-date').value,
                milestones: existingMilestones 
            };
            
            await dbService.saveProject(projectData);
            await loadProjects();
            selectProject(projectData.id);
            closeProjectModal();
        });

        window.deleteCurrentProject = async () => {
            if(confirm('정말 삭제하시겠습니까? 기록된 모든 데이터가 사라집니다.')) {
                await dbService.deleteProject(activeProjectId);
                activeProjectId = null;
                await loadProjects();
            }
        };

        window.openMilestoneModal = (isEdit = false) => {
            if(!activeProjectId) return alert("자격증을 먼저 선택해주세요.");
            mModal.classList.remove('hidden');
            if(!isEdit) {
                mForm.reset();
                document.getElementById('m-edit-id').value = '';
                document.getElementById('m-modal-title').innerText = "일정 등록";
                document.getElementById('m-date').valueAsDate = new Date();
            }
        };

        mForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const project = projects.find(p => p.id === activeProjectId);
            const mId = document.getElementById('m-edit-id').value;
            const newData = {
                id: mId ? parseInt(mId) : Date.now(),
                chapter: document.getElementById('m-chapter').value,
                title: document.getElementById('m-title').value,
                date: document.getElementById('m-date').value,
                status: document.getElementById('m-status').value
            };
            
            if(mId) {
                const idx = project.milestones.findIndex(m => m.id === parseInt(mId));
                project.milestones[idx] = newData;
            } else {
                project.milestones.push(newData);
            }
            
            await dbService.saveProject(project);
            await loadProjects();
            closeMilestoneModal();
        });

        window.editMilestone = (mId) => {
            const project = projects.find(p => p.id === activeProjectId);
            const item = project.milestones.find(m => m.id === mId);
            document.getElementById('m-edit-id').value = item.id;
            document.getElementById('m-chapter').value = item.chapter;
            document.getElementById('m-title').value = item.title;
            document.getElementById('m-date').value = item.date;
            document.getElementById('m-status').value = item.status;
            document.getElementById('m-modal-title').innerText = "일정 수정";
            openMilestoneModal(true);
        };

        window.deleteMilestone = async (mId) => {
            if(!confirm('이 일정을 삭제하시겠습니까?')) return;
            const project = projects.find(p => p.id === activeProjectId);
            project.milestones = project.milestones.filter(m => m.id !== mId);
            await dbService.saveProject(project);
            await loadProjects();
        };
    </script>
</body>
</html>
