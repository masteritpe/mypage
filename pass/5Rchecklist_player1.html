<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>5R Learning Player</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css">
<style>
    :root {
        --bg-body: #0f172a;       
        --bg-panel: #f8fafc;      
        --bg-card: #ffffff;       
        --primary: #4f46e5;       
        --primary-hover: #4338ca;
        --primary-light: #e0e7ff;
        --success: #10b981;
        --success-hover: #059669;
        --success-light: #d1fae5;
        --danger: #ef4444;
        --danger-hover: #dc2626;
        --text-dark: #0f172a;
        --text-base: #334155;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --radius-lg: 20px;
        --radius-md: 12px;
        --radius-sm: 8px;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; outline: none; margin: 0; padding: 0; }
    body { font-family: 'Pretendard Variable', 'Noto Sans KR', sans-serif; background-color: var(--bg-body); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: all 0.3s ease; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .header-area { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px 16px 24px; flex-shrink: 0; gap: 16px; transition: all 0.3s ease; }
    .tabs-container { display: flex; gap: 8px; overflow-x: auto; flex: 1; padding-bottom: 4px; min-width: 0; }
    .tabs-container::-webkit-scrollbar { display: none; }
    .tab-btn { padding: 10px 20px; background: rgba(255, 255, 255, 0.1); color: #cbd5e1; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 100px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s ease; white-space: nowrap; flex-shrink: 0; }
    .tab-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
    .tab-btn.active { background: var(--primary); color: #ffffff; border-color: var(--primary); box-shadow: 0 0 15px rgba(79, 70, 229, 0.4); }
    
    .exit-btn { padding: 10px 18px; border-radius: 100px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #f8fafc; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .exit-btn:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

    .main-wrapper { flex: 1; display: flex; padding: 24px; gap: 24px; background: var(--bg-panel); border-radius: 24px 24px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.2); overflow: hidden; min-height: 0; transition: all 0.3s ease; }

    .sidebar { width: 320px; background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; box-shadow: var(--shadow-sm); transition: all 0.3s ease; }
    .sidebar-header { padding: 18px 20px; background: var(--bg-card); color: var(--text-dark); font-weight: 700; font-size: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .check-all-label { font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
    .check-all-label input[type="checkbox"] { accent-color: var(--primary); width: 16px; height: 16px; cursor: pointer; }
    
    .list-container { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 12px 0; }
    .list-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; margin: 0 12px 6px 12px; border-radius: var(--radius-sm); border-left: 4px solid transparent; cursor: pointer; transition: all 0.2s ease; }
    .list-item:hover { background: var(--bg-panel); }
    .list-item.active { background: var(--primary-light); border-left-color: var(--primary); box-shadow: var(--shadow-sm); }
    .list-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); flex-shrink: 0; }
    .list-item-title { flex: 1; font-size: 16px; color: var(--text-base); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
    .list-item.active .list-item-title { color: var(--primary); font-weight: 700; }
    
    .completed-text { color: #94a3b8 !important; text-decoration: line-through; }

    .player-area { flex: 1; display: flex; flex-direction: column; min-width: 0; gap: 16px; }
    
    .player-header { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 12px 24px; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); flex-shrink: 0; }
    .status-group { display: flex; align-items: center; gap: 24px; }
    .status-box { display: flex; flex-direction: row; align-items: center; gap: 10px; }
    .status-title { font-size: 12px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; }
    .status-value { font-size: 18px; font-weight: 800; color: var(--primary); }
    
    .speed-select { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 14px; font-weight: 600; color: var(--text-base); outline: none; cursor: pointer; background: var(--bg-panel); transition: 0.2s; }
    .speed-select:hover { border-color: #cbd5e1; }

    .screen { flex: 1; background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; position: relative; min-height: 0; box-shadow: var(--shadow-md); }
    .progress-bar { height: 4px; background: var(--border); width: 100%; position: absolute; top: 0; left: 0; z-index: 5; flex-shrink: 0; }
    .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.1s linear; }
    
    .screen-content { flex: 1; padding: 40px 60px; overflow-y: auto; display: block; scroll-behavior: smooth; }
    
    .play-title { font-size: 32px; font-weight: 800; color: var(--text-dark); text-align: center; margin-bottom: 24px; line-height: 1.4; word-break: keep-all; white-space: pre-wrap; }
    .play-desc { font-size: 18px; line-height: 1.7; color: var(--text-base); margin-bottom: 32px; text-align: left; word-break: keep-all; font-weight: 400; white-space: pre-wrap; }
    
    .play-extra-box { background: #f8fafc; border-radius: var(--radius-md); padding: 24px; margin-top: 20px; border: 1px solid var(--border); }
    .play-extra-title { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .play-extra-content { font-size: 16px; color: var(--text-base); line-height: 1.6; white-space: pre-wrap; text-align: left; }
    
    .play-images { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin-top: 40px; }
    
    /* 이미지 클릭 효과 및 스타일 수정 */
    .play-images img { 
        max-width: 100%; max-height: 350px; border-radius: var(--radius-md); 
        box-shadow: var(--shadow-md); border: 1px solid var(--border); 
        cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .play-images img:hover {
        transform: scale(1.03);
        box-shadow: var(--shadow-lg);
        z-index: 2;
    }
    
    mark { background: #fef08a; padding: 2px 6px; border-radius: 4px; color: #1e293b; font-weight: 600; }
    red { color: var(--danger); font-weight: 600; } blue { color: var(--primary); font-weight: 600; } green { color: var(--success); font-weight: 600; }

    .controls { padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border); flex-shrink: 0; }
    .ctrl-group { display: flex; gap: 12px; align-items: center; }
    
    .nav-btn { width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-muted); font-size: 16px; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; box-shadow: var(--shadow-sm); }
    .nav-btn:hover:not(:disabled) { background: var(--bg-panel); color: var(--text-dark); border-color: #cbd5e1; }
    .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

    .action-btn { padding: 14px 28px; border-radius: 100px; border: none; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-sm); }
    
    .btn-complete { background: var(--success-light); color: var(--success-hover); border: 1px solid #a7f3d0; }
    .btn-complete:hover { background: var(--success); color: #fff; border-color: var(--success); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    
    .btn-undo { background: var(--bg-panel); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-undo:hover { background: #e2e8f0; color: var(--text-dark); border-color: #cbd5e1; transform: translateY(-1px); box-shadow: var(--shadow-md); }
    
    .btn-play { background: var(--primary); color: #fff; }
    .btn-play:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-stop { background: var(--danger); color: #fff; }
    .btn-stop:hover { background: var(--danger-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }

    .empty-state { position: absolute; inset: 0; background: var(--bg-card); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; text-align: center; }
    .empty-state-icon { width: 80px; height: 80px; border-radius: 50%; background: var(--bg-panel); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    .empty-state i { font-size: 40px; color: #cbd5e1; }
    .empty-state p.main-text { font-size: 20px; font-weight: 700; color: var(--text-base); margin-bottom: 8px; }
    .empty-state p.sub-text { font-size: 15px; color: var(--text-muted); }

    /* --- 몰입 모드 (Ctrl + H키) --- */
    body.immersive .header-area { display: none !important; }
    body.immersive .sidebar { display: none !important; }
    body.immersive .main-wrapper { border-radius: 0; padding: 16px; }

    /* --- 프리젠테이션 모드 (Ctrl + M 키) --- */
    body.presentation .header-area { display: none !important; }
    body.presentation .sidebar { display: none !important; }
    body.presentation .player-header { display: none !important; }
    body.presentation .controls { display: none !important; }
    body.presentation .main-wrapper { padding: 0 !important; border-radius: 0; box-shadow: none; background: var(--bg-card); }
    body.presentation .screen { border-radius: 0; border: none; box-shadow: none; }

    /* 이미지 전체화면 모달 */
    .image-modal {
        display: none; 
        position: fixed; 
        z-index: 9999; 
        left: 0; top: 0; 
        width: 100%; height: 100%; 
        background-color: rgba(0,0,0,0.85); 
        backdrop-filter: blur(5px);
        justify-content: center; 
        align-items: center; 
        flex-direction: column;
        opacity: 0;
        transition: opacity 0.3s ease;
    }
    .image-modal.show {
        display: flex;
        opacity: 1;
    }
    .image-modal img {
        max-width: 90%; 
        max-height: 90vh; 
        border: 4px solid #fff; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        border-radius: var(--radius-md);
        object-fit: contain;
    }
    .modal-close {
        position: absolute; 
        top: 20px; 
        right: 30px; 
        color: #fff; 
        font-size: 40px; 
        font-weight: bold; 
        cursor: pointer; 
        transition: color 0.2s;
        z-index: 10000;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    .modal-close:hover { color: #cbd5e1; }
</style>
</head>
<body>

<div class="header-area">
    <div class="tabs-container" id="domain-tabs"></div>
    <button class="exit-btn" onclick="window.location.href='5Rchecklist.html'"><i class="fas fa-sign-out-alt"></i> 에디터 복귀</button>
</div>

<div class="main-wrapper">
    <div class="sidebar">
        <div class="sidebar-header">
            <span><i class="fas fa-list-ul"></i> 전체 학습 항목</span>
            <label class="check-all-label"><input type="checkbox" id="check-all"> 전체선택</label>
        </div>
        <div class="list-container" id="topic-list"></div>
    </div>

    <div class="player-area">
        <div class="player-header">
            <div class="status-group">
                <div class="status-box">
                    <div class="status-title">학습 진행률</div>
                    <div class="status-value" id="status-counter">0 / 0</div>
                </div>
            </div>
            <div class="status-box">
                <div class="status-title" style="margin-right:4px;"><i class="fas fa-stopwatch"></i> 재생 속도</div>
                <select id="speed-select" class="speed-select">
                    <option value="3000">3초</option>
                    <option value="5000" selected>5초</option>
                    <option value="8000">8초</option>
                    <option value="15000">15초</option>
                </select>
            </div>
        </div>

        <div class="screen">
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

            <div id="empty-state" class="empty-state">
                <div class="empty-state-icon"><i class="fas fa-layer-group"></i></div>
                <p class="main-text">선택된 학습 대상이 없습니다.</p>
                <p class="sub-text">좌측 리스트에서 복습할 항목을 체크해주세요.</p>
            </div>

            <div class="screen-content" id="screen-content" style="display: none;">
                <div class="play-title" id="play-title">제목</div>
                <div class="play-desc" id="play-desc">내용</div>
                <div id="play-extra-container" class="play-extra-box" style="display:none;">
                    <div class="play-extra-title"><i class="fas fa-lightbulb"></i> 암기팁 & 노트</div>
                    <div class="play-extra-content" id="play-extra"></div>
                </div>
                <div class="play-images" id="play-images"></div>
            </div>

            <div class="controls">
                <div class="ctrl-group">
                    <button class="nav-btn" id="btn-prev" title="이전 (←)"><i class="fas fa-arrow-left"></i></button>
                    <button class="nav-btn" id="btn-next" title="다음 (→)"><i class="fas fa-arrow-right"></i></button>
                </div>
                
                <button class="action-btn btn-complete" id="btn-complete" title="스페이스바를 누르면 상태를 변경합니다">
                    <i class="fas fa-check"></i> 암기 완료 (Space)
                </button>

                <div class="ctrl-group">
                    <button class="action-btn btn-play" id="btn-play"><i class="fas fa-play"></i> 자동 재생</button>
                    <button class="action-btn btn-stop" id="btn-stop" style="display:none;"><i class="fas fa-stop"></i> 정지</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="image-modal" class="image-modal">
    <span class="modal-close" id="modal-close">&times;</span>
    <img id="modal-image" src="" alt="확대된 이미지">
</div>

<script src="5R_core.js"></script>
<script>
    const S = window.SELTE;

    let allItems = [];
    let currentDomain = '';
    let filteredItems = [];
    let selectedIndices = []; 
    let currentPlayIndex = -1;

    let playInterval = null;
    let progressInterval = null;
    let isPlaying = false;
    let slideDuration = 5000;
    let startTime = 0;

    const $tabs = document.getElementById('domain-tabs');
    const $list = document.getElementById('topic-list');
    const $checkAll = document.getElementById('check-all');
    const $screenContent = document.getElementById('screen-content');
    const $emptyState = document.getElementById('empty-state');
    
    const $btnPrev = document.getElementById('btn-prev');
    const $btnNext = document.getElementById('btn-next');
    const $btnComplete = document.getElementById('btn-complete');
    const $btnPlay = document.getElementById('btn-play');
    const $btnStop = document.getElementById('btn-stop');
    
    const $counter = document.getElementById('status-counter');
    const $speedSelect = document.getElementById('speed-select');
    const $progressFill = document.getElementById('progress-fill');

    // 모달 관련 요소 설정
    const $imageModal = document.getElementById('image-modal');
    const $modalImage = document.getElementById('modal-image');
    const $modalClose = document.getElementById('modal-close');

    function openModal(src) {
        $modalImage.src = src;
        $imageModal.classList.add('show');
    }
    
    function closeModal() {
        $imageModal.classList.remove('show');
        setTimeout(() => { $modalImage.src = ''; }, 300); // 부드럽게 닫힌 후 소스 제거
    }

    $modalClose.onclick = closeModal;
    $imageModal.onclick = (e) => {
        if (e.target === $imageModal) closeModal();
    };

    async function init() {
        try {
            await S.openDB();
            await reloadData();
        } catch(e) {
            alert('DB 연결 실패. 데이터를 먼저 등록해주세요.');
        }
    }

    async function reloadData() {
        allItems = await S.getAllItems();
        allItems.sort((a,b) => {
            if(a.domain !== b.domain) return (a.domain||'').localeCompare(b.domain||'');
            return (a.domainSeq||0)-(b.domainSeq||0);
        });

        renderTabs();
        if(currentDomain) loadDomain(currentDomain);
    }

    function renderTabs() {
        const domains = [...new Set(allItems.map(x => x.domain))].filter(Boolean);
        $tabs.innerHTML = '';
        if(domains.length === 0) return $tabs.innerHTML = '<div style="color:#cbd5e1; padding:10px;">데이터 없음</div>';
        if(!currentDomain) currentDomain = domains[0];

        domains.forEach(d => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${d === currentDomain ? 'active' : ''}`;
            btn.textContent = d;
            btn.onclick = () => { if(isPlaying) stopPlay(); currentDomain = d; renderTabs(); loadDomain(d); };
            $tabs.appendChild(btn);
        });
    }

    function loadDomain(domain) {
        filteredItems = allItems.filter(x => x.domain === domain);
        renderList();
        updateSelection();
        if(selectedIndices.length > 0) {
            showSlide(0);
        } else {
            showEmpty();
        }
    }

    function renderList() {
        $list.innerHTML = '';
        
        filteredItems.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.id = `list-item-${index}`;
            const plainTitle = (item.topic || '').replace(/<[^>]+>/g, '').trim() || '(제목 없음)';
            
            const isChecked = item.checked ? '' : 'checked';
            const completedClass = item.checked ? 'completed-text' : '';
            
            div.innerHTML = `
                <input type="checkbox" class="item-checkbox" data-idx="${index}" ${isChecked}>
                <div class="list-item-title ${completedClass}">${plainTitle}</div>
            `;
            
            div.querySelector('.list-item-title').onclick = () => {
                if(isPlaying) stopPlay();
                const checkbox = div.querySelector('input');
                if(!checkbox.checked) { checkbox.checked = true; updateSelection(); }
                const newPlayIndex = selectedIndices.indexOf(index);
                if(newPlayIndex !== -1) showSlide(newPlayIndex);
            };
            
            div.querySelector('input').onchange = () => updateSelection();
            $list.appendChild(div);
        });
    }

    function updateSelection() {
        const checkboxes = document.querySelectorAll('.item-checkbox');
        selectedIndices = [];
        checkboxes.forEach(cb => { if(cb.checked) selectedIndices.push(parseInt(cb.dataset.idx)); });
        $checkAll.checked = checkboxes.length > 0 && selectedIndices.length === checkboxes.length;
        
        if(selectedIndices.length === 0) {
            showEmpty();
        } else {
            if(selectedIndices[currentPlayIndex] === undefined) {
                 if(!isPlaying) showSlide(0);
            } else {
                 updateCounter(); updateNavButtons();
            }
        }
    }

    $checkAll.onchange = (e) => {
        document.querySelectorAll('.item-checkbox').forEach(cb => cb.checked = e.target.checked);
        updateSelection();
        if(selectedIndices.length > 0 && !isPlaying) showSlide(0);
    };

    function updateCompleteButtonUI(isCompleted) {
        if (isCompleted) {
            $btnComplete.innerHTML = '<i class="fas fa-undo"></i> 완료 해제 (Space)';
            $btnComplete.classList.remove('btn-complete');
            $btnComplete.classList.add('btn-undo');
        } else {
            $btnComplete.innerHTML = '<i class="fas fa-check"></i> 암기 완료 (Space)';
            $btnComplete.classList.remove('btn-undo');
            $btnComplete.classList.add('btn-complete');
        }
    }

    $btnComplete.onclick = async () => {
        if(selectedIndices.length === 0) return;

        const realIndex = selectedIndices[currentPlayIndex];
        const item = filteredItems[realIndex];

        const willBeCompleted = !item.checked;
        item.checked = willBeCompleted;

        await S.putItem(item);
        const memItem = allItems.find(x => x.id === item.id);
        if(memItem) memItem.checked = willBeCompleted;
        
        const titleDiv = document.querySelector(`#list-item-${realIndex} .list-item-title`);
        if(titleDiv) {
            if(willBeCompleted) titleDiv.classList.add('completed-text');
            else titleDiv.classList.remove('completed-text');
        }
        
        updateCompleteButtonUI(willBeCompleted);
        
        if (willBeCompleted) {
            const cb = document.querySelector(`.item-checkbox[data-idx="${realIndex}"]`);
            if(cb) cb.checked = false;
            
            updateSelection();
            
            if(selectedIndices.length > 0) {
                let nextIdx = currentPlayIndex; 
                if(nextIdx >= selectedIndices.length) nextIdx = 0;
                showSlide(nextIdx);
                
                if(isPlaying) resetProgressTimer(); 
            } else {
                showEmpty();
                if(isPlaying) stopPlay(); 
            }
        }
    };

    async function showSlide(playIndex) {
        if(selectedIndices.length === 0) return showEmpty();
        
        currentPlayIndex = playIndex;
        const realIndex = selectedIndices[currentPlayIndex];
        const item = filteredItems[realIndex];

        $emptyState.style.display = 'none';
        $screenContent.style.display = 'block'; 
        $btnComplete.style.display = 'flex';

        // 💡 추가된 부분: 새 슬라이드 로드 시 스크롤 최상단 리셋
        $screenContent.scrollTop = 0;

        updateCompleteButtonUI(item.checked);

        document.getElementById('play-title').innerHTML = S.renderWithMark(item.topic) || '제목 없음';
        document.getElementById('play-desc').innerHTML = S.renderWithMark(item.definition) || '내용 없음';
        
        let extraHtml = '';
        if(item.mnemonic) extraHtml += `<strong>[암기팁]</strong> ${S.renderWithMark(item.mnemonic)}<br><br>`;
        if(item.notes) extraHtml += `<span style="color:var(--text-muted);">${S.renderWithMark(item.notes)}</span>`;
        
        const extraContainer = document.getElementById('play-extra-container');
        if(extraHtml.trim()) {
            document.getElementById('play-extra').innerHTML = extraHtml;
            extraContainer.style.display = 'block';
        } else {
            extraContainer.style.display = 'none';
        }

        const imgContainer = document.getElementById('play-images');
        imgContainer.innerHTML = '';
        for(let i=1; i<=5; i++) {
            const imgId = item[`img${i}Id`];
            if(imgId) {
                const url = await S.getImageDataURL(imgId);
                if(url) {
                    const img = document.createElement('img'); 
                    img.src = url; 
                    img.title = "클릭하여 크게 보기";
                    // 이미지 클릭 이벤트 연결
                    img.onclick = () => openModal(url);
                    imgContainer.appendChild(img);
                }
            }
        }

        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
        const activeEl = document.getElementById(`list-item-${realIndex}`);
        if(activeEl) { activeEl.classList.add('active'); activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
        
        updateCounter(); updateNavButtons();
        $progressFill.style.width = '0%';
        $progressFill.style.transition = 'none';
    }

    function showEmpty() {
        $emptyState.style.display = 'flex';
        $screenContent.style.display = 'none';
        $counter.textContent = '0 / 0';
        $btnPrev.disabled = true; $btnNext.disabled = true;
        $btnComplete.style.display = 'none';
        $progressFill.style.width = '0%';
    }

    function updateCounter() {
        if(selectedIndices.length > 0) $counter.textContent = `${currentPlayIndex + 1} / ${selectedIndices.length}`;
    }

    function updateNavButtons() {
        const disabled = selectedIndices.length <= 1;
        $btnPrev.disabled = disabled; $btnNext.disabled = disabled;
    }

    function playNext() {
        if(selectedIndices.length === 0) return stopPlay();
        let nextIdx = currentPlayIndex + 1;
        if(nextIdx >= selectedIndices.length) nextIdx = 0; 
        showSlide(nextIdx);
        if(isPlaying) resetProgressTimer();
    }

    function playPrev() {
        if(selectedIndices.length === 0) return;
        let prevIdx = currentPlayIndex - 1;
        if(prevIdx < 0) prevIdx = selectedIndices.length - 1; 
        showSlide(prevIdx);
        if(isPlaying) resetProgressTimer();
    }

    function startPlay() {
        if(selectedIndices.length === 0) return alert('재생할 항목을 선택하세요.');
        if(currentPlayIndex === -1) currentPlayIndex = 0;
        
        isPlaying = true;
        slideDuration = parseInt($speedSelect.value);
        
        $btnPlay.style.display = 'none';
        $btnStop.style.display = 'flex';
        
        showSlide(currentPlayIndex);
        resetProgressTimer();
    }

    function stopPlay() {
        isPlaying = false;
        clearInterval(playInterval);
        clearInterval(progressInterval);
        
        $btnPlay.style.display = 'flex';
        $btnStop.style.display = 'none';
        $progressFill.style.width = '0%';
        $progressFill.style.transition = 'none';
    }

    function resetProgressTimer() {
        clearInterval(playInterval); clearInterval(progressInterval);
        startTime = Date.now();
        $progressFill.style.transition = 'width 0.1s linear';
        
        progressInterval = setInterval(() => {
            const elapsed = Date.now() - startTime;
            let percent = (elapsed / slideDuration) * 100;
            if(percent > 100) percent = 100;
            $progressFill.style.width = `${percent}%`;
        }, 100);

        playInterval = setInterval(() => { playNext(); }, slideDuration);
    }

    $btnPlay.onclick = startPlay;
    $btnStop.onclick = stopPlay;
    $btnNext.onclick = () => { if(isPlaying) stopPlay(); playNext(); };
    $btnPrev.onclick = () => { if(isPlaying) stopPlay(); playPrev(); };
    $speedSelect.onchange = () => { if(isPlaying) { slideDuration = parseInt($speedSelect.value); resetProgressTimer(); } };

    document.addEventListener('keydown', (e) => {
        // 모달창이 열려있을 때는 ESC만 작동하게 처리
        if ($imageModal.classList.contains('show')) {
            if (e.key === 'Escape') closeModal();
            return;
        }

        const isInput = e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA';
        
        if (!isInput) {
            // 프리젠테이션 모드 (Ctrl + M)
            if (e.ctrlKey && e.key.toLowerCase() === 'm') {
                e.preventDefault();
                document.body.classList.toggle('presentation');
                document.body.classList.remove('immersive'); // 충돌 방지
                return;
            }

            // 💡 수정된 부분: 몰입 모드 (Ctrl + H)
            if (e.ctrlKey && e.key.toLowerCase() === 'h') {
                e.preventDefault();
                document.body.classList.toggle('immersive');
                document.body.classList.remove('presentation'); // 충돌 방지
                return;
            }
            
            // 기존 슬라이드 제어 단축키들
            if (selectedIndices.length > 0) {
                if(e.key === 'ArrowRight') { 
                    e.preventDefault(); 
                    if(isPlaying) stopPlay(); 
                    playNext(); 
                } 
                else if(e.key === 'ArrowLeft') { 
                    e.preventDefault(); 
                    if(isPlaying) stopPlay(); 
                    playPrev(); 
                }
                else if(e.key === 'ArrowUp') {
                    e.preventDefault();
                    $screenContent.scrollBy({ top: -80, behavior: 'smooth' });
                }
                else if(e.key === 'ArrowDown') {
                    e.preventDefault();
                    $screenContent.scrollBy({ top: 80, behavior: 'smooth' });
                }
                else if(e.key === ' ') {
                    e.preventDefault();
                    if($btnComplete.style.display !== 'none') {
                        $btnComplete.click();
                    }
                }
            }
        }
    });

    $tabs.addEventListener('wheel', (e) => {
        if (e.deltaY !== 0) {
            e.preventDefault(); 
            $tabs.scrollLeft += e.deltaY; 
        }
    });

    init();
</script>

</body>
</html>
