<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운명 토픽 - Destiny's 5R</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Light & Luxurious Color Palette */
            --bg-light: #FAF8F5; /* 우아한 웜화이트 배경 */
            --gold: #C2A878;     /* 차분한 샴페인 골드 */
            --gold-dark: #9E8555; /* 텍스트용 딥 골드 */
            --text-dark: #2C2A29; /* 부드러운 차콜 블랙 */
            --text-gray: #7D7873; /* 세련된 웜 그레이 */
            
            --card-front-bg: linear-gradient(135deg, #FFFFFF 0%, #F2EFE8 100%);
            --card-back-bg: #FFFFFF;
            
            --shadow-subtle: 0 15px 35px rgba(44, 42, 41, 0.06);
            --shadow-hover: 0 20px 45px rgba(44, 42, 41, 0.12);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 20px 15px;
            flex-shrink: 0;
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.4rem;
            color: var(--text-dark);
            margin: 0;
            font-weight: 600;
            letter-spacing: 3px;
        }
        .subtitle {
            font-size: 14px;
            color: var(--text-gray);
            margin-top: 10px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* Tarot Board */
        #tarot-board {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 20px 40px 40px;
            flex-wrap: wrap;
            overflow-y: auto;
        }

        /* Card 3D Setup */
        .card-scene {
            perspective: 1200px;
            width: 260px;
            height: 410px;
            margin-bottom: 20px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1.1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        /* Card Faces */
        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 14px;
            box-shadow: var(--shadow-subtle);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #fff;
            transition: box-shadow 0.3s ease;
        }

        .card:hover .card-face {
            box-shadow: var(--shadow-hover);
        }

        /* Card Front (The Pattern/Mystic Side) */
        .card-front {
            background: var(--card-front-bg);
            border: 1px solid rgba(194, 168, 120, 0.4);
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        
        /* Card Pattern Elements */
        .card-front::before {
            content: '';
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(194, 168, 120, 0.3);
            border-radius: 10px;
            pointer-events: none;
        }
        .card-front::after {
            content: '';
            position: absolute;
            inset: 16px;
            border: 1px dashed rgba(194, 168, 120, 0.5);
            border-radius: 8px;
            pointer-events: none;
        }
        
        .mystic-icon {
            font-size: 55px;
            color: var(--gold);
            opacity: 0.9;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .card:hover .mystic-icon {
            transform: scale(1.08) translateY(-3px);
        }
        .card-number {
            position: absolute;
            top: 30px;
            font-family: 'Cinzel', serif;
            font-size: 22px;
            color: var(--gold-dark);
            font-weight: 600;
            letter-spacing: 2px;
        }

        /* Card Back (The Content Side) */
        .card-back {
            background: var(--card-back-bg);
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
            color: var(--text-dark);
            border: 1px solid #EBE7E0;
        }
        
        .card-content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 28px 22px;
            scrollbar-width: none; 
        }
        .card-content-scroll::-webkit-scrollbar { display: none; }

        /* Domain Tag */
        .domain-tag {
            font-size: 10px;
            font-weight: 600;
            color: var(--gold-dark);
            text-transform: uppercase;
            margin-bottom: 12px;
            display: inline-block;
            background: transparent;
            padding: 4px 10px;
            border: 1px solid var(--gold);
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        /* Topic Title - 클릭 가능하도록 스타일 수정 */
        .topic-title {
            font-size: 19px;
            font-weight: 700;
            line-height: 1.35;
            margin-bottom: 20px;
            color: var(--text-dark);
            word-break: keep-all;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            position: relative;
            z-index: 10;
            transition: color 0.2s ease;
        }
        .topic-title:hover {
            color: var(--gold-dark);
            text-decoration: underline;
            text-decoration-color: var(--gold);
            text-underline-offset: 4px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-gray);
            margin: 18px 0 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid #F0ECE4;
            padding-bottom: 4px;
        }
        
        .section-title i {
            color: var(--gold);
            font-size: 12px;
        }

        .content-body {
            font-size: 13.5px;
            line-height: 1.65;
            color: #4A4643;
            word-break: break-word;
            font-weight: 300;
        }

        mark { background: rgba(194, 168, 120, 0.2); color: var(--text-dark); padding: 0 4px; border-radius: 2px; }
        red { color: #B33A3A; } blue { color: #3A5F8F; } green { color: #4A704A; }
        del { color: #A8A39D; text-decoration: line-through; }
        u { text-decoration: underline; text-decoration-color: var(--gold); text-underline-offset: 3px; }

        .empty-state {
            text-align: center;
            color: var(--text-gray);
            font-size: 16px;
            margin-top: 50px;
            font-weight: 300;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 42, 41, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: var(--bg-light);
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            border-radius: 14px;
            padding: 35px;
            position: relative;
            box-shadow: var(--shadow-hover);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            overflow-y: auto;
            border: 1px solid #EBE7E0;
        }
        
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-gray);
            cursor: pointer;
            transition: color 0.2s;
            padding: 5px 10px;
        }
        
        .modal-close:hover {
            color: var(--text-dark);
        }

        @media (max-width: 900px) {
            .card-scene { width: 230px; height: 360px; }
            h1 { font-size: 2rem; }
            .modal-content { padding: 25px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Destiny's 5R</h1>
        <div class="subtitle" id="date-display">오늘 당신을 찾아온 5개의 운명적 토픽입니다.</div>
    </header>

    <main id="tarot-board">
    </main>

    <div class="modal-overlay" id="topic-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="./5R_core.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const S = window.SELTE;
            const board = document.getElementById('tarot-board');

            if (!S) {
                board.innerHTML = "<div class='empty-state'>⚠️ 오류: 5R_core.js 파일을 찾을 수 없습니다.</div>";
                return;
            }

            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            const todayStr = new Date(now.getTime() - offset).toISOString().split('T')[0];

            document.getElementById('date-display').textContent = `${todayStr} — 오늘 당신을 찾아온 5개의 토픽입니다.`;

            // 모달 바깥 영역 클릭 시 닫기 이벤트
            document.getElementById('topic-modal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    closeModal();
                }
            });

            try {
                await S.openDB();
                const allItems = await S.getAllItems();

                if (allItems.length === 0) {
                    board.innerHTML = "<div class='empty-state'><i class='fas fa-box-open fa-2x mb-2' style='color:#C2A878; margin-bottom:10px;'></i><br>저장된 학습 항목이 없습니다.</div>";
                    return;
                }

                let savedDate = localStorage.getItem('tarot_date');
                let savedIds = JSON.parse(localStorage.getItem('tarot_ids') || '[]');
                let selectedItems = [];

                if (savedDate === todayStr && savedIds.length > 0) {
                    selectedItems = savedIds.map(id => allItems.find(x => x.id === id)).filter(Boolean);
                }

                if (selectedItems.length < Math.min(5, allItems.length)) {
                    const shuffled = [...allItems].sort(() => 0.5 - Math.random());
                    selectedItems = shuffled.slice(0, 5);
                    
                    localStorage.setItem('tarot_date', todayStr);
                    localStorage.setItem('tarot_ids', JSON.stringify(selectedItems.map(x => x.id)));
                }

                renderCards(selectedItems, S);

            } catch (error) {
                console.error(error);
                board.innerHTML = "<div class='empty-state'>⚠️ DB 로딩 중 오류가 발생했습니다.</div>";
            }
        });

        function renderCards(items, S) {
            const board = document.getElementById('tarot-board');
            board.innerHTML = '';

            let icons = ['fa-moon', 'fa-sun', 'fa-star', 'fa-eye', 'fa-gem', 'fa-compass', 'fa-key', 'fa-leaf'];
            icons = icons.sort(() => 0.5 - Math.random());

            items.forEach((it, index) => {
                const scene = document.createElement('div');
                scene.className = 'card-scene';

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => card.classList.toggle('flipped');

                const iconClass = icons[index % icons.length];

                const front = document.createElement('div');
                front.className = 'card-face card-front';
                front.innerHTML = `
                    <div class="card-number">${romanize(index + 1)}</div>
                    <i class="fas ${iconClass} mystic-icon"></i>
                `;

                const back = document.createElement('div');
                back.className = 'card-face card-back';
                
                const domainHtml = it.domain ? `<div class="domain-tag">${S.esc(it.domain)}</div>` : '';
                const topicHtml = S.renderWithMark(it.topic);
                
                let contentHtml = '';
                if(it.definition) {
                    contentHtml += `<div class="section-title"><i class="fas fa-align-left"></i> Definition</div>
                                    <div class="content-body">${S.renderWithMark(it.definition)}</div>`;
                }
                if(it.mnemonic) {
                    contentHtml += `<div class="section-title"><i class="far fa-lightbulb"></i> Mnemonic</div>
                                    <div class="content-body">${S.renderWithMark(it.mnemonic)}</div>`;
                }
                if(it.notes) {
                    contentHtml += `<div class="section-title"><i class="far fa-sticky-note"></i> Notes</div>
                                    <div class="content-body">${S.renderWithMark(it.notes)}</div>`;
                }

                back.innerHTML = `
                    <div class="card-content-scroll">
                        ${domainHtml}
                        <div class="topic-title-container"></div>
                        ${contentHtml}
                    </div>
                `;

                // 토픽 타이틀 동적 생성 및 이벤트 할당 (이벤트 버블링 방지)
                const titleContainer = back.querySelector('.topic-title-container');
                const topicTitleEl = document.createElement('div');
                topicTitleEl.className = 'topic-title';
                topicTitleEl.innerHTML = topicHtml;
                topicTitleEl.onclick = (e) => {
                    e.stopPropagation(); // 카드 뒤집기 방지
                    showModal(it, S);
                };
                titleContainer.replaceWith(topicTitleEl);

                card.appendChild(front);
                card.appendChild(back);
                scene.appendChild(card);
                board.appendChild(scene);

                scene.style.opacity = '0';
                scene.style.transform = 'translateY(20px)';
                scene.style.transition = 'opacity 0.6s ease, transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1)';
                
                setTimeout(() => {
                    scene.style.opacity = '1';
                    scene.style.transform = 'translateY(0)';
                }, index * 120);
            });
        }

        // 모달창 열기
        function showModal(it, S) {
            const modal = document.getElementById('topic-modal');
            const modalBody = document.getElementById('modal-body');
            
            const domainHtml = it.domain ? `<div class="domain-tag">${S.esc(it.domain)}</div>` : '';
            const topicHtml = S.renderWithMark(it.topic);
            
            let contentHtml = '';
            if(it.definition) {
                contentHtml += `<div class="section-title"><i class="fas fa-align-left"></i> Definition</div>
                                <div class="content-body" style="font-size: 15px;">${S.renderWithMark(it.definition)}</div>`;
            }
            if(it.mnemonic) {
                contentHtml += `<div class="section-title"><i class="far fa-lightbulb"></i> Mnemonic</div>
                                <div class="content-body" style="font-size: 15px;">${S.renderWithMark(it.mnemonic)}</div>`;
            }
            if(it.notes) {
                contentHtml += `<div class="section-title"><i class="far fa-sticky-note"></i> Notes</div>
                                <div class="content-body" style="font-size: 15px;">${S.renderWithMark(it.notes)}</div>`;
            }

            modalBody.innerHTML = `
                ${domainHtml}
                <div class="topic-title" style="font-size: 24px; margin-bottom: 25px; cursor: default;">${topicHtml}</div>
                ${contentHtml}
            `;
            
            modal.classList.add('active');
        }

        // 모달창 닫기
        function closeModal() {
            const modal = document.getElementById('topic-modal');
            modal.classList.remove('active');
        }

        function romanize(num) {
            const lookup = {M:1000, CM:900, D:500, CD:400, C:100, XC:90, L:50, XL:40, X:10, IX:9, V:5, IV:4, I:1};
            let roman = '';
            for (let i in lookup) {
                while (num >= lookup[i]) {
                    roman += i;
                    num -= lookup[i];
                }
            }
            return roman;
        }
    </script>
</body>
</html>
