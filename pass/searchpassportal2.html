<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>통합 문서 조회</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard-dynamic-subset.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
/* === Premium / Luxury Theme Variables === */
:root {
    /* Light Theme (Alabaster & Charcoal with Bronze) */
    --bg-app: #fbfaf9; 
    --bg-panel: #ffffff; 
    --border: #e6e4e0;
    --primary: #1a1a1a; 
    --primary-hover: #000000;
    --accent: #a88c67; /* Muted Gold/Bronze */
    --accent-light: rgba(168, 140, 103, 0.08);
    --text-main: #1f1e1d; 
    --text-sub: #7a7774;
    --radius-sm: 2px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --shadow-soft: 0 4px 30px rgba(0, 0, 0, 0.03);
    --shadow-focus: 0 0 0 1px var(--accent);
    --font-ui: 'Pretendard', sans-serif;
    --font-code: 'JetBrains Mono', monospace;
    --modal-overlay: rgba(26, 26, 26, 0.3);
    
    /* Tag Colors (Monochrome & Subdued) */
    --tag-bg: #f5f4f2; --tag-txt: #4a4947;
}

[data-theme="dark"] {
    /* Dark Theme (Deep Obsidian with Pale Gold) */
    --bg-app: #121212; 
    --bg-panel: #1a1a1a; 
    --border: #2e2e2e;
    --primary: #f5f5f5; 
    --primary-hover: #ffffff;
    --accent: #c9ad84; /* Pale Gold */
    --accent-light: rgba(201, 173, 132, 0.1);
    --text-main: #eaeaea; 
    --text-sub: #8c8c8c;
    --shadow-soft: 0 4px 30px rgba(0, 0, 0, 0.3);
    --shadow-focus: 0 0 0 1px var(--accent);
    --modal-overlay: rgba(0, 0, 0, 0.7);
    
    /* Tag Colors (Dark Monochrome) */
    --tag-bg: #262626; --tag-txt: #a3a3a3;
}

* { box-sizing: border-box; outline: none; margin: 0; padding: 0; transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, transform 0.4s ease; }
body { background: var(--bg-app); color: var(--text-main); font-family: var(--font-ui); font-size: 14px; min-height: 100vh; display: flex; flex-direction: column; line-height: 1.7; letter-spacing: -0.2px; font-weight: 300; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-sub); }

/* Layout */
.container { max-width: 860px; margin: 0 auto; padding: 80px 24px; width: 100%; display: flex; flex-direction: column; gap: 40px; flex: 1; position: relative; }

/* Header & Tools */
.header-tools { position: absolute; top: 32px; right: 24px; display: flex; gap: 12px; }
.btn-icon { 
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid transparent; 
    background: transparent; color: var(--text-sub); cursor: pointer; font-size: 15px; 
    display: flex; align-items: center; justify-content: center; 
}
.btn-icon:hover { color: var(--accent); border-color: var(--border); background: var(--bg-panel); transform: rotate(15deg); }

.search-header { text-align: center; margin-bottom: 16px; }
/* 변경됨: 로고 텍스트 스타일 조정 */
.brand-logo { font-size: 24px; font-weight: 400; color: var(--text-main); display: inline-flex; align-items: center; gap: 10px; letter-spacing: -0.5px; }
.brand-logo i { color: var(--accent); font-size: 24px; }

/* Search Box (Minimalist) */
.search-box-wrapper { position: relative; width: 100%; max-width: 680px; margin: 0 auto; z-index: 10; }
.search-input-lg { 
    width: 100%; height: 60px; padding: 0 20px 0 52px; 
    border: none; border-bottom: 1px solid var(--border); border-radius: 0; 
    font-size: 18px; background: transparent; color: var(--text-main); 
    font-family: var(--font-ui); font-weight: 300;
}
.search-input-lg::placeholder { color: var(--text-sub); opacity: 0.5; font-weight: 300; }
.search-input-lg:focus { border-bottom-color: var(--accent); box-shadow: 0 1px 0 0 var(--accent); }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-sub); font-size: 18px; transition: color 0.4s; }
.search-input-lg:focus ~ .search-icon, .search-input-lg:focus + .search-icon { color: var(--accent); }

/* Filter Tags */
.filter-wrapper { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.filter-chip { 
    padding: 6px 16px; background: transparent; border: 1px solid var(--border); 
    border-radius: 30px; font-size: 12px; font-weight: 400; color: var(--text-sub); 
    cursor: pointer; display: flex; align-items: center; gap: 8px; user-select: none;
    letter-spacing: 0.5px;
}
.filter-chip:hover { border-color: var(--text-sub); color: var(--text-main); }
.filter-chip.active { background: var(--primary); border-color: var(--primary); color: var(--bg-panel); }

/* Results Area */
.results-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-top: 24px; }
.res-count { font-weight: 400; color: var(--text-sub); font-size: 13px; letter-spacing: 1px; }
.res-count span { color: var(--text-main); font-weight: 500; }
.res-time { font-size: 11px; color: var(--text-sub); font-family: var(--font-code); letter-spacing: 0.5px; }
.result-list { display: flex; flex-direction: column; gap: 20px; margin-top: 32px; }

/* Result Card */
.res-card { 
    background: var(--bg-panel); padding: 32px; border-radius: var(--radius-sm); 
    border: 1px solid var(--border); cursor: pointer; position: relative; overflow: hidden;
    box-shadow: var(--shadow-soft); display: flex; flex-direction: column; gap: 14px;
}
.res-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08); }
.res-meta { display: flex; align-items: center; gap: 12px; }
.source-badge { font-size: 10px; font-weight: 500; padding: 4px 10px; border-radius: 2px; letter-spacing: 1px; text-transform: uppercase; background: var(--tag-bg); color: var(--tag-txt); border: 1px solid var(--border); }
.res-id { font-family: var(--font-code); font-size: 11px; color: var(--text-sub); letter-spacing: 0.5px; }
.res-title { font-size: 20px; font-weight: 400; color: var(--text-main); letter-spacing: -0.5px; line-height: 1.4; }
.res-snippet { font-size: 14px; color: var(--text-sub); line-height: 1.8; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; font-weight: 300; }
.highlight { background: var(--accent-light); color: var(--accent); padding: 0 4px; border-radius: 2px; font-weight: 500; }

/* Settings Modal */
.modal-overlay { position: fixed; inset: 0; background: var(--modal-overlay); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
.settings-box { background: var(--bg-panel); width: 100%; max-width: 760px; padding: 48px; border-radius: var(--radius-md); box-shadow: 0 30px 60px rgba(0,0,0,0.15); max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; margin: 20px; border: 1px solid var(--border); }
.settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.settings-header h3 { font-size: 18px; font-weight: 400; color: var(--text-main); letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 8px;}
.settings-content { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; min-height: 300px; padding-right: 12px; }

.config-col { display: flex; flex-direction: column; gap: 20px; }
.config-col-title { font-size: 11px; font-weight: 500; color: var(--text-sub); letter-spacing: 1.5px; margin-bottom: 12px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }

.source-item { display: flex; align-items: center; justify-content: space-between; padding: 20px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-app); transition: all 0.3s ease; }
.source-item:hover { border-color: var(--accent); }
.source-info { display: flex; flex-direction: column; gap: 6px; }
.source-name { font-weight: 500; font-size: 14px; color: var(--text-main); }
.source-desc { font-size: 12px; color: var(--text-sub); }

.btn-add { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 6px 14px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 500; cursor: pointer; transition: 0.3s; }
.btn-add:hover { background: var(--accent); color: var(--bg-panel); }
.btn-add:disabled { border-color: var(--border); color: var(--text-sub); background: transparent; cursor: default; }

.btn-del { background: transparent; color: var(--text-sub); border: none; font-size: 14px; cursor: pointer; transition: 0.3s; }
.btn-del:hover { color: #d9534f; transform: scale(1.1); }

/* Custom Form */
.custom-form { background: transparent; border: 1px solid var(--border); padding: 24px; border-radius: var(--radius-sm); margin-top: 16px; display: none; }
.custom-form.open { display: block; animation: fadeUp 0.4s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.form-row { margin-bottom: 16px; }
.form-label { display: block; font-size: 11px; font-weight: 500; color: var(--text-sub); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
.form-input { width: 100%; height: 44px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 16px; font-size: 13px; background: var(--bg-panel); color: var(--text-main); font-family: var(--font-ui); font-weight: 300; }
.form-input:focus { border-color: var(--accent); box-shadow: var(--shadow-focus); }
.btn-submit { width: 100%; height: 48px; background: var(--primary); color: var(--bg-panel); border: none; border-radius: var(--radius-sm); font-weight: 400; cursor: pointer; margin-top: 16px; font-size: 14px; letter-spacing: 1px; }
.btn-submit:hover { opacity: 0.8; }

.empty-state { text-align: center; padding: 100px 0; color: var(--text-sub); animation: fadeIn 0.6s ease; }
.empty-state i { font-size: 32px; color: var(--border); margin-bottom: 24px; font-weight: 300; }
.empty-state p { font-size: 14px; line-height: 1.8; letter-spacing: 0.5px; }
.loader { display: none; text-align: center; padding: 60px; }
.loader i { animation: spin 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; font-size: 24px; color: var(--accent); }
@keyframes spin { 100% { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="container">
    <div class="header-tools">
        <button class="btn-icon" id="btn-theme" title="테마 변경"><i class="fas fa-moon"></i></button>
        <button class="btn-icon" id="btn-settings" title="검색 소스 설정"><i class="fas fa-sliders-h"></i></button>
    </div>

    <div class="search-header">
        <div class="brand-logo"><i class="fas fa-layer-group"></i> 통합 문서 조회</div>
    </div>

    <div class="search-box-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="main-search" class="search-input-lg" placeholder="무엇을 찾고 계신가요?" autofocus autocomplete="off">
    </div>

    <div class="filter-wrapper" id="source-filters"></div>

    <div id="results-area" style="display:none;">
        <div class="results-header">
            <span class="res-count">
                검색 결과 <span><span id="res-count-num">0</span>건</span>
                <span id="res-render-msg" style="font-size:11px; text-transform:none; margin-left:8px; font-weight:300;"></span>
            </span>
            <span class="res-time" id="search-time"></span>
        </div>
        <div class="result-list" id="result-list"></div>
    </div>
    
    <div id="loader" class="loader"><i class="fas fa-circle-notch"></i></div>
    
    <div id="empty-state" class="empty-state">
        <i class="fas fa-folder-open"></i>
        <p>검색어를 입력하여 문서를 찾아보거나<br>우측 상단 <b>설정</b>에서 검색 소스를 연결해 보세요.</p>
    </div>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="settings-box">
        <div class="settings-header">
            <h3><i class="fas fa-database"></i> 검색 소스 관리</h3>
            <button class="btn-icon" id="btn-close-settings"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="settings-content">
            <div class="config-col">
                <div class="config-col-title">제공되는 소스 추가</div>
                <div id="preset-list-container" style="display:flex; flex-direction:column; gap:16px;"></div>

                <div style="margin-top:24px; border-top:1px solid var(--border); padding-top:24px;">
                    <div id="btn-toggle-custom" style="cursor:pointer; font-size:12px; font-weight:500; color:var(--text-main); display:flex; align-items:center; gap:8px; letter-spacing: 0.5px;">
                        <i class="fas fa-plus"></i> 사용자 정의 DB 직접 연결
                    </div>
                    <div id="custom-form" class="custom-form">
                        <div class="form-row"><label class="form-label">소스명</label><input type="text" id="cust-name" class="form-input" placeholder="예: 마케팅 자료"></div>
                        <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                            <div><label class="form-label">DB 이름</label><input type="text" id="cust-db" class="form-input" placeholder="ProjectDocDB"></div>
                            <div><label class="form-label">Store 이름</label><input type="text" id="cust-store" class="form-input" placeholder="doc_items"></div>
                        </div>
                        <div class="form-row"><label class="form-label">이동할 URL</label><input type="text" id="cust-url" class="form-input" placeholder="page.html"></div>
                        <div class="form-row"><label class="form-label">검색 필드 (콤마구분)</label><input type="text" id="cust-fields" class="form-input" value="title, content, summary, doc_id"></div>
                        <button type="button" id="btn-add-custom" class="btn-submit">추가 완료</button>
                    </div>
                </div>
            </div>

            <div class="config-col" style="border-left:1px solid var(--border); padding-left:48px;">
                <div class="config-col-title">
                    현재 연결된 소스 <span id="active-count" style="color:var(--accent); margin-left:8px;">0</span>
                </div>
                <div id="active-list-container" style="display:flex; flex-direction:column; gap:16px;"></div>
                <div id="no-active-msg" style="text-align:center; color:var(--text-sub); font-size:13px; margin-top:60px; display:none; font-weight: 300;">
                    연결된 검색 소스가 없습니다.
                </div>
            </div>
        </div>

        <div style="margin-top:32px; text-align:right; border-top:1px solid var(--border); padding-top:24px;">
             <button id="btn-finish-settings" style="background:var(--primary); color:var(--bg-panel); font-size:13px; padding:14px 40px; border:none; border-radius:var(--radius-sm); font-weight:400; cursor:pointer; letter-spacing:1px;">
                설정 완료
            </button>
        </div>
    </div>
</div>

<script>
// === 0. THEME MANAGEMENT ===
const themeBtn = document.getElementById('btn-theme');
const htmlEl = document.documentElement;
let currentTheme = localStorage.getItem('theme') || 'light';

function applyTheme(theme) {
    htmlEl.setAttribute('data-theme', theme);
    themeBtn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    localStorage.setItem('theme', theme);
}
applyTheme(currentTheme);

themeBtn.addEventListener('click', () => {
    currentTheme = currentTheme === 'light' ? 'dark' : 'light';
    applyTheme(currentTheme);
});

// === 1. PRESETS & CACHE ===
const PRESETS = [
    {
        id: "pass_5r", name: "5RChecklist", desc: "5R DB",
        config: { id: "pass_5r", name: "5RChecklist", dbName: "5RChecklistDB", storeName: "items", pageUrl: "5RChecklist.html", fields: ["domain", "topic", "definition", "mnemonic", "notes"] }
    },
    {
        id: "pass_keynote", name: "Keynote", desc: "Keynote DB",
        config: { id: "pass_keynote", name: "Keynote", dbName: "StudyNoteDB", storeName: "notes", pageUrl: "keynote.html", fields: ["title", "items"] }
    },
    {
        id: "pass_mnemonic", name: "두음마스터", desc: "Mnemonic DB",
        config: { id: "pass_mnemonic", name: "두음마스터", dbName: "MnemonicDB", storeName: "mnemonics", pageUrl: "mnemonic.html", fields: ["source", "title", "keyword", "desc"] }
    },
    {
        id: "pass_topicbank", name: "토픽뱅크", desc: "TopicBank DB",
        config: { id: "pass_topicbank", name: "토픽뱅크", dbName: "TopicBankDB", storeName: "items", pageUrl: "5Rchecklist_topic.html", fields: ["sheet", "round", "category", "type", "problem"] }
    },
    {
        id: "pass_workbook", name: "Workbook", desc: "Workbook DB",
        config: { id: "pass_workbook", name: "Workbook", dbName: "WorkbookDB", storeName: "solutions", pageUrl: "workbook.html", fields: ["type", "source", "round", "month", "category", "solution"] }
    },  
    {
        id: "pass_deepdive", name: "DeepDive", desc: "DeepDive DB",
        config: { id: "pass_deepdive", name: "DeepDive", dbName: "DeepDiveDB", storeName: "questions", pageUrl: "deepdive.html", fields: ["domain", "round", "type", "session", "questionText", "pdfName"] }
    },
    {
        id: "pass_deepdive_extra", name: "DeepDiveExtra", desc: "DeepDiveExtra DB",
        config: { id: "pass_deepdive_extra", name: "DeepDiveExtra", dbName: "DeepDiveExtraDB", storeName: "questions", pageUrl: "deepdive(번외편).html", fields: ["domain", "institution", "month", "round", "type", "session", "questionText", "strategyText", "pdfName"] }
    }
];

// 메모리 기반 데이터 캐시
let CACHED_DOCS = new Map();

// === 2. CONFIG DATABASE ENGINE (IndexedDB) ===
const CONFIG_DB = {
    DB_NAME: 'SearchPassPortalDB',
    STORE_NAME: 'search_sources',
    db: null,

    open: function() {
        return new Promise((resolve, reject) => {
            if (this.db) return resolve(this.db);
            const req = indexedDB.open(this.DB_NAME, 1);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(this.STORE_NAME)) {
                    db.createObjectStore(this.STORE_NAME, { keyPath: 'id' });
                }
            };
            req.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
            req.onerror = (e) => reject(e);
        });
    },
    getAll: function() {
        return new Promise(async (resolve) => {
            const db = await this.open();
            const tx = db.transaction(this.STORE_NAME, 'readonly');
            tx.objectStore(this.STORE_NAME).getAll().onsuccess = (e) => resolve(e.target.result || []);
        });
    },
    add: function(item) {
        return new Promise(async (resolve) => {
            const db = await this.open();
            const tx = db.transaction(this.STORE_NAME, 'readwrite');
            tx.objectStore(this.STORE_NAME).put(item);
            tx.oncomplete = () => resolve(true);
        });
    },
    delete: function(id) {
        return new Promise(async (resolve) => {
            const db = await this.open();
            const tx = db.transaction(this.STORE_NAME, 'readwrite');
            tx.objectStore(this.STORE_NAME).delete(id);
            tx.oncomplete = () => resolve(true);
        });
    }
};

let SEARCH_CONFIG = [];
let activeFilters = [];
const $ = s => document.querySelector(s);

// === Initialization ===
document.addEventListener('DOMContentLoaded', async () => {
    await loadConfig();
    bindEvents();
});

async function loadConfig() {
    SEARCH_CONFIG = await CONFIG_DB.getAll();
    if (SEARCH_CONFIG.length === 0) {
        await CONFIG_DB.add(PRESETS[0].config);
        await CONFIG_DB.add(PRESETS[1].config);
        SEARCH_CONFIG = await CONFIG_DB.getAll();
    }
    await refreshCache();
    renderFilters();
}

// === Settings UI ===
function renderSettingsUI() {
    const presetContainer = $('#preset-list-container');
    const activeContainer = $('#active-list-container');
    const noMsg = $('#no-active-msg');
    
    presetContainer.innerHTML = '';
    activeContainer.innerHTML = '';

    PRESETS.forEach(preset => {
        const isAdded = SEARCH_CONFIG.some(c => c.id === preset.id || (c.dbName === preset.config.dbName && c.storeName === preset.config.storeName));
        const div = document.createElement('div');
        div.className = 'source-item';
        div.style.opacity = isAdded ? '0.6' : '1';
        div.style.pointerEvents = isAdded ? 'none' : 'auto';
        div.innerHTML = `
            <div class="source-info"><span class="source-name">${preset.name}</span><span class="source-desc">${preset.desc}</span></div>
            <button class="btn-add" ${isAdded ? 'disabled' : ''}>${isAdded ? '추가됨' : '연결'}</button>
        `;
        if(!isAdded) div.querySelector('button').onclick = async () => addSource(JSON.parse(JSON.stringify(preset.config)));
        presetContainer.appendChild(div);
    });

    $('#active-count').textContent = SEARCH_CONFIG.length;
    if(SEARCH_CONFIG.length === 0) noMsg.style.display = 'block';
    else {
        noMsg.style.display = 'none';
        SEARCH_CONFIG.forEach((conf) => {
            const div = document.createElement('div');
            div.className = 'source-item';
            div.innerHTML = `
                <div class="source-info"><span class="source-name">${conf.name}</span><span class="source-desc">${conf.dbName} / ${conf.storeName}</span></div>
                <button class="btn-del" title="삭제"><i class="fas fa-trash-alt"></i></button>
            `;
            div.querySelector('button').onclick = () => removeSource(conf.id);
            activeContainer.appendChild(div);
        });
    }
}

async function addSource(configObj) {
    await CONFIG_DB.add(configObj);
    SEARCH_CONFIG = await CONFIG_DB.getAll();
    await refreshCache();
    renderSettingsUI();
    renderFilters();
}

async function removeSource(id) {
    await CONFIG_DB.delete(id);
    SEARCH_CONFIG = await CONFIG_DB.getAll();
    await refreshCache();
    renderSettingsUI();
    renderFilters();
}

// === Events ===
function bindEvents() {
    $('#main-search').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); 
            performSearch(e.target.value);
        }
    });

    $('#btn-settings').onclick = () => { renderSettingsUI(); $('#settings-modal').style.display = 'flex'; $('#custom-form').classList.remove('open'); };
    $('#btn-close-settings').onclick = $('#btn-finish-settings').onclick = () => {
        $('#settings-modal').style.display = 'none';
        if($('#main-search').value) performSearch($('#main-search').value);
    };
    $('#btn-toggle-custom').onclick = () => $('#custom-form').classList.toggle('open');

    $('#btn-add-custom').onclick = async () => {
        const name = $('#cust-name').value.trim();
        const dbName = $('#cust-db').value.trim();
        const storeName = $('#cust-store').value.trim();
        const pageUrl = $('#cust-url').value.trim();
        const fieldsStr = $('#cust-fields').value.trim();
        if(!name || !dbName || !storeName) return alert('이름, DB명, Store명은 필수입니다.');

        const newConfig = {
            id: 'custom_' + Date.now(),
            name: name, dbName: dbName, storeName: storeName,
            pageUrl: pageUrl || '#',
            fields: fieldsStr ? fieldsStr.split(',').map(s=>s.trim()) : ['title', 'content']
        };
        await addSource(newConfig);
        
        $('#cust-name').value = ''; $('#cust-db').value = ''; $('#cust-store').value = '';
        $('#custom-form').classList.remove('open');
    };
}

function renderFilters() {
    const wrapper = $('#source-filters');
    wrapper.innerHTML = '';
    SEARCH_CONFIG.forEach(conf => {
        const btn = document.createElement('div');
        btn.className = `filter-chip ${activeFilters.includes(conf.id) ? 'active' : ''}`;
        btn.innerHTML = `<span>${conf.name}</span>`;
        btn.onclick = () => toggleFilter(btn, conf.id);
        wrapper.appendChild(btn);
    });
}

function toggleFilter(el, id) {
    el.classList.toggle('active');
    activeFilters.includes(id) ? activeFilters = activeFilters.filter(x => x !== id) : activeFilters.push(id);
    if($('#main-search').value) performSearch($('#main-search').value);
}

// === Memory Cache Loader ===
async function refreshCache() {
    CACHED_DOCS.clear(); 
    for (const conf of SEARCH_CONFIG) {
        const docs = await fetchFromDB(conf);
        CACHED_DOCS.set(conf.id, docs);
    }
}

function fetchFromDB(config) {
    return new Promise((resolve) => {
        const req = indexedDB.open(config.dbName);
        req.onerror = () => resolve([]); 
        req.onsuccess = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(config.storeName)) { db.close(); return resolve([]); }
            const tx = db.transaction(config.storeName, 'readonly');
            tx.objectStore(config.storeName).getAll().onsuccess = (res) => {
                const results = (res.target.result || []).map(item => ({...item, _source: config}));
                db.close(); resolve(results);
            };
        };
    });
}

// === Search & Render Logic ===
function stripHtml(text) { 
    return text ? String(text).replace(/<[^>]*>?/gm, '') : ""; 
}

function escapeRegExp(string) {
    return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlightText(text, query) { 
    if(!query) return text; 
    try { 
        const r = new RegExp(`(${escapeRegExp(query)})`, 'gi'); 
        return text.replace(r, '<span class="highlight">$1</span>'); 
    } catch(e) { return text; } 
}

async function performSearch(query) {
    const q = query.trim().toLowerCase();
    if(!q) { $('#results-area').style.display = 'none'; $('#empty-state').style.display = 'block'; $('#loader').style.display = 'none'; return; }

    $('#empty-state').style.display = 'none'; $('#loader').style.display = 'block'; $('#result-list').innerHTML = '';
    
    const startTime = performance.now();
    const targets = activeFilters.length > 0 ? SEARCH_CONFIG.filter(c => activeFilters.includes(c.id)) : SEARCH_CONFIG;
    
    if(targets.length === 0) {
         $('#result-list').innerHTML = `<div style="text-align:center; padding:60px 0; color:var(--text-sub); font-weight:300;">선택된 검색 소스가 없습니다. 설정을 확인하세요.</div>`;
         $('#loader').style.display = 'none'; $('#results-area').style.display = 'block'; return;
    }

    let matched = [];
    
    for (const conf of targets) {
        const docs = CACHED_DOCS.get(conf.id) || [];
        for (const item of docs) {
            let isMatch = false;
            for (const field of conf.fields) {
                const val = item[field];
                if (!val) continue;
                
                if (Array.isArray(val)) {
                    const arrayText = val.map(v => {
                        if (typeof v === 'object' && v !== null) {
                            return Object.values(v).map(inner => typeof inner === 'string' ? stripHtml(inner) : '').join(' ');
                        }
                        return String(v);
                    }).join(' ');
                    if (arrayText.toLowerCase().includes(q)) { isMatch = true; break; }
                } else {
                    const textVal = (typeof val === 'string' && val.includes('<')) ? stripHtml(val) : String(val);
                    if (textVal.toLowerCase().includes(q)) { isMatch = true; break; }
                }
            }
            if (isMatch) matched.push(item);
        }
    }

    renderResults(matched, q, startTime);
}

function renderResults(items, query, startTime) {
    const list = $('#result-list');
    $('#res-count-num').textContent = items.length;
    $('#search-time').textContent = `${((performance.now() - startTime)/1000).toFixed(3)}s 소요`;
    
    if(items.length === 0) { 
        list.innerHTML = `<div style="text-align:center; padding:60px 0; color:var(--text-sub); font-weight:300;">일치하는 검색 결과가 없습니다.</div>`; 
        $('#res-render-msg').textContent = '';
        $('#loader').style.display = 'none'; $('#results-area').style.display = 'block'; 
        return; 
    }

    const MAX_RESULTS = 50;
    const renderItems = items.slice(0, MAX_RESULTS);
    
    if (items.length > MAX_RESULTS) {
        $('#res-render-msg').textContent = `(상위 ${MAX_RESULTS}건만 표시됨)`;
    } else {
        $('#res-render-msg').textContent = '';
    }

    renderItems.forEach(item => {
        const conf = item._source;
        
        let title = item.topic || item.question || item.questionText || item.problem || item.summary || item.title || item.name;
        
        if (!title && (item.type || item.source || item.category || item.round)) {
            let parts = [];
            if (item.type) parts.push(`[${item.type}]`);
            if (item.source) parts.push(item.source);
            if (item.round) parts.push(`${item.round}회`);
            if (item.category) parts.push(item.category);
            title = parts.join(' ');
        }
        
        title = title || '제목 없음';
        
        let rawDesc = item.definition || item.notes || item.answer || item.description || item.content || item.desc || item.strategyText || item.solution || '';
        
        if (!rawDesc && Array.isArray(item.items)) {
            rawDesc = item.items.map(it => 
                [it.problem, it.lead, it.concept, it.solution]
                    .filter(Boolean)
                    .map(stripHtml)
                    .join(' ')
            ).join(' ... ');
        } else if (typeof rawDesc === 'string') {
            rawDesc = stripHtml(rawDesc);
        } else {
            rawDesc = '';
        }
        
        let desc = rawDesc;
        let idVal = item.doc_id || item.uid || item.id || '';
        
        const idx = desc.toLowerCase().indexOf(query.toLowerCase());
        desc = idx > -1 ? (idx>30 ? '...' : '') + desc.substring(Math.max(0, idx-30), idx+140) + '...' : desc.substring(0, 140) + '...';

        const card = document.createElement('div'); card.className = 'res-card';
        const paramId = item.uid || item.id || item.doc_id;
        card.onclick = () => { window.open(`${conf.pageUrl}${paramId ? '?uid='+paramId : ''}`, '_blank'); };
        
        card.innerHTML = `
            <div class="res-meta">
                <span class="source-badge">${conf.name}</span>
                ${idVal ? `<span class="res-id">${highlightText(idVal, query)}</span>` : ''}
            </div>
            <div class="res-title">${highlightText(title, query)}</div>
            <div class="res-snippet">${highlightText(desc, query)}</div>
        `;
        list.appendChild(card);
    });
    
    $('#loader').style.display = 'none'; 
    $('#results-area').style.display = 'block';
}
</script>
