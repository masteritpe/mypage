<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tech Lead Note</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
  
  <style>
    :root {
      /* Color System */
      --primary: #4f46e5;
      --primary-soft: #e0e7ff;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --danger: #ef4444;
      
      /* Variables */
      --radius: 12px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -1px rgb(0 0 0 / 0.06);
      --font-base: 16px;
    }

    * { box-sizing: border-box; outline: none; }
    
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      height: 100vh;
      overflow-y: scroll;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Header --- */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 850px; margin: 0 auto; padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    h1 {
      font-size: 1.25rem; font-weight: 700; margin: 0;
      color: var(--text-main); display: flex; align-items: center; gap: 8px; white-space: nowrap;
    }
    h1 span { color: var(--primary); }

    .toolbar { display: flex; gap: 4px; align-items: center; flex-wrap: wrap;}

    /* Vertical Divider between groups */
    .divider {
      width: 1px; height: 16px; background: var(--border);
      margin: 0 8px;
    }

    /* Button Styles */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
      transition: all 0.2s; cursor: pointer; border: 1px solid transparent;
      white-space: nowrap; text-decoration: none;
    }
    .btn-ghost { background: transparent; color: var(--text-sub); }
    .btn-ghost:hover { background: var(--primary-soft); color: var(--primary); }
    
    .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: #4338ca; transform: translateY(-1px); }

    /* Font Control */
    .font-control {
      display: flex; align-items: center; gap: 8px; 
      padding-right: 12px; border-right: 1px solid var(--border); margin-right: 8px;
    }
    input[type=range] {
      width: 60px; accent-color: var(--primary); cursor: pointer; height: 4px;
    }

    /* --- Main Layout --- */
    main { max-width: 850px; margin: 30px auto; padding: 0 20px 60px; }

    /* Input Section */
    .input-card {
      background: var(--bg-card); padding: 20px;
      border-radius: 16px; box-shadow: var(--shadow-md);
      margin-bottom: 32px; border: 1px solid var(--border);
    }
    .input-wrapper { position: relative; display: flex; gap: 12px; flex-direction: column; }
    
    #ideaInput {
      width: 100%; border: none; font-size: 1.1rem; 
      padding: 12px 0; border-bottom: 2px solid var(--border);
      background: transparent; color: var(--text-main);
      transition: border-color 0.2s; border-radius: 0;
    }
    #ideaInput:focus { border-bottom-color: var(--primary); }
    #ideaInput::placeholder { color: #cbd5e1; }

    .input-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; align-items: center;}
    .shortcut-hint { font-size: 0.75rem; color: #94a3b8; margin-right: 4px; }
    
    #btnCancelEdit { display: none; background: #fee2e2; color: var(--danger); }
    #btnCancelEdit:hover { background: #fecaca; }

    /* List Header */
    .list-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .stats { font-size: 0.9rem; font-weight: 600; color: var(--text-sub); }
    .stats b { color: var(--primary); }

    .search-wrapper { position: relative; }
    #searchInput {
      padding: 8px 12px 8px 36px; border-radius: 20px; 
      border: 1px solid var(--border); background: var(--bg-card);
      font-size: 0.9rem; width: 180px; transition: all 0.2s;
    }
    #searchInput:focus { width: 240px; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-sub); }

    /* Card Grid */
    .cards { display: grid; gap: 16px; grid-template-columns: 1fr; }
    
    .card {
      background: var(--bg-card); border-radius: var(--radius);
      padding: 24px; border: 1px solid var(--border);
      box-shadow: var(--shadow-sm); transition: all 0.2s ease;
      position: relative; overflow: hidden;
    }
    .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: #cbd5e1; }
    .card.editing { border: 2px solid var(--primary); background: #f5f7ff; }

    .card-content {
      font-size: var(--font-base); line-height: 1.65;
      color: #334155; margin-bottom: 16px; white-space: pre-wrap; word-break: break-all;
    }
    
    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.75rem; color: #94a3b8; margin-top: auto;
    }

    .card-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; }
    .card:hover .card-actions { opacity: 1; }
    @media (max-width: 600px) { .card-actions { opacity: 1; } }

    .action-btn {
      width: 28px; height: 28px; border-radius: 6px; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s; background: #f1f5f9; color: var(--text-sub);
    }
    .action-btn:hover { background: #e2e8f0; color: var(--text-main); }
    .action-btn.del:hover { background: #fee2e2; color: var(--danger); }

    mark { background: #fde047; color: var(--text-main); padding: 0 4px; border-radius: 2px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 20px);
      background: #1e293b; color: #fff; padding: 12px 24px;
      border-radius: 99px; font-size: 0.9rem; font-weight: 500;
      opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      display: flex; align-items: center; gap: 8px;
    }
    #toast.show { opacity: 1; transform: translate(-50%, 0); }

    .empty-state { text-align: center; padding: 60px 0; color: var(--text-sub); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }

    /* Mobile Tweaks */
    @media (max-width: 600px) {
      .header-inner { padding: 12px 16px; flex-direction: column; gap: 10px; align-items: flex-start; }
      .toolbar { width: 100%; justify-content: space-between; }
      .font-control { display: none; }
      .btn-text { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1><span>⚡</span> Tech Lead Note</h1>
    
    <div class="toolbar">
      <div class="font-control">
        <span style="font-size:12px; color:#94a3b8">A</span>
        <input type="range" id="fontSlider" min="14" max="24" step="1" value="16">
        <span style="font-size:16px; color:#64748b">A</span>
      </div>

      <button class="btn btn-ghost" id="btnExcelDown" title="엑셀로 내보내기">
        📊 <span class="btn-text">Excel</span>
      </button>
      <label class="btn btn-ghost" title="엑셀 파일 불러오기" style="cursor:pointer">
        📂 <span class="btn-text">Load</span>
        <input type="file" id="excelInput" accept=".xlsx" style="display:none">
      </label>

      <div class="divider"></div>

      <button class="btn btn-ghost" id="btnJsonDown" title="백업 파일 저장">
        💾 <span class="btn-text">Backup</span>
      </button>
      <label class="btn btn-ghost" title="백업 파일 복원" style="cursor:pointer">
        🔄 <span class="btn-text">Restore</span>
        <input type="file" id="jsonInput" accept=".json" style="display:none">
      </label>

    </div>
  </div>
</header>

<main>
  <section class="input-card">
    <div class="input-wrapper">
      <input type="text" id="ideaInput" placeholder="답안을 차별화할 강력한 리드문을 입력하세요..." autocomplete="off">
      <div class="input-actions">
        <span class="shortcut-hint" title="단축키">Ctrl + S</span>
        <button class="btn" id="btnCancelEdit">취소</button>
        <button class="btn btn-primary" id="btnAdd">기록하기 ↵</button>
      </div>
    </div>
  </section>

  <div class="list-header">
    <div class="stats">
      Total <b id="countBadge">0</b>
    </div>
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="키워드 검색">
    </div>
  </div>

  <div id="cardList" class="cards"></div>
</main>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
(async () => {
  const DB_NAME = 'TechLeadNoteDB';
  const STORE_NAME = 'leads';
  let db;
  let allData = [];
  let editingId = null;

  const $ = id => document.getElementById(id);
  
  const showToast = (msg, icon='✅') => {
    const t = $('toast');
    t.innerHTML = `<span>${icon}</span> <span>${msg}</span>`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };
  
  const fmtDate = (ts) => {
    const d = new Date(ts);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };

  // DB Setup
  function initDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
        }
      };
      req.onsuccess = (e) => { db = e.target.result; resolve(); };
      req.onerror = (e) => reject(e);
    });
  }

  function dbAction(mode, callback) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, mode);
      const store = tx.objectStore(STORE_NAME);
      const req = callback(store);
      tx.oncomplete = () => resolve(); 
      if(req) req.onsuccess = (e) => resolve(e.target.result);
      tx.onerror = (e) => reject(e);
    });
  }
  
  async function loadData() {
    allData = await dbAction('readonly', store => store.getAll());
    allData.sort((a, b) => b.created - a.created);
    render();
  }

  // --- Main Logic (Save/Edit) ---
  async function saveLead() {
    const input = $('ideaInput');
    const txt = input.value.trim();
    if (!txt) {
      input.focus();
      showToast('내용을 입력해주세요', '⚠️');
      return;
    }

    if (editingId !== null) {
      // Edit
      const target = allData.find(d => d.id === editingId);
      if(target) {
        target.content = txt;
        await dbAction('readwrite', store => store.put(target));
        showToast('성공적으로 수정했습니다.');
      }
      cancelEdit();
    } else {
      // Add
      await dbAction('readwrite', store => store.add({
        content: txt,
        created: Date.now()
      }));
      showToast('새로운 리드문이 기록되었습니다.');
      input.value = '';
    }
    loadData();
  }

  // Keyboard Shortcut (Ctrl+S / Cmd+S)
  document.addEventListener('keydown', (e) => {
    // Ctrl(Win) or Meta(Mac) + S
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
      e.preventDefault(); // 브라우저 저장 방지
      saveLead();
    }
  });

  window.editMode = (id) => {
    const item = allData.find(d => d.id === id);
    if(!item) return;

    editingId = id;
    const input = $('ideaInput');
    input.value = item.content;
    input.focus();

    $('btnAdd').innerText = '수정 완료';
    $('btnCancelEdit').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  };

  function cancelEdit() {
    editingId = null;
    $('ideaInput').value = '';
    $('btnAdd').innerText = '기록하기 ↵';
    $('btnCancelEdit').style.display = 'none';
    render();
  }

  window.deleteItem = async (id) => {
    if(!confirm('이 리드문을 삭제하시겠습니까?')) return;
    await dbAction('readwrite', store => store.delete(id));
    if(editingId === id) cancelEdit();
    showToast('삭제되었습니다.', '🗑️');
    loadData();
  };

  function render() {
    const container = $('cardList');
    const kw = $('searchInput').value.trim();
    container.innerHTML = '';

    const filtered = allData.filter(item => {
      if(!kw) return true;
      return item.content.toLowerCase().includes(kw.toLowerCase());
    });

    $('countBadge').innerText = filtered.length;

    if(filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <div>데이터가 없습니다.<br>새로운 인사이트를 기록해보세요.</div>
        </div>`;
      return;
    }

    filtered.forEach(item => {
      const card = document.createElement('div');
      card.className = `card ${item.id === editingId ? 'editing' : ''}`;
      
      let htmlContent = item.content
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      
      if(kw) {
        const regex = new RegExp(`(${kw})`, 'gi');
        htmlContent = htmlContent.replace(regex, '<mark>$1</mark>');
      }

      const iconEdit = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;
      const iconDel = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;

      card.innerHTML = `
        <div class="card-content">${htmlContent}</div>
        <div class="card-footer">
          <span>${fmtDate(item.created)}</span>
          <div class="card-actions">
            <button class="action-btn" onclick="editMode(${item.id})" title="수정">${iconEdit}</button>
            <button class="action-btn del" onclick="deleteItem(${item.id})" title="삭제">${iconDel}</button>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  // --- Excel & JSON Handlers ---
  function downloadExcel() {
    if (allData.length === 0) { showToast('저장할 데이터가 없습니다.', '⚠️'); return; }
    
    // Timestamp 제거됨: 리드문과 포맷된 일시만 저장
    const rows = allData.map(d => ({ 
      '리드문': d.content, 
      '작성일시': fmtDate(d.created)
    }));
    
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{ wch: 60 }, { wch: 20 }]; // 컬럼 너비 2개만 설정
    
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "LeadNotes");
    XLSX.writeFile(wb, `LeadNote_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast('엑셀 저장 완료');
  }

  function readExcel(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (evt) => {
      try {
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        let count = 0;
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        for (const row of rows) {
          const content = row['리드문'] || row['content'] || row['Content'];
          if (!content) continue;
          // Timestamp 컬럼이 없으므로, 불러올 때마다 새로운 시간(Date.now)으로 기록됨
          store.put({ content: String(content), created: row['Timestamp'] || Date.now() });
          count++;
        }
        tx.oncomplete = () => { showToast(`${count}건 가져오기 완료`); loadData(); };
      } catch (err) { showToast('파일 읽기 실패', '⚠️'); }
      e.target.value = '';
    };
    reader.readAsArrayBuffer(file);
  }

  function downloadJSON() {
    if (allData.length === 0) { showToast('데이터가 없습니다.', '⚠️'); return; }
    const blob = new Blob([JSON.stringify(allData, null, 2)], { type: "application/json" });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    showToast('백업 파일 생성 완료');
  }

  function readJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const json = JSON.parse(evt.target.result);
        if(!Array.isArray(json)) throw new Error();
        let count = 0;
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        json.forEach(item => { if(item.content) { delete item.id; store.add(item); count++; } });
        tx.oncomplete = () => { showToast(`${count}건 복원 완료`); loadData(); };
      } catch { showToast('잘못된 JSON 파일입니다.', '⚠️'); }
      e.target.value = '';
    };
    reader.readAsText(file);
  }

  // --- Initialize ---
  await initDB();
  loadData();

  const slider = $('fontSlider');
  const updateFont = (v) => {
    document.documentElement.style.setProperty('--font-base', v + 'px');
    localStorage.setItem('lead_font_size', v);
  };
  slider.oninput = (e) => updateFont(e.target.value);
  const savedFont = localStorage.getItem('lead_font_size');
  if(savedFont) { slider.value = savedFont; updateFont(savedFont); }

  $('btnAdd').onclick = saveLead;
  $('btnCancelEdit').onclick = cancelEdit;
  $('ideaInput').onkeyup = (e) => { 
    if(e.key === 'Enter') saveLead(); 
    if(e.key === 'Escape' && editingId) cancelEdit(); 
  };
  $('searchInput').oninput = render;
  $('btnExcelDown').onclick = downloadExcel;
  $('excelInput').onchange = readExcel;
  $('btnJsonDown').onclick = downloadJSON;
  $('jsonInput').onchange = readJSON;
})();
</script>
</body>
</html>
