<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Item</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard', 'sans-serif'] },
                    colors: { 
                        brand: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' },
                        excel: { focus: '#10b981', bg: '#ecfdf5' }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* 기본 밝고 깔끔한 테마 강제 (다크모드 방지) */
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; color-scheme: light; }
        
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }

        /* 토스트 애니메이션 */
        .toast-enter { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-leave { animation: fadeOut 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateY(100%) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes fadeOut { from { transform: scale(0.95); opacity: 1; } to { transform: scale(0.9); opacity: 0; } }

        /* 고급스러운 테이블 스타일링 */
        .sheet-container {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.03);
            border-radius: 12px;
            background: white;
            border: 1px solid #e2e8f0;
        }

        table { border-collapse: separate; border-spacing: 0; }
        
        th {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #cbd5e1;
            border-right: 1px solid #e2e8f0;
            font-size: 13px;
            font-weight: 700;
            color: #475569;
            letter-spacing: -0.01em;
        }

        td { border-bottom: 1px solid #f1f5f9; border-right: 1px solid #e2e8f0; }
        tr:last-child td { border-bottom: none; }
        
        /* 첫 번째 열 (행 번호) 고정 */
        th.row-num-header { position: sticky; left: 0; z-index: 20; background: #f8fafc; border-right: 1px solid #cbd5e1; }
        td.row-num { position: sticky; left: 0; z-index: 10; background: #f8fafc; border-right: 1px solid #cbd5e1; color: #94a3b8; text-align: center; font-size: 12px; font-weight: 600; transition: background 0.2s; }
        tr:hover td.row-num { background: #e2e8f0; color: #475569; }

        /* 엑셀 스타일 셀 */
        .spreadsheet-cell {
            width: 100%;
            min-height: 42px;
            padding: 10px 14px;
            outline: none;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            white-space: pre-wrap;
            word-break: break-all;
            cursor: text;
            transition: background-color 0.1s;
        }

        .spreadsheet-cell:empty:before {
            content: attr(placeholder);
            color: #cbd5e1;
            pointer-events: none;
            font-weight: 400;
        }
        
        /* 엑셀 같은 포커스 효과 */
        .spreadsheet-cell:focus {
            box-shadow: inset 0 0 0 2px #10b981;
            background-color: #ecfdf5;
            z-index: 5;
            position: relative;
        }
    </style>
</head>
<body class="min-h-screen p-2 sm:p-4 flex flex-col items-center">

    <div class="w-full h-[calc(100vh-2rem)] flex-1 flex flex-col overflow-hidden sheet-container">
        
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between p-4 border-b border-slate-200 bg-white shrink-0 gap-4">
            <div>
                <h2 class="font-bold text-xl text-slate-800 flex items-center gap-2 tracking-tight">
                    <div class="p-1.5 bg-brand-50 rounded-lg"><i data-lucide="sheet" class="w-5 h-5 text-brand-600"></i></div>
                    Memory Item
                </h2>
            </div>
            
            <div class="flex items-center gap-2">
                <button id="btn-add-row" class="px-3.5 py-2 bg-white border border-slate-200 text-slate-700 rounded-lg font-semibold text-sm hover:bg-slate-50 hover:border-slate-300 transition-all flex items-center gap-1.5" title="단축키: Ctrl + L">
                    <i data-lucide="plus" class="w-4 h-4 text-slate-400"></i> 행 추가
                </button>
                <div class="h-5 w-px bg-slate-200 mx-1"></div>
                <button id="btn-save-all" class="px-5 py-2 bg-slate-800 text-white rounded-lg font-semibold text-sm hover:bg-slate-700 transition-all flex items-center gap-1.5 shadow-sm active:scale-95" title="단축키: Ctrl + S">
                    <i data-lucide="save" class="w-4 h-4 opacity-80"></i> 저장
                </button>
                <button id="btn-export-excel" class="px-4 py-2 bg-emerald-50 border border-emerald-200 text-emerald-700 rounded-lg font-semibold text-sm hover:bg-emerald-100 transition-all flex items-center gap-1.5 shadow-sm active:scale-95">
                    <i data-lucide="download" class="w-4 h-4 opacity-80"></i> 엑셀 추출
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-auto bg-slate-50/50 relative">
            <table class="w-full text-left bg-white whitespace-nowrap">
                <thead class="sticky top-0 z-20">
                    <tr>
                        <th class="py-3 px-2 w-12 text-center row-num-header">#</th>
                        <th class="py-3 px-4 min-w-[200px] w-auto">제목</th>
                        <script>
                            for(let i=1; i<=10; i++) {
                                document.write(`<th class="py-3 px-4 min-w-[160px]">키워드 ${i}</th>`);
                            }
                        </script>
                        <th class="py-3 px-2 w-14 text-center border-r-0">관리</th>
                    </tr>
                </thead>
                <tbody id="grid-body">
                </tbody>
            </table>
            
            <div id="empty-state" class="hidden flex flex-col items-center justify-center p-16 text-slate-400">
                <div class="p-4 bg-slate-100 rounded-full mb-4">
                    <i data-lucide="table-2" class="w-8 h-8 text-slate-300"></i>
                </div>
                <p class="text-sm font-semibold text-slate-500">작성된 데이터가 없습니다</p>
                <p class="text-xs mt-1">행을 추가하여 작성을 시작하세요.</p>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[1000] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        lucide.createIcons();

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let bgColor = type === 'error' ? 'bg-red-500' : (type === 'warning' ? 'bg-amber-500' : 'bg-slate-800');
            let icon = type === 'error' ? 'alert-circle' : (type === 'warning' ? 'alert-triangle' : 'check-circle');
            
            toast.className = `${bgColor} text-white px-5 py-3.5 rounded-xl shadow-lg text-sm font-semibold flex items-center gap-2.5 toast-enter pointer-events-auto`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i> ${message}`;
            container.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => {
                toast.classList.remove('toast-enter'); toast.classList.add('toast-leave');
                setTimeout(() => toast.remove(), 300); 
            }, 2000);
        }

        const DB_NAME = "DetailsMakerDB"; 
        const DETAILS_STORE = "maker_details"; 
        let db;

        const initDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1); 
            request.onupgradeneeded = (e) => { 
                if (!e.target.result.objectStoreNames.contains(DETAILS_STORE)) {
                    e.target.result.createObjectStore(DETAILS_STORE, { keyPath: "id", autoIncrement: true }); 
                }
            };
            request.onsuccess = (e) => { db = e.target.result; resolve(db); }; 
            request.onerror = (e) => reject(e.target.error);
        });

        const getAllDetails = () => new Promise((resolve, reject) => {
            const request = db.transaction(DETAILS_STORE, "readonly").objectStore(DETAILS_STORE).getAll();
            request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
        });
        const clearDB = () => new Promise((resolve, reject) => {
            const request = db.transaction(DETAILS_STORE, "readwrite").objectStore(DETAILS_STORE).clear();
            request.onsuccess = () => resolve(); request.onerror = () => reject(request.error);
        });
        const addMultipleToDB = (dataArray) => new Promise((resolve, reject) => {
            const tx = db.transaction(DETAILS_STORE, "readwrite");
            const store = tx.objectStore(DETAILS_STORE);
            dataArray.forEach(data => store.add(data));
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });

        const gridBody = document.getElementById('grid-body');
        const emptyState = document.getElementById('empty-state');
        const btnAddRow = document.getElementById('btn-add-row');
        const btnSaveAll = document.getElementById('btn-save-all');
        const btnExportExcel = document.getElementById('btn-export-excel');

        function createRowHTML(data = null, index = 1) {
            const title = data ? (data.title || '') : '';
            const keywords = data ? data.keywords : Array(10).fill('');

            let kwCells = '';
            for(let i=0; i<10; i++) {
                kwCells += `
                    <td class="p-0 align-top">
                        <div contenteditable="true" spellcheck="false" class="spreadsheet-cell" data-type="keyword" data-idx="${i}" placeholder="입력...">${keywords[i] || ''}</div>
                    </td>
                `;
            }

            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50/50 transition-colors group";
            tr.innerHTML = `
                <td class="row-num select-none">${index}</td>
                <td class="p-0 align-top">
                    <div contenteditable="true" spellcheck="false" class="spreadsheet-cell font-bold text-slate-900" data-type="title" placeholder="제목 입력">${title}</div>
                </td>
                ${kwCells}
                <td class="p-0 text-center align-middle border-r-0">
                    <button class="btn-delete-row w-8 h-8 mx-auto rounded-md text-slate-300 hover:text-red-500 hover:bg-red-50 transition-colors flex items-center justify-center" title="행 삭제">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </td>
            `;
            return tr;
        }

        function updateRowNumbers() {
            const rows = gridBody.querySelectorAll('tr');
            rows.forEach((row, index) => {
                row.querySelector('.row-num').textContent = index + 1;
            });
            if(rows.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
            }
        }

        async function renderGrid() {
            try {
                gridBody.innerHTML = '';
                const details = await getAllDetails();
                
                if(details.length === 0) {
                    gridBody.appendChild(createRowHTML(null, 1));
                } else {
                    details.sort((a,b) => a.id - b.id).forEach((d, idx) => {
                        gridBody.appendChild(createRowHTML(d, idx + 1));
                    });
                }
                updateRowNumbers();
                lucide.createIcons();
            } catch(e) { console.error(e); }
        }

        btnAddRow.addEventListener('click', () => {
            const currentCount = gridBody.querySelectorAll('tr').length;
            const newRow = createRowHTML(null, currentCount + 1);
            gridBody.appendChild(newRow);
            updateRowNumbers();
            lucide.createIcons();
            
            const firstCell = newRow.querySelector('[data-type="title"]');
            if(firstCell) focusCell(firstCell, 'end');
            
            gridBody.parentElement.parentElement.scrollTop = gridBody.parentElement.parentElement.scrollHeight;
        });

        gridBody.addEventListener('click', (e) => {
            const deleteBtn = e.target.closest('.btn-delete-row');
            if(deleteBtn) {
                deleteBtn.closest('tr').remove();
                updateRowNumbers();
            }
        });

        btnSaveAll.addEventListener('click', async () => {
            const rows = gridBody.querySelectorAll('tr');
            const dataToSave = [];
            
            rows.forEach(row => {
                const title = row.querySelector('[data-type="title"]').innerHTML.trim();
                const keywords = Array.from(row.querySelectorAll('[data-type="keyword"]')).map(div => div.innerHTML.trim());
                
                if(title !== '' || keywords.some(k => k !== '')) {
                    dataToSave.push({ title, keywords, updatedAt: new Date().getTime() });
                }
            });

            try {
                btnSaveAll.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin opacity-80"></i> 저장 중...`;
                lucide.createIcons();
                
                await clearDB(); 
                if(dataToSave.length > 0) await addMultipleToDB(dataToSave); 
                
                showToast(`총 ${dataToSave.length}개의 데이터가 저장되었습니다.`);
            } catch(e) {
                showToast('저장 중 오류가 발생했습니다.', 'error');
            } finally {
                btnSaveAll.innerHTML = `<i data-lucide="save" class="w-4 h-4 opacity-80"></i> 전체 저장`;
                lucide.createIcons();
                renderGrid(); 
            }
        });

        btnExportExcel.addEventListener('click', async () => {
            try {
                const details = await getAllDetails();
                if(details.length === 0) { showToast('저장된 데이터가 없습니다.', 'warning'); return; }

                const cleanText = (html) => {
                    if (!html) return '';
                    let text = html;
                    
                    text = text.replace(/[\r\n\t]+/g, ' ');
                    text = text.replace(/<br\s*[\/]?>/gi, '\n');
                    text = text.replace(/<\/div>/gi, '\n');
                    text = text.replace(/<\/p>/gi, '\n');
                    text = text.replace(/<[^>]*>?/gm, '');
                    text = text.replace(/&nbsp;/g, ' ');
                    text = text.replace(/&lt;/g, '<');
                    text = text.replace(/&gt;/g, '>');
                    text = text.replace(/&amp;/g, '&');
                    text = text.replace(/&quot;/g, '"');
                    text = text.replace(/&#39;/g, "'");
                    text = text.replace(/\u200B/g, '');
                    text = text.replace(/ {2,}/g, ' ');
                    
                    return text.split('\n')
                               .map(line => line.trim())
                               .filter(line => line !== '')
                               .join('\n');
                };

                const excelData = details.map(d => {
                    let row = { '제목': cleanText(d.title) }; 
                    for(let i=1; i<=10; i++) {
                        row[`키워드${i}`] = cleanText(d.keywords[i-1]);
                    }
                    return row;
                });

                const worksheet = XLSX.utils.json_to_sheet(excelData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "세부내역");

                XLSX.writeFile(workbook, `MemoryRoom_${new Date().getTime()}.xlsx`);
                showToast('엑셀 파일이 다운로드되었습니다!', 'success');
            } catch(error) { showToast('엑셀 생성 중 오류가 발생했습니다.', 'error'); }
        });

        function getCaretPosition(element) {
            let caretOffset = 0;
            const doc = element.ownerDocument || element.document;
            const win = doc.defaultView || doc.parentWindow;
            if (typeof win.getSelection !== "undefined") {
                const sel = win.getSelection();
                if (sel.rangeCount > 0) {
                    const range = win.getSelection().getRangeAt(0);
                    const preCaretRange = range.cloneRange();
                    preCaretRange.selectNodeContents(element);
                    preCaretRange.setEnd(range.endContainer, range.endOffset);
                    caretOffset = preCaretRange.toString().length;
                }
            }
            return caretOffset;
        }

        function focusCell(cell, pos = 'end') {
            cell.focus();
            if (typeof window.getSelection !== "undefined" && typeof document.createRange !== "undefined") {
                const range = document.createRange();
                range.selectNodeContents(cell);
                if (pos === 'end') range.collapse(false);
                else range.collapse(true);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }
        }

        // ==========================================
        // 붙여넣기(Paste) 서식 제거 처리
        // ==========================================
        document.addEventListener('paste', (e) => {
            const el = e.target;
            // 붙여넣기하는 대상이 스프레드시트 셀 내부인 경우만 적용
            if (el && el.classList && el.classList.contains('spreadsheet-cell')) {
                e.preventDefault(); // 기본 붙여넣기 동작(HTML 복사) 차단
                
                // 클립보드에서 순수 텍스트(Plain Text)만 추출
                const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                
                // 커서 위치에 순수 텍스트로 삽입
                document.execCommand('insertText', false, text);
            }
        });

        // ==========================================
        // 키보드 내비게이션 및 전역 단축키
        // ==========================================
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key.toLowerCase() === 's') {
                e.preventDefault();
                btnSaveAll.click();
                return;
            }
            
            if (e.ctrlKey && e.key.toLowerCase() === 'l') {
                e.preventDefault();
                btnAddRow.click();
                return;
            }

            const el = document.activeElement;
            if (!el.classList.contains('spreadsheet-cell')) return;

            const td = el.closest('td');
            const tr = el.closest('tr');
            const cellIndex = Array.from(tr.children).indexOf(td);

            const moveHorizontal = (direction) => {
                if (direction === 'next') {
                    let nextTd = td.nextElementSibling;
                    while (nextTd && !nextTd.querySelector('.spreadsheet-cell')) {
                        nextTd = nextTd.nextElementSibling;
                    }
                    if (nextTd) {
                        focusCell(nextTd.querySelector('.spreadsheet-cell'), 'start');
                    } else {
                        let nextTr = tr.nextElementSibling;
                        if (!nextTr) { btnAddRow.click(); nextTr = tr.nextElementSibling; }
                        if (nextTr) focusCell(nextTr.children[1].querySelector('.spreadsheet-cell'), 'start');
                    }
                } else {
                    let prevTd = td.previousElementSibling;
                    while (prevTd && !prevTd.querySelector('.spreadsheet-cell')) {
                        prevTd = prevTd.previousElementSibling;
                    }
                    if (prevTd) {
                        focusCell(prevTd.querySelector('.spreadsheet-cell'), 'end');
                    } else {
                        const prevTr = tr.previousElementSibling;
                        if (prevTr) {
                            const cells = prevTr.querySelectorAll('.spreadsheet-cell');
                            if (cells.length > 0) focusCell(cells[cells.length-1], 'end');
                        }
                    }
                }
            };

            if (e.key === 'Enter' && e.altKey) {
                e.preventDefault();
                const selection = window.getSelection();
                const range = selection.getRangeAt(0);
                const br = document.createElement('br');
                const zeroWidthSpace = document.createTextNode('\u200B');
                
                range.deleteContents();
                range.insertNode(zeroWidthSpace);
                range.insertNode(br);
                range.setStartAfter(zeroWidthSpace);
                range.setEndAfter(zeroWidthSpace);
                selection.removeAllRanges();
                selection.addRange(range);
                return;
            }

            if (e.key === 'Enter' && !e.shiftKey && !e.altKey) {
                e.preventDefault();
                let nextTr = tr.nextElementSibling;
                if (!nextTr) {
                    btnAddRow.click();
                    nextTr = tr.nextElementSibling;
                }
                if (nextTr) {
                    const targetCell = nextTr.children[cellIndex].querySelector('.spreadsheet-cell');
                    if (targetCell) focusCell(targetCell, 'end');
                }
                return;
            }

            if (e.key === 'Enter' && e.shiftKey) {
                e.preventDefault();
                const prevTr = tr.previousElementSibling;
                if (prevTr) {
                    const targetCell = prevTr.children[cellIndex].querySelector('.spreadsheet-cell');
                    if (targetCell) focusCell(targetCell, 'end');
                }
                return;
            }

            if (e.key === 'Tab') {
                e.preventDefault();
                moveHorizontal(e.shiftKey ? 'prev' : 'next');
                return;
            }

            if (e.key === 'ArrowLeft') {
                const caretPos = getCaretPosition(el);
                if (caretPos === 0) {
                    e.preventDefault();
                    moveHorizontal('prev');
                    return;
                }
            }
            if (e.key === 'ArrowRight') {
                const caretPos = getCaretPosition(el);
                if (caretPos === el.textContent.length) {
                    e.preventDefault();
                    moveHorizontal('next');
                    return;
                }
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                const prevTr = tr.previousElementSibling;
                if (prevTr) {
                    const targetCell = prevTr.children[cellIndex].querySelector('.spreadsheet-cell');
                    if (targetCell) focusCell(targetCell, 'end');
                }
                return;
            }
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                const nextTr = tr.nextElementSibling;
                if (nextTr) {
                    const targetCell = nextTr.children[cellIndex].querySelector('.spreadsheet-cell');
                    if (targetCell) focusCell(targetCell, 'end');
                }
                return;
            }

            let command = null, commandArg = null;
            if (e.ctrlKey && !e.altKey && !e.shiftKey && e.key.toLowerCase() === 'b') { e.preventDefault(); command = 'bold'; }
            else if (e.ctrlKey && !e.altKey && !e.shiftKey && e.key.toLowerCase() === 'i') { e.preventDefault(); command = 'italic'; }
            else if (e.ctrlKey && !e.altKey && !e.shiftKey && e.key.toLowerCase() === 'u') { e.preventDefault(); command = 'underline'; }
            else if (e.ctrlKey && e.altKey && e.key.toLowerCase() === 'r') { e.preventDefault(); command = 'foreColor'; commandArg = '#ef4444'; }
            else if (e.ctrlKey && e.altKey && e.key.toLowerCase() === 'b') { e.preventDefault(); command = 'foreColor'; commandArg = '#3b82f6'; }

            if (command) document.execCommand(command, false, commandArg);
        });

        window.addEventListener('DOMContentLoaded', async () => { 
            await initDB(); 
            renderGrid(); 
        });
    </script>
</body>
</html>
