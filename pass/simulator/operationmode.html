<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블록 암호화 운영모드 시뮬레이터 (UI 개선본)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .node-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-weight: bold;
            text-align: center;
            width: 120px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
            font-size: 0.875rem;
        }
        .data-text { font-family: monospace; font-size: 0.7rem; color: #4B5563; margin-top: 4px; background: rgba(255,255,255,0.8); padding: 2px 4px; border-radius: 4px; width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        
        .box-pt { background-color: #DBEAFE; color: #1E3A8A; border: 2px solid #93C5FD; }
        .box-iv { background-color: #FCE7F3; color: #9D174D; border: 2px solid #F9A8D4; }
        .box-xor { background-color: #F3E8FF; color: #6B21A8; border: 2px solid #D8B4FE; border-radius: 50%; width: 50px; height: 50px; z-index: 10; }
        
        .box-enc { background-color: #FEF3C7; color: #92400E; border: 2px solid #FCD34D; }
        .box-dec { background-color: #FFEDD5; color: #9A3412; border: 2px solid #FDBA74; }
        
        .box-ct { background-color: #D1FAE5; color: #065F46; border: 2px solid #6EE7B7; }
        .box-ks { background-color: #E0E7FF; color: #3730A3; border: 2px solid #A5B4FC; }
        
        .box-highlight { border-width: 3px; border-color: #EF4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }

        .v-line { width: 2px; height: 20px; background-color: #9CA3AF; margin: 0 auto; }
        .h-line { height: 2px; width: 24px; background-color: #9CA3AF; }

        .arr-down::after { content: '▼'; position: absolute; bottom: -14px; left: calc(50% - 6px); color: #9CA3AF; font-size: 10px;}
        .arr-right::after { content: '▶'; position: absolute; right: -14px; top: calc(50% - 7px); color: #9CA3AF; font-size: 10px;}

        .chain-path { stroke-dasharray: 8; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -16; } }
        
        .mode-btn.active { background-color: #4F46E5; color: white; border-color: #4F46E5; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .toggle-checkbox:checked { right: 0; border-color: #10B981; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10B981; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen p-4 flex flex-col items-center">

        // ==========================================
        // 실제 동작하는 가역적 암/복호화 코어 엔진
        // ==========================================
        
        function stringToHex(str) {
            return Array.from(str).map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('').toUpperCase();
        }
        function hexToString(hex) {
            let str = '';
            for (let i = 0; i < hex.length; i += 2) {
                str += String.fromCharCode(parseInt(hex.substring(i, i + 2), 16));
            }
            return str;
        }

        function xor(data, keyStr) {
            let res = '';
            for (let i = 0; i < data.length; i++) {
                const char1 = data.charCodeAt(i) || 0;
                const char2 = keyStr.charCodeAt(i % (keyStr.length || 1)) || 0;
                res += String.fromCharCode(char1 ^ char2);
            }
            return res;
        }

        function encryptBlock(pt, key) { return stringToHex(xor(pt, key)); }
        function decryptBlock(ctHex, key) { return xor(hexToString(ctHex), key); }

        function toggleAction() {
            isDecryption = document.getElementById('action-toggle').checked;
            
            document.getElementById('label-enc').classList.toggle('text-gray-600', !isDecryption);
            document.getElementById('label-enc').classList.toggle('text-gray-400', isDecryption);
            document.getElementById('label-dec').classList.toggle('text-gray-600', isDecryption);
            document.getElementById('label-dec').classList.toggle('text-gray-400', !isDecryption);
            
            document.getElementById('label-data1').innerText = isDecryption ? "암호문 블록 1 (입력)" : "평문 블록 1";
            document.getElementById('label-data2').innerText = isDecryption ? "암호문 블록 2 (입력)" : "평문 블록 2";
            
            const in1El = document.getElementById('input-data1');
            const in2El = document.getElementById('input-data2');

            if(isDecryption) {
                in1El.classList.replace('bg-blue-50', 'bg-emerald-50');
                in2El.classList.replace('bg-blue-50', 'bg-emerald-50');
                if (lastEncrypted1) in1El.value = lastEncrypted1;
                if (lastEncrypted2) in2El.value = lastEncrypted2;
            } else {
                in1El.classList.replace('bg-emerald-50', 'bg-blue-50');
                in2El.classList.replace('bg-emerald-50', 'bg-blue-50');
                in1El.value = "HELLO"; 
                in2El.value = "WORLD";
            }

            renderMode();
        }

        const btnContainer = document.getElementById('mode-buttons');
        Object.keys(modeData).forEach(mode => {
            const btn = document.createElement('button');
            btn.className = "mode-btn px-2 py-2 text-sm border border-gray-300 rounded font-bold text-gray-600 transition-colors bg-white hover:bg-indigo-50";
            btn.innerText = mode;
            btn.onclick = () => { currentMode = mode; renderMode(); };
            btnContainer.appendChild(btn);
        });

        function renderMode() {
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.classList.toggle('active', b.innerText === currentMode);
            });

            const info = modeData[currentMode];
            document.getElementById('desc-text').innerText = isDecryption ? info.decFeat : info.encFeat;

            const templateKey = currentMode + (isDecryption ? "_DEC" : "_ENC");
            const container = document.getElementById('diagram-container');
            
            container.style.opacity = 0;
            document.getElementById('chain-line').setAttribute('d', '');
            document.getElementById('chain-arrow').setAttribute('points', '');
            document.getElementById('chain-label').textContent = '';

            setTimeout(() => {
                container.innerHTML = templates[templateKey];
                updateData(); 
                container.style.opacity = 1;
                setTimeout(drawChainLine, 100); 
            }, 150);
        }

        function updateData() {
            const in1 = document.getElementById('input-data1').value || ' ';
            const in2 = document.getElementById('input-data2').value || ' ';
            const iv = document.getElementById('input-iv').value || 'IV';
            const key = document.getElementById('input-key').value || 'KEY';

            const safeSet = (id, val) => { const el = document.getElementById(id); if(el) el.innerText = val; }

            safeSet('d-iv', stringToHex(iv).substring(0,6));
            safeSet('d-key1', stringToHex(key).substring(0,4)); 
            safeSet('d-key2', stringToHex(key).substring(0,4));

            if (!isDecryption) {
                safeSet('d-pt1', in1); safeSet('d-pt2', in2);
                let ct1, ct2;

                if (currentMode === "ECB") {
                    ct1 = encryptBlock(in1, key);
                    ct2 = encryptBlock(in2, key);
                } 
                else if (currentMode === "CBC") {
                    ct1 = encryptBlock(xor(in1, iv), key);
                    ct2 = encryptBlock(xor(in2, hexToString(ct1)), key);
                }
                else if (currentMode === "PCBC") {
                    ct1 = encryptBlock(xor(in1, iv), key);
                    let m = xor(in1, hexToString(ct1)); 
                    safeSet('d-pcbc1', stringToHex(m).substring(0,6));
                    ct2 = encryptBlock(xor(in2, m), key);
                }
                else if (currentMode === "CFB") {
                    let ks1 = encryptBlock(iv, key);
                    ct1 = stringToHex(xor(in1, hexToString(ks1)));
                    let ks2 = encryptBlock(hexToString(ct1), key);
                    ct2 = stringToHex(xor(in2, hexToString(ks2)));
                }
                else if (currentMode === "OFB") {
                    let ks1 = encryptBlock(iv, key); 
                    safeSet('d-ks1', ks1.substring(0,6));
                    ct1 = stringToHex(xor(in1, hexToString(ks1)));
                    let ks2 = encryptBlock(hexToString(ks1), key); 
                    safeSet('d-ks2', ks2.substring(0,6));
                    ct2 = stringToHex(xor(in2, hexToString(ks2)));
                }
                else if (currentMode === "CTR") {
                    safeSet('d-iv2', stringToHex(iv+"2").substring(0,6));
                    let ks1 = encryptBlock(iv+"1", key); 
                    safeSet('d-ks1', ks1.substring(0,6));
                    ct1 = stringToHex(xor(in1, hexToString(ks1)));
                    let ks2 = encryptBlock(iv+"2", key); 
                    safeSet('d-ks2', ks2.substring(0,6));
                    ct2 = stringToHex(xor(in2, hexToString(ks2)));
                }

                safeSet('d-ct1', ct1); safeSet('d-ct2', ct2);
                lastEncrypted1 = ct1;
                lastEncrypted2 = ct2;
            } 
            else {
                safeSet('d-in1', in1); safeSet('d-in2', in2);
                let out1, out2;

                if (currentMode === "ECB") {
                    out1 = decryptBlock(in1, key);
                    out2 = decryptBlock(in2, key);
                } 
                else if (currentMode === "CBC") {
                    out1 = xor(decryptBlock(in1, key), iv);
                    out2 = xor(decryptBlock(in2, key), hexToString(in1));
                }
                else if (currentMode === "PCBC") {
                    out1 = xor(decryptBlock(in1, key), iv);
                    let m = xor(out1, hexToString(in1)); 
                    safeSet('d-pcbc1', stringToHex(m).substring(0,6));
                    out2 = xor(decryptBlock(in2, key), m);
                }
                else if (currentMode === "CFB") {
                    let ks1 = encryptBlock(iv, key);
                    out1 = xor(hexToString(in1), hexToString(ks1));
                    let ks2 = encryptBlock(hexToString(in1), key);
                    out2 = xor(hexToString(in2), hexToString(ks2));
                }
                else if (currentMode === "OFB") {
                    let ks1 = encryptBlock(iv, key); 
                    safeSet('d-ks1', ks1.substring(0,6));
                    out1 = xor(hexToString(in1), hexToString(ks1));
                    let ks2 = encryptBlock(hexToString(ks1), key); 
                    safeSet('d-ks2', ks2.substring(0,6));
                    out2 = xor(hexToString(in2), hexToString(ks2));
                }
                else if (currentMode === "CTR") {
                    safeSet('d-iv2', stringToHex(iv+"2").substring(0,6));
                    let ks1 = encryptBlock(iv+"1", key); 
                    safeSet('d-ks1', ks1.substring(0,6));
                    out1 = xor(hexToString(in1), hexToString(ks1));
                    let ks2 = encryptBlock(iv+"2", key); 
                    safeSet('d-ks2', ks2.substring(0,6));
                    out2 = xor(hexToString(in2), hexToString(ks2));
                }

                safeSet('d-out1', out1); safeSet('d-out2', out2);
            }
        }

        function drawChainLine() {
            const chainInfo = isDecryption ? modeData[currentMode].chainDec : modeData[currentMode].chainEnc;
            const svg = document.getElementById('chain-svg');
            const line = document.getElementById('chain-line');
            const arrow = document.getElementById('chain-arrow');
            const label = document.getElementById('chain-label');

            if (!chainInfo.from || !chainInfo.to) {
                line.setAttribute('d', ''); arrow.setAttribute('points', ''); label.textContent = ''; return;
            }

            const el1 = document.getElementById(chainInfo.from);
            const el2 = document.getElementById(chainInfo.to);
            if (!el1 || !el2) return;

            const svgRect = svg.getBoundingClientRect();
            const r1 = el1.getBoundingClientRect();
            const r2 = el2.getBoundingClientRect();

            const startX = r1.right - svgRect.left;
            const startY = r1.top + (r1.height / 2) - svgRect.top;

            let endX, endY;
            if (chainInfo.to === "n-xor2") {
                endX = r2.left - svgRect.left - 5; 
                endY = r2.top + (r2.height / 2) - svgRect.top;
            } else {
                endX = r2.left + (r2.width / 2) - svgRect.left;
                endY = r2.top - svgRect.top - 5;
            }

            const cp1X = startX + 60;
            const cp1Y = startY;
            const cp2X = (chainInfo.to === "n-xor2") ? endX - 60 : endX;
            const cp2Y = (chainInfo.to === "n-xor2") ? endY : endY - 60;

            line.setAttribute('d', `M ${startX} ${startY} C ${cp1X} ${cp1Y}, ${cp2X} ${cp2Y}, ${endX} ${endY}`);

            const a = 6;
            if (chainInfo.to === "n-xor2") {
                arrow.setAttribute('points', `${endX},${endY} ${endX-a*1.5},${endY-a} ${endX-a*1.5},${endY+a}`);
            } else {
                arrow.setAttribute('points', `${endX},${endY} ${endX-a},${endY-a*1.5} ${endX+a},${endY-a*1.5}`);
            }

            label.textContent = chainInfo.label;
            label.setAttribute('x', (startX + endX) / 2);
            label.setAttribute('y', (startY + endY) / 2 - 10);
        }

        document.querySelectorAll('input[type="text"]').forEach(i => i.addEventListener('input', updateData));
        window.addEventListener('resize', drawChainLine);

        window.onload = () => renderMode();

    </script>
