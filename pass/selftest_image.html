<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>셀프 테스트 이미지</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --fg:#1f2937;
      --primary:#3b82f6;
      --muted:#64748b;
      --card:#ffffff;
      --radius:18px;
    }
    *{ box-sizing:border-box; }
    body{
      font-family:'Noto Sans KR',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:var(--bg); color:var(--fg);
      margin:0; padding:16px; min-height:100vh;
    }
    header{
      display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between;
      margin-bottom:12px; gap:8px;
    }
    .title{
      font-size:20px; font-weight:700; letter-spacing:.02em;
      display:flex; align-items:center; gap:8px;
    }
    .badge{
      padding:3px 8px; border-radius:999px;
      background:#e0edff; color:#1d4ed8; font-size:11px;
      border:1px solid #bfdbfe;
    }
    .toolbar{
      display:flex; flex-wrap:wrap; gap:8px; align-items:center;
    }
    button,select,input[type="text"]{
      border:1px solid #dbe1ea; background:#fff; color:var(--fg);
      padding:8px 12px; border-radius:10px; font-weight:600; cursor:pointer;
      font-size:13px;
    }
    button.primary{ background:var(--primary); border-color:var(--primary); color:#fff; }
    button.ghost{ background:#fff; color:var(--primary); border-color:var(--primary); }
    button:disabled{ opacity:.5; cursor:not-allowed; }
    input[type="text"]{ min-width:160px; }
    select{ min-width:140px; }

    main{ display:grid; gap:12px; grid-template-columns:1fr; }

    .flashcard{
      background:var(--card); border-radius:var(--radius); padding:14px;
      box-shadow:0 8px 26px rgba(0,0,0,.06);
      display:grid; gap:10px; justify-items:center; position:relative;
    }

    .stage{
      width:min(1024px, 92vw);
      height:min(70vh, 720px);
      background:#f3f4f6;
      border-radius:14px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      overflow:auto;
      scroll-behavior:smooth;
    }
    #cardImage{
      max-width:100%;
      height:auto;
      display:block;
      transition:transform .15s ease-out;
      transform-origin:top center;
    }
    .card-meta{
      width:min(1024px,92vw);
      display:grid;
      grid-template-columns:minmax(0,2.2fr) minmax(0,1.2fr);
      gap:10px;
    }
    @media (max-width:900px){
      .card-meta{ grid-template-columns:1fr; }
    }
    .card-text, .card-side{
      background:#f9fafb;
      border-radius:12px;
      padding:10px 12px;
      border:1px solid #e5e7eb;
      font-size:13px;
    }
    .field-label{
      font-size:11px; font-weight:700; color:#6b7280; margin-bottom:4px;
    }
    .field-body{
      white-space:pre-wrap; line-height:1.5;
    }
    .meta-header{
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:6px; font-size:13px;
    }
    .meta-header strong{ font-size:14px; }
    .pill{
      padding:3px 7px; border-radius:999px; font-size:11px;
      border:1px solid #e5e7eb; background:#f3f4ff; color:#1d4ed8;
    }

    .nav-row{
      width:min(1024px,92vw);
      display:flex; flex-wrap:wrap; gap:8px; justify-content:space-between; align-items:center;
      margin-top:4px;
      font-size:12px; color:#6b7280;
    }
    .nav-buttons{ display:flex; gap:6px; flex-wrap:wrap; }
    .session-info{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

    .zoombar{
      display:inline-flex; gap:4px; align-items:center; border-radius:999px;
      padding:3px 6px; background:#f3f4ff; border:1px solid #dbeafe;
      font-size:11px;
    }
    .zoombar button{
      padding:4px 6px; font-size:11px;
      border-radius:999px; border:1px solid #c7d2fe; background:#eef2ff; color:#4338ca;
    }
    .zoomval{ min-width:40px; text-align:right; }

    .thumbbar{
      width:min(1024px,92vw);
      margin-top:6px;
      background:#f9fafb;
      border-radius:12px;
      border:1px dashed #d4d4d8;
      padding:6px 8px;
    }
    .thumbs{
      margin-top:4px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(72px,1fr));
      gap:6px;
      max-height:180px;
      overflow:auto;
    }
    .thumbs button{
      padding:0;
      aspect-ratio:1/1;
      overflow:hidden;
      border-radius:8px;
      border:2px solid transparent;
      background:#fff;
      cursor:pointer;
    }
    .thumbs button.active{
      border-color:#3b82f6;
      box-shadow:0 0 0 1px #93c5fd;
    }
    .thumbs img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .toast{
      position:fixed;
      left:50%; top:16px; transform:translateX(-50%);
      background:#111827; color:#e5e7eb;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      opacity:0; pointer-events:none;
      transition:opacity .18s ease-out, transform .18s ease-out;
      z-index:50;
    }
    .toast.show{
      opacity:1; transform:translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <header>
    <div class="title">
      셀프 테스트 이미지
    </div>
    <div class="toolbar">
      <select id="domainSel"><option value="">전체 주간정보</option></select>
      <input type="text" id="search" placeholder="검색(주간정보/문제/전략/메모)" />
      <button id="btnReload" class="ghost">DB 다시 읽기</button>
      <button id="btnResetSession">세션 초기화</button>
      <div class="zoombar">
        <button id="zoomOut">−</button>
        <button id="zoomReset">100%</button>
        <button id="zoomIn">＋</button>
        <span class="zoomval" id="zoomVal">100%</span>
      </div>
    </div>
  </header>

  <main>
    <section class="flashcard">
      <div class="stage" id="stage">
        <img id="cardImage" alt="학습 이미지" />
      </div>

      <div class="card-meta">
        <div class="card-text">
          <div class="meta-header">
            <strong id="metaDomain">주간정보 : -</strong>
            <span id="metaSeq" class="pill">0 / 0</span>
          </div>
          <div>
            <div class="field-label">문제</div>
            <div id="fieldTitle" class="field-body"></div>
          </div>
        </div>
        <div class="card-side">
          <div class="field-label">메모</div>
          <div id="fieldNote" class="field-body"></div>
        </div>
      </div>

      <div class="nav-row">
        <div class="nav-buttons">
          <button id="btnPrev">◀ 이전</button>
          <button id="btnNext">다음 ▶</button>
          <button id="btnDone" class="primary">현재 카드 완료</button>
        </div>
        <div class="session-info">
          <span id="sessionCount">0 / 0</span>
          <span id="sessionInfoDetail"></span>
        </div>
      </div>

      <div class="thumbbar">
        <div style="font-size:11px;color:#6b7280;margin-bottom:2px;">
          썸네일 (클릭하면 해당 이미지로 바로 이동)
        </div>
        <div class="thumbs" id="thumbs"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
  (function(){
    // === IndexedDB 설정: selftest.html 과 동일 DB를 공유 ===
    const DB_NAME = "SelfTestDB";
    const DB_VER  = 1;
    let db = null;

    const state = {
      cards: [],   
      curIndex: 0,
      removed: new Set(),
      domain: "",
      search: "",
      zoom: 1.0
    };

    const escMap = {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"};
    const esc = s => String(s ?? "").replace(/[&<>"']/g, ch => escMap[ch] || ch);

    const toastEl = document.getElementById("toast");
    let toastTimer = null;
    function showToast(msg){
      if(!toastEl) return;
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      if(toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(()=>toastEl.classList.remove("show"), 2200);
    }

    function tx(store, mode="readonly"){
      if(!db) throw new Error("DB not opened");
      if(!db.objectStoreNames.contains(store)){
        throw new Error('ObjectStore "'+store+'" 가 없습니다.');
      }
      return db.transaction(store, mode).objectStore(store);
    }

    function openDB(){
      return new Promise((resolve,reject)=>{
        const req = indexedDB.open(DB_NAME, DB_VER);
        req.onupgradeneeded = e => {
          const d = e.target.result;
          if(!d.objectStoreNames.contains("tests")){
            d.createObjectStore("tests",{keyPath:"id"});
          }
          if(!d.objectStoreNames.contains("images")){
            d.createObjectStore("images",{keyPath:"id"});
          }
        };
        req.onsuccess = e => {
          db = e.target.result;
          db.onversionchange = ()=>{
            try{ db.close(); }catch(_){}
            db = null;
          };
          resolve(db);
        };
        req.onerror = ()=>reject(req.error);
      });
    }

    function ensureDB(){
      if(db) return Promise.resolve(db);
      return openDB();
    }

    function withStore(storeName, mode, executor){
      return ensureDB().then(()=>{
        const run = ()=>{
          const store = tx(storeName, mode);
          return executor(store);
        };
        try{
          return run();
        }catch(e){
          if(e && e.name === "InvalidStateError"){
            db = null;
            return ensureDB().then(()=>run());
          }
          return Promise.reject(e);
        }
      });
    }

    function getAllTests(){
      return withStore("tests","readonly", store=>{
        return new Promise((resolve,reject)=>{
          const r = store.getAll();
          r.onsuccess = ()=>resolve(r.result || []);
          r.onerror   = ()=>reject(r.error);
        });
      });
    }

    function getImageObjectURL(id){
      if(!id) return Promise.resolve("");
      return withStore("images","readonly", store=>{
        return new Promise((resolve,reject)=>{
          const r = store.get(id);
          r.onsuccess = ()=>{
            const rec = r.result;
            if(!rec || !rec.blob){ resolve(""); return; }
            const url = URL.createObjectURL(rec.blob);
            resolve(url);
          };
          r.onerror = ()=>reject(r.error);
        });
      });
    }

    // === 카드 구성 ===
    function buildDomainSel(){
      const sel = document.getElementById("domainSel");
      if(!sel) return;
      const domains = [...new Set(state.cards.map(c => (c.domain||"").trim()).filter(Boolean))]
        .sort((a,b)=>a.localeCompare(b,"ko"));
      const cur = state.domain;
      sel.innerHTML = '<option value="">전체 주간정보</option>' + domains.map(d =>
        '<option value="'+esc(d)+'">'+esc(d)+'</option>'
      ).join("");
      if(cur && domains.includes(cur)) sel.value = cur;
      else sel.value = "";
    }

    function filteredCards(){
      const q = (state.search || "").trim().toLowerCase();
      const dom = (state.domain || "").trim();
      return state.cards.filter(c=>{
        if(state.removed.has(c.key)) return false;
        if(dom && c.domain !== dom) return false;
        if(!q) return true;
        const blob = (c.domain+" "+c.title+" "+c.text+" "+c.note).toLowerCase();
        return blob.includes(q);
      });
    }

    function updateSessionInfo(){
      const list = filteredCards();
      const idx = Math.min(state.curIndex, list.length-1);
      const curNum = list.length ? (idx+1) : 0;
      const total = list.length;
      const removedCnt = state.removed.size;
      const sessionCountEl = document.getElementById("sessionCount");
      const detailEl       = document.getElementById("sessionInfoDetail");
      if(sessionCountEl) sessionCountEl.textContent = curNum + " / " + total;
      if(detailEl) detailEl.textContent = removedCnt ? `(완료로 뺀 카드: ${removedCnt}장)` : "";
    }

    async function renderThumbs(){
      const thumbsEl = document.getElementById("thumbs");
      if(!thumbsEl) return;
      const list = filteredCards();
      thumbsEl.innerHTML = "";
      for(let idx=0; idx<list.length; idx++){
        const c = list[idx];
        const btn = document.createElement("button");
        if(idx === Math.min(state.curIndex, list.length-1)) btn.classList.add("active");
        const img = document.createElement("img");
        if(c.imgId){
          try{
            const url = await getImageObjectURL(c.imgId);
            img.src = url || "";
          }catch(e){
            console.error(e);
            img.src = "";
          }
        }else{
          img.src = "";
        }
        img.alt = c.title || "";
        btn.appendChild(img);
        btn.addEventListener("click", ()=>{
          state.curIndex = idx;
          showCurrentCard();
        });
        thumbsEl.appendChild(btn);
      }
    }

    function setZoom(z){
      const minZ = 0.25, maxZ = 3.0;
      state.zoom = Math.max(minZ, Math.min(maxZ, z));
      const imgEl = document.getElementById("cardImage");
      if(imgEl){
        imgEl.style.transform = "scale("+state.zoom.toFixed(2)+")";
      }
      const zEl = document.getElementById("zoomVal");
      if(zEl) zEl.textContent = Math.round(state.zoom*100) + "%";
    }

    
    // ----- 커스텀 태그(<mark>, <red>, <blue> ...) 이미지뷰 렌더링 -----
    function normalizeImageCustomTags(src){
      if(!src) return "";
      let s = String(src);
      // 5R 스타일 span 기반 태그를 커스텀 태그로 통일
      s = s.replace(/<\s*span\b[^>]*data-tag=["'](red|blue|green)["'][^>]*>([\s\S]*?)<\s*\/\s*span\s*>/gi,
        (m,color,inner)=>`<${color.toLowerCase()}>${inner}</${color.toLowerCase()}>`);
      return s;
    }
    function renderImageWithMark(raw){
      let s = normalizeImageCustomTags(raw ?? "");
      const tags = ["mark","u","del","red","blue","green"];
      const openMap = {};
      const closeMap = {};
      tags.forEach(t=>{
        openMap[`<${t}>`]   = `__OPEN_${t.toUpperCase()}__`;
        closeMap[`</${t}>`] = `__CLOSE_${t.toUpperCase()}__`;
      });
      // 커스텀 태그를 플레이스홀더로 치환
      Object.keys(openMap).forEach(k=>{
        const re = new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi");
        s = s.replace(re, openMap[k]);
      });
      Object.keys(closeMap).forEach(k=>{
        const re = new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi");
        s = s.replace(re, closeMap[k]);
      });
      // 나머지 전체를 이스케이프
      s = esc(s);
      // 플레이스홀더를 실제 HTML로 복원
      s = s
        .replace(/__OPEN_MARK__/g,"<mark>")
        .replace(/__CLOSE_MARK__/g,"</mark>")
        .replace(/__OPEN_U__/g,"<u>")
        .replace(/__CLOSE_U__/g,"</u>")
        .replace(/__OPEN_DEL__/g,"<del>")
        .replace(/__CLOSE_DEL__/g,"</del>")
        .replace(/__OPEN_RED__/g,'<span style="color:#e53935;">')
        .replace(/__CLOSE_RED__/g,"</span>")
        .replace(/__OPEN_BLUE__/g,'<span style="color:#1e88e5;">')
        .replace(/__CLOSE_BLUE__/g,"</span>")
        .replace(/__OPEN_GREEN__/g,'<span style="color:#43a047;">')
        .replace(/__CLOSE_GREEN__/g,"</span>");
      return s;
    }

async function showCurrentCard(){
      const list = filteredCards();
      const imgEl = document.getElementById("cardImage");
      const metaDomain = document.getElementById("metaDomain");
      const metaSeq = document.getElementById("metaSeq");
      const fTitle = document.getElementById("fieldTitle");
      const fText  = document.getElementById("fieldText");
      const fNote  = document.getElementById("fieldNote");

      if(!list.length){
        if(imgEl){ imgEl.src=""; imgEl.style.display="none"; }
        if(metaDomain) metaDomain.textContent = "주간정보 : -";
        if(metaSeq)    metaSeq.textContent    = "0 / 0";
        if(fTitle) fTitle.textContent = "";
        if(fText)  fText.textContent  = "IndexedDB(selftest_db)에 저장된 문제가 없습니다.";
        if(fNote)  fNote.textContent  = "";
        updateSessionInfo();
        await renderThumbs();
        return;
      }
      if(state.curIndex >= list.length) state.curIndex = list.length-1;
      if(state.curIndex < 0) state.curIndex = 0;
      const idx = state.curIndex;
      const card = list[idx];

      if(imgEl){
        if(card.imgId){
          try{
            const url = await getImageObjectURL(card.imgId);
            if(url){
              imgEl.src = url;
              imgEl.style.display = "block";
            }else{
              imgEl.src = "";
              imgEl.style.display = "none";
            }
          }catch(e){
            console.error(e);
            imgEl.src = "";
            imgEl.style.display = "none";
          }
        }else{
          imgEl.src = "";
          imgEl.style.display = "none";
        }
        imgEl.style.transform = "scale("+state.zoom.toFixed(2)+")";
      }

      if(metaDomain) metaDomain.textContent = "주간정보 : " + (card.domain || "-");
      if(metaSeq)    metaSeq.textContent    = (idx+1) + " / " + list.length;
      if(fTitle) fTitle.innerHTML = renderImageWithMark(card.title || "");
      if(fText)  fText.innerHTML  = renderImageWithMark(card.text  || "");
      if(fNote)  fNote.innerHTML  = renderImageWithMark(card.note  || "");

      updateSessionInfo();
      await renderThumbs();
    }

    async function loadFromDB(){
      try{
        const tests = await getAllTests();
        if(!tests || !tests.length){
          state.cards = [];
          state.curIndex = 0;
          state.removed.clear();
          buildDomainSel();
          setZoom(1.0);
          await showCurrentCard();
          showToast("selftest_db에 저장된 문제가 없습니다.");
          return;
        }

        const cards = [];
        const seqCounter = {};
        const nextSeqFor = (dom)=>{
          const k = dom || "(주간정보 없음)";
          seqCounter[k] = (seqCounter[k] || 0) + 1;
          return seqCounter[k];
        };

        for(const t of tests){
          const parts = [];
          if(t.week)    parts.push(t.week);
          if(t.day)     parts.push(t.day);
          if(t.session) parts.push(t.session);
          const domain = parts.join(" · ") || "(주간정보 없음)";
          const seq = nextSeqFor(domain);

          let hasImage = false;
          for(let n=1; n<=10; n++){
            const imgId = t["img"+n+"Id"];
            if(imgId){
              hasImage = true;
              cards.push({
                key: t.id+"#"+n,
                testId: t.id,
                imgSlot: n,
                domain, seq,
                title: t.title || "",
                text:  t.text  || "",
                note:  t.note  || "",
                imgId
              });
            }
          }

        }

        cards.sort((a,b)=>{
          const d = (a.domain||"").localeCompare(b.domain||"","ko");
          if(d !== 0) return d;
          const s = (a.seq||0) - (b.seq||0);
          if(s !== 0) return s;
          return String(a.key).localeCompare(String(b.key));
        });

        state.cards = cards;
        state.curIndex = 0;
        state.removed.clear();
        buildDomainSel();
        setZoom(1.0);
        await showCurrentCard();
        showToast("IndexedDB에서 "+cards.length+"개의 카드를 불러왔습니다.");
      }catch(e){
        console.error(e);
        showToast("DB에서 카드 읽기 중 오류가 발생했습니다.");
      }
    }

    // === 이벤트 바인딩 ===
    document.getElementById("domainSel").addEventListener("change", e=>{
      state.domain = e.target.value || "";
      state.curIndex = 0;
      showCurrentCard();
    });
    document.getElementById("search").addEventListener("input", e=>{
      state.search = e.target.value || "";
      state.curIndex = 0;
      showCurrentCard();
    });
    document.getElementById("btnReload").addEventListener("click", ()=>{
      loadFromDB();
    });

    document.getElementById("btnPrev").addEventListener("click", ()=>{
      const list = filteredCards();
      if(!list.length) return;
      state.curIndex = (state.curIndex - 1 + list.length) % list.length;
      showCurrentCard();
    });
    document.getElementById("btnNext").addEventListener("click", ()=>{
      const list = filteredCards();
      if(!list.length) return;
      state.curIndex = (state.curIndex + 1) % list.length;
      showCurrentCard();
    });
    document.getElementById("btnDone").addEventListener("click", ()=>{
      const list = filteredCards();
      if(!list.length) return;
      const card = list[state.curIndex];
      state.removed.add(card.key);
      const nextList = filteredCards();
      if(!nextList.length){
        state.curIndex = 0;
      }else if(state.curIndex >= nextList.length){
        state.curIndex = nextList.length-1;
      }
      showCurrentCard();
    });
    document.getElementById("btnResetSession").addEventListener("click", ()=>{
      state.removed.clear();
      state.curIndex = 0;
      showCurrentCard();
    });

    document.getElementById("zoomOut").addEventListener("click", ()=>setZoom(state.zoom - 0.1));
    document.getElementById("zoomIn").addEventListener("click", ()=>setZoom(state.zoom + 0.1));
    document.getElementById("zoomReset").addEventListener("click", ()=>setZoom(1.0));

    // 키보드 쇼컷: 좌/우 화살표 → 이전/다음, +/- → 줌 인/아웃
    document.addEventListener("keydown", e=>{
      const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : "";
      if(tag === "input" || tag === "textarea" || tag === "select" || (e.target && e.target.isContentEditable)) return;

      const key = e.key;

      if(key === "ArrowLeft"){
        e.preventDefault();
        const list = filteredCards();
        if(!list.length) return;
        state.curIndex = (state.curIndex - 1 + list.length) % list.length;
        showCurrentCard();
      }else if(key === "ArrowRight"){
        e.preventDefault();
        const list = filteredCards();
        if(!list.length) return;
        state.curIndex = (state.curIndex + 1) % list.length;
        showCurrentCard();
      }else if(
        key === "+" ||
        (key === "=" && e.shiftKey) ||
        e.code === "Equal" && e.shiftKey ||
        e.code === "NumpadAdd"
      ){
        e.preventDefault();
        setZoom(state.zoom + 0.1);
      }else if(
        key === "-" ||
        e.code === "Minus" ||
        e.code === "NumpadSubtract"
      ){
        e.preventDefault();
        setZoom(state.zoom - 0.1);
      }
    });

    // 초기 로드
    setZoom(1.0);
    loadFromDB();
  })();
  </script>
</body>
</html>
