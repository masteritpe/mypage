<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Numbering Builder</title>
  
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* === 웹폰트 적용 === */
    @font-face {
        font-family: 'KoPubWorldDotum';
        font-weight: 500;
        font-style: normal;
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/KoPubWorldDotumMedium.woff') format('woff');
    }
    @font-face {
        font-family: 'KoPubWorldDotum';
        font-weight: 700;
        font-style: normal;
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/KoPubWorldDotumBold.woff') format('woff');
    }

    /* === 1. 디자인 시스템 변수 === */
    :root {
      --bg-app: #F9FAFB;
      --bg-canvas: #E5E7EB;
      --bg-panel: #FFFFFF;
      
      --text-main: #111827;
      --text-muted: #6B7280;
      --border-light: #F3F4F6;
      --border-base: #E5E7EB;
      --border-hover: #D1D5DB;
      
      --primary: #111827;
      --accent: #2563EB;
      --accent-hover: #1D4ED8;
      --accent-light: #EFF6FF;
      
      --danger: #EF4444;
      --danger-hover: #DC2626;
      --success: #10B981;
      --success-hover: #059669;
      
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --shadow-canvas: 0 25px 50px -12px rgb(0 0 0 / 0.25);
      
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-ui: 'KoPubWorldDotum', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    * { box-sizing: border-box; outline: none; }
    body {
      margin: 0; background: var(--bg-app); color: var(--text-main);
      font-family: var(--font-ui); font-size: 14px;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* 스크롤바 커스텀 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }

    /* === 2. Header === */
    header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      height: 64px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-base); z-index: 50; flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }
    
    .logo { 
      font-size: 18px; font-weight: 700; color: var(--primary); 
      display: flex; align-items: center; gap: 8px; margin: 0; white-space: nowrap;
      letter-spacing: -0.02em;
    }
    .logo i { color: var(--accent); font-size: 24px; }
    
    .toolbar { display: flex; gap: 8px; align-items: center; }
    
    #doc-title-input {
        margin-right: 8px; font-weight: 600; font-size: 15px; 
        color: var(--text-muted); background: transparent; 
        padding: 8px 12px; border-radius: var(--radius-md); width: 160px; 
        border: 1px solid transparent; transition: all 0.2s ease; font-family: var(--font-ui);
    }
    #doc-title-input:hover { border-color: var(--border-hover); color: var(--text-main); }
    #doc-title-input:focus { background: #fff; color: var(--text-main); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

    .btn {
      height: 38px; padding: 0 14px; border-radius: var(--radius-md); border: 1px solid var(--border-base);
      background: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      font-weight: 600; font-family: var(--font-ui); font-size: 13px; color: var(--text-main); 
      transition: all 0.2s ease; white-space: nowrap; box-shadow: var(--shadow-sm);
    }
    .btn i { font-size: 16px; }
    .btn:hover { background: #F9FAFB; border-color: var(--border-hover); transform: translateY(-1px); }
    .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-accent:hover { background: var(--accent-hover); color: #fff; }
    .divider { width: 1px; height: 24px; background: var(--border-base); margin: 0 4px; }

    /* === 3. Main Layout & Canvas === */
    main { flex: 1; display: flex; overflow: hidden; background: var(--bg-canvas); position: relative; }

    /* 좌측 사이드바 */
    #sidebar {
      width: 320px; background: var(--bg-panel); border-right: 1px solid var(--border-base);
      padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; z-index: 10;
      overflow-y: auto; flex-shrink: 0; box-shadow: 2px 0 10px rgba(0,0,0,0.03);
    }
    
    .sidebar-title { 
      font-size: 13px; font-weight: 700; color: var(--primary); 
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
      border-bottom: 1px solid var(--border-light); padding-bottom: 8px;
    }
    .sidebar-title i { font-size: 16px; color: var(--accent); }

    /* 암기 카드 생성 UI */
    .generator-box { display: flex; flex-direction: column; gap: 8px; }
    .generator-input-row { display: flex; gap: 8px; width: 100%; }
    .generator-input-row input {
        flex: 1; min-width: 0;
        height: 38px; padding: 0 12px; border: 1px solid var(--border-base);
        border-radius: var(--radius-md); font-size: 14px; font-family: var(--font-ui);
        outline: none; transition: 0.2s; text-align: center; letter-spacing: 2px; font-weight: 700;
    }
    .generator-input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .generator-input-row button { flex-shrink: 0; }

    /* 서식 도구 행 */
    .style-row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
    .btn-format {
      height: 34px; flex: 1; border: 1px solid var(--border-base); border-radius: var(--radius-md);
      background: #fff; cursor: pointer; color: var(--text-muted); transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: var(--shadow-sm);
    }
    .btn-format:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

    /* 캔버스 영역 */
    #canvas-wrapper {
      flex: 1; overflow: auto; padding: 60px; display: flex; justify-content: center; align-items: flex-start;
    }
    #a4-canvas {
      width: 297mm; height: 210mm; background: #fff; position: relative;
      border-radius: 4px; transform-origin: top left;
      box-shadow: var(--shadow-canvas);
    }

    /* === 4. Widgets on Canvas === */
    .widget {
      position: absolute; top: 50px; left: 50px;
      border: 1px solid transparent; padding: 6px; 
      display: flex; flex-direction: column; z-index: 100;
      border-radius: var(--radius-md); transition: box-shadow 0.2s;
      width: fit-content; height: fit-content;
    }
    .widget:hover { border: 1px dashed var(--border-hover); }
    .widget.active { 
      border: 1px solid var(--accent) !important; 
      box-shadow: 0 0 0 3px var(--accent-light); 
      background: rgba(255,255,255,0.8); backdrop-filter: blur(4px);
    }
    
    .drag-handle {
      height: 18px; background: var(--accent); color: #fff; cursor: grab; width: 100%;
      position: absolute; top: -18px; left: -1px; display: none;
      justify-content: center; align-items: center; font-size: 14px;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0; border: 1px solid var(--accent); border-bottom: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .widget.active .drag-handle { display: flex; }
    
    .btn-delete-widget {
      position: absolute; top: -22px; right: -22px; background: var(--danger); color: #fff;
      cursor: pointer; display: none; border-radius: 50%; width: 24px; height: 24px;
      text-align: center; line-height: 24px; font-size: 14px; z-index: 10;
      border: 2px solid #fff; box-shadow: var(--shadow-sm); transition: 0.2s;
      align-items: center; justify-content: center;
    }
    .btn-delete-widget:hover { background: var(--danger-hover); transform: scale(1.1); }
    .widget.active .btn-delete-widget { display: flex; }

    /* 다운로드 버튼 추가 */
    .btn-download-widget {
      position: absolute; top: -22px; right: 8px; background: var(--success); color: #fff;
      cursor: pointer; display: none; border-radius: 50%; width: 24px; height: 24px;
      text-align: center; line-height: 24px; font-size: 14px; z-index: 10;
      border: 2px solid #fff; box-shadow: var(--shadow-sm); transition: 0.2s;
      align-items: center; justify-content: center;
    }
    .btn-download-widget:hover { background: var(--success-hover); transform: scale(1.1); }
    .widget.active .btn-download-widget { display: flex; }

    /* === 토픽 암기 카드 디자인 === */
    .w-mnemonic .content-area {
        border: 1px solid var(--border-base); border-radius: var(--radius-md);
        background: #fff; box-shadow: var(--shadow-sm); width: 320px; overflow: hidden;
    }
    .w-mnemonic .image-band {
        display: flex; background: #F1F5F9; border-bottom: 1px solid var(--border-base);
        padding: 16px; justify-content: center; gap: 8px; min-height: 100px; align-items: center;
    }

    /* html2canvas 렌더링 버그 수정 */
    .w-mnemonic .img-box {
        width: 70px; height: 70px; display: flex; align-items: center; justify-content: center;
        background: #ffffff; border-radius: var(--radius-sm); box-shadow: var(--shadow-sm);
        font-size: 36px; color: var(--primary); position: relative; padding: 2px;
    }
    .w-mnemonic .img-box img { 
        max-width: 100%; max-height: 100%; 
        width: auto; height: auto; 
        object-fit: contain; 
        display: block;
    }

    .w-mnemonic .img-box .num-tag {
        position: absolute; bottom: 2px; right: 4px; font-size: 12px; font-weight: 900; 
        color: var(--text-muted); opacity: 0.5;
    }
    .w-mnemonic .info-band { padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .w-mnemonic input.topic-input {
        width: 100%; border: none; font-size: 18px; font-weight: 700; font-family: var(--font-ui);
        color: var(--primary); padding: 4px; border-bottom: 2px solid transparent; transition: 0.2s;
    }
    .w-mnemonic input.topic-input:focus { border-bottom-color: var(--accent); }
    .w-mnemonic input.initial-input {
        width: 100%; border: none; font-size: 14px; font-weight: 700; font-family: var(--font-ui);
        color: var(--danger); padding: 4px; letter-spacing: 2px; border-bottom: 1px solid transparent; transition: 0.2s;
    }
    .w-mnemonic input.initial-input:focus { border-bottom-color: var(--danger); }
    .w-mnemonic .desc-editor {
        width: 100%; min-height: 80px; padding: 8px; border: 1px solid var(--border-light);
        border-radius: var(--radius-sm); font-size: 15px; line-height: 1.5; outline: none;
        background: #FAFAFA; transition: 0.2s; word-break: break-all;
    }
    .w-mnemonic .desc-editor:focus { border-color: var(--border-hover); background: #fff; }

    /* 일반 요소들 */
    .content-area { flex: 1; outline: none; line-height: 1.5; font-family: var(--font-ui); }
    .w-text .content-area { font-size: 26px; font-weight: 700; color: var(--primary); letter-spacing: -0.02em; }
    .w-plain .content-area { font-size: 14px; font-weight: 500; color: var(--text-main); padding: 4px; }

    /* 인쇄(PDF) 및 이미지 추출(Exporting) 모드 */
    .printing .widget, .exporting .widget { border: none !important; resize: none !important; box-shadow: none !important; background: transparent !important; backdrop-filter: none !important; padding: 0 !important; margin: 6px !important; }
    .printing .drag-handle, .printing .btn-delete-widget, .printing .btn-download-widget, 
    .exporting .drag-handle, .exporting .btn-delete-widget, .exporting .btn-download-widget { display: none !important; }
    .printing .w-mnemonic .topic-input, .exporting .w-mnemonic .topic-input,
    .printing .w-mnemonic .initial-input, .exporting .w-mnemonic .initial-input { border: none !important; }
    .printing .w-mnemonic .desc-editor, .exporting .w-mnemonic .desc-editor { border: none !important; background: transparent !important; padding: 4px !important; }

    /* 플레이스홀더 처리 및 저장 시 숨김 처리 (CSS fallback) */
    .w-mnemonic .desc-editor:empty:before {
        content: attr(data-placeholder);
        color: var(--text-muted);
        pointer-events: none;
        display: block;
    }
    .printing .w-mnemonic .desc-editor:empty:before,
    .exporting .w-mnemonic .desc-editor:empty:before {
        content: none !important;
        display: none !important;
    }

    /* input 플레이스홀더 캡처 시 숨김 처리 */
    .printing .w-mnemonic .topic-input::placeholder,
    .exporting .w-mnemonic .topic-input::placeholder,
    .printing .w-mnemonic .initial-input::placeholder,
    .exporting .w-mnemonic .initial-input::placeholder {
        color: transparent !important;
    }

    /* 줌 컨트롤 */
    .zoom-controls { 
      position: absolute; bottom: 30px; right: 30px; display: flex; gap: 4px; 
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); 
      padding: 6px; border-radius: 999px; box-shadow: var(--shadow-md); border: 1px solid var(--border-base);
    }
    .zoom-controls button { 
      width: 36px; height: 36px; border: none; background: transparent; 
      cursor: pointer; border-radius: 50%; font-weight: 700; font-family: var(--font-ui); 
      color: var(--text-main); transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .zoom-controls button:hover { background: var(--bg-canvas); color: var(--accent); }
    #btn-zoom-reset { width: auto; padding: 0 16px; border-radius: 18px; font-size: 13px; }

    /* === 토스트 알림 === */
    #toast {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background-color: rgba(0, 0, 0, 0.85); color: #fff; padding: 12px 24px;
      border-radius: 8px; font-size: 14px; font-weight: 500; z-index: 9999;
      opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    /* === 모달 일반 디자인 === */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(2px);
      display: none; justify-content: center; align-items: center; z-index: 9999;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg-panel); border-radius: var(--radius-lg);
      width: 440px; max-width: 90%; max-height: 80vh; display: flex; flex-direction: column;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border-base);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-header h2 { 
      margin: 0; font-size: 18px; display: flex; align-items: center; gap: 8px; color: var(--primary); 
    }
    .modal-header h2 i { color: var(--accent); font-size: 24px; }
    .btn-close-modal {
      background: none; border: none; font-size: 20px; color: var(--text-muted);
      cursor: pointer; padding: 4px; border-radius: var(--radius-sm); transition: 0.2s; display: flex; align-items: center; justify-content: center;
    }
    .btn-close-modal:hover { background: var(--bg-canvas); color: var(--text-main); }
    
    .doc-list { padding: 20px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .doc-item {
      border: 1px solid var(--border-base); border-radius: var(--radius-md); padding: 16px;
      display: flex; justify-content: space-between; align-items: center; transition: 0.2s;
    }
    .doc-item:hover { border-color: var(--border-hover); box-shadow: var(--shadow-sm); }
    .doc-info { display: flex; flex-direction: column; gap: 4px; }
    .doc-title { font-weight: 700; color: var(--text-main); font-size: 15px; }
    .doc-date { font-size: 12px; color: var(--text-muted); }
    
    .doc-actions { display: flex; gap: 8px; }
    .btn-open {
      background: var(--accent-light); color: var(--accent); border: none; padding: 6px 14px;
      border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: var(--font-ui); transition: 0.2s;
    }
    .btn-open:hover { background: #DBEAFE; }
    .btn-delete {
      background: #FEE2E2; color: var(--danger); border: none; padding: 6px 10px;
      border-radius: var(--radius-sm); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: 0.2s;
    }
    .btn-delete:hover { background: #FECACA; }
    .empty-msg { text-align: center; padding: 30px; color: var(--text-muted); font-size: 14px; }

    /* === 환경설정 모달 디자인 추가 === */
    .settings-content {
        padding: 20px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: #fff;
        border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg);
    }
    .mapping-grid {
        display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
    }
    .mapping-item {
        border: 1px solid var(--border-base); border-radius: var(--radius-sm);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 6px; cursor: pointer; transition: 0.2s; background: #fff;
        height: 60px; position: relative; overflow: hidden;
    }
    .mapping-item:hover { background: var(--bg-app); }
    .mapping-item.active {
        border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); background: var(--accent-light);
    }
    .mapping-item .num-label {
        font-size: 11px; font-weight: 700; color: var(--text-muted);
        position: absolute; top: 2px; left: 4px; z-index: 2;
        background: rgba(255,255,255,0.8); padding: 0 2px; border-radius: 2px;
    }
    .mapping-item.active .num-label { color: var(--accent); }
    .mapping-item .consonant-label {
        font-size: 10px; font-weight: 700; color: var(--accent);
        position: absolute; top: 2px; right: 4px; z-index: 2;
    }
    .mapping-item .preview {
        width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
        font-size: 24px; color: var(--primary);
    }
    .mapping-item.active .preview { color: var(--accent); }
    .mapping-item img {
        width: 100%; height: 100%; object-fit: contain;
    }
    .number-editor {
        background: var(--bg-app); border: 1px solid var(--border-base);
        border-radius: var(--radius-md); padding: 16px; display: flex; flex-direction: column; gap: 12px;
    }
    .number-editor-header {
        display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
    }
    .number-editor-header strong { font-size: 15px; color: var(--primary); display: flex; align-items: center; gap: 4px; }
    .num-img-preview {
        width: 48px; height: 48px; border-radius: var(--radius-sm); border: 1px dashed var(--border-hover);
        display: flex; align-items: center; justify-content: center; cursor: pointer; background: #fff; overflow: hidden;
        transition: 0.2s;
    }
    .num-img-preview:hover { border-color: var(--accent); }
    .num-img-preview img { width: 100%; height: 100%; object-fit: cover; }
    .num-img-preview i { font-size: 20px; color: var(--text-muted); }

    .input-group { display: flex; align-items: center; gap: 8px; }
    .input-group label { width: 40px; font-size: 13px; font-weight: 700; color: var(--text-muted); text-align: right; }
    .input-group input {
        flex: 1; height: 36px; border: 1px solid var(--border-base); border-radius: var(--radius-sm);
        padding: 0 10px; font-size: 13px; font-family: var(--font-ui);
    }
    .input-group input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px var(--accent-light); }
  </style>
</head>
<body>

<header>
  <h1 class="logo"><i class="ph ph-brain"></i> Numbering Builder</h1>
  <div class="toolbar">
    <input type="text" id="doc-title-input" value="새 암기장" title="문서 이름 입력" autocomplete="off">
    <button class="btn" onclick="createNew()"><i class="ph ph-file-plus"></i> 신규생성</button>
    <button class="btn" onclick="openLoadModal()"><i class="ph ph-folder-open"></i> 불러오기</button>
    <button class="btn" onclick="saveToDB()"><i class="ph ph-floppy-disk"></i> 저장</button>
    <button class="btn" onclick="clearCanvas()"><i class="ph ph-eraser"></i> 비우기</button>
    <button class="btn" onclick="openSettingsModal()"><i class="ph ph-gear"></i> 환경설정</button>
    <div class="divider"></div>
    <button class="btn btn-accent" id="btn-pdf"><i class="ph ph-file-pdf"></i> PDF 내보내기</button>
  </div>
</header>

<main>
  <aside id="sidebar">
    <div>
        <div class="sidebar-title"><i class="ph ph-cards"></i> 암기 카드 조합 생성</div>
        <div class="generator-box">
            <div class="generator-input-row">
                <input type="text" id="num-sequence" placeholder="예: 25010" maxlength="6" onkeypress="if(event.key==='Enter') generateCard()">
                <button class="btn btn-accent" onclick="generateCard()"><i class="ph ph-magic-wand"></i> 생성</button>
            </div>
        </div>
        <p style="font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.4;">
            * 위에 숫자를 입력하고 생성하면 조합된 암기 카드가 캔버스에 추가됩니다. (최대 6자리)<br>
            * 매핑 이미지 변경은 <strong>[환경설정]</strong>을 이용하세요.
        </p>
    </div>

    <div>
        <div class="sidebar-title"><i class="ph ph-squares-four"></i> 디자인 요소 추가</div>
        <div class="style-row">
            <button class="btn-format" onclick="addWidget('text')" style="font-size:13px; font-weight:600;"><i class="ph ph-text-t"></i> 대제목</button>
            <button class="btn-format" onclick="addWidget('plain')" style="font-size:13px; font-weight:600;"><i class="ph ph-text-aa"></i> 일반 텍스트</button>
        </div>
    </div>
    
    <div>
        <div class="sidebar-title"><i class="ph ph-text-aa"></i> 텍스트 강조(선택 후 적용)</div>
        <div class="style-row">
          <button class="btn-format" onmousedown="event.preventDefault(); document.execCommand('bold', false, null);" title="굵게(Ctrl+B)"><i class="ph ph-text-b"></i></button>
          <button class="btn-format" onmousedown="event.preventDefault(); document.execCommand('insertUnorderedList', false, null);" title="글머리 기호(•)"><i class="ph ph-list-bullets"></i></button>
          <button class="btn-format" onmousedown="event.preventDefault(); document.execCommand('foreColor', false, '#EF4444');" title="빨간색(Ctrl+Alt+R)"><i class="ph ph-palette" style="color:#EF4444;"></i></button>
          <button class="btn-format" onmousedown="event.preventDefault(); document.execCommand('foreColor', false, '#2563EB');" title="파란색(Ctrl+Alt+B)"><i class="ph ph-palette" style="color:#2563EB;"></i></button>
        </div>
    </div>
  </aside>

  <div id="canvas-wrapper">
    <div id="a4-canvas"></div>
  </div>

  <div class="zoom-controls">
    <button id="btn-zoom-out"><i class="ph ph-minus"></i></button>
    <button id="btn-zoom-reset">100%</button>
    <button id="btn-zoom-in"><i class="ph ph-plus"></i></button>
  </div>
</main>

<div id="load-modal-overlay" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2><i class="ph ph-folder-open"></i> 저장된 문서 목록</h2>
      <button class="btn-close-modal" onclick="closeLoadModal()"><i class="ph ph-x"></i></button>
    </div>
    <div id="document-list" class="doc-list">
      </div>
  </div>
</div>

<div id="settings-modal-overlay" class="modal-overlay">
  <div class="modal-content" style="width: 480px;">
    <div class="modal-header">
      <h2><i class="ph ph-gear"></i> 환경설정</h2>
      <button class="btn-close-modal" onclick="closeSettingsModal()"><i class="ph ph-x"></i></button>
    </div>
    <div class="settings-content">
        <div class="sidebar-title" style="border-bottom:none; margin-bottom:0; padding-bottom:0;"><i class="ph ph-images"></i> 숫자별 이미지 매핑(클릭하여 수정)</div>
        <div class="mapping-grid" id="mapping-grid"></div>
        
        <div class="number-editor" id="number-editor">
            <div class="number-editor-header">
                <strong><i class="ph ph-pencil-simple"></i> 숫자 <span id="edit-current-num">1</span> 상세 설정</strong>
                <div style="display: flex; gap: 6px; align-items: center;">
                    <button id="btn-clear-img" onclick="clearCurrentImage()" title="기본 아이콘으로 복구 (이미지 삭제)" style="display:none; background:none; border:none; color:var(--danger); cursor:pointer; font-size:18px; padding:0;"><i class="ph ph-trash"></i></button>
                    <div class="num-img-preview" onclick="document.getElementById('image-uploader').click()" title="클릭하여 대체 이미지 업로드 (Ctrl+V로 붙여넣기 가능)">
                        <img id="edit-img-preview" src="" style="display:none;">
                        <i id="edit-img-icon" class="ph ph-image"></i>
                    </div>
                </div>
            </div>
            
            <p style="font-size:12px; color:var(--text-muted); margin:0 0 8px 0; line-height: 1.4;">
                * 우측 상단의 박스를 클릭해 이미지를 등록하면 <b>기본 아이콘을 대체</b>합니다.
            </p>

            <div class="input-group">
                <label>초성</label>
                <input type="text" id="edit-consonant" placeholder="예: ㄱ" oninput="saveCurrentEdit()">
            </div>
        </div>
        <input type="file" id="image-uploader" accept="image/*" style="display:none;">

        <button class="btn btn-accent" onclick="saveSettingsFromModal()" style="width: 100%; justify-content: center; height: 42px; font-size: 15px; margin-top: 4px;" title="저장 후 닫기 (Ctrl+Alt+S)">
            <i class="ph ph-floppy-disk"></i> 설정 저장 및 닫기
        </button>
    </div>
  </div>
</div>

<div id="toast">저장되었습니다.</div>

<script>
  // === 0. IndexedDB 설정 및 데이터 저장/불러오기 ===
  const dbName = "NumberingBuilderDB";
  let db;

  const request = indexedDB.open(dbName, 1);
  
  request.onupgradeneeded = (e) => {
      db = e.target.result;
      if (!db.objectStoreNames.contains("workspaces")) {
          db.createObjectStore("workspaces", { keyPath: "id" });
      }
      if (!db.objectStoreNames.contains("settings")) {
          db.createObjectStore("settings", { keyPath: "id" });
      }
  };
  
  request.onsuccess = (e) => { 
      db = e.target.result; 
      loadGlobalSettings(); // 시작 시 글로벌 설정 불러오기
  };
  request.onerror = (e) => { console.error("IndexedDB Error", e); };

  function createNew() {
      if(confirm('진행 중인 내용이 지워집니다. 새로 만드시겠습니까?')) {
          document.getElementById('doc-title-input').value = '새 암기장';
          document.getElementById('a4-canvas').innerHTML = '';
          selectedWidget = null; // 메모리 누수 방지 조치
          zIndexCounter = 100;
          showToast("새 암기장이 생성되었습니다.");
      }
  }

  // === 문서별 저장 로직 (환경설정 매핑 정보는 제외) ===
  function saveToDB() {
      if (!db) return;
      const docTitle = document.getElementById('doc-title-input').value.trim() || "새 암기장";
      const canvasHTML = document.getElementById('a4-canvas').innerHTML;
      
      const data = {
          id: docTitle,
          docTitle: docTitle,
          // mnemonicData는 문서 데이터에서 제외하여 용량 절약
          canvasHTML: canvasHTML,
          timestamp: new Date().getTime()
      };
      
      const tx = db.transaction("workspaces", "readwrite");
      const store = tx.objectStore("workspaces");
      store.put(data);
      
      tx.oncomplete = () => { showToast(`'${docTitle}' 문서가 저장되었습니다.`); };
  }

  // === 글로벌 설정 불러오기 ===
  function loadGlobalSettings() {
      if (!db) return;
      const tx = db.transaction("settings", "readonly");
      const store = tx.objectStore("settings");
      const req = store.get("global_settings");
      
      req.onsuccess = (e) => {
          if (e.target.result && e.target.result.data) {
              Object.assign(mnemonicData, e.target.result.data);
              renderMappingGrid(); // 환경설정 안의 그리드 갱신
          }
      };
  }

  // === 글로벌 설정 저장 ===
  function saveGlobalSettings() {
      if (!db) return;
      const tx = db.transaction("settings", "readwrite");
      const store = tx.objectStore("settings");
      store.put({ id: "global_settings", data: mnemonicData });
  }

  // === 모달 UI 기반 불러오기 로직 ===
  function openLoadModal() {
      if (!db) return;
      const tx = db.transaction("workspaces", "readonly");
      const store = tx.objectStore("workspaces");
      const req = store.getAll();
      
      req.onsuccess = (e) => {
          const workspaces = e.target.result;
          const listContainer = document.getElementById('document-list');
          listContainer.innerHTML = '';
          
          const savedDocs = workspaces.filter(w => w.id !== "currentState").sort((a,b) => b.timestamp - a.timestamp);
          
          if (savedDocs.length === 0) {
              listContainer.innerHTML = '<div class="empty-msg">저장된 문서가 없습니다.</div>';
          } else {
              savedDocs.forEach(doc => {
                  const dateStr = new Date(doc.timestamp).toLocaleString('ko-KR');
                  const item = document.createElement('div');
                  item.className = 'doc-item';
                  item.innerHTML = `
                      <div class="doc-info">
                          <div class="doc-title">${doc.docTitle}</div>
                          <div class="doc-date">${dateStr}</div>
                      </div>
                      <div class="doc-actions">
                          <button class="btn-open" onclick="loadDocument('${doc.id}')"><i class="ph ph-folder-open"></i> 열기</button>
                          <button class="btn-delete" onclick="deleteDocument('${doc.id}')"><i class="ph ph-trash"></i></button>
                      </div>
                  `;
                  listContainer.appendChild(item);
              });
          }
          document.getElementById('load-modal-overlay').classList.add('active');
      };
  }

  function closeLoadModal() {
      document.getElementById('load-modal-overlay').classList.remove('active');
  }

  function loadDocument(id) {
      const tx = db.transaction("workspaces", "readonly");
      const store = tx.objectStore("workspaces");
      const req = store.get(id);
      
      req.onsuccess = (e) => {
          const targetData = e.target.result;
          if (targetData) {
              document.getElementById('doc-title-input').value = targetData.docTitle;
              
              // 과거 버전에 저장된 mnemonicData가 있다면 무시하고 글로벌 설정을 따름
              if (targetData.canvasHTML) {
                  document.getElementById('a4-canvas').innerHTML = targetData.canvasHTML;
                  selectedWidget = null; // 메모리 누수 방지 조치
                  let maxZ = 100;
                  document.querySelectorAll('.widget').forEach(w => {
                      const z = parseInt(w.style.zIndex) || 100;
                      if(z > maxZ) maxZ = z;
                  });
                  zIndexCounter = maxZ;
              }
              showToast(`'${targetData.docTitle}' 불러왔습니다.`);
              closeLoadModal();
          }
      }
  }

  function deleteDocument(id) {
      if(confirm('정말 이 문서를 삭제하시겠습니까?')) {
          const tx = db.transaction("workspaces", "readwrite");
          const store = tx.objectStore("workspaces");
          store.delete(id);
          tx.oncomplete = () => {
              openLoadModal(); // 목록 리프레시
              showToast('문서가 삭제되었습니다.');
          };
      }
  }

  // 모달 바깥 배경 클릭 시 닫기
  document.getElementById('load-modal-overlay').addEventListener('mousedown', function(e) {
      if(e.target === this) closeLoadModal();
  });
  document.getElementById('settings-modal-overlay').addEventListener('mousedown', function(e) {
      if(e.target === this) closeSettingsModal();
  });

  // 토스트 메시지
  let toastTimer;
  function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.style.opacity = '1';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 1500);
  }

  // === 1. 숫자 매핑 데이터 및 환경설정 로직 ===
  const mnemonicData = {
      '1': { icon: 'ph-path', consonant: 'ㄱ', imgData: null },
      '2': { icon: 'ph-eye', consonant: 'ㄴ', imgData: null },
      '3': { icon: 'ph-moon', consonant: 'ㄷ', imgData: null },
      '4': { icon: 'ph-hand-peace', consonant: 'ㄹ', imgData: null },
      '5': { icon: 'ph-drop', consonant: 'ㅁ', imgData: null },
      '6': { icon: 'ph-fire', consonant: 'ㅂ', imgData: null },
      '7': { icon: 'ph-tree', consonant: 'ㅅ', imgData: null },
      '8': { icon: 'ph-egg', consonant: 'ㅇ', imgData: null },
      '9': { icon: 'ph-acorn', consonant: 'ㅈ', imgData: null },
      '0': { icon: 'ph-car', consonant: 'ㅊ/ㅎ', imgData: null }
  };

  let currentEditKey = '1';

  function renderMappingGrid() {
      const grid = document.getElementById('mapping-grid');
      grid.innerHTML = '';
      const keys = ['1','2','3','4','5','6','7','8','9','0'];
      
      keys.forEach(key => {
          const data = mnemonicData[key];
          const div = document.createElement('div');
          div.className = `mapping-item ${key === currentEditKey ? 'active' : ''}`;
          div.title = `숫자 ${key} 설정`;
          div.onclick = () => selectMapping(key);
          
          let previewHtml = data.imgData ? `<img src="${data.imgData}" alt="${key}">` : `<i class="ph ${data.icon}"></i>`;
          div.innerHTML = `
              <span class="num-label">${key}</span>
              <span class="consonant-label">${data.consonant}</span>
              <div class="preview">${previewHtml}</div>
          `;
          grid.appendChild(div);
      });
  }

  function selectMapping(key) {
      currentEditKey = key;
      renderMappingGrid();
      
      const data = mnemonicData[key];
      document.getElementById('edit-current-num').innerText = key;
      document.getElementById('edit-consonant').value = data.consonant;
      
      const previewImg = document.getElementById('edit-img-preview');
      const previewIcon = document.getElementById('edit-img-icon');
      const btnClear = document.getElementById('btn-clear-img');
      
      if(data.imgData) {
          previewImg.src = data.imgData;
          previewImg.style.display = 'block';
          previewIcon.style.display = 'none';
          btnClear.style.display = 'block'; // 이미지가 있을 때만 삭제 버튼 표시
      } else {
          previewImg.style.display = 'none';
          previewIcon.className = `ph ${data.icon}`; // 기본 아이콘 노출
          previewIcon.style.display = 'block';
          btnClear.style.display = 'none';
      }
  }

  function saveCurrentEdit() {
      const data = mnemonicData[currentEditKey];
      data.consonant = document.getElementById('edit-consonant').value;
      // 아이콘 클래스는 기본값을 유지하므로 수정하지 않음
      renderMappingGrid();
  }

  function clearCurrentImage() {
      if(confirm('등록된 이미지를 삭제하고 기본 아이콘으로 복구하시겠습니까?')) {
          mnemonicData[currentEditKey].imgData = null;
          document.getElementById('edit-img-preview').src = ''; // 메모리 누수 방지 조치 (Base64 해제)
          selectMapping(currentEditKey);
      }
  }

  // 환경설정 모달 제어
  function openSettingsModal() {
      document.getElementById('settings-modal-overlay').classList.add('active');
      selectMapping(currentEditKey || '1');
  }

  function closeSettingsModal() {
      document.getElementById('settings-modal-overlay').classList.remove('active');
  }

  function saveSettingsFromModal() {
      saveCurrentEdit();
      saveGlobalSettings(); // 별도의 환경설정 스토어에 데이터 저장
      showToast("환경설정이 저장되었습니다.");
      closeSettingsModal();
  }

  // 이미지 공통 처리 로직 (파일 업로드 & 클립보드 붙여넣기에서 공용 사용)
  function processImageFile(file) {
      if (!file || !file.type.startsWith('image/')) return;

      const reader = new FileReader();
      reader.onload = function(event) {
          const img = new Image();
          img.onload = function() {
              const canvas = document.createElement('canvas');
              const MAX_SIZE = 300; // 최대 해상도를 300px로 제한
              let width = img.width;
              let height = img.height;

              // 비율 유지하며 사이즈 조정
              if (width > height && width > MAX_SIZE) {
                  height *= MAX_SIZE / width;
                  width = MAX_SIZE;
              } else if (height > MAX_SIZE) {
                  width *= MAX_SIZE / height;
                  height = MAX_SIZE;
              }

              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);

              // 용량을 대폭 줄인 jpeg 형식으로 변환 (품질 85%)
              const compressedBase64 = canvas.toDataURL('image/jpeg', 0.85);
              
              if (currentEditKey) {
                  mnemonicData[currentEditKey].imgData = compressedBase64;
                  selectMapping(currentEditKey); // UI 즉시 업데이트
              }
          };
          img.src = event.target.result;
      };
      reader.readAsDataURL(file); 
  }

  // 파일 업로드 (클릭 방식)
  document.getElementById('image-uploader').addEventListener('change', function(e) {
      const file = e.target.files[0]; 
      if (file) {
          processImageFile(file);
      }
      e.target.value = ''; // 동일 파일 재업로드 가능하게 값 초기화
  });

  // 클립보드 붙여넣기 기능 추가
  document.addEventListener('paste', function(e) {
      const settingsModal = document.getElementById('settings-modal-overlay');
      
      // 환경설정 모달이 열려있을 때만 작동
      if (!settingsModal.classList.contains('active')) return;

      const items = (e.clipboardData || e.originalEvent.clipboardData).items;
      for (let index in items) {
          const item = items[index];
          if (item.kind === 'file' && item.type.startsWith('image/')) {
              const file = item.getAsFile();
              processImageFile(file);
              e.preventDefault(); // 기본 붙여넣기 방지 (텍스트 박스 안에 이미지 입력되는 것 방지)
              break; // 한 번에 하나의 이미지만 처리
          }
      }
  });

  // === 2. 캔버스 및 위젯 관리 ===
  const canvas = document.getElementById('a4-canvas');
  let zIndexCounter = 100;
  let zoomLevel = 1.0; 
  let selectedWidget = null;

  const generateId = () => 'w_' + Math.random().toString(36).substr(2, 9);

  const updateZoom = () => {
    canvas.style.transform = `scale(${zoomLevel})`;
    document.getElementById('btn-zoom-reset').innerText = Math.round(zoomLevel * 100) + '%';
  };
  document.getElementById('btn-zoom-in').onclick = () => { zoomLevel = Math.min(2, zoomLevel + 0.1); updateZoom(); };
  document.getElementById('btn-zoom-out').onclick = () => { zoomLevel = Math.max(0.3, zoomLevel - 0.1); updateZoom(); };
  document.getElementById('btn-zoom-reset').onclick = () => { zoomLevel = 1.0; updateZoom(); };
  updateZoom();

  function clearCanvas() {
      if(confirm('캔버스를 모두 지우시겠습니까?')) {
          canvas.innerHTML = '';
          selectedWidget = null; // 메모리 누수 방지 조치
      }
  }

  function addWidget(type) {
    const div = document.createElement('div');
    div.id = generateId(); 
    div.className = `widget w-${type}`;
    div.style.left = '100px'; div.style.top = '100px';
    div.style.zIndex = ++zIndexCounter;

    let contentHTML = type === 'text' ? '대제목' : '일반 텍스트를 입력하세요.';
    div.innerHTML = `
      <div class="drag-handle"><i class="ph ph-dots-six"></i></div>
      <div class="btn-delete-widget" title="삭제"><i class="ph ph-x"></i></div>
      <div class="btn-download-widget" title="이미지로 저장"><i class="ph ph-download-simple"></i></div>
      <div class="content-area" contenteditable="true" spellcheck="false">${contentHTML}</div>
    `;
    canvas.appendChild(div);
  }

  // === 3. 암기 카드 생성 로직 ===
  function generateCard() {
      const inputEl = document.getElementById('num-sequence');
      const sequence = inputEl.value.replace(/[^0-9]/g, ''); 
      
      if (!sequence) return alert('숫자를 입력해주세요. (예: 134)');
      if (sequence.length > 6) return alert('최대 6자리까지만 조합 가능합니다.');

      let imgBandHtml = '';
      let initialHint = '';
      
      for (let char of sequence) {
          const data = mnemonicData[char];
          let imgHtml = data.imgData ? `<img src="${data.imgData}">` : `<i class="ph ${data.icon}"></i>`;
          
          imgBandHtml += `
            <div class="img-box">
                ${imgHtml}
                <span class="num-tag">${char}</span>
            </div>
          `;
          initialHint += data.consonant[0];
      }

      const div = document.createElement('div');
      div.id = generateId(); 
      div.className = `widget w-mnemonic`;
      div.style.left = '150px'; div.style.top = '150px';
      div.style.zIndex = ++zIndexCounter;

      div.innerHTML = `
        <div class="drag-handle"><i class="ph ph-dots-six"></i></div>
        <div class="btn-delete-widget" title="삭제"><i class="ph ph-x"></i></div>
        <div class="btn-download-widget" title="이미지로 저장"><i class="ph ph-download-simple"></i></div>
        <div class="content-area">
            <div class="image-band">${imgBandHtml}</div>
            <div class="info-band">
                <input type="text" class="topic-input" placeholder="토픽명 입력">
                <input type="text" class="initial-input" placeholder="초성 힌트" value="${initialHint}">
                <div class="desc-editor" contenteditable="true" spellcheck="false" data-placeholder="암기할 내용을 자유롭게 작성하세요..."></div>
            </div>
        </div>
      `;
      canvas.appendChild(div);
      inputEl.value = ''; 
  }

  // === 4. 인터랙션 ===
  canvas.addEventListener('mousedown', (e) => {
    const widget = e.target.closest('.widget');
    if (widget) { 
        document.querySelectorAll('.widget').forEach(w => w.classList.remove('active'));
        widget.classList.add('active');
        widget.style.zIndex = ++zIndexCounter;
        selectedWidget = widget; 
    } else {
        document.querySelectorAll('.widget').forEach(w => w.classList.remove('active'));
        selectedWidget = null;
    }
  });

  let isDragging = false;
  let dragStartX = 0, dragStartY = 0, initialLeft = 0, initialTop = 0;

  document.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('drag-handle') || e.target.closest('.drag-handle')) {
      isDragging = true;
      const clickedWidget = e.target.closest('.widget');
      
      document.querySelectorAll('.widget').forEach(w => w.classList.remove('active'));
      clickedWidget.classList.add('active');
      clickedWidget.style.zIndex = ++zIndexCounter;
      selectedWidget = clickedWidget;
      
      initialLeft = parseFloat(clickedWidget.style.left) || 0;
      initialTop = parseFloat(clickedWidget.style.top) || 0;
      
      const canvasRect = canvas.getBoundingClientRect();
      dragStartX = (e.clientX - canvasRect.left) / zoomLevel;
      dragStartY = (e.clientY - canvasRect.top) / zoomLevel;
    }
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging || !selectedWidget) return;
    const canvasRect = canvas.getBoundingClientRect();
    let currentX = (e.clientX - canvasRect.left) / zoomLevel;
    let currentY = (e.clientY - canvasRect.top) / zoomLevel;
    
    let deltaX = currentX - dragStartX;
    let deltaY = currentY - dragStartY;
    
    selectedWidget.style.left = `${Math.max(0, initialLeft + deltaX)}px`;
    selectedWidget.style.top = `${Math.max(0, initialTop + deltaY)}px`;
  });

  document.addEventListener('mouseup', () => { isDragging = false; });

  document.addEventListener('click', async (e) => {
    // 삭제 버튼 동작
    if (e.target.classList.contains('btn-delete-widget') || e.target.closest('.btn-delete-widget')) {
      const widgetToRemove = e.target.closest('.widget');
      // 메모리 누수 방지 조치: 지우려는 위젯이 selectedWidget에 할당되어 있다면 해제
      if (selectedWidget === widgetToRemove) {
          selectedWidget = null;
      }
      widgetToRemove.remove();
      return;
    }

    // 개별 위젯 이미지 다운로드 동작
    if (e.target.classList.contains('btn-download-widget') || e.target.closest('.btn-download-widget')) {
      const widget = e.target.closest('.widget');
      // 외곽 여백과 파란색 선택 테두리 제외를 위해 콘텐츠 영역만 선택
      const contentArea = widget.querySelector('.content-area');
      
      // 줌 왜곡 방지 및 내보내기 모드 설정
      const originalScale = canvas.style.transform;
      canvas.style.transform = 'none'; 
      canvas.classList.add('exporting');
      
      // 캡처 시 불필요한 핸들이나 버튼이 보이지 않도록 active 클래스 임시 해제
      document.querySelectorAll('.widget').forEach(w => w.classList.remove('active'));

      // html2canvas 버그 우회: 캡처 직전 placeholder 임시 제거 (2개의 input 모두 처리)
      const inputs = contentArea.querySelectorAll('input');
      const savedPlaceholders = [];
      inputs.forEach((input, index) => {
          savedPlaceholders[index] = input.getAttribute('placeholder');
          input.setAttribute('placeholder', '');
      });
      
      // 화면 렌더링에 반영될 수 있도록 아주 짧은 딜레이 부여
      await new Promise(r => setTimeout(r, 100));
      
      try {
        const canvasEl = await html2canvas(contentArea, { 
            scale: 2, // 고해상도 캡처
            useCORS: true, 
            backgroundColor: '#ffffff' 
        });
        const imgData = canvasEl.toDataURL('image/png');
        
        const link = document.createElement('a');
        link.download = `Numbering_Card_${Date.now()}.png`;
        link.href = imgData;
        link.click();
        
        showToast('이미지가 저장되었습니다.');
      } catch (err) { 
        alert('이미지 생성에 실패했습니다.'); 
        console.error(err);
      } finally {
        // 캡처 완료 후 placeholder 복구
        inputs.forEach((input, index) => {
            if(savedPlaceholders[index] !== null) {
                input.setAttribute('placeholder', savedPlaceholders[index]);
            }
        });

        // 원래 상태(활성화 및 변형)로 되돌림
        canvas.style.transform = originalScale;
        canvas.classList.remove('exporting');
        widget.classList.add('active');
      }
    }
  });

  // PDF 다운로드
  document.getElementById('btn-pdf').onclick = async () => {
    const docName = document.getElementById('doc-title-input').value.trim() || '숫자암기장';
    const originalScale = canvas.style.transform;
    canvas.style.transform = 'none'; 
    canvas.classList.add('printing');
    
    document.querySelectorAll('.widget').forEach(w => w.classList.remove('active'));

    // 캔버스 내 모든 input placeholder 임시 제거
    const inputs = canvas.querySelectorAll('input');
    const savedPlaceholders = [];
    inputs.forEach((input, index) => {
        savedPlaceholders[index] = input.getAttribute('placeholder');
        input.setAttribute('placeholder', '');
    });

    await new Promise(r => setTimeout(r, 100));

    try {
      const canvasEl = await html2canvas(canvas, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
      const imgData = canvasEl.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('l', 'mm', 'a4');
      pdf.addImage(imgData, 'PNG', 0, 0, 297, 210);
      pdf.save(docName + '_' + new Date().toISOString().slice(0,10) + '.pdf');
    } catch (e) { 
        alert('PDF 생성에 실패했습니다.'); 
        console.error(e);
    } finally {
      // 캡처 완료 후 모든 placeholder 원상 복구
      inputs.forEach((input, index) => {
          if(savedPlaceholders[index] !== null) {
              input.setAttribute('placeholder', savedPlaceholders[index]);
          }
      });

      canvas.classList.remove('printing');
      canvas.style.transform = originalScale;
    }
  };

  // 단축키
  document.addEventListener('keydown', (e) => {
      const isCtrl = e.ctrlKey || e.metaKey;
      const isAlt = e.altKey;

      if (isCtrl && isAlt && e.key.toLowerCase() === 'n') {
          e.preventDefault(); createNew(); return;
      }
      
      // Ctrl + Alt + S (환경설정 저장 및 닫기)
      if (isCtrl && isAlt && e.key.toLowerCase() === 's') {
          e.preventDefault(); saveSettingsFromModal(); return;
      }
      
      if (isCtrl && !isAlt && e.key.toLowerCase() === 's') {
          e.preventDefault(); saveToDB(); return;
      }

      // 환경설정 모달 내 방향키 이동 로직
      const settingsModal = document.getElementById('settings-modal-overlay');
      if (settingsModal.classList.contains('active')) {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

          const keysMap = ['1','2','3','4','5','6','7','8','9','0'];
          let currentIndex = keysMap.indexOf(currentEditKey);
          if(currentIndex === -1) currentIndex = 0;
          let nextIndex = currentIndex;

          if (e.key === 'ArrowUp') {
              nextIndex -= 5;
              e.preventDefault();
          } else if (e.key === 'ArrowDown') {
              nextIndex += 5;
              e.preventDefault();
          } else if (e.key === 'ArrowLeft') {
              nextIndex -= 1;
              e.preventDefault();
          } else if (e.key === 'ArrowRight') {
              nextIndex += 1;
              e.preventDefault();
          }

          if (nextIndex !== currentIndex && nextIndex >= 0 && nextIndex < keysMap.length) {
              selectMapping(keysMap[nextIndex]);
          }
      }

      const isInputOrEditor = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable || (document.activeElement && document.activeElement.isContentEditable);
      
      if ((e.key === 'Delete' || e.key === 'Backspace') && selectedWidget && !isInputOrEditor) {
          e.preventDefault(); selectedWidget.remove(); selectedWidget = null;
      }

      let targetEditor = document.activeElement && document.activeElement.hasAttribute('contenteditable') ? document.activeElement : null;
      if (targetEditor) {
          if (isCtrl && isAlt && !e.shiftKey && e.key.toLowerCase() === 'r') {
              e.preventDefault(); document.execCommand('styleWithCSS', false, true); document.execCommand('foreColor', false, '#ef4444');
          }
          if (isCtrl && isAlt && !e.shiftKey && e.key.toLowerCase() === 'b') {
              e.preventDefault(); document.execCommand('styleWithCSS', false, true); document.execCommand('foreColor', false, '#2563eb');
          }
      }
  });

</script>
</body>
