<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>통합 문서 조회</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard-dynamic-subset.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* === Modern SaaS Theme & Color Variables === */
:root {
    --bg-app: #f4f7f9; 
    --bg-panel: #ffffff; 
    --border: #e2e8f0;
    --primary: #6366f1; 
    --primary-hover: #4f46e5;
    --primary-light: #e0e7ff;
    --text-main: #1e293b; 
    --text-sub: #64748b;
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --shadow-soft: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    --shadow-focus: 0 0 0 4px rgba(99, 102, 241, 0.15);
    --font-ui: 'Pretendard', 'Inter', 'Noto Sans KR', sans-serif;
    --font-code: 'JetBrains Mono', monospace;
    --glass-bg: rgba(255, 255, 255, 0.85);
    --modal-overlay: rgba(15, 23, 42, 0.4);
    
    /* Tag Colors (Light) */
    --tag-blue-bg: #eff6ff; --tag-blue-txt: #2563eb;
    --tag-green-bg: #f0fdf4; --tag-green-txt: #16a34a;
    --tag-purple-bg: #faf5ff; --tag-purple-txt: #9333ea;
    --tag-gray-bg: #f1f5f9; --tag-gray-txt: #475569;
}

[data-theme="dark"] {
    --bg-app: #0f172a; 
    --bg-panel: #1e293b; 
    --border: #334155;
    --primary: #818cf8; 
    --primary-hover: #6366f1;
    --primary-light: #3730a3;
    --text-main: #f8fafc; 
    --text-sub: #94a3b8;
    --shadow-soft: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    --shadow-focus: 0 0 0 4px rgba(129, 140, 248, 0.2);
    --glass-bg: rgba(30, 41, 59, 0.85);
    --modal-overlay: rgba(0, 0, 0, 0.6);
    
    /* Tag Colors (Dark) */
    --tag-blue-bg: rgba(37, 99, 235, 0.2); --tag-blue-txt: #93c5fd;
    --tag-green-bg: rgba(22, 163, 74, 0.2); --tag-green-txt: #86efac;
    --tag-purple-bg: rgba(147, 51, 234, 0.2); --tag-purple-txt: #d8b4fe;
    --tag-gray-bg: rgba(71, 85, 105, 0.2); --tag-gray-txt: #cbd5e1;
}

* { box-sizing: border-box; outline: none; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s; }
body { background: var(--bg-app); color: var(--text-main); font-family: var(--font-ui); font-size: 14px; min-height: 100vh; display: flex; flex-direction: column; line-height: 1.6; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-sub); border-radius: 4px; opacity: 0.5; }

/* Layout */
.container { max-width: 900px; margin: 0 auto; padding: 60px 20px; width: 100%; display: flex; flex-direction: column; gap: 32px; flex: 1; position: relative; }

/* Header & Tools */
.header-tools { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; }
.btn-icon { 
    width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border); 
    background: var(--bg-panel); color: var(--text-sub); cursor: pointer; font-size: 16px; 
    display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-soft);
}
.btn-icon:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); transform: translateY(-2px); }

.search-header { text-align: center; margin-bottom: 10px; }
.brand-logo { font-size: 28px; font-weight: 700; color: var(--text-main); display: inline-flex; align-items: center; gap: 12px; letter-spacing: -0.5px; }
.brand-logo i { color: var(--primary); font-size: 32px; }

/* Search Box */
.search-box-wrapper { position: relative; width: 100%; max-width: 760px; margin: 0 auto; z-index: 10; }
.search-input-lg { 
    width: 100%; height: 64px; padding: 0 24px 0 60px; 
    border: 1px solid var(--border); border-radius: var(--radius-lg); 
    font-size: 17px; background: var(--glass-bg); backdrop-filter: blur(10px);
    color: var(--text-main); box-shadow: var(--shadow-soft); font-family: var(--font-ui);
}
.search-input-lg::placeholder { color: var(--text-sub); opacity: 0.7; }
.search-input-lg:focus { border-color: var(--primary); box-shadow: var(--shadow-focus); }
.search-icon { position: absolute; left: 24px; top: 50%; transform: translateY(-50%); color: var(--text-sub); font-size: 20px; transition: color 0.3s; }
.search-input-lg:focus ~ .search-icon, .search-input-lg:focus + .search-icon { color: var(--primary); }

/* Filter Tags */
.filter-wrapper { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
.filter-chip { 
    padding: 8px 16px; background: var(--bg-panel); border: 1px solid var(--border); 
    border-radius: 30px; font-size: 13px; font-weight: 600; color: var(--text-sub); 
    cursor: pointer; display: flex; align-items: center; gap: 8px; user-select: none;
    box-shadow: 0 2px 5px rgba(0,0,0,0.02);
}
.filter-chip:hover { border-color: var(--text-sub); }
.filter-chip.active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

/* Results Area */
.results-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-top: 10px; }
.res-count { font-weight: 600; color: var(--text-main); font-size: 15px; }
.res-time { font-size: 12px; color: var(--text-sub); font-family: var(--font-code); }
.result-list { display: flex; flex-direction: column; gap: 16px; margin-top: 24px; }

/* Result Card */
.res-card { 
    background: var(--bg-panel); padding: 24px; border-radius: var(--radius-md); 
    border: 1px solid var(--border); cursor: pointer; position: relative; overflow: hidden;
    box-shadow: var(--shadow-soft); display: flex; flex-direction: column; gap: 12px;
}
.res-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1); }
.res-meta { display: flex; align-items: center; gap: 10px; }
.source-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; letter-spacing: 0.3px; }
.res-id { font-family: var(--font-code); font-size: 12px; color: var(--text-sub); background: var(--bg-app); padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); }
.res-title { font-size: 18px; font-weight: 700; color: var(--text-main); letter-spacing: -0.3px; }
.res-snippet { font-size: 14px; color: var(--text-sub); line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.highlight { background: rgba(253, 224, 71, 0.4); color: inherit; padding: 0 3px; border-radius: 4px; border-bottom: 2px solid #eab308; font-weight: 600; }
[data-theme="dark"] .highlight { background: rgba(234, 179, 8, 0.3); color: #fef08a; border-bottom-color: #facc15; }

/* Colors Mappings */
.src-blue { background: var(--tag-blue-bg); color: var(--tag-blue-txt); }
.src-green { background: var(--tag-green-bg); color: var(--tag-green-txt); }
.src-purple { background: var(--tag-purple-bg); color: var(--tag-purple-txt); }
.src-gray { background: var(--tag-gray-bg); color: var(--tag-gray-txt); }

/* Settings Modal */
.modal-overlay { position: fixed; inset: 0; background: var(--modal-overlay); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
.settings-box { background: var(--bg-panel); width: 100%; max-width: 850px; padding: 32px; border-radius: var(--radius-lg); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; margin: 20px; border: 1px solid var(--border); }
.settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.settings-header h3 { font-size: 20px; color: var(--text-main); }
.settings-content { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; min-height: 350px; padding-right: 8px; }

.config-col { display: flex; flex-direction: column; gap: 16px; }
.config-col-title { font-size: 13px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

.source-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-app); }
.source-item:hover { border-color: var(--primary); }
.source-info { display: flex; flex-direction: column; gap: 4px; }
.source-name { font-weight: 700; font-size: 14px; color: var(--text-main); }
.source-desc { font-size: 12px; color: var(--text-sub); }

.btn-add { background: var(--primary-light); color: var(--primary); border: none; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-del { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-del:hover { background: #ef4444; color: #fff; }

/* Custom Form */
.custom-form { background: var(--bg-app); border: 1px dashed var(--border); padding: 16px; border-radius: var(--radius-sm); margin-top: 16px; display: none; }
.custom-form.open { display: block; animation: slideDown 0.3s ease; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
.form-row { margin-bottom: 12px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; }
.form-input { width: 100%; height: 40px; border: 1px solid var(--border); border-radius: 6px; padding: 0 12px; font-size: 13px; background: var(--bg-panel); color: var(--text-main); font-family: var(--font-ui); }
.form-input:focus { border-color: var(--primary); }
.btn-submit { width: 100%; height: 40px; background: var(--text-main); color: var(--bg-panel); border: none; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 12px; font-size: 14px; }
.btn-submit:hover { opacity: 0.9; }

.empty-state { text-align: center; padding: 80px 0; color: var(--text-sub); animation: fadeIn 0.5s ease; }
.empty-state i { font-size: 48px; color: var(--border); margin-bottom: 24px; }
.empty-state p { font-size: 15px; line-height: 1.6; }
.loader { display: none; text-align: center; padding: 40px; }
.loader i { animation: spin 1s linear infinite; font-size: 32px; color: var(--primary); }
@keyframes spin { 100% { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="container">
    <div class="header-tools">
        <button class="btn-icon" id="btn-theme" title="테마 변경"><i class="fas fa-moon"></i></button>
        <button class="btn-icon" id="btn-settings" title="검색 소스 설정"><i class="fas fa-sliders-h"></i></button>
    </div>

    <div class="search-header">
        <div class="brand-logo"><i class="fas fa-layer-group"></i> 통합 문서 조회</div>
    </div>

    <div class="search-box-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="main-search" class="search-input-lg" placeholder="무엇을 찾고 계신가요?" autofocus autocomplete="off">
    </div>

    <div class="filter-wrapper" id="source-filters"></div>

    <div id="results-area" style="display:none;">
        <div class="results-header">
            <span class="res-count">검색 결과 <span id="res-count-num">0</span>건 <span id="res-render-msg" style="font-size:12px; color:var(--text-sub); font-weight:400; margin-left:8px;"></span></span>
            <span class="res-time" id="search-time"></span>
        </div>
        <div class="result-list" id="result-list"></div>
    </div>
    
    <div id="loader" class="loader"><i class="fas fa-circle-notch"></i></div>
    
    <div id="empty-state" class="empty-state">
        <i class="fas fa-folder-open"></i>
        <p>검색어를 입력하여 문서를 찾아보거나<br>우측 상단 <b>설정</b>에서 검색 소스를 연결해 보세요.</p>
    </div>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="settings-box">
        <div class="settings-header">
            <h3><i class="fas fa-database"></i> 검색 소스 관리</h3>
            <button class="btn-icon" id="btn-close-settings" style="width:36px; height:36px; border:none; box-shadow:none;"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="settings-content">
            <div class="config-col">
                <div class="config-col-title">제공되는 소스 추가</div>
                <div id="preset-list-container" style="display:flex; flex-direction:column; gap:12px;"></div>

                <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
                    <div id="btn-toggle-custom" style="cursor:pointer; font-size:13px; font-weight:700; color:var(--primary); display:flex; align-items:center; gap:8px;">
                        <i class="fas fa-plus-circle"></i> 사용자 정의 DB 직접 연결
                    </div>
                    <div id="custom-form" class="custom-form">
                        <div class="form-row"><label class="form-label">소스명</label><input type="text" id="cust-name" class="form-input" placeholder="예: 마케팅 자료"></div>
                        <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                            <div><label class="form-label">DB 이름</label><input type="text" id="cust-db" class="form-input" placeholder="ProjectDocDB"></div>
                            <div><label class="form-label">Store 이름</label><input type="text" id="cust-store" class="form-input" placeholder="doc_items"></div>
                        </div>
                        <div class="form-row"><label class="form-label">이동할 URL</label><input type="text" id="cust-url" class="form-input" placeholder="page.html"></div>
                        <div class="form-row"><label class="form-label">검색 필드 (콤마구분)</label><input type="text" id="cust-fields" class="form-input" value="title, content, summary, doc_id"></div>
                        <button type="button" id="btn-add-custom" class="btn-submit">추가 완료</button>
                    </div>
                </div>
            </div>

            <div class="config-col" style="border-left:1px solid var(--border); padding-left:32px;">
                <div class="config-col-title">
                    현재 연결된 소스 <span id="active-count" style="background:var(--primary); color:#fff; padding:2px 8px; border-radius:12px; font-size:11px;">0</span>
                </div>
                <div id="active-list-container" style="display:flex; flex-direction:column; gap:12px;"></div>
                <div id="no-active-msg" style="text-align:center; color:var(--text-sub); font-size:13px; margin-top:40px; display:none;">
                    연결된 검색 소스가 없습니다.
                </div>
            </div>
        </div>

        <div style="margin-top:24px; text-align:right; border-top:1px solid var(--border); padding-top:24px;">
             <button id="btn-finish-settings" style="background:var(--primary); color:#fff; font-size:14px; padding:12px 32px; border:none; border-radius:8px; font-weight:700; cursor:pointer;">
                설정 완료
            </button>
        </div>
    </div>
</div>

<script>
// === 0. THEME MANAGEMENT ===
const themeBtn = document.getElementById('btn-theme');
const htmlEl = document.documentElement;
let currentTheme = localStorage.getItem('theme') || 'light';

function applyTheme(theme) {
    htmlEl.setAttribute('data-theme', theme);
    themeBtn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    localStorage.setItem('theme', theme);
}
applyTheme(currentTheme);

themeBtn.addEventListener('click', () => {
    currentTheme = currentTheme === 'light' ? 'dark' : 'light';
    applyTheme(currentTheme);
});

// === 1. PRESETS & CACHE ===
const PRESETS = [
    {
        id: "pass_5r", name: "5RChecklist", desc: "5R DB",
        config: { id: "pass_5r", name: "5RChecklist", dbName: "5RChecklistDB", storeName: "items", pageUrl: "5RChecklist.html", theme: "src-blue", fields: ["domain", "topic", "definition", "mnemonic", "notes"] }
    },
    {
        id: "pass_keynote", name: "Keynote", desc: "Keynote DB",
        config: { id: "pass_keynote", name: "Keynote", dbName: "StudyNoteDB", storeName: "notes", pageUrl: "keynote.html", theme: "src-purple", fields: ["title", "items"] }
    },
    {
        id: "pass_mnemonic", name: "두음마스터", desc: "Mnemonic DB",
        config: { id: "pass_mnemonic", name: "두음마스터", dbName: "MnemonicDB", storeName: "mnemonics", pageUrl: "mnemonic.html", theme: "src-purple", fields: ["source", "title", "keyword", "desc"] }
    },
    {
        id: "pass_topicbank", name: "토픽뱅크", desc: "TopicBank DB",
        config: { id: "pass_topicbank", name: "토픽뱅크", dbName: "TopicBankDB", storeName: "items", pageUrl: "5Rchecklist_topic.html", theme: "src-purple", fields: ["sheet", "round", "category", "type", "problem"] }
    },
    {
        id: "pass_workbook", name: "Workbook", desc: "Workbook DB",
        config: { id: "pass_workbook", name: "Workbook", dbName: "WorkbookDB", storeName: "solutions", pageUrl: "workbook.html", theme: "src-purple", fields: ["type", "source", "round", "month", "category", "solution"] }
    },  
    {
        id: "pass_deepdive", name: "DeepDive", desc: "DeepDive DB",
        config: { id: "pass_deepdive", name: "DeepDive", dbName: "DeepDiveDB", storeName: "questions", pageUrl: "deepdive.html", theme: "src-purple", fields: ["domain", "round", "type", "session", "questionText", "pdfName"] }
    },
    {
        id: "pass_deepdive_extra", name: "DeepDiveExtra", desc: "DeepDiveExtra DB",
        config: { id: "pass_deepdive_extra", name: "DeepDiveExtra", dbName: "DeepDiveExtraDB", storeName: "questions", pageUrl: "deepdive(번외편).html", theme: "src-purple", fields: ["domain", "institution", "month", "round", "type", "session", "questionText", "strategyText", "pdfName"] }
    }
];

// 메모리 기반 데이터 캐시 (속도 향상 및 DB I/O 감소)
let CACHED_DOCS = new Map();

// === 2. CONFIG DATABASE ENGINE (IndexedDB) ===
const CONFIG_DB = {
    DB_NAME: 'SearchPassPortalDB',
    STORE_NAME: 'search_sources',
    db: null,

    open: function() {
        return new Promise((resolve, reject) => {
            if (this.db) return resolve(this.db);
            const req = indexedDB.open(this.DB_NAME, 1);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(this.STORE_NAME)) {
                    db.createObjectStore(this.STORE_NAME, { keyPath: 'id' });
                }
            };
            req.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
            req.onerror = (e) => reject(e);
        });
    },
    getAll: function() {
        return new Promise(async (resolve) => {
            const db = await this.open();
            const tx = db.transaction(this.STORE_NAME, 'readonly');
            tx.objectStore(this.STORE_NAME).getAll().onsuccess = (e) => resolve(e.target.result || []);
        });
    },
    add: function(item) {
        return new Promise(async (resolve) => {
            const db = await this.open();
            const tx = db.transaction(this.STORE_NAME, 'readwrite');
            tx.objectStore(this.STORE_NAME).put(item);
            tx.oncomplete = () => resolve(true);
        });
    },
    delete: function(id) {
        return new Promise(async (resolve) => {
            const db = await this.open();
            const tx = db.transaction(this.STORE_NAME, 'readwrite');
            tx.objectStore(this.STORE_NAME).delete(id);
            tx.oncomplete = () => resolve(true);
        });
    }
};

let SEARCH_CONFIG = [];
let activeFilters = [];
const $ = s => document.querySelector(s);

// === Initialization ===
document.addEventListener('DOMContentLoaded', async () => {
    await loadConfig();
    bindEvents();
});

async function loadConfig() {
    SEARCH_CONFIG = await CONFIG_DB.getAll();
    
    // 초기 실행 시 DB가 비어있으면 기본 프리셋 자동 추가
    if (SEARCH_CONFIG.length === 0) {
        await CONFIG_DB.add(PRESETS[0].config);
        await CONFIG_DB.add(PRESETS[1].config);
        SEARCH_CONFIG = await CONFIG_DB.getAll();
    }
    await refreshCache();
    renderFilters();
}

// === Settings UI ===
function renderSettingsUI() {
    const presetContainer = $('#preset-list-container');
    const activeContainer = $('#active-list-container');
    const noMsg = $('#no-active-msg');
    
    presetContainer.innerHTML = '';
    activeContainer.innerHTML = '';

    // Render Presets
    PRESETS.forEach(preset => {
        const isAdded = SEARCH_CONFIG.some(c => c.id === preset.id || (c.dbName === preset.config.dbName && c.storeName === preset.config.storeName));
        const div = document.createElement('div');
        div.className = 'source-item';
        div.style.opacity = isAdded ? '0.6' : '1';
        div.style.pointerEvents = isAdded ? 'none' : 'auto';
        div.innerHTML = `
            <div class="source-info"><span class="source-name">${preset.name}</span><span class="source-desc">${preset.desc}</span></div>
            <button class="btn-add" ${isAdded ? 'style="background:transparent; color:var(--text-sub);"' : ''}>${isAdded ? '<i class="fas fa-check"></i> 추가됨' : '<i class="fas fa-plus"></i> 연결'}</button>
        `;
        if(!isAdded) div.querySelector('button').onclick = async () => addSource(JSON.parse(JSON.stringify(preset.config)));
        presetContainer.appendChild(div);
    });

    // Render Active List
    $('#active-count').textContent = SEARCH_CONFIG.length;
    if(SEARCH_CONFIG.length === 0) noMsg.style.display = 'block';
    else {
        noMsg.style.display = 'none';
        SEARCH_CONFIG.forEach((conf) => {
            const div = document.createElement('div');
            div.className = 'source-item';
            div.innerHTML = `
                <div class="source-info"><span class="source-name">${conf.name}</span><span class="source-desc">DB: ${conf.dbName} <br> Store: ${conf.storeName}</span></div>
                <button class="btn-del" title="삭제"><i class="fas fa-trash-alt"></i></button>
            `;
            div.querySelector('button').onclick = () => removeSource(conf.id);
            activeContainer.appendChild(div);
        });
    }
}

async function addSource(configObj) {
    await CONFIG_DB.add(configObj);
    SEARCH_CONFIG = await CONFIG_DB.getAll();
    await refreshCache();
    renderSettingsUI();
    renderFilters();
}

async function removeSource(id) {
    await CONFIG_DB.delete(id);
    SEARCH_CONFIG = await CONFIG_DB.getAll();
    await refreshCache();
    renderSettingsUI();
    renderFilters();
}

// === Events ===
function bindEvents() {
    // 엔터 입력 시에만 performSearch 호출
    $('#main-search').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); 
            performSearch(e.target.value);
        }
    });

    $('#btn-settings').onclick = () => { renderSettingsUI(); $('#settings-modal').style.display = 'flex'; $('#custom-form').classList.remove('open'); };
    $('#btn-close-settings').onclick = $('#btn-finish-settings').onclick = () => {
        $('#settings-modal').style.display = 'none';
        if($('#main-search').value) performSearch($('#main-search').value);
    };
    $('#btn-toggle-custom').onclick = () => $('#custom-form').classList.toggle('open');

    $('#btn-add-custom').onclick = async () => {
        const name = $('#cust-name').value.trim();
        const dbName = $('#cust-db').value.trim();
        const storeName = $('#cust-store').value.trim();
        const pageUrl = $('#cust-url').value.trim();
        const fieldsStr = $('#cust-fields').value.trim();
        if(!name || !dbName || !storeName) return alert('이름, DB명, Store명은 필수입니다.');

        const newConfig = {
            id: 'custom_' + Date.now(),
            name: name, dbName: dbName, storeName: storeName,
            pageUrl: pageUrl || '#', theme: 'src-gray',
            fields: fieldsStr ? fieldsStr.split(',').map(s=>s.trim()) : ['title', 'content']
        };
        await addSource(newConfig);
        
        $('#cust-name').value = ''; $('#cust-db').value = ''; $('#cust-store').value = '';
        $('#custom-form').classList.remove('open');
    };
}

function renderFilters() {
    const wrapper = $('#source-filters');
    wrapper.innerHTML = '';
    SEARCH_CONFIG.forEach(conf => {
        const btn = document.createElement('div');
        btn.className = `filter-chip ${activeFilters.includes(conf.id) ? 'active' : ''}`;
        btn.innerHTML = `<span>${conf.name}</span>`;
        btn.onclick = () => toggleFilter(btn, conf.id);
        wrapper.appendChild(btn);
    });
}

function toggleFilter(el, id) {
    el.classList.toggle('active');
    activeFilters.includes(id) ? activeFilters = activeFilters.filter(x => x !== id) : activeFilters.push(id);
    if($('#main-search').value) performSearch($('#main-search').value);
}

// === Memory Cache Loader ===
async function refreshCache() {
    CACHED_DOCS.clear(); // 오래된 데이터 및 참조 해제 (GC 유도)
    for (const conf of SEARCH_CONFIG) {
        const docs = await fetchFromDB(conf);
        CACHED_DOCS.set(conf.id, docs);
    }
}

function fetchFromDB(config) {
    return new Promise((resolve) => {
        const req = indexedDB.open(config.dbName);
        req.onerror = () => resolve([]); 
        req.onsuccess = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(config.storeName)) { db.close(); return resolve([]); }
            const tx = db.transaction(config.storeName, 'readonly');
            tx.objectStore(config.storeName).getAll().onsuccess = (res) => {
                const results = (res.target.result || []).map(item => ({...item, _source: config}));
                db.close(); resolve(results);
            };
        };
    });
}

// === Search & Render Logic ===
// [최적화] Regex를 이용한 HTML 태그 제거 (DOM 생성에 의한 메모리 누수 원천 차단)
function stripHtml(text) { 
    return text ? String(text).replace(/<[^>]*>?/gm, '') : ""; 
}

// [최적화] 정규식 충돌(특수문자) 방지
function escapeRegExp(string) {
    return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlightText(text, query) { 
    if(!query) return text; 
    try { 
        const r = new RegExp(`(${escapeRegExp(query)})`, 'gi'); 
        return text.replace(r, '<span class="highlight">$1</span>'); 
    } catch(e) { return text; } 
}

async function performSearch(query) {
    const q = query.trim().toLowerCase();
    if(!q) { $('#results-area').style.display = 'none'; $('#empty-state').style.display = 'block'; $('#loader').style.display = 'none'; return; }

    $('#empty-state').style.display = 'none'; $('#loader').style.display = 'block'; $('#result-list').innerHTML = '';
    
    const startTime = performance.now();
    const targets = activeFilters.length > 0 ? SEARCH_CONFIG.filter(c => activeFilters.includes(c.id)) : SEARCH_CONFIG;
    
    if(targets.length === 0) {
         $('#result-list').innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-sub);">선택된 검색 소스가 없습니다. 설정을 확인하세요.</div>`;
         $('#loader').style.display = 'none'; $('#results-area').style.display = 'block'; return;
    }

    let matched = [];
    
    // [최적화] 매번 DB를 찌르지 않고 메모리 Cache(CACHED_DOCS)에서 즉시 탐색
    for (const conf of targets) {
        const docs = CACHED_DOCS.get(conf.id) || [];
        for (const item of docs) {
            let isMatch = false;
            for (const field of conf.fields) {
                const val = item[field];
                if (!val) continue;
                
                if (Array.isArray(val)) {
                    const arrayText = val.map(v => {
                        if (typeof v === 'object' && v !== null) {
                            return Object.values(v).map(inner => typeof inner === 'string' ? stripHtml(inner) : '').join(' ');
                        }
                        return String(v);
                    }).join(' ');
                    if (arrayText.toLowerCase().includes(q)) { isMatch = true; break; }
                } else {
                    const textVal = (typeof val === 'string' && val.includes('<')) ? stripHtml(val) : String(val);
                    if (textVal.toLowerCase().includes(q)) { isMatch = true; break; }
                }
            }
            if (isMatch) matched.push(item);
        }
    }

    renderResults(matched, q, startTime);
}

function renderResults(items, query, startTime) {
    const list = $('#result-list');
    $('#res-count-num').textContent = items.length;
    $('#search-time').textContent = `${((performance.now() - startTime)/1000).toFixed(3)}s 소요`;
    
    if(items.length === 0) { 
        list.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-sub);">일치하는 검색 결과가 없습니다.</div>`; 
        $('#res-render-msg').textContent = '';
        $('#loader').style.display = 'none'; $('#results-area').style.display = 'block'; 
        return; 
    }

    // [최적화] 렌더링 부하 방지를 위해 최대 50건만 노출
    const MAX_RESULTS = 50;
    const renderItems = items.slice(0, MAX_RESULTS);
    
    if (items.length > MAX_RESULTS) {
        $('#res-render-msg').textContent = `(상위 ${MAX_RESULTS}건만 표시됨)`;
    } else {
        $('#res-render-msg').textContent = '';
    }

    renderItems.forEach(item => {
        const conf = item._source;
        
        // 수정됨: 기본 제목 필드 확인
        let title = item.topic || item.question || item.questionText || item.problem || item.summary || item.title || item.name;
        
        // 수정됨: Workbook 등 별도 title 필드 없이 메타데이터(type, source, round, category)만 있는 경우 조합하여 제목 생성
        if (!title && (item.type || item.source || item.category || item.round)) {
            let parts = [];
            if (item.type) parts.push(`[${item.type}]`);
            if (item.source) parts.push(item.source);
            if (item.round) parts.push(`${item.round}회`);
            if (item.category) parts.push(item.category);
            title = parts.join(' ');
        }
        
        // 폴백
        title = title || '제목 없음';
        
        // 수정됨: DeepDiveExtra(strategyText), Workbook(solution) 등의 필드를 내용 폴백에 추가 반영
        let rawDesc = item.definition || item.notes || item.answer || item.description || item.content || item.desc || item.strategyText || item.solution || '';
        
        if (!rawDesc && Array.isArray(item.items)) {
            rawDesc = item.items.map(it => 
                [it.problem, it.lead, it.concept, it.solution]
                    .filter(Boolean)
                    .map(stripHtml)
                    .join(' ')
            ).join(' ... ');
        } else if (typeof rawDesc === 'string') {
            rawDesc = stripHtml(rawDesc);
        } else {
            rawDesc = '';
        }
        
        let desc = rawDesc;
        const idx = desc.toLowerCase().indexOf(query.toLowerCase());
        desc = idx > -1 ? (idx>30 ? '...' : '') + desc.substring(Math.max(0, idx-30), idx+120) + '...' : desc.substring(0, 120) + '...';

        const card = document.createElement('div'); card.className = 'res-card';
        const paramId = item.uid || item.id || item.doc_id;
        card.onclick = () => { window.open(`${conf.pageUrl}${paramId ? '?uid='+paramId : ''}`, '_blank'); };
        
        card.innerHTML = `
            <div class="res-meta">
                <span class="source-badge ${conf.theme}">${conf.name}</span>
                ${paramId ? `<span class="res-id">${highlightText(paramId, query)}</span>` : ''}
            </div>
            <div class="res-title">${highlightText(title, query)}</div>
            <div class="res-snippet">${highlightText(desc, query)}</div>
        `;
        list.appendChild(card);
    });
    
    $('#loader').style.display = 'none'; 
    $('#results-area').style.display = 'block';
}
</script>
