<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workbook</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://webfontworld.github.io/kopub/KoPubWorldBatang.css">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <script src="https://unpkg.com/quill-image-resize@3.0.9/image-resize.min.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

  <style>
    :root {
      /* 모던 & 눈이 편안한 컬러 팔레트 (Slate & Indigo 기반) */
      --bg-app: #F8FAFC;        
      --bg-card: #FFFFFF;       
      --bg-sidebar: #F1F5F9;
      --text-main: #334155;     
      --text-muted: #64748B;    
      --text-dark: #0F172A;
      --border-light: #E2E8F0;
      --border-base: #CBD5E1;
      --primary: #4F46E5;       
      --primary-hover: #4338CA; 
      --primary-soft: #EEF2FF;  
      --sidebar-w: 380px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --radius-md: 8px;
      --radius-lg: 16px;
      --font-book: 'KoPubWorldBatang', 'Noto Serif KR', serif; 
      --font-ui: 'Pretendard', -apple-system, sans-serif; 
    }

    * { box-sizing: border-box; }
    body { font-family: var(--font-ui); margin: 0; padding: 0; background: var(--bg-app); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; letter-spacing: -0.01em; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border-radius: var(--radius-md); font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; border: 1px solid transparent; letter-spacing: -0.02em; }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-outline { background: #fff; border-color: var(--border-base); color: var(--text-main); }
    .btn-outline:hover { background: var(--bg-sidebar); border-color: #94A3B8; }
    .btn-danger { color: #EF4444; border-color: #FECACA; background: #FEF2F2; }
    .btn-danger:hover { background: #FEE2E2; }

    /* Sidebar */
    .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); border-right: 1px solid var(--border-light); display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
    .sidebar-header { padding: 20px 24px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; background: var(--bg-sidebar); }
    .sidebar-title { font-size: 17px; font-weight: 800; color: var(--text-dark); display: flex; align-items: center; gap: 8px; margin: 0; }
    
    .filter-area { padding: 20px 24px; border-bottom: 1px solid var(--border-light); display: flex; flex-direction: column; gap: 10px; }
    .filter-area select, .filter-area input { width: 100%; padding: 10px 12px; border: 1px solid var(--border-base); border-radius: var(--radius-md); font-size: 13.5px; outline: none; background: #fff; transition: 0.2s; }
    .filter-area select:focus, .filter-area input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
    .filter-row { display: flex; gap: 10px; }

    .item-list { flex: 1; overflow-y: auto; padding: 16px; list-style: none; margin: 0; }
    .list-item { padding: 16px; border-radius: var(--radius-lg); cursor: pointer; margin-bottom: 8px; border: 1px solid transparent; transition: all 0.2s; background: #fff; box-shadow: var(--shadow-sm); }
    .list-item:hover { border-color: var(--border-base); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .list-item.active { border-color: var(--primary); background: var(--primary-soft); box-shadow: none; }
    .item-meta { font-size: 11.5px; color: var(--text-muted); margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 6px; font-weight: 600; }
    .item-meta span { background: #E2E8F0; padding: 3px 8px; border-radius: 6px; color: #475569; }
    .list-item.active .item-meta span { background: #C7D2FE; color: var(--primary-hover); }
    .item-snippet { font-size: 14.5px; color: var(--text-dark); font-weight: 600; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-all; }

    /* Main Content */
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; background: var(--bg-app); }
    .top-bar { height: 68px; padding: 0 32px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: flex-end; align-items: center; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); z-index: 5; }
    .toolbar-actions { display: flex; gap: 10px; align-items: center; }
    .divider { width: 1px; height: 24px; background: var(--border-base); margin: 0 4px; }

    .editor-wrapper { flex: 1; overflow-y: auto; padding: 40px 48px; scroll-behavior: smooth; }
    .editor-card { background: #fff; border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 48px 56px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05); max-width: 1080px; margin: 0 auto; }
    
    /* 항목이 5개이므로 repeat(5, 1fr)로 수정 */
    .form-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 32px; padding-bottom: 32px; border-bottom: 1px solid var(--border-light); }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 13px; font-weight: 700; color: var(--text-muted); }
    .form-group input, .form-group select { padding: 12px 14px; border: 1px solid var(--border-base); border-radius: var(--radius-md); font-size: 14.5px; outline: none; transition: 0.2s; background: var(--bg-app); color: var(--text-dark); font-weight: 500; font-family: var(--font-ui); }
    .form-group input:focus, .form-group select:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px var(--primary-soft); }
    
    /* Quill Customization */
    .ql-toolbar.ql-snow { 
      position: sticky; top: -48px; z-index: 10; 
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px);
      border: 1px solid var(--border-base) !important; 
      border-radius: var(--radius-md) var(--radius-md) 0 0 !important; 
      padding: 12px 16px !important; margin-bottom: -1px;
    }
    .ql-container.ql-snow { 
      border: 1px solid var(--border-base) !important; 
      border-radius: 0 0 var(--radius-md) var(--radius-md) !important; 
      background: #ffffff; transition: 0.2s;
    }
    .ql-container.ql-snow:focus-within { border-color: var(--primary) !important; }

    .ql-editor, .ql-editor * { font-family: var(--font-book) !important; }
    .ql-editor { 
      min-height: 500px; 
      font-size: 16.5px !important; 
      line-height: 1.7 !important; 
      letter-spacing: -0.03em !important; 
      color: #111 !important; 
      padding: 36px 40px !important; 
      text-align: justify; 
      word-break: keep-all;
    }
    .ql-editor p, .ql-editor li { margin-bottom: 0.5em; } 
    
    .ql-editor h1, .ql-editor h2, .ql-editor h3,
    .ql-editor h1 *, .ql-editor h2 *, .ql-editor h3 * { 
      font-family: var(--font-ui) !important; color: var(--text-dark) !important; font-weight: 800; letter-spacing: -0.02em;
    }
    .ql-editor h1, .ql-editor h2, .ql-editor h3 { margin-top: 1.8em; margin-bottom: 0.6em; }
    .ql-editor li { padding-bottom: 0.3em; }
    .ql-editor img { cursor: pointer; transition: opacity 0.2s; max-width: 100%; border-radius: 6px; box-shadow: var(--shadow-sm); } 
    .ql-editor img:hover { outline: 3px solid var(--primary); outline-offset: 2px; }
    .ql-editor img.img-highlight { outline: 4px solid #F59E0B !important; outline-offset: 2px !important; border-radius: 6px; }

    /* Table Fix */
    .quill-raw-table { margin: 2rem 0; width: 100%; overflow-x: auto; border-radius: var(--radius-md); box-shadow: 0 0 0 1px var(--border-base); }
    .quill-raw-table table { border-collapse: collapse !important; width: 100%; font-family: var(--font-ui) !important; font-size: 14.5px; text-align: left; }
    .quill-raw-table th, .quill-raw-table td { border: 1px solid var(--border-base); padding: 12px 16px; line-height: 1.5; color: var(--text-main); }
    .quill-raw-table th { background-color: var(--bg-sidebar); font-weight: 700; color: var(--text-dark); }

    /* Attachments Area */
    .attachment-area { margin-top: 48px; padding-top: 32px; border-top: 2px dashed var(--border-light); font-family: var(--font-ui); }
    .attach-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .attach-header label { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; color: var(--text-dark); }
    .file-list { display: flex; flex-direction: column; gap: 10px; }
    .file-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background: var(--bg-app); border: 1px solid var(--border-light); border-radius: var(--radius-md); font-size: 14.5px; transition: 0.2s; }
    .file-item:hover { border-color: var(--border-base); box-shadow: var(--shadow-sm); }
    .file-item a { color: var(--primary); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .file-item a:hover { text-decoration: underline; color: var(--primary-hover); }

    /* Toast */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translate(-50%, 20px); background: #1E293B; color: #fff; padding: 14px 32px; border-radius: 50px; opacity: 0; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; z-index: 9999; font-size: 15px; font-weight: 600; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 8px; }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    /* Modal & Settings */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(2px); font-family: var(--font-ui); }
    .modal-card { background: #fff; width: 450px; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border-light); font-size: 16px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; color: var(--text-dark); }
    .modal-body { padding: 20px; max-height: 500px; overflow-y: auto; background: var(--bg-app); }
    .setting-title { font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .setting-list-wrapper { max-height: 160px; overflow-y: auto; padding-right: 4px; }
    .domain-item { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 10px 14px; border: 1px solid var(--border-light); border-radius: var(--radius-md); font-size: 14px; margin-bottom: 8px; color: var(--text-main); font-weight: 500; }

    /* Focus Mode Styles */
    body.focus-mode .sidebar { display: none !important; }
    body.focus-mode .top-bar { display: none !important; }

    /* Print Styles */
    @media print {
      @page { size: A4; margin: 18mm 15mm; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
      html, body { display: block !important; height: auto !important; overflow: visible !important; background: white !important; }
      .sidebar, .top-bar, .attachment-area, .ql-toolbar, .modal-overlay { display: none !important; }
      .main-area, .editor-wrapper, .editor-card { display: block !important; padding: 0 !important; margin: 0 !important; border: none !important; box-shadow: none !important; max-width: 100% !important; width: 100% !important; background: white !important; overflow: visible !important; }
      .ql-container.ql-snow { border: none !important; height: auto !important; }
      .ql-editor { padding: 0 !important; overflow: visible !important; min-height: auto !important; height: auto !important; font-family: var(--font-book) !important; font-size: 11pt !important; line-height: 1.6 !important; letter-spacing: -0.04em !important; text-align: justify !important; white-space: pre-wrap !important; word-wrap: break-word !important; word-break: keep-all !important; }
      .ql-editor * { font-family: var(--font-book) !important; }
      .print-header { display: block !important; border-bottom: 2px solid var(--text-dark); padding-bottom: 12px; margin-bottom: 28px; font-family: var(--font-ui); }
      .print-meta { font-size: 12pt; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; letter-spacing: -0.02em; }
      .form-grid { display: none !important; }
    }
    .print-header { display: none; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <h1 class="sidebar-title"><i class="ph-fill ph-book-bookmark" style="color:var(--primary); font-size:22px;"></i> Workbook</h1>
      <button class="btn btn-primary" style="padding: 8px 12px;" onclick="createNew()" title="새 해설 작성"><i class="ph ph-plus" style="font-weight:bold;"></i> 새 문서</button>
    </div>
    
    <div class="filter-area">
      <input type="text" id="searchKw" placeholder="해설 내용 검색..." spellcheck="false" onkeyup="applyFilter()">
      
      <div class="filter-row">
        <select id="filterType" onchange="applyFilter()"><option value="">해설집 전체</option></select>
        <select id="filterSource" onchange="applyFilter()"><option value="">출처 전체</option></select>
      </div>
      <div class="filter-row">
        <select id="filterRound" onchange="applyFilter()"><option value="">회차 전체</option></select>
        <select id="filterMonth" onchange="applyFilter()"><option value="">시행월 전체</option></select>
      </div>
      <div class="filter-row">
        <select id="filterCategory" onchange="applyFilter()"><option value="">종목 전체</option></select>
      </div>
      
      <div style="font-size: 13px; font-weight: 700; color: var(--text-muted); text-align: right; margin-top: 4px;">
        조회된 문서: <strong id="listCount" style="color: var(--primary);">0</strong>건
      </div>
    </div>

    <ul class="item-list" id="itemList"></ul>
  </aside>

  <main class="main-area">
    <div class="top-bar">
      <div class="toolbar-actions">
        <button class="btn btn-outline" onclick="applyStandardFormat()" title="정해진 기본 양식(덜 진한 폰트)으로 일괄 변경"><i class="ph ph-magic-wand"></i> 양식 적용</button>
        <button class="btn btn-outline" onclick="openSettingsModal()" title="환경 설정"><i class="ph ph-gear"></i> 환경설정</button>
        <div class="divider"></div>
        <input type="file" id="jsonImport" accept=".json" style="display:none;" onchange="importJSON(event)">
        <button class="btn btn-outline" onclick="document.getElementById('jsonImport').click()" title="JSON 복원"><i class="ph ph-upload-simple"></i></button>
        <button class="btn btn-outline" onclick="exportJSON()" title="선택된 범위 JSON 백업"><i class="ph ph-download-simple"></i></button>
        <div class="divider"></div>
        <button class="btn btn-danger" onclick="deleteCurrent()"><i class="ph ph-trash"></i> 삭제</button>
        <button class="btn btn-outline" onclick="prepareAndPrint()"><i class="ph ph-printer"></i> PDF 출력</button>
        <button class="btn btn-primary" onclick="saveCurrent()"><i class="ph ph-floppy-disk"></i> 저장하기</button>
      </div>
    </div>

    <div class="editor-wrapper" id="printArea">
      <div class="editor-card">
        
        <div class="print-header">
          <div class="print-meta" id="printMeta">[해설집] / 출처 / 0회 / 시행월 / 종목</div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>해설집(유형)</label>
            <select id="docType"><option value="">선택</option></select>
          </div>
          <div class="form-group">
            <label>출처</label>
            <select id="docSource"><option value="">선택</option></select>
          </div>
          <div class="form-group">
            <label>출제 회차</label>
            <input type="text" id="docRound" placeholder="예: 138">
          </div>
          <div class="form-group">
            <label>시행월</label>
            <input type="text" id="docMonth" placeholder="예: 2026.02">
          </div>
          <div class="form-group">
            <label>출제 종목</label>
            <select id="docCategory"><option value="">선택</option></select>
          </div>
        </div>

        <div class="form-group">
          <label style="font-size: 16px; color:var(--text-dark); display: flex; align-items: center; gap: 6px; margin-bottom: 4px;">
            <i class="ph-fill ph-check-circle" style="color:var(--primary); font-size: 20px;"></i> 출제 문제
          </label>
          <div id="editor"></div>
        </div>

        <div class="attachment-area">
          <div class="attach-header">
            <label><i class="ph ph-paperclip" style="font-size: 20px; color:var(--text-muted)"></i> 첨부 파일</label>
            <input type="file" id="fileInput" style="display:none;" onchange="handleFileUpload(event)">
            <button class="btn btn-outline" style="padding: 8px 14px; font-size: 13.5px;" onclick="document.getElementById('fileInput').click()"><i class="ph ph-plus"></i> 파일 추가</button>
          </div>
          <div class="file-list" id="fileList"></div>
        </div>

      </div>
    </div>
  </main>

  <div class="toast" id="toast"><i class="ph-fill ph-info"></i> <span id="toastMsg">알림</span></div>

  <div class="modal-overlay" id="settingsModal">
    <div class="modal-card">
      <div class="modal-header">환경 설정<button style="border:none; background:none; cursor:pointer; font-size:20px; color:var(--text-muted)" onclick="closeSettingsModal()">&times;</button></div>
      <div class="modal-body">
        
        <div class="setting-title"><i class="ph-fill ph-folder" style="color:var(--primary)"></i> 해설집(유형) 설정</div>
        <div style="display: flex; gap: 8px; margin-bottom: 12px;">
          <input type="text" id="newDocType" placeholder="새 해설집 유형..." style="flex:1; padding:10px; border:1px solid var(--border-base); border-radius:var(--radius-md); font-size:14px; outline:none;">
          <button class="btn btn-primary" onclick="addDocType()">추가</button>
        </div>
        <div class="setting-list-wrapper" id="docTypeList"></div>

        <hr style="border: 0; border-top: 1px solid var(--border-light); margin: 24px 0;">

        <div class="setting-title"><i class="ph-fill ph-tag" style="color:var(--primary)"></i> 출처 설정</div>
        <div style="display: flex; gap: 8px; margin-bottom: 12px;">
          <input type="text" id="newSource" placeholder="새 출처..." style="flex:1; padding:10px; border:1px solid var(--border-base); border-radius:var(--radius-md); font-size:14px; outline:none;">
          <button class="btn btn-primary" onclick="addSource()">추가</button>
        </div>
        <div class="setting-list-wrapper" id="sourceList"></div>

        <hr style="border: 0; border-top: 1px solid var(--border-light); margin: 24px 0;">

        <div class="setting-title"><i class="ph-fill ph-books" style="color:var(--primary)"></i> 출제 종목 설정</div>
        <div style="display: flex; gap: 8px; margin-bottom: 12px;">
          <input type="text" id="newCategory" placeholder="새 종목..." style="flex:1; padding:10px; border:1px solid var(--border-base); border-radius:var(--radius-md); font-size:14px; outline:none;">
          <button class="btn btn-primary" onclick="addCategory()">추가</button>
        </div>
        <div class="setting-list-wrapper" id="categoryList"></div>

      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const showToast = msg => { $('toastMsg').textContent=msg; $('toast').classList.add('show'); setTimeout(()=>$('toast').classList.remove('show'), 1500); };
    const generateId = () => 'WB_' + Math.random().toString(36).substr(2, 9);
    const naturalSort = (a, b) => String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' });
    const escapeHtml = str => String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[m]));

    // --- Settings Data Management ---
    let customDocTypes = JSON.parse(localStorage.getItem('workbook_docTypes') || '[]');
    let customSources = JSON.parse(localStorage.getItem('workbook_sources') || '[]');
    let customCategories = JSON.parse(localStorage.getItem('workbook_categories') || '[]');

    function openSettingsModal() {
      $('settingsModal').style.display = 'flex';
      renderDocTypeList();
      renderSourceList();
      renderCategoryList();
    }
    function closeSettingsModal() { $('settingsModal').style.display = 'none'; }
    
    // DocType (유형)
    function addDocType() {
      const val = $('newDocType').value.trim();
      if (val && !customDocTypes.includes(val)) {
        customDocTypes.push(val);
        localStorage.setItem('workbook_docTypes', JSON.stringify(customDocTypes));
        $('newDocType').value = '';
        renderDocTypeList();
        updateFormDocTypes();
      }
    }
    function renderDocTypeList() {
      $('docTypeList').innerHTML = customDocTypes.map((d, i) => `
        <div class="domain-item">
          <span>${escapeHtml(d)}</span>
          <button class="btn btn-danger" style="padding:4px 8px; font-size:16px; border:none; background:transparent;" onclick="removeDocType(${i})" title="삭제"><i class="ph ph-trash"></i></button>
        </div>

    class RawTableBlot extends BlockEmbed {
        static create(value) { const node = super.create(); node.innerHTML = value; node.setAttribute('contenteditable', 'false'); return node; }
        static value(node) { return node.innerHTML; }
    }
    RawTableBlot.blotName = 'rawTable'; RawTableBlot.tagName = 'div'; RawTableBlot.className = 'quill-raw-table';

    const BaseImageFormat = Quill.import('formats/image');
    class ImageFormat extends BaseImageFormat {
      static formats(domNode) { return { imghighlight: domNode.classList.contains('img-highlight') }; }
      format(name, value) {
        if (name === 'imghighlight') { value ? this.domNode.classList.add('img-highlight') : this.domNode.classList.remove('img-highlight'); }

    const Delta = Quill.import('delta');
    const tableMatcher = function(node, delta) {
      const walker = document.createTreeWalker(node, NodeFilter.SHOW_TEXT, null, false);
      const textNodes = []; while (walker.nextNode()) textNodes.push(walker.currentNode);
      textNodes.forEach(textNode => {
        const text = textNode.nodeValue;
        if (/\$([^$]+)\$/.test(text)) {
          const span = document.createElement('span');
          span.innerHTML = text.replace(/\$([^$]+)\$/g, (match, formula) => { try { return katex.renderToString(formula, { throwOnError: false }); } catch (e) { return match; } });
          textNode.parentNode.replaceChild(span, textNode);
        }
      });
      return new Delta().insert({ rawTable: node.outerHTML });
    };

    const mathMatcher = function(node, delta) {
      if (node.nodeType === Node.TEXT_NODE) {
        const text = node.data; const regex = /\$([^$]+)\$/g; let match; let lastIndex = 0; const newDelta = new Delta(); let hasMath = false;
        while ((match = regex.exec(text)) !== null) {
          hasMath = true;
          if (match.index > lastIndex) newDelta.insert(text.substring(lastIndex, match.index));
          newDelta.insert({ formula: match[1] }); lastIndex = regex.lastIndex;
        }
        if (hasMath) { if (lastIndex < text.length) newDelta.insert(text.substring(lastIndex)); return newDelta; }
      } return delta;
    };

    // --- DB Setup & Global State ---
    let db;

    function initDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('WorkbookDB', 1);
        req.onupgradeneeded = e => {
          const database = e.target.result;
          if (!database.objectStoreNames.contains('solutions')) database.createObjectStore('solutions', { keyPath: 'id' });
          if (!database.objectStoreNames.contains('files')) database.createObjectStore('files', { keyPath: 'fileId' });
        };
        req.onsuccess = e => { db = e.target.result; resolve(); };
        req.onerror = () => reject('DB Error');
      });
    }

    async function loadData() {
      return new Promise(resolve => {
        db.transaction('solutions').objectStore('solutions').getAll().onsuccess = e => {
          allItems = e.target.result || [];
          updateFilters();
          applyFilter();
          resolve();
        };
      });
    }

    function updateFilters() {
      const getUnique = key => [...new Set(allItems.map(x => (x[key]||'').trim()).filter(Boolean))].sort(naturalSort);
      
      const setOptions = (id, list, defaultText) => {
        const el = $(id); const current = el.value;
        el.innerHTML = `<option value="">${defaultText}</option>` + list.map(v => `<option value="${v}">${v}</option>`).join('');
        if(list.includes(current)) el.value = current;
      };

      setOptions('filterType', getUnique('type'), '해설집 전체');
      setOptions('filterSource', getUnique('source'), '출처 전체');
      setOptions('filterRound', getUnique('round').reverse(), '회차 전체'); 
      setOptions('filterMonth', getUnique('month').reverse(), '시행월 전체'); 
      setOptions('filterCategory', getUnique('category'), '종목 전체');
    }

    function applyFilter() {
      const kw = $('searchKw').value.toLowerCase();
      const t = $('filterType').value;
      const s = $('filterSource').value;
      const r = $('filterRound').value;
      const m = $('filterMonth').value;
      const c = $('filterCategory').value;

      let filtered = allItems.filter(item => {
        if(t && item.type !== t) return false;
        if(s && item.source !== s) return false;
        if(r && item.round !== r) return false;
        if(m && item.month !== m) return false;
        if(c && item.category !== c) return false;
        if(kw && !(item.solution||'').toLowerCase().includes(kw)) return false;
        return true;
      });

      filtered.sort((a, b) => {
        const tDiff = naturalSort(a.type||'', b.type||''); if(tDiff !== 0) return tDiff;
        const sDiff = naturalSort(a.source||'', b.source||''); if(sDiff !== 0) return sDiff;
        const rDiff = naturalSort(b.round||'', a.round||''); if(rDiff !== 0) return rDiff;
        return naturalSort(a.category||'', b.category||'');
      });

      currentFilteredItems = filtered; 
      renderList(filtered);
    }

    function renderList(list) {
      $('listCount').textContent = list.length;
      $('itemList').innerHTML = list.map(item => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = item.solution || '';
        const rawText = (tempDiv.textContent || tempDiv.innerText || '').trim();
        const snippet = rawText.length > 55 ? rawText.substring(0, 55) + '...' : (rawText || '내용 없음');

        return `
        <li class="list-item ${item.id === currentId ? 'active' : ''}" onclick="loadItem('${item.id}')">
          <div class="item-meta">
            ${item.type ? `<span>${escapeHtml(item.type)}</span>` : ''}
            ${item.source ? `<span>${escapeHtml(item.source)}</span>` : ''}
            ${item.round ? `<span>${escapeHtml(item.round)}회</span>` : ''}
            ${item.month ? `<span>${escapeHtml(item.month)}</span>` : ''}
            ${item.category ? `<span>${escapeHtml(item.category)}</span>` : ''}
          </div>
          <div class="item-snippet">${escapeHtml(snippet)}</div>
        </li>
      `}).join('');
    }

    function createNew() {
      currentId = null;
      currentAttachments = [];

      renderAttachments();
      applyFilter();

    async function loadItem(id) {
      const item = allItems.find(x => x.id === id);
      if(!item) return;

      currentId = item.id;
      
      if (item.type && !customDocTypes.includes(item.type)) {
        const option = document.createElement("option");
        option.value = item.type; option.text = item.type;
        $('docType').appendChild(option);
      }
      $('docType').value = item.type || '';
      
      if (item.source && !customSources.includes(item.source)) {
        const option = document.createElement("option");
        option.value = item.source; option.text = item.source;
        $('docSource').appendChild(option);
      }
      $('docSource').value = item.source || '';
      
      $('docRound').value = item.round || '';
      $('docMonth').value = item.month || '';
      
      if (item.category && !customCategories.includes(item.category)) {
        const option = document.createElement("option");
        option.value = item.category; option.text = item.category;
        $('docCategory').appendChild(option);
      }
      $('docCategory').value = item.category || '';
      
      quill.clipboard.dangerouslyPasteHTML(item.solution || '');
      
      currentAttachments = [];
      if(item.fileIds && item.fileIds.length > 0) {
        const store = db.transaction('files').objectStore('files');
        for(let fId of item.fileIds) {
          const fData = await new Promise(res => { store.get(fId).onsuccess = e => res(e.target.result); });
          if(fData) currentAttachments.push(fData);
        }
      }
      renderAttachments();
      applyFilter(); 

      document.querySelector('.editor-wrapper').scrollTo({ top: 0, behavior: 'auto' });
    }

    async function saveCurrent() {
      const type = $('docType').value.trim();
      const solutionText = quill.getText().trim();
      
      if(!type) return showToast('⚠️ 해설집(유형)을 선택해 주세요.');
      if(!solutionText && quill.root.innerHTML.indexOf('<img') === -1) return showToast('⚠️ 문제/해설 내용을 입력해 주세요.');

      const fileIds = [];
      const fStore = db.transaction('files', 'readwrite').objectStore('files');
      for(let att of currentAttachments) {
        fileIds.push(att.fileId);
        fStore.put(att); 
      }

      const note = {
        id: currentId || generateId(),
        type: type,
        source: $('docSource').value.trim(),
        round: $('docRound').value.trim(),
        month: $('docMonth').value.trim(),
        category: $('docCategory').value.trim(),
        solution: quill.root.innerHTML,
        fileIds: fileIds,
        ts: new Date().getTime()
      };

      db.transaction('solutions', 'readwrite').objectStore('solutions').put(note).onsuccess = () => {
        currentId = note.id;
        showToast('문서가 성공적으로 저장되었습니다.');
        loadData(); 
      };
    }

    function deleteCurrent() {
      if(!currentId) return showToast('⚠️ 삭제할 문서가 선택되지 않았습니다.');
      if(confirm('이 문서를 정말 삭제하시겠습니까? (첨부파일 포함)')) {
        const item = allItems.find(x => x.id === currentId);
        const tx = db.transaction(['solutions', 'files'], 'readwrite');
        tx.objectStore('solutions').delete(currentId);
        if(item && item.fileIds) {
          item.fileIds.forEach(fid => tx.objectStore('files').delete(fid));
        }
        tx.oncomplete = () => {
          showToast('문서가 삭제되었습니다.');
          createNew();
          loadData();
        };
      }
    }

    // --- JSON Export & Import ---
    async function exportJSON() {
      if(currentFilteredItems.length === 0) return showToast('백업할 데이터가 없습니다.');
      
      showToast('선택된 범위의 백업 파일을 생성 중입니다...');
      
      const exportData = [];
      
      for (let item of currentFilteredItems) {
        let itemCopy = { ...item, attachedFiles: [] };
        
        if (item.fileIds && item.fileIds.length > 0) {
          for (let fId of item.fileIds) {
            const tx = db.transaction('files', 'readonly');
            const fStore = tx.objectStore('files');
            
            const fData = await new Promise((res, rej) => { 
                const req = fStore.get(fId);
                req.onsuccess = e => res(e.target.result); 
                req.onerror = () => res(null); 
            });

            if (fData && fData.blob) {
              const base64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(fData.blob);
              });
              itemCopy.attachedFiles.push({
                fileId: fData.fileId,
                name: fData.name,
                type: fData.type,
                data: base64
              });
            }
          }
        }
        exportData.push(itemCopy);
      }

      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); 
      a.href = url; 
      a.download = `Workbook_Backup_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    }

    function dataURLtoBlob(dataurl) {
        var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--){
            u8arr[n] = bstr.charCodeAt(n);
        }
        return new Blob([u8arr], {type:mime});
    }

    function importJSON(e) {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      
      reader.onload = async function(evt) {
        try {
          const imported = JSON.parse(evt.target.result);
          if(!Array.isArray(imported)) throw new Error("배열 형태가 아닙니다.");
          
          showToast('데이터 복원 중 (동일 문서 업데이트)...');
          
          const preparedItems = [];
          const preparedFiles = [];

          for (let item of imported) {
            if(!item.id) item.id = generateId();
            item.ts = new Date().getTime();
            
            if (item.attachedFiles && item.attachedFiles.length > 0) {
              item.fileIds = []; 
              for (let f of item.attachedFiles) {
                const blob = dataURLtoBlob(f.data); 
                preparedFiles.push({ fileId: f.fileId, name: f.name, type: f.type, blob: blob });
                item.fileIds.push(f.fileId);
              }
            }
            delete item.attachedFiles; 
            preparedItems.push(item);
          }

          const tx = db.transaction(['solutions', 'files'], 'readwrite');
          const sStore = tx.objectStore('solutions');
          const fStore = tx.objectStore('files');
          
          preparedFiles.forEach(f => fStore.put(f));
          preparedItems.forEach(i => sStore.put(i));
          
          tx.oncomplete = () => { showToast(`${preparedItems.length}건 복원 완료!`); loadData(); };
          tx.onerror = () => { showToast('복원 중 오류가 발생했습니다.'); };
        } catch (err) { alert("복원 실패: " + err.message); }
      };
      
      reader.readAsText(file);
      e.target.value = '';
    }

    // --- 단축키 지원 ---
    window.addEventListener('keydown', e => {
      const isCtrl = e.ctrlKey || e.metaKey;
      const isAlt = e.altKey;
      const isShift = e.shiftKey;

      if (isCtrl && !isAlt && !isShift && (e.key === 's' || e.key === 'S')) {
        e.preventDefault(); 
        saveCurrent();
        return;
      }

      if (isCtrl && !isAlt && !isShift && (e.key === 'h' || e.key === 'H')) {
        e.preventDefault();
        document.body.classList.toggle('focus-mode');
        const isFocus = document.body.classList.contains('focus-mode');
        showToast(isFocus ? '몰입모드 ON' : '몰입모드 OFF');
        return;
      }

      if (isCtrl && isAlt && !isShift && (e.key === 'n' || e.key === 'N')) {
        e.preventDefault();
        createNew();
        showToast('새 문서를 작성합니다.');
        return;
      }

      if (quill && quill.hasFocus()) {
        if (isCtrl && !isAlt && !isShift && (e.key === '+' || e.key === '=' || e.key === '-')) {
            e.preventDefault();
            const range = quill.getSelection(); if (!range) return;
            let currentSizeStr = quill.getFormat(range).size || '16px'; 
            let currentSize = parseInt(currentSizeStr.replace('px', '')) || 16;
            let newSize = Math.max(10, Math.min(72, currentSize + (e.key === '-' ? -1 : 1)));
            quill.format('size', newSize + 'px');
            return;
        }

        if (isCtrl && isShift && !isAlt && (e.key === 'x' || e.key === 'X')) {
            e.preventDefault();
            const range = quill.getSelection();
            if (range) {
                if (range.length > 0) quill.removeFormat(range.index, range.length);
                else {
                    const format = quill.getFormat(range);
                    for (let k in format) quill.format(k, false);
                }
            }
            return;
        }

        if (isCtrl && !isAlt && !isShift && (e.key === 'b' || e.key === 'B')) {
            e.preventDefault();
            const format = quill.getFormat();
            quill.format('bold', !format.bold);
            return;
        }

        if (isCtrl && !isAlt && !isShift && (e.key === 'i' || e.key === 'I')) {
            e.preventDefault();
            const format = quill.getFormat();
            quill.format('italic', !format.italic);
            return;
        }

        if (isCtrl && !isAlt && !isShift && (e.key === 'u' || e.key === 'U')) {
            e.preventDefault();
            const format = quill.getFormat();
            quill.format('underline', !format.underline);
            return;
        }

        if (isCtrl && !isAlt && !isShift && e.key === '0') {
            e.preventDefault();
            const format = quill.getFormat();
            quill.format('strike', !format.strike);
            return;
        }

        if (isCtrl && isAlt && !isShift && (e.key === 'r' || e.key === 'R')) {
            e.preventDefault();
            const format = quill.getFormat();
            quill.format('color', format.color === '#EF4444' ? false : '#EF4444');
            return;
        }

        if (isCtrl && isAlt && !isShift && (e.key === 'b' || e.key === 'B')) {
            e.preventDefault();
            const format = quill.getFormat();
            quill.format('color', format.color === '#0EA5E9' ? false : '#0EA5E9');
            return;
        }

        if (isCtrl && isAlt && !isShift && (e.key === 'g' || e.key === 'G')) {
            e.preventDefault();
            const format = quill.getFormat();
            quill.format('color', format.color === '#10B981' ? false : '#10B981');
            return;
        }

        if (isCtrl && !isAlt && !isShift && ['1','2','3','4','5','6','7'].includes(e.key)) {
            e.preventDefault();
            const colors = {
                '1': '#FFEDD5', '2': '#E0F2FE', '3': '#FEF08A', '4': '#DCFCE7',
                '5': '#FCE7F3', '6': '#E6D5C3', '7': '#E5E7EB'
            };
            const targetColor = colors[e.key];
            const format = quill.getFormat();
            quill.format('background', format.background === targetColor ? false : targetColor);
            return;
        }

        if (isCtrl && isAlt && !isShift && (e.key === 'm' || e.key === 'M')) {
            e.preventDefault();
            const format = quill.getFormat();
            const isActive = format.background === '#0D3A9E';
            quill.format('background', isActive ? false : '#0D3A9E'); 
            quill.format('color', isActive ? false : '#FFFFFF');      
            quill.format('bold', isActive ? false : true);            
            return;
        }
      }
    }, { passive: false });

    window.addEventListener('wheel', e => {
        if (e.ctrlKey || e.metaKey) {
            if (quill && quill.hasFocus()) {
                e.preventDefault();
                const range = quill.getSelection(); if (!range) return;
                let delta = e.deltaY < 0 ? 1 : -1; 
                let currentSizeStr = quill.getFormat(range).size || '16.5px';
                let currentSize = parseInt(currentSizeStr.replace('px', '')) || 16;
                let newSize = Math.max(10, Math.min(72, currentSize + delta));
                quill.format('size', newSize + 'px');
            }
        }
    }, { passive: false });

    window.onload = async () => {
      updateFormDocTypes();
      updateFormSources();
      updateFormCategories();
      await initDB();
      await loadData();
      createNew();
    };
  </script>
</body>
