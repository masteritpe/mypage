<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>토픽 웹서치</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* === 1. Variables & Base === */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');

:root {
  --bg: #f7fafc;
  --card: #ffffff;
  --ink: #2d3748;
  --muted: #718096;
  --accent: #3182ce;
  --accent-hover: #2b6cb0;
  --border: #e2e8f0;
  --line: #edf2f7;
  --shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px 0 rgba(0,0,0,0.06);
  --focus-ring: 0 0 0 3px rgba(66,153,225,0.5);
  --danger: #e53e3e;
  --highlight: #fefcbf; /* 하이라이트 배경색 (연한 노랑) */
  --highlight-text: #744210; /* 하이라이트 글자색 (진한 갈색) */
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans KR', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* === 2. Header & Buttons === */
header {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 50;
}
header h1 {
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
  margin: 0;
  display: flex; align-items: center; gap: 8px;
}
.header-tools { display: flex; gap: 8px; }

/* Button Styles */
.btn {
  height: 36px;
  display: inline-flex !important;
  align-items: center;
  justify-content: center;
  gap: 8px !important;
  padding: 0 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
  font-family: inherit;
  border: 1px solid transparent;
  text-decoration: none;
  line-height: 1;
}
.btn span { position: static !important; margin: 0 !important; display: inline-block; }

.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
.btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); transform: translateY(-1px); }
.btn.outline { background: #fff; color: var(--ink); border-color: #cbd5e0; }
.btn.outline:hover { background: #f8fafc; border-color: var(--accent); color: var(--accent); }
.btn.ghost { background: transparent; color: var(--muted); border-color: transparent; }
.btn.ghost:hover { background: #edf2f7; color: var(--danger); }

input[type="file"] { display: none; }

/* === 3. Layout === */
main {
  flex: 1;
  display: grid;
  grid-template-columns: 350px 1fr;
  gap: 24px;
  padding: 24px;
  overflow: hidden;
  max-width: 1920px;
  margin: 0 auto;
  width: 100%;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100%;
}

/* === 4. Left Panel === */
.form-body { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }

label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
input:not([type="file"]), textarea {
  width: 100%; padding: 10px; border: 1px solid #cbd5e0;
  border-radius: 6px; font-size: 14px; font-family: inherit; color: var(--ink);
  transition: all 0.2s; background: #fff;
}
input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: var(--focus-ring); }
textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

.search-links { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.link-btn {
  text-decoration: none; display: flex; align-items: center; justify-content: center;
  padding: 8px; border-radius: 6px; font-size: 13px; font-weight: 600;
  border: 1px solid var(--border); background: #fff; color: var(--ink);
  transition: transform 0.1s;
}
.link-btn:hover { border-color: var(--accent); color: var(--accent); background: #ebf8ff; }

/* === 5. Right Panel === */
.search-container {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: #fff;
}
.search-wrapper { position: relative; width: 100%; }

.search-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: var(--accent); font-size: 16px; pointer-events: none; z-index: 5;
}

.main-search-input {
  width: 100%; 
  padding: 12px 16px 12px 42px !important; 
  border-radius: 99px;
  border: 1px solid #e2e8f0; 
  font-size: 14px; 
  color: var(--ink);
  transition: border-color 0.2s;
  background: #fff;
}
.main-search-input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
}

.table-wrapper { flex: 1; overflow: auto; background: #fff; position: relative; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; }
thead { position: sticky; top: 0; z-index: 10; background: #fff; }
th {
  text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 700;
  color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap;
}
td {
  padding: 14px 16px; border-bottom: 1px solid var(--line);
  font-size: 14px; color: #4a5568; vertical-align: middle;
}
tr:hover td { background: #f7fafc; }
tr.active td { background: #ebf8ff; }

/* Typography & Highlight */
.txt-topic { font-weight: 700; color: var(--ink); font-size: 14px; }
.truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

/* [NEW] Highlight Class */
.highlight {
    background-color: var(--highlight);
    color: var(--highlight-text);
    padding: 0 2px;
    border-radius: 2px;
    font-weight: inherit;
}

.action-btn {
  background: none; border: none; cursor: pointer;
  font-size: 16px; padding: 6px; border-radius: 4px; color: #cbd5e0;
  transition: all 0.2s;
}
.action-btn:hover { background: #edf2f7; color: var(--accent); }
.action-btn.del:hover { background: #fff5f5; color: var(--danger); }

/* Toast */
#toast-area { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 999; }
.toast {
  padding: 10px 24px; background: #2d3748; color: #fff; border-radius: 99px;
  font-size: 14px; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  animation: slideUp 0.3s;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }
</style>
</head>
<body>

<header>
    <h1>🔍 토픽 웹서치</h1>
    <div class="header-tools">
        <button class="btn primary" onclick="createNewItem()">
            <span>➕</span> 신규
        </button>
        
        <label for="excelFile" class="btn outline">
            <span>📂</span> 엑셀 열기
        </label>
        <input type="file" id="excelFile" accept=".xlsx, .xls" />
        
        <button class="btn outline" onclick="downloadExcel()">
            <span>💾</span> 저장
        </button>
        
        <button class="btn ghost" onclick="clearAllData()">
            <span>🗑️</span> 초기화
        </button>
    </div>
</header>

<main>
    <section class="card">
        <div class="form-body">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:700; color:var(--ink);">상세 입력</span>
                <span id="status-pill" style="font-size:11px; font-weight:700; color:#38a169; background:#f0fff4; padding:2px 8px; border-radius:99px; border:1px solid #c6f6d5;">NEW</span>
            </div>
            
            <input type="hidden" id="edit-id" />
            
            <div>
                <label>토픽명</label>
                <input type="text" id="in-topic" placeholder="예: 제로 트러스트" style="font-weight:bold;">
            </div>

            <div class="search-links">
                <a href="#" onclick="goSearch('jidum'); return false;" class="link-btn">📘 지덤</a>
                <a href="#" onclick="goSearch('itwiki'); return false;" class="link-btn">📗 위키</a>
                <a href="#" onclick="goSearch('google'); return false;" class="link-btn">Google</a>
                <a href="#" onclick="goSearch('etnews'); return false;" class="link-btn">전자신문</a>
            </div>

            <div style="border-top:1px dashed var(--border); margin:4px 0;"></div>

            <div>
                <label>정의</label>
                <textarea id="in-def" placeholder="토픽의 정의를 입력하세요..."></textarea>
            </div>
            
            <div>
                <label>키워드</label>
                <textarea id="in-key" placeholder="핵심 키워드 (쉼표 구분)..." style="min-height:60px;"></textarea>
            </div>

            <div style="margin-top:auto;">
                <button class="btn primary" style="width:100%; height:44px;" onclick="saveCurrentItem()">저장 / 수정 (Ctrl+S)</button>
            </div>
        </div>
    </section>

    <section class="card">
        <div class="search-container">
            <div class="search-wrapper">
                <div class="search-icon">🔍</div>
                <input type="text" id="search-filter" class="main-search-input" placeholder="토픽, 정의, 키워드 검색...">
            </div>
        </div>

        <div class="table-wrapper">
            <table id="list-table">
                <thead>
                    <tr>
                        <th width="20%">토픽명</th>
                        <th width="45%">정의</th>
                        <th width="25%">키워드</th>
                        <th width="10%" style="text-align:center;">관리</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        
        <div style="padding:10px 20px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); text-align:right; background:#f9fafb;">
            총 <span id="count-badge" style="font-weight:bold; color:var(--ink);">0</span>개의 토픽
        </div>
    </section>
</main>

<div id="toast-area"></div>

<script>
/** JS Logic **/
let db = null;
const DB_NAME = 'TopicSearchDB';
const STORE_NAME = 'topics_v2';
let state = { items: [], selectedId: null };

async function init() {
    await openDB(); await loadItems(); renderList();
    document.getElementById('excelFile').addEventListener('change', handleFileUpload);
    document.getElementById('search-filter').addEventListener('input', (e) => renderList(e.target.value));
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveCurrentItem(); }
    });
}

function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = (e) => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains(STORE_NAME)) d.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
        };
        req.onsuccess = () => { db = req.result; resolve(); };
        req.onerror = () => reject(req.error);
    });
}
function tx(mode) { return db.transaction(STORE_NAME, mode).objectStore(STORE_NAME); }

async function loadItems() {
    return new Promise(resolve => { tx('readonly').getAll().onsuccess = (e) => { state.items = e.target.result || []; resolve(); }; });
}
async function addItem(item) {
    return new Promise(resolve => { if(!item.id) item.id = Date.now(); tx('readwrite').put(item).onsuccess = () => resolve(item.id); });
}
async function updateItemInDB(item) {
    return new Promise(resolve => tx('readwrite').put(item).onsuccess = () => resolve());
}
async function deleteItemInDB(id) {
    return new Promise(resolve => tx('readwrite').delete(id).onsuccess = () => resolve());
}
async function clearDB() {
    return new Promise(resolve => tx('readwrite').clear().onsuccess = () => resolve());
}

// --- [NEW] Highlight Helper Function ---
function highlightText(text, query) {
    if (!query || !text) return text || '';
    // 특수문자 이스케이프 처리 (RegExp 오류 방지)
    const safeQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${safeQuery})`, 'gi');
    return String(text).replace(regex, '<span class="highlight">$1</span>');
}

function renderList(filterText = '') {
    const tbody = document.querySelector('#list-table tbody'); tbody.innerHTML = '';
    const filter = filterText.toLowerCase();
    
    // 필터링
    const list = state.items.filter(i => 
        (i.topic||'').toLowerCase().includes(filter) || 
        (i.def||'').toLowerCase().includes(filter) || 
        (i.keywords||'').toLowerCase().includes(filter)
    ).sort((a,b) => b.id - a.id);
    
    document.getElementById('count-badge').textContent = list.length;

    if(list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:40px; color:#a0aec0;">데이터가 없습니다.</td></tr>`;
        return;
    }

    // 렌더링 시 하이라이트 적용
    list.forEach(item => {
        const tr = document.createElement('tr'); tr.dataset.id = item.id;
        if(state.selectedId === item.id) tr.classList.add('active');
        
        // highlightText 함수 사용
        const htmlTopic = highlightText(item.topic, filterText);
        const htmlDef = highlightText(item.def, filterText);
        const htmlKey = highlightText(item.keywords, filterText);

        tr.innerHTML = `
            <td><div class="txt-topic truncate">${htmlTopic || '(제목 없음)'}</div></td>
            <td><div class="truncate">${htmlDef || '-'}</div></td>
            <td><div class="truncate" style="color:#718096;">${htmlKey || '-'}</div></td>
            <td style="text-align:center;">
                <button class="action-btn" title="수정" onclick="editItemFromList(event, ${item.id})">✏️</button>
                <button class="action-btn del" title="삭제" onclick="deleteItemFromList(event, ${item.id})">🗑️</button>
            </td>`;
        tr.onclick = () => selectItem(item.id); tbody.appendChild(tr);
    });
}

function selectItem(id) {
    state.selectedId = id; const item = state.items.find(i => i.id === id); if (!item) return;
    document.getElementById('edit-id').value = item.id;
    document.getElementById('in-topic').value = item.topic;
    document.getElementById('in-def').value = item.def;
    document.getElementById('in-key').value = item.keywords;
    document.querySelectorAll('tr').forEach(tr => tr.classList.remove('active'));
    const row = document.querySelector(`tr[data-id="${id}"]`); if(row) row.classList.add('active');
    const pill = document.getElementById('status-pill');
    pill.textContent = "EDITING"; pill.style.color = "#3182ce"; pill.style.background = "#ebf8ff"; pill.style.borderColor = "#bee3f8";
}

function createNewItem() {
    state.selectedId = null;
    document.getElementById('edit-id').value = ''; document.getElementById('in-topic').value = '';
    document.getElementById('in-def').value = ''; document.getElementById('in-key').value = '';
    document.querySelectorAll('tr').forEach(tr => tr.classList.remove('active'));
    const pill = document.getElementById('status-pill');
    pill.textContent = "NEW"; pill.style.color = "#38a169"; pill.style.background = "#f0fff4"; pill.style.borderColor = "#c6f6d5";
    document.getElementById('in-topic').focus();
}

async function saveCurrentItem() {
    const idVal = document.getElementById('edit-id').value;
    const topic = document.getElementById('in-topic').value.trim();
    const def = document.getElementById('in-def').value;
    const key = document.getElementById('in-key').value;
    if(!topic) return showToast('토픽명을 입력하세요!');
    if(!idVal) {
        const newItem = { id: Date.now(), topic, def, keywords: key }; await addItem(newItem); state.items.push(newItem); showToast('추가되었습니다.');
    } else {
        const id = parseInt(idVal); const item = state.items.find(i => i.id === id);
        if(item) { item.topic = topic; item.def = def; item.keywords = key; await updateItemInDB(item); showToast('수정되었습니다.'); }
    }
    renderList(document.getElementById('search-filter').value); if(!idVal) createNewItem();
}

function editItemFromList(e, id) { e.stopPropagation(); selectItem(id); }
async function deleteItemFromList(e, id) {
    e.stopPropagation(); if(!confirm('삭제하시겠습니까?')) return;
    await deleteItemInDB(id); state.items = state.items.filter(i => i.id !== id);
    if(state.selectedId === id) createNewItem();
    renderList(document.getElementById('search-filter').value); showToast('삭제되었습니다.');
}

function handleFileUpload(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = async (evt) => {
        try {
            const wb = XLSX.read(evt.target.result, {type:'array'});
            const sheet = wb.Sheets[wb.SheetNames[0]]; const json = XLSX.utils.sheet_to_json(sheet);
            if(!json.length) return showToast('데이터가 없습니다.');
            await clearDB();
            state.items = json.map((row, idx) => ({
                id: Date.now() + idx, topic: row['토픽']||row['Topic']||'', def: row['정의']||row['Definition']||'', keywords: row['키워드']||row['Keywords']||''
            }));
            const txReq = db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME);
            state.items.forEach(i => txReq.put(i));
            renderList(); showToast(`${state.items.length}개 로드 완료`);
        } catch(err) { alert('엑셀 읽기 실패'); }
        e.target.value = '';
    }; reader.readAsArrayBuffer(file);
}

function downloadExcel() {
    if(!state.items.length) return showToast('데이터가 없습니다.');
    const ws = XLSX.utils.json_to_sheet(state.items.map(i => ({'토픽': i.topic, '정의': i.def, '키워드': i.keywords})));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Topics');
    XLSX.writeFile(wb, `TopicSearch_${new Date().toISOString().slice(0,10)}.xlsx`);
}

async function clearAllData() {
    if(!confirm('전체 삭제 하시겠습니까?')) return;
    await clearDB(); state.items = []; createNewItem(); renderList(); showToast('초기화 되었습니다.');
}

function goSearch(type) {
    const q = document.getElementById('in-topic').value.trim(); if(!q) return showToast('토픽명을 입력하세요.');
    const enc = encodeURIComponent(q); let url = '';
    if(type==='jidum') url = `http://www.jidum.com/search.do?keyword=${enc}`;
    else if(type==='itwiki') url = `https://itwiki.kr/index.php?search=${enc}&title=특수%3A검색`;
    else if(type==='google') url = `https://www.google.com/search?q=${enc}`;
    else if(type==='etnews') url = `https://m.etnews.com/ict/search.html?skey=${enc}`;
    window.open(url, '_blank');
}

function showToast(msg) {
    const area = document.getElementById('toast-area'); const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg; area.appendChild(t); setTimeout(()=>t.remove(), 2500);
}

init();
</script>
</body>
</html>
