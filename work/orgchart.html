<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조직도 생성</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --bg-body: #F9FAFB;
      --bg-surface: #FFFFFF;
      --border-light: #F3F4F6;
      --border-base: #E5E7EB;
      --border-dark: #D1D5DB;
      --text-main: #111827;
      --text-muted: #6B7280;
      --primary: #111827;
      --primary-hover: #374151;
      --secondary: #FFFFFF;
      --secondary-hover: #F9FAFB;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --radius-md: 8px;
      --radius-lg: 12px;
      
      /* 조직도 전용 컬러 */
      --node-pm: #1E3A8A; 
      --node-pmo: #3B82F6; 
      --node-team-header: #F3F4F6;
      --line-color: #9CA3AF;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-body); color: var(--text-main); margin: 0; padding: 0;
      -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; height: 100vh;
    }

    /* 탑바 */
    .top-bar { 
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); 
      height: 64px; min-height: 64px; padding: 0 30px; border-bottom: 1px solid var(--border-base); 
      display: flex; justify-content: space-between; align-items: center; z-index: 5; 
    }
    .app-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; color: var(--primary); }
    .actions { display: flex; gap: 8px; align-items: center; }
    .divider { width: 1px; height: 20px; background: var(--border-dark); margin: 0 4px; }

    /* 버튼 스타일 */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; border: 1px solid transparent; outline: none; }
    .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-outline { background: var(--secondary); color: var(--text-main); border-color: var(--border-base); }
    .btn-outline:hover { background: var(--secondary-hover); border-color: #D1D5DB; }

    /* 메인 콘텐츠 영역 */
    .main-content { flex: 1; overflow-y: auto; padding: 30px 40px; display: flex; flex-direction: column; align-items: center; }
    .form-wrapper { width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 24px; }
    
    .keynote-card { background: var(--bg-surface); border: 1px solid var(--border-base); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-md); }

    /* 조직도 캔버스 */
    .chart-container { 
      background: var(--bg-surface); 
      padding: 40px; 
      border-radius: var(--radius-lg);
      overflow-x: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 400px;
    }

    /* 총 인원수 표시 */
    .total-count {
      width: 100%;
      text-align: right;
      font-size: 15px;
      font-weight: 700;
      color: var(--node-pm);
      margin-bottom: 20px;
      padding-right: 20px;
    }

    /* --- 조직도 CSS 트리 구조 --- */
    .org-tree {
      display: flex; flex-direction: column; align-items: center;
    }

    /* 노드 공통 */
    .node {
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      text-align: center;
      min-width: 140px;
      position: relative;
      background: white;
      border: 1px solid var(--border-base);
    }
    
    .node-title { font-weight: 700; font-size: 15px; padding: 10px; border-radius: 7px 7px 0 0; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .node-content { padding: 12px; font-size: 14px; line-height: 1.5; color: var(--text-main); font-weight: 500; }

    /* PM 노드 */
    .node.pm { border-color: var(--node-pm); z-index: 2; }
    .node.pm .node-title { background: var(--node-pm); color: white; border-radius: 7px; padding: 12px; }

    /* PMO 노드 */
    .node.pmo { border-color: var(--node-pmo); z-index: 2; min-width: 160px; }
    .node.pmo .node-title { background: var(--node-pmo); color: white; }

    /* 팀 리스트 컨테이너 */
    .teams-wrapper {
      display: flex;
      justify-content: center;
      position: relative;
    }

    /* 개별 팀 열 (선 연결을 위한 구조) */
    .team-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding: 0 10px; 
    }

    /* 각 팀을 이어주는 상단 가로선 */
    .team-column::after {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background-color: var(--line-color);
    }
    .team-column:first-child::after { left: 50%; width: 50%; }
    .team-column:last-child::after { left: 0; width: 50%; }
    .team-column:first-child:last-child::after { display: none; }

    /* 상단 가로선에서 각 팀으로 내려오는 짧은 수직선 */
    .team-column::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 2px; height: 24px; background-color: var(--line-color);
    }

    /* 팀 노드 */
    .node.team { border-color: var(--border-dark); width: 180px; margin-top: 24px; }
    .node.team .node-title { background: var(--node-team-header); color: var(--primary); border-bottom: 1px solid var(--border-base); }
    .node.team .node-content { display: flex; flex-direction: column; gap: 8px; text-align: left; background: #FAFAFA; border-radius: 0 0 7px 7px; }
    
    .team-member {
      padding: 8px 12px; background: white; border: 1px solid var(--border-light);
      border-radius: 4px; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    /* 팀장 강조 스타일 */
    .team-member.leader {
      font-weight: 700;
      color: var(--node-pm);
      background-color: #EFF6FF;
      border-color: #BFDBFE;
    }

    /* 토스트 알림 */
    .toast {
      visibility: hidden; background-color: #111827; color: #fff; text-align: center;
      border-radius: var(--radius-md); padding: 12px 24px; position: fixed; z-index: 1000;
      left: 50%; bottom: 20px; transform: translateX(-50%); font-size: 14px;
      opacity: 0; transition: opacity 0.3s, bottom 0.3s; display: flex; align-items: center; gap: 8px;
      box-shadow: var(--shadow-md);
    }
    .toast.show { visibility: visible; opacity: 1; bottom: 40px; }

    .empty-state { text-align: center; color: var(--text-muted); padding: 60px 0; font-size: 15px; margin: auto; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="app-title"><i class="ph-fill ph-users-three"></i> OrgChart</div>
    <div class="actions">
      <input type="file" id="excelInput" accept=".xlsx, .xls" style="display: none;" onchange="handleFileUpload(event)">
      <button class="btn btn-outline" onclick="downloadTemplate()"><i class="ph ph-file-xls"></i> 템플릿 양식</button>
      <div class="divider"></div>
      <button class="btn btn-outline" onclick="document.getElementById('excelInput').click()"><i class="ph ph-upload-simple"></i> 엑셀 업로드</button>
      <button class="btn btn-primary" onclick="downloadImage()"><i class="ph ph-download-simple"></i> 이미지 저장</button>
    </div>
  </div>

  <main class="main-content">
    <div class="form-wrapper">
      <div class="keynote-card" style="padding: 0; overflow: hidden;">
        <div id="chartContainer" class="chart-container">
          <div class="empty-state">
            <i class="ph ph-tree-structure" style="font-size: 48px; color: var(--border-dark); margin-bottom: 16px;"></i><br>
            엑셀 파일을 업로드하면 이곳에 조직도가 그려집니다.
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="toastMsg" class="toast"><i class="ph-bold ph-check"></i> 처리되었습니다</div>

  <script>
    function showToast(msg, icon = 'ph-check') {
      const toast = document.getElementById('toastMsg');
      toast.innerHTML = `<i class="ph-bold ${icon}"></i> ${msg}`;
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); }, 2000);
    }

    // 직책 컬럼이 추가된 템플릿 다운로드
    function downloadTemplate() {
      const ws_data = [
        ["조직명", "직책", "이름"],
        ["PM", "", "김진협 수석"],
        ["PMO", "", "박진효 부장"],
        ["기획팀", "팀장", "박지성"],
        ["기획팀", "팀원", "유재석"],
        ["개발팀", "팀장", "손흥민"],
        ["개발팀", "팀원", "이강인"],
        ["개발팀", "팀원", "김민재"],
        ["디자인팀", "팀장", "아이유"]
      ];
      const ws = XLSX.utils.aoa_to_sheet(ws_data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "조직도");
      XLSX.writeFile(wb, "조직도_템플릿.xlsx");
      showToast("템플릿이 다운로드 되었습니다.", "ph-download");
    }

    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, {type: 'array'});
          const firstSheetName = workbook.SheetNames[0];
          const worksheet = workbook.Sheets[firstSheetName];
          const json = XLSX.utils.sheet_to_json(worksheet);
          
          if(json.length === 0) throw new Error("데이터가 없습니다.");
          
          buildOrgChart(json);
          showToast("조직도가 생성되었습니다.");
        } catch (err) {
          alert("엑셀 파싱 오류: 양식(조직명, 직책, 이름)을 확인해주세요.\n" + err.message);
        }
        event.target.value = '';
      };
      reader.readAsArrayBuffer(file);
    }

    function buildOrgChart(data) {
      // 데이터 매핑: 직책(role) 추출 포함
      const mappedData = data.map(row => {
        const teamKey = Object.keys(row).find(k => k.includes('조직') || k.includes('팀') || k.includes('부서'));
        const nameKey = Object.keys(row).find(k => k.includes('이름') || k.includes('성명') || k.includes('팀원'));
        const roleKey = Object.keys(row).find(k => k.includes('직책') || k.includes('역할') || k.includes('직위') || k.includes('구분'));
        
        return {
          team: row[teamKey] ? row[teamKey].toString().trim() : '미분류',
          name: row[nameKey] ? row[nameKey].toString().trim() : '무명',
          role: roleKey && row[roleKey] ? row[roleKey].toString().trim() : ''
        };
      }).filter(d => d.name !== '무명' && d.name !== ''); // 이름이 비어있는 빈 행 필터링

      const totalCount = mappedData.length;

      const pms = mappedData.filter(d => d.team.toUpperCase() === 'PM');
      const pmos = mappedData.filter(d => d.team.toUpperCase() === 'PMO');
      const otherTeamsData = mappedData.filter(d => d.team.toUpperCase() !== 'PM' && d.team.toUpperCase() !== 'PMO');

      const teams = {};
      otherTeamsData.forEach(d => {
        if(!teams[d.team]) teams[d.team] = [];
        teams[d.team].push(d); // 객체 전체를 push (이름 + 직책)
      });

      const container = document.getElementById('chartContainer');
      container.innerHTML = ''; 

      // 1. 총 인원 뱃지 렌더링
      container.innerHTML += `<div class="total-count"><i class="ph-fill ph-users"></i> 총 인원: ${totalCount}명</div>`;

      const orgTree = document.createElement('div');
      orgTree.className = 'org-tree';

      // 2. PM 생성
      if (pms.length > 0) {
        const pmNames = pms.map(p => p.name).join('<br>');
        orgTree.innerHTML += `
          <div class="node pm">
            <div class="node-title">Project Manager</div>
            <div class="node-content"><b>${pmNames}</b></div>
          </div>
        `;
      }

      const teamNames = Object.keys(teams);

      // 3. 중간 연결선 + PMO
      if (pms.length > 0 && (teamNames.length > 0 || pmos.length > 0)) {
        let pmoHtml = '';
        if (pmos.length > 0) {
          const pmoNames = pmos.map(p => p.name).join('<br>');
          pmoHtml = `
            <div style="position: absolute; top: 50%; left: 2px; transform: translateY(-50%); display: flex; align-items: center;">
              <div style="width: 40px; height: 2px; background: var(--line-color);"></div>
              <div class="node pmo" style="margin: 0; text-align: center;">
                <div class="node-title">PMO</div>
                <div class="node-content"><b>${pmoNames}</b></div>
              </div>
            </div>
          `;
        }

        orgTree.innerHTML += `
          <div style="position: relative; width: 2px; height: 100px; background: var(--line-color); margin: 0 auto; z-index: 1;">
            ${pmoHtml}
          </div>
        `;
      } else if (pmos.length > 0 && pms.length === 0) {
        const pmoNames = pmos.map(p => p.name).join('<br>');
        orgTree.innerHTML += `
          <div class="node pmo" style="margin-bottom: 30px;">
            <div class="node-title">PMO</div>
            <div class="node-content"><b>${pmoNames}</b></div>
          </div>
        `;
        if (teamNames.length > 0) {
          orgTree.innerHTML += `<div style="background: var(--line-color); width: 2px; height: 40px;"></div>`;
        }
      }

      // 4. Teams 생성
      if (teamNames.length > 0) {
        const teamsWrapper = document.createElement('div');
        teamsWrapper.className = 'teams-wrapper';

        teamNames.forEach(teamName => {
          const members = teams[teamName];
          const teamCount = members.length;

          // 팀장 정렬: 직책이 '팀장'이거나 이름에 '팀장'이 포함된 경우 상단 배치
          members.sort((a, b) => {
            const aIsLeader = a.role.includes('팀장') || a.role.includes('파트장') || a.role.includes('리더') || a.name.includes('팀장');
            const bIsLeader = b.role.includes('팀장') || b.role.includes('파트장') || b.role.includes('리더') || b.name.includes('팀장');
            if(aIsLeader && !bIsLeader) return -1;
            if(!aIsLeader && bIsLeader) return 1;
            return 0;
          });

          // 팀원 리스트 HTML 생성
          const membersHtml = members.map(m => {
            const isLeader = m.role.includes('팀장') || m.role.includes('파트장') || m.role.includes('리더') || m.name.includes('팀장');
            if (isLeader) {
              return `<div class="team-member leader">${m.name}</div>`;
            } else {
              return `<div class="team-member">${m.name}</div>`;
            }
          }).join('');

          const teamHtml = `
            <div class="team-column">
              <div class="node team">
                <div class="node-title">
                  ${teamName} 
                  <span style="font-size: 13px; font-weight: 500; color: #6B7280; margin-left: 2px;">(${teamCount}명)</span>
                </div>
                <div class="node-content">
                  ${membersHtml}
                </div>
              </div>
            </div>
          `;
          teamsWrapper.innerHTML += teamHtml;
        });

        orgTree.appendChild(teamsWrapper);
      }

      container.appendChild(orgTree);
    }

    function downloadImage() {
      const container = document.getElementById('chartContainer');
      if (container.querySelector('.empty-state')) {
        alert("먼저 엑셀을 업로드하여 조직도를 생성해주세요.");
        return;
      }

      html2canvas(container, {
        scale: 2,
        backgroundColor: '#FFFFFF',
        logging: false
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = `Keynote_OrgChart_${new Date().getTime()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
        showToast("이미지가 저장되었습니다.", "ph-image");
      }).catch(err => {
        alert("이미지 생성 중 오류가 발생했습니다: " + err);
      });
    }
  </script>
</body>
</html>
