<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestone Gantt</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --bg-body: #f8f9fa;       
            --bg-card: #ffffff;       
            --text-primary: #1e293b;  
            --text-secondary: #64748b;
            --accent-color: #4f46e5;  
            --accent-hover: #4338ca;
            --success-color: #10b981;
            --success-hover: #059669;
            --warning-color: #f59e0b;
            --warning-hover: #d97706;
            --danger-color: #ef4444;
            
            --border-light: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; }

        .header-title h1 { font-size: 28px; font-weight: 700; color: var(--text-primary); margin: 0 0 12px 0; letter-spacing: -0.5px; }

        .input-group { display: flex; gap: 12px; align-items: center; }
        
        .project-input, .date-input {
            font-size: 16px; border: 1px solid var(--border-light);
            border-radius: var(--radius-sm); font-weight: 600; color: var(--accent-color);
            background-color: #fff; transition: all 0.2s; box-sizing: border-box;
        }
        .project-input { width: 300px; padding: 10px 14px; }
        .date-input { width: 160px; padding: 10px 8px; color: var(--text-primary); }
        
        .project-input:focus, .date-input:focus {
            outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 32px; }

        .stat-card {
            background: var(--bg-card); padding: 24px; border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .stat-card h3 { font-size: 14px; color: var(--text-secondary); font-weight: 500; margin: 0 0 12px 0; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: var(--text-primary); }
        .stat-card .sub-text { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

        .controls { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px; }

        button {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 18px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.2s ease; box-shadow: var(--shadow-sm);
        }

        .btn-add { background-color: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-light); }
        .btn-add:hover { background-color: #f1f5f9; }
        .btn-del { background-color: #fff1f2; color: var(--danger-color); border: 1px solid #fecdd3; }
        .btn-del:hover { background-color: #ffe4e6; }
        
        .btn-auto { background-color: var(--warning-color); color: white; }
        .btn-auto:hover { background-color: var(--warning-hover); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }

        .btn-excel { background-color: var(--accent-color); color: white; }
        .btn-excel:hover { background-color: var(--accent-hover); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        
        .btn-excel-data { background-color: var(--success-color); color: white; }
        .btn-excel-data:hover { background-color: var(--success-hover); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }

        .table-container {
            background: var(--bg-card); border-radius: var(--radius-md);
            box-shadow: var(--shadow-md); overflow: visible; border: 1px solid var(--border-light);
        }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead { background-color: #f8fafc; border-bottom: 2px solid var(--border-light); }
        th { padding: 16px; text-align: left; font-weight: 600; color: var(--text-secondary); font-size: 13px; }
        th.center { text-align: center; }
        td { padding: 8px 16px; border-bottom: 1px solid var(--border-light); color: var(--text-primary); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        
        tr.draggable-row { cursor: grab; }
        tr.draggable-row:active { cursor: grabbing; }
        tr.dragging { opacity: 0.4; background-color: #e2e8f0; }
        tr.drag-over { border-top: 3px solid var(--accent-color); }

        input[type="text"], input[type="date"], input[type="number"] {
            width: 100%; padding: 8px 10px; border: 1px solid transparent; 
            border-radius: 6px; background-color: transparent; font-family: inherit; font-size: 14px;
            color: var(--text-primary); transition: all 0.2s; box-sizing: border-box;
        }
        table input:hover:not(.readonly) { background-color: #f1f5f9; }
        table input:focus:not(.readonly) {
            background-color: #fff; border-color: var(--accent-color); outline: none;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .readonly { background-color: #f8fafc !important; color: var(--text-secondary); text-align: center; pointer-events: none; border-color: transparent !important; }
        
        .row-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-color); }
        input[type="date"] { cursor: pointer; }

        .drag-handle { cursor: grab; font-size: 18px; color: #94a3b8; user-select: none; }
        .drag-handle:hover { color: var(--text-primary); }
        #dbStatus { font-size: 12px; color: var(--success-color); font-weight: 500; opacity: 0; transition: opacity 0.5s; position: absolute; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-title">
            <h1>Milestone Gantt</h1>
            <div class="input-group">
                <input type="text" id="projectName" class="project-input" placeholder="프로젝트명 (예: 차세대 시스템 구축)" onchange="saveData()" autocomplete="off">
                <div style="display:flex; flex-direction:column;">
                    <label style="font-size: 12px; color: var(--text-secondary); font-weight:600; margin-bottom:4px; margin-left:8px;">프로젝트 착수일</label>
                    <input type="date" id="baseStartDate" class="date-input" onchange="saveData()">
                </div>
                <span id="dbStatus">✓ 로컬 저장됨</span>
            </div>
        </div>
        <div class="controls">
            <button class="btn-add" onclick="addRow()">+ 단계 추가</button>
            <button class="btn-del" onclick="deleteRows()">선택 삭제</button>
            <button class="btn-auto" onclick="autoChainSchedule()" title="착수일부터 M에 맞춰 순차적으로 전체 일정을 연결합니다.">⚡ 스케줄 일괄 연결</button>
            <button class="btn-excel-data" onclick="downloadDataExcel()">📝 엑셀 내역 다운로드</button>
            <button class="btn-excel" onclick="downloadGanttExcel()">📊 간트 엑셀 다운로드</button>
        </div>
    </header>

    <div class="summary-grid">
        <div class="stat-card">
            <h3>프로젝트 진행 단계</h3>
            <div class="value" id="totalTasks">0</div>
            <div class="sub-text">설정된 마일스톤/단계 수</div>
        </div>
        <div class="stat-card">
            <h3>총 소요 기간</h3>
            <div class="value" style="color: var(--accent-color);" id="totalMM">0.0 <span style="font-size:16px; color:#666;">Month</span></div>
            <div class="sub-text">전체 기간 합계 (1M = 22영업일)</div>
        </div>
        <div class="stat-card">
            <h3>예상 프로젝트 일정</h3>
            <div class="value" style="font-size: 20px; line-height: 38px;" id="projectDuration">-</div>
            <div class="sub-text">전체 착수 ~ 종료일</div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th width="4%" class="center"></th>
                    <th width="4%" class="center"><input type="checkbox" id="checkAll" class="row-checkbox" onclick="toggleAll()"></th>
                    <th width="32%">수행 단계 (Phase)</th>
                    <th width="10%" class="center" title="1M = 22영업일 기준">기간(M)</th>
                    <th width="10%" class="center" title="자동 계산된 실 영업일">영업일수(일)</th>
                    <th width="20%" class="center">시작일 (Start)</th>
                    <th width="20%" class="center">종료일 (End)</th>
                </tr>
            </thead>
            <tbody id="taskTableBody">
            </tbody>
        </table>
    </div>
</div>

<script>
    const defaultTemplate = [
        { task: "ISP / 현황 분석", durationM: 1 },
        { task: "요구사항 분석", durationM: 1 },
        { task: "기본 설계", durationM: 1 },
        { task: "상세 설계", durationM: 1.5 },
        { task: "구현 및 단위테스트", durationM: 2 },
        { task: "통합/사용자 테스트", durationM: 1 },
        { task: "이행 및 안정화", durationM: 0.5 }
    ];

    window.onload = function() { loadData(); };

    function loadData() {
        const dataStr = localStorage.getItem('pmSchedulerData');
        const tableBody = document.getElementById("taskTableBody");
        tableBody.innerHTML = ""; 

        if (dataStr) {
            const data = JSON.parse(dataStr);
            document.getElementById("projectName").value = data.projectName || "";
            document.getElementById("baseStartDate").value = data.baseStartDate || "";
            
            if (data.tasks && data.tasks.length > 0) {
                data.tasks.forEach(task => appendRowToTable(task));
            } else {
                defaultTemplate.forEach(task => appendRowToTable(task));
            }
        } else {
            defaultTemplate.forEach(task => appendRowToTable(task));
        }
        updateSummary();
    }

    function saveData() {
        const projectName = document.getElementById("projectName").value;
        const baseStartDate = document.getElementById("baseStartDate").value;
        const rows = document.querySelectorAll("#taskTableBody tr");
        const tasks = [];
        
        rows.forEach(row => {
            tasks.push({
                task: row.querySelector('.task-name').value,
                durationM: parseFloat(row.querySelector('.duration-m').value) || 0,
                start: row.querySelector('.start-date').value,
                end: row.querySelector('.end-date').value
            });
        });

        const data = { projectName, baseStartDate, tasks };
        localStorage.setItem('pmSchedulerData', JSON.stringify(data));
        
        const el = document.getElementById("dbStatus");
        el.style.opacity = 1;
        setTimeout(() => { el.style.opacity = 0; }, 1500);
    }

    function calculateEndDate(startDateStr, durationDays) {
        if (!startDateStr || durationDays < 1) return "";
        let date = new Date(startDateStr);
        let addedDays = 0;
        
        if (date.getDay() === 0) date.setDate(date.getDate() + 1); 
        if (date.getDay() === 6) date.setDate(date.getDate() + 2); 

        while (addedDays < durationDays - 1) {
            date.setDate(date.getDate() + 1);
            if (date.getDay() !== 0 && date.getDay() !== 6) { 
                addedDays++;
            }
        }
        return date.toISOString().split('T')[0];
    }

    function getNextWorkingDay(dateStr) {
        let date = new Date(dateStr);
        date.setDate(date.getDate() + 1);
        if (date.getDay() === 6) date.setDate(date.getDate() + 2); 
        if (date.getDay() === 0) date.setDate(date.getDate() + 1); 
        return date.toISOString().split('T')[0];
    }

    function calcRow(el) {
        const row = el.closest('tr');
        const durationM = parseFloat(row.querySelector('.duration-m').value) || 0;
        const startVal = row.querySelector('.start-date').value;

        const workingDays = Math.ceil(durationM * 22);
        row.querySelector('.working-days').value = workingDays;

        if (startVal && workingDays > 0) {
            const endVal = calculateEndDate(startVal, workingDays);
            row.querySelector('.end-date').value = endVal;
        } else {
            row.querySelector('.end-date').value = '';
        }
        
        updateSummary();
        saveData();
    }

    function calcRowFromEnd(el) {
        const row = el.closest('tr');
        const startVal = row.querySelector('.start-date').value;
        const endVal = row.querySelector('.end-date').value;

        if (startVal && endVal) {
            let start = new Date(startVal);
            let end = new Date(endVal);
            
            if (end < start) {
                alert("종료일은 시작일보다 빠를 수 없습니다.");
                row.querySelector('.end-date').value = '';
                return;
            }

            let count = 0;
            let cur = new Date(start);
            while (cur <= end) {
                let day = cur.getDay();
                if (day !== 0 && day !== 6) count++;
                cur.setDate(cur.getDate() + 1);
            }
            
            row.querySelector('.working-days').value = count;
            row.querySelector('.duration-m').value = (count / 22).toFixed(1);
        }
        
        updateSummary();
        saveData();
    }

    function autoChainSchedule() {
        const rows = document.querySelectorAll("#taskTableBody tr");
        let currentStartDate = document.getElementById("baseStartDate").value;
        
        if (!currentStartDate) {
            alert("상단의 '프로젝트 착수일'을 먼저 설정해주세요.");
            document.getElementById("baseStartDate").focus();
            return;
        }

        rows.forEach((row) => {
            const durationM = parseFloat(row.querySelector('.duration-m').value) || 0;
            const workingDays = Math.ceil(durationM * 22);
            
            const startInput = row.querySelector('.start-date');
            const endInput = row.querySelector('.end-date');
            
            if (workingDays > 0) {
                startInput.value = currentStartDate;
                const calculatedEnd = calculateEndDate(currentStartDate, workingDays);
                endInput.value = calculatedEnd;
                row.querySelector('.working-days').value = workingDays;
                
                currentStartDate = getNextWorkingDay(calculatedEnd);
            } else {
                startInput.value = '';
                endInput.value = '';
                row.querySelector('.working-days').value = 0;
            }
        });

        updateSummary();
        saveData();
    }

    function addRow() { appendRowToTable({}); }

    function appendRowToTable(data) {
        const table = document.getElementById("taskTableBody");
        const row = table.insertRow();
        
        row.className = "draggable-row";
        row.setAttribute('draggable', 'true');
        row.addEventListener('dragstart', handleDragStart);
        row.addEventListener('dragover', handleDragOver);
        row.addEventListener('dragenter', handleDragEnter);
        row.addEventListener('dragleave', handleDragLeave);
        row.addEventListener('drop', handleDrop);
        row.addEventListener('dragend', handleDragEnd);

        const initM = data.durationM !== undefined ? data.durationM : 1.0;
        const initDays = Math.ceil(initM * 22);

        row.innerHTML = `
            <td class="center"><span class="drag-handle">☰</span></td>
            <td class="center"><input type="checkbox" name="rowCheck" class="row-checkbox"></td>
            <td><input type="text" class="task-name" value="${data.task || ''}" placeholder="단계명 입력 (예: 개발)" onchange="saveData()" style="font-weight: 500;"></td>
            <td><input type="number" class="duration-m" min="0" step="0.1" value="${initM}" onchange="calcRow(this)" style="text-align:center; font-weight: bold; color: var(--accent-color);"></td>
            <td><input type="text" class="working-days readonly" value="${initDays}" readonly></td>
            <td><input type="date" class="start-date" value="${data.start || ''}" onchange="calcRow(this)"></td>
            <td><input type="date" class="end-date" value="${data.end || ''}" onchange="calcRowFromEnd(this)"></td>
        `;
        if(data.start && data.durationM) calcRow(row.querySelector('input'));
    }

    function deleteRows() {
        const table = document.getElementById("taskTableBody");
        const checkboxes = document.getElementsByName("rowCheck");
        let deleted = false;
        for (let i = checkboxes.length - 1; i >= 0; i--) {
            if (checkboxes[i].checked) {
                table.deleteRow(i);
                deleted = true;
            }
        }
        if(!deleted) alert("삭제할 단계를 선택해주세요.");
        else {
            updateSummary();
            document.getElementById("checkAll").checked = false;
            saveData();
        }
    }

    function toggleAll() {
        const checked = document.getElementById("checkAll").checked;
        document.getElementsByName("rowCheck").forEach(cb => cb.checked = checked);
    }

    function updateSummary() {
        const rows = document.querySelectorAll("#taskTableBody tr");
        let totalM = 0;
        let minS = new Date('9999-12-31'), maxE = new Date('1900-01-01');
        let hasDate = false;
        
        rows.forEach(r => {
            totalM += parseFloat(r.querySelector('.duration-m').value) || 0;
            const sVal = r.querySelector('.start-date').value;
            const eVal = r.querySelector('.end-date').value;
            if (sVal) {
                const s = new Date(sVal);
                if(s < minS) minS = s;
                hasDate = true;
            }
            if (eVal) {
                const e = new Date(eVal);
                if(e > maxE) maxE = e;
                hasDate = true;
            }
        });

        document.getElementById("totalTasks").innerText = rows.length;
        document.getElementById("totalMM").innerText = totalM.toFixed(1) + " M";
        if (hasDate && minS <= maxE) {
            const fmt = (d) => d.toISOString().split('T')[0];
            document.getElementById("projectDuration").innerText = `${fmt(minS)} ~ ${fmt(maxE)}`;
        } else {
            document.getElementById("projectDuration").innerText = "-";
        }
    }

    let draggedRow = null;

    function handleDragStart(e) {
        draggedRow = this;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) { e.preventDefault(); return false; }
    function handleDragEnter(e) { this.classList.add('drag-over'); }
    function handleDragLeave(e) { this.classList.remove('drag-over'); }

    function handleDrop(e) {
        e.stopPropagation();
        if (draggedRow !== this) {
            const tbody = document.getElementById("taskTableBody");
            const rows = Array.from(tbody.children);
            const draggedIndex = rows.indexOf(draggedRow);
            const targetIndex = rows.indexOf(this);
            
            if (draggedIndex < targetIndex) tbody.insertBefore(draggedRow, this.nextSibling);
            else tbody.insertBefore(draggedRow, this);
            saveData();
        }
        return false;
    }

    function handleDragEnd(e) {
        this.classList.remove('dragging');
        document.querySelectorAll('.draggable-row').forEach(row => row.classList.remove('drag-over'));
    }

    async function downloadDataExcel() {
        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('일정 내역');
        const rows = document.querySelectorAll("#taskTableBody tr");
        const prjName = document.getElementById("projectName").value.trim() || "프로젝트";

        if (rows.length === 0) { alert("데이터가 없습니다."); return; }

        const fillHeader = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFEFEFEF' } };
        const borderThin = { style: 'thin', color: { argb: 'FF000000' } };

        sheet.columns = [
            { header: '진행 단계 (Phase)', key: 'task', width: 40 },
            { header: '기간(M)', key: 'duration', width: 15 },
            { header: '영업일수(일)', key: 'workDays', width: 15 },
            { header: '시작일', key: 'start', width: 20 },
            { header: '종료일', key: 'end', width: 20 }
        ];

        sheet.getRow(1).eachCell((cell) => {
            cell.fill = fillHeader;
            cell.font = { bold: true };
            cell.alignment = { vertical: 'middle', horizontal: 'center' };
            cell.border = { top: borderThin, bottom: borderThin, left: borderThin, right: borderThin };
        });

        rows.forEach(row => {
            const taskName = row.querySelector('.task-name').value.trim();
            const durationM = parseFloat(row.querySelector('.duration-m').value) || 0;
            const workingDays = parseInt(row.querySelector('.working-days').value) || 0;
            const sVal = row.querySelector('.start-date').value;
            const eVal = row.querySelector('.end-date').value;

            if(taskName) {
                const addedRow = sheet.addRow({
                    task: taskName,
                    duration: durationM,
                    workDays: workingDays,
                    start: sVal || '-',
                    end: eVal || '-'
                });

                addedRow.eachCell((cell, colNumber) => {
                    cell.border = { top: borderThin, bottom: borderThin, left: borderThin, right: borderThin };
                    cell.alignment = { 
                        vertical: 'middle', 
                        horizontal: colNumber === 1 ? 'left' : 'center', 
                        indent: colNumber === 1 ? 1 : 0 
                    };
                });
            }
        });

        const buffer = await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buffer]), `${prjName.replace(/\s+/g, '_')}_일정_내역.xlsx`);
    }

    async function downloadGanttExcel() {
        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('Master Schedule');
        const rows = document.querySelectorAll("#taskTableBody tr");
        const prjName = document.getElementById("projectName").value.trim() || "프로젝트";

        if (rows.length === 0) { alert("데이터가 없습니다."); return; }

        let minDate = new Date('9999-12-31');
        let validDataExists = false;

        rows.forEach(row => {
            const sVal = row.querySelector('.start-date').value;
            if (sVal) {
                const sDate = new Date(sVal);
                if (sDate < minDate) minDate = sDate;
                validDataExists = true;
            }
        });

        if (!validDataExists) { alert("일정(시작일) 데이터가 설정된 항목이 없습니다."); return; }

        const projectStart = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
        const fillHeader = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFEFEFEF' } }; 
        const fillBar = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF4F46E5' } }; 
        const borderThin = { style: 'thin', color: { argb: 'FFBFBFBF' } };
        const borderMedium = { style: 'medium', color: { argb: 'FF000000' } }; 

        sheet.getColumn(1).width = 40;
        sheet.mergeCells('A1:BM1');
        const titleCell = sheet.getCell('A1');
        titleCell.value = `■ ${prjName} 마스터 스케줄`;
        titleCell.font = { bold: true, size: 16 };
        titleCell.alignment = { vertical: 'middle' };
        
        sheet.mergeCells('A2:A3');
        const headerName = sheet.getCell('A2');
        headerName.value = "진행 단계 (Phase)";
        headerName.style = { 
            fill: fillHeader, font: { bold: true }, alignment: { vertical: 'middle', horizontal: 'center' },
            border: { top: borderMedium, bottom: borderMedium, left: borderMedium, right: borderThin }
        };

        const totalCols = 2 + (12 * 5); 
        for (let m = 0; m < 12; m++) {
            const startCol = 2 + (m * 5);
            sheet.mergeCells(2, startCol, 2, startCol + 4);
            const mCell = sheet.getCell(2, startCol);
            mCell.value = `M${m+1}`;
            mCell.fill = fillHeader; mCell.font = { bold: true };
            mCell.alignment = { vertical: 'middle', horizontal: 'center' };
            mCell.border = { top: borderMedium, bottom: borderThin, left: borderThin, right: borderThin };

            for (let w = 0; w < 5; w++) {
                const wCol = startCol + w;
                const wCell = sheet.getCell(3, wCol);
                wCell.value = w + 1;
                wCell.fill = fillHeader; wCell.font = { size: 9 };
                wCell.alignment = { horizontal: 'center', vertical: 'middle' };
                wCell.border = { top: borderThin, bottom: borderMedium, left: borderThin, right: borderThin };
                sheet.getColumn(wCol).width = 3.2; 
            }
        }

        let currentRowIndex = 4;
        
        rows.forEach(row => {
            const taskName = row.querySelector('.task-name').value.trim();
            const sVal = row.querySelector('.start-date').value;
            const eVal = row.querySelector('.end-date').value;
            if (!taskName || !sVal || !eVal) return;

            const sheetRow = sheet.getRow(currentRowIndex);
            const nameCell = sheetRow.getCell(1);
            nameCell.value = taskName;
            nameCell.alignment = { vertical: 'middle', indent: 1 };
            nameCell.border = { top: borderThin, left: borderMedium, bottom: borderThin, right: borderThin };

            const maxCol = 2 + (12 * 5) - 1;
            for (let c = 2; c <= maxCol; c++) {
                sheetRow.getCell(c).border = { top: borderThin, left: borderThin, bottom: borderThin, right: borderThin };
            }
            sheetRow.getCell(maxCol).border = { top: borderThin, left: borderThin, bottom: borderThin, right: borderMedium };

            const startDate = new Date(sVal);
            const endDate = new Date(eVal);

            const startMonthIdx = (startDate.getFullYear() - projectStart.getFullYear()) * 12 + (startDate.getMonth() - projectStart.getMonth());
            const endMonthIdx = (endDate.getFullYear() - projectStart.getFullYear()) * 12 + (endDate.getMonth() - projectStart.getMonth());
            const getWeekIdx = (date) => Math.min(4, Math.floor((date.getDate() - 1) / 7));
            
            let startGridCol = 2 + (startMonthIdx * 5) + getWeekIdx(startDate);
            let endGridCol = 2 + (endMonthIdx * 5) + getWeekIdx(endDate);

            if (startGridCol < 2) startGridCol = 2;
            if (endGridCol > maxCol) endGridCol = maxCol;

            for (let c = startGridCol; c <= endGridCol; c++) {
                if (c >= 2 && c <= maxCol) sheetRow.getCell(c).fill = fillBar;
            }
            currentRowIndex++;
        });

        const buffer = await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buffer]), `${prjName.replace(/\s+/g, '_')}_Master_Schedule.xlsx`);
    }
</script>
</body>
</html>
