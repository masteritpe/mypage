<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M/STONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            background-color: #F8FAFC; 
            color: #334155; 
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(127, 169, 155, 0.2);
        }
        
        /* 타임라인 선: .timeline-line 클래스가 있을 때만 표시됨 */
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 24px; /* 시작점 조정 */
            bottom: 80px;
            width: 2px;
            background: #CDE4DE; 
            z-index: 0;
        }

        /* Sage Green Theme Utilities */
        .bg-sage-50 { background-color: #F4F9F8; }
        .bg-sage-100 { background-color: #E8F3F1; }
        .bg-sage-200 { background-color: #CDE4DE; }
        .bg-sage-500 { background-color: #7FA99B; }
        .bg-sage-600 { background-color: #6B9487; }
        .text-sage-500 { color: #7FA99B; }
        .text-sage-600 { color: #6B9487; }
        .text-sage-700 { color: #5A7F73; }
        .border-sage-200 { border-color: #CDE4DE; }
        .ring-sage-200 { --tw-ring-color: #CDE4DE; }
    </style>
</head>
<body class="h-screen flex overflow-hidden selection:bg-sage-200 selection:text-sage-700">

    <aside class="w-80 bg-white border-r border-sage-200 flex flex-col shadow-sm z-20">
        <div class="p-6">
            <h1 class="text-xl font-bold text-sage-700 tracking-tight flex items-center mb-6">
                <span class="bg-sage-100 text-sage-600 w-8 h-8 rounded-lg flex items-center justify-center mr-3 text-sm shadow-sm border border-sage-200">
                    <i class="fas fa-leaf"></i>
                </span>
                M/STONE
            </h1>
            
            <div class="relative group">
                <i class="fas fa-search absolute left-3 top-3.5 text-sage-400 text-sm group-focus-within:text-sage-600 transition-colors"></i>
                <input type="text" id="project-search" placeholder="Search projects..." 
                    class="w-full bg-sage-50 border border-sage-200 rounded-xl pl-10 pr-4 py-3 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-sage-200 focus:bg-white transition-all placeholder-sage-400">
            </div>
        </div>

        <div class="px-4 pb-2">
            <p class="text-xs font-semibold text-sage-500 uppercase tracking-wider mb-2 px-2">Projects</p>
        </div>

        <div class="flex-1 overflow-y-auto px-4 space-y-1 pb-4 scrollbar-hide" id="project-list"></div>

        <div class="p-4 border-t border-sage-200 bg-sage-50">
            <button onclick="openProjectModal()" class="w-full bg-white hover:bg-sage-100 text-sage-600 py-3 rounded-xl text-sm font-medium transition-all duration-300 flex items-center justify-center border border-sage-200 shadow-sm hover:shadow-md group">
                <i class="fas fa-plus mr-2 group-hover:rotate-90 transition-transform"></i> Create Project
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-[#F8FAFC] relative">
        
        <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-sage-400">
            <div class="w-24 h-24 bg-sage-100 rounded-full flex items-center justify-center mb-6 border border-sage-200">
                <i class="fas fa-seedling text-4xl text-sage-500"></i>
            </div>
            <h3 class="text-xl font-medium text-sage-700 mb-2">No Project Selected</h3>
            <p class="text-sm font-light text-sage-500">Select a project from the sidebar.</p>
        </div>

        <div id="main-content" class="hidden flex-col h-full">
            <header class="glass-header px-10 py-6 flex justify-between items-end sticky top-0 z-10">
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <span class="w-2 h-2 rounded-full bg-sage-500"></span>
                        <span class="text-xs font-bold text-sage-500 uppercase tracking-widest">Active Project</span>
                    </div>
                    <h2 class="text-3xl font-bold text-slate-800 tracking-tight" id="current-project-title"></h2>
                    <p class="text-slate-500 font-light mt-1 max-w-2xl truncate" id="current-project-desc"></p>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="deleteCurrentProject()" class="text-sage-400 hover:text-red-500 hover:bg-red-50 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        <i class="far fa-trash-alt"></i>
                    </button>
                    <button onclick="openMilestoneModal()" class="bg-sage-500 hover:bg-sage-600 text-white px-6 py-3 rounded-xl text-sm font-semibold transition shadow-lg shadow-sage-200/50 flex items-center">
                        <i class="fas fa-plus mr-2"></i> Add Milestone
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto px-10 py-8 scrollbar-hide">
                <div class="grid grid-cols-3 gap-6 mb-12">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-sage-200 flex flex-col justify-between h-32 relative overflow-hidden group hover:shadow-md transition-shadow">
                        <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity"><i class="fas fa-flag text-5xl text-sage-500"></i></div>
                        <span class="text-sage-500 text-sm font-medium">Total Tasks</span>
                        <strong class="text-4xl font-light text-slate-800" id="stat-total">0</strong>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-sage-200 flex flex-col justify-between h-32 relative overflow-hidden group hover:shadow-md transition-shadow">
                        <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity"><i class="fas fa-spinner text-5xl text-amber-500"></i></div>
                        <span class="text-sage-500 text-sm font-medium">In Progress</span>
                        <strong class="text-4xl font-light text-slate-800" id="stat-remain">0</strong>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-sage-200 flex flex-col justify-between h-32 relative overflow-hidden group hover:shadow-md transition-shadow">
                        <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity"><i class="fas fa-check-circle text-5xl text-sage-500"></i></div>
                        <span class="text-sage-500 text-sm font-medium">Completed</span>
                        <strong class="text-4xl font-light text-slate-800" id="stat-done">0</strong>
                    </div>
                </div>

                <div class="relative space-y-6 pb-20" id="milestone-list"></div>
            </div>
        </div>
    </main>

    <div id="project-modal" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 border border-sage-100">
            <h3 class="text-xl font-bold text-slate-800 mb-1">New Project</h3>
            <p class="text-sage-500 text-sm mb-6">Create a new workspace.</p>
            <form id="project-form">
                <div class="space-y-4">
                    <input type="text" id="p-name" class="w-full bg-sage-50 border border-sage-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-sage-200 outline-none transition text-slate-700" placeholder="Project Name" required>
                    <input type="text" id="p-desc" class="w-full bg-sage-50 border border-sage-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-sage-200 outline-none transition text-slate-700" placeholder="Description">
                </div>
                <div class="flex justify-end gap-3 mt-8">
                    <button type="button" onclick="closeProjectModal()" class="px-5 py-2.5 text-sage-500 hover:bg-sage-50 rounded-xl text-sm font-medium transition">Cancel</button>
                    <button type="submit" class="px-5 py-2.5 bg-sage-500 text-white rounded-xl hover:bg-sage-600 text-sm font-medium shadow-md transition">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div id="milestone-modal" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 border border-sage-100">
            <h3 id="m-modal-title" class="text-xl font-bold text-slate-800 mb-6">Add Milestone</h3>
            <form id="milestone-form">
                <input type="hidden" id="m-edit-id">
                <div class="space-y-5">
                    <input type="text" id="m-chapter" placeholder="Phase / Chapter" class="w-full bg-sage-50 border border-sage-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-sage-200 outline-none transition text-slate-700" required>
                    <input type="text" id="m-title" placeholder="Title" class="w-full bg-sage-50 border border-sage-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-sage-200 outline-none transition text-slate-700" required>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="m-date" class="w-full bg-sage-50 border border-sage-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-sage-200 outline-none text-slate-700" required>
                        <select id="m-status" class="w-full bg-sage-50 border border-sage-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-sage-200 outline-none text-slate-700">
                            <option value="pending">Pending</option>
                            <option value="progress">In Progress</option>
                            <option value="done">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-8">
                    <button type="button" onclick="closeMilestoneModal()" class="px-5 py-2.5 text-sage-500 hover:bg-sage-50 rounded-xl text-sm font-medium transition">Cancel</button>
                    <button type="submit" class="px-5 py-2.5 bg-sage-500 text-white rounded-xl hover:bg-sage-600 text-sm font-medium shadow-md transition">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const DB_NAME = 'MilestoneDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'projects';

        const dbService = {
            db: null,
            async open() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, DB_VERSION);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    };
                    req.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
                    req.onerror = (e) => reject(e.target.error);
                });
            },
            async getAllProjects() {
                return new Promise((resolve) => {
                    const tx = this.db.transaction([STORE_NAME], 'readonly');
                    tx.objectStore(STORE_NAME).getAll().onsuccess = (e) => resolve(e.target.result);
                });
            },
            async saveProject(project) {
                return new Promise((resolve) => {
                    const tx = this.db.transaction([STORE_NAME], 'readwrite');
                    tx.objectStore(STORE_NAME).put(project).onsuccess = (e) => resolve(e.target.result);
                });
            },
            async deleteProject(id) {
                return new Promise((resolve) => {
                    const tx = this.db.transaction([STORE_NAME], 'readwrite');
                    tx.objectStore(STORE_NAME).delete(id).onsuccess = () => resolve();
                });
            }
        };

        let projects = [];
        let activeProjectId = null;
        const projectListEl = document.getElementById('project-list');
        const searchInput = document.getElementById('project-search');

        (async function init() {
            await dbService.open();
            await loadProjects();
        })();

        async function loadProjects() {
            projects = await dbService.getAllProjects();
            renderProjectList(searchInput.value);
            if(activeProjectId) renderMainContent();
        }

        function renderProjectList(filter = '') {
            projectListEl.innerHTML = '';
            const filtered = projects.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            
            if (filtered.length === 0) {
                projectListEl.innerHTML = `<div class="text-center text-xs text-sage-400 py-6">No projects found.</div>`;
                return;
            }

            filtered.forEach(p => {
                const isActive = p.id === activeProjectId;
                const activeClass = isActive ? 'bg-sage-100 text-sage-700 border-sage-200' : 'text-sage-500 hover:bg-sage-50 hover:text-sage-600 border-transparent';
                const total = p.milestones.length;
                const done = p.milestones.filter(m => m.status === 'done').length;
                const percent = total === 0 ? 0 : Math.round((done / total) * 100);

                projectListEl.insertAdjacentHTML('beforeend', `
                    <div onclick="selectProject(${p.id})" class="cursor-pointer p-4 rounded-xl border mb-2 transition-all relative overflow-hidden ${activeClass}">
                        <div class="flex justify-between items-center mb-2 z-10 relative">
                            <span class="font-bold text-sm truncate">${p.name}</span>
                        </div>
                        <div class="flex justify-between text-[10px] uppercase font-bold opacity-70 z-10 relative">
                            <span>${done}/${total} Done</span><span>${percent}%</span>
                        </div>
                        <div class="absolute bottom-0 left-0 h-1 bg-sage-200/30 w-full">
                             <div class="bg-sage-500 h-full transition-all duration-500" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `);
            });
        }

        searchInput.addEventListener('input', (e) => renderProjectList(e.target.value));
        window.selectProject = (id) => { activeProjectId = id; renderProjectList(searchInput.value); renderMainContent(); };

        function renderMainContent() {
            const main = document.getElementById('main-content');
            const empty = document.getElementById('empty-state');
            const project = projects.find(p => p.id === activeProjectId);

            if (!project) {
                empty.classList.remove('hidden');
                main.classList.remove('flex');
                main.classList.add('hidden');
                return;
            }

            empty.classList.add('hidden');
            main.classList.remove('hidden');
            main.classList.add('flex');

            document.getElementById('current-project-title').innerText = project.name;
            document.getElementById('current-project-desc').innerText = project.desc || '';
            renderMilestones(project);
        }

        function renderMilestones(project) {
            const listEl = document.getElementById('milestone-list');
            listEl.innerHTML = '';

            const sorted = [...project.milestones].sort((a, b) => new Date(a.date) - new Date(b.date));
            const total = sorted.length;
            
            // 통계 업데이트
            const done = sorted.filter(m => m.status === 'done').length;
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-done').innerText = done;
            document.getElementById('stat-remain').innerText = total - done;

            // [FIX] 데이터가 없으면 'timeline-line' 클래스 제거 (선 숨김)
            if(total === 0) {
                listEl.classList.remove('timeline-line'); // 선 제거
                listEl.innerHTML = `
                    <div class="text-center py-20 border-2 border-dashed border-sage-200 rounded-2xl">
                        <p class="text-sage-400 font-medium">No milestones yet.</p>
                        <button onclick="openMilestoneModal()" class="text-sm text-sage-600 font-bold hover:underline mt-2">Add your first milestone</button>
                    </div>`;
                return;
            }

            // [FIX] 데이터가 있으면 'timeline-line' 클래스 추가 (선 표시)
            listEl.classList.add('timeline-line'); 

            sorted.forEach((item, idx) => {
                const st = {
                    'pending': { l: 'Pending', c: 'bg-slate-100 text-slate-500 ring-slate-200' },
                    'progress': { l: 'In Progress', c: 'bg-amber-50 text-amber-600 ring-amber-200' },
                    'done': { l: 'Done', c: 'bg-sage-100 text-sage-600 ring-sage-200' }
                }[item.status];

                listEl.insertAdjacentHTML('beforeend', `
                    <div class="relative pl-10 group" style="animation: fadeIn 0.5s ease-out ${idx * 50}ms forwards; opacity: 0;">
                        <div class="absolute left-[11px] top-6 w-[18px] h-[18px] bg-[#F8FAFC] border-[3px] ${item.status === 'done' ? 'border-sage-500' : 'border-sage-300'} rounded-full z-10 transition-colors group-hover:border-sage-500"></div>
                        <div class="bg-white p-6 rounded-2xl border border-sage-100 shadow-sm hover:shadow-md hover:-translate-y-1 transition-all flex flex-col md:flex-row justify-between gap-4 group-hover:border-sage-200">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[10px] font-bold text-sage-400 uppercase tracking-widest">${item.chapter}</span>
                                    <span class="w-1 h-1 rounded-full bg-sage-300"></span>
                                    <span class="text-xs text-sage-500 font-medium font-mono">${item.date}</span>
                                </div>
                                <h3 class="text-lg font-bold text-slate-800 ${item.status === 'done' ? 'line-through text-sage-400' : ''}">${item.title}</h3>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-wider ring-1 ring-inset ${st.c}">${st.l}</span>
                                <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                                    <button onclick="editMilestone(${item.id})" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-sage-50 text-sage-400 hover:text-sage-600"><i class="fas fa-pen text-xs"></i></button>
                                    <button onclick="deleteMilestone(${item.id})" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-red-50 text-sage-400 hover:text-red-500"><i class="fas fa-trash text-xs"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                `);
            });
            
            if(!document.getElementById('anim-style')) {
                const style = document.createElement('style');
                style.id = 'anim-style';
                style.innerHTML = `@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }`;
                document.head.appendChild(style);
            }
        }

        const pModal = document.getElementById('project-modal');
        const pForm = document.getElementById('project-form');
        const mModal = document.getElementById('milestone-modal');
        const mForm = document.getElementById('milestone-form');

        window.openProjectModal = () => { pForm.reset(); pModal.classList.remove('hidden'); };
        window.closeProjectModal = () => pModal.classList.add('hidden');
        window.closeMilestoneModal = () => mModal.classList.add('hidden');

        pForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newProject = { id: Date.now(), name: document.getElementById('p-name').value, desc: document.getElementById('p-desc').value, milestones: [] };
            await dbService.saveProject(newProject);
            await loadProjects();
            selectProject(newProject.id);
            closeProjectModal();
        });

        window.deleteCurrentProject = async () => {
            if(confirm('Delete project?')) {
                await dbService.deleteProject(activeProjectId);
                activeProjectId = null;
                await loadProjects();
            }
        };

        window.openMilestoneModal = (isEdit = false) => {
            if(!activeProjectId) return alert("Select a project first.");
            mModal.classList.remove('hidden');
            if(!isEdit) {
                mForm.reset();
                document.getElementById('m-edit-id').value = '';
                document.getElementById('m-modal-title').innerText = "Add Milestone";
                document.getElementById('m-date').valueAsDate = new Date();
            }
        };

        mForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const project = projects.find(p => p.id === activeProjectId);
            const mId = document.getElementById('m-edit-id').value;
            const newData = {
                id: mId ? parseInt(mId) : Date.now(),
                chapter: document.getElementById('m-chapter').value,
                title: document.getElementById('m-title').value,
                date: document.getElementById('m-date').value,
                status: document.getElementById('m-status').value
            };
            
            if(mId) {
                const idx = project.milestones.findIndex(m => m.id === parseInt(mId));
                project.milestones[idx] = newData;
            } else {
                project.milestones.push(newData);
            }
            
            await dbService.saveProject(project);
            await loadProjects();
            closeMilestoneModal();
        });

        window.editMilestone = (mId) => {
            const project = projects.find(p => p.id === activeProjectId);
            const item = project.milestones.find(m => m.id === mId);
            document.getElementById('m-edit-id').value = item.id;
            document.getElementById('m-chapter').value = item.chapter;
            document.getElementById('m-title').value = item.title;
            document.getElementById('m-date').value = item.date;
            document.getElementById('m-status').value = item.status;
            document.getElementById('m-modal-title').innerText = "Edit Milestone";
            openMilestoneModal(true);
        };

        window.deleteMilestone = async (mId) => {
            if(!confirm('Delete milestone?')) return;
            const project = projects.find(p => p.id === activeProjectId);
            project.milestones = project.milestones.filter(m => m.id !== mId);
            await dbService.saveProject(project);
            await loadProjects();
        };
    </script>
</body>
</html>
