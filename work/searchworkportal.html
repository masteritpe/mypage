<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>통합 문서 조회</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
/* === Modern SaaS Theme === */
:root {
    --bg-app: #f8fafc; --bg-panel: #ffffff; --border: #e2e8f0;
    --primary: #4f46e5; --primary-hover: #4338ca;
    --text-main: #0f172a; --text-sub: #64748b;
    --radius: 8px;
    --font-ui: 'Inter', 'Noto Sans KR', sans-serif;
    --font-code: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; outline: none; }
body { margin: 0; background: var(--bg-app); color: var(--text-main); font-family: var(--font-ui); font-size: 13px; min-height: 100vh; display: flex; flex-direction: column; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

/* Layout */
.container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; width: 100%; display: flex; flex-direction: column; gap: 24px; flex: 1; position: relative; }

/* Header & Tools */
.header-tools { position: absolute; top: 20px; right: 20px; }
.btn-icon { 
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); 
    background: #fff; color: var(--text-sub); cursor: pointer; font-size: 16px; transition: 0.2s; 
    display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { background: #f1f5f9; color: var(--primary); border-color: var(--primary); }

.search-header { text-align: center; margin-bottom: 20px; }
.brand-logo { font-size: 24px; font-weight: 800; color: var(--text-main); margin-bottom: 16px; display: inline-flex; align-items: center; gap: 12px; }
.brand-logo i { color: var(--primary); font-size: 28px; }

.search-box-wrapper { position: relative; max-width: 700px; margin: 0 auto; width: 100%; }
.search-input-lg { 
    width: 100%; height: 56px; padding: 0 24px 0 52px; 
    border: 2px solid var(--border); border-radius: 12px; 
    font-size: 16px; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}
.search-input-lg:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
.search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-sub); font-size: 18px; }

/* Filter Tags */
.filter-wrapper { display: flex; justify-content: center; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.filter-chip { 
    padding: 6px 12px; background: #fff; border: 1px solid var(--border); 
    border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--text-sub); 
    cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; user-select: none;
}
.filter-chip:hover { background: #f1f5f9; }
.filter-chip.active { background: #eef2ff; border-color: var(--primary); color: var(--primary); }

/* Results Area */
.results-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-top: 20px; }
.res-count { font-weight: 700; color: var(--text-main); }
.res-time { font-size: 11px; color: var(--text-sub); }
.result-list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }

/* Result Card */
.res-card { 
    background: #fff; padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); 
    cursor: pointer; transition: 0.2s; position: relative; overflow: hidden;
}
.res-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
.res-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.source-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.res-id { font-family: var(--font-code); font-size: 11px; color: var(--text-sub); background: #f1f5f9; padding: 2px 6px; border-radius: 4px; }
.res-title { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 6px; }
.res-snippet { font-size: 13px; color: var(--text-sub); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.highlight { background: #fef08a; color: #854d0e; padding: 0 2px; border-radius: 2px; font-weight: 600; }

/* Colors */
.src-blue { background: #eff6ff; color: #1d4ed8; }
.src-green { background: #f0fdf4; color: #15803d; }
.src-purple { background: #faf5ff; color: #7e22ce; }
.src-gray { background: #f1f5f9; color: #475569; }

/* Settings Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
.settings-box { background: #fff; width: 800px; padding: 24px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
.settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.settings-content { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; min-height: 350px; }

.config-col { display: flex; flex-direction: column; gap: 12px; }
.config-col-title { font-size: 12px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }

.source-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: #fff; transition: 0.2s; }
.source-item:hover { border-color: var(--primary); background: #f8fafc; }
.source-info { display: flex; flex-direction: column; gap: 2px; }
.source-name { font-weight: 600; font-size: 13px; color: var(--text-main); }
.source-desc { font-size: 11px; color: var(--text-sub); }

.btn-add { background: #eff6ff; color: var(--primary); border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
.btn-del { background: #fef2f2; color: #ef4444; border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }

/* Custom Form */
.custom-form { background: #f8fafc; border: 1px dashed var(--border); padding: 12px; border-radius: 8px; margin-top: 10px; display: none; }
.custom-form.open { display: block; }
.form-row { margin-bottom: 8px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; }
.form-input { width: 100%; height: 32px; border: 1px solid var(--border); border-radius: 4px; padding: 0 8px; font-size: 12px; }
.btn-submit { width: 100%; height: 32px; background: var(--text-main); color: #fff; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; margin-top: 8px; }

.empty-state { text-align: center; padding: 60px 0; color: var(--text-sub); }
.loader { display: none; text-align: center; padding: 20px; }
.loader i { animation: spin 1s linear infinite; font-size: 24px; color: var(--primary); }
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
    <div class="header-tools">
        <button class="btn-icon" id="btn-settings" title="검색 소스 설정"><i class="fas fa-cog"></i></button>
    </div>

    <div class="search-header">
        <div class="brand-logo"><i class="fas fa-search-location"></i> 통합 문서 조회</div>
    </div>

    <div class="search-box-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="main-search" class="search-input-lg" placeholder="검색어 입력..." autofocus>
    </div>

    <div class="filter-wrapper" id="source-filters"></div>

    <div id="results-area" style="display:none;">
        <div class="results-header">
            <span class="res-count">결과 <span id="res-count-num">0</span>건</span>
            <span class="res-time" id="search-time"></span>
        </div>
        <div class="result-list" id="result-list"></div>
    </div>
    
    <div id="loader" class="loader"><i class="fas fa-circle-notch"></i></div>
    
    <div id="empty-state" class="empty-state">
        <i class="fas fa-layer-group"></i>
        <p style="margin-top:16px;">검색어를 입력하거나<br>우측 상단 <b>설정(⚙️)</b>에서 검색 소스를 연결하세요.</p>
    </div>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="settings-box">
        <div class="settings-header">
            <h3><i class="fas fa-database"></i> 검색 소스 관리(IndexedDB)</h3>
            <button class="btn-icon" id="btn-close-settings" style="width:30px; height:30px; border:none;"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="settings-content">
            <div class="config-col">
                <div class="config-col-title">소스 추가</div>
                <div id="preset-list-container" style="display:flex; flex-direction:column; gap:8px;"></div>

                <div style="margin-top:12px; border-top:1px solid var(--border); padding-top:12px;">
                    <div id="btn-toggle-custom" style="cursor:pointer; font-size:12px; font-weight:600; color:var(--primary); display:flex; align-items:center; gap:6px;">
                        <i class="fas fa-plus-circle"></i> 목록에 없는 DB 직접 입력
                    </div>
                    <div id="custom-form" class="custom-form">
                        <div class="form-row"><label class="form-label">소스명</label><input type="text" id="cust-name" class="form-input" placeholder="예: 마케팅 자료"></div>
                        <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                            <div><label class="form-label">DB 이름</label><input type="text" id="cust-db" class="form-input" placeholder="ProjectDocDB"></div>
                            <div><label class="form-label">Store 이름</label><input type="text" id="cust-store" class="form-input" placeholder="doc_items"></div>
                        </div>
                        <div class="form-row"><label class="form-label">URL</label><input type="text" id="cust-url" class="form-input" placeholder="page.html"></div>
                        <div class="form-row"><label class="form-label">필드(콤마구분)</label><input type="text" id="cust-fields" class="form-input" value="title, content, summary, doc_id"></div>
                        <button type="button" id="btn-add-custom" class="btn-submit">추가하기</button>
                    </div>
                </div>
            </div>

            <div class="config-col" style="border-left:1px solid var(--border); padding-left:24px;">
                <div class="config-col-title">
                    현재 연결된 소스 <span id="active-count" style="background:var(--primary); color:#fff; padding:2px 6px; border-radius:10px; font-size:10px;">0</span>
                </div>
                <div id="active-list-container" style="display:flex; flex-direction:column; gap:8px;"></div>
                <div id="no-active-msg" style="text-align:center; color:var(--text-sub); font-size:12px; margin-top:20px; display:none;">
                    연결된 소스가 없습니다.
                </div>
            </div>
        </div>

        <div style="margin-top:20px; text-align:right; border-top:1px solid var(--border); padding-top:16px;">
             <button id="btn-finish-settings" style="background:var(--primary); color:#fff; font-size:13px; padding:10px 24px; border:none; border-radius:6px; font-weight:600; cursor:pointer;">
                설정 완료(닫기)
            </button>
        </div>
    </div>
</div>

<script>
// === 1. PRESETS ===
const PRESETS = [
    {
        id: "prj_docs", name: "프로젝트 문서관리", desc: "기본 문서 DB",
        config: { id: "prj_docs", name: "프로젝트 문서관리", dbName: "ProjectDocDB", storeName: "doc_items", pageUrl: "projectdocs.html", theme: "src-blue", fields: ["project_name", "doc_id", "summary", "description"] }
    },
    // [FIX] Project Q&A 프리셋 추가
    {
        id: "prj_qna", name: "Project Q&A", desc: "질의응답 DB",
        config: { id: "prj_qna", name: "Project Q&A", dbName: "ProjectQADB", storeName: "qa_items", pageUrl: "projectqna.html", theme: "src-purple", fields: ["question", "answer", "project", "vendor"] }
    }
];

// === 2. CONFIG DATABASE ENGINE (IndexedDB) ===
const CONFIG_DB = {
    DB_NAME: 'SearchPortalDB',
    STORE_NAME: 'search_sources',
    db: null,

    open: function() {
        return new Promise((resolve, reject) => {
            if (this.db) return resolve(this.db);
            const req = indexedDB.open(this.DB_NAME, 1);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(this.STORE_NAME)) {
                    db.createObjectStore(this.STORE_NAME, { keyPath: 'id' });
                }
            };
            req.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
            req.onerror = (e) => reject(e);
        });
    },
    getAll: function() {
        return new Promise(async (resolve) => {
            const db = await this.open();
            const tx = db.transaction(this.STORE_NAME, 'readonly');
            tx.objectStore(this.STORE_NAME).getAll().onsuccess = (e) => resolve(e.target.result || []);
        });
    },
    add: function(item) {
        return new Promise(async (resolve) => {
            const db = await this.open();
            const tx = db.transaction(this.STORE_NAME, 'readwrite');
            tx.objectStore(this.STORE_NAME).put(item);
            tx.oncomplete = () => resolve(true);
        });
    },
    delete: function(id) {
        return new Promise(async (resolve) => {
            const db = await this.open();
            const tx = db.transaction(this.STORE_NAME, 'readwrite');
            tx.objectStore(this.STORE_NAME).delete(id);
            tx.oncomplete = () => resolve(true);
        });
    }
};

let SEARCH_CONFIG = [];
let activeFilters = [];
const $ = s => document.querySelector(s);

// === Initialization ===
document.addEventListener('DOMContentLoaded', async () => {
    await loadConfig();
    bindEvents();
});

async function loadConfig() {
    SEARCH_CONFIG = await CONFIG_DB.getAll();
    
    // 초기 실행 시 DB가 비어있으면 기본 프리셋 자동 추가
    if (SEARCH_CONFIG.length === 0) {
        // 기본 2개 프리셋 자동 로드
        await CONFIG_DB.add(PRESETS[0].config);
        await CONFIG_DB.add(PRESETS[1].config);
        SEARCH_CONFIG = await CONFIG_DB.getAll();
    }
    renderFilters();
}

// === Settings UI ===
function renderSettingsUI() {
    const presetContainer = $('#preset-list-container');
    const activeContainer = $('#active-list-container');
    const noMsg = $('#no-active-msg');
    
    presetContainer.innerHTML = '';
    activeContainer.innerHTML = '';

    // Render Presets
    PRESETS.forEach(preset => {
        const isAdded = SEARCH_CONFIG.some(c => c.id === preset.id || (c.dbName === preset.config.dbName && c.storeName === preset.config.storeName));
        const div = document.createElement('div');
        div.className = 'source-item';
        div.style.opacity = isAdded ? '0.6' : '1';
        div.innerHTML = `
            <div class="source-info"><span class="source-name">${preset.name}</span><span class="source-desc">${preset.desc}</span></div>
            <button class="btn-add" ${isAdded ? 'disabled style="background:transparent; color:#94a3b8; cursor:default;"' : ''}>${isAdded ? '<i class="fas fa-check"></i>' : '<i class="fas fa-plus"></i> 추가'}</button>
        `;
        if(!isAdded) div.querySelector('button').onclick = async () => addSource(JSON.parse(JSON.stringify(preset.config)));
        presetContainer.appendChild(div);
    });

    // Render Active List
    $('#active-count').textContent = SEARCH_CONFIG.length;
    if(SEARCH_CONFIG.length === 0) noMsg.style.display = 'block';
    else {
        noMsg.style.display = 'none';
        SEARCH_CONFIG.forEach((conf) => {
            const div = document.createElement('div');
            div.className = 'source-item';
            div.innerHTML = `
                <div class="source-info"><span class="source-name">${conf.name}</span><span class="source-desc">DB: ${conf.dbName} / Store: ${conf.storeName}</span></div>
                <button class="btn-del"><i class="fas fa-trash"></i></button>
            `;
            div.querySelector('button').onclick = () => removeSource(conf.id);
            activeContainer.appendChild(div);
        });
    }
}

async function addSource(configObj) {
    await CONFIG_DB.add(configObj);
    SEARCH_CONFIG = await CONFIG_DB.getAll(); // Reload fresh
    renderSettingsUI();
    renderFilters();
}

async function removeSource(id) {
    await CONFIG_DB.delete(id);
    SEARCH_CONFIG = await CONFIG_DB.getAll(); // Reload fresh
    renderSettingsUI();
    renderFilters();
}

// === Events ===
function bindEvents() {
    let debounce;
    $('#main-search').addEventListener('input', (e) => {
        clearTimeout(debounce);
        debounce = setTimeout(() => performSearch(e.target.value), 300);
    });

    $('#btn-settings').onclick = () => { renderSettingsUI(); $('#settings-modal').style.display = 'flex'; $('#custom-form').classList.remove('open'); };
    $('#btn-close-settings').onclick = $('#btn-finish-settings').onclick = () => {
        $('#settings-modal').style.display = 'none';
        if($('#main-search').value) performSearch($('#main-search').value);
    };
    $('#btn-toggle-custom').onclick = () => $('#custom-form').classList.toggle('open');

    $('#btn-add-custom').onclick = async () => {
        const name = $('#cust-name').value.trim();
        const dbName = $('#cust-db').value.trim();
        const storeName = $('#cust-store').value.trim();
        const pageUrl = $('#cust-url').value.trim();
        const fieldsStr = $('#cust-fields').value.trim();
        if(!name || !dbName || !storeName) return alert('이름, DB명, Store명은 필수입니다.');

        const newConfig = {
            id: 'custom_' + Date.now(),
            name: name, dbName: dbName, storeName: storeName,
            pageUrl: pageUrl || '#', theme: 'src-gray',
            fields: fieldsStr ? fieldsStr.split(',').map(s=>s.trim()) : ['title', 'content']
        };
        await addSource(newConfig);
        
        $('#cust-name').value = ''; $('#cust-db').value = ''; $('#cust-store').value = '';
        $('#custom-form').classList.remove('open');
    };
}

function renderFilters() {
    const wrapper = $('#source-filters');
    wrapper.innerHTML = '';
    SEARCH_CONFIG.forEach(conf => {
        const btn = document.createElement('div');
        btn.className = `filter-chip ${activeFilters.includes(conf.id) ? 'active' : ''}`;
        btn.innerHTML = `<i class="fas fa-database"></i> ${conf.name}`;
        btn.onclick = () => toggleFilter(btn, conf.id);
        wrapper.appendChild(btn);
    });
}

function toggleFilter(el, id) {
    el.classList.toggle('active');
    activeFilters.includes(id) ? activeFilters = activeFilters.filter(x => x !== id) : activeFilters.push(id);
    if($('#main-search').value) performSearch($('#main-search').value);
}

// === Search Logic ===
function stripHtml(html) { const tmp = document.createElement("DIV"); tmp.innerHTML = html; return tmp.textContent || tmp.innerText || ""; }
function highlightText(text, query) { if(!query) return text; try { const r = new RegExp(`(${query})`, 'gi'); return text.replace(r, '<span class="highlight">$1</span>'); } catch(e){return text;} }

function fetchFromDB(config) {
    return new Promise((resolve) => {
        const req = indexedDB.open(config.dbName);
        req.onerror = () => resolve([]); 
        req.onsuccess = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(config.storeName)) { db.close(); return resolve([]); }
            const tx = db.transaction(config.storeName, 'readonly');
            tx.objectStore(config.storeName).getAll().onsuccess = (res) => {
                const results = (res.target.result || []).map(item => ({...item, _source: config}));
                db.close(); resolve(results);
            };
        };
    });
}

async function performSearch(query) {
    const q = query.trim().toLowerCase();
    if(!q) { $('#results-area').style.display = 'none'; $('#empty-state').style.display = 'block'; $('#loader').style.display = 'none'; return; }

    $('#empty-state').style.display = 'none'; $('#loader').style.display = 'block'; $('#result-list').innerHTML = '';
    
    const startTime = performance.now();
    const targets = activeFilters.length > 0 ? SEARCH_CONFIG.filter(c => activeFilters.includes(c.id)) : SEARCH_CONFIG;
    
    if(targets.length === 0) {
         $('#result-list').innerHTML = `<div style="text-align:center; padding:30px; color:var(--text-sub);">검색 소스가 없습니다. 설정을 확인하세요.</div>`;
         $('#loader').style.display = 'none'; $('#results-area').style.display = 'block'; return;
    }

    const flatData = (await Promise.all(targets.map(fetchFromDB))).flat();
    const matched = flatData.filter(item => {
        const conf = item._source;
        return conf.fields.some(field => {
            const val = item[field];
            if(!val) return false;
            const textVal = (typeof val === 'string' && val.includes('<')) ? stripHtml(val) : String(val);
            return textVal.toLowerCase().includes(q);
        });
    });

    renderResults(matched, q);
    $('#search-time').textContent = `${((performance.now() - startTime)/1000).toFixed(2)}s`;
    $('#loader').style.display = 'none'; $('#results-area').style.display = 'block';
}

function renderResults(items, query) {
    const list = $('#result-list');
    $('#res-count-num').textContent = items.length;
    if(items.length === 0) { list.innerHTML = `<div style="text-align:center; padding:30px; color:var(--text-sub);">검색 결과가 없습니다.</div>`; return; }

    items.forEach(item => {
        const conf = item._source;
        // [FIX] Q&A 등 다른 필드명(question, answer)도 제목/내용으로 매핑되도록 추가
        let title = item.question || item.summary || item.title || item.name || '제목 없음';
        let desc = stripHtml(item.answer || item.description || item.content || item.desc || '');
        let idVal = item.doc_id || item.id || '';
        
        const idx = desc.toLowerCase().indexOf(query.toLowerCase());
        desc = idx > -1 ? (idx>30 ? '...' : '') + desc.substring(Math.max(0, idx-30), idx+120) + '...' : desc.substring(0, 120) + '...';

        const card = document.createElement('div'); card.className = 'res-card';
        const paramId = item.uid || item.id || item.doc_id;
        card.onclick = () => { window.open(`${conf.pageUrl}${paramId ? '?uid='+paramId : ''}`, '_blank'); };
        
        card.innerHTML = `
            <div class="res-meta"><span class="source-badge ${conf.theme}">${conf.name}</span>${idVal ? `<span class="res-id">${highlightText(idVal, query)}</span>` : ''}</div>
            <div class="res-title">${highlightText(title, query)}</div><div class="res-snippet">${highlightText(desc, query)}</div>
        `;
        list.appendChild(card);
    });
}
</script>
</body>
</html>
