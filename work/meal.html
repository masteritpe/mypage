<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>식대 관리 노트</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    :root {
      --bg-body: #F9FAFB;
      --bg-surface: #FFFFFF;
      --bg-sidebar: #F3F4F6;
      --border-light: #F3F4F6;
      --border-base: #E5E7EB;
      --border-dark: #D1D5DB;
      --text-main: #111827;
      --text-muted: #6B7280;
      --primary: #111827;
      --primary-hover: #374151;
      --secondary: #FFFFFF;
      --secondary-hover: #F9FAFB;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-body); color: var(--text-main); margin: 0; padding: 0;
      -webkit-font-smoothing: antialiased; height: 100vh; display: flex; overflow: hidden;
    }

    /* 사이드바 */
    .sidebar { width: 280px; background: var(--bg-surface); border-right: 1px solid var(--border-base); display: flex; flex-direction: column; z-index: 10; }
    .sidebar-header { height: 64px; min-height: 64px; padding: 0 20px; border-bottom: 1px solid var(--border-base); display: flex; align-items: center; justify-content: space-between;}
    .app-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin: 0; }
    
    /* 리스트 영역 */
    .month-list { flex: 1; overflow-y: auto; padding: 10px; margin: 0; list-style: none; }
    .month-item { padding: 12px 14px; border-radius: var(--radius-md); cursor: pointer; margin-bottom: 4px; transition: background 0.2s; display: flex; justify-content: space-between; align-items: center; }
    .month-item:hover { background: var(--bg-sidebar); }
    .month-item.active { background: var(--primary); color: white; }
    .month-item.active .month-amount { color: #D1D5DB; }
    .month-title { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px;}
    .month-amount { font-size: 13px; color: var(--text-muted); font-weight: 500; }

    /* 메인 콘텐츠 */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: var(--bg-body); position: relative; }
    
    /* 탑바 */
    .top-bar { 
      position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); 
      height: 64px; min-height: 64px; padding: 0 30px; border-bottom: 1px solid var(--border-base); 
      display: flex; justify-content: space-between; align-items: center; z-index: 5; 
    }
    .month-display { font-size: 20px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
    .total-display { font-size: 22px; font-weight: 800; color: var(--primary); }
    .actions { display: flex; gap: 16px; align-items: center; }
    
    /* 요약 그룹 - 수직 중앙 정렬 반영 */
    .summary-group { display: flex; gap: 16px; font-size: 14px; font-weight: 600; color: var(--text-muted); align-items: center; }
    .summary-item { display: flex; align-items: center; gap: 4px; }
    .summary-item span { color: var(--text-main); font-weight: 700; }
    
    /* 버튼, 인풋 */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; border: 1px solid transparent; outline: none; }
    .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-outline { background: var(--secondary); color: var(--text-main); border-color: var(--border-base); }
    .btn-outline:hover { background: var(--secondary-hover); border-color: #D1D5DB; }
    .btn-danger { color: #DC2626; background: transparent; padding: 4px; font-size: 18px; }
    .btn-danger:hover { background: #FEE2E2; border-radius: 4px; }

    .input-box { width: 100%; padding: 10px 12px; border-radius: var(--radius-md); border: 1px solid var(--border-base); font-size: 14px; background: var(--bg-surface); outline: none; transition: border-color 0.2s; font-family: inherit; }
    .input-box:focus { border-color: var(--primary); }

    /* 폼 영역 */
    .form-wrapper { padding: 30px 40px; max-width: 900px; margin: 0 auto; width: 100%; }
    .card { background: var(--bg-surface); border: 1px solid var(--border-base); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow-md); }
    
    .card-title { font-size: 16px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; margin-bottom: 16px; margin-top: 0; }
    
    /* 입력 폼 그리드 */
    .input-grid { display: grid; grid-template-columns: 1fr 1.5fr 2fr 3fr auto; gap: 12px; align-items: center; }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); }

    /* 데이터 테이블 */
    .data-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
    .data-table th { padding: 12px; background: var(--bg-sidebar); color: var(--text-muted); font-weight: 600; border-bottom: 2px solid var(--border-base); }
    .data-table td { padding: 14px 12px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
    .data-table tr:hover td { background: var(--secondary-hover); }
    .data-table tr:last-child td { border-bottom: none; }
    .amount-cell { font-weight: 600; color: var(--text-main); }
    
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 15px; }
    .empty-state i { font-size: 48px; color: var(--border-dark); margin-bottom: 12px; }
    
    /* 뱃지 디자인 */
    .type-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .type-general { background: #E5E7EB; color: #374151; }
    .type-ticket { background: #DBEAFE; color: #1D4ED8; }

  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="app-title"><i class="ph-fill ph-wallet"></i> 식대 관리</div>
      <button class="btn btn-outline" style="padding: 4px 8px;" onclick="setMonthToCurrent()" title="이번 달로 이동">
        <i class="ph-bold ph-calendar-blank"></i>
      </button>
    </div>
    <ul class="month-list" id="monthList">
      </ul>
  </aside>

  <main class="main-content">
    <div class="top-bar">
      <div class="month-display" id="topMonthDisplay">
        <i class="ph-fill ph-calendar-check"></i> <span>2026년 5월 정산</span>
      </div>
      <div class="actions">
        <div class="summary-group">
          <div class="summary-item">일반:<span id="topGeneralAmount">0원</span></div>
          <div class="summary-item">식권:<span id="topTicketAmount">0원</span></div>
          <div class="summary-item" style="border-left: 1px solid var(--border-dark); padding-left: 16px;">
            월 총 식대:<span class="total-display" id="topTotalAmount">0원</span>
          </div>
        </div>
        <button class="btn btn-outline" onclick="exportCSV()"><i class="ph ph-download-simple"></i> CSV 다운로드</button>
      </div>
    </div>

    <div class="form-wrapper">
      
      <div class="card">
        <h3 class="card-title"><i class="ph-fill ph-plus-circle"></i> 식대 입력</h3>
        <div class="input-grid">
          <div class="input-group">
            <label>유형</label>
            <select id="inputType" class="input-box">
              <option value="일반">일반</option>
              <option value="식권">식권</option>
            </select>
          </div>
          <div class="input-group">
            <label>일자</label>
            <input type="date" id="inputDate" class="input-box">
          </div>
          <div class="input-group">
            <label>비용 (원)</label>
            <input type="number" id="inputAmount" class="input-box" placeholder="예: 8500" onkeypress="if(event.key==='Enter') addExpense()">
          </div>
          <div class="input-group">
            <label>내용 / 비고 (선택)</label>
            <input type="text" id="inputMemo" class="input-box" placeholder="예: 구내식당 중식" onkeypress="if(event.key==='Enter') addExpense()">
          </div>
          <div class="input-group" style="justify-content: flex-end; height: 100%;">
            <button class="btn btn-primary" style="height: 42px;" onclick="addExpense()">등록</button>
          </div>
        </div>
      </div>

      <div class="card" style="padding: 0; overflow: hidden;">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width: 15%;">일자</th>
              <th style="width: 15%;">유형</th>
              <th style="width: 35%;">내용</th>
              <th style="width: 25%;">금액</th>
              <th style="width: 10%; text-align: center;">삭제</th>
            </tr>
          </thead>
          <tbody id="expenseTableBody">
            </tbody>
        </table>
      </div>

    </div>
  </main>

  <script>
    let db;
    let currentSelectMonth = '';

    const formatMoney = (num) => new Intl.NumberFormat('ko-KR').format(num) + '원';

    const initDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('MealTrackerDB', 1);
        request.onupgradeneeded = (e) => {
          const database = e.target.result;
          if (!database.objectStoreNames.contains('expenses')) {
            const store = database.createObjectStore('expenses', { keyPath: 'id' });
            store.createIndex('month', 'month', { unique: false });
            store.createIndex('date', 'date', { unique: false });
          }
        };
        request.onsuccess = (e) => { db = e.target.result; resolve(); };
        request.onerror = (e) => reject('DB Error');
      });
    };

    const setMonthToCurrent = () => {
      const today = new Date();
      currentSelectMonth = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
      document.getElementById('inputDate').value = today.toISOString().split('T')[0];
      loadSidebarAndMain();
    };

    const addExpense = () => {
      const typeVal = document.getElementById('inputType').value;
      const dateVal = document.getElementById('inputDate').value;
      const amountVal = document.getElementById('inputAmount').value;
      const memoVal = document.getElementById('inputMemo').value;

      if (!dateVal || !amountVal) {
        alert('일자와 비용을 모두 입력해주세요.');
        return;
      }

      const expense = {
        id: Date.now().toString(),
        type: typeVal,
        date: dateVal,
        month: dateVal.substring(0, 7),
        amount: parseInt(amountVal),
        memo: memoVal || '-'
      };

      const transaction = db.transaction(['expenses'], 'readwrite');
      transaction.objectStore('expenses').put(expense);
      
      transaction.oncomplete = () => {
        document.getElementById('inputAmount').value = '';
        document.getElementById('inputMemo').value = '';
        document.getElementById('inputAmount').focus();
        
        currentSelectMonth = expense.month;
        loadSidebarAndMain();
      };
    };

    const deleteExpense = (id) => {
      if(!confirm('해당 내역을 삭제하시겠습니까?')) return;
      
      const transaction = db.transaction(['expenses'], 'readwrite');
      transaction.objectStore('expenses').delete(id);
      transaction.oncomplete = () => loadSidebarAndMain();
    };

    const loadSidebarAndMain = () => {
      const transaction = db.transaction(['expenses'], 'readonly');
      const store = transaction.objectStore('expenses');
      const request = store.getAll();

      request.onsuccess = () => {
        const allData = request.result;
        
        const monthGroups = {};
        allData.forEach(item => {
          if(!monthGroups[item.month]) monthGroups[item.month] = 0;
          monthGroups[item.month] += item.amount;
        });

        const sortedMonths = Object.keys(monthGroups).sort((a, b) => b.localeCompare(a));
        const monthListEl = document.getElementById('monthList');
        monthListEl.innerHTML = '';

        if(sortedMonths.length === 0) {
           monthListEl.innerHTML = '<li style="padding: 20px; text-align:center; color:#9CA3AF; font-size:13px;">저장된 내역이 없습니다.</li>';
           if(!currentSelectMonth) setMonthToCurrent();
        }

        sortedMonths.forEach(mStr => {
          const [year, month] = mStr.split('-');
          const li = document.createElement('li');
          li.className = `month-item ${mStr === currentSelectMonth ? 'active' : ''}`;
          li.innerHTML = `
            <span class="month-title"><i class="ph-fill ph-calendar"></i> ${year}년 ${month}월</span>
            <span class="month-amount">${formatMoney(monthGroups[mStr])}</span>
          `;
          li.onclick = () => {
            currentSelectMonth = mStr;
            loadSidebarAndMain();
          };
          monthListEl.appendChild(li);
        });

        const tbody = document.getElementById('expenseTableBody');
        tbody.innerHTML = '';
        
        const currentMonthData = allData
          .filter(item => item.month === currentSelectMonth)
          .sort((a, b) => a.date.localeCompare(b.date));

        let monthTotal = 0;
        let generalTotal = 0;
        let ticketTotal = 0;

        if (currentMonthData.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><i class="ph-fill ph-receipt"></i><br>이 달의 식대 내역이 없습니다.</div></td></tr>`;
        } else {
          currentMonthData.forEach(item => {
            monthTotal += item.amount;
            
            // 타입이 예전 데이터라 없을 경우 '일반'으로 간주
            const itemType = item.type || '일반';
            
            if(itemType === '식권') {
                ticketTotal += item.amount;
            } else {
                generalTotal += item.amount;
            }

            const badgeClass = itemType === '식권' ? 'type-ticket' : 'type-general';

            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${item.date}</td>
              <td><span class="type-badge ${badgeClass}">${itemType}</span></td>
              <td>${item.memo}</td>
              <td class="amount-cell">${formatMoney(item.amount)}</td>
              <td style="text-align: center;">
                <button class="btn btn-danger" onclick="deleteExpense('${item.id}')" title="삭제"><i class="ph ph-x"></i></button>
              </td>
            `;
            tbody.appendChild(tr);
          });
        }

        if(currentSelectMonth) {
            const [y, m] = currentSelectMonth.split('-');
            document.getElementById('topMonthDisplay').innerHTML = `<i class="ph-fill ph-calendar-check"></i> <span>${y}년 ${m}월 정산</span>`;
        }
        
        document.getElementById('topGeneralAmount').innerText = formatMoney(generalTotal);
        document.getElementById('topTicketAmount').innerText = formatMoney(ticketTotal);
        document.getElementById('topTotalAmount').innerText = formatMoney(monthTotal);
      };
    };

    const exportCSV = () => {
      const transaction = db.transaction(['expenses'], 'readonly');
      const store = transaction.objectStore('expenses');
      const request = store.getAll();

      request.onsuccess = () => {
        const targetData = request.result
            .filter(item => item.month === currentSelectMonth)
            .sort((a, b) => a.date.localeCompare(b.date));
        
        if(targetData.length === 0) {
            alert('다운로드할 데이터가 없습니다.'); return;
        }

        let csvContent = "\uFEFF일자,유형,내용,금액(원)\n";
        targetData.forEach(row => {
          const type = row.type || '일반';
          csvContent += `${row.date},${type},${row.memo.replace(/,/g, '')},${row.amount}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `식대내역_${currentSelectMonth}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };
    };

    window.onload = async () => {
      await initDB();
      setMonthToCurrent();
    };

  </script>
</body>
</html>
