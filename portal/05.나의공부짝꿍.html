<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>✏️ 나의 공부 짝꿍</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    /* --- 학습 플랫폼 테마 (파스텔 민트 & 노트 스타일) --- */
    :root {
        /* 컬러 팔레트 */
        --bg-color: #f0f7f4;       /* 연한 민트색 배경 */
        --sidebar-bg: #ffffff;     /* 사이드바 흰색 */
        --header-bg: #ffffff;
        
        /* 포인트 컬러 */
        --primary: #20c997;        /* 메인 민트 */
        --primary-dark: #12b886;
        --accent: #ffd43b;         /* 노란색 강조 */
        --text-main: #495057;
        --text-sub: #868e96;
        
        --sidebar-width: 260px;
        --header-height: 70px;
        --font-title: 'Jua', sans-serif;
        --font-body: 'Noto Sans KR', sans-serif;
        --border-radius: 15px;
    }

    * { box-sizing: border-box; }
    
    body { 
        margin: 0; 
        font-family: var(--font-body); 
        background-color: var(--bg-color);
        color: var(--text-main); 
        font-size: 14px; 
        height: 100vh; 
        overflow: hidden; 
        /* 모눈종이 패턴 */
        background-image: 
            linear-gradient(#e6fcf5 1px, transparent 1px),
            linear-gradient(90deg, #e6fcf5 1px, transparent 1px);
        background-size: 20px 20px;
    }

    /* Layout */
    .app { display: flex; flex-direction: column; height: 100%; }
    
    /* Header */
    header { 
        background: var(--header-bg); 
        border-bottom: 3px solid var(--primary); 
        padding: 0 25px; 
        height: var(--header-height); 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        flex-shrink: 0; 
        z-index: 100; 
        box-shadow: 0 2px 10px rgba(32, 201, 151, 0.1);
    }
    
    h1 { 
        font-family: var(--font-title);
        font-size: 24px; 
        margin: 0; 
        color: var(--text-main); 
        display: flex; 
        align-items: center; 
        gap: 10px; 
    }
    .logo-icon { color: var(--primary); font-size: 28px; }

    /* Main Area */
    main { flex: 1; display: flex; overflow: hidden; padding: 20px; gap: 20px; }
    
    /* Sidebar */
    aside { 
        width: var(--sidebar-width); 
        background: var(--sidebar-bg); 
        border-radius: var(--border-radius);
        display: flex; 
        flex-direction: column; 
        padding: 20px; 
        gap: 20px; 
        flex-shrink: 0; 
        overflow-y: auto; 
        border: 1px solid #e9ecef;
        box-shadow: 0 5px 15px rgba(0,0,0,0.03);
    }

    /* 카테고리 패널 */
    .panel { margin-bottom: 5px; }
    .panel-title { 
        font-family: var(--font-title);
        color: var(--primary);
        font-size: 15px; 
        margin-bottom: 10px; 
        display: flex; align-items: center; gap: 6px;
        padding-left: 5px;
    }
    
    .nav-menu { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
    
    /* 메뉴 아이템 스타일 */
    .nav-item { 
        padding: 12px 15px; 
        border-radius: 10px; 
        cursor: pointer; 
        font-weight: 500; 
        color: var(--text-main); 
        display: flex; 
        align-items: center; 
        gap: 10px; 
        transition: all 0.2s;
        background: #f8f9fa;
        border: 1px solid transparent;
    }
    
    .nav-item:hover { 
        background: #e6fcf5; 
        color: var(--primary-dark);
        transform: translateX(3px);
    }
    
    .nav-item.active { 
        background: var(--primary); 
        color: #fff; 
        font-weight: 700; 
        box-shadow: 0 4px 6px rgba(32, 201, 151, 0.3);
    }
    
    .nav-icon { font-size: 16px; }

    /* Content Area */
    .content { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        overflow: hidden; 
        background: #fff; 
        border-radius: var(--border-radius);
        box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        border: 1px solid #e9ecef;
    }
    
    /* Toolbar */
    .toolbar { 
        display: flex; 
        gap: 10px; 
        align-items: center; 
        background: #fff; 
        padding: 15px 25px; 
        border-bottom: 1px solid #f1f3f5; 
        height: 60px; 
        flex-shrink: 0; 
    }
    
    .page-title { 
        font-family: var(--font-title);
        font-size: 18px; 
        color: var(--text-main); 
        display: flex; 
        align-items: center; 
        gap: 8px; 
    }
    
    /* Iframe */
    .iframe-container { flex: 1; width: 100%; height: 100%; border: none; background: #fff; }
    
    /* Buttons */
    .btn { 
        padding: 0 14px; 
        height: 32px; 
        border-radius: 8px; 
        border: none; 
        background: #f1f3f5; 
        color: var(--text-main); 
        font-family: var(--font-title);
        font-size: 13px; 
        cursor: pointer; 
        display: inline-flex; 
        align-items: center; 
        justify-content: center; 
        gap: 5px; 
        transition: 0.2s;
    }
    .btn:hover { background: #e9ecef; }
    
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    
    /* Toast (알림) */
    .toast { 
        position: fixed; 
        bottom: 30px; 
        right: 30px; 
        background: #fff; 
        border-left: 5px solid var(--accent);
        color: var(--text-main); 
        padding: 15px 25px; 
        border-radius: 8px; 
        font-family: var(--font-title);
        font-size: 15px; 
        opacity: 0; 
        pointer-events: none; 
        transition: all 0.3s; 
        z-index: 9999; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        display: flex;
        align-items: center;
        gap: 10px;
        transform: translateY(20px);
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ced4da; border-radius: 3px; }

    @media (max-width: 768px) {
        main { padding: 0; }
        aside { position: absolute; left: 0; top: var(--header-height); bottom: 0; z-index: 1000; border-radius: 0; display: none; width: 100%; }
        aside.mobile-open { display: flex; }
        .content { border-radius: 0; border: none; }
        .mobile-menu-btn { display: block !important; }
        .panel-title { font-size: 18px; margin-top: 10px; }
        .nav-item { padding: 15px; font-size: 16px; }
    }
    .mobile-menu-btn { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--primary); margin-right: 10px; }
</style>
</head>
<body>

<div class="app">
    <header>
        <div style="display:flex; align-items:center;">
            <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
            <h1>
                <span class="logo-icon">✏️</span> 
                나의 공부 짝꿍
            </h1>
        </div>
        <div style="font-size:12px; color:#888; font-weight:500;">
            Study Portal v1.0
        </div>
    </header>

    <main>
        <aside id="sidebar">
            </aside>

        <div class="content">
            <div class="toolbar">
                <span class="page-title" id="current-page-title">👋 환영합니다!</span>
                <span style="flex:1"></span>
                <button class="btn" onclick="refreshIframe()">
                    🔄 새로고침
                </button>
                <button class="btn" onclick="openNewWindow()">
                    🔗 새창열기
                </button>
                <button class="btn btn-primary" onclick="toggleFullscreen()">
                    ⛶ 전체화면
                </button>
            </div>
            <iframe id="main-iframe" class="iframe-container" src="about:blank"></iframe>
        </div>
    </main>
</div>

<div class="toast" id="toast">
    <span>알림 메시지</span>
</div>

<script>
/* [학습 플랫폼 메뉴 데이터] */
const menuData = {
    "🛠️ 나의 학습 도구": [
        { title: "암기짝꿍", src: "school/studycard.html", icon: "📇" }, 
        { title: "시험 D-Day 계산기", src: "about:blank", icon: "📅" },
        { title: "오늘의 할 일 (To-Do)", src: "about:blank", icon: "✅" }
    ],
    "📚 과목별 자료실": [
        { title: "국어 정리 노트", src: "about:blank", icon: "📖" },
        { title: "영어 단어장", src: "about:blank", icon: "🅰️" },
        { title: "수학 오답 노트", src: "about:blank", icon: "📐" },
        { title: "역사/사회 요약", src: "about:blank", icon: "🌏" }
    ],
    "🔗 즐겨찾기": [
        { title: "EBS 중학", src: "https://mid.ebs.co.kr", icon: "📺" },
        { title: "네이버 사전", src: "https://dict.naver.com", icon: "🔍" }
    ]
};

// 현재 활성화된 URL 저장
let currentSrc = "";

window.onload = function() {
    renderSidebar();
    
    // 첫 번째 메뉴 자동 로드
    const firstGroup = Object.keys(menuData)[0];
    const firstItem = menuData[firstGroup][0];
    
    loadPage(firstItem.src, firstItem.title, firstItem.icon, 'nav-0-0');
    
    showToast("오늘도 힘내서 공부해볼까요? 파이팅! 🔥");
};

// 사이드바 렌더링
function renderSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = '';
    
    let groupIndex = 0;
    for (const [category, items] of Object.entries(menuData)) {
        const panel = document.createElement('div');
        panel.className = 'panel';
        
        const title = document.createElement('div');
        title.className = 'panel-title';
        title.innerText = category;
        panel.appendChild(title);
        
        const ul = document.createElement('ul');
        ul.className = 'nav-menu';
        
        items.forEach((item, itemIndex) => {
            const li = document.createElement('li');
            li.className = 'nav-item';
            li.id = `nav-${groupIndex}-${itemIndex}`;
            
            li.onclick = () => {
                if (item.src.startsWith("http")) {
                    window.open(item.src, '_blank'); 
                    showToast(`'${item.title}' 페이지를 열었어요! 🚀`);
                } else {
                    loadPage(item.src, item.title, item.icon, li.id); 
                }
            };
            
            li.innerHTML = `
                <span class="nav-icon">${item.icon}</span>
                <span>${item.title}</span>
            `;
            ul.appendChild(li);
        });
        
        panel.appendChild(ul);
        sidebar.appendChild(panel);
        groupIndex++;
    }
}

// 페이지 로드 (아이프레임)
function loadPage(src, title, icon, navId) {
    const iframe = document.getElementById('main-iframe');
    const titleEl = document.getElementById('current-page-title');

    iframe.src = src;
    currentSrc = src;
    
    titleEl.innerHTML = `<span style="color:#20c997; margin-right:5px;">${icon}</span> ${title}`;
    
    // 메뉴 활성화 표시
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const activeNav = document.getElementById(navId);
    if(activeNav) activeNav.classList.add('active');

    // 모바일에서 메뉴 닫기
    if(window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('mobile-open');
    }
}

// [추가] 새 창 열기 기능
function openNewWindow() {
    if (!currentSrc || currentSrc === "about:blank") {
        showToast("열 수 있는 페이지가 없어요 😅");
        return;
    }
    window.open(currentSrc, '_blank');
    showToast("새 창에서 페이지를 열었습니다! 📂");
}

function refreshIframe() {
    const iframe = document.getElementById('main-iframe');
    iframe.src = iframe.src;
    showToast("화면을 새로고침 했어요! 🔄");
}

function toggleFullscreen() {
    const el = document.documentElement;
    if (!document.fullscreenElement) {
        if(el.requestFullscreen) el.requestFullscreen();
    } else {
        if(document.exitFullscreen) document.exitFullscreen();
    }
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('mobile-open');
}

function showToast(message) {
    const toast = document.getElementById("toast");
    toast.querySelector('span').textContent = message;
    
    toast.classList.remove("show");
    void toast.offsetWidth; 
    toast.classList.add("show");
    
    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}
</script>

</body>
</html>
