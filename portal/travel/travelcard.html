<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1, viewport-fit=cover">
<title>Travel Card</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --primary: #00bfa5;
        --primary-light: #e0f2f1;
        --bg: #f8f9fa;
        --card-bg: #ffffff;
        --text-main: #212529;
        --text-sub: #868e96;
        --border: #f1f3f5;
        --shadow: 0 4px 12px rgba(0,0,0,0.06);
        --danger: #ef4444;
        /* iOS Safe Area */
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: "Pretendard", sans-serif; }
    
    body { 
        margin: 0; background: var(--bg); color: var(--text-main); 
        height: 100vh; height: 100dvh; /* iOS 주소창 대응 */
        display: flex; flex-direction: column; overflow: hidden; 
    }

    /* Header */
    header { 
        background: var(--card-bg); 
        padding: var(--sat) 16px 0 16px; 
        height: calc(60px + var(--sat)); 
        display: flex; justify-content: space-between; align-items: center; 
        border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 50; 
    }
    .logo { font-weight: 800; font-size: 1.2rem; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
    .logo i { color: var(--primary); }
    
    .header-actions { display: flex; gap: 8px; }
    
    /* Unified Button Style */
    .icon-btn { 
        width: 40px; height: 40px; border-radius: 10px; 
        border: 1px solid var(--border); background: white;
        color: var(--text-main); font-size: 1.1rem; cursor: pointer; 
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: 0.2s;
    }
    .icon-btn:active { background: #f1f3f5; transform: scale(0.95); }
    .icon-btn i { color: #495057; }

    /* Danger Button (Reset) */
    .btn-danger { color: var(--danger) !important; border-color: #fecaca; }
    .btn-danger i { color: var(--danger); }
    .btn-danger:active { background: #fef2f2; }

    /* Day Slider */
    .day-nav-container { background: var(--card-bg); padding: 12px 0 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .day-nav { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .day-nav::-webkit-scrollbar { display: none; }
    
    .day-pill {
        padding: 8px 18px; border-radius: 24px; font-size: 0.9rem; font-weight: 600;
        background: #f1f3f5; color: #adb5bd; border: none; cursor: pointer;
        white-space: nowrap; transition: 0.2s; flex-shrink: 0;
    }
    .day-pill.active {
        background: var(--text-main); color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }
    .day-add {
        width: 36px; height: 36px; border-radius: 50%; background: #fff; border: 1px dashed #ced4da;
        display: flex; align-items: center; justify-content: center; color: #adb5bd; cursor: pointer; flex-shrink: 0; margin-right: 16px;
    }

    /* Summary */
    .summary-bar {
        background: var(--primary-light); padding: 10px 20px; font-size: 0.85rem; 
        color: var(--primary); font-weight: 700; display: flex; justify-content: space-between;
        border-bottom: 1px solid #cffafe; flex-shrink: 0;
    }

    /* Main Grid Content */
    main { 
        flex: 1; overflow-y: auto; padding: 16px; 
        padding-bottom: calc(90px + var(--sab)); /* FAB + Safe Area */
        -webkit-overflow-scrolling: touch;
    }
    
    .grid-container { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
        gap: 16px; 
    }

    /* Card Design */
    .card {
        background: var(--card-bg); border-radius: 16px; overflow: hidden;
        box-shadow: var(--shadow); position: relative; border: 1px solid #fff;
        display: flex; flex-direction: column; cursor: pointer; transition: transform 0.1s;
    }
    .card:active { transform: scale(0.98); }

    .card-img-wrapper {
        width: 100%; height: 160px; background: #f1f3f5; position: relative;
        display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .card-img { width: 100%; height: 100%; object-fit: cover; }
    .card-no-img { color: #dee2e6; font-size: 2rem; }
    
    .card-cat-badge {
        position: absolute; top: 10px; left: 10px;
        background: rgba(0,0,0,0.6); color: white; backdrop-filter: blur(4px);
        padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700;
    }

    .card-body { padding: 14px; display: flex; flex-direction: column; flex: 1; }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--text-main); margin-bottom: 6px; line-height: 1.3; }
    
    .place-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .place-chip-mini { 
        font-size: 0.7rem; color: #495057; background: #f8f9fa; border: 1px solid #e9ecef;
        padding: 2px 6px; border-radius: 4px; display: flex; align-items: center; gap: 3px;
    }
    .place-chip-mini i { color: var(--primary); font-size: 0.6rem; }

    .card-memo { 
        font-size: 0.8rem; color: var(--text-sub); line-height: 1.4; 
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* FAB */
    .fab {
        position: fixed; 
        bottom: calc(24px + var(--sab)); 
        right: 24px; 
        width: 60px; height: 60px;
        background: var(--text-main); color: white; border-radius: 50%; border: none;
        box-shadow: 0 8px 20px rgba(0,0,0,0.25); font-size: 24px; cursor: pointer;
        display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .fab:active { transform: scale(0.95); }

    /* Modal */
    .modal-overlay { 
        display: none; position: fixed; inset: 0; 
        background: rgba(0,0,0,0.5); z-index: 200; 
        backdrop-filter: blur(4px); align-items: flex-end; 
    }
    .modal-content {
        background: white; width: 100%; max-width: 600px; margin: 0 auto;
        border-radius: 24px 24px 0 0; 
        padding: 24px 24px calc(24px + var(--sab)) 24px; 
        max-height: 90vh; overflow-y: auto;
        animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex; flex-direction: column; gap: 16px;
    }
    @media (min-width: 769px) { .modal-overlay { align-items: center; } .modal-content { border-radius: 24px; max-height: 80vh; width: 500px; padding-bottom: 24px; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .modal-handle { width: 40px; height: 5px; background: #e9ecef; border-radius: 10px; align-self: center; margin-bottom: 12px; }
    
    .label { font-size: 0.8rem; font-weight: 700; color: var(--primary); margin-bottom: 6px; display: block; text-transform: uppercase; }
    .input-box { width: 100%; padding: 14px; background: #f8f9fa; border: 1px solid #f1f3f5; border-radius: 14px; font-size: 1rem; color: var(--text-main); outline: none; transition: 0.2s; font-family: inherit; }
    .input-box:focus { background: white; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }

    .category-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .cat-chip { padding: 10px 16px; border-radius: 20px; background: white; border: 1px solid #e9ecef; color: #495057; font-weight: 600; font-size: 0.9rem; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .cat-chip.selected { background: var(--primary); color: white; border-color: var(--primary); }

    .img-upload-area {
        border: 2px dashed #ced4da; border-radius: 14px; padding: 20px; text-align: center;
        background: #f8f9fa; cursor: pointer; position: relative; height: 180px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        overflow: hidden; transition: 0.2s;
    }
    .img-upload-area img { position: absolute; width: 100%; height: 100%; object-fit: cover; inset: 0; z-index: 10; }
    .btn-remove-img { 
        position: absolute; top: 10px; right: 10px; z-index: 20; 
        background: rgba(0,0,0,0.6); color: white; border: none; 
        width: 30px; height: 30px; cursor: pointer; display: none; align-items: center; justify-content: center;
    }

    .modal-btns { display: flex; gap: 10px; margin-top: 10px; }
    .btn-action { flex: 1; padding: 16px; border-radius: 14px; font-weight: 700; font-size: 1rem; border: none; cursor: pointer; }
    .btn-save { background: var(--text-main); color: white; }
    .btn-del { background: #ffe3e3; color: #fa5252; }
    .btn-cancel { background: white; border: 1px solid #e9ecef; color: #868e96; }
</style>
</head>
<body>

<header>
    <div class="logo"><i class="fas fa-th-large"></i> Travel Card</div>
    <div class="header-actions">
        <button class="icon-btn" title="가져오기" onclick="document.getElementById('json-input').click()">
            <i class="fas fa-folder-open"></i>
        </button>
        <button class="icon-btn" title="공유" onclick="exportJSON()">
            <i class="fas fa-share-nodes"></i>
        </button>
        <button class="icon-btn btn-danger" title="초기화" onclick="resetAll()">
            <i class="fas fa-trash-alt"></i>
        </button>
    </div>
    <input type="file" id="json-input" accept=".json" hidden onchange="importJSON(this)">
</header>

<div class="day-nav-container">
    <div class="day-nav" id="day-nav"></div>
</div>

<div class="summary-bar">
    <span id="summary-day">Day 1</span>
    <span id="summary-count">0개 카드</span>
</div>

<main id="main-container">
    <div class="grid-container" id="grid-list"></div>
</main>

<button class="fab" onclick="openModal('new')"><i class="fas fa-plus"></i></button>

<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <div class="modal-handle"></div>
        <h2 style="margin:0; font-size:1.3rem;" id="modal-title">카드 작성</h2>
        <input type="hidden" id="edit-id">

        <div style="position:relative;">
            <div class="img-upload-area" onclick="document.getElementById('file-input').click()">
                <img id="preview-img" style="display:none;">
                <button class="btn-remove-img" id="btn-remove-img" onclick="removeImage(event)"><i class="fas fa-times"></i></button>
                <i class="fas fa-camera" style="font-size:2rem; color:#adb5bd; margin-bottom:8px;"></i>
                <span style="font-size:0.8rem; color:#868e96;">사진 추가 (클릭)</span>
            </div>
            <input type="file" id="file-input" hidden accept="image/*" onchange="handleImage(this)">
        </div>

        <div>
            <span class="label">카테고리</span>
            <div class="category-scroll" id="category-chips">
                <button class="cat-chip selected" onclick="selectCat(this)" data-val="관광"><i class="fas fa-camera"></i> 관광</button>
                <button class="cat-chip" onclick="selectCat(this)" data-val="숙소"><i class="fas fa-bed"></i> 숙소</button>
                <button class="cat-chip" onclick="selectCat(this)" data-val="교통"><i class="fas fa-bus"></i> 교통</button>
                <button class="cat-chip" onclick="selectCat(this)" data-val="맛집"><i class="fas fa-utensils"></i> 맛집</button>
                <button class="cat-chip" onclick="selectCat(this)" data-val="쇼핑"><i class="fas fa-shopping-bag"></i> 쇼핑</button>
            </div>
        </div>

        <div>
            <span class="label">제목</span>
            <input type="text" id="input-title" class="input-box" style="font-weight:700; font-size:1.1rem;" placeholder="예: 도톤보리 글리코상">
        </div>

        <div style="display:flex; gap:12px;">
            <div style="flex:1;">
                <span class="label">Day</span>
                <select id="input-day" class="input-box" style="background:white"></select>
            </div>
            <div style="flex:1;">
                <span class="label">시간 (정렬용)</span>
                <input type="time" id="input-time" class="input-box" style="background:white">
            </div>
        </div>

        <div>
            <span class="label">장소 / 태그 (입력 후 Enter)</span>
            <div style="display:flex; gap:8px; margin-bottom:8px;">
                <input type="text" id="input-place-temp" class="input-box" placeholder="태그 추가" onkeypress="if(event.key==='Enter') addPlace()">
                <button onclick="addPlace()" style="background:var(--text-main); color:white; border:none; border-radius:12px; width:50px; cursor:pointer;"><i class="fas fa-plus"></i></button>
            </div>
            <div id="place-list-ui" style="display:flex; flex-wrap:wrap; gap:6px;"></div>
        </div>

        <div>
            <span class="label">메모</span>
            <textarea id="input-memo" class="input-box" rows="3" placeholder="기억하고 싶은 내용..."></textarea>
        </div>

        <div class="modal-btns">
            <button class="btn-action btn-del" id="btn-delete" style="display:none;" onclick="deleteRecord()">삭제</button>
            <button class="btn-action btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-action btn-save" onclick="saveRecord()">저장</button>
        </div>
    </div>
</div>

<script>
    let travelData = [];
    let currentDay = "Day 1";
    let tempPlaces = [];
    let tempImage = ""; 

    const DB_NAME = "TravelCardDB_IOS";
    const DB_VERSION = 1;
    let db;

    document.addEventListener('DOMContentLoaded', loadData);

    function initDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains("cards")) db.createObjectStore("cards", { keyPath: "id" });
            };
            req.onsuccess = (e) => { db = e.target.result; resolve(db); };
            req.onerror = reject;
        });
    }

    async function loadData() {
        if (!db) await initDB();
        const tx = db.transaction("cards", "readonly");
        tx.objectStore("cards").getAll().onsuccess = (e) => {
            travelData = e.target.result || [];
            refreshUI();
        };
    }

    async function saveData() {
        const tx = db.transaction("cards", "readwrite");
        const store = tx.objectStore("cards");
        store.clear().onsuccess = () => {
            travelData.forEach(item => store.put(item));
        };
        return new Promise(resolve => tx.oncomplete = resolve);
    }

    function refreshUI() {
        const days = [...new Set(travelData.map(d => d.day))].sort((a,b) => {
            const na = parseInt(a.replace(/\D/g,''))||0, nb = parseInt(b.replace(/\D/g,''))||0;
            return na - nb || a.localeCompare(b);
        });
        if (days.length === 0) days.push("Day 1");
        if (!days.includes(currentDay)) currentDay = days[0];

        const nav = document.getElementById('day-nav');
        nav.innerHTML = '';
        days.forEach(d => {
            const btn = document.createElement('button');
            btn.className = `day-pill ${d === currentDay ? 'active' : ''}`;
            const count = travelData.filter(i => i.day === d).length;
            btn.textContent = `${d}`;
            btn.onclick = () => { currentDay = d; refreshUI(); };
            nav.appendChild(btn);
        });
        const addBtn = document.createElement('div');
        addBtn.className = 'day-add';
        addBtn.innerHTML = '<i class="fas fa-plus"></i>';
        addBtn.onclick = addNewDay;
        nav.appendChild(addBtn);

        const sel = document.getElementById('input-day');
        sel.innerHTML = '';
        days.forEach(d => {
            const op = document.createElement('option');
            op.value = d; op.textContent = d;
            sel.appendChild(op);
        });

        const container = document.getElementById('grid-list');
        container.innerHTML = '';
        const items = travelData.filter(d => d.day === currentDay).sort((a,b) => a.time.localeCompare(b.time));
        
        document.getElementById('summary-day').textContent = currentDay;
        document.getElementById('summary-count').textContent = `${items.length}개의 카드`;

        if (items.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:#adb5bd;"><i class="fas fa-camera" style="font-size:3rem; margin-bottom:16px; opacity:0.3;"></i><p>카드가 없습니다.<br>사진과 함께 여행을 기록해보세요.</p></div>`;
            return;
        }

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openModal('edit', item.id);

            const imgHtml = item.image 
                ? `<img src="${item.image}" class="card-img">` 
                : `<div class="card-img-wrapper"><i class="fas fa-image card-no-img"></i></div>`;

            card.innerHTML = `
                <div style="position:relative;">
                    ${imgHtml}
                    <div class="card-cat-badge">${item.category}</div>
                </div>
                <div class="card-body">
                    <div class="card-title">${item.title}</div>
                    <div class="place-chips">
                        ${(item.places||[]).map(p => `<span class="place-chip-mini"><i class="fas fa-map-marker-alt"></i> ${p}</span>`).join('')}
                    </div>
                    <div class="card-memo">${item.memo || '내용 없음'}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function openModal(mode, id) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('edit-id').value = '';
        resetImage();
        
        document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));

        if (mode === 'edit' && id) {
            document.getElementById('modal-title').textContent = "카드 수정";
            const item = travelData.find(x => x.id === id);
            document.getElementById('edit-id').value = item.id;
            document.getElementById('input-title').value = item.title;
            document.getElementById('input-day').value = item.day;
            document.getElementById('input-time').value = item.time;
            document.getElementById('input-memo').value = item.memo;
            tempPlaces = item.places ? [...item.places] : [];
            tempImage = item.image || "";
            
            const catBtn = [...document.querySelectorAll('.cat-chip')].find(b => b.dataset.val === item.category);
            if(catBtn) catBtn.classList.add('selected');
            
            document.getElementById('btn-delete').style.display = 'block';
        } else {
            document.getElementById('modal-title').textContent = "새 카드";
            document.getElementById('input-title').value = '';
            document.getElementById('input-day').value = currentDay;
            document.getElementById('input-time').value = "12:00";
            document.getElementById('input-memo').value = '';
            tempPlaces = [];
            tempImage = "";
            document.querySelector('.cat-chip[data-val="관광"]').classList.add('selected');
            document.getElementById('btn-delete').style.display = 'none';
        }
        
        if(tempImage) showImagePreview(tempImage);
        renderPlaces();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    document.getElementById('modal').addEventListener('click', e => { if(e.target.id==='modal') closeModal(); });

    function handleImage(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            tempImage = e.target.result;
            showImagePreview(tempImage);
        };
        reader.readAsDataURL(file);
    }
    function showImagePreview(src) {
        const img = document.getElementById('preview-img');
        img.src = src; img.style.display = 'block';
        document.getElementById('btn-remove-img').style.display = 'flex';
    }
    function removeImage(e) {
        e.stopPropagation();
        resetImage();
    }
    function resetImage() {
        tempImage = "";
        document.getElementById('preview-img').src = "";
        document.getElementById('preview-img').style.display = 'none';
        document.getElementById('btn-remove-img').style.display = 'none';
        document.getElementById('file-input').value = "";
    }

    function selectCat(btn) {
        document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
        btn.classList.add('selected');
    }
    function addPlace() {
        const v = document.getElementById('input-place-temp').value.trim();
        if(v) { tempPlaces.push(v); document.getElementById('input-place-temp').value=''; renderPlaces(); }
    }
    function removePlace(i) { tempPlaces.splice(i, 1); renderPlaces(); }
    function renderPlaces() {
        document.getElementById('place-list-ui').innerHTML = tempPlaces.map((p, i) => 
            `<span style="padding:6px 12px; border-radius:12px; background:#f1f3f5; color:#495057; font-size:0.8rem; display:flex; align-items:center; gap:4px;">${p} <i class="fas fa-times" onclick="removePlace(${i})" style="cursor:pointer; opacity:0.5;"></i></span>`
        ).join('');
    }

    async function saveRecord() {
        const id = document.getElementById('edit-id').value;
        const title = document.getElementById('input-title').value;
        if (!title) return alert('제목을 입력해주세요.');

        const activeCat = document.querySelector('.cat-chip.selected');
        const record = {
            id: id ? Number(id) : Date.now(),
            day: document.getElementById('input-day').value,
            time: document.getElementById('input-time').value,
            category: activeCat ? activeCat.dataset.val : '기타',
            title: title,
            places: tempPlaces,
            memo: document.getElementById('input-memo').value,
            image: tempImage
        };

        if (id) {
            const idx = travelData.findIndex(x => x.id == id);
            if (idx > -1) travelData[idx] = record;
        } else {
            travelData.push(record);
        }

        currentDay = record.day;
        await saveData(); refreshUI(); closeModal();
    }

    async function deleteRecord() {
        if(confirm('삭제하시겠습니까?')) {
            travelData = travelData.filter(x => x.id != document.getElementById('edit-id').value);
            await saveData(); refreshUI(); closeModal();
        }
    }

    function addNewDay() {
        const days = [...new Set(travelData.map(d=>d.day))];
        const last = days.length > 0 ? parseInt(days[days.length-1].replace(/\D/g,''))||0 : 0;
        currentDay = `Day ${last+1}`; openModal('new');
    }

    async function resetAll() {
        if(confirm('전체 데이터를 삭제하시겠습니까?')) {
            travelData = []; await saveData(); refreshUI();
        }
    }

    function exportJSON() {
        if(travelData.length===0) return alert("데이터 없음");
        const blob = new Blob([JSON.stringify(travelData, null, 2)], {type:"application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `travel_card_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }
    function importJSON(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const json = JSON.parse(e.target.result);
                if(Array.isArray(json)) {
                    if(confirm(`${json.length}개의 카드를 불러오시겠습니까?`)) {
                        travelData = json; await saveData(); refreshUI();
                    }
                } else alert("형식 오류");
            } catch(err) { alert("파일 오류"); }
            input.value = '';
        };
        reader.readAsText(file);
    }
</script>
