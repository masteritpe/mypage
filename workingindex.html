<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🏢 워킹 마스터</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
    /* --- 비즈니스 포탈 스타일 --- */
    :root {
        --bg-body: #f1f5f9;
        --bg-white: #ffffff;
        --sidebar-bg: #0f172a; 
        --sidebar-text: #94a3b8;
        --sidebar-text-hover: #ffffff;
        --sidebar-active-bg: #1e293b;
        --sidebar-active-border: #3b82f6; 
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --border: #e2e8f0;
        --sidebar-width: 250px;
        --header-height: 56px;
    }

    * { box-sizing: border-box; }
    body { 
        margin: 0; 
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
        background: var(--bg-body); 
        color: #334155; 
        font-size: 14px; 
        height: 100vh; 
        overflow: hidden; 
    }

    .app { display: flex; height: 100%; }

    /* Sidebar */
    aside { 
        width: var(--sidebar-width); 
        background: var(--sidebar-bg); 
        color: var(--sidebar-text);
        display: flex; flex-direction: column; flex-shrink: 0; z-index: 1000;
        transition: all 0.3s ease;
        box-shadow: 4px 0 10px rgba(0,0,0,0.1);
    }
    
    aside.desktop-collapsed { margin-left: calc(var(--sidebar-width) * -1); }

    .brand-area {
        height: var(--header-height); display: flex; align-items: center; padding: 0 20px;
        font-size: 16px; font-weight: 700; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .brand-icon { margin-right: 8px; font-size: 18px; }

    .nav-container { flex: 1; overflow-y: auto; padding: 15px 10px; }
    
    /* 카테고리 클릭 및 아코디언 스타일 */
    .menu-category {
        font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;
        color: #64748b; margin: 24px 0 8px 12px; font-weight: 700;
        cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        padding-right: 10px; transition: color 0.2s;
    }
    .menu-category:hover { color: #94a3b8; }
    .menu-category:first-child { margin-top: 5px; }
    
    .cat-toggle-icon { font-size: 9px; transition: transform 0.2s; }
    .menu-category.collapsed .cat-toggle-icon { transform: rotate(-90deg); }
    
    .menu-items-group { display: block; overflow: hidden; }
    .menu-items-group.collapsed { display: none; }

    .nav-item { 
        padding: 10px 12px; margin-bottom: 2px; border-radius: 6px; 
        cursor: pointer; font-weight: 500; display: flex; align-items: center; 
        gap: 10px; transition: all 0.2s; font-size: 13.5px;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--sidebar-text-hover); }
    .nav-item.active { 
        background: var(--sidebar-active-bg); color: #fff; font-weight: 600; 
        border-left: 3px solid var(--sidebar-active-border);
    }
    .nav-icon { width: 18px; text-align: center; opacity: 0.8; }

    /* Main Area */
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; position: relative; }
    
    header { 
        background: #fff; border-bottom: 1px solid var(--border); 
        height: var(--header-height); display: flex; justify-content: space-between; 
        align-items: center; padding: 0 24px; flex-shrink: 0; 
    }
    .page-title { font-size: 15px; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 8px; }
    .actions { display: flex; gap: 8px; }
    .btn { 
        padding: 0 10px; height: 32px; border-radius: 4px; border: 1px solid #cbd5e1; 
        background: #fff; color: #475569; font-weight: 500; cursor: pointer; 
        display: inline-flex; align-items: center; justify-content: center; gap: 6px; 
        font-size: 12px; transition: all 0.2s;
    }
    .btn:hover { background: #f8fafc; border-color: #94a3b8; }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-dark); }
    
    .iframe-wrapper { flex: 1; width: 100%; height: 100%; background: #f1f5f9; position:relative; }
    iframe { width: 100%; height: 100%; border: none; background: #fff; display: block;}

    /* Overlay & Toast */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 900; }
    .overlay.show { display: block; }
    .toast { position: fixed; bottom: 30px; right: 30px; background: #0f172a; color: white; padding: 12px 24px; border-radius: 4px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; z-index: 9999; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    .toast.show { opacity: 1; }

    /* 스크롤바 (글로벌) */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    
    /* 스크롤바 (사이드바 - 진한 회색으로 변경) */
    aside::-webkit-scrollbar { width: 5px; }
    aside::-webkit-scrollbar-track { background: transparent; margin: 4px 0; }
    aside::-webkit-scrollbar-thumb { 
        background: #334155; /* 진한 회색 (slate-700) */
        border-radius: 4px; 
    }
    aside::-webkit-scrollbar-thumb:hover { 
        background: #475569; /* 호버 시 약간 밝은 진한 회색 (slate-600) */
    }
    /* Firefox용 스크롤바 (사이드바) */
    aside { scrollbar-width: thin; scrollbar-color: #334155 transparent; }
    
    @media (max-width: 768px) {
        aside { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 260px; box-shadow: 10px 0 25px -5px rgba(0, 0, 0, 0.5); }
        aside.mobile-open { transform: translateX(0); }
        .mobile-menu-btn { display: block; margin-right: 15px; background:none; border:none; font-size:20px; cursor:pointer;}
        #desktop-toggle-btn { display: none; }
    }
    .mobile-menu-btn { display: none; }
</style>
</head>
<body>

<div class="app" id="app">
    <aside id="sidebar">
        <div class="brand-area">
            <span class="brand-icon">🏢</span> 워킹 마스터
        </div>
        <div class="nav-container" id="nav-container"></div>
    </aside>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <main>
        <header>
            <div style="display:flex; align-items:center;">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                <div class="page-title" id="current-page-title">📂 로딩 중...</div>
            </div>
            <div class="actions">
                <button class="btn" id="desktop-toggle-btn" onclick="toggleDesktopSidebar()" title="메뉴 접기/펼치기">◀</button>
                <button class="btn" onclick="toggleFullscreen()">⛶</button>
                <button class="btn" onclick="openCurrentInNewWindow()">🔗 새창</button>
                <button class="btn btn-primary" onclick="refreshIframe()">🔄 새로고침</button>
            </div>
        </header>

        <div class="iframe-wrapper">
            <iframe id="main-iframe" src="about:blank"></iframe>
        </div>
    </main>
</div>

<div class="toast" id="toast">알림 메시지</div>

<script>
/* -------------------------------------------
   MENU DATA SYSTEM (IndexedDB 연동)
   ------------------------------------------- */
const DB_NAME = "WorkingMasterDB";
const STORE_NAME = "sys_store";
const MENU_KEY = "global_menu_data";

// 폴백(Fallback) 데이터
const defaultMenuData = {
    "📌 주요 업무": [
        { title: "북마크", src: "tool/bookmark.html", icon: "🔖" },
        { title: "월간 계획", src: "tool/taskplanner.html", icon: "📅" },		
        { title: "주간보고 작성", src: "work/weeklylog.html", icon: "📈" }
    ]
};

function initMenuDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
            const db = e.target.result;
            if(!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME);
            }
        };
        req.onsuccess = e => {
            const db = e.target.result;
            const tx = db.transaction(STORE_NAME, "readonly");
            const store = tx.objectStore(STORE_NAME);
            const getReq = store.get(MENU_KEY);
            getReq.onsuccess = () => {
                if(getReq.result) resolve(getReq.result);
                else resolve(defaultMenuData);
            };
        };
        req.onerror = () => reject("Menu DB Error");
    });
}

let currentSrc = "";

// 페이지 로드 시 DB에서 데이터 호출 후 렌더링
window.onload = async function() {
    let activeMenuData;
    try {
        activeMenuData = await initMenuDB();
    } catch(e) {
        console.warn("DB 데이터 호출 실패, 기본 데이터 적용", e);
        activeMenuData = defaultMenuData;
    }
    
    renderSidebar(activeMenuData);
    
    // 최초 메뉴 자동 로드
    const firstGroup = Object.keys(activeMenuData)[0];
    if(firstGroup && activeMenuData[firstGroup].length > 0) {
        const firstItem = activeMenuData[firstGroup][0];
        loadPage(firstItem.src, firstItem.title, firstItem.icon, 'nav-0-0');
    }
};

function renderSidebar(data) {
    const navContainer = document.getElementById('nav-container');
    navContainer.innerHTML = '';
    
    let groupIndex = 0;
    for (const [category, items] of Object.entries(data)) {
        const isCollapsed = groupIndex !== 0; 
        
        const catHeader = document.createElement('div');
        catHeader.className = 'menu-category';
        if (isCollapsed) catHeader.classList.add('collapsed');
        catHeader.innerHTML = `<span>${category}</span> <span class="cat-toggle-icon">▼</span>`;
        navContainer.appendChild(catHeader);
        
        const itemsGroup = document.createElement('div');
        itemsGroup.className = 'menu-items-group';
        if (isCollapsed) itemsGroup.classList.add('collapsed');
        
        catHeader.onclick = () => {
            catHeader.classList.toggle('collapsed');
            itemsGroup.classList.toggle('collapsed');
        };

        items.forEach((item, itemIndex) => {
            const li = document.createElement('div');
            li.className = 'nav-item';
            li.id = `nav-${groupIndex}-${itemIndex}`;
            li.onclick = () => {
                if (item.src.startsWith("http")) {
                    window.open(item.src, '_blank');
                } else {
                    loadPage(item.src, item.title, item.icon, li.id);
                    if(window.innerWidth <= 768) toggleSidebar();
                }
            };
            li.innerHTML = `<span class="nav-icon">${item.icon}</span><span>${item.title}</span>`;
            itemsGroup.appendChild(li);
        });
        
        navContainer.appendChild(itemsGroup);
        groupIndex++;
    }
}

function loadPage(src, title, icon, navId) {
    const iframe = document.getElementById('main-iframe');
    iframe.src = src;
    currentSrc = src;
    
    document.getElementById('current-page-title').innerHTML = `<span style="font-size:18px; margin-right:5px;">${icon}</span> ${title}`;
    
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const activeNav = document.getElementById(navId);
    if(activeNav) activeNav.classList.add('active');
}

/* UI 토글 함수들 */
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    sidebar.classList.toggle('mobile-open');
    overlay.classList.toggle('show');
}

function toggleDesktopSidebar() {
    const sidebar = document.getElementById('sidebar');
    const btn = document.getElementById('desktop-toggle-btn');
    sidebar.classList.toggle('desktop-collapsed');
    btn.innerText = sidebar.classList.contains('desktop-collapsed') ? "▶" : "◀";
}

function refreshIframe() {
    const iframe = document.getElementById('main-iframe');
    iframe.src = iframe.src;
    showToast("페이지를 새로고침했습니다.");
}

function openCurrentInNewWindow() {
    if(currentSrc && currentSrc !== 'about:blank') window.open(currentSrc, '_blank');
    else showToast("빈 페이지는 새창으로 열 수 없습니다.");
}

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else if(document.exitFullscreen) document.exitFullscreen();
}

function showToast(message) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
}
</script>
</body>
</html>
