<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scrap Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />

<style>
/* === Executive Theme === */
:root {
    --bg-body: #f1f5f9; --bg-sidebar: #ffffff;
    --primary: #334155; --primary-hover: #1e293b;
    --accent: #6366f1; --accent-light: #e0e7ff;
    --text-main: #0f172a; --text-sub: #64748b; --text-muted: #94a3b8;
    --border: #e2e8f0; --radius-md: 10px;
    --font-ui: 'Pretendard', 'Inter', sans-serif;
}

* { box-sizing: border-box; outline: none; }
body { margin: 0; background: var(--bg-body); color: var(--text-main); font-family: var(--font-ui); font-size: 14px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* Header */
header { height: 64px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; flex-shrink: 0; justify-content: space-between; z-index: 50; }
header .brand { font-weight: 800; font-size: 20px; color: var(--primary); display: flex; align-items: center; gap: 12px; }
header .brand i { font-size: 22px; color: var(--accent); }

/* Layout Structure */
.workspace { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 64px); position: relative; }

/* Sidebar */
.pane-list { width: 340px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; z-index: 20; }
.search-area { padding: 20px; display: flex; flex-direction: column; gap: 12px; background: var(--bg-sidebar); flex-shrink: 0; }
.search-wrapper { position: relative; }
.search-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
.search-input { width: 100%; height: 42px; padding: 0 16px 0 40px; border: 1px solid var(--border); border-radius: var(--radius-md); background: #f8fafc; }
.list-scroll { flex: 1; overflow-y: auto; padding: 0 12px 20px 12px; }

/* Items */
.item-card { padding: 16px; margin-bottom: 8px; border-radius: var(--radius-md); cursor: pointer; border: 1px solid transparent; background: #fff; transition: 0.2s; display: flex; gap: 12px; align-items: center; }
.item-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
.item-card.active { border-color: var(--accent-light); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); position: relative; }
.item-card.active::before { content: ''; position: absolute; left: 0; top: 12px; bottom: 12px; width: 4px; background: var(--accent); border-radius: 0 4px 4px 0; }
.item-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; background: #e2e8f0; flex-shrink: 0; }
.item-info { flex: 1; overflow: hidden; }
.item-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.item-meta { font-size: 11px; color: var(--text-sub); }

/* Viewer Pane */
.pane-viewer { flex: 1; background: var(--bg-body); display: flex; flex-direction: column; position: relative; min-width: 0; overflow: hidden; }
.toolbar { height: 60px; display: flex; align-items: center; padding: 0 40px; justify-content: space-between; flex-shrink: 0; z-index: 30; background: var(--bg-body); border-bottom: 1px solid transparent; }
.viewer-wrapper { flex: 1; overflow: auto; padding: 20px; display: block; text-align: center; scroll-behavior: smooth; }

/* Image Display */
.image-paper { 
    background: #fff; 
    border-radius: 8px; 
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
    padding: 10px; 
    display: inline-block;
    min-width: 100%;
    text-align: center;
}
.image-paper img { 
    display: block; 
    max-width: 100%; 
    height: auto; 
    border-radius: 4px;
    margin: 0 auto;
    transition: width 0.2s ease-out;
}

/* Empty State */
.empty-state { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg-body); z-index: 100; }
.empty-content { text-align: center; max-width: 400px; }

/* Buttons */
.btn { height: 36px; padding: 0 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-secondary { background: #fff; border-color: var(--border); color: var(--text-main); }
.btn-icon { width: 36px; padding: 0; justify-content: center; }

/* Hidden Input */
#folder-input { display: none; }

/* === 전체화면 === */
:fullscreen header { display: none !important; }
:-webkit-full-screen header { display: none !important; }
:-moz-full-screen header { display: none !important; }
:-ms-fullscreen header { display: none !important; }

:fullscreen .pane-list { display: none !important; }
:-webkit-full-screen .pane-list { display: none !important; }

:fullscreen .workspace { height: 100vh !important; }
:-webkit-full-screen .workspace { height: 100vh !important; }
</style>
</head>
<body>

<header>
    <div class="brand"><i class="fas fa-newspaper"></i> Scrap Viewer</div>
    <div style="display:flex; gap:10px;">
        <label for="folder-input" class="btn btn-accent"><i class="fas fa-folder-open"></i> 폴더 선택</label>
        <input type="file" id="folder-input" webkitdirectory directory multiple>
    </div>
</header>

<div class="workspace">
    <aside class="pane-list">
        <div class="search-area">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" class="search-input" placeholder="이미지 이름 검색...">
            </div>
        </div>
        <div class="list-scroll" id="item-list"></div>
        <div style="padding:16px; text-align:center; font-size:11px; color:var(--text-muted); border-top:1px solid var(--border); background:#fff;">
            Total <span id="total-count" style="font-weight:700; color:var(--primary);">0</span> Images
        </div>
    </aside>

    <main class="pane-viewer">
        <div class="toolbar">
            <div id="viewer-title" style="font-weight:700; font-size:16px; color:var(--primary);"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary btn-icon" id="btn-zoom-out" title="축소 (Ctrl -)"><i class="fas fa-search-minus"></i></button>
                <button class="btn btn-secondary btn-icon" id="btn-zoom-in" title="확대 (Ctrl +)"><i class="fas fa-search-plus"></i></button>
                <button class="btn btn-secondary btn-icon" id="btn-zoom-reset" title="원래 크기(ESC / 화면 맞춤)"><i class="fas fa-compress"></i></button>
            </div>
        </div>

        <div class="viewer-wrapper" id="viewer-wrapper">
            <div class="image-paper" id="image-container" style="display:none;">
                <img id="main-image" src="" alt="Scrap">
            </div>

            <div id="empty-state" class="empty-state">
                <div class="empty-content">
                    <i class="fas fa-images" style="font-size:56px; color:#cbd5e1; margin-bottom:24px;"></i>
                    <h2 style="font-size:24px; color:var(--primary); margin-bottom:10px;">이미지 폴더를 열어주세요</h2>
                    <p style="color:var(--text-sub); line-height:1.6; margin-bottom:30px;">
                        우측 상단의 <strong>[폴더 선택]</strong> 버튼을 눌러<br>신문 스크랩이 저장된 폴더를 지정해 주세요.
                    </p>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
const App = {
    files: [],
    filteredFiles: [],
    selectedFileIndex: null,
    zoomLevel: 1,

    init: function() {
        this.bindEvents();
    },

    bindEvents: function() {
        const $ = id => document.getElementById(id);
        
        // 폴더 선택 시
        $('folder-input').addEventListener('change', (e) => {
            const allFiles = Array.from(e.target.files);
            // 이미지 파일만 필터링
            this.files = allFiles.filter(file => file.type.startsWith('image/'));
            
            // 파일 이름 기준 오름차순 (숫자 및 특수문자 엄격 비교 적용)
            this.files.sort((a, b) => {
                const regex = /(\d+)/g;
                const aParts = a.name.split(regex);
                const bParts = b.name.split(regex);
                
                for (let i = 0; i < Math.max(aParts.length, bParts.length); i++) {
                    const aPart = aParts[i] || '';
                    const bPart = bParts[i] || '';
                    
                    if (aPart !== bPart) {
                        const aNum = parseInt(aPart, 10);
                        const bNum = parseInt(bPart, 10);
                        
                        if (!isNaN(aNum) && !isNaN(bNum)) {
                            // 둘 다 숫자인 경우 숫자 크기로 비교
                            if (aNum !== bNum) return aNum - bNum;
                        } else {
                            // 문자열인 경우 ASCII 기준으로 엄격하게 대소 비교
                            return aPart < bPart ? -1 : 1;
                        }
                    }
                }
                return 0;
            });

            this.filteredFiles = [...this.files];
            
            if(this.files.length > 0) {
                $('empty-state').style.display = 'none';
                $('image-container').style.display = 'inline-block';
                this.renderList();
                this.loadImage(0); // 첫 번째 이미지 자동 로드
            } else {
                alert("선택한 폴더에 이미지 파일이 없습니다.");
            }
        });

        // 검색 기능
        $('search-input').addEventListener('keyup', (e) => {
            const term = e.target.value.toLowerCase();
            this.filteredFiles = this.files.filter(f => f.name.toLowerCase().includes(term));
            this.renderList();
        });

        // 리스트 클릭 이벤트 위임
        $('item-list').addEventListener('click', (e) => {
            const card = e.target.closest('.item-card');
            if(card) {
                const idx = parseInt(card.dataset.index);
                this.loadImage(idx);
            }
        });

        // 줌 기능 버튼
        $('btn-zoom-in').onclick = () => this.setZoom(this.zoomLevel + 0.2);
        $('btn-zoom-out').onclick = () => this.setZoom(this.zoomLevel - 0.2);
        $('btn-zoom-reset').onclick = () => this.setZoom(1);

        // 키보드 단축키 (Presenter 기능 이식)
        document.addEventListener('keydown', (e) => {
            // 인풋/텍스트 영역에서 타자 치는 중이면 단축키 처리 중단 (단, Escape는 blur 처리)
            if (document.activeElement.tagName.toLowerCase() === 'input' || document.activeElement.tagName.toLowerCase() === 'textarea') {
                if (e.key === 'Escape') { 
                    e.preventDefault(); 
                    document.activeElement.blur(); 
                }
                return;
            }

            // 열린 파일이 없을 경우 단축키 무시
            if (this.selectedFileIndex === null || this.files.length === 0) return;
            
            const viewer = $('viewer-wrapper');
            const scrollAmount = 250;

            // 전체화면 (Ctrl + H)
            if (e.ctrlKey && e.key.toLowerCase() === 'h') {
                e.preventDefault();
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else if (document.exitFullscreen) document.exitFullscreen();
                return;
            }

            // 확대 / 축소 (Ctrl + / Ctrl -)
            if (e.ctrlKey && (e.key === '=' || e.key === '+')) {
                e.preventDefault();
                this.setZoom(this.zoomLevel + 0.2);
                return;
            }
            if (e.ctrlKey && e.key === '-') {
                e.preventDefault();
                this.setZoom(this.zoomLevel - 0.2);
                return;
            }

            // ★ 원래 크기로 복귀 (ESC)
            if (e.key === 'Escape') {
                e.preventDefault();
                this.setZoom(1);
                return;
            }

            // 스크롤 상/하
            if (e.key === 'AudioVolumeUp' || e.key === 'VolumeUp' || e.key === 'ArrowUp') {
                e.preventDefault();
                viewer.scrollBy({ top: -scrollAmount, behavior: 'smooth' });
                return;
            }
            if (e.key === 'AudioVolumeDown' || e.key === 'VolumeDown' || e.key === 'ArrowDown') {
                e.preventDefault();
                viewer.scrollBy({ top: scrollAmount, behavior: 'smooth' });
                return;
            }

            // 좌우 스크롤 및 파일 이동 (화살표 좌/우)
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                const hasHorizontalScroll = viewer.scrollWidth > viewer.clientWidth + 1; // 오차 보정
                if (hasHorizontalScroll) {
                    viewer.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                } else {
                    const nextIndex = this.selectedFileIndex < this.files.length - 1 ? this.selectedFileIndex + 1 : 0;
                    this.loadImage(nextIndex);
                }
                return;
            }
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                const hasHorizontalScroll = viewer.scrollWidth > viewer.clientWidth + 1; // 오차 보정
                if (hasHorizontalScroll) {
                    viewer.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
                } else {
                    const prevIndex = this.selectedFileIndex > 0 ? this.selectedFileIndex - 1 : this.files.length - 1;
                    this.loadImage(prevIndex);
                }
                return;
            }

            // 이전/다음 파일 이동 (스페이스바, PageUp/Down)
            if (e.key === ' ' || e.key === 'PageDown') {
                e.preventDefault();
                const nextIndex = this.selectedFileIndex < this.files.length - 1 ? this.selectedFileIndex + 1 : 0;
                this.loadImage(nextIndex);
            } else if (e.key === 'PageUp') {
                e.preventDefault();
                const prevIndex = this.selectedFileIndex > 0 ? this.selectedFileIndex - 1 : this.files.length - 1;
                this.loadImage(prevIndex);
            }
        });
    },

    renderList: function() {
        const listEl = document.getElementById('item-list');
        listEl.innerHTML = '';
        
        this.filteredFiles.forEach((file) => {
            const realIndex = this.files.indexOf(file);
            const thumbUrl = URL.createObjectURL(file);
            const card = document.createElement('div');
            
            card.className = `item-card ${realIndex === this.selectedFileIndex ? 'active' : ''}`;
            card.dataset.index = realIndex;
            
            const sizeKb = (file.size / 1024).toFixed(1) + ' KB';

            card.innerHTML = `
                <img class="item-thumb" src="${thumbUrl}" alt="thumb">
                <div class="item-info">
                    <div class="item-title" title="${file.name}">${file.name}</div>
                    <div class="item-meta">${sizeKb}</div>
                </div>
            `;
            listEl.appendChild(card);
        });
        
        document.getElementById('total-count').textContent = this.filteredFiles.length;
    },

    loadImage: function(index) {
        if (index < 0 || index >= this.files.length) return;
        
        this.selectedFileIndex = index;
        const file = this.files[index];
        
        const mainImg = document.getElementById('main-image');
        mainImg.src = URL.createObjectURL(file);
        
        document.getElementById('viewer-title').textContent = file.name;
        
        // 줌 초기화 및 뷰어 스크롤 최상단으로 리셋
        this.setZoom(1);
        document.getElementById('viewer-wrapper').scrollTop = 0;

        // 리스트 UI 업데이트
        this.renderList();
        
        // 선택된 아이템이 스크롤 영역 안에 보이도록 자동 스크롤
        setTimeout(() => {
            const activeCard = document.querySelector('.item-card.active');
            if (activeCard) {
                activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }, 50);
    },

    setZoom: function(level) {
        if(level < 0.2 || level > 5) return;
        this.zoomLevel = level;
        
        const img = document.getElementById('main-image');
        
        if (level === 1) {
            img.style.width = '';
            img.style.maxWidth = '100%';
        } else {
            if (img.naturalWidth > 0) {
                img.style.maxWidth = 'none'; 
                img.style.width = (img.naturalWidth * level) + 'px';
            } else {
                img.onload = () => {
                    img.style.maxWidth = 'none'; 
                    img.style.width = (img.naturalWidth * level) + 'px';
                    img.onload = null;
                };
            }
        }
    }
};

window.onload = () => App.init();
</script>
</body>
</html>
