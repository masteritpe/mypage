<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Web Logger</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
/* === 1. Variables & Reset === */
:root {
    --bg-app: #f8fafc;
    --bg-panel: #ffffff;
    --border: #e2e8f0;
    --primary: #4f46e5;
    --primary-light: #e0e7ff;
    --text-main: #1e293b;
    --text-sub: #64748b;
    --font-main: "Pretendard", -apple-system, sans-serif;
    --font-code: 'D2Coding', 'Consolas', monospace;
}

* { box-sizing: border-box; outline: none; }
body {
    margin: 0; background: var(--bg-app); 
    font-family: var(--font-main); color: var(--text-main);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* === 2. Header (Top Bar) === */
header {
    height: 56px; background: var(--bg-panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; flex-shrink: 0; z-index: 10;
}
.brand { 
    font-weight: 800; font-size: 18px; color: var(--primary); 
    display: flex; align-items: center; gap: 8px; height: 100%;
}
.header-actions { 
    display: flex; align-items: center; gap: 8px; height: 100%; 
}

/* 버튼 스타일 */
.btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    height: 34px; 
    padding: 0 12px; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); background: #fff; color: var(--text-main);
    transition: 0.2s;
    line-height: 1; margin: 0; text-decoration: none;
}
.btn:hover { background: #f8fafc; border-color: #cbd5e1; }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: #4338ca; }
.btn-danger { color: #ef4444; background: #fff; border-color: #fee2e2; }
.btn-danger:hover { background: #fef2f2; }
.btn-icon { padding: 0 10px; border: none; background: transparent; color: var(--text-sub); font-size: 16px; border-radius: 4px; }
.btn-icon:hover { background: #f1f5f9; color: var(--primary); }

.v-sep { width: 1px; height: 16px; background: var(--border); margin: 0 2px; }

/* === 3. Layout === */
.workspace { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.pane-list {
    width: 320px; background: var(--bg-panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; transition: margin-left 0.3s;
}

/* 사이드바 컨트롤 영역 */
.sidebar-controls {
    padding: 12px; border-bottom: 1px solid var(--border); background: #f8fafc;
    display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}
.sidebar-controls select, .sidebar-controls input {
    width: 100%;
    height: 34px;
    font-size: 13px;
    margin: 0;
    padding: 0 10px;    
    line-height: 32px;  
    border: 1px solid var(--border);
    border-radius: 6px;
}

.list-scroll { flex: 1; overflow-y: auto; }

.list-item {
    padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer;
    transition: 0.1s;
}
.list-item:hover { background: #f1f5f9; }
.list-item.active { background: #eff6ff; border-left: 4px solid var(--primary); padding-left: 12px; }
.list-item .meta { font-size: 11px; color: var(--text-sub); display: flex; justify-content: space-between; margin-bottom: 4px; }
.list-item .title { font-size: 14px; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.badge-cat { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-weight: 600; color: #475569; }

/* Editor */
.pane-editor { flex: 1; background: #fff; display: flex; flex-direction: column; position: relative; min-width: 0; }
#empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sub); }
#empty-state i { font-size: 48px; margin-bottom: 16px; color: #cbd5e1; }

#editor-container { display: none; flex-direction: column; height: 100%; }

/* 툴바 */
.editor-toolbar {
    height: 50px; 
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; background: #fff;
    flex-shrink: 0;
}
.editor-scroll { flex: 1; overflow-y: auto; padding: 30px 40px; background: #fff; }

.form-grid { display: grid; gap: 16px; margin-bottom: 20px; }
.row-2 { display: grid; grid-template-columns: 1fr 200px; gap: 16px; }

label { font-size: 12px; font-weight: 600; color: var(--text-sub); display: block; margin-bottom: 6px; }
input, select, textarea {
    width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px;
    font-family: var(--font-main); font-size: 14px; transition: 0.2s;
}
/* 일반 폼 요소 패딩 */
.form-grid input, .form-grid select, .form-grid textarea { padding: 10px; }
input:focus, select:focus, textarea:focus, .wysiwyg:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }

.wysiwyg {
    min-height: 250px; padding: 16px; border: 1px solid var(--border); border-radius: 6px;
    line-height: 1.6; outline: none; white-space: pre-wrap;
}
.code-editor {
    font-family: var(--font-code); background: #1e293b; color: #e2e8f0;
    border-radius: 6px; padding: 16px; line-height: 1.5; border: none; resize: vertical;
}

/* Attachments */
.attach-area { margin-top: 30px; border-top: 1px dashed var(--border); padding-top: 20px; }
.img-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
.img-slot {
    width: 90px; height: 90px; border: 1px solid var(--border); border-radius: 8px;
    position: relative; display: flex; align-items: center; justify-content: center;
    background: #f8fafc; overflow: hidden; cursor: pointer; transition: 0.2s; flex-direction: column;
}
.img-slot:hover { border-color: var(--primary); }
.img-slot img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
.img-slot .file-icon { font-size: 24px; color: var(--text-sub); margin-bottom: 4px; }
.img-slot .file-name { font-size: 10px; color: var(--text-sub); text-align: center; width: 90%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.img-slot i.fa-plus { font-size: 20px; color: #cbd5e1; }

.btn-del-img {
    position: absolute; top: 4px; right: 4px; width: 20px; height: 20px;
    background: rgba(0,0,0,0.6); color: #fff; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    font-size: 12px; z-index: 2;
}

/* Modals */
.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000;
    display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px);
}
.modal-content {
    background: #fff; padding: 24px; border-radius: 12px; width: 400px; max-width: 95%;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 16px;
}
.full-img-content { max-width: 90%; max-height: 90vh; border-radius: 4px; }

/* 카테고리 관리 리스트 스타일 */
.cat-manage-list { max-height: 300px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; }
.cat-manage-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
.cat-manage-item:last-child { border-bottom: none; }

/* Toast */
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
.toast { background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 10px; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Toolbar Buttons */
.fmt-btn { border: none; background: transparent; cursor: pointer; padding: 8px; border-radius: 4px; color: var(--text-sub); font-size: 15px; margin: 0 1px; }
.fmt-btn:hover { background: #f1f5f9; color: var(--primary); }
.toolbar-grp { display: flex; align-items: center; }
.tool-sep { width: 1px; height: 14px; background: #cbd5e1; margin: 0 10px; display: inline-block; }

@media (max-width: 768px) {
    .pane-list { display: none; position: absolute; height: 100%; z-index: 50; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
    .pane-list.show { display: flex; }
    .row-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
    <div class="brand">
        <button class="btn-icon" id="btn-toggle-menu" style="margin-right:8px; display:none;"><i class="fas fa-bars"></i></button>
        <i class="fas fa-book-open"></i> Web Logger
    </div>
    <div class="header-actions">
        <button class="btn" id="btn-new-log"><i class="fas fa-plus"></i><span class="desktop-only"> New</span></button>
        <div class="v-sep"></div>
        <button class="btn btn-icon" id="btn-settings" title="카테고리 관리"><i class="fas fa-cog"></i></button>
        <button class="btn btn-icon" id="btn-export-excel" title="Excel 저장"><i class="fas fa-file-excel" style="color:#059669;"></i></button>
        <button class="btn btn-icon" id="btn-export-pdf" title="PDF 저장"><i class="fas fa-file-pdf" style="color:#ef4444;"></i></button>
    </div>
</header>

<div class="workspace">
    <aside class="pane-list" id="sidebar">
        <div class="sidebar-controls">
            <select id="filter-category">
                <option value="">모든 카테고리</option>
            </select>
            <input type="text" id="search-input" placeholder="검색...">
        </div>
        <div class="list-scroll" id="list-container"></div>
    </aside>

    <main class="pane-editor">
        <div id="empty-state">
            <i class="fas fa-seedling"></i>
            <p>목록에서 기록을 선택하거나 'New' 버튼을 눌러 작성하세요.</p>
        </div>

        <div id="editor-container">
            <div class="editor-toolbar">
                <div style="display:flex; align-items:center;">
                    <div class="toolbar-grp">
                        <button class="fmt-btn" onclick="execCmd('bold')" title="굵게 (Ctrl+B)"><i class="fas fa-bold"></i></button>
                        <button class="fmt-btn" onclick="execCmd('italic')" title="기울임 (Ctrl+I)"><i class="fas fa-italic"></i></button>
                        <button class="fmt-btn" onclick="execCmd('underline')" title="밑줄 (Ctrl+U)"><i class="fas fa-underline"></i></button>
                        <button class="fmt-btn" onclick="execCmd('strikeThrough')" title="취소선 (Ctrl+Alt+5)"><i class="fas fa-strikethrough"></i></button>
                    </div>
                    <div class="tool-sep"></div>
                    <div class="toolbar-grp">
                        <button class="fmt-btn" onclick="execColor('red')" style="color:#ef4444;" title="빨강 (Ctrl+Alt+R)"><i class="fas fa-font"></i></button>
                        <button class="fmt-btn" onclick="execColor('blue')" style="color:#3b82f6;" title="파랑 (Ctrl+Alt+B)"><i class="fas fa-font"></i></button>
                        <button class="fmt-btn" onclick="execHilite()" title="형광펜 (Ctrl+Alt+M)"><i class="fas fa-highlighter" style="color:#d97706;"></i></button>
                        <button class="fmt-btn" onclick="execCmd('removeFormat')" title="서식 지우기 (Ctrl+Shift+X)"><i class="fas fa-eraser"></i></button>
                    </div>
                </div>
                <div>
                    <button class="btn btn-danger" id="btn-delete" style="margin-right:8px;">삭제</button>
                    <button class="btn btn-primary" id="btn-save"><i class="fas fa-save"></i> 저장</button>
                </div>
            </div>

            <div class="editor-scroll">
                <div class="form-grid">
                    <div class="row-2">
                        <div>
                            <label>Category</label>
                            <select id="in-category"></select>
                        </div>
                        <div>
                            <label>Seq</label>
                            <input id="in-seq" type="number" placeholder="자동">
                        </div>
                    </div>
                    <div>
                        <label>Title</label>
                        <input id="in-title" type="text" spellcheck="false" placeholder="제목을 입력하세요" style="font-weight:700; font-size:16px;">
                    </div>
                    <div>
                        <label>Reference URL</label>
                        <div style="display:flex; gap:6px;">
                            <input id="in-url" type="text" placeholder="https://...">
                            <button class="btn" id="btn-open-url" title="새 창 열기"><i class="fas fa-external-link-alt"></i></button>
                        </div>
                    </div>
                    <div>
                        <label>Content</label>
                        <div id="in-content" class="wysiwyg" contenteditable="true" spellcheck="false" placeholder="내용을 입력하세요..."></div>
                    </div>
                    <div>
                        <label>Code Snippet</label>
                        <textarea id="in-code" class="code-editor" rows="6" placeholder=">_ 코드를 입력하세요..."></textarea>
                    </div>
                    <div>
                        <label>Tags</label>
                        <input id="in-tags" type="text" placeholder="#Tag1, #Tag2...">
                    </div>
                    <div class="attach-area">
                        <label><i class="fas fa-paperclip"></i> Attachments</label>
                        <div class="img-grid" id="img-grid-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="modal-settings">
    <div class="modal-content">
        <h3 style="margin:0;">카테고리 관리</h3>
        <div style="display:flex; gap:8px;">
            <input type="text" id="new-cat-input" placeholder="새 카테고리 이름" style="flex:1;">
            <button class="btn btn-primary" id="btn-add-cat">추가</button>
        </div>
        <div class="cat-manage-list" id="cat-manage-list"></div>
        <div style="text-align:right;">
            <button class="btn" onclick="closeSettings()">닫기</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="img-modal">
    <img class="full-img-content" id="full-img-target">
</div>

<div id="hidden-inputs" style="display:none;"></div>
<div id="toast-container"></div>

<script>
/* ===========================================================================
 * Web Logger Pro (Fix: Color Shortcuts)
 * =========================================================================== */

const $ = (sel) => document.querySelector(sel);
const DB_NAME = 'WebLoggerDB';
const DB_VER = 1; 
const SLOT_COUNT = 10;
let db = null;
const STYLE_DEFS = {
    red: { hex: '#ef4444' },
    blue: { hex: '#3b82f6' },
    mark: { hex: '#ffedd5' }
};

// === Helper: 확실한 이미지 판별 ===
function isImage(type, name) {
    if (type && type.startsWith('image/')) return true;
    if (name && /\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i.test(name)) return true;
    return false;
}

// === 1. IndexedDB Utils ===
function openDB() {
    return new Promise((resolve, reject) => {
        const rq = indexedDB.open(DB_NAME, DB_VER);
        rq.onupgradeneeded = (e) => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains('logs')) d.createObjectStore('logs', { keyPath: 'id' });
            if (!d.objectStoreNames.contains('images')) d.createObjectStore('images', { keyPath: 'id' });
            if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', { keyPath: 'id' });
        };
        rq.onsuccess = () => { db = rq.result; resolve(db); };
        rq.onerror = () => reject(rq.error);
    });
}
function tx(storeName, mode = 'readonly') { return db.transaction(storeName, mode).objectStore(storeName); }

function putLog(item) {
    return new Promise((res, rej) => {
        const req = tx('logs', 'readwrite').put(item);
        req.onsuccess = () => res(true);
        req.onerror = () => rej(req.error);
    });
}

function getAllLogs() {
    return new Promise((res, rej) => {
        const req = tx('logs').getAll();
        req.onsuccess = () => res(req.result || []);
        req.onerror = () => rej(req.error);
    });
}

function deleteLog(id) {
    return new Promise((res, rej) => {
        const req = tx('logs', 'readwrite').delete(id);
        req.onsuccess = () => res(true);
        req.onerror = () => rej(req.error);
    });
}

// === 2. Settings Utils ===
async function getCategories() {
    return new Promise((res) => {
        const req = tx('settings').get('categories');
        req.onsuccess = () => res(req.result ? req.result.list : ['General', 'Work', 'Study']);
    });
}

async function saveCategories(list) {
    return new Promise((res) => {
        const req = tx('settings', 'readwrite').put({ id: 'categories', list });
        req.onsuccess = () => res(true);
    });
}

// === 3. File Utils ===
function putFile(file) {
    if (!file) return Promise.resolve('');
    const id = 'ATT_' + Math.random().toString(36).slice(2) + Date.now();
    return new Promise((res, rej) => { 
        const req = tx('images', 'readwrite').add({ 
            id, blob: file, name: file.name, type: file.type 
        }); 
        req.onsuccess = () => res(id); 
        req.onerror = () => rej(req.error); 
    }); 
}

function getFile(id) {
    if (!id) return Promise.resolve(null);
    return new Promise((res, rej) => {
        const req = tx('images').get(id);
        req.onsuccess = () => { 
            const rec = req.result; 
            if (!rec) { res(null); return; } 
            res({ 
                id: rec.id, 
                url: URL.createObjectURL(rec.blob), 
                blob: rec.blob, 
                name: rec.name || 'Unknown', 
                type: rec.type 
            });
        };
        req.onerror = () => rej(req.error);
    });
}

// === 4. Application Logic ===
const state = { logs: [], categories: [], editingId: null };
const uid = () => 'L' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
const nowISO = () => new Date().toISOString().split('T')[0];

function showToast(msg, type = 'success') {
    const container = $('#toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> <span>${msg}</span>`;
    container.appendChild(toast);
    setTimeout(() => { 
        toast.style.opacity = '0'; 
        setTimeout(() => toast.remove(), 300); 
    }, 1000); 
}

// === 5. UI Initialization ===
function initInputs() {
    const box = $('#hidden-inputs'); 
    const grid = $('#img-grid-container');
    box.innerHTML = ''; 
    grid.innerHTML = '';

    for (let i = 1; i <= SLOT_COUNT; i++) {
        const input = document.createElement('input'); 
        input.type = 'file'; 
        input.id = `file-slot-${i}`; 
        input.style.display = 'none';
        
        const chk = document.createElement('input'); 
        chk.type = 'checkbox'; 
        chk.id = `chk-remove-${i}`; 
        chk.style.display = 'none';
        
        box.append(input, chk);

        const slot = document.createElement('div'); 
        slot.className = 'img-slot'; 
        slot.id = `ui-slot-${i}`;
        slot.innerHTML = `<i class="fas fa-plus"></i>`;
        
        slot.onclick = (e) => {
            if(e.target.closest('.btn-del-img')) return;
            if(slot.dataset.hasFile === 'true') {
                 if(isImage(slot.dataset.type, slot.dataset.name)) {
                     showFullImage(slot.dataset.url);
                 } else { 
                     const a = document.createElement('a'); 
                     a.href = slot.dataset.url; 
                     a.download = slot.dataset.name || 'download'; 
                     document.body.appendChild(a); 
                     a.click(); 
                     document.body.removeChild(a);
                 }
            } else {
                input.click();
            }
        };

        input.onchange = () => { 
            if(input.files[0]) {
                const f = input.files[0];
                renderAttachSlot(i, { 
                    url: URL.createObjectURL(f), 
                    type: f.type, 
                    name: f.name 
                });
            }
        };
        grid.appendChild(slot);
    }
}

function renderAttachSlot(idx, info) {
    const slot = $(`#ui-slot-${idx}`);
    slot.dataset.hasFile = 'true'; 
    Object.assign(slot.dataset, info);
    slot.style.borderStyle = 'solid';
    
    const delBtn = `<div class="btn-del-img" onclick="removeAttach(${idx})"><i class="fas fa-times"></i></div>`;
    
    if(isImage(info.type, info.name)) {
        slot.innerHTML = `<img src="${info.url}">${delBtn}`;
    } else {
        const displayName = info.name || 'File';
        slot.innerHTML = `<i class="fas fa-file-alt file-icon"></i><div class="file-name">${displayName}</div>${delBtn}`;
    }
    $(`#chk-remove-${idx}`).checked = false;
}

window.removeAttach = (idx) => {
    $(`#file-slot-${idx}`).value = ''; 
    $(`#chk-remove-${idx}`).checked = true;
    const slot = $(`#ui-slot-${idx}`);
    slot.dataset.hasFile = 'false'; 
    delete slot.dataset.url; 
    delete slot.dataset.type; 
    delete slot.dataset.name;
    slot.innerHTML = `<i class="fas fa-plus"></i>`; 
    slot.style.borderStyle = 'dashed';
};

function showFullImage(src) { 
    $('#full-img-target').src = src; 
    $('#img-modal').style.display = 'flex'; 
}

$('#img-modal').onclick = () => $('#img-modal').style.display = 'none';

// === 6. Category Management ===
async function initCategories() { 
    state.categories = await getCategories(); 
    updateCategoryUI(); 
}

function updateCategoryUI() {
    const filterEl = $('#filter-category'); 
    const editorEl = $('#in-category'); 
    const manageListEl = $('#cat-manage-list');
    
    const prevFilter = filterEl.value; 
    const prevEditor = editorEl.value;

    const opts = state.categories.map(c => `<option value="${c}">${c}</option>`).join('');
    
    filterEl.innerHTML = '<option value="">모든 카테고리</option>' + opts; 
    filterEl.value = prevFilter;
    
    editorEl.innerHTML = opts; 
    if(state.categories.includes(prevEditor)) editorEl.value = prevEditor;

    manageListEl.innerHTML = state.categories.map(c => `
        <div class="cat-manage-item">
            <span>${c}</span>
            <button class="btn-icon" onclick="removeCategory('${c}')" style="color:#ef4444;">
                <i class="fas fa-trash"></i>
            </button>
        </div>
    `).join('');
}

window.removeCategory = async (cat) => { 
    if(confirm(`'${cat}' 카테고리를 삭제하시겠습니까?`)) { 
        state.categories = state.categories.filter(x => x !== cat); 
        await saveCategories(state.categories); 
        updateCategoryUI(); 
    } 
};

$('#btn-add-cat').onclick = async () => { 
    const val = $('#new-cat-input').value.trim(); 
    if(val && !state.categories.includes(val)) { 
        state.categories.push(val); 
        await saveCategories(state.categories); 
        $('#new-cat-input').value = ''; 
        updateCategoryUI(); 
    }
};

$('#btn-settings').onclick = () => $('#modal-settings').style.display = 'flex';
window.closeSettings = () => $('#modal-settings').style.display = 'none';

// === 7. CRUD Operations ===
async function refreshData() { 
    state.logs = await getAllLogs(); 
    renderList(); 
}

function renderList() {
    const container = $('#list-container'); 
    container.innerHTML = '';
    
    const catFilter = $('#filter-category').value; 
    const searchText = $('#search-input').value.toLowerCase();
    
    let items = state.logs.sort((a, b) => {
        if (a.date !== b.date) return b.date.localeCompare(a.date);
        return b.seq - a.seq;
    });

    items = items.filter(l => {
        if (catFilter && l.category !== catFilter) return false;
        if (searchText && !(l.title + l.content + l.tags).toLowerCase().includes(searchText)) return false;
        return true;
    });

    items.forEach(l => {
        const itemDiv = document.createElement('div');
        itemDiv.className = `list-item ${state.editingId === l.id ? 'active' : ''}`;
        itemDiv.onclick = () => loadLog(l.id);
        itemDiv.innerHTML = `
            <div class="meta">
                <span class="badge-cat">${l.category}</span>
                <span>${l.date}</span>
            </div>
            <div class="title">${l.title || '(No Title)'}</div>
        `;
        container.appendChild(itemDiv);
    });
}

function clearInputs() {
    state.editingId = null; 
    $('#empty-state').style.display = 'none'; 
    $('#editor-container').style.display = 'flex';
    
    $('#in-title').value = ''; 
    $('#in-url').value = ''; 
    $('#in-content').innerHTML = ''; 
    $('#in-code').value = ''; 
    $('#in-tags').value = '';
    
    const targetCat = $('#filter-category').value || state.categories[0];
    $('#in-category').value = targetCat;
    
    const maxSeq = Math.max(0, ...state.logs.filter(x => x.category === targetCat).map(x => x.seq || 0)) + 1;
    $('#in-seq').value = maxSeq;

    for(let i=1; i<=SLOT_COUNT; i++) { 
        $(`#file-slot-${i}`).value = ''; 
        $(`#chk-remove-${i}`).checked = false; 
        removeAttach(i); 
    }
    renderList();
}

async function loadLog(id) {
    const log = state.logs.find(x => x.id === id); 
    if(!log) return;
    
    state.editingId = id;
    $('#empty-state').style.display = 'none'; 
    $('#editor-container').style.display = 'flex';
    
    if(!state.categories.includes(log.category)) { 
        const opt = document.createElement('option'); 
        opt.value = log.category; 
        opt.text = log.category + " (삭제됨)"; 
        $('#in-category').add(opt); 
    }

    $('#in-category').value = log.category; 
    $('#in-seq').value = log.seq; 
    $('#in-title').value = log.title;
    $('#in-url').value = log.url; 
    $('#in-content').innerHTML = log.content; 
    $('#in-code').value = log.code; 
    $('#in-tags').value = log.tags;

    for(let i=1; i<=SLOT_COUNT; i++) {
        removeAttach(i);
        if(log[`img${i}`]) { 
            const f = await getFile(log[`img${i}`]); 
            if(f) renderAttachSlot(i, f); 
        }
    }
    renderList();
}

async function saveCurrent() {
    const btn = $('#btn-save'); 
    btn.disabled = true;
    try {
        const currentLog = state.logs.find(x => x.id === state.editingId);
        const attachments = {};
        
        for(let i=1; i<=SLOT_COUNT; i++) {
            const input = $(`#file-slot-${i}`);
            let fileId = currentLog ? (currentLog[`img${i}`] || '') : '';
            
            if($(`#chk-remove-${i}`).checked) fileId = '';
            if(input.files[0]) fileId = await putFile(input.files[0]);
            
            attachments[`img${i}`] = fileId;
        }

        const newLog = {
            id: state.editingId || uid(),
            date: currentLog ? currentLog.date : nowISO(),
            category: $('#in-category').value, 
            seq: parseFloat($('#in-seq').value) || 1,
            title: $('#in-title').value.trim(), 
            url: $('#in-url').value, 
            content: $('#in-content').innerHTML,
            code: $('#in-code').value, 
            tags: $('#in-tags').value, 
            ...attachments
        };

        if(!newLog.title) throw new Error('제목을 입력하세요');
        
        await putLog(newLog); 
        await refreshData(); 
        state.editingId = newLog.id; 
        loadLog(newLog.id); 
        showToast('저장 완료');
    } catch(e) { 
        console.error(e); 
        showToast(e.message, 'error'); 
    } finally { 
        btn.disabled = false; 
    }
}

async function deleteCurrent() { 
    if(state.editingId && confirm('정말 삭제하시겠습니까?')) { 
        await deleteLog(state.editingId); 
        await refreshData(); 
        clearInputs(); 
        showToast('삭제됨'); 
    } 
}

// === 8. Export Functions ===
function toRichText(html) {
    const div = document.createElement('div'); 
    div.innerHTML = html.replace(/<br\/?>/gi, '\n');
    const runs = []; 
    function traverse(node, currentStyle) {
        if(node.nodeType === 3 && node.textContent) {
            runs.push({ text: node.textContent, font: { ...currentStyle } });
        } else if(node.nodeType === 1) {
            const newStyle = { ...currentStyle };
            const style = node.style;
            if(node.tagName==='B'||style.fontWeight=='bold') newStyle.bold = true;
            if(node.tagName==='I'||style.fontStyle=='italic') newStyle.italic = true;
            if(node.tagName==='U'||style.textDecoration.includes('underline')) newStyle.underline = true;
            if(style.color) newStyle.color = { argb: 'FF' + style.color.replace('#', '').toUpperCase() };
            node.childNodes.forEach(child => traverse(child, newStyle));
        }
    }
    traverse(div, { name: 'Malgun Gothic', size: 11, color: { argb: 'FF334155' } }); 
    return runs;
}

async function exportToExcel() {
    const workbook = new ExcelJS.Workbook(); 
    const sheet = workbook.addWorksheet('Logs');
    
    sheet.columns = [
        { header: 'Category', key: 'c', width: 15 }, 
        { header: 'Title', key: 't', width: 30 }, 
        { header: 'Content', key: 'ct', width: 50 },
        ...Array.from({ length: SLOT_COUNT }, (_, i) => ({ header: `Att${i+1}`, key: `img${i+1}`, width: 15 }))
    ];
    
    const logsToExport = state.logs.sort((a, b) => a.category.localeCompare(b.category) || a.seq - b.seq);
    
    for(const log of logsToExport) {
        const row = sheet.addRow({ c: log.category, t: log.title, ct: { richText: toRichText(log.content) } });
        row.alignment = { vertical: 'top', wrapText: true };
        let hasImage = false;
        for(let i=1; i<=SLOT_COUNT; i++) {
            if(log[`img${i}`]) {
                const file = await getFile(log[`img${i}`]);
                if(file && isImage(file.type, file.name)) {
                    hasImage = true;
                    const ext = file.name.split('.').pop() || 'png';
                    const imageId = workbook.addImage({ buffer: await file.blob.arrayBuffer(), extension: ext });
                    sheet.addImage(imageId, { tl: { col: 2 + i, row: row.number - 1 }, ext: { width: 90, height: 90 } });
                    row.getCell(`img${i}`).value = ''; 
                } else if(file) {
                    row.getCell(`img${i}`).value = file.name; 
                }
            }
        }
        if(hasImage) row.height = 80;
    }
    const buffer = await workbook.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Log_${nowISO()}.xlsx`; a.click();
}

async function exportToPDF() {
    const title = $('#in-title').value; if(!title) return showToast('제목 없음', 'error');
    
    const wrapper = document.createElement('div'); 
    wrapper.style.padding = '30px'; 
    wrapper.style.width = '100%';
    
    // Header & Content
    wrapper.innerHTML = `
        <div style="border-bottom: 2px solid #4f46e5; margin-bottom: 20px;">
            <h1 style="margin:0; font-size: 24px;">${title}</h1>
        </div>
        <div style="font-size: 14px; margin-bottom: 20px;">${$('#in-content').innerHTML}</div>
    `;
    if($('#in-code').value) wrapper.innerHTML += `<pre style="background:#f1f5f9; padding:10px; white-space:pre-wrap;">${$('#in-code').value}</pre>`;
    
    // Images Container - Vertical Stack
    const imagesDiv = document.createElement('div');
    imagesDiv.style.marginTop = '30px';
    imagesDiv.style.display = 'flex';
    imagesDiv.style.flexDirection = 'column'; 
    imagesDiv.style.gap = '20px';
    imagesDiv.style.alignItems = 'center';

    for(let i=1; i<=SLOT_COUNT; i++) {
        const slot = $(`#ui-slot-${i}`);
        if(slot.dataset.hasFile === 'true' && isImage(slot.dataset.type, slot.dataset.name)) {
            const img = document.createElement('img');
            img.src = slot.dataset.url;
            img.style.maxWidth = '100%';
            img.style.maxHeight = '800px'; 
            img.style.objectFit = 'contain';
            img.style.border = '1px solid #e2e8f0';
            img.style.display = 'block'; 
            imagesDiv.appendChild(img);
        }
    }
    wrapper.appendChild(imagesDiv);
    
    const btn = $('#btn-export-pdf'); const originalText = btn.innerHTML; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    try { 
        await html2pdf().set({
            margin: 15, 
            filename: `${title}.pdf`, 
            image: { type: 'jpeg', quality: 0.98 }, 
            html2canvas: { scale: 2, useCORS: true }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(wrapper).save(); 
    } catch(e) { console.error(e); } finally { btn.innerHTML = originalText; }
}

// === 9. Initialization & Shortcuts ===
window.execCmd = (c, v) => document.execCommand(c, false, v);
window.execColor = (c) => document.execCommand('foreColor', false, STYLE_DEFS[c].hex);
window.execHilite = () => document.execCommand('hiliteColor', false, STYLE_DEFS.mark.hex);

// [FIXED] 키보드 단축키 기능 (색상 포함)
document.addEventListener('keydown', (e) => {
    const isEditor = document.activeElement === $('#in-content') || document.activeElement === $('#in-title');
    const key = e.key.toLowerCase();
    const ctrl = e.ctrlKey || e.metaKey;
    const alt = e.altKey;

    // 전역 단축키
    if (ctrl && !alt && key === 's') { e.preventDefault(); $('#btn-save').click(); return; } // 저장
    if (ctrl && alt && key === 'n') { e.preventDefault(); clearInputs(); return; } // 새 글

    // 에디터 서식 단축키
    if (isEditor) {
        if (ctrl && !alt && key === 'b') { e.preventDefault(); execCmd('bold'); return; } // 굵게
        if (ctrl && !alt && key === 'i') { e.preventDefault(); execCmd('italic'); return; } // 기울임
        if (ctrl && !alt && key === 'u') { e.preventDefault(); execCmd('underline'); return; } // 밑줄
        if (ctrl && alt && key === '5') { e.preventDefault(); execCmd('strikeThrough'); return; } // 취소선
        if (ctrl && e.shiftKey && key === 'x') { e.preventDefault(); execCmd('removeFormat'); return; } // 서식 지우기
        if (ctrl && alt && key === 'm') { e.preventDefault(); execHilite(); return; } // 형광펜
        
        // [복구됨] 색상 단축키
        if (ctrl && alt && key === 'r') { e.preventDefault(); execColor('red'); return; } // 빨강
        if (ctrl && alt && key === 'b') { e.preventDefault(); execColor('blue'); return; } // 파랑
    }
});

document.addEventListener('DOMContentLoaded', async () => {
    await openDB(); await initCategories(); initInputs(); await refreshData();
    $('#btn-new-log').onclick = clearInputs; $('#btn-save').onclick = saveCurrent; $('#btn-delete').onclick = deleteCurrent;
    $('#filter-category').onchange = renderList; $('#search-input').oninput = renderList;
    $('#btn-export-excel').onclick = exportToExcel; $('#btn-export-pdf').onclick = exportToPDF;
    $('#btn-open-url').onclick = () => { const u = $('#in-url').value; if(u) window.open(u.startsWith('http') ? u : 'https://' + u, '_blank'); };
    if($('#btn-toggle-menu')) $('#btn-toggle-menu').onclick = () => $('#sidebar').classList.toggle('show');
});
