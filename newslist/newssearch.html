<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT 통합 전문 검색</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --primary-color: #34495e;
        --primary-hover: #2c3e50;
        --bg-color: #f0f2f5;
        --card-bg: #ffffff;
        --text-color: #333333;
        --gray-text: #666666;
        --border-color: #d1d5db;
        --shadow: 0 10px 25px rgba(0,0,0,0.05); 
        --focus-shadow: 0 0 0 4px rgba(52, 73, 94, 0.15);
    }

    body {
        font-family: 'Noto Sans KR', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        box-sizing: border-box;
    }

    .search-card {
        width: 100%;
        max-width: 580px;
        background: var(--card-bg);
        border-radius: 12px;
        padding: 40px 30px;
        box-shadow: var(--shadow);
        text-align: center;
        border: 1px solid #e5e7eb;
    }

    h1 {
        font-size: 22px;
        font-weight: 700;
        margin: 0 0 8px 0;
        color: #1f2937;
        letter-spacing: -0.5px;
    }

    p.subtitle {
        font-size: 14px;
        color: var(--gray-text);
        margin-bottom: 30px;
        font-weight: 400;
    }

    .input-wrapper {
        position: relative;
        margin-bottom: 20px;
    }

    input[type="text"] {
        width: 100%;
        padding: 14px 15px 14px 42px;
        font-size: 15px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        box-sizing: border-box;
        transition: all 0.2s ease;
        outline: none;
        background-color: #f9fafb;
    }

    input[type="text"]:focus {
        background-color: #fff;
        border-color: var(--primary-color);
        box-shadow: var(--focus-shadow);
    }

    .search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        fill: #9ca3af;
    }

    .main-action {
        width: 100%;
        margin-bottom: 24px;
    }

    .btn-primary {
        width: 100%;
        padding: 14px;
        font-size: 15px;
        font-weight: 600;
        color: white;
        background-color: var(--primary-color);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.2s;
    }

    .btn-primary:hover { background-color: var(--primary-hover); }

    .divider {
        display: flex;
        align-items: center;
        color: #9ca3af;
        font-size: 12px;
        margin: 20px 0;
    }
    .divider::before, .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid #e5e7eb;
    }
    .divider span { padding: 0 12px; }

    .sub-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
    }

    .btn-secondary {
        flex: 1 1 calc(33.333% - 8px);
        min-width: 100px;
        padding: 10px 5px;
        font-size: 13px;
        font-weight: 500;
        color: #4b5563;
        background-color: #fff;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
    }

    .btn-secondary:hover {
        background-color: #f3f4f6;
        color: #111;
        border-color: #9ca3af;
    }
</style>
</head>
<body>

<div class="search-card">
    <h1>IT 통합 전문 검색</h1>
    <p class="subtitle">뉴스, 기술지식, AI 및 ITPE 전문 자료 9종 통합 검색</p>
    
    <div class="input-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" id="keywordInput" placeholder="검색어를 입력하세요" value="기술사" onkeypress="handleEnter(event)" />
    </div>

    <div class="main-action">
        <button class="btn-primary" onclick="searchAll()">9대 사이트 통합 검색</button>
    </div>

    <div class="divider">
        <span>개별 사이트 검색</span>
    </div>

    <div class="sub-actions">
        <button class="btn-secondary" onclick="searchBoanNews()">보안뉴스</button>
        <button class="btn-secondary" onclick="searchEtNews()">전자신문</button>
        <button class="btn-secondary" onclick="searchGoogleAI()">Google AI</button>
        <button class="btn-secondary" onclick="searchJidum()">지덤(JIDUM)</button>
        <button class="btn-secondary" onclick="searchItWiki()">IT위키</button>
        <button class="btn-secondary" onclick="searchZal()">ZAL(ITPE)</button>
        <button class="btn-secondary" onclick="searchZalIct()">ZAL(통신)</button>
        <button class="btn-secondary" onclick="searchDory()">도리(skby)</button>
        <button class="btn-secondary" onclick="searchBitCogi()">비트코기</button>
    </div>

    <form id="boanSearchForm" method="GET" action="https://www.boannews.com/search/list.asp" target="_blank" accept-charset="EUC-KR" style="display:none;">
        <input type="hidden" name="find" id="boanFind" value="" />
        <input type="hidden" name="q" id="boanQ" value="" />
    </form>
</div>

<script>
    function getKeyword() {
        return document.getElementById('keywordInput').value.trim();
    }

    function handleEnter(e) {
        if (e.key === 'Enter') searchAll();
    }

    function searchBoanNews() {
        const keyword = getKeyword();
        if (!keyword) return;
        document.getElementById('boanFind').value = keyword;
        document.getElementById('boanQ').value = keyword;
        document.getElementById('boanSearchForm').submit();
    }

    function searchEtNews() {
        const keyword = getKeyword();
        if (!keyword) return;
        window.open(`https://search.etnews.com/etnews/search.html?kwd=${encodeURIComponent(keyword)}`, "_blank");
    }

    function searchGoogleAI() {
        const keyword = getKeyword();
        if (!keyword) return;
        window.open(`https://www.google.com/search?q=${encodeURIComponent(keyword)}&udm=50&aic=1`, "_blank");
    }

    function searchJidum() {
        const keyword = getKeyword();
        if (!keyword) return;
        window.open(`http://www.jidum.com/search.do?keyword=${encodeURIComponent(keyword)}`, "_blank");
    }

    function searchItWiki() {
        const keyword = getKeyword();
        if (!keyword) return;
        window.open(`https://itwiki.kr/index.php?search=${encodeURIComponent(keyword)}&title=특수%3A검색`, "_blank");
    }

    function searchZal() {
        const keyword = getKeyword();
        if (!keyword) return;
        window.open(`https://itpe.co.kr/main/portal/searchPortal.do?searchVal=${encodeURIComponent(keyword)}`, "_blank");
    }

    function searchZalIct() {
        const keyword = getKeyword();
        if (!keyword) return;
        window.open(`https://itpe.co.kr/main/ictPortal/searchIctPortal.do?searchVal=${encodeURIComponent(keyword)}`, "_blank");
    }

    function searchDory() {
        const keyword = getKeyword();
        if (!keyword) return;
        window.open(`https://blog.skby.net/?s=${encodeURIComponent(keyword)}`, "_blank");
    }

    function searchBitCogi() {
        const keyword = getKeyword();
        if (!keyword) return;
        window.open(`https://itpenote.tistory.com/search/${encodeURIComponent(keyword)}`, "_blank");
    }

    function searchAll() {
        const keyword = getKeyword();
        if (!keyword) {
            alert("검색어를 입력하세요.");
            document.getElementById('keywordInput').focus();
            return;
        }
        searchBoanNews();
        searchEtNews();
        searchGoogleAI();
        searchJidum();
        searchItWiki();
        searchZal();
        searchZalIct();
        searchDory();
        searchBitCogi();
    }
</script>

</body>
</html>
