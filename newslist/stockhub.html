<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stock Search Hub</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>
/* === Premium Compact Theme === */
:root {
    --bg-body: #f1f5f9;      
    --bg-surface: #ffffff;
    --border: #e2e8f0;
    --border-hover: #cbd5e1;
    
    --primary: #475569;      
    --primary-hover: #1e293b;
    --accent: #3b82f6;       
    
    --text-main: #334155;
    --text-sub: #64748b;
    
    --radius: 8px;           
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    
    --font-ui: 'Inter', 'Noto Sans KR', sans-serif;
}

* { box-sizing: border-box; outline: none; }
body { 
    margin: 0; 
    background-color: var(--bg-body); 
    color: var(--text-main); 
    font-family: var(--font-ui); 
    font-size: 13px;         
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
    letter-spacing: -0.01em;
}

/* Layout */
.container { 
    max-width: 720px;        
    margin: 0 auto; 
    padding: 80px 20px; 
    width: 100%; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    position: relative; 
    flex: 1; 
}

/* Header Tools */
.header-tools { position: absolute; top: 20px; right: 20px; }
.btn-icon { 
    width: 32px; height: 32px; border-radius: var(--radius); 
    border: 1px solid transparent; 
    background: transparent; 
    color: var(--text-sub); 
    cursor: pointer; font-size: 14px; 
    transition: all 0.2s ease;
    display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { 
    background: #e2e8f0; 
    color: var(--text-main); 
}

/* Brand Header */
.search-header { text-align: center; margin-bottom: 32px; }
.brand-logo { 
    font-size: 28px; 
    font-weight: 700; color: var(--text-main); 
    margin-bottom: 6px; display: inline-flex; align-items: center; gap: 8px; 
    color: #1e293b;
}
.brand-desc { color: var(--text-sub); font-size: 13px; font-weight: 400; opacity: 0.8; }

/* Main Search Input */
.search-box-wrapper { position: relative; width: 100%; max-width: 600px; margin-bottom: 12px; }

.search-input-lg { 
    width: 100%; height: 48px; 
    padding: 0 110px 0 44px; 
    border: 1px solid var(--border); 
    border-radius: var(--radius); 
    background: var(--bg-surface);
    font-size: 15px; color: var(--text-main);
    transition: all 0.2s ease; 
    box-shadow: var(--shadow-sm);
}
.search-input-lg::placeholder { color: #94a3b8; font-size: 14px; }
.search-input-lg:focus { 
    border-color: var(--accent); 
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); 
}

.search-icon { 
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%); 
    color: #94a3b8; font-size: 16px; transition: 0.2s;
}
.search-input-lg:focus ~ .search-icon { color: var(--accent); }

.btn-search-all {
    position: absolute; right: 6px; top: 6px; bottom: 6px;
    background: var(--primary); 
    color: white; border: none; border-radius: 6px; 
    padding: 0 16px; font-weight: 500; font-size: 13px; cursor: pointer;
    transition: background 0.2s;
    box-shadow: var(--shadow-sm);
}
.btn-search-all:hover { background: var(--primary-hover); }

/* Helper Link */
.helper-link-wrapper {
    width: 100%; max-width: 600px; display: flex; justify-content: flex-end; margin-bottom: 16px;
}
.btn-helper {
    background: #fff; border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 10px; font-size: 11px; color: var(--text-sub);
    cursor: pointer; display: flex; align-items: center; gap: 5px;
    transition: all 0.2s; text-decoration: none;
}
.btn-helper:hover {
    background: #f8fafc; border-color: var(--border-hover); color: var(--text-main);
}

/* === 포스트잇 메모장 스타일 (수평 3분할) === */
.memo-wrapper {
    width: 100%;
    max-width: 600px; /* 기존 폭 유지 */
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
}
.memo-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
    padding: 0 4px;
}
.memo-status {
    font-size: 11px;
    color: #10b981; 
    opacity: 0;
    transition: opacity 0.3s ease;
}
.memo-container {
    display: flex;
    gap: 12px;
    width: 100%;
}
.memo-pad {
    flex: 1;
    min-width: 0;
    height: 120px; /* 조금 더 길게 조정 */
    padding: 12px;
    background: #fefce8; 
    border: 1px solid #fef08a;
    border-radius: 6px;
    font-family: var(--font-ui);
    font-size: 13px;
    color: var(--text-main);
    resize: vertical; 
    box-shadow: var(--shadow-sm);
    line-height: 1.5;
    transition: border-color 0.2s, box-shadow 0.2s;
}
.memo-pad::placeholder {
    color: #ca8a04;
    opacity: 0.6;
    font-size: 12px;
}
.memo-pad:focus {
    border-color: #fde047;
    box-shadow: 0 0 0 3px rgba(253, 224, 71, 0.2);
}

/* Chips */
.divider { 
    width: 100%; max-width: 600px; display: flex; align-items: center; 
    margin: 0 0 16px 0; color: var(--text-sub); font-size: 11px; font-weight: 600; 
    opacity: 0.7; letter-spacing: 0.5px;
}
.divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
.divider span { padding: 0 12px; }

.chip-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 620px; }

.search-chip { 
    padding: 6px 14px; 
    background: var(--bg-surface); 
    border: 1px solid var(--border); 
    border-radius: 6px; 
    font-size: 12px; font-weight: 500; color: var(--text-sub); 
    cursor: pointer; transition: all 0.15s ease; 
    display: flex; align-items: center; gap: 6px; user-select: none;
    box-shadow: var(--shadow-sm);
}
.search-chip:hover { 
    background: #f8fafc; 
    border-color: var(--text-sub); 
    color: var(--text-main); 
    transform: translateY(-1px); 
}
.search-chip i { font-size: 10px; color: #94a3b8; transition: color 0.15s ease; }

.search-chip.selected {
    background: var(--primary);
    border-color: var(--primary);
    color: #ffffff;
    transform: translateY(-1px);
}
.search-chip.selected i {
    color: #ffffff;
}

/* Settings Modal */
.modal-overlay { 
    position: fixed; inset: 0; background: rgba(255, 255, 255, 0.6); z-index: 1000; 
    display: none; align-items: center; justify-content: center; 
    backdrop-filter: blur(4px); 
}

.settings-box { 
    background: var(--bg-surface); 
    width: 500px; padding: 24px; border-radius: 12px; 
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 0 1px rgba(0,0,0,0.1); 
    border: 1px solid var(--border);
    max-height: 85vh; display: flex; flex-direction: column; 
}

.settings-header { 
    display: flex; justify-content: space-between; align-items: center; 
    margin-bottom: 20px; padding-bottom: 12px; 
    border-bottom: 1px solid var(--border); 
}
.settings-header h3 { color: var(--text-main); font-weight: 700; margin: 0; font-size: 15px; }

.settings-body { flex: 1; overflow-y: auto; padding-right: 4px; }

.source-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.source-item { 
    display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; 
    border: 1px solid var(--border); border-radius: 6px; background: #fff; 
    transition: 0.1s;
}
.source-item:hover { background: #f8fafc; border-color: var(--border-hover); }

.source-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
.source-name { font-weight: 600; font-size: 13px; color: var(--text-main); }
.source-url { font-size: 11px; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'JetBrains Mono', monospace; }

.btn-del { 
    width: 24px; height: 24px; background: transparent; 
    color: #cbd5e1; border: none; border-radius: 4px; cursor: pointer; 
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    margin-left: 8px;
}
.btn-del:hover { background: #fee2e2; color: #ef4444; }

/* Add Form */
.add-form { 
    background: #f8fafc; 
    border: 1px solid var(--border); 
    padding: 16px; border-radius: 8px; 
}
.form-row { margin-bottom: 10px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; }
.form-input { 
    width: 100%; height: 36px; 
    background: #fff;
    border: 1px solid var(--border); 
    border-radius: 6px; padding: 0 10px; 
    font-size: 13px; color: var(--text-main);
}
.form-input:focus { border-color: var(--accent); }

.btn-add-confirm { 
    width: 100%; height: 36px; 
    background: var(--text-main); color: #fff; 
    border: none; border-radius: 6px; font-weight: 600; font-size: 12px;
    cursor: pointer; margin-top: 8px; 
}
.btn-add-confirm:hover { background: #1e293b; }
</style>
</head>
<body>

<div class="container">
    <div class="header-tools">
        <button class="btn-icon" id="btn-settings" title="소스 설정"><i class="fas fa-cog"></i></button>
    </div>

    <div class="search-header">
        <div class="brand-logo"><i class="fas fa-chart-line"></i> Stock Search Hub</div>
        <div class="brand-desc">여러 증권 사이트의 종목 정보를 한 번에 조회하세요.</div>
    </div>

    <div class="search-box-wrapper">
        <input type="text" id="main-search" class="search-input-lg" placeholder="종목코드 6자리 입력 (예: 005930)" autofocus list="search-history-list" autocomplete="off">
        <i class="fas fa-search search-icon"></i>
        <button class="btn-search-all" id="btn-search-all">조회하기</button>
        <datalist id="search-history-list"></datalist>
    </div>

    <div class="helper-link-wrapper">
        <a href="https://www.google.com/finance/?hl=ko" target="_blank" class="btn-helper">
            <i class="fas fa-external-link-alt"></i> 종목코드 조회
        </a>
    </div>

    <div class="memo-wrapper">
        <div class="memo-header">
            <span><i class="fas fa-sticky-note" style="color: #eab308; margin-right: 4px;"></i> 관심 종목 메모</span>
            <span class="memo-status" id="memo-status"><i class="fas fa-check-circle"></i> 자동 저장됨</span>
        </div>
        <div class="memo-container">
            <textarea id="stock-memo-1" class="memo-pad" placeholder="그룹 1 (예: 반도체)" spellcheck="false"></textarea>
            <textarea id="stock-memo-2" class="memo-pad" placeholder="그룹 2 (예: 2차전지)" spellcheck="false"></textarea>
            <textarea id="stock-memo-3" class="memo-pad" placeholder="그룹 3 (단기 트레이딩)" spellcheck="false"></textarea>
        </div>
    </div>

    <div class="divider"><span>STOCK SITES</span></div>
    <div class="chip-container" id="chip-container"></div>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="settings-box">
        <div class="settings-header">
            <h3>사이트 설정</h3>
            <button class="btn-icon" id="btn-close-settings" style="width:28px; height:28px;"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="settings-body">
            <div class="source-list" id="settings-list"></div>

            <div class="add-form">
                <div style="font-weight:600; font-size:12px; margin-bottom:8px; color:var(--text-main);">
                    + 사이트 추가
                </div>
                <div class="form-row">
                    <label class="form-label">이름</label>
                    <input type="text" id="new-name" class="form-input" placeholder="예: 구글 파이낸스">
                </div>
                <div class="form-row">
                    <label class="form-label">URL 패턴 (종목코드 부분에 {q} 입력)</label>
                    <input type="text" id="new-url" class="form-input" placeholder="https://www.google.com/finance/quote/{q}:KRX">
                </div>
                <button id="btn-add-source" class="btn-add-confirm">추가</button>
            </div>
            
            <div style="margin-top:16px; text-align:center;">
                <button id="btn-reset-default" style="background:transparent; border:none; color:var(--text-sub); padding:4px; font-size:11px; cursor:pointer; text-decoration:underline;">
                    초기화
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// === 1. DEFAULT CONFIGURATION ===
const DEFAULT_ENGINES = [
    { id: '01.naver_fin', name: '네이버 금융', url: 'https://finance.naver.com/item/main.naver?code={q}' },
    { id: '02.daum_fin', name: '다음 금융', url: 'https://finance.daum.net/quotes/A{q}#home' },
    { id: '03.google_fin', name: '구글 파이낸스', url: 'https://www.google.com/finance/beta/quote/{q}:KRX?hl=ko' },  
    { id: '04.fnguide', name: '에프앤가이드', url: 'https://comp.fnguide.com/SVO2/ASP/SVD_Main.asp?pGB=1&gicode=A{q}' },
    { id: '05.investing', name: '인베스팅닷컴', url: 'https://kr.investing.com/search/?q={q}' }
];

// === 2. INDEXED DB (엔진 설정용) ===
const DB_CONFIG = { NAME: 'StockSearchDB', VERSION: 1, STORE: 'engines' };
const dbParams = {
    open: () => new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_CONFIG.NAME, DB_CONFIG.VERSION);
        req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(DB_CONFIG.STORE)) db.createObjectStore(DB_CONFIG.STORE, { keyPath: 'id' });
        };
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = (e) => reject(e);
    }),
    getAll: async () => {
        const db = await dbParams.open();
        return new Promise(resolve => {
            const tx = db.transaction(DB_CONFIG.STORE, 'readonly');
            tx.objectStore(DB_CONFIG.STORE).getAll().onsuccess = (e) => resolve(e.target.result || []);
        });
    },
    put: async (item) => {
        const db = await dbParams.open();
        const tx = db.transaction(DB_CONFIG.STORE, 'readwrite');
        tx.objectStore(DB_CONFIG.STORE).put(item);
        return new Promise(resolve => tx.oncomplete = () => resolve());
    },
    delete: async (id) => {
        const db = await dbParams.open();
        const tx = db.transaction(DB_CONFIG.STORE, 'readwrite');
        tx.objectStore(DB_CONFIG.STORE).delete(id);
        return new Promise(resolve => tx.oncomplete = () => resolve());
    },
    clear: async () => {
        const db = await dbParams.open();
        const tx = db.transaction(DB_CONFIG.STORE, 'readwrite');
        tx.objectStore(DB_CONFIG.STORE).clear();
        return new Promise(resolve => tx.oncomplete = () => resolve());
    }
};

let currentEngines = [];

// === 3. LOCAL STORAGE (검색 기록 & 분할 메모용) ===
const HISTORY_KEY = 'stock_search_history';
let searchHistory = [];

function loadHistory() {
    const stored = localStorage.getItem(HISTORY_KEY);
    if(stored) {
        try { searchHistory = JSON.parse(stored); } catch(e) { searchHistory = []; }
    }
    renderHistory();
}

function renderHistory() {
    const datalist = document.getElementById('search-history-list');
    datalist.innerHTML = '';
    searchHistory.forEach(code => {
        const option = document.createElement('option');
        option.value = code;
        datalist.appendChild(option);
    });
}

function saveHistory(code) {
    if(!code) return;
    searchHistory = searchHistory.filter(item => item !== code);
    searchHistory.unshift(code);
    if(searchHistory.length > 15) searchHistory.pop(); 
    localStorage.setItem(HISTORY_KEY, JSON.stringify(searchHistory));
    renderHistory();
}

// 3분할 메모장 기능
function loadMemo() {
    for (let i = 1; i <= 3; i++) {
        const storedMemo = localStorage.getItem(`stock_search_memo_${i}`);
        if (storedMemo) {
            document.getElementById(`stock-memo-${i}`).value = storedMemo;
        }
    }
}

function setupMemoAutoSave() {
    const statusText = document.getElementById('memo-status');
    let saveTimeout;

    for (let i = 1; i <= 3; i++) {
        const memoPad = document.getElementById(`stock-memo-${i}`);
        memoPad.addEventListener('input', (e) => {
            // 로컬 스토리지에 각각의 키로 즉시 저장
            localStorage.setItem(`stock_search_memo_${i}`, e.target.value);
            
            // '자동 저장됨' UI 피드백 표시
            statusText.style.opacity = '1';
            
            // 2초 후 메시지 숨김
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                statusText.style.opacity = '0';
            }, 2000);
        });
    }
}

// === 4. LOGIC ===
document.addEventListener('DOMContentLoaded', async () => {
    await loadEngines();
    loadHistory(); 
    loadMemo(); // 3분할 메모 로드
    setupMemoAutoSave(); // 분할 메모 자동저장 설정
    setupEvents();
});

async function loadEngines() {
    currentEngines = await dbParams.getAll();
    if (currentEngines.length === 0) {
        for (const engine of DEFAULT_ENGINES) await dbParams.put(engine);
        currentEngines = await dbParams.getAll();
    }
    renderChips();
    renderSettingsList();
}

function renderChips() {
    const container = document.getElementById('chip-container');
    container.innerHTML = '';
    currentEngines.forEach(eng => {
        const btn = document.createElement('div');
        btn.className = 'search-chip';
        btn.dataset.id = eng.id; 
        btn.innerHTML = `<i class="fas fa-chart-pie"></i> ${eng.name}`;
        
        btn.onclick = () => {
            btn.classList.toggle('selected');
        };
        
        container.appendChild(btn);
    });
}

function renderSettingsList() {
    const list = document.getElementById('settings-list');
    list.innerHTML = '';
    currentEngines.forEach(eng => {
        const item = document.createElement('div');
        item.className = 'source-item';
        item.innerHTML = `
            <div class="source-info">
                <span class="source-name">${eng.name}</span>
                <span class="source-url" title="${eng.url}">${eng.url}</span>
            </div>
            <button class="btn-del" title="삭제"><i class="fas fa-trash"></i></button>
        `;
        item.querySelector('.btn-del').onclick = async () => {
            if(confirm(`[${eng.name}] 삭제하시겠습니까?`)) {
                await dbParams.delete(eng.id);
                loadEngines();
            }
        };
        list.appendChild(item);
    });
}

function performSearch(targetId) {
    let val = document.getElementById('main-search').value.trim();
    if(!val) { alert('종목코드를 입력하세요.'); document.getElementById('main-search').focus(); return; }

    val = val.toUpperCase().replace(/^A/, '');
    saveHistory(val);

    const openUrl = (u) => {
        const newWin = window.open(u.replace('{q}', encodeURIComponent(val)), '_blank');
        return newWin !== null; 
    };

    if (targetId === 'ALL') {
        const selectedNodes = document.querySelectorAll('.search-chip.selected');
        let enginesToOpen = [];
        
        if (selectedNodes.length > 0) {
            const selectedIds = Array.from(selectedNodes).map(node => node.dataset.id);
            enginesToOpen = currentEngines.filter(eng => selectedIds.includes(eng.id));
            
            if (enginesToOpen.length > 3) {
                if(!confirm(`선택한 ${enginesToOpen.length}개 탭을 여시겠습니까?`)) return;
            }
        } else {
            if(confirm(`선택된 링크가 없습니다. 등록된 ${currentEngines.length}개 탭을 모두 여시겠습니까?`)) {
                enginesToOpen = currentEngines;
            } else { return; }
        }

        let isBlocked = false;
        enginesToOpen.forEach(eng => {
            if (!openUrl(eng.url)) isBlocked = true;
        });

        if (isBlocked) {
            alert("⚠️ 팝업 차단 기능이 켜져 있어 일부 사이트만 열렸습니다.\n브라우저 설정에서 '팝업 항상 허용'으로 변경해주세요.");
        }

    } else {
        const engine = currentEngines.find(e => e.id === targetId);
        if(engine) openUrl(engine.url);
    }
}

function setupEvents() {
    document.getElementById('main-search').addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch('ALL'); });
    document.getElementById('btn-search-all').onclick = () => performSearch('ALL');

    const modal = document.getElementById('settings-modal');
    document.getElementById('btn-settings').onclick = () => { modal.style.display = 'flex'; renderSettingsList(); };
    document.getElementById('btn-close-settings').onclick = () => modal.style.display = 'none';
    
    document.getElementById('btn-add-source').onclick = async () => {
        const name = document.getElementById('new-name').value.trim();
        const url = document.getElementById('new-url').value.trim();
        if (!name || !url) return alert('정보를 입력하세요.');
        if (!url.includes('{q}')) return alert('{q}를 포함해주세요.');

        await dbParams.put({ id: 'custom_' + Date.now(), name, url });
        document.getElementById('new-name').value = ''; document.getElementById('new-url').value = '';
        await loadEngines();
    };

    document.getElementById('btn-reset-default').onclick = async () => {
        if(confirm('초기화 하시겠습니까?')) {
            await dbParams.clear(); await loadEngines();
        }
    };
    
    modal.addEventListener('click', (e) => { if(e.target === modal) modal.style.display = 'none'; });
}
</script>
</body>
</html>
