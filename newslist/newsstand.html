<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IITP 주간 기술 동향 스크랩 뷰어</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --bg-color: #f4f6f8;
            --surface-color: #ffffff;
            --border-color: #e0e0e0;
            --text-color: #333;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* 헤더 & 툴바 영역 */
        header {
            background: var(--surface-color);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .title-area h1 {
            margin: 0;
            font-size: 20px;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-area span {
            font-size: 14px;
            color: #666;
            font-weight: 400;
            background: #eee;
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* 컨트롤 그룹 */
        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #f8f9fa;
            padding: 5px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        /* 버튼 공통 스타일 */
        button {
            border: none;
            background: var(--surface-color);
            color: #555;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid transparent;
        }

        button:hover {
            background-color: #e9ecef;
            color: #333;
        }

        button:active {
            transform: translateY(1px);
        }

        /* 주요 버튼 (조회) */
        button.primary-btn {
            background-color: var(--primary-color);
            color: white;
        }

        button.primary-btn:hover {
            background-color: var(--primary-hover);
        }

        /* 날짜 입력 */
        input[type="date"] {
            padding: 7px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        /* 줌 상태 표시 텍스트 */
        .zoom-label {
            font-size: 13px;
            color: #666;
            min-width: 50px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* 뷰어 영역 */
        .viewer-container {
            flex: 1;
            background: var(--surface-color);
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            overflow: auto; /* 스크롤 */
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform-origin: top left;
            transition: transform 0.2s ease-out;
            display: block;
        }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bbb;
        }
    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <h1>IITP 뉴스 스크랩 <span>Viewer</span></h1>
        </div>

        <div class="controls">
            <div class="control-group">
                <button onclick="adjustDate(-1)" title="하루 전">&#9664;</button>
                <input type="date" id="dateInput">
                <button onclick="adjustDate(1)" title="하루 후">&#9654;</button>
                <button class="primary-btn" onclick="loadScrapByDate()">조회</button>
            </div>

            <div class="control-group">
                <button onclick="adjustZoom(-0.1)" title="축소 (-)">&#8722;</button>
                <span id="zoomDisplay" class="zoom-label">100%</span>
                <button onclick="adjustZoom(0.1)" title="확대 (+)">&#43;</button>
                <button onclick="resetZoom()" title="줌 초기화" style="font-size: 12px;">초기화</button>
            </div>
        </div>
    </header>
  
    <div class="viewer-container">
        <iframe id="scrapFrame" src="" title="스크랩 프레임"></iframe>
    </div>

    <script>
        // === 설정 변수 ===
        let currentZoom = 1.0; 
        const MIN_ZOOM = 0.5;
        const MAX_ZOOM = 3.0; // 최대 확대 폭을 조금 더 늘림

        // === 날짜 관련 유틸리티 ===
        function formatDateToYYYYMMDD(dateStr) {
            const date = new Date(dateStr);
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            return `${yyyy}${mm}${dd}`;
        }

        function setToday() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('dateInput').value = `${yyyy}-${mm}-${dd}`;
        }

        // 날짜 하루 이동 (이전/다음)
        function adjustDate(days) {
            const dateInput = document.getElementById('dateInput');
            if (!dateInput.value) {
                setToday();
                return;
            }
            
            const currentDate = new Date(dateInput.value);
            currentDate.setDate(currentDate.getDate() + days);
            
            const yyyy = currentDate.getFullYear();
            const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dd = String(currentDate.getDate()).padStart(2, '0');
            
            dateInput.value = `${yyyy}-${mm}-${dd}`;
            loadScrapByDate(); // 날짜 변경 시 자동 조회
        }

        // === 뷰어 로직 ===
        function loadScrapByDate() {
            const dateInput = document.getElementById('dateInput').value;
            if (!dateInput) {
                alert("날짜를 선택해주세요.");
                return;
            }
            const formattedDate = formatDateToYYYYMMDD(dateInput);
            const baseUrl = "https://mail2.scrapmaster.co.kr/mail/include/iitp_list_pop.php";
            const finalUrl = `${baseUrl}?scrapinfo=${formattedDate}&q=&from=display`;
            
            document.getElementById('scrapFrame').src = finalUrl;
            applyZoom(); // 로드 시 줌 상태 유지
        }

        // === 줌 컨트롤 로직 ===
        function applyZoom() {
            const iframe = document.getElementById('scrapFrame');
            const display = document.getElementById('zoomDisplay');
            
            // iframe 확대/축소 적용
            iframe.style.transform = `scale(${currentZoom})`;
            
            // 컨테이너 크기 보정 (스크롤바가 내용을 가리지 않도록)
            iframe.style.width = `${100 / currentZoom}%`;
            iframe.style.height = `${100 / currentZoom}%`;

            // UI 업데이트
            display.textContent = `${Math.round(currentZoom * 100)}%`;
        }

        function adjustZoom(delta) {
            let newZoom = currentZoom + delta;
            newZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, newZoom));
            // 부동소수점 오차 방지
            currentZoom = Math.round(newZoom * 10) / 10;
            
            applyZoom();
        }

        function resetZoom() {
            currentZoom = 1.0;
            applyZoom();
        }

        // === 키보드 단축키 ===
        document.addEventListener('keydown', (event) => {
            const isModifierPressed = event.ctrlKey || event.metaKey; 
            
            // Ctrl + 좌/우 화살표: 날짜 이동
            if (isModifierPressed && event.key === 'ArrowLeft') {
                event.preventDefault();
                adjustDate(-1);
            } else if (isModifierPressed && event.key === 'ArrowRight') {
                event.preventDefault();
                adjustDate(1);
            }

            // Ctrl + +/-: 줌 조절
            if (isModifierPressed && (event.key === '+' || event.key === '=' || event.key === '-')) {
                event.preventDefault();
                if (event.key === '+' || event.key === '=') adjustZoom(0.1);
                else if (event.key === '-') adjustZoom(-0.1);
            }
            
            // Ctrl + 0: 줌 초기화
            if (isModifierPressed && event.key === '0') {
                event.preventDefault();
                resetZoom();
            }
        });

        // === 초기화 ===
        window.onload = () => {
            setToday();
            resetZoom();
            loadScrapByDate();
        };
    </script>

</body>
</html>
